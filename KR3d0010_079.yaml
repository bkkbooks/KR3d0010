body:
  text: 臣惟遂初之紀聖皇迭興易茹毛衣羽而為火化絲枲者固日用之椎輪億朞所祖述也若中古以來民事大備務在震動恪共為天下先而詩書所志重民依念本計若無逸之稱三宗及豳風豳頌由成王以溯后稷先後相望代祇數君已炳耀乎千百載焉欽惟我皇上率育蒼黎淵衷在宥凡勤民之大政皆法祖之鴻規敬緬聖祖仁皇帝周悉民隱命繪抒吟世宗憲皇帝元音繼振載迪阜康高宗純皇帝寶思繩承益宏樂利布在授時通考之書垂為本朝不刋之典聖心勤亹奠麗宣光所以仰述三聖俯綏兆人申景鑠於宸藻者煥乎四十有六章於田夫紅女茅蒲襏襫鱗隰胼胝之形籧筐曲植蠶館機絲之狀宣著丹豪纎悉若繪誠所謂化工之肖萬物而闡繹睿㫖往復周詳聖人之辭則丁寧乎里閈也聖人之情則寅惕乎旰宵也夫以含哺挾纊之世思艱求寧猶恐一民飢一民寒禀列聖之懿綱醲化勤修而綿續之歲藉加推疊蠲庸賦觀弄田啓蠶舍朝野共覩家喻而戶曉者時時皆祇遹成憲俾重熙纍洽之象溥遍海隅是以被之瓊篇薈之藻笈後先一揆流露自然伊古重民務本之朝垂光載籍所稱保世滋大者有如是之規相周矩相襲哉且謹按授時通考分門有八首天時土宜次榖種力作次勸課蓄聚次農餘蠶桑今御什標題析目之大一循前制由浸種至祭神其間敬授人時簡器修政辨五土分百榖咨力穡勗蓋藏法制品節足使農有功而授衣一事由浴蠶至成衣胥與農候相準蓋六門大指已寓目次之中於以櫽括全書刋示奕葉我高宗純皇帝命纂成集彚載天題之㫖表裏洞見而聖聖相承繼述之大度越萬古者自兹益彰將見仁澤涵濡愈久愈永薄海內外守農桑婦子之經以致盈寧康樂之慶於無疆矣臣等不勝忭誦悅服之至臣戴衢亨臣趙秉沖臣英和拜手稽首恭跋
