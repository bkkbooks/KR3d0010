front:
  text: 欽定四庫全書欽定授時通考卷十三
  hash: sha256:ec900b6c03e75d5071e879532ae52358f3cfd10f5e286eb0674bb38427074631
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3d0010_WYG_013-1a, image: WYG0732/WYG0732-0160c.png}
body:
  text: 土宜田制圖周尺農政全書考尺度按古者度以絲起隋志曰蠺所吐絲為忽十忽為秒十秒為毫十毫為釐十釐為分考工記玉人璧羡度尺好三寸以為度好三寸所以為璧也好璧之孔也裁其兩旁以益上下所以為羡也袤十寸廣八寸所以為度尺也則是十寸八寸皆為尺矣以十寸之尺起度則十尺為丈十丈為引以八寸之尺起度則八尺為尋倍尋為常此周制也自漢以來世無正尺律度量衡靡有孑遺度無自起儒先所謂子穀秬黍中者徒有空言了無實驗心窮於思口弊於議不能決也惟晉大始中中書監荀朂尺校古物七品多合一曰姑洗玉律二曰小吕三曰西京銅望臬四曰金錯望臬五曰銅斛六曰古錢七曰建武銅尺依尺鑄律時得漢時故鐘吹律命之皆應然時好推遷諸代異制隋書載尺十有五等以荀尺為本大概周尺漢劉歆尺建武銅尺宋祖沖之所傳尺皆與荀氏一體他如晉田父玉尺漢官尺魏杜夔尺晉後尺魏前尺中尺後尺東魏後尺銀錯銅籥尺後周玉尺宋氏尺萬寶常水尺劉曜渾儀尺梁朝俗間尺各與荀互異自隋以來荀尺亦莫傳用唐有張文收律尺有景表尺五代有王朴律尺宋則太府寺有尺四等又高若訥嘗校古尺十五等李照胡翼之鄧保信各有黍尺崇寧中魏漢津乞用聖上指尺又紹興中內出金字牙尺二十八遂以其中皇祐二年所造大樂中黍尺作景鐘然不知以何法纍黍程正叔定周尺以為當省尺五寸五分弱而省尺之度卒難考詳朱元晦家禮載司馬氏及考定雅樂黃鐘尺不明言長短則周尺之制迄無成說獨丁度建言厯代尺度屢改惟劉歆鑄銅斛之世所鑄錯刀大泉五十王莽天鳳中鑄貨布貨泉之類不聞後世有鑄者遂以此四物參校分寸正同況經籍制度皆起周世劉歆術業之博祖沖之算數之妙晉荀氏之詳密既合姬周之尺則最可法者焉但惜其事尋罷竟不施用今試以諸品泉刀考之按漢志王莽更鑄大錢徑寸二分文曰大泉五十天鳳五年作貨布長二寸五分廣一寸首長八分有奇廣八分其圜好徑二分半足枝長八分間廣二分其文右曰貨左曰布貨泉徑一寸文右曰貨左曰泉以貨布一分為率參較其首身足枝長廣之數以為尺又以大泉之寸二分貨泉之徑寸較之彼此毫釐無差足明丁之議為至當而丁尺荀尺漢尺周尺一然無異諸家影響之說悉可廢矣蓋古人制度必徵實乃信非可以揣摩定非可以口舌爭不見古物而欲知古人之制自不可得荀丁二氏跖實之見千載同符今荀氏所考古物七事多不可得而漢錢傳於世者則往往有之據此以求周漢之度以尋昔人定律制器營室分田之數殆為灼然無疑者也計周尺一尺當今浙尺八寸當今織染金星牙尺六寸四分自後田畝俱以周尺計定别用今尺準之田制各圖說步畝夫屋井邑􅏀甸縣都同司馬法六尺為步每步積三十六尺司馬法步百為畝考工記匠人為溝洫耜廣五寸二耜為耦一耦之伐廣尺深尺為之􅍒古者耜一金兩人並發之其壟中曰􅍒􅍒上曰伐伐之言發也􅍒與伐高深廣各尺一畝之中三􅍒三伐廣六尺長六百尺以此計畝故曰終畝曰竟畝鄭注畝方百步者非是每一畝計三千六百尺古之一畝以尺計得面方六十尺自之得積三千六百尺以下畝法俱折方取易算故以步計得面方十步自之得積百步今時畝法以步計得面方十五步四分九釐一毫九絲三忽二微零自之得積二百四十步為畝六尺為步以尺計得面方九十二尺九寸五分一釐六毫零自之得積八千六百四十尺為畝以三十六尺而一得積二百四十步五尺為步以尺計得面方七十七尺四寸五分九釐六毫零自之得積六千尺為畝以二十五尺而一得積二百四十步以丈計畝得面方七丈七尺四寸五分九釐六毫自之得積六十丈為畝以二十五寸而一得積二百四十步古之一畝以今法準之每浙尺八寸準古一尺得面方四十八尺自之得積二千三百零四尺以今畝法八千六百四十尺而一得田二分六釐六毫六絲六忽零以六尺為步計之得面方八步自之得積六十四步以今畝法二百四十步而一得田二分六釐六毫六絲六忽零後言浙尺準古其尺法步法畝法俱倣此若以牙尺六寸四分準古一尺得面方三十八尺四寸自之得一千四百七十四尺五寸六分以今畝法六千尺而一得田二分四釐五毫七絲六忽以五尺為步計之得面方七步六分八釐自之得積五十八步九分八釐二毫四絲以今畝法二百四十步而一得田二分四釐五毫七絲六忽後言牙尺準古其尺法步法畝法俱倣此司馬法畝百為夫周禮遂人凡治野夫間有遂遂上有徑考工記匠人為溝洫廣尺深尺謂之􅎌田首倍之廣二尺深二尺謂之遂徑廣二尺每百畝積得一萬步三十六萬尺面方六百尺加遂徑八尺共六百零八尺自之得三十六萬九千六百六十四尺內夫積三十六萬尺為田百畝遂徑積九千六百六十四尺得二畝六分八釐四毫一六古之百畝今浙尺畝法算得二十六畝六分六釐六毫六絲六忽一六遂徑七分一釐六毫今牙尺算得二十四畝五分七釐六毫遂徑六分五釐九毫七絲司馬法夫三為屋屋具也一井之中三三相具出賦稅共治溝也屋之廣長或傍遂溝洫澮不同今以兩濶加溝畛兩長一作溝畛一作遂徑計之長一千八百二十四尺濶六百十二尺自之得積一百一十一萬六千二百八十八尺共三百十畝七釐九毫三六若以兩濶加溝畛兩長加遂徑計之長一千八百十六尺濶六百十二尺自之得積一百一十萬九千七百八十二尺共三百零八畝三分七釐三毫一二司馬法屋三為井井方一里九夫遂人十夫有溝溝上有畛考工記匠人為溝洫九夫為井井間廣四尺深四尺謂之溝畛廣四尺一井之田面方一千八百尺加溝畛遂徑方一千八百二十四尺自之得積三百三十二萬六千九百七十六尺內九夫積三百二十四萬尺為田九百畝溝洫積五萬七千八百五十六尺遂徑積二萬九千一百二十尺二積共二十四畝一分六釐小司徒四井為邑邑方二里三十六夫一邑之田面方三千六百尺加溝畛遂徑面方三千六百四十尺自之得積一千三百二十四萬九千六百尺內田積一千二百九十六萬尺為田三千六百畝溝洫遂徑積二十八萬九千六百尺得八十畝四分四釐四毫一六小司徒四邑為丘丘方四里一百四十四夫一丘之田面方七千二百尺加溝畛遂徑七十二尺共面方七千二百七十二尺自之得積五千二百八十八萬一千九百八十四尺內田積五千一百八十四萬尺得一萬四千四百畝溝洫遂徑積一百零四萬一千九百八十四尺得二百八十九畝四分四釐小司徒四丘為甸司馬法井十為成遂人百夫有洫洫上有涂匠人方十里為成成間廣八尺深八尺謂之洫成方十里成中容一甸甸方八里出田稅沿邊一里治洫四井為邑四登于甸甸方八里旁加一里故方十里甸之八里開方計之八八六十四井五百七十六夫出稅旁加一里通廉隅三十六井三百二十四夫治洫涂亦廣八尺一成之田面方一萬八千尺加洫涂溝畛遂徑一百八十四尺共一萬八千一百八十四尺自之得積三億三千零六十五萬七千八百五十六尺內積三億二千四百萬尺為田九萬畝餘積六百六十五萬七千八百五十六尺得洫涂溝畛遂徑共一千八百四十九畝四分四毫一六一甸之田面方一萬四千四百尺自之得積二億零七百三十六萬尺為田五萬七千六百畝廉隅積一億一千六百六十四萬尺為田三萬二千四百畝共得出稅田九萬畝小司徒四甸為縣縣方二十里四百井三千六百夫一縣之田面方三萬六千尺加洫涂溝畛遂徑三百五十二尺共面方三萬六千三百五十二尺自之得積一十三億二千二百四十六萬七千九百零四尺內積一十二億九千六百萬尺為田三十六萬畝餘積二千六百四十六萬七千九百零四尺得洫涂溝畛遂徑共七千三百五十二畝一分九釐五毫二小司徒四縣為都都方四十里一千六百井一萬四千四百夫面方四十里為都一都之田面方七萬二千尺加洫涂溝畛遂徑六百八十八尺共面方七萬二千六百八十八尺自之得積五十二億八千三百五十四萬五千三百四十四尺內積五十一億八千四百萬尺為田一百四十四萬畝餘積九千九百五十四萬五千三百四十四尺得洫涂溝畛遂徑共二萬七千六百五十一畝四分八釐四毫一六遂人千夫有澮澮上有道匠人方百里為同同間廣二尋深二仞謂之澮専達于川同方百里同中容四都方八十里出田稅沿邊十里治澮四甸為縣四登于同同方八十里旁加十里故方百里同之八十里開方計之八八六十四成六千四百井五萬七千六百夫出稅旁加十里通廉隅三十六成三千六百井三萬二千四百夫治澮澮達於川川者大水通流非人力所治道廣二尋井田之制備於一同一同之田面方一十八萬尺加澮道六十四尺洫涂一百四十四尺溝畛七百二十尺遂徑八百尺共得面方一千七百二十八尺六而一得三萬零二百八十八步自之得積九億一千七百三十六萬二千九百四十四步以畝法積百步而一得九百一十七萬三千六百二十九畝四分四釐內六十四成積五億七千六百萬步為田五百七十六萬畝廉隅三十六成積三億二千四百萬步為田三百二十四萬畝共得出稅田九百萬畝澮道洫涂溝畛遂徑共一十七萬三千六百二十九畝四分四釐若以面方一十八萬一千七百二十八尺自之得積尺三百三十億零二千五百零六萬五千九百八十四尺以畝法三千六百尺而一得田數與前術同今時浙尺八寸當古一尺六尺為步二百四十步為畝算得田二百四十四萬六千三百零一畝一分八釐四毫牙尺六寸四分當古一尺五尺為步二百四十步為畝算得田二百二十五萬四千五百一十一畝一分七釐一毫一絲七忽古之九百萬今浙尺二百四十萬畝今牙尺二百二十一萬一千八百四十畝古之澮道等十七萬三千六百二十九畝四分四釐今浙尺四萬六千三百零一畝一分八釐四毫今牙尺四萬二千六百七十一畝一分七釐一毫一絲七忽欽定授時通考卷十三
