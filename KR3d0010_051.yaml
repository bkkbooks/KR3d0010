body:
  text: 欽定四庫全書欽定授時通考卷五十一勸課本朝重農御製詩文二皇上御製豐澤園記西苑宮室皆因元明舊址惟豐澤園為康熙間新建之所自勤政殿西行過小屋數間蓋皇祖養蠶處也復西行歷稻畦數畝折而北則為豐澤園園內殿宇制度惟朴不尚華麗園後種桑數十株聞之老監云皇祖萬幾餘暇則於此勸課農桑或親御耒耜逮我皇父纘承丕業敬天法祖世德作求數年以來屢行親耕之禮皆預演禮於此乃知聖聖同規敦本重農用躋天下於熙皥之盛若瀛臺之建於有明飛閣丹樓輝煌金碧較之此園固為美觀而極土木之功無益於國計民生識者鄙之行一事而合於天心建一園而洽於民情身率先而天下丕變吾於是乎知皇祖皇父之為首出之聖也田字房記流杯亭之西南有田字房焉丁未四月十八日皇父萬幾之暇燕接親藩遊豫於此是地也西山遠帶碧沼前流每當盛夏開窗則四面風至不復知暑其北則稻田數畝嘉禾生香藹聞於室蓋我皇父重農之心雖於燕間遊觀之所亦未嘗頃刻忘也古昔聖王臨朝視政之暇必有怡情娛覽之地故靈臺之詩美文王也卷阿之詩頌成王也今田字房所以命意重農者豈徒怡情娛覽已哉至若黛掃山顛風來蘋末麥畦浪起桞岸煙開馴鶴從容而起舞文鴛匹偶而泳遊蝶裁五色之文蜂喧萬花之谷物華景麗則思飲和食德熙穰於光天化日之下而怡然以樂其或涼飇四起鴻雁來賔白露如珠緑雲改赤千家之砧杵遙聞百室之倉箱盡實則思遺秉滯穗誰遺寡婦之利而悄然以憂時引儒臣坐而論道或率諸王公子弟修家人之禮講燕好之歡所觸目而會心者我皇父之同憂同樂憩息於斯較之靈臺卷阿意更深長矣謹為之記時應宮記夫天一生水坎精發祥凝靈聚液流為江海江海乃天地間物之最巨者也江海之有神自三代漢唐以來莫不祠祀惟謹有宋大觀四年詔天下五龍神並封王爵龍神之尊自是始厥後春秋犧牲之祀代有常典皇清受天命禋祀上帝后土懷柔百神江淮河濟五嶽四瀆之祀載在太常犧幣之數俎豆之器既豐既隆神歆以格雍正二年天子以為龍神之位既尊宜特修宮觀以致虔禱乃於西苑內豐澤園北建時應宮所以致誠明神俾雨㿩時若稼穡以成者也夏六月霖雨彌旬幾至於潦皇父步行往禱其日即晴又明年黃河清百餘里此非神人效靈河海清宴之明驗乎夫以天子精誠通於神明以之事天饗帝罔不昭格而况於龍神乎信哉誠之能感物也是為記耕藉賦并序皇上御宇之五年青帝司方之二月春風普扇陽德方亨天子乃耕於千畝之田禮也臣聞聖王務本耕藉以勸農功明主孝親親推以供祀事我皇上孝以事親勤以率民二載甲辰既耕加一兹又躬行耕藉之禮急粢盛重民食致誠匪懈其典則隆洪惟我皇上道洽天人化霑草木誕敷文德廣運聖謨渥澤周於羣生至治昭乎天壤乃猶頻興重農之典時勤保介之咨追厥唐虞播種之蹤為彼率土民人之勸萬衆觀儀上農終畝逮厥秋成登於天廩薦之皇天供於祖考臣知皇天祖考鑒皇上之精誠歆皇上之大孝必錫嘏降祉永保無疆明德惟馨聿懷多福臣不勝踴躍歡忭之至謹拜手稽首而獻賦曰繄惟重華之命稷兮播穀實繼乎禹功必蒸民之粒食兮始風動而時雍親耕肇於姬籍兮意往聖之皆同我大君之首出兮屢三推以勸農豈玉食之是享兮惟簠簋之虔供秉耒耜以率先兮符澤物之元功於是春陽初布青帝司方嘉萬物之昭蘇值千卉之勾萌農祥既見土脈方昌協風應律陽氣滋彰皇帝乃順月令撫嘉辰念民力飭甸人當前期而致敬用有事於青春於焉載師清畿封人淨路常伯獻儀掌舍設枑爾乃青壇蔚其聳立華蓽森其崔巍雲移翠幕桞拂青幃啓千畦之平壤欣四塗之腴肥逮夫元辰既屆曉色方鮮天子則御藻冕佩蒼瑌被龍衮鳴和鸞載青旗揚朱旃接遊車之轔轔施梁輈之戔戔爾乃稷宫將近樂具班陳天子乃降御輦饗農神祈嘉穀焚燎薪禮成而退有事藉田衣被襏襫趾履陌阡王侯衛後虎賁導前太僕秉轡牽牛奉鞭乃歷廣場撫御耦執縻手底不辭瘁乎三推載耒御間試躬親乎千畝王公卿二或五或九白叟黃童歌呼奔走維誠敬之聿昭知樂愷之孔厚於是黛耜方輟紺轅遂旋雨廉纎以灑潤風縹眇而淨天侍從偕來睹天顔之有喜馨香上達卜慶兆於豐年夫元鳳下親耕之詔永平垂開藉之篇魏主望公田而發趾晉帝帥羣后以祀先尚傳為古今之盛事並書之史册而爛然况乎我皇至仁大知既事治而府修亦成天而平地修稼穡以勤民謹神倉而蕆事所無逸以知艱重明粢而將祭三春暖兮播百穀四野寧兮進雙穗也哉乃為之歌曰田之興兮稷之功澤萬物兮助鴻濛我皇展事兮千耦其同和協天人兮一哉皇衷既耕既耨兮我稼其豐爰播爰植兮麻麥幪幪又歌曰思樂甸畿千頃其耦鸞輅載臨躬耕其畝登於秋廩斯箱斯倉薦之宗廟供之明堂神之格思綏祉無疆一人有慶永奠萬邦喜雨賦客有駕輶軒乘雲軺展軨於南畝縱轡於東郊遨遊容與徘徊逍遙爾乃白雲起乎空谷甘霖降於崇朝震雷霩霩飛電熛熛乃往田舍而息焉有二三老人逡巡而前曰斯雨之降時則時矣膏澤之濡普而施矣抑誰之功乎請吾子明言以告之客奮袂而起曰猗歟休哉盛世之民也飲其德而不知其力坐吾明語子方今龍飛九五聖人在位德配乾坤功參天地精誠通於神明政教化乎萬類故上天眷命俾雨暘時若而萬方以治乃致含哺鼓腹耕田鑿井者實不知帝力之賜也老人曰聖人之德某既知之矣請吾子賦雨之澤及蒼生者可乎客曰若夫金烏收景層隂蔽空雷殷殷以振響電灼灼以搖紅鼓河伯之驚濤涌海若之幽宮㵼天池之巨浸走萬里之長虹遠迷三島近失三峰回生意於衆卉消渴望於三農此則雨之方作而其勢最雄也乃其雲開雨止霽景澄鮮山宛宛其染翠木蓊蓊其逞妍鳥嚶嚶其鳴樹草芊芊其含煙桞暗歸鴉簷喧乾鵲槐影濃兮庭宇清花隂轉兮簾櫳薄纎歌動兮髙樓紅袖飄兮綺閣緗帙開兮藝編博山焚兮繡幕莫不欣膏澤之滂澍喜霤聲之頻落此又雨之既足而萬方共樂者也至若烏犍耕白水之涯黔黎藝緑野之畝白叟歡呼黃童奔走土脈既滋兮禾黍如雲灌溉不勞兮田疇以阜爾倉爾京爾荷爾負此又二三子所終日服事而知利我之孔厚也於是老人倚杖而歌曰雨玉不可食兮曷若嘉苗滿目屯黃雲雨金不可衣兮曷若五風十雨利耕耘惟天降康兮稽首蒼旻惟皇感天兮永眷日勤千秋萬歲兮樂吾之君條桑賦伊春陽之晼晼兮布始和於東風百昌欣其向榮兮女夷協氣乎昭融桞苒苒其含緑兮桃夭夭其暈紅尋綺陌而云邁兮採條桑其始豐則有長腰健婦黃髮奚兒攜彼筠籠兮遵微行而纍纍持此斧斨兮步遙術其遲遲蔚蓯蘢而豐茂兮邈洪榮而葳㽔挺修緑其端直兮上扶踈而參差韻條風之無聲兮葉芳青而紛披浥朝露以流潤兮枝遠揚而下垂於是既採既捋載筐載籃留長條之猗猗取緑葉之纎纎午靜茅簷兮列分行之圓籧春長蔀屋兮餵八繭之新蠶故曰農莫苦兮農功女莫勞兮女紅歷歲以月自春徂冬彼膏粱而錦繡者宜思憂樂之異同稼穡惟寶賦天之鍾異物也石韞玉而山輝蚌含珠而川媚金在沙而待披綃織鮫而成瑞火齊共木難而交朗都梁與五木而爭貴繡􅂒紅氍赤羽文翠固海舶之誇珍亦大賈之網利者也然而飢不可食寒豈能衣惟土物之是愛乃民命之所依希代之姿莫匹連城之價在兹此聖世之至寶羌歌咏於周詩爾其既耕既耘既方既皂沃時雨而霑濡熟西風而堅好珠顆滿車兮無慙照乘之光玉粒盈倉兮絶勝瓊瑶之報故珍重上厪乎一人而滋培全仰乎大造為植物之獨貴豈異賄之足稱勤耒耜而莫怠謹播植而乃成爰藉亞旅之衆如施追琢之精力作三時兮類藍田之種玉有秋不日兮誇赤水之求珍冀千倉與萬箱兮寧必不貪為寶慶崇墉與比櫛兮懸知有道則生信飢寒之可禦陋瓊瑰之為輕不假居竒以市何須韞櫝而藏餘滯穗兮伊寡婦之利匪異物兮實餽貧之糧故曰寶金玉者心勞而鮮益寶稼穡者心逸而獲臧其為利也最薄其為物也孔良尚計九年之蓄以期兆姓之康多稼如雲賦出郊原而縱目愛金秋之氣清草霏霏而露濕天寥寥而風生寒蟬收響隂蟲載鳴繡錯溝塍乍青連而散漫綺分隴畝正黃茂以縱橫酬勤劬於東作告豐稔乎西成遠而視之如膚寸之出石也近而睨之似朝隮之凝碧也當夫公田既雨霑膏澤之調勻嘉種遍敷披薰風之順適厥田上上兮芒既抽而散芳實發芊芊兮花已飛而帶白奄觀南畝之收何異西郊之積則見夫綿邈鋪川豐融亘田層阜遙分似無心而出岫千畦遍滿若竒峰之連天氤氲散潤兮既史書以占歲曼衍流膏兮果户慶於有年豈坻京之足喻恍薈蔚之愈綿於是庤乃錢鏄築我場圃以樂農夫以御田祖豐滋漫若且聞束晳之詩悅茂油然欣聽籥章之鼓方苞既實慶髙廩於茨梁堅好不秕喜盈疇之稷黍故曰穀為君寶惟農是親遺秉盈場玉食亦登其芬潔餘糧棲畝金枝轉掩其輪囷豈非聖德之格天而多稼乃得以如雲乎麥秋賦繄鶉火之司令疑商金之屆期影度朱明始散芳於榴圃律侵白帝獨抽穗於麥畦愛芃芃之連纈亦離離之下垂南畝正勤於此日西成偏紀乎兹時披梅風而含顆潤穀雨而雙岐是蓋四時之代序而萬物各遂其繁滋者也乃其堤上鶯啼隴間雉雊芳草未歇而猶霏緑樹成隂而始就何銍艾之奄觀兮當隆曦之永晝睹黃雲之滿野兮驚白藏之應候溽寒露而朝濡兮潛陰呂而夕秀雜收斂於長養兮參結實於紛茂炎炎當令碩碩成行紫莖兮韞爽青穗兮含涼大有占而豐登肇象兮中和順而隴畝飛香對銀縚而偶穗兮散珠顆而分芒豈非化工之獨運而為盛世之嘉祥哉嘉禾頌有猗者禾在彼中田爾農來思越陌度阡芟之奕奕柞之澤澤五穀既播三時無失載甲載坼載長載褒載穟載實載碩載茂帝實顧矣稷實助矣風披擭矣雨灌注矣綏我屢豐言呈其瑞休我皇風言多其穗遠自滇南近兆帝藉匪雙伊九匪寸伊尺先民有言食為民天百穀用成自古有年瑞繭頌帝念民依惟農與桑孰飢莫食孰寒莫裳雕鏤必黜爰勤三農纂組是省用紓女工旻天維顯聿降瑞繭瑞繭維何萬蠶同簇曾不經緯曾不杼柚苑窳致力西陵效勤神功默相嘉繭乃成爾純爾素匪紅匪紫爾質爾實匪錦匪綺言徵其應言發其祥祐此蒸民成以報章太平之澤五十衣帛夏凊冬溫太和充溢蠲租樂擬樂府勾芒布令土脈濡荷犁早向東阡趨男耕婦織間時無料理粟帛供正需食毛敢辭王稅乎春回蔀屋大澤敷小吏旁午捱門呼竊疑督賦驚農夫却宣王命傳蠲租傳蠲租蠲租樂新絲繅後新穀登换取金錢娛老弱觀穫秋聲入園林涼風動髙閣偶出步郊坰斜陽照墟落眄彼隴畝間黃雲堆漠漠錢鎛已早庤銍艾聲參錯畦東與畦西是處竟秋穫手刈賽疾遲背負爭強弱遺秉與滯穗寡婦亦云樂吾聞四民中惟農苦莫若有年穀價低歉年委溝壑即今豐稔收租重主人索益信為政者仁民最先著郊圍見西成有象即事志喜去冬雪盈尺占之利東作今春雨如膏可卜豐登樂一自入夏來雲漢光煜爚崇朝歇甘霖祝融扇炎灼聖皇念民艱憂勤倍咨度對越保無斁昊天鑒誠恪未幾三日雨霑濡遍村落庭除景色佳苔䀶茂參錯那知郭外田良苗助長若承恩獵南苑平野秋風掠氣爽馬蹄輕天髙鷹眼矍合圍出紅門更覺郊原廓行行歷野店去去穿林薄中林施兔罝歇驕奮噬搏田事亦云畢農夫罷秋穫眄彼場圃間黃雲堆漠漠婦子利秉穗老幼飽藜藿從識天人理應響如鳴鶴宵旰聖人心頓起下民瘼太平徴有象永言志其略望雪行今年三冬未見雪同雲若被風吹撤夜觀望舒如鏡明曉看翔陽似氷潔秋麥全資冬雪培遙識農家望歲切我聞三白兆豐年望霰先集心如結上帝穹窿坐玉京青女滕六分行列如何不一駕雲車試剪飛瓊噴玉屑飄飄灑灑頃刻間利我三農都喜悅催耕鳥條風天宇布百昌欣韶熙村原趣已佳緑水明千畦秉耒耕南畝提壺餉東災郭公何丁寧催耕田畔啼髙棲嫩桞梢低喚柔桑枝分明為一言東作當及時田老聞之喜胼胝非所辭田婦聞之喜饋饁職所司但願歲豐穰辛苦甘共之幾度聞此聲蚤起竭力為那似香閨中驚眠翻怪伊春蔬春融地氣如膏滑一畦煙甲隨雷發簷前小鳥喚春眠裛露攜籃勤采掇早韭初菘紛列盤清芬細嚼氷齒寒淡泊有味取次領旦晚為爾還加餐君不見一食千金丞相府猶説區區難下箸有鳥有鳥有鳥名布穀髙喚枝頭村桞緑村老聞聲急荷鋤趂時耕作還相朂東鄰西舍催耕遍喉吻苦乾飲水曲不似籠中雙畫眉巧言但博主人肉有鳥有鳥枝上啼啼聲風送到深閨聲聲催織當春日織女聽罷顰雙眉飽蠶方作繭那易成新絲新絲還要賣匹帛安可期我願拖綾曵錦者常念茆簷忍凍時觀刈麥麥苗入夏結穗黃東壠西壠碩且長老農此日走田忙腰鐮遍割樂歲穰笑看黃雲各成片密莖隨手行行亂肩挑背負曬簷頭饘粥有餘他不羡呼兒莫逐飛來雀令渠亦識收成樂所見東皇回星軺和氣遍六宇應候百昌蘇默默春風鼓皇州景物饒廣麗洵天府臨風跨紫騮緩轡過郊墅壟上事春耕停馬問田父小立汗不乾向我情畢吐去年冬不雪今年春未雨野老望雲心此意良辛苦清晨負鋤出努力向日午畝耕次第完下苗何日舉我聞田父言仰望默不語天心本仁愛自有元功補甘霖應在即如膏潤沃土佇俟西成時萬户倉箱貯灌麥大麥五寸長小麥三寸半地乾苗欲枯離披隴畝畔猶幸灌溉便近傍河之岸清晨課僮僕轆轤轉雙腕初看土溼溼漸覺流漫漫須臾苗盡起生意良可玩爾僕聽我言莫怨體流汗不見萬頃田農夫遍澆灌灌園種樹圍小園種菜數畝餘緑畦足野趣且復得嘉蔬春風千頃浪秋雨一犂鋤四時供盤餐青青藿與茹今朝桞隂下課僮轉轆轤吸彼井華水灌我珠玉畬芳坂潤新緑勃然生意舒自饒塵外味何必山中居春蠶食葉聲吳天三月春光蕩吳蠶三眠蠶更長陌上新桑葉葉抽晴窗鎮日風雨響喚起深閨未畫眉攜筐急就飼朝飢流水潺潺箔間落爽籟瑟瑟簾前吹日長莫厭耳根閙蠶飽絲多足相報但願今年官絹輸却免門前租吏到秧馬清和四月新秧緑一壠分來千壠足桐馬平馳碧浪輕鬃鬛森森稻苗束北人使馬南人船兩蹄踏破橫塘煙畦東畦西來往速插罷儂家幾頃田戟戟青針波欲沒載驅終日何曾歇草壁髙懸睡老農好與吳牛同喘月五日芒種南風薰薰麥苗緑稻針出水如新浴五日天中節物佳却逢芒種農功促平湖瀲瀲欲生煙角黍蒲尊雜管絃老農炙背溪田裏那得間從競渡船暮歸偶自街頭走買得靈符貼門首但願神貺沛曼陀指日西成看大有村賽曲老巫伐鼓聲鼕鼕冬醅初熟霜柑紅合家羅拜致虔恭村村樂事傳豳風黍稌堆西稻堆東倉箱萬億快年豐謝神默佑恩何窮賽罷福酒先酬翁老巫牽羊别家去來年大有神應助插秧吟池田漠漠薰風起插秧時節江村美茅屋家家晝掩門一畦新穎浮清水兒騎秧馬學插秧壯者手疾力獨強老翁背直難傴僂杖藜督課溝塍旁晚來共浴前溪曲幾堆雲腳出山谷但願知時甘雨霏管取今年衣食足種豆清水曲彎環隙地餘數畝欲觀生意佳種豆雨晴後我適杖䇿來試以問園叟開田良不易治畦亦勞否老圃答我言似此亦何有不見萬頃田種自吾儕手赫日雜炎風荷鋤忙奔走歉年委溝壑豐歲才糊口我聞老圃言飲翁以醇酒願告朱門者農勞不可負古風暮出城東門見彼耘田者傴僂畦壠間紅日正西下揮汗立片時薰風散平野指日卜西成篝車賽秋社還憂租稅重催迫不相假終歲事辛勤農夫獲利寡觀刈秋露零場圃金風氣蕭索百穀已告成呼童庤錢鎛為地只盈畝頗可驗耕鑿屆兹西成候䇿杖課收穫轉憶東作時雨暘卜時若入夏秀以實日中驅鳥雀念此終歲勤亦得一朝樂園林喜空明爽氣侵簾箔撫景獨吟哦允矣興所託恭和御製三月三日得雨原韻知時甘雨動春荄潤物流膏澤孔皆緑野空濛生意滿平疇霡霂兆情諧豐亨景象占多慶晼晚風光喜更佳自是天心馨至治嘉祥允慰一人懷上幸豐澤園演耕藉禮擬應制十韻大地陽和淑景韶潛蘇土脈應風條洪鈞普扇百昌序大造均舒萬物調翠輦臨耕旗閃爍金輿載駕玉鎪雕行行西苑停鑾輅泛泛天池蕩書橈帝耒四推膏壤沃皇躬一墢甫田遙先期已見寅恭懋終畝還思教澤饒種布期生連理穗壠開願長九岐苗追思聖祖觀耕地却值吾皇演禮朝豐稔歲功九有遍太和景象萬方昭放勳久頌堯功茂協帝重瞻舜德超賦得卧聽村村打麥聲夏雨初過已有秋黃雲片片擁來牟暖畦錢刈青莖亂晴圃耞翻紫穗稠舍隔西東聲拍拍户饒餅餌樂油油髙齋亦識豐年景夢蝶窗頭酒一甌雉母呼雛隔野塘北窗初啓學義皇田間錦疊千重皺壠上濤翻四月涼場圃地喧耞板響鄰家風送午炊香從容鼓腹堯天裏為愧農人鎮日忙雍正九年六月上以近畿三省雨澤愆期豫籌賑恤之䇿甘霖疊沛恭紀十二韻志喜帝念民衣食端惟農與桑粒民符后稷熙績法陶唐乾惕通朝夕中和善弛張朱明三夏永甘雨萬民望睿慮周三省宸衷達九蒼普天頒惠澤特地厪咨商精禱思無逸殷憂問未央貯倉施舊積轉漕截新航更降停徵詔仍頒捐賦章恩綸過所望膏澤應非常對越何昭爽誠通自溥將從知天佑聖萬國慶豐穰秋日播麥新生釐牟遍壠拂參差正是西風八月時翠毯乍抽新穎細緑波輕泛早苗披芊芊不畏秋陽暴靡靡長霑白露滋此日種成來歲穫化工四氣為全施辛亥秋九月出南苑行圍以穡事未竣不果獵而還耞翻雲板敲場圃錢利霜刀刈大田一幅豳風圖畫似肯教獵騎誤民天霜後平原地已堅青驄不用錦連錢相逢野老扶兒笑今歲豐收倍往年東作東作三春始滋生萬物稠公田平似掌新水緑如油蟲捲柔桑葉針抽嫩穎頭乘時功力備多稼定今秋賦得好雨知時節漠漠春雲布濛濛時雨飛點空方霡霂入夜轉霏微正助資生德從知造化機東郊明曉步坂上麥苗肥村墟夜舂霜落園林時屆冬稻粱全獲罷三農田家作苦無休息更聽村墟半夜舂萬籟全收夜已分寒舂聲急隔窗聞髙齋識得豐年景篆裊爐香獨自焚魚米樹一名康洋樹出宜興其結子似米則年豐似魚則多水農家以此占年云春入靈根枝葉抽嘉名聞道數興州求魚緣木須防潦聚米成林定有秋砌莢饒他能識朔庭萱空自解忘憂那知望樹占年好歲歲農家社鼓稠湖上田家湖田上下水漣淪布穀催耕喚欲頻最是三春多樂事更無間暇度三春麥宜髙地稻宜低不是田家那得知水漲溪田千頃碧清和天氣插秧時春湖水暖鴨雛肥傍晚雙雙作隊歸南畝種完北畝未夕陽天末掩柴扉湖上春歸緑桞濃湖邊新稻看重重牯牛卧日松船靜半是漁兒半是農清曉風和浪不生一篙煙雨小舠輕揚鞭堤上尋芳處滿幅江鄉畫裏行甲寅三月上耕藉回鑾迎駕恭紀昭蘇景物正勾芒千畝躬耕典制詳禹甸三春榮草木周官六禮煥旗常均平何用郊人耨豐稔遙占太史祥最是聖情勤保赤歡騰父老列成行御苑親推步玉田青旗搖曵引祥煙九重雲擁千官仗萬卉春和三月天樂奏回鑾鳴鳳管禮成帝藉紀瑶編前期時雨霏微灑早卜寰瀛大有年淡蕩和風霽景開天間十二駕龍媒香街幾里花如霧繡陌千塍車似雷華宇共霑恩澤普御園羣仰聖人來迎鑾踊躍葵忱切獨愧凌雲獻賦才御園從耕恭紀六韻上苑土泉滋躬耕膏壤肥禮因加帝藉心是念民依水暖流塍細光融向午暉省耕厪聖慮終畝沐恩輝種布珠塵墜犁翻玉屑飛農勞誠可念豐稔願無違轆轤聲淥水漲平湖春田轉轆轤耳根鳴斷續眼界樂霑濡漫厭繁音急從觀生意蘇機心緣力稼不與漢陰殊治圃園林入秋後風露肇寒初治圃芟煙蔓呼僮帶雨鋤連畦清去穢傍砌爽含虛漫學濓溪叟窗前草不除日知薈説大田之詩曰雨我公田遂及我私忠順之意形於禱祠親愛之心並非勉強及公田既渥私田亦霑婦子恬熙樂其樂而利其利仍歸於上之所賜耳自非上之恩德素逮有以淪肌浹髓其孰能諴民心志至於大順如此哉夷考甫田之詩曰我田既臧農夫之慶即其惠下勞農之念所以感民者深則其施於政事者固不可考而必其漸仁摩義非歲月之暫可知矣周禮籥章氏凡國祈年於田祖則吹豳雅擊土鼓以樂田畯按豳雅之什曰誕后稷之穡有相之道所謂輔相天地之宜也茀厥豐草種之黃茂即其事也必人事盡於下然後有以輔成帝命率育之心而黍稷實穎實栗故能為酒醴以祭先祖而洽百禮其詩曰夀考維祺以介景福樂嘉報之無已也而籥章氏吹此以樂田畯所以樂田祖也田畯者古之勞農勸相司嗇教稼嘗有功於農事為田祖所佑者也祈年於田祖而吹豳雅擊土鼓以樂田畯蓋云田畯是享庶乎有以佐神農氏之治而興我稼穡云耳且吹豳以祭舉國之民皆與焉於是乎得聞先王服念勤民康功田功之事先民勤勞稼穡以祇率懿訓之休而東作西成競相勸勉惟土物愛罔敢怠弛盡人事之勤獲天時之報此又周公制禮之本意所以為萬世勸農之法也與周禮禁原蠶論者謂蠶馬同以天駟房星為祖物莫能兩大再蠶則蠶盛而馬耗禁之所以蕃馬也蠶既與馬同氣恐蠶盛傷馬獨不恐馬盛傷蠶乎意者校人祭天駟而馬質掌馬政使並掌蠶禁所以禁原蠶者恐其氣竭則來年之蠶不能蕃滋所以節盈虛消長以為阜物育材之本耳究而言之蠶之為用在民而上供絲枲則仍入乎官馬之為用在官而成羣阡陌則仍利乎民聖人之政亦惟斟酌損益與時偕行期於政修物阜而已又何容心於蠶馬之分哉欽定授時通考卷五十一
