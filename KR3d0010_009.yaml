body:
  text: 土宜辨方尚書堯典分命羲仲宅嵎夷曰暘谷平秩東作傳日出于谷而天下明故稱暘谷嵗起于東而始就耕謂之東作東方之官平均次序東作之事以務農也又申命羲叔宅南交平秩南訛傳南交言夏與春交訛化也掌夏之官平秩南方化育之事又分命和仲宅西曰昧谷平秩西成傳日入于谷而天下冥故曰昧谷秋西方萬物成平序其政助成物又申命和叔宅朔方曰幽都平在朔易傳都謂所聚也易謂歲改易于北方平均在察其政以順天常禹貢冀州厥土惟白壤厥田惟中中傳堯所都也無塊曰壤田之髙下肥瘠九州之中為第五疏冀州帝都于九州近北故首從冀起九章算術穿地四為壤五壤為息土則壤是土和緩之名此色白而壤雍州色黃而壤豫州直言壤不言色蓋州內之土不純一色故不得言色也鄭康成云田著髙下之等者當為水害備也則鄭謂地形髙下為九等也王肅云言其土地各有肥瘠則肅定其肥瘠以為九等也如鄭之義髙處地瘠出物既少不得為上如肅之義肥處地下水害所傷出物既少不得為上故孔云髙下肥瘠共相參對以為九等田土異者鄭康成云地當隂陽之中能吐生萬物者曰土據人功作力競得而田之則謂之田蔡傳夏氏曰教民樹藝與因地制貢不可不先辨土然辨土之宜有二白以辨其色壤以辨其性曽氏曰冀州之土豈皆白壤土會之法從其多者論也又濟河惟兗州厥土黑墳厥草惟繇厥木惟條厥田惟中下傳東南據濟西北距河色黑而墳起田第六疏八州發首言山川者皆謂境界所及也繇是茂之貌條是長之體言草茂而木長也宜草木則地美而田非上者為土下濕故也集説陳氏大猷曰兖徐揚居河濟江淮下流水未平則為下濕水既平則為沃衍于草木尤宜故三州言草木又海岱惟青州厥土白墳海濱廣斥厥田惟上下傳東北據海西南距岱濱涯也説文云東方謂之斥田第三疏舜為十二州分青州為營州營州即遼東也海畔迥闊地皆斥鹵故云廣斥集説林氏之竒曰此州土有二種平地之土色白而惟墳海濱之土彌望皆斥鹵又海岱及淮惟徐州厥土赤埴墳草木漸包厥田惟上中傳東至海北至岱南及淮土黏曰埴田第二疏考工記用土為瓦謂之摶埴之工是埴為黏土蔡傳埴膩也粘泥如脂之膩也周有摶埴之工老氏言埏埴以為器惟土性粘膩細密故可摶可埏也漸進長也包叢生也集説王氏樵曰埴土性之美者也而又墳起最宜于生物故草木漸包胡氏瓚曰土稟沖和之氣故壤為上太燥者不凝故墳次之墳膏起也又淮海惟揚州篠簜既敷厥草惟夭厥木惟喬厥土惟塗泥厥田惟下下傳北據淮南距海地泉濕田第九蔡傳篠箭竹簜大竹敷布也少長曰夭喬髙也塗泥水泉濕也下地多水其泥淖説文曰泥黑土在水中者也集説王氏炎曰南方地暖故草木皆少長而木多上竦河朔地寒雖合抱之木不能髙也兗徐言草木皆居厥土之下凡土無髙下燥濕其性皆然兼山林言之若揚之塗泥惟言沮洳之多山林不與故先草木也土塗泥故其田下下大抵南方水淺土薄不如北方地力之厚也金氏曰古人尚黍稷田雜五種故雖水潦旱乾而各有所收塗泥之土其田獨宜稻故第為最下自唐以來則江淮之田號為天下最又荆及衡陽惟荆州厥土惟塗泥厥田惟下中傳北據荆山南及衡山之陽田第八又荆河惟豫州厥土惟壤下土墳壚厥田惟中上傳西南至荆山北距河水髙者壤下者墳壚田第四疏壚黑剛土也蔡傳土不言色者其色雜也壚疏也顔氏曰玄而疏者謂之壚集説吕氏不韋曰凡耕之道必始于壚為其寡澤而後枯王氏炎曰下土下等之土也壤則沃墳壚則為瘠金氏曰其壤者無塊而柔其下者或膏而起或剛而疏如今轘轅之濘淖汜關之沙陷皆所謂下土者又華陽黑水惟梁州厥土青黎厥田惟下上傳東據華山之南西距黑水色青黑而沃壤田第七疏孔以黎為黑故云色青黑其地沃壤言其美也王肅曰青黑色黎小疏也集説吳氏澄曰土不言質質不一也傅氏寅曰獨言色青黑而不及其性則非壤非墳可知使其果為沃壤如孔氏之説則田宜上品而顧乃止居下上何耶金氏曰梁土色青故生物易性疏故散而不實又黑水西河惟雍州厥土惟黃壤厥田惟上上傳西距黑水東據河龍門之河在冀州西田第一蔡傳黃者土之正色集説林氏之竒曰物得其常性者最貴雍州之土黃壤故其田非他州所及陳氏櫟曰土黃壤最貴故雍田上上塗泥最下故揚田下下周禮地官以土圭之法測土深正日景以求地中日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多陰注土圭所以致四時日月之景也晝漏半而置土圭表陰陽審其南北景短于土圭謂之日南是地于日為近南也景長于土圭謂之日北是地于日為近北也東于土圭謂之日東是地于日為近東也西于土圭謂之日西是地于日為近西也集説陳氏仁錫曰其景短于土圭則其地在日南而多暑其景長于土圭則其地在日北而多寒景夕謂日中時景已如夕也如此則其地多風景朝謂日中時景尚如朝也如此則其地多陰又日至之景尺有五寸謂之地中天地之所合也四時之所交也風雨之所會也陰陽之所和也然則百物阜安注土圭之長尺有五寸以夏至之日立八尺之表其景適與土圭等謂之地中集説陳氏仁錫曰以其地當天地之中故曰合交者四時皆協其候也會者風雨以序而至也和者陰陽調而不乖也百物阜安有生者遂有形者育春官保章氏以星土辨九州之地所封封域皆有分星以觀妖祥注星土星所主之土也封猶界也鄭司農説星土以春秋傳曰參為晉星商主大火國語曰嵗之所在則我有周之分野之屬是也康成謂大界則曰九州之中諸國中之封域于星亦有分焉十二次之分星紀吳越也玄枵齊也娵訾衛也降婁魯也大梁趙也實沈晉也鶉首秦也鶉火周也鶉尾楚也夀星鄭也大火宋也析木燕也此分野之妖祥主用客星彗孛之氣為象疏按春秋緯文耀鈎云布度定紀分州繫象華岐以西龍門積石至三危之野雍州屬魁星大行以東至碣石王屋砥柱冀州屬樞星三河雷澤東至海岱以北兗州青州屬機星蒙山以東至南江會稽震澤徐揚之州屬權星大别以東至雷澤九江荆州屬衡星荆山西南至岷山北嶇鳥鼠梁州屬開星外方熊耳以至泗水陪尾豫州屬搖星此九州屬北斗星有七州有九但兖青徐揚並屬二州故七星主九州也夏官職方氏掌天下之圖以掌天下之地辨其邦國都鄙四夷八蠻七閩九貉五戎六狄之人民與其財用九榖六畜之數要周知其利害注天下之圖如今司空輿地圖也四八七九五六周之所服國數也財用泉榖貨賄也利金錫竹箭之屬害神姦鑄鼎所象百物也又乃辨九州之屬使同貫利注貫事也疏釋曰職方主九州之事故須分别九州之國使同其事利不失其所也又東南曰揚州其穀宜稻疏釋曰自此以下陳九州之事總為三道陳之先從南方起蓋取尊其陽方周改禹貢以徐梁二州合之于雍青分冀州地以為幽並東南曰揚州次正南曰荆州周之西南不置州統屬雍州即次河南曰豫州為一道也次正東曰青州次河東曰兗州次正西曰雍州為二道又次東北曰幽州次河內曰冀州次正北曰並州為三道集説易氏祓曰稻生于水澤之地經言稼下地是已揚州居東南之極及支川下流之所歸厥土為塗泥為沮洳故其榖宜稻又正南曰荆州其穀宜稻又河南曰豫州其穀宜五種注五種黍稷菽麥稻疏此州東與青州相接青州有稻麥西與雍州相接雍州有黍稷故知有此四種但此州不言麻與菽及苽鄭必知取菽者蓋以當時自驗而知故添為五種也又正東曰青州其榖宜稻麥又河東曰兗州其穀宜四種注四種黍稷稻麥疏以其東與青州相接青州有稻麥西與冀州相接冀州有黍稷故知也又正西曰雍州其榖宜黍稷疏雍州宜麥不言者但黍稷麥並宜以黍稷為主云又東北曰幽州其榖宜三種注三種黍稷稻疏西與冀州相接冀州皆黍稷幽州見宜稻也又河內曰冀州其榖宜黍稷又正北曰並州其榖宜五種注五種黍稷菽麥稻也疏若饋用六榖則兼有苽若民之要用則去苽故知是此五者六榖之內三種已上即言種二者則指榖名云邍師掌四方之地名辨其丘陵墳衍邍隰之名注地名謂東原大陸之屬集説陳氏仁錫曰地之廣平曰邍四郊之地名如禹貢冀之太原大陸徐之東原雍之原隰是也冬官考工記天有時地有氣橘踰淮而北化為枳此地氣然也山海經西南黑水之間有廣都之野爰有膏菽膏稻膏黍膏稷百穀自生詩緯含神霧大齊之地處孟春之位海岱之間土地汚泥流之所歸利之所聚春秋元命苞五星流為兗州鉤鈐星别為豫州昴畢散為冀州分為趙國箕星散為幽州分為燕國營室流為並州分為衛國參伐流為益州虛危流為青州天氐流為徐州軫星散為荆州牽女流為揚州春秋説題辭西乃金之位米為陽之精故西合米為粟稻太陰精含水漸洳江旁多稻乃其宜也管子黃帝得太常而察于地利得奢龍而辨于東方得祝融而辨于南方得大封而辨于西方得后土而辨于北方又常山之東河汝之間蚤生而晚殺五穀之所蕃孰也四種而五穫注四種謂四時皆種五穫謂五穀皆宜而有所穫越絶書少昊治西方蚩尤佐之使主金玄冥治北方白辨佐之使主水太皥治東方袁何佐之使主木祝融治南方僕程佐之使主火后土治中央后稷佐之使主土並有五方以為綱紀是以易地而輔萬物之常吳越春秋越地肥美其種甚嘉淮南子星部地名角亢鄭氐房心宋尾箕燕斗牽牛越須女吳虛危齊營室東壁衛奎婁魯胃昴畢魏觜嶲參趙東井輿鬼秦柳七星張周翼軫楚嵗星之所居五榖豐昌其對為衝星嵗乃有殃又東南神州曰農土正南次州曰沃土西南戎州曰滔土正西弇州曰並土正中冀州曰中土西北台州曰肥土正北濟州曰成土東北薄州曰隱土正東陽州曰申土注農神之所經緯沃盛也稼穡盛張滔大也五穀成大並猶成也百穀成熟冀大也四方之主故曰中薄猶平也氣所隱藏申復也隂氣盡于北陽氣復起又汾水濛濁而宜麻濟水通和而宜麥河水中濁而宜菽雒水輕利而宜禾渭水多力而宜黍江水肥仁而宜稻平土之人慧而宜五榖又東方川谷之所注日月之所出其地宜麥南方陽氣之所積暑濕居之其地宜稻西方髙土川谷出焉日月入焉其地宜黍北方幽晦不明天之所閉也寒水之所積也蟄蟲之所伏也其地宜菽中央四達風氣之所通雨露之所會也其地宜禾釋名青州在東取物生而青也徐州徐舒也土氣舒緩也揚州州界多水水波揚也荆州取名于荆山也荆警也豫州地在九州之中京師東都所在常安豫也涼州西方所在寒涼也雍州在四山之內雍翳也並州其州或並或設故因以為名也幽州在北幽昧之地也冀州亦取地以為名也其地有險有易帝王所都亂則冀治弱則冀強荒則冀豐也兗州取兗水以為名也司州司𨽻校尉所主也益州益厄也所在之地險厄也古有營州齊衛之地于天文屬營室取其名也又燕宛也北方沙漠平廣地在涿鹿山南宛宛然以為國都也宋送也接淮泗而東南傾以為殷後若云滓穢所在送使隨流東入海也鄭町也其地多平町町然也楚辛也其地蠻多而人性急數有戰爭辛楚之禍也周地在岐山之南其山四周也秦津也其地沃衍有津潤也晉進也其土在北有事於南則進而南也又取晉水以為名其水迅進也趙朝也本小邑朝事於大國也魯魯鈍也國多山水民性朴魯也衛衛也既滅殷立武庚為殷後三監以守衛之也齊齊也地在渤海之南渤齊之中也吳虞也太伯讓位而不就歸封之於此虞其志也越夷蠻之國度越禮義無所拘也此十二國上應列宿各以其地及於事宜制此名也又秦置郡縣隨其所在山川土形而立其名漢就而因之河南在河之南也河內河水從岐山而南從雷首而東從談首而北郡在其內也河東在河水東也河西在河水西也上黨之所也在山上其所最髙故曰上也潁川因潁水為名也汝南在汝水南也汝隂在汝水隂也東郡南郡以京師方面言之也北海海在其北也西海海在其西也南海在海南也宜言海南欲同四海名故言南海東海海在其東也濟南濟水在其南也濟北濟水在其北也義亦如南海也南陽在國之南而地陽也凡若此類郡國之名取號於此其餘可知也縣邑之名亦如之崔實政論三輔左右及涼幽州內附近郡皆土曠人稀厥田宜稼博物志東方少陽日月所出山谷清西方少隂日月所入其土窈冥南方太陽土下水淺北方太隂土平廣深中央四析風雨交山谷峻廣雅神農度四海內東西九十萬里南北八十一萬里帝堯所治九州地二千四百三十萬八千二百四頃其墾者九百一十萬八千二十四頃史記貨殖列傳山西饒材竹榖纑山東多魚鹽漆絲江南出柟梓薑桂關中自汧雍以東至河華膏壤沃野千里好稼穡殖五榖地重重於稼穡也巴蜀亦沃野地饒巵薑竹木之器天水隴西北地上郡畜牧為天下饒三河在天下之中土地狹小民人衆故其俗纎儉習事中山地薄人衆民俗悁急仰機利而食燕有魚鹽棗栗之饒綰穢貉朝鮮真番之利齊帶山海膏壤千里宜桑麻人民多文綵布帛魚鹽鄒魯濵洙泗頗有桑麻之業無林澤之饒堯作遊成陽舜漁於雷澤湯止於亳其俗好稼穡致其畜藏淮北沛陳汝南南郡地薄寡於積聚江陵故郢都有雲夢之饒陳在楚夏之交通魚鹽之貨吳有海鹽之饒三江五湖之利江南卑濕多竹木總之楚越之地地勢饒食無飢饉之患以故啙窳偷生無積聚而多貧是故江淮以南無凍餓之人亦無千金之家沂泗水以北宜五榖桑麻地小人衆數被水旱之害民好蓄藏故秦夏梁魯好農而重民三河宛陳亦然齊趙設智巧仰機利燕代田畜而事蠶汶山之下沃野下有蹲鴟芋也至死不飢又地理志巴蜀廣漢土地肥美有江水沃野山林竹木疏食果實之饒又溝洫志平原東郡左右其地形下而土疏惡又東方朔列傳汧隴以東商雒以西厥壤肥饒天下陸海之地有粳稻黎栗桑麻竹箭之饒故豐鎬之間號為土膏又東夷列傳夫餘於東夷之域最為平敞土宜五榖把婁古肅慎之國有五榖麻布土氣極寒常為穴居東沃沮土肥美背山向海宜五榖善田種馬韓人知田蠶辰韓土地肥美宜五榖又南蠻列傳牂牁地多雨潦句町縣有桄榔木可以為麵百姓資之益州郡有池周回二百餘里水源深廣而末更淺狹有似倒流故謂之滇池河土平敞有鹽池田漁之饒汶山郡土氣多寒在盛夏氷猶不釋土地剛鹵不生榖粟麻菽惟以麥為資而宜畜牧武都土地險阻有麻田又西羌列傳大小榆谷土地肥美又雍州之域厥田惟上沃野千里榖稼殷積又有龜茲鹽池以為民利水草豐美土宜産牧又伊吾地宜五榖桑麻蒲萄其北又有柳中皆膏腴之地又烏桓列傳其土地宜穄及東墻東墻似蓬草實如穄子至十月而熟帝王世紀自斗十一度至婺女七度一名須女曰星紀之次于辰在丑謂之赤奮若于律為黃鍾斗建在子今吳越分野自婺女八度至危十六度曰玄枵之次一名天黿于辰在子謂之困敦于律為大呂斗建在丑今齊分野自危十七度至奎四度曰豕韋之次一名娵訾于辰在亥謂之大淵獻于律為大簇斗建在寅今衛分野自奎五度至胃六度曰降婁之次于辰在戌謂之閹茂于律為夾鍾斗建在卯今魯分野自胃七度至畢十一度曰大梁之次于辰在西謂之作噩于律為姑洗斗建在辰今趙分野自畢十二度至東井十五度曰實沈之次于辰在申謂之涒灘于律為仲呂斗建在已今晉魏分野自井十六度至柳八度曰鶉首之次于辰在未謂之協洽于律為㽔賓斗建在午今秦分野自栁九度至張十七度曰鶉尾之次于辰在已謂之大荒落于律為夷則斗建在申今楚分野自軫十二度至氐四度曰夀星之次于辰在辰謂之執徐于律為南吕斗建在酉今韓分野自氐五度至尾九度曰大火之次于辰在卯謂之單閼于律為無射斗建在戌今宋分野自尾十度至斗七度百三十五分而終曰析木之次于辰在寅謂之攝提格于律為應鍾斗建在亥今燕分野隋書地理志正西曰雍州上當天文自東井十度至栁八度為鶉首于辰在未得秦之分野安定北地上郡隴西天水金城六郡之地勤于稼穡梁州于天官上應參之宿漢中之人多事田漁豫州其在天官自氐五度至尾九度為大火于辰在卯宋之分野屬豫州自栁九度至張十六度為鶉火于辰在午周之分野屬三河則河南淮之星次亦豫州之域梁郡好尚稼穡兖州其于天官自軫十二度至氐四度為夀星于辰在辰鄭分野冀州其于天文自胃七度至畢十一度為大梁屬冀州自尾十度至南斗十一度為析木屬幽州自危十六度至奎四度為娵訾屬并州自栁九度至張十六度為鶉火屬三河則河內河東也淮之星次本皆冀州之域信都清河河間博陵恆山趙郡武安襄國其俗務在農桑長平上黨人多重農桑河東絳郡文城臨汾龍泉西河土地沃少瘠多正東曰青州其在天官自須女八度至危十五度為玄枵于辰在子齊之分野多務農桑徐州自奎五度至胃六度為降婁于辰在戌賤商賈務稼穡揚州在天官自斗十二度至須女七度為星紀于辰在丑吳越得其分野江南之俗火耕水耨食魚與稻宣城毗陵吳郡會稽餘杭東陽數郡州澤沃衍有海陸之饒豫章之俗勤耕稼自嶺已南二十餘郡大率土地下濕荆州上當天文自張十七度至軫十一度為鶉首于辰在已楚之分野宋史地理志京東路兖豫青徐之域當虛危房心奎婁之分西抵大梁南極淮泗東北至于海有鹽鐡絲石之饒其俗勤耕絍營丘號稱富衍物産尤盛京西路冀豫荆兗梁五州之域而豫州之壤為多當井栁星張角亢氐之分東暨汝潁西被陜服南略鄢郢北抵河津絲枲漆纊之所出而洛邑為天地之中民性安舒然土地𥚹薄迫于營養汝蔡率多曠田太宗遷晉雲朔之民于京洛鄭汝之地墾田頗廣河北路兗冀青三州之域而冀兗為多當畢昴室東壁尾箕之分南濱大河北際幽朔東瀕海岱西壓上黨繭絲織絍之所出土平而近邊置方田以資軍廩河東路冀雍二州之域而冀州為多當觜參之分其地東際常山西控黨項南盡晉絳北控雲朔當大行之險地有鹽鐡之饒勤農織之事業寡桑柘而富麻苧陜西路雍梁冀豫四州之域而雍州全得焉當東井輿鬼之分西接羌戎東界潼陜南抵蜀漢北際朔方有絲枲林木之饒其民慕農桑好稼穡鄠杜南山土地膏沃二渠灌溉兼有其利兩浙路揚州之域當南斗須女之分東西際海西控震澤北濱于海有魚鹽布帛粳稻之産淮南路荆徐揚豫四州之域而揚州為多當南斗須女之分東至于海四抵濉渙南濱大江北界清淮土壤膏沃有茶鹽絲帛之利江南東西路揚州之域當牽牛須女之分東限七閩西略下口南抵大庾北際大江川澤沃衍有水物之饒永嘉東遷茗荈治鑄金帛粳稻之利嵗給縣官用度蓋半天下之入焉荆湖南北路荆州之域當張翼軫之分東界鄂渚西接溪洞南抵五嶺北連襄漢其土宜榖稻南路有袁吉壤接者其民往往轉徙自占深耕穊種北路農作稍惰多曠土福建路蓋古閩越之地其地東南際海西北多峻嶺抵江有茶鹽海物之饒民安土樂業川源浸濯田疇膏沃無凶年之憂而土田迫狹生藉繁夥雖磽確之地耕耨殆盡川峽四路梁雍荆三州之地而梁州為多天文與秦同分南至荆峽北控劍棧西南接蠻夷土植宜柘繭絲織文纎麗者窮于天下地狹而腴民勤耕作無寸土之曠嵗三四收廣南東西路荆揚二州之域當牽牛婺女之分南濱大海西控夷洞北限五嶺宋初人稀土曠儋崔萬安三州地狹户少金史食貨志中都西京北京上京遼東臨潼陜西地寒稼穡遲熟夏稅限以七月為初通鑑注太行為河北脊其山脊諸州皆山險至太行山盡頭地始平廣田皆腴美俗謂小江南古所謂覃懷也海槎餘録儋耳境山百倍于田土多石少雖絶頂亦可耕植農政全書三吳古稱澤國其西南翕受太湖陽城諸水形勢尤卑而東北際海岡隴之地視西南特髙髙者田常苦旱旱者田常苦潦又中州濱河之區歲苦馮夷銜齒關中引涇通渭并州西南若汾若沁盡可引注為農田用三楚漢沔西來大江中貫開渠建閘在在沃壤廣南沿海多淤沙饒沃容有未興之利八閩江右畝窄人稠欽定授時通考卷九
