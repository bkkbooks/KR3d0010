body:
  text: 農餘蔬二山藥芋香芋土芋甘露子甘薯蘿蔔水蘿蔔胡蘿蔔萵苣生菜蓴芹紫芹蘆山藥山藥原名薯蕷負暄雜録云山藥本名薯蕷避唐代宗諱改名薯藥宋英宗名曙改名山藥一名山薯一名土薯一名玉延廣雅云玉延署預也吳普云齊楚名玉延一名修脆一名薯藇一名山芋一名薯薯一名兒草江閩人單呼為薯處處有之南京者最大而美蜀道尤良入藥以懷慶者為佳春間生苗蔓延莖紫青有三尖似白牽牛葉更厚而光澤五六月開細花成穟淡紅色大類棗花秋生實於葉間青黃八月熟落根下外薄皮土黃色狀似雷丸大小不一肉白色煮食甘滑與根同冬春採根皮亦土黃色薄而有毛其肉白色者為上青黑者不堪用南中有一種生山中者根細如指極緊實刮磨入湯煮之作塊味更佳食之尤益人江湖閩中一種根如薑芋而皮紫大者切數片去皮煎煮俱美但性冷於北地者彼土人呼為薯入藥以野生者為勝性甘溫平無毒鎮心安神魂魄止腰痛治虛羸健脾胃益腎氣止泄痢化痰涎久服耳目聰眀輕身不老羣芳譜種植春社日取宿根多毛有白瘤者竹刀截作二寸長塊先將地開作二尺寬溝深三四尺長短任意先填亂糞柴一半上實以土將截斷山藥竪埋於中上仍以糞土覆與溝平時澆灌之苗生以竹或樹枝架作楥高三四尺當年可食三四年者根大尤美夏月宜頻澆最宜肥地每年易人而種宜牛糞麻籸忌人糞芋芋一名土芝一名蹲鴟史記注云芋頭形類鴟鳥之蹲一名莒在在有之蜀漢為最京洛者差圓小葉如荷長而不圓莖微紫乾之亦中食根白亦有紫者南方之芋子大如斗旁生子甚多皮上有微毛如鱗次裹之拔之則連茹而起味甘蒸煮任意濕紙包火煨過熟乘熱噉之則鬆而膩益氣充饑亦可為羮臛廣志所載有君子芋大如斗魁淡原作談誤善芋魁大如瓶少子葉如繖蓋紺色而紫莖其長丈餘易熟長味是芋之最善者百果芋魁大子繁畝收百斛雞子芋色黃車轂芋巨一作銀子芋旁原作勞誤巨芋青浥芋四種皆多子可乾臘亦可藏至夏皆種之美者長味芋味長莖亦可食九面芋大而不美青芋曹芋一作素芋象芋一作象空芋大而弱使人易饑皆不可食又有蔓芋緑枝生大者如二三升博士芋出新鄭蔓生而根如鵝鴨蛋百子芋出葉俞縣有魁芋無旁子酉陽雜俎有天芋生終南山中葉如荷而厚雀芋狀如雀頭置乾地反濕置濕地反乾飛鳥觸之墮走獸遇之僵益部方物略記有赤鸇芋俗號赤鸇頭芋形長而圓但子不繁衍味最美蠻芋味亦美其形則圎子繁衍人多蒔之搏果芋品最下搏接也言可接果山中人多食之爾雅翼云芋之大者前漢謂之芋魁後漢書謂之芋渠本草芋種雖多有水旱二種旱芋山地可種水芋水田蒔之葉皆相似但水芋味勝莖亦可食芋不開花時或七八月間有開者抽莖生色黃花旁有一長蕚護之如半邊蓮花之狀味平除煩止渴可以療饑可以備荒小兒戒食滯胃氣難尅化有風疾服風藥者最忌多致殺人備荒論曰蝗之所至凡草木葉無有遺者獨不食芋桑與水菱芡宜廣種之史記貨殖傳蜀卓氏之先趙人也秦破趙遷卓氏曰吾聞岷山之下沃野下有蹲鴟至死不饑乃求逺遷致之臨卭晉書李雄載記雄尅成都軍饑甚乃率衆就穀於郪掘野芋而食之茅堂閒詁閣皂山一寺僧専力種芋嵗收極多杵之如泥造塹為牆後遇大饑獨此寺四十餘僧食芋塹以度凶嵗泛勝之書種芋區方深皆三尺取豆萁內區中足踐之厚尺五寸取區上濕土與糞和之內區中萁上令厚尺二寸以水澆之足踐令保澤取五芋子置四角及中央足踐之旱數澆之萁爛芋生子皆長三尺一區收三石農桑通訣種宜軟白沙地近水為善芋畏旱故宜近水區深可三尺許行欲寬寬則過風本欲深深則根大春宜種夏種不生秋宜壅失壅則瘦鋤宜頻澆宜數霜降捩其葉使收液以美其實羣芳譜擇種十月揀根圓長尖白者就屋南簷下掘坑以礱糠鋪底將種放下稻草蓋之勿使冷爛至三月間取出埋肥地待早苗發三四葉於五月間擇近水肥地移栽其科行與種稻同或用河泥或用灰糞爛草壅培旱則澆之有草則去之若種旱芋亦宜肥地又栽種正二月將耕過地先鋤一遍以新黃土覆蓋三月中擇壬申壬午壬戌辛巳戊申庚子辛卯日將芋芽向上種候生三四葉高四五寸五月移栽霜降後鋤開根邊土上肥泥壅根則愈大而愈肥南方多水芋北方多旱芋總之地皆宜肥水芋二尺一科畝為科二千一百六十科收魁若子二斤畝為斤二千三百二十以備荒救饑已數倍於作田矣種芋之地衆人來往眼目多見及聞刷鍋聲多不孶生鋤芋宜晨露未乾及雨後耘鋤令根旁虛則芋大子多若日中耕大熱則蔫以灰糞培則茂水芋不必耘但亦宜肥地七月在芋四角掘土壅根則土暖結子圓大霜後起之芋荄繁宜剝取淖曬乾煮食味極甘美香芋附香芋形如土豆而味甘美煮熟可食羣芳譜種芋法香芋皮黃肉白莖葉如扁豆而細又有引蔓開花花落即生名之曰落花生皆嘉定有也土芋附本草土芋一名土豆一名土卵一名黃獨蔓生葉如豆根圓如卵肉白皮黃可灰汁煮食亦可蒸食解諸藥毒生研水服吐出惡物甘露子附本草甘露子以根味而名一名地蠶原譜誤作環一名土蛹一名草石蠶皆以根形而名蘇頌云草根之似蠶者一名蠶石一名滴露一名地爪兒荆湘江淮以南野中有之人亦栽蒔二月生苗長者近尺方莖對節狹葉有齒並如雞蘇但葉皺有毛四月開小花成穗一如紫蘇花穗結子如荆芥子其根聨珠狀如老蠶掘根蒸煮食之味如百合羣芳譜二三月鋤宜沃土宜沾濕凡種宜於園圃近陰處或樹蔭下疏種之至秋乃收生熟皆可食又可蜜煎可醬漬可作豉雨中以灰雜糞土覆掩根鋤草淨則生繁至冬鋤去一云葉上露滴地即滋生是以有露滴之名甘薯甘薯一名朱薯一名番薯大者名玉枕薯稗史類編云嶺外多薯有發深山邃谷而得者重數十斤名玉枕薯形圓而長本末皆鋭肉紫皮白質理膩潤氣味甘平無毒補虛乏益氣力健脾胃強腎陰與薯蕷同功久食益人與芋及薯蕷自是各種巨者如杯如拳亦有大如甌者氣香生時似桂花熟者似薔薇露撲地傳生一莖蔓延至數十百莖節節生根一畝種數十石勝種穀二十倍閩廣人以當米榖有謂性冷者非二三月及七八月俱可種但卵有大小耳卵八九月始生冬至乃止始生便可食若未須者勿頓掘令居土中日漸大到冬至須盡掘出則不敗爛南方草木狀甘薯蓋薯蕷之類或曰芋之類根葉不如芋皮紫而肉白蒸煮食之産珠崖之地海中之人皆不業耕稼惟掘地種甘薯秋熟收之蒸㬠切如米粒倉圌貯之以充糧糗是名薯糧異物志甘薯出交廣南方民家以二月種十月收之其根似芋亦有巨魁大者如鵝卵小者如雞鴨卵剝去紫皮肌肉正白如肪南人當米穀果食炙皆香美初時甚甜經久得風稍淡甘薯疏閩廣薯有二種一名山薯彼中故有之一名番薯有人自海外得此種海外人亦禁不令出境此人取薯絞入汲水繩中因得渡海分種移植遂開閩廣之境兩種莖葉多相類但山薯植援附樹乃生番薯蔓地生山薯形壘魁番薯形圓而長其味則番薯甚甘山薯稍劣江南田墟下者不宜薯若髙仰之地平時種藍種豆者易以種薯有數倍之獲大江以北土更髙地更廣即其利百倍不啻矣倘慮天旱則此種畝收數十石數口之家止種一畝縱災甚而汲井灌溉一至成熟終嵗足食有何不可徐光啓云昔人謂蔓菁有六利柿有七絶豫謂甘薯有十二勝收入多一也色白味甘諸土種中特為敻絶二也益人與薯蕷同功三也遍地傳生剪莖作種今嵗一莖次年便可種數十畝四也枝葉附地隨節生根風雨不能侵損五也可當米穀凶年不能災六也可充籩實七也可釀酒八也乾久收藏屑之旋作餅餌勝用餳蜜九也生熟皆可食十也用地少易於灌溉十一也春夏種初冬收入枝葉極盛草穢不容但須壅土不用鋤耘不妨農工十二也羣芳譜種植種薯宜髙地沙地起脊尺餘種在脊上遇旱可汲井澆灌即遇潦年若水退在七月中氣候既不及藝五穀即可翦藤種薯至蝗蝻為害草木蕩盡惟薯根在地薦食不及縱令莖葉皆盡尚能發生若蝗信到時急令人發土遍壅蝗去之後滋生更易是天災物害皆不能為之損人家凡有隙地但只數尺仰天見日便可種得石許此救荒第一義也須嵗前深耕以大糞㙲之春分後下種若非沙土先用柴灰或牛馬糞和土中使土脈散緩與沙土同庶可行根重耕起要極深將薯根每段截三四寸長覆土深半寸許每株相去縱七八尺橫二三尺俟蔓生既盛苗長一丈留二尺作老根餘翦三葉為一段插入土中每栽苗相去一尺大約二分入土一分在外即又生薯隨長隨翦隨種隨生蔓延與原種者不異凡栽須順栽倒栽則不生節則土上即生枝在土下即生卵凡各節生根即從其連綴處斷之令各成根苗每節可得卵三四枚又藏種九月十月間掘諸卵揀近根先生者勿令損傷用軟草包裹掛通風處陰乾一法於八月中揀近根老藤剪七八寸長每七八根作一小束耕地作畦將藤束栽畦內如栽韭法過月餘每條下生小卵如蒜頭狀冬月畏寒稍用草蓋覆至來春分種若老條原卵在土中無不壞爛一法霜降前取近根卵稍堅實者陰乾以軟草各襯另以軟草裹之置無風和暖不近霜雪不受水凍處一法霜降前收取根藤曝令乾於竈下掘窖約深一尺五六寸先下稻糠三四寸次置種其上更加稻糠三四寸以土蓋之一法七八月取老藤種入木桶或磁瓦器中至霜降前置草篅中以稻糠襯置向陽近火處至春分後依前法種收蔓枝節已遍地不能容者即為游藤宜翦去之及掘根時捲去藤蔓俱可飼牛羊猪或曬乾冬月喂皆能令肥腯用地凡薯二三月種者每株用地方二步有半而卵遍焉每官畝約用薯三十六株四五月種者地方二步而卵遍焉畝約六十株六月種者方一步有半而卵遍焉畝約一百六株有竒七月種者地方一步而卵遍焉畝約二百四十株八月種者地方三尺以內得卵細小矣畝約九百六十株種之疏密略以此準之九月畦種生卵如箸如棗擬作種此松江法也北方早寒宜早一月算又在視天氣寒暖臨時斟酌耳蘿蔔蘿蔔一名萊蔔菘乃萊名萊蔔乃根名後世訛為蘿蔔南人呼為蘿瓝或云性能制麥毒故名來服言來牟之所服也一名蘆蔔一名雹葖爾雅云葖蘆萉注云萉宜為蔔蘆蔔蕪菁屬紫花大根俗呼雹葖一名紫花菘一名溫菘紫花菘溫菘皆南人所呼吳人呼楚菘廣南人呼秦菘廣韻云魯人呼為菈􅫘一名土酥農書云北人蘿蔔一種四名春曰破地錐夏曰夏生秋曰蘿蔔冬曰土酥謂其潔白如酥也一名薺根處處有之北土尤多其狀有長圓二類根有紅白二色莖髙尺餘苗稠則小隨時取食令稀則根肥大葉大者如蕪菁細者如花芥皆有細柔毛春末抽髙薹開小花紫碧色夏初結莢子大如麻子黃赤色圓而微扁生河朔者頗大而江南安州洪州信陽者尤大有重至五六斤者大抵生沙壤者脆而甘生瘠地者堅而辣根葉皆可生可熟可俎可虀可醬可豉可醋可糖可臘可飯乃蔬中之最有益者氣味辛甘無毒下氣消穀去痰癖止咳嗽利膈寬中肥健人令肌膚細白同猪羊肉鯽魚煮食更補益熟者多食滯膈中成溢飲服地黃何首烏者食之髮白以蘿蔔多食滲血性相反也種樹書種蘿蔔宜沙壖地五月犂五六遍六月六日種鋤不厭多稠即少種羣芳譜種植頭伏下種宜沙地地欲生則無蟲耕地欲熟則草少治畦長一丈濶四尺每子一升可種二十畦子陳更佳先用熟糞勻布畦內水飲透次日用大糞拌子令勻撒畦內細土覆之苗出三四指便可食擇其密者去之疏則根大尺地只可留三四窠厚壅頻澆其利自倍月月可種月月可食欲收種於九月十月擇其良者去鬚帶葉移栽之澆灌以時至春收子可備種蒔鋤不厭頻忌帶露鋤恐生蟲水蘿蔔附水蘿蔔形白而細長根葉俱淡脆無辛辣氣可生食亦有大如臂長七八寸者則土地之異也出山東壽光縣者尤鬆脆胡蘿蔔附胡蘿蔔有黃赤二種長五六寸宜伏內畦種肥地亦可漫種大者盈握冬初掘取生熟皆可啖可果可蔬莖髙二三尺有白毛氣如蒿不可生食貧人曬乾冬月亦可拌腐充饑三伏內治地㸃種地肥則漫種頻澆則肥大欲收種者留至次年開碎白花攢簇如傘子如蛇牀子稍長而有毛褐色又如蒔蘿子元時始自邊塞中來故名甘辛無毒下氣補中利胸膈安五臟令人健食有益無損子治久痢一種野胡蘿蔔根細小亦同金幼孜北征録云交河北有沙蘿蔔根長二尺許大者徑寸下支生小者如筋色黃白氣味辛而微苦氣似胡蘿蔔想亦胡蘿蔔之類但地利人力之不同耳萵苣萵苣一名萵菜墨客揮犀云萵菜自咼國來故名一名千金菜清異録云咼國使者來漢隋人求得菜種酬之甚厚因名千金菜菜似白苣而尖嫩多皺色稍青折之有白汁四月抽薹髙三四尺剝皮生食味清脆糟食亦佳江東人鹽曬壓實以備方物謂之苣筍農桑通訣謂即野苣按野苣即苦苣又名苦蕒其根亦苦與萵苣自是兩種但萵苣葉亦微苦南人食薹不食葉其種法與白苣同正二月下種四月出園後不再種與生菜異耳生菜附生菜一名白菜一名石苣陸璣詩疏云青州謂之芭似萵苣而葉色白斷之有白汁正二月下種四月開黃花如苦蕒結子亦同八月十月可再種以糞水頻澆則肥大諺云生菜不離園宜生食又生挼鹽醋拌食故名生菜色紫者名紫苣一云紫苣和土作器火煆如銅農桑輯要萵苣作畦下種如菠薐法先用水浸種一日於濕地上襯布置子於上以盆碗合之候芽漸出則種春正二月種之可為常食秋社前一二日種者霜降後可為淹菜如欲出種正二月種九十日收其莖嫩如指大髙可踰尺去皮蔬食又可糟藏謂之萵笋生食又謂之生菜四時不可闕者按據此則萵苣生菜本是一種特南北異宜耳蓴蓴一作蓴一名茒詩傳云苑鳬葵也又陸璣疏云苑與荇菜相似江東人謂之蓴菜一名錦帶一名水葵陸璣疏云江東或謂之水葵一名露葵詳見顔氏家訓一名馬蹄草一名缺盆草生南方湖澤中最易生種以水淺深為候水深則莖肥而葉少水淺則莖瘦而葉多其性逐水而滑惟吳越人喜食之葉如荇菜而差圓形似馬蹄莖紫色大如筋柔滑可羮夏月開黃花結實青紫色大如棠梨中有細子三四月嫩莖未葉細如叉股黃赤色名稚蓴稚小也又名雉尾蓴體軟味甜五月葉稍舒長者名絲蓴細莖如絲也九月萌在泥中漸粗硬名瑰蓴或作葵蓴十月十一月名猪蓴謂可喂猪也又名龜蓴酉陽雜俎云江東謂之蓴龜味苦體澀不堪食取汁作羮猶勝他菜味甘寒無毒治消渴熱痺厚腸胃安下焦逐水解百藥毒竝蠱氣齊民要術近陂湖可於湖中種之近流水者可決水為池種之性易生一種永得宜潔淨不耐汚糞穢入池即死芹芹古作蘄本草作蘄從草從斳諧聲也後省作芹楚有蘄州蘄縣俱音淇羅願云地多産芹故字從芹蘄亦音芹徐鍇注說文蘄字從草蘄諸書無􅀈字據此則蘄字亦當從靳作􅀢字也一名水英一名楚葵爾雅云芹楚葵注云今水中芹菜有水芹旱芹水芹生江湖陂澤之涯旱芹生平地有赤白二種爾雅翼云白芹舒蘄多有之土人呼為白芷二月生苗其葉對節而生似芎藭其莖有節稜而中空其氣芬芳五月開細白花如蛇牀花蘇恭云白芹取根赤芹莖葉並堪作葅味甘無毒止血養精益氣止煩去伏熱殺藥毒令人肥健置酒醬香美和醋食滋人但損齒又有一種馬芹爾雅謂之茭又名牛蘄若野茴香葉細鋭可食亦芹類也本草李時珍云一名胡芹一名野茴香以其氣味子形微似也金光明經謂之葉婆你與芹同類而異種一種黃花者毛芹也有毒殺人此旱芹之一種詩小雅觱沸檻泉言采其芹箋芹菜也可以為葅采水中者尚潔清也齊民要術收根畦種之常令足水尤忌潘泔及鹹水澆之則死性易蕃茂甜脆勝野生者紫芹附本草紫芹一名蜀芹一名楚葵一名苔菜一名水萄菜羣芳譜紫芹即赤芹生陰崖陂池近水石邊狀類赤芍藥葉深緑背甚赤莖似蕎麥花紅可喜結實亦似粃蕎麥味苦澀其汁可以煮雌制汞伏砂擒黃號起貧草他方頗少太行王屋諸山最多蘆蘆一名葦生下濕地處處有之葉四白而垂中心抽幹長丈許中虛皮薄色青老則白中有白膚身有節如竹葉隨節生若箬葉下半裹其莖無旁枝花白作穗若茅花根若竹根而節疏禮記月令季夏之月命澤人納材葦注蒲葦之屬此時柔紉可取作器物也爾雅葦醜苕疏葦即蘆之成者其類皆有苕秀也又葭華蒹薕葭蘆菼薍其萌虇疏此辨蒹葭等生成之異名也葭一名華即今蘆也葦之未成者蒹一名蒹葭一名蘆菼一名薍李巡曰分别葦類之異名其萌名虇本草蘆有數種其長丈許中空皮薄色白者葭也蘆也葦也短小於葦而中空皮厚色有青蒼者菼也薍也荻也􅍉也其最短小而中實者蒹也薕也皆以初生已成得名丹鉛録蘆葦通一物也所謂蒹今作薕者是也所謂菼今人以當薪爨者也北人以蘆與葦為二物水傍下隰所生者為葦其細不及指人家園地間可植者為蘆其幹差大深碧色者為碧蘆農桑輯要葦四月苗高尺許選好葦連根栽成土墩如碗口大於下隰地內掘區栽之縱橫相去一二尺欲得力則密藏至冬放火燒過次年春芽出便成好葦十月後刈之一法二月熟耕地作壠取根卧栽以土覆之次年成葦又壓栽法其葦長時掘地成渠將莖倒以土壓之露其稍凡葉向上者亦植令出土下便生根上便成笋與壓桑無異五年之後根交當隔一尺許斸一钁即滋旺矣其花絮沾濕地即生蘆然不如根栽者欽定授時通考卷六十
