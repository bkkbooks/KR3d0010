  text: 欽定四庫全書欽定授時通考卷二十三
  hash: sha256:19af52e235485efd34d0907faa540f58f4386c8a664e2a1b58402a1bb9e77717
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3d0010_WYG_023-1a, image: WYG0732/WYG0732-0311a.png}
body:
  text: 穀種粱稷禮記曲禮粱曰薌萁注萁辭也疏正義曰粱謂白粱黃粱也萁語助也周禮天官食醫凡會膳食之宜犬宜粱正義犬味酸而溫粱米味甘而微寒氣味相成訂義犬金獸也粱西方之穀與金畜相宜爾雅虋赤苗注今之赤粱粟又芑白苗注今之白粱粟皆好穀疏案詩大雅生民云誕降嘉種維秬維秠維穈維芑故此釋之也虋與穈音義同虋即嘉穀赤苗者郭云今之赤粱粟芑即嘉穀白苗者郭云今之白粱粟皆好穀也博雅藋粱木稷也廣志有具粱解粱有遼東赤粱鹽鑽粱粒如蟻子魏文帝以為粥爾雅翼粱今之粟類古不以粟為穀之名但米之有稃殼者皆稱粟今人以穀之最細而圓者為粟則粱是其類內則曰飯黍稷稻粱白黍黃粱稰穛説者曰下言白黍則上是黃黍下言黃粱則上是白粱今粱有三種青粱殼穗有毛粒青米亦微青而細於黃白米也夏月食之極為清涼但以味短色惡不如黃白粱故人少種之亦早熟而收少作餳清白勝餘米黃粱穗大毛長殼米俱粗於白粱而收子少不耐水旱食之香味美於諸粱人號為竹根黃白粱穗亦大毛多而長殼粗扁長不似粟圓米亦白而大其香美為黃粱之亞古天子之飯所以有白粱黃粱者明取黃白二種耳今人大抵多種粟而少種粱以其損地力而收穫少耳然古無粟名則是以粱統粟今粟與粱功用亦無别明非二物也粱比他穀最益胃但性微寒其聲為涼蓋是亦借涼音如許叔重説黍大暑而種則以黍從暑粱從涼其義一也農政全書王禎曰赤白粱其禾莖葉似粟粒差大其穗帶毛芒牛馬皆不食與粟同時熟本草綱目李時珍曰粱者良也穀之良者也或云種出自梁州或云粱米性涼故名皆各執己見也粱即粟也考之周禮九穀六穀之名有粱無粟可知矣自漢以後始以大而毛長者為粱細而毛短者為粟今則通呼為粟而粱之名反隱矣今世俗稱粟中之大穗長芒粗粒而有紅毛白毛黃毛之品者即粱也黃白青赤亦隨色命名耳郭義恭廣志有解粱貝粱遼東赤粱之名乃因地命名也陶𢎞景曰凡云粱米皆是粟類惟其芽頭色異為分别耳泛勝之云粱是秫粟則不爾也黃粱出青冀州東間不見有白粱處處有之襄陽竹根者為佳青粱江東少有又漢中一種枲粱粒如粟而皮黑可食釀酒甚消瘀蘇恭曰粱雖粟類細論則别黃粱出蜀漢商浙間穗大毛長穀米俱粗於白粱而收子少不耐水旱食之香美勝於諸粱人號竹根黃陶以竹根為白粱非矣白粱穗大多毛且長而穀粗扁長不似粟圓也米亦白而大食之香美亞於黃粱青粱殼穗有毛而粒青米亦微青而細於黃白粱其粒似青稞而少粗早熟而收薄夏月食之極為清涼但味短色惡不如黃白粱故人少種之作餳清白勝於餘米寇宗奭曰黃粱白粱西洛農家多種為飯尤佳餘用不甚相宜又黃粱米氣味甘平無毒寇宗奭曰青粱白粱性皆微涼獨黃粱性味甘平豈非得土之中和氣多耶蘇頌曰諸粱比之他穀最益脾胃又白粱米氣味甘微寒無毒李時珍曰炊飯食之和中止煩渴又青粱米氣味甘微寒無毒李時珍曰今粟中有大而青黑色者是也其穀芒多米少稟受金水之氣其性最涼而宜病人直省志書歷城縣方産粱俗云粱穀米可入祀品鄒平縣物産白穀粒白圓大俗謂粱穀米滋陽縣物産粱有黃白紅黑四種鄒縣物産粱有黃白紅黑四種沂州物産粱有黃白紅黑四種昌邑縣物産粱黃白二種祁縣物産粱細粒而色白馬邑縣土産粱有早晚大小及紫白之異種臨潁縣物産青粱白粱黃粱咸陽縣物産粱其米青者為青粱夏日食之清涼其米白者形如芝麻為芝麻粱黃粱穗大毛長味美謂之竹根黃然赤黃二種甲稃雖有二色而其米皆白慶陽府物産粱黃白青紅龍爪羊角蠟燭芝麻長角凡九種長泰縣物産粱俗呼好殼即香糯青粱穗有毛米微青頗長黃粱穗大毛長米略粗白粱穗大米扁長又有八畬者米赤大於諸粱更香北方無此穀以糯稷白者為粱非是禮記曲禮稷曰明粢疏正義曰稷粟也明白也言此祭祀明白粢也尚書云黍稷非馨詩云我黍與與我稷翼翼為酒為食以享以祀黍稷為五穀之主是粢盛之貴周禮天官食醫凡會膳食之宜豕宜稷正義豭豬味酸牝豬味苦稷米味甘甘苦相成訂義豕水畜也稷北方之穀與水相宜夏官職方氏正西曰雍州其穀冝黍稷又河內曰冀州其穀冝黍稷爾雅粢稷注今江東人呼粟為粢疏左傳云粢食不鑿粢者稷也曲禮云稷曰明粢是也郭云今江東人呼粟為粢然則粢也稷也粟也正是一物而本草稷米在下品别有粟米在中品又似二物故先儒甚疑焉尚書帝命期春鳥星昏中以種稷説文稷五穀之長也穈穄也月令章句稷秋種夏熟歷四時備隂陽穀之貴者博雅稷穰謂之䅳廣志破藏稷逼黍稷也此二者以四月熟隋書稷五星稷農政也取乎百穀之長以為號也宋史天文志天稷五星在七星南農政也取百穀之長以為號明則歲豐暗或不具為飢移徙天下荒歉客星入之有祠事於內出有祠事於國外爾雅翼稷者五穀之長故陶唐之世名農官為后稷其祀五穀之神與社相配亦以稷為名以為五穀不可遍祭祭其長以該之稷所以為五穀之長者以其中央之穀月令中央土食稷與牛五行土為尊故五穀稷為長又古者號稷為首種孟春行冬令則雪霜大摯首種不入蔡雍以首種為麥以麥常隔歲而種故以為首而鄭康成以為稷者蓋以考靈曜云日中星鳥可以種稷是一歲之初所先種者唯稷况又孟春正種稷之時而云首種不入即是極寒種不入土不待歲收然後為入也稷又名齊或為粢故祭祀之號稷曰明粢而言粢盛者本之諸穀因皆有粢名小宗伯所謂辨六齍之名物與其用是也杜子春又欲讀酒正五齊皆為粢以禮運有粢醍在堂意以粢穀為醍則餘四齊亦皆以粢穀為之然破五齊從一粢於義不可故後鄭但以為齊者以度量節作之更讀禮運粢醍為齊此説之不同者也稷又名為穄吕氏春秋曰飯之美者有陽山之穄髙誘曰關西謂之穈冀州謂之䵖説文穈穄也廣雅曰䵖穄也穆天子傳曰赤烏之人獻穄百載見今人皆謂之穄然則稷也粢也穄也特語音有輕重耳大抵塞北最多如黍黑色稷有二種一黃白一紫黑紫黑者芑有毛北人呼為烏禾今人不甚珍此惟祠事用之農家種之以備他穀不熟為糧音釋六齍音粢謂之六穀黍稷稻粱麥苽五齊音劑謂泛醴醍音醴糟牀下酒赤色天中記稷又名為穄農政全書賈思協曰穀者總名非止為粟也然今人専以稷為穀蓋俗名之耳朱穀髙居黃劉豬豬道愍黃聒穀黃雀懊黃續命黃百日糧有起婦黃辱稻糧奴子場音加支穀焦金黃䳺鳴合履今一名麥爭場此十四種早熟耐旱免蟲聒穀黃辱稻糧二種味美今墮車下馬看白羣羊懸蛇赤尾龍虎黃雀民溱馬泄韁劉豬赤李穀黃河摩糧東海黃石䮑歲青莖青黑好黃陌南木隈隄黃宋黃癡指張黃兔胠青惠日黃寫風赤一睍黃山鹺頓黨黃此二十四種穗皆有毛耐風兔雀暴一睍黃一種易舂寶珠黃俗得白張鄰黃白鹺穀釣干黃張蟻白耿虎黃都奴赤茄蘆黃熏豬赤魏爽黃白莖青竹根青調母粱磊碨黃劉沙白憎延黃赤粱穀靈忽黃獺尾青續得黃得客青孫延黃豬矢煙熏黃樂婢青平夀黃鹿橛白鹺折作黃覃糝阿居黃赤巴粱鹿蹄黃鉞狗倉可憐黃米穀鹿橛青阿返此三十八種中粗大穀白鹺穀調母粱二種味美擇穀青阿居黃豬矢青有二種味惡黃覃糝樂婢青二種易舂竹葉青石桞閲竹根青一名胡穀水黑穀忽泥青衝天棒雉子青鴟腳穀鴈頸青攬堆黃青子規此十種晚熟耐蟲災則盡矣徐光啓曰古所謂黍今亦稱黍或稱黃米穄則黍之别種也今人以音近誤稱為稷古所謂稷通稱謂穀或稱粟粱與秫則稷之别種也今人亦概稱為穀物之廣生而利用者皆以其公名名之如古今皆稱稷為穀也晉人稱蔓菁為菜吳人稱棗為果稱陵苕為草洛陽稱牡丹為花又曰穄之苗葉莖穗與黍不異經典初不及穄後世農書輒以黍穄並稱故穄者黍之别種也郭璞注爾雅虋赤粱粟芑白粱粟皆好穀也言粱又言粟言穀故粱者稷之别種也廣志曰秫黏粟説文曰秫稷之黏者故秫亦稷之别種也凡黏穀皆可為酒秬黍黏故人以為酒秫者黏稷亦可為酒故陶潛種五十畝秫非今之薥秫也雜隂陽書稷生於棗或楊九十日秀秀後六十日成羣芳譜稷粒如粟而光滑色紅黃米似粟米而稍大色黃鮮三月種耘四遍七月熟四五月亦可種但收少遲耳刈稷欲早八九月熟便刈遇風即落忌與瓠子附子同食本草綱目李時珍曰稷從禾從畟畟音即諧聲也又進力治稼也詩云畟畟良耜是矣種稷者必畟畟進力也南人承北音呼稷為穄謂其米可供祭也禮記祭宗廟稷曰明粢爾雅云粢稷也羅願云稷穄粢皆一物語音之輕重耳赤者名􅓱白者名芑黑者名秬注見黍下陶𢎞景曰稷米人亦不識書記多云黍與稷相似又注黍米云穄米與黍米相似而粒殊大説文云稷乃五穀長田正也此乃官名非穀號也先儒以稷為粟類或言粟之上者皆説其義而不知其實也按泛勝之種植書有黍不言稷本草有稷不載穄穄即稷也楚人謂之稷關中謂之穈呼其米為黃米其苗與黍同類故呼黍為秈秫陶言與黍相似者得之矣陳藏器曰稷穄一物也塞北最多如黍黑色孟詵曰稷在八穀之中最為下苗黍乃作酒此乃作飯用之殊途蘇頌曰稷米出粟處皆能種之今人不甚珍此惟祠祀用之農家惟以備他穀之不熟則為糧耳寇宗奭曰稷米今謂之穄米先諸米熟其香可愛故取以供祭祀然發故疾只堪作飯不黏其味淡李時珍曰稷與黍一類二種也黏者為黍不黏者為稷稷可作飯黍可釀酒猶稻之有粳與糯也陳藏器獨指黑黍為稷亦偏矣稷黍之苗似粟而低小有毛結子成枝而殊散其粒如粟而光滑三月下種五六月可收亦有七八月收者其色有赤白黃黑數種黑者禾稍髙今俗通呼為黍子不復呼稷矣北邊地寒種之有補河西出者顆粒尢硬稷熟最早作飯踈爽香美為五穀之長而屬土吳瑞曰稷苗似蘆粒亦大南人呼為蘆穄孫炎正義云稷即粟也又曰稷黍之苗雖頗似粟而結子不同粟穗叢聚攢簇稷黍之粒疏散成枝孫氏謂稷為粟誤矣蘆穄即蜀黍也其莖苗高大如蘆而今之祭祀者不知稷即黍之不黏者往往以蘆穄為稷故吳氏亦襲其誤也今並正之又稷米氣味甘寒無毒别録曰益氣補不足心鏡曰作飯食安中利胃宜脾李時珍曰涼血解暑按孫真人云稷脾之穀也脾病宜食之汜勝之云燒黍稷則瓠死此物性相制也稷米黍穰能解苦瓠之毒閩書稷説文曰五穀之長也閩中種稷殊少惟明祀用之甌冶遺事穄米與黍相似而粒大按此説是薥黍也北人曰高粱泉曰番黍浙人曰蘆穄閩中山畬磽地尚有一種穗如鴨腳粒與黍相類磨之可以麵其稃可以酒天工開物凡糧食米而不粉者種類甚多相去數百里則色味形質隨方而變大同小異千百其名北人唯以大米呼粳稻而其餘槩以小米名之凡黍與稷同類粱與粟同類黍有黏有不黏黏者為酒稷有粳無黏凡黏黍黏粟統名曰秫非二種外更有秫也黍色赤白黃黑皆有而或専以黑色為稷未是至以稷米為先他穀熟堪供祭祀則當以早熟者為稷則近之矣凡黍在詩書有虋芑秬秠等名在今方語有牛毛燕頷馬革驢皮稻尾等名種以三月為上時五月熟四月為中時七月熟五月為下時八月熟揚花結穗總與來牟不相見也凡黍粒大小總是土地肥磽時令害育宋儒拘定以某方黍定律未是也凡粟與粱統名黃米黏粟可為酒而蘆粟一種名曰髙粱者以其身髙七尺如蘆荻也粱粟種類名號之多視黍稷尢甚其命名或因姓氏山水或以形似時令總之不可枚舉山東人唯以穀子呼之併不知粱粟之名也以上四米皆春種秋穫耕耨之法與來牟同而種收之候則相懸絶云直省志書宛平縣物産稷有黑白黃三種保定縣土産稷有紅有白有黑歷城縣方産稷祀神多需此鄒平縣物産稷紅白數種新城縣物産穄紅穄黑穄二種齊東縣物産稷紅白數種長清縣物産稷有紅黃黑白四種泰安州物産稷黃黑二種萊蕪縣物産稷有黃紅二種霑化縣物産稷之品紅稷黑稷桞稷六十日滋陽縣物産稷有黑白二種鄒縣物産稷有紅白二種巨野縣物産稷有紅白二種東平州物産穄紅黑二種汶上縣物産稷有黑白二種沂州物産稷有黑白二種清平縣物産稷有黑白紅三種髙唐州物産稷其品二黑紅觀城縣物産稷紅黑二種日照縣物産稷有黑白二種招遠縣物産稷其色有赤白黃黑數種陽曲縣物産稷粟有軟硬二種祁縣物産稷有大小二種視他方味美定襄縣物産稷青黃黧黑臨汾縣物産稷有大小二種視他方味美翼城縣物産稷有赤黑二種汾西縣土産稷黃白黑三種馬邑縣物産稷有青紅白黑四種與早晚大小之分洧川縣物産稷有黃白二種輝縣物産稷色有青白紅黃名有六月秈溜沙白等皆嘉他如龍爪兔蹄雞腸鼠尾隨象立名動以百計慶陽府物産稷黃白紅青黧軟凡六種歙縣物産穄有黑穄者粳穄也赤穄者糯穄也長如蘆葦號蘆穄黃穄皆古之稷也欽定授時通考卷二十三
