body:
  text: 乾隆二年五月十四日諭總理事務王大臣農桑為致治之本我皇祖聖祖仁皇帝嘗繪耕織圖以示勸農徳意皇考世宗憲皇帝屢下勸農之詔親耕耤田率先天下所以敦本計而即田功意至厚也朕思為耒耜教樹藝皆始於上古聖人其播種之方耕耨之節與夫備旱驅蝗之術散見經籍至詳且備後世農家者流其說亦各有可取所當薈萃成書頒布中外庻三農九榖各得其宜望杏瞻蒲無失其候著南書房翰林同武英殿翰林編纂進呈欽此嘉慶十三年六月初十日内閣奉上諭朕惟農桑為致治之原一夫不耕或受之飢一婦不織或受之寒惟人君震動恪恭於上斯小民趨事赴功於下七月之什無逸之圖重民事所以固邦本也我朝列聖相承惠愛黎元勤思本業聖祖仁皇帝詔刋耕織圖四十六幅作為詩章分冠其上其於農事自浸種以至祭神於蠶事自浴蠶以至成衣形橅藻繢纎細畢陳恭繹睿謀蓋以人主生長深宫恐於小民作苦之事未能洞悉用是被諸詠歌垂型奕禩皇祖世宗憲皇帝依題成什皇考高宗純皇帝繼復恭和原韻均以聖祖之心為心敬念民依後先同揆乾隆二年曽命詞臣纂輯授時通考一書内列耕織圖二卷三朝御製詩依次恭載煌煌聖訓萬古維昭朕紹承前烈日以民生為念惟思為閭閻廣衣食之原俾之含哺挾纊永慶盈寜近於幾暇續題耕織圖成五言律詩四十六章檢閲授時通考係刋於乾隆七年其耕織圖卷内恭載聖祖御製於前次列世宗御製又次列皇考御製則書皇帝御製恭和聖祖仁皇帝原韻當時體例應然今朕續有題詠應補行編載原書篇頁内餘幅甚寛著交文頴館總裁等恭查耕織圖各幅前皇考御製詩俱敬謹改書高宗純皇帝御製恭和聖祖仁皇帝原韻再將朕詩次列於後標目書皇帝御製繕册進呈交武英殿補刋以示朕祇遹成謨重民務本至意並將此㫖載入以紀補編年月欽此欽定四庫全書御製授時通考序孟子言不違農時榖不可勝食葢民之大事在農農之所重惟時敬授人時載於堯典周公七月一篇於日星霜露之候昆蟲草木之化詳哉其言之故先王之民莫不震動恪恭於農以修其事者懼失時也我聖祖仁皇帝勤咨民隠首重農桑率育蒸黎涵濡徳澤六十餘載户慶盈寧皇考世宗憲皇帝嵗舉耕耤之儀率先天下興水利廣儲蓄為萬世規凡兹薄海蒼生得荷鋤饁餉優游隴畆之間樂生遂性衣食滋豐者何莫非我祖宗宵旰勤勞以貽樂利於無疆耶朕纉承基緒鑒前代生深宫之中長阿保之手誠知稼穡艱難日與中外臣工為斯民籌食用至計胼胝機杼之作苦日厪於懷因檢前人農桑通訣農政全書諸編嘉其用意勤而於民事切也命内廷詞臣廣加蒐輯舉物候早晚之宜南北土壤之異耕耘之節儲偫之方蠶織蓄牧之利自經史子集以及農家者流凡言之闗於農者彚萃成編命之曰授時通考夫天道廣運於上而四時行萬彚生地道發育於下而庶品蕃百昌遂人事參賛其中而六府修三農殖輔相裁成固國家之大政也趨事赴功亦閭閻之本業也貴榖劭農服田力穡上下交勉弗懈於時以副朕阜成海宇之至願覽斯編者尚有取焉乾隆七年嵗在壬戌春正月下澣八日御筆欽定四庫全書子部四欽定授時通考農家類目録卷一天時門總論上卷二天時門總論下卷三天時門春卷四天時門夏卷五天時門秋卷六天時門冬卷七土宜門彚考卷八土宜門方輿圗說卷九土宜門辨方卷十土宜門物土卷十一土宜門田制上卷十二土宜門田制下卷十三土宜門田制圗說上卷十四土宜門田制圖説下卷十五土宜門水利一卷十六土宜門水利二卷十七土宜門水利三卷十八土宜門水利四卷十九榖種門彚考嘉禾瑞榖瑞麥卷二十榖種門御稻米稻一卷二十一榖種門稻二卷二十二榖種門稻三卷二十三榖種門粱稷卷二十四榖種門黍卷二十五榖種門粟卷二十六榖種門麥卷二十七榖種門豆一卷二十八榖種門豆二卷二十九榖種門豆三卷三十榖種門麻卷三十一功作門彚考卷三十二功作門墾耕卷三十三功作門耙勞卷三十四功作門播種卷三十五功作門淤䕃卷三十六功作門耘耔卷三十七功作門灌溉卷三十八功作門泰西水法卷三十九功作門収穫卷四十功作門攻治卷四十一功作門牧事附卷四十二勸課門彚考卷四十三勸課門詔令卷四十四勸課門章奏卷四十五勸課門官司卷四十六勸課門祈報卷四十七勸課門敕諭一卷四十八勸課門敕諭二卷四十九勸課門祈榖耕耤卷五十勸課門御製詩文卷五十一勸課門御製詩文卷五十二勸課門耕織圖上卷五十三勸課門耕織圖下卷五十四蓄聚門彚考卷五十五蓄聚門常平倉卷五十六蓄聚門社倉義倉卷五十七蓄聚門圖式卷五十八農餘門彚考卷五十九農餘門蔬一卷六十農餘門蔬二卷六十一農餘門蔬三卷六十二農餘門蔬四卷六十三農餘門果一卷六十四農餘門果二卷六十五農餘門果三卷六十六農餘門果四卷六十七農餘門木一卷六十八農餘門木二卷六十九農餘門雜植卷七十農餘門畜牧一卷七十一農餘門畜牧二卷七十二蠶桑門彚考制居浴種卷七十三蠶桑門飼養卷七十四蠶桑門分箔入簇擇繭卷七十五蠶桑門繰絲織染卷七十六蠶桑門桑政卷七十七蠶桑門桑餘卷七十八蠶桑門桑餘臣等謹案欽定授時通考七十八卷乾隆二年奉勅撰乾隆七年進呈欽定御製序文頒行凡八門曰天時分四子目明耕耘收穫之節也曰土宜分六子目盡髙下燥濕之利也曰榖種凡九子目别物性也曰功作分十子目盡人力也曰勸課分九子目重農之政也曰蓄聚分四子目備荒之制也曰農餘分五子目種植蓄養之事也曰蠶桑分十子目族箔織絍之法也天時冠以總論餘七門各冠以彚考而詔諭御製詩文並隨類恭錄焉昔周公作書以無逸為永年之本而所謂無逸在先知稼穡之艱難故重農貴粟治天下之本也管子吕覽所陳種植之法並文句典奥與其他篇不類盖古者必有専書故諸子得引之今已佚不可見矣劉向七畧綜别九流以農家自為一類其書亦無一存今所傳者以賈思勰齊民要術為最古而名物訓詁通儒或不盡解無論耕夫織婦也沿而作者不可殫數惟王禎徐光啟書為最著而疎漏冗雜亦不免焉我皇上御極之次年即深維堯典授時之義虞廷命稷之心特詔刪纂諸書編為此帙準今酌古務期於實用有禆又詳考舊章臚陳政典不僅以自生自息聴之閭閻尤見軫念民依之至意非徒農家言矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀乾隆六年十一月二十九日奉㫖開列經理諸臣銜名監理和碩和親王臣𢎞晝總裁臣鄂爾泰臣張廷玉南書房纂修吏部左侍郎世襲一等輕車都尉臣蔣溥經筵講官户部左侍郎臣梁詩正兵部左侍郎臣汪由敦都察院左僉都御史臣彭啟豐日講官起居注翰林院侍讀學士世襲三等伯臣張若靄日講官起居注翰林院侍讀臣介福左春坊左諭徳臣嵇璜日講官起居注翰林院修撰臣金徳瑛翰林院編修臣秦蕙田日講官起居注翰林院修撰臣莊有恭武英殿纂修經筵講官刑部左侍郎臣張照工部左侍郎臣許希孔原任刑部右侍郎臣勵宗萬原任日講官起居注詹事府詹事兼翰林院侍讀學士臣陳浩日講官起居注詹事府少詹事兼翰林院侍講學士臣吕熾日講官起居注右春坊右中允兼翰林院編修臣朱良裘翰林院編修臣董邦達翰林院編修臣夏廷芝翰林院編修臣張映斗翰林院編修臣陸嘉頴翰林院檢討臣唐進賢翰林院檢討臣吳泰翰林院檢討臣萬松齡翰林院編修臣吳紱翰林院編修臣馮祁監察御史臣沈廷芳校對翰林院編修臣田志勤翰林院檢討臣郭肇鐄候補主事武英殿行走今補山西隰州直𨽻州知州臣王祖庚拔貢生臣費應泰舉人臣盧明楷拔貢生臣徐顯烈拔貢生臣龔世楫優貢生臣王男拔貢生臣王積光恩貢生臣曾尚渭拔貢生臣李長發拔貢生臣鄧獻章舉人臣方廷棟監造内務府南苑郎中兼佐領加五級紀錄十次臣雅爾岱内務府錢糧衙門郎中兼佐領加五級紀錄十一次臣永保内務府錢糧衙門主事臣永忠内務府廣儲司司庫加二級臣三格監造加一級臣李保監造臣鄭桑格庫掌臣李延偉庫掌臣虎什泰嘉慶十三年六月初十日奉㫖續辦耕織圖諸臣銜名監理和碩儀親王臣永璇經筵講官太子太傳領侍衛内大臣大學士世襲輕車都尉臣慶桂文頴館正總裁級臣董誥級臣戴衢亨經筵講官工部尙書加二級臣曹振鏞副總裁經筵講官吏部左侍郎加二級臣潘世㤙級臣英和級臣覺羅桂芳禮部右侍郎兼公中佐領加二級臣秀寜工部左侍郎加二級臣周兆基工部右侍郎教習庻吉士加二級臣陳希曽提調官翰林院侍讀加一級臣繼昌翰林院編修加一級臣席煜總閱官翰林院編修臣文寜署總校官翰林院編修武英殿纂修加一級臣徐松翰林院編修武英殿協修加一級臣孫爾準監造内務府慎刑司郎中兼恭領佐領臣長申内務府掌儀司貟外郎兼佐領臣克䝉額正監造員外郎臣永清副監造副内管領臣經文委署主事臣敏謙六品銜庫掌臣和興庫掌臣善元庫掌臣光裕欽定授時通考凡例一敬授人時農事之本故是編冠以天時土㑹土宜辦其名物物土次焉誕降嘉種百榖用成榖種次焉力穡有秋良耜畟畟功作次焉簡器修政保介是咨勸課次焉餘三餘九家有葢藏蓄聚次焉場圃無棄地林麓無棄材農之餘也故列為農餘蠶織之事授衣所先故次以蠶桑棉葛之利近世尤蕃故附諸桑餘凡以備法制品節之詳俾知所盡心云一是編以致用為主凡採摭經史但取其切於實用及名物根据所自詩文藻麗之詞槩置弗録惟歴代詔令章奏有闗農事者詳悉採入至我朝重農務本超越千古凡布諸綸綍者無不曲盡民情周知稼穡聖祖仁皇帝御製耕織圖詩咏農人胼胝之勞織女機絲之瘁周詳往復田家作苦瞭然在目世宗憲皇帝敬和於前我皇上敬和於後敦崇本業不啻豳風無逸諸篇矣敬謹編輯為本朝重農五卷固非尋常詩文可擬也一百榖九榖五榖註家詮解不一且南北異宜即老農亦未能悉辨今取其廣種而利溥者羅列於前而附以直省土産至瑞榖嘉禾瑞麥雖靈異攸鍾迥異凡品然亦如人類之有聖賢鱗羽之有麟鳯其莖苗秀實固非别為一種也故以冠於榖種之首一物土之宜水利為重然惟陂池渠岸溝洫畎澮之用切近農功者始為採輯至河道海塘雖闗係民生大利而非農家所能講求不具録焉一民間儲蓄歴代以常平社倉為要其斂散糴糶與閭閻休戚相闗司牧者所當留意農書所載甚畧今益加增輯至農政全書中有救荒振卹諸條今已刋行康濟録一書救饑條件畧具是編不復採入葢徐書以農政為名自不得獨遺賑贍是編以授時為重惟取家裕葢藏固各有義例也又農政全書載明周憲王救荒本草多至四百餘種固仁者之用心然使政事克修自可無憂捐瘠若令糠覈不飽延喘須臾何暇按圖考傳今曰性味若何烹芼若何是鳴和鸞於救焚拯溺之時而論殽胾於羅雀掘䑕之日也亦従刪省一農餘以蔬茹果蓏為主而材木之用漆蠟之饒牧字之蕃息生計咸所取資弗可遺也惟飲食製造之方雖備載於齊民要術諸書然古今異宜南北異嗜且籩豆之司非所重也亦槩弗録一桑餘之利木棉最廣麻葛蕉桐次之若裘褐氊罽之屬既非草野所需並非紅女所辦更不採入一分門編纂凡所採經書諸説有不能不互見數見之處惟於節録原文中各従本門所重以免複出其必不可節者乃並載焉至如畜牧種植皆農餘也而耕牛之飼養歸於功作桑柘之栽培詳於蠶事亦各舉其重言之
