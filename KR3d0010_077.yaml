body:
  text: 桑餘柘書經厥貢杶幹枯柏𫝊幹柘也詩經攘之剔之其檿其柘禮記季春之月命野虞毋伐桑柘唐書南詔傳自曲靖州至填池人水耕食蠶以柘蠶生閲二旬而繭織錦縑精緻齊民要術種柘法耕地令熟耬耩作隴柘子熟時多收以水淘汰令淨曝乾散訖之草生拔却勿令荒沒又柘樹葉食蠺可作琴瑟等絃清鳴響徹勝於凡絲逺矣農政全書柘葉叢生幹疏而直葉豐而厚春蠶食之其絲以冷水繅之謂之泠水絲柘蠶先出先起而先繭柘葉隔年不採春生必毒蠶如不採夏月皆打落方無毒又柘木北土處處有之其木堅徑皮紋細密上多白㸃枝多刺葉比桑小而薄色黃淡葉梢皆三叉亦堪餉蠶奴柘本草綱目樹如柘而小有刺葉亦如柞葉而小可餉蠶蒿詩經豳風春日遲遲采繁祁祁𫝊蘩白蒿也所以生蠶柘埤雅云柘宜山石柘之從石取此義寇宗奭曰柘木裏有紋亦可旋為器李時珍曰其實狀如桑子而圓粒如椒其木染黃赤色謂之柘黃木棉書經禹貢揚州厥篚織貝𫝊織貝錦名織為貝文詩曰貝錦是也今南夷木棉之精好者亦謂之吉貝海島之夷以卉服來貢而織貝之精者則入篚焉南史髙昌國傳有草實如繭繭中絲如細纑名曰白疊子國人織以為布又海南諸國傳林邑國出古貝樹其花如鵝毳抽其緒紡之以作布與紵布不殊亦染成五色織為斑布南州異物志木棉吉貝木所生熟時狀如鵝毳細過絲綿中有核如珠珣用之則治出其核昔用輾軸今用攪車尤便但紡不績任意牽引無有斷絶其為布曰斑布繁縟多巧者曰城次粗者曰文縟又次粗者曰烏驎泊宅編南海蠻人以木棉紡績為布布上出細字雜花卉尤工巧名曰吉貝布即古白㲲布也農桑通訣中國自桑土既蠶之後惟以繭纊為務不知木棉之為用夫木棉産自海南諸種藝制作之法駸駸北來江淮川蜀既獲其利至南北混一之後商販於此服被漸廣按裴淵廣州記云蠻夷不蠶採木棉為絮又諸番雜志云木棉吉貝木所生占城闍婆諸國皆有之今已為中國珍貨且比之蠶桑無採養之勞有必收之效埒之枲苧免績緝之工得禦寒之益可謂不麻而布不繭而絮列製造之具庶逺近滋習農務助桑麻之用華夏兼蠻夷之利將自此始矣農桑輯要種木棉法擇兩和不下濕肥地於正月地氣透時深耕三遍擺蓋調熟然後作成畦畛每畦長八步濶一步內半步作畦面半步作畦背不劚二遍用耙耬平起出覆土於畦背上堆積至榖雨前後㨂好天氣日下種先一日將已成畦畛連澆三次用水淘過子粒堆於濕地上次日取出用小灰搓得伶俐看稀稠撒于澆過畦內將元起之土覆厚一指再勿澆待六七日苗出齊時旱則澆溉鋤治常要潔淨穊則移裁稀則不須每步只留兩苗稠則不結實苗長髙二尺上打去衝天心旁條長尺半亦打去心葉葉不空開花結實直待棉欲落時為熟旋熟旋摘隨即攤於箔上日曝夜露待粒子乾取下用鐵杖長二尺粗如指兩端漸細若趕麵杖樣用梨木板長三尺濶五寸厚二寸做作牀逐旋取棉子置於板上用鐵杖回旋趕出子粒即為淨棉撚織毛絲或裝棉衣服特為輕暖便民圖纂木棉榖雨前後種之立秋時隨穫隨收其花黃如葵其根獨而直其樹不貴乎髙長其枝幹貴乎繁衍不由宿根而出以子撒種而生所種之子初收者未實近霜者不生惟中間時月收者為上須經日晒燥帶棉收貯臨種時再晒旋碾即下其種本海南諸國所産後福建諸縣皆有近江東陜右亦多滋茂繁盛與本土無異種之則深荷其利又秋時帶棉收貯臨種再曬旋碾即下此慮冬月碾子收藏風日所侵恐致油浥若受水濕仍當鬱爛故也余聞老農云棉種必於冬月碾取謂碾必須晒秋冬生氣收斂曬曝不傷萌芽春間生意茁發不宜大曬二說皆有理今余意創一法不論冬碾春碾收藏旋買但臨種時用水浥濕過半刻淘汰之其粃者逺年者火焙者油者鬱者皆浮其堅實不損者皆沈沈者可種也又棉子用臘雪水浸過不蛀亦能旱或云鰻魚汁浸之凡種皆然種棉須土實漫種者既覆土用木碌碡實之穴種者覆土後以足踐之種法種棉在清明榖雨節以霜氣既止也或生地用糞耕蓋後種或花苗到鋤三遍每根苗邊用熟糞半升培植鋤非六七遍盡去草茸不可苗初頂兩葉時止剗去草顆宜密留以備損傷再鋤尚宜稍密三鋤則定苗顆宜疏不宜密大約每苗一顆相距八九寸逺斷不可兩顆連並苗之去葉心在伏中晴日三伏各一次有苗未長大者隨時去之花性忌燥燥則濕蒸而桃易脫落花忌苗並並則直起而無旁枝中下少桃種不宜晚晚則秋寒早則桃多不成實即成時亦不甚大花軟無絨去心不宜于雨暗日雨暗去心則灌聾而多空幹此北方種花法也北方髙寒尚宜若此况南方濕燥何可不以北法行之徐光啓曰張五典山東信陽人萬厯乙卯按吳行部至海上時六月初察視田間花苗多稚弱三五為族根以上尺許無蓓蕾恨其密曰江左賦繁役重全賴田收而樹藝無法嵗得半入此傷農之大者極論其理甚詳悉手書此則刻而傳之羣芳譜種棉花不可種别物恐分地力又不宜密種如肥田密種即青酣不實又易生蟲亢倉子曰立苗有行故速長强弱不相害故速大正其行通其中疏為冷風則有收而多功又云樹肥無使扶疏樹磽不欲専生而獨居夫苗其弱也欲孤其長也欲相與俱其熟也欲相與扶扶疏且不可况逼迫耶若數寸一株長枝布葉株百餘子畝二三百斤豈不力省而利倍哉又凡田來年擬種稻者可種麥擬棉者勿種諺曰歇田當一熟言息地力即古代田之義若人稠地狹萬不得已可種大麥或稞麥仍以糞壅力補之決不可種小麥凡髙仰田可棉可稻者種棉二年翻稻一年即草根潰爛土氣肥厚蟲螟不生多不得過三年過則生蟲三年而無力種稻者收棉後周田作岸積水過冬入春凍解放水候乾耕鋤如法可種棉不生蟲又花既曝乾碾去種子彈使熟細便可紡線農桑通訣所載紡車容三繀若倣其製而效之尤易為力或曰北地風髙細紡不易今肅寧之布幾同松之中品聞其鄉多穿地窖深數尺作屋其上簷髙地二尺許作窗以通日光人居其中就濕地紡緝便得緊細與南土無異若陰雨蒸濕不妨移就平地而南人寓都下者多朝夕就露下紡日中陰雨亦紡則安在北地風髙不便細紡也農政全書木棉一步留兩苗三尺一株此相傳古法依此則能耐雨耐旱肥而多收圖纂作於近代云一尺一穴者太密此邇來稠種少收之弊又吳人云千稏萬稏不如密花此言最害事稀不如密者就至下瘠田言之所謂瘠田欲稠也不知田之肥瘠在糞多寡人勤惰耳齊魯人種棉者既壅田下種率三尺留一顆苗長後籠乾糞視苗之瘠者輒壅之畝收二百三百斤以為常餘姚海堧之人種棉極勤亦二三尺一科亦畝收二三百斤其為畦廣丈許中髙旁下畦開有溝深廣各二三尺秋葉落積溝中爛壞冬則就溝中起生泥壅田嵗種蠶豆至春翻掩作壅地虛行根極易又極深則能久雨能久旱能大風此皆稀種故能肥能肥故能收若如吾鄉之密種而又用齊魯之糞肥餘姚之草肥安得不青酣不蟲蠧耶又吉貝遇大水淹沒七日以下水退尚能發生若淹過八九日水退必須翻種矣遇大旱戽水潤之但戽水後一兩日得雨復損苗須較量陰晴方可車戽若能稀種行根深逺即車後得雨亦無妨也又棉田秋根為良穫稻後即用人耕又不宜耙細須大墢岸起令其凝沍來年涷釋土脈細潤正月初轉耕或用牛轉二月初再轉此二轉必令細清明前作畦畛土欲細畦欲濶溝欲深既作畦便於白地上鋤三四次雨後鋤為良則土細而草除鋤白一當鋤青二去草自其芽蘖也又凡棉田於清明前先下壅或糞或灰或豆餅或生泥多寡量田肥瘠太肥則虛長不實實亦生蟲若依古法苗間三尺不妨一再倍也有種晚棉用黃花苕饒草底壅者田擬種棉秋則種草來年刈草壅稻留草根耕轉之若草不甚盛加别壅欲厚壅即並草掩覆之或種大麥蠶豆等並掩覆之皆草壅法也草壅之收有倍他壅者惟生泥棉所最急故姚江之畦間有溝最為良法凡水土氣寒糞力峻熱生泥能解水土之寒糞力之熱使實繁而不蠧諺曰生泥好棉花甘國老但下糞須在壅泥前泥上加糞並泥無力又凡種植以早為良吳濱海多患風潮若比常時先種十許日到八月潮信有旁根成實數顆即小收矣但早種過寒苗出多死今得一法於舊冬新春初耕後畝下大麥種數升臨種棉轉耕並麥苗掩覆之麥根在上棉根遇之即不畏寒又棉田溝側勿種豆畦中尺寸空餘少待即枝條森接補豆一簇並害旁苗十數赤豆害棉尤甚利其微獲者是下農夫也又今人種麥雜棉者多苦遲亦有一法預於舊冬耕熟地穴種麥來春就麥隴中穴種棉但能穴種麥即漫種棉亦可刈麥又苗髙二尺打去衝天心者令旁生枝則子繁也旁枝尺半亦打去心者勿令花枝相揉傷花實也摘時視苗遲早早者大暑前後摘遲者立秋摘秋後勢定勿摘矣摘亦不復生枝又農桑輯要言一步留兩苗又言旁枝長尺半亦打去心此為每科相去皆三尺古法也便民圖纂言每一尺作一穴此為每科相去皆一尺近法也今或相去二三寸一二寸乃至三五成簇是謂無法自取薄收又言苗長二尺打去衝天心此亦古法須三伏者方盛長時令旁生枝也南方知去心者百有一二然非早種稀留肥壅亦自無由髙大去心何益北土用熟糞者堆積乾糞罨覆踰時熱蒸已過用之勢緩而力厚雖多無害南土用水糞豆餅草薉生泥水糞積過半年以上與熟糞同如用新糞畝不得過十石過則青酣一為糞性熱一為花科密也豆餅亦熱畝不得過十餅過則與糞多同病若能稀種科間一尺此二物可加一倍間二尺可加三倍間三尺可加五倍更能於冬春下壅後耕蓋之可加至十倍既不傷苗二三年後尚有餘力草壅甚熱過於糞餅糞亦因水解餅可勻細草壅難勻當其多處峻熱傷苗故有時倍收有時耗損用此一物特宜詳慎生泥者或開挑溝底或罱取草泥罨蒸去熱此種最良凡先下糞餅草薉用此覆之大能緩其勢益其力姚江法用草壅加以生泥科間二尺方之吾鄉畝收數倍蓋生泥中具有水土草薉和合醇熟其水土能制草薉之熱草薉能調水土之寒故良農重之有國老之稱也又按柱史所疏種棉法異南土者有三一曰稀二曰肥三曰早稀則耐肥而能為利余既備論之今特論所云早者按吾鄉北極三十度山東濟南三十六度相去六度寒暖懸絶柱史云其邑俱於清明前種木棉無過榖雨者但清明前霜信未絶苗出土經霜則萎今定于清明前五日為上時後五日為中時榖雨為下時斷不宜過榖雨蓋早種即早實早收縱經風潮之年亦有近根之實不至全荒舊𫝊早種一法擬種棉地先耕種大麥轉耕並麥苗掩覆之耙蓋下種餘姚亦早種棉却先種蠶豆轉耕掩覆之二法略同皆令地虛苗得深逺行根便能寒且能風雨旱且隨地翻罨草壅必勻勝刈他草下壅餘姚罨豆後仍上生泥泥不止去草熱亦令草少蟲少種叠地花者不可不知今括之以四言曰精㨂核早下種深根短幹稀科肥壅又棉花密種者有四害苗長不作蓓蕾花開不作子一也開花結子雨後鬱蒸一時墮落二也行根淺近不能風與旱三也結子暗蛀四也又種棉不熟之故有四病一粃二密三瘠四蕪秕者種不實密者苗不孤瘠者糞不多蕪者鋤不數又種棉有漫種者易種難鋤下種宜密鋤時簡别而痛芟之令絶殊穴種者穴四五核鋤時簡别留不得過二留二者髙五六寸則以塊亞其中而平分之使根幹相去面面生枝終不如孤生者良老農云一二次鋤去大葉者此大核少棉種也三鋤後去小葉者此粃不實種也或實而油浥病種也若純用黑核等佳種精擇之自無諸弊又鋤棉須七次以上又須夏至前多鋤為佳諺曰鋤花要趁黃梅信鋤頭落地長三寸又鋤棉者功須極細昔有人傭力鋤者密埋錢于苗根鋤者貪覔錢深細爬梳棉則大熟又農桑輯要作於元初當時便云木棉種陜右行之其他州郡多以風土不宜為解獨孟祺苗好謙暢師文王禎之屬能排貶其說至今率土享其利始信諸君子不我欺也木棉中國所傳木棉亦有多種江花出楚中棉不甚重二十而得五性强緊北花出畿輔山東柔細中紡織棉稍輕二十而得四或得五浙花出餘姚中紡織棉稍重二十而得七吳下種大都類此更有數種稍異者一曰黃蒂穰蒂有黃色如粟米大棉重一曰青核核青細於他種棉重一曰黑核核亦細純黑色棉重一曰寬大衣核白而穰浮棉重此四種皆二十而得九黃蒂稍强緊餘皆柔細中紡織堪為種又一種紫花浮細而核大棉輕二十而得四其布製衣頗朴雅市中遂染色以售不如本色者良又嘉種遺稙亦有漸變者如吉貝子色黑者漸白棉重者漸輕然其所由變者大半因種法不合間因天時水旱其緣地方而變者十有一二耳又南方用糊有二法其一先將棉繀作絞糊盆度過復於撥車轉輪作繀次用輕車縈回作絍吳人謂之漿紗其一先將棉繀入輕車成絍次入糊盆度過竹木作架兩端用繂急維竹帚痛刷候乾上機吳人謂之刷紗南布之佳者皆刷紗也今肅寧尚未作此亦緣風土髙燥塵沙坌起法當如前作窖令長二三十丈廣三四丈冒以長廊循檐作窗櫺開閣以避風日就中經刷或輕陰無風纎塵不起亦不妨移向平地若如此紡織其成布當盛吳下農桑通訣所載攪車用兩人今止用一人紡車容三繀今吳下猶用之間有容四繀者江西樂安至容五繀往見樂安人轉索其器未得更不知五繀向一手間何處安置也攪車圖說攪車用四木作框上立二小柱髙約尺五上以方木管之立柱各通一軸軸端俱用掉拐軸末柱竅不透二人掉軸一人喂上棉英二軸相軋則子落於內棉出於外比用碾軸工利數倍彈棉圖說彈弓以竹為之長可四尺許上一截頗長而彎下一截稍短而徑控以繩絃用彈棉英如彈氈毛法務使結者開實者虛假其功用非弓不可農政全書今以木為弓蠟絲為弦紡車圖說紡車之制比麻苧紡車頗小夫輪動弦轉莩繀隨之紡人左手握其棉筒不過二三續於莩繀牽引漸長右手均撚俱成緊縷就繞繀上欲作線織置車在左再將兩繀棉線合紡可為棉線擦條圖說擦條淮民用薥黍梢莖取其長而滑今他處多用無節竹條代之其法先將棉毳條於几上以此筳捲而扦之遂成棉筒隨手抽筳每筒牽紡易為勻細皆捲筳之效也經牀圖說經牀其制如所坐交椅但下控一軖四股軖軸之末置一掉枚上椅豎列入繀下引棉絲轉動掉枝分絡軖上絲絍既成次第脫卸比之撥車日得入倍始出閩建今欲傳之他方同趨省便線架圖說線架以木為之下作方座長濶尺餘臥列四繀座上鑿置獨柱髙可二尺餘柱上橫木長可二尺用竹篾均列四彎內引下座四繀紡於車上即成棉線舊法先將此繀絡於籰上然後紡合今得此制甚為速妙撥車圖說撥車其制頗肖麻苧幡車但以竹為之方圓不等特更輕便按舊說先將紡訖棉繀於稀糊盆內度過稍乾然後將棉繀頭縷撥於車上遂成棉絍欽定授時通考卷七十七
