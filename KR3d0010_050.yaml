body:
  text: 欽定四庫全書欽定授時通考卷五十勸課本朝重農御製詩文一聖祖仁皇帝御製農桑論嘗觀王政之本在乎農桑虞舜之命棄曰汝后稷播時百穀禹之告舜也曰政在養民水火金木土穀惟修殷之考績羣辟亦曰稼穡匪懈周以農事開基至成王之世制禮作樂典章明備彬彬郁郁然周公所作矇史所歌若豳風七月之篇其道于耜舉趾采桑載績之事反覆不置何前後聖同一指歟蓋農者所以食也桑者所以衣也農事傷則饑之原女紅廢則寒之原小民饑寒迫於身而欲其稱仁慕義有無不競遵路會極其勢不能朕嘗躬行三推以率天下農矣而敦實崇儉之令繩督有司靡不加意宜乎薄海以內襏襫之衆比肩於野杼柚之聲相聞於里庶幾古初醇朴之風乃逐末者未盡息而錦繡纂組之文日盛也中夜求治惄焉慮之孟子曰菽粟如水火而民焉有不仁㫖哉斯言使天下之民咸知貴五穀尊布帛服勤戒奢力田孝悌而又德以道之教以匡之禮以一之樂以和之將比户可封而躋斯世於仁夀之域故曰農桑王政之本也稼說朕嘗讀雅頌諸什其時之公卿大夫士罔不盡力於田畝而其東作西成之景至被諸管絃升歌清廟豈非以其事為國之大務耶間考其義若生民之詩茀厥豐草是去稼之害也甫田之詩或耘或耔是雍稼之本也良耜之詩荼蓼朽而黍稷茂是厚稼之生也其詳且盡若此朕軫念農業每巡省畿甸時而春也則觀其播種之函活時而夏也則觀其良苗之懷新時而秋也則觀其穀穗之穎栗堅好用以親民亦因假以自樂非若周成之於豳風徒得之矇誦而已然竊計其自春而夏而秋寒暑遞遷嗟我農人其間芟剃之功滋培之力蘊崇之方棄匪類而殖嘉禾如詩人所云者朝斯夕斯不遑啓處纍閲月而穀乃告登甚矣稼穡之艱習焉而後知之也雖然世顧有耕而得餒者原其初非不庤乃鎛播乃種而始勤終惰汚穢弗治稂莠弗剪苗在草間迄乎秋期十無一穫豈地土之不宜天時之不善哉咎在害稼罔辨而養夫稼者未博其功也噫治稼之道可通於治天下矣論井田三代井田之法寓兵於農正易所謂容民蓄衆也自兵農既分勢難復合後世有欲於曠閒之壤倣古行井田之法者不惟無補於民正恐益滋煩擾天下事興一利不如去一弊之為愈增一事不如省一事之為得也古者田以井授人皆自耕其田故室家殷阜而鮮失業遊食之民後世富室之田跨連阡陌貧民代為耕耨是以素無蓋藏一遇水旱遂致遊食四方流亡載道亦勢使然也捕蝗說嘗讀詩至大田之什曰去其螟螣及其蟊賊無害我田稚田祖有神秉畀災火則知古人之惡害苗也甚矣注曰食心曰螟食葉曰螣食根曰蟊食節曰賊昔人又云此四蟲皆蝗也而實不同故分别釋之且蝗之種類最易蕃衍故其為災在旬日之間夫水旱固所以害稼或遇其年禾稼被隴可冀有秋乃蝗且出而為災飛則蔽天散則遍野所至食禾黍苗盡復移㷀㷀小民何以堪此古人欲弭其災爰有捕蝗之法朕軫念民食宵旰不忘每於歲冬即布令民間令於隴畝之際先掘蝗種蓋是物也除之於遺種之時則易除之於生息之後則難除之於稚弱之時則易除之於長壯之後則難除之於跳躍之時則易除之於飛揚之後則難當冬而預掘蝗種所謂去惡務絶其本也至不能盡除而出土其初未能遠飛厥名曰蝻是當掘坑舉火以聚而驅之殱之昔姚崇遣使捕蝗以詩人秉畀炎火之說為證夜中設火火邊掘坑且焚且瘞蓋祖詩人遺意也又晨興日未出時露氣沾濡翅溼而不能飛掘坑以驅之尤易為力漢平帝時詔捕蝗者詣吏以斗石受錢朕區畫於衷務弭其害每歲命地方官吏督率農夫於冬則掘蝗蝻之種母俾遺育於土中或時而為災則參用古法多方以撲滅之計其所捕多寡給錢以示勸賞古人有言曰螟蝗農夫得而殺之為其害稼也以是觀之捕蝗之事由來舊矣但自古有治人無治法惟視力行何如耳茍奉行不力雖小災亦大為民患朕故詳指其義為說以示之祈穀壇頌有序嘗觀古之明王必嚴於敬天隆於尊祖誠於養人惟其敬天故饗帝尊祖故崇配養人故重農而上辛祈穀厥義備焉蓋隂陽順風雨調災沴不生五穀成熟斯比户可封然後寬刑簡賦導以禮樂躋之仁夀茍隂陽失序風雨不時則五穀傷矣五穀傷而民饑至矣修粢盛而奏馨聞將何藉焉豫肅將禋祀每遇薦享大典備極誠敬期於孚格蒼穹為羣黎禔福幸海內穡事浹歲順成即間遘微祲而補助旋施有秋洊至豈非上天粒我蒸民而默佑豫一人以無疆之休哉仰戴帝慈莫可名喻聊攄感忱作為頌曰皇矣上帝仁覆萬國靡物弗懷鑒於有德古聖聿修昭事建極元日殷薦爰祈粒食藐躬受命精意以禋大圻體方郊丘象圜屋而大享典禮均䖍外至必主本祖本天巍巍三聖陟降攸格盡志對越百神其懌曰潔豆籩曰崇圭璧匪祝一身為民請澤惟天鑒觀愛我兆人宜夏而夏宜春而春和風應節甘雨司辰災螟罔作瑞穗含醇豈止郊畿式暨五服畇畇疆理何土不淑嶷嶷黍稷何産不熟造化靳施伊誰能育啓蟄而耕納稼而場于耜于趾我倉我箱詎曰農夫實豫之慶上下交裕藉此豐穰民則不知豫敢忘賜湛恩汪濊頌思奚匱歲歲吉蠲竭誠肆類庶其眷之永錫樂利知稼軒銘史書大有惟國之瑞食為民天邦本所繫西苑有廬茅簷土砌風雨攸除桑柘蓊翳農祥乘春南榮晨涖歲云秋矣流火西次於焉占星以戒農事物養於䝉禾保於稚驗其勾萌在晦明際雷雨甲圻剛柔竝試灌溉為仁芟剃為義二者不廢穎栗可冀歲之歉穰人力是視儻違其時饑寒或遺閔兹農夫終歲勞瘁在昔有邰嘉種手藝採入豳吹咏及纎細用銘斯軒庶幾此志刈麥記塞外地寒最宜禾黍邇來中外一家版圖萬里朕避暑山莊歷年已多今百穀齊成與內地相似不過遲十數日而已故種麥者頗蕃山莊苑內麥穀黍稻皆寓焉從來稼穡之艱不可不知亦不可虛設朕念切民依痌瘝一體年近七旬精力漸衰扶杖而閲耕種臨畦而觀刈穫遇雨暘時若則收割之際蒼顔野老共慶有秋黃口稚子無愁乏食此朕一時之真樂也五十四年夏六月小暑乃苑中刈麥之候薦新觀成如雲表盛晨氣曖風秀􅀢標竒遠聞各省麥秋相同此目前之實景也孔子云吾不如老農老圃孟子云從其大體為大人從其小體為小人農夫足食則樂天下至廣兆民至衆天時之不齊地脉之不一吾之樂民有食也以目前之實景而且不能必其盡同又如此嗚呼豈如田野村夫憂樂止繫於身家而計慮不及於遠大乎故心之勞逸不可同日而語也夫春雨賦神籥絪縕化機和煦元氣上融醲膏下聚首五行者曰水潤萬物者曰雨于時蒼祗涖節青鳥司晨餘寒未斂禁火方新風輕揚以習習雲密布而鱗鱗垂九霄之嘉澍飛四野之甘津始觸石以吐液旋彌空而散澤初曵縷以吹絲繼緣霤而滴墀乍密還疏欲斷又續拂宇披檐挹川注谷既磅礴而淋漓亦瀰漫而滲漉戛綺埒之明璣流銅池之文縠木欣欣以向榮草萋萋而如沐若夫徂畛徂隰是蓘是穮塍麥漸秀田禾始苗廣地道之發育資土脉之沃饒雖沾體而塗足幸渥葉而濡條况乃灌溉神州濊汪赤縣無遠弗屆靡幽不遍灑郊牧而歡呼浹寰瀛而舞忭慶玉燭之長調喜豐年之屢見夫惟天地之德廣大無私春生夏長雲行雨施寓栽培於無意普美利於不知植品物以咸若含細大而莫遺所以解澤旁皇湛恩深厚覆被民生惠鮮隴畝興有淹於三陽敷仙霖於千耦世竝享夫豐亨俗咸登於仁夀洋洋乎造物之𢎞功豫一人乎何有桑賦并序朕巡省浙西桑林被野天下絲縷之供皆在東南而蠶桑之盛惟此一區近在宮中刻為耕織圖每示司牧使知其艱苦今更為賦以託意焉伊彼條桑其葉始荑春日載陽緑隂乃披紫陌上兮嫋嫋綺岸側兮垂垂來璧旭之晨照受光風之午吹影映帶兮青翰色倣佛兮翠旗既扶疏而相亞復低昻而參差念蠶事之欲動正芳候之如期聿兹女紅生計是賴采采盈筐慎加覆蓋虞日煦之少潤防雨頻之為害儻薄蘆之不繼時憂心之斾斾䖍飼食之維勤勞形神於塵壒摘曉露之輕滋乘良月之新薈望千畝之閒閒實蠶家之𢎞賚誠黼黻之必資繫衮職之用大其重等於苗稼為王政之不外豫恆恐其難知作深宮之圖繪至夫厥貢著於尚書沃若詠於篇什公室見說於禮經牆下屢申於孟集試古訓之歷稽又民務之應急若乃訝為神木騁以青華末照是晞甘椹如瓜馴雉表異黃鳥稱嘉雖景物之堪娛咸無關於大家夫其詫幢幢之髙蓋美亭亭之竒樹靈根依倚於十洲巨跡遂闢於周宇類齊諧之荒唐皆豫今日之所不取也聊因清晏簡牘是書用示遠邇是溉是鋤共知愛護種繞其廬蠶桑農穡安寶璠璵時巡近郊憫農事有作芳郊景物麗淑氣扇暮春靈雨應良節光風薄嘉辰省耕已屆候夙駕方來巡前驅列式道羽衛羅勾陳時有田間子荷耒披車塵譏訶勿頻數疾苦當咨詢千耦幸終畝二釜猶懸囷穮蓘爾勤動痌瘝豫隱親賙賜出泉府拊循屬官臣行潦有挹器冽井無枯津所惠良未遍嗛嗛愧斯人夏旱步禱南郊喜雨歷春憫農勞首夏望嘉穀離畢月故遲密雲去何速皓穹閟膏澤及此祈年夙齊居承穆清中夜起自肅繁星麗赤霄雲漢光自煜雞鳴開重闉輿馬輟華轂步禱升郊壇祠官啓太祝是時甘澍零霑潤及拜伏空濛迫閶闔噴薄驅海瀆屏翳灑道回滲漉足裳服麥隴應秀色重穎欲在目願惟歌屢豐餘粟棲比屋秋日出郊觀稼秋色日寥迥萬象皆蒼蒼朝暾被渥露草木含晶光西成方屆候農事將築場於焉省斂穫令典重百王輕軒屏前置夙駕無嚴裝郊原一以眺煙樹紛成行微風散深樾清流抱回塘土脉秀且沃篝車鬱相望新鐮粲如月刈此溪雲黃捃拾復何幸遺秉滿道旁鳥雀互翔集婦子咸悅康行將吹葦籥報爾千斯箱眷言三時勤艱難詎可忘茫茫視九壤豈盡歌豐穰二釜茍不充豫饑惄如傷幸兹樂有年時若雨與暘朂哉慎所麗田功庶無荒喜雨詩十六韻并序朕撫御天下每以民生為念夙興夜寐無時少懈也歲在丁卯自春涉夏蘊隆少雨日更增甚麥秋期至農事堪憂傳曰龍見而雩謂建巳之月萬物始盛待雨於天今當雨不雨或人事之未修朕躬之有過歟亟命重臣凡國計憂戚刑名錢穀但有關於民者再三講究有言在京臣工鐫級過多皆賜復還可以致雨以及戲館秧歌之細事無不曲盡議論迄於五月憂心如焚減膳撤樂端居省過將以明詔布告天下思所以挽回天意詔下旬有餘日或膚雲方集輒阻燥風或微霂才施旋升杲日昔人遇災而懼側身修行欲銷去之况兹不雨乎朕以凉德臨億兆之上為民之誠天日可鑒欲躬詣郊壇致祭諸臣亦以為請因命禮官諏吉具儀齊戒肅穆步禱上帝始齊之晚密雨濡潤祭之日雷雨交作自兹間日而雨遍四郊田野霑足朕先憂而飲食俱廢者為民也既雨之後喜而舉手加額者亦為民也今天不遺斯民禱而賜之雨使得不愧三公九卿之請朕之幸矣故賦喜雨詩以抒其懷體國為民事憂勤固在斯驕陽春既盛膏澤夏愆期省刑書每下請雨令頻施雲未油然作風偏颯爾吹芃芃苗欲槁細細草將萎翹首瞻青漢焦心對赤墀圜扉重舉滯旃厦幾疇咨齊祭祈神鑒精誠只已知誰云天最遠於是聽能卑默處敬居日恭䖍步禱時微衷慙上格大化喜潛移雱霈滋南畝飄灑遍九逵靉靆隂陽協滂沱渥澤垂田家還自樂朝野共吟詩從此煩襟滌由來百志熙願同兹砥礪參贊奉無私蠲江南逋賦并序江南屢年逋賦二百二十餘萬逐歲帶征聞吏民頗以為纍朕志存約已𢎞浣衣菲食之風事期裕民師挹彼注兹之義特頒詔令悉與蠲除國家財賦東南重已責蠲租志念殷膏澤何妨頻見渥普天願與樂耕耘憂旱憶民事作仲夏炎曛盛德凉時未和驕陽因六事亢旱最三河三河為天下之中民以食為重天將風更多憂勤難暇顧惟誦憫農歌菜畦東南農事已春深菜隴花開滿地金獨愛小民勤力作馬頭堪慰省方心桑林乍緑蠶事方興詩以嘉之彌望桑林吐葉垂枝嫩碧初勻竹舍正殷蠶務天工雨露維均暢春園觀稻時七月十一日也七月紫芒五里香近園遺種祝禎祥炎方塞北皆稱瑞稼穡天工樂歲穰靜明園喜雨西山初夏玉泉清暮雨隨風滿鳳城四野皆霑比屋慶八荒盡望樂豐盈岸側桑葉初碧夾岸青青繞御舟濃桑初茁滿村謳省方便問蠶家苦春雨連綿盡日憂麥秋盈野志喜有序歲次癸未夏至有事於方澤齊戒自暢春園進宮見麥氣盈秋田園茂盛雨暘得時稼穡有望從來北方雨澤豔陽清和之際每每難得皆因去冬陰雪連綿自春至夏未缺甘霖所以草木花果罔不豐榮人心穀價罔不和平故志喜而為詠去冬盈尺雪占年今夏翛翛麥隴全萬畝皆齊誕降穀千家秀實已登阡先憂暘雨惟民疾後樂時豐紀玉箋志喜雕蟲晚學愧薰風南至影花甎康熙四十二年夏秋間恆雨為菑山左尤甚朕夙夜靡寧宵旰焦勞減膳撤樂坐不安席自冬至夏自夏至秋未嘗晷刻少安雖設法拯救幾乎難保幸四十三年二麥大熟秋成頗佳饑者未轉溝壑窮者皆得衣食實非朕之凉德所感賴上天之所鑒祐也故喜而不寐作長歌以示璇璣玉衡齊七政祇懼敏德天眷命百志惟熙亮天工六府三事須主敬天地無私本至公人事有違失五正水旱從來不可測全賴有司勉安定癸未夏秋恆雨頻二麥秋禾皆沒淪州縣無䇿萬姓逃父子流離呼蒼旻奏書紛紛連早夜手書的的察憂貧蠲賦蠲賑詔數下民食維艱豈不詢截漕施惠恐不及遣官分養誡沾均人力雖盡惟時難唯天至仁不絶食甲申春夏風雨調麥隴翛翛衆喘息夏苗遍野雙穗多輿情顔解去菜色山左編氓閒且樂畿南黎庶喜而康從此休息須謹慎防災備患豈有傷間邪存誠勉官吏清廉奉職守封疆民脂民膏供爾祿痛癢莫知誤籌量宗子家相同胞義勿使叢脞述職方五月上旬避暑熱河塗中喜麥秋盈野雨暘得時賦七言一律畏暑乘輿出鳳城麥秋預卜望庚晴千村共飽連年稔萬井同歡比屋盈谷有靈泉山脉壯道無峻嶺馬蹄輕移風易俗先忠孝蕃息編氓在厚生舟中觀耕種四野春耕阡陌安徐牽密纜望河干土肥原係黃沙過永定河泛濫之際遍地黃水自治河之後得以耕種辛苦先年挽異瀾五十五年正月十二癸卯立春是日風從東北而至景雲密布瑞雪鋪地至十三日未止書云立春與元日同占乃收成之兆故喜民有足食之慶朕慰宵旰之憂賦五言排律以紀其事問夜何嘗歇殷勤六十年歲華催短鬢寸晷惜擔肩豐歉無推數平成在事先人安為國瑞穀熟是民天慚撫陶甄治思將法令蠲雲濃春氣早風靜漏聲傳南陌銀花遍東郊繡壤連管絃喧里巷燈火接山川不為私情擾寧耽寶饌延祇期民俗厚敢詡治功全禮讓傳家教詩書戒往愆翠煙籠畎畝泛泛潤桑田去歲三冬有雪至三月間農忙之際二十七日夜雨竟夕喜而成詠滋麥如酥雨空濛入土膏心同黎庶苦目盼紫壇髙任器已知重安人寧避勞春愁暫且釋㸃㸃付揮毫賦得隴麥節遲穀雨後田麥始分畦已送花開盡難將春事稽純陽時序近餘潤化成齊未卜陰晴適先期輯庶黎小滿後偶旱塗中祈雨四月二十三日甘霖大霈夙夜愁懷春夏間天時難信未怡顔平原晚麥纎莖槁四野新禾旱色殷乍起雲光連嶺岫先垂雨腳遍人寰共沾甘澍敷膏澤民食方知稼穡艱題新安道上滿目平川映遠空身形少健一衰翁社前荷鍤爭春暖隴畔扶犂趂晚風雨澤深邀天地德耕桑還賴穡人功京南每出同村叟總得陽和一氣中久旱無雨夙夜倣徨夏至前方得普霑喜雨雖云快豈無久旱由望雲待旦起問夜數更愁霹靂偏稽候雷遲小滿後方有聲風霾任作尤西成登穀後方慰憫農憂豐登者朕之獲福歉收者朕之失政出此入彼不能自恕故作近體一律喜雨人同我不然鰓鰓宵旰待豐年千村時若千村慶一日恆𤾉一日愆率土盈寧難並得普天恩澤豈兼全先憂後樂何能遂衰景殘齡秖自憐京中報到霖雨普霑亢陽愁久旱霖雨滿溝渠倐忽枯枝潤須臾卷葉舒千村勤襏襫萬頃促犁鋤企望收成後欣看穀賤書世宗憲皇帝御製孟秋扈蹕觀稼恭紀殿角微凉起豳歌大火流蓮房新墜粉梧葉早驚秋玉露滋芳甸金風入畫樓聖心勤稼穡躬自省西疇田家即事二首沙磧髙低禾黍盈羣飛銅雀繞田鳴竹弓蒿矢堪驅嚇漫向黃雲試射聲其二戍烽罷舉息征塵肆力耕耘屬幸民榆桞陰踈秋社近緣邊笳鼓賽田神扈駕觀麥雨潤郊原奉豫遊勤民御輦向西疇搖空翠浪沄沄起覆隴黃雲冉冉浮三白降穰占歲稔兩岐擢秀應農謳佇看比屋連耞動擊壤聲中麥有秋田家四時詞六言春陌頭楊桞初放溪上桃花欲燃處處青鳩呼雨家家黃犢耕煙牧童羣嬉挑菜餉婦自解撑船借問浪遊城市何如樂業村田夏帶露葉盈蠶箔翻雲麥熟田家白水千塍秧馬緑隂幾户繅車日午鳴蟬遠近風薰飛燕橫斜男女適均勞逸相逢只說桑麻秋風露微凉天氣四鄉一派秋光蕎吐東阡雪白禾香南畝雲黃青刈園蔬足雨紅收林實經霜舉室欣逢樂歲商量築圃登場冬靄靄炊煙茆舍霏霏臘雪柴門闌靜閒眠羔犢籬牢安穩雞豚夜織梭鳴啞軋朝春杵韻喧繁賽社爭撾祭鼓歌呼新釀盈盆耕茅屋踈籬翠蔓牽繞籬桑柘翳平田村中斑白閒無事隴上青黃喜有年比户機梭鳴月下一家兒女聚燈前那能更羡公侯貴蟹美魚肥稻熟天耕織軒軒亭開面面原隰對畇畇禾稼迎窗緑桑麻窣地新簷星窺織火渠水界田畛辛苦農蠶事歌詩可繫豳菜圃鑿地新開圃因川曲引泉碧畦一雨過青壤百蔬妍潔愛沾晨露鮮宜潤晚煙倚亭閒佇覽生意用欣然耕藉農事惟邦本先民履畝東翠華臨廣陌綵軛駕春風禮備明神格年期率土豐勸耕時厪慮敢為惜勞躬三月三日得雨三春淑氣動萌荄膏雨知時四野皆東作共看霑溉足西成咸慶歲時諧柔桑陌上青含秀稚麥田間緑正佳竚覽霏霏飄灑意眷豫兆庶少抒懷耕藉詩有序禮天子為藉千畝躬秉耒以耕所以敬祀典重農功示先民也稽之月令每歲孟春古帝王實從事焉我聖祖冲齡踐祚越十一載壬子始行耕藉禮夫藉以敬天重農而聖祖在位六十餘年宵旰憂勤靡時或釋凡立心行政蓋無刻而非寅畏昭事之誠無事而非勞民勸相之實也是以家給人足時和年豐而成長治久安之天下朕繼統之次年甲辰春既率屬僚躬藉南郊今歲乙已復舉行焉是日也靈雨既零春陽初霽履我阡陌秉我耒耜三推禮成兆庶歡洽傳曰先之勞之又曰無倦斯典也朕非欲為一時之盛觀亦非欲博千載之美名况大典非炫耳目之具而飾名之事又朕素所弗為惟是祇承聖祖重農家法率吾民敦崇本務而與臣工敬勤無倦以庶幾康阜之成俗也并紀以詩蒼馭千官引乘時事藉田從來重稼穡何敢惜勞先履畝迎膏發羣公繼耦聨所祈同億兆歲歲介豐年耕藉無逸農功重豳風穡事先方春勤夙駕乘令為親田夾隴千官肅扶犁百辟聨禮成終畝後父老慶豐年喜雪夙夜期瓊屑三冬日見晴省修求直諫祈禱秉精誠瑞雪春時降彤庭喜氣盈蒼旻仁愛普億兆荷生成朕因去冬未雪憂懷莫釋夙夜竭誠祈禱於驚蟄後二日荷䝉上天鑒佑春雪下降朝野同歡因成一律用志欣慶霡霂愆期憂歲儉臨軒愁詠憫農歌三冬望雪心如渴此日飛霙氣始和蒼昊垂慈施愷澤黔黎有幸沐恩波遙思九土應同慶積素凝華知幾多多稼軒勸農詩夜來新雨過畿甸緑平鋪克盡農桑力方無饑凍虞蠶筐攜織婦麥飯飽田夫坐對春光晚催耕聽鳥呼欽定授時通考卷五十
