front:
  text: 欽定四庫全書欽定授時通考卷三十三
  hash: sha256:a3e270411eb9a017ec9acf28a76781f25a407a6ff4c04ba5e1b59f7ca94ea1d6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3d0010_WYG_033-1a, image: WYG0732/WYG0732-0414a.png}
body:
  text: 功作耙勞大戴禮夏小正正月農率均田率者循也均田者始除田也言農夫急除田也二月往耰黍禪禪單也吕氏春秋畝欲廣以平甽欲小以深下得隂上得陽然後咸生熟有耰也必務其培其耰也植植者其生也必先其施土也均均者其生也必堅是以畝廣以平則不喪本鹽鐵論茂木之下無豐草大塊之間無美苗齊民要術耕荒畢以鐡齒􅘜􅜒再遍耙之又春耕尋手勞古曰耰今曰勞今人亦名曰摩秋耕待白背勞春多風若不尋勞地必虗燥秋田㙷實㙷勞令地硬勞欲再再勞地熟旱亦保澤也又速鋒之地恆潤澤而不堅硬乃至冬初常得耕勞不患枯旱若牛力少者但九月十月一勞之又自地亢後但所耕地隨向蓋之待一段總轉了即橫蓋一遍計正月二月兩個月又轉一遍然後納種又每耕一遍蓋兩遍最後蓋三遍還縱橫蓋之又苗既出壟每一經雨白背時輒以鐡齒􅘜􅜒縱橫耙而勞之陳敷農書種穀必先治田於秋冬即再三深耕之於始春又再三耕耙又五月治地惟要深熟於五更乘露鉏之五七遍即土壤滋潤纍加糞壅又復鉏轉種蒔直説古農法犁一􅦥六今人只知犁深為功不知􅦥細為全功􅦥功不到土粗不實下種後雖見苗立根在粗土根土不相著不耐旱有懸死蟲咬死乾死等諸病􅦥功到土細又實立根在細實土中又碾過根土相著自耐旱不生諸病又凡地除種麥外並宜秋耕先以鐡齒􅦥縱橫然後插犁細耕隨耕隨勞至地大白背時更􅦥兩遍至來春地氣透時待日髙復耙四五遍其地爽潤上有油土四指許春雖然無雨至時便可下種農桑通訣凡治田之法犁耕既畢則有耙勞耙有渠疏之義勞有蓋磨之功今人呼耙曰渠疏勞曰蓋磨皆因其用以名之斫以散撥去芟平土壤也􅦥勞之功不至而望禾稼之秀茂實栗難矣凡耕荒畢以鐡齒􅘜􅜒再遍耙之蓋鐡齒􅘜􅜒已為之先再用耙􅘜􅜒而後勞之也今人但耕地畢破其塊墢而後用勞平磨乃為得也凡已耕耙欲受種之地非勞不可諺曰耕而不勞不如作暴然耙勞之功非但施於納種之前有用之於種苗之後者耙法令人坐上數以手斷其草草塞齒則傷苗如此令地熟軟易鋤省力此用於種苗之後也南方水田轉畢即耙耙畢即耖故不用勞其耕種陸地者犁而耙之欲其土細再犁再耙後用勞乃無遺功也北方又有所謂撻者與勞相類齊民要術云春耕欲深宜曵重撻今人凡下種耬種後惟用砘車碾之然執耬種者亦須要繫輕撻曵之使壟土覆種稍深也或耕過田畝土性虗浮者亦宜撻之打令土實也今當耕種用之故附於耙勞之末然南人未嘗識此蓋南北習俗不同故不知用撻之功至於北方逺近之間亦有不同有用耙而不知用勞有用勞而不知用耙亦有不知用撻者今並載之使南北通知隨宜而用無使偏廢然後治田之法可得論其全功也各種耕耙法稻汜勝之書種稻春凍解耕反其土齊民要術稻無所緣惟歲易為良選地欲近上流地無良薄水清則稻美先放水十日後曵陸軸十遍遍數惟多為良北土髙原本無陂澤隨隈曲而田者二月氷解地乾燒而耕之仍即下水十日塊既散液持木斫平之畦埒大小無定須量地宜取水均而已乂旱稻用下田白土勝黑土凡下田停水虗燥則堅垎濕則汙泥難治而易荒墝埆而殺種其春耕者殺種尤甚故宜五六月暵之水潦不得納種者九月中復一轉至春種稻萬不失一春耕者十石收五蓋誤人耳又凡種下田不問秋夏候水盡地白背時速耕耙勞頻煩令熟過燥則堅過雨則泥所以宜速耕其髙田種者不求極良惟須廢地過良則苗折廢地則無草亦秋耕耙勞令熟又旱稻種即再遍勞其土黑堅強之地種未生前遇旱者欲得牛羊及人履踐之濕則不用一迹入稻既生猶欲令人踐壟背踐者茂而多實也每經一雨輒欲耙勞農桑輯要治秧田須殘年開墾待氷凍過則土脈酥來春易平且不生草天工開物凡稻田宜本秋耕墾使宿藁化爛敵糞力一倍一耕之後勤者再耕三耕然後施耙則土質勻碎而其中膏脈釋化也凡人力窮者兩人以扛懸耜項背相望而起土兩人竟日敵一牛之力若耕後牛窮製成磨耙兩人肩手磨軋一日敵三牛之力田家五行種稻須犁耙三四遍粱秫齊民要術粱秫並宜薄地地良多雉尾燥濕之宜耙勞之法一同穀苗羣芳譜粱種地欲肥耕欲細欲深秋耕更佳先耙後種種後旋以碌碡碾令土堅又蜀秫宜卑下地農桑通訣薥秫宜下土黍齊民要術凡黍穄田新開荒為上大豆底為次穀底為下地必欲熟再轉乃佳若春夏耕者下種後再勞為良又種黍地刈黍子即耕兩遍又苗生隴平即宜耙勞稷齊民要術凡榖田榖粟也粟榖五榖之總名然今人専以稷為榖隨俗名之耳菉豆小豆底為上麻黍胡麻次之蕪青大豆為下常見瓜底不減菉豆本既不論聊復寄之穀田必須歲易䬇子則秀多而收薄矣陳敷農書種粟必碾以轆軸則地緊實科本鬯茂麥齊民要術大小麥皆須五月六月暵地不暵地而種者其收薄崔實曰五月一日蕃麥舊也穬麥非良地則不須種薄地徒勞種而必不收凡種穬麥髙下田皆得用但必須良熟耳小麥宜下種歌曰髙田種小麥稴穇不成穗徐光啓曰北方有水處即髙地種之亦可灌也南方下地種之又畏濕又凡種小麥地以五月內耕一遍看乾濕轉之耕三遍為度種樹書種麥之法土欲細溝欲深耙欲輕法天生意六月初旬五更時乘露未乾陽氣在下耕地牛得其涼耕過稀種菉豆七月間豆有花犁翻豆秧入地麥苗易茂農政全書種大麥旱稻收割畢將田鋤成行隴令四畔溝洫通水又耕種麥地俱須晴天若雨中耕種令土堅垎麥不易長南方種大小麥最忌水濕每人一日只令鋤六分要極細作隴如龜背冬月宜清理麥溝令深直㵼水即春雨易泄不浸麥根理溝時一人先運鋤將溝中土耙墾鬆細一人隨後持鍬鍬土勻布畦上溝泥既肥麥根益深矣豆齊民要術大豆地不求熟秋鋒之地即摘種地過熟者苗茂而實少刈訖則速耕大豆怕雨秋不耕則無澤種茭者用麥底用子漫散訖犁細淺埒而勞之旱則糞堅葉落稀則苗莖不髙深則土厚不生若澤多者先深耕訖逆垈擲豆然後勞之澤少則否為其浥鬱不生又小豆大率用麥底然恐小晚有地者常須兼留去歲榖下以擬之熟耕耬下以為良澤多者耬耩漫擲而勞之未生白背勞之極怪漫擲犁埒次之􅀈種為下牛力若少得待春耕亦得􅀈種凡大小豆生既布葉皆得用鐵齒􅘜􅜒縱橫耙而勞之脂麻齊民要術胡麻宜白地種散子空曵勞勞上加人則土厚不生羣芳譜種植須肥地荒地亦可蕎麥農桑輯要凡蕎麥五月耕經三十五日草爛得轉並種耕三遍假如耕地三遍即三重著子耙勞具各圖説人耙方耙耖勞碌碡礰礋拖車田蕩刮板平板梧桐角耙圖説耙又作爬又謂渠疏桯長可五尺濶約四寸兩桯相離五寸許其桯上相間各鑿方竅以內木齒齒長六寸許其桯兩端木括長可尺三前稍微昂穿兩挶以繫牛挽鈎索此方耙也又有人字耙鑄鐡為齒齊民要術謂之鐵齒􅘜􅜒凡耙田人立其上入土則深又當於耙頭不時跂足閃去所擁草木根荄水陸俱必用之耖圖説耖疏通田泥器也髙可三尺許廣可四尺上有橫柄下有列齒以兩手按之前用畜力挽行一耖用一人一牛有作連耖二人二牛特用於大田見功又速耕耙而後用此泥壤始熟矣勞圖説勞無齒耙也耙梃之間用條木編之以摩田也耕者隨耕隨勞又看乾濕何如務使田平而土潤與耙頗異耙有渠疏之義勞有蓋摩之功也今名勞曰摩又名蓋凡以耕耙欲受種之地非勞不可碌碡圖説碌碡又作䃙碡字皆從石恐本用石也然北方多以石南人用木蓋水陸異用亦各從其宜也其制長可三尺大小不等或木或石刋木括之中受簨軸以利旋轉又有不觚稜混而圓者謂混軸俱用畜力挽行以人牽傍􅀈打田疇土磈易為破爛及碾捍場圃間麥禾即脫浮穗水陸通用之礰礋圖説礰礋又作􅩯礋與碌碡之制同但外有列齒獨用於水田破塊滓溷泥塗也拖車圖説拖車即拖腳車也以腳木二莖長可四尺前頭微昂上立四簨以橫木括之濶約三尺髙及二尺用載農具及芻種等物以往耕所有就上覆草為舍取蔽風雨耕牛挽行以代輪也田蕩圖説田蕩均田器也用叉木作柄長六尺前貫橫木五尺許田方耕耙尚未勻熟須用此器平著其上蕩之使水土相和凹凸各平則易為秧蒔農書種植篇云凡水田渥漉精熟然後踏糞入泥蕩平田靣乃可撒種此亦蕩之用也夫田蕩與耘蕩之蕩字同音異所用亦各不類因辨及之刮板圖説刮板剗土具也用木板一葉濶二尺許長則倍之或煆鐵為舌板後釘木直二莖髙出板上概以橫柄板之兩傍係一鐵鐶以鐶拽索兩手推按或人或畜挽行以剗壅腳土凡修閘壩起堤防填汙坎積丘垤均土壤治畦埂疊場圃聚子粒擁粳籺除瓦礫俱可用然農家之事居多也平板圖説平板平摩種秧泥田器也用滑面水板長廣相稱上置兩耳繫索連軛駕牛或人拖之摩田須平方可受種既得放水浸漬勻停秧出必齊田家或仰坐凳代之終非本器梧桐角圖説梧桐角浙東諸鄉農家兒童以春月捲梧桐為角吹之聲遍田野前人有村南村北梧桐角山後山前白菜花之句狀時景也則知此制已久但故俗相傳不知所自蓋音樂主和寓之於物以假聲韻所以感陽舒而蕩隂鬱道天時而達人事則人與時通物隨氣化非直為戲樂也欽定授時通考卷三十三
