body:
  text: 農餘蔬四生薑椒川椒崖椒蔓椒地椒胡椒番椒茴香八角茴香蒔蘿韭山韭水韭葱蒜水晶葱薤韭山薤野薤蒝荽野蒝荽苜蓿生薑薑禦濕之菜也苗高二三尺葉似箭竹葉而長兩兩相對苗青根嫩白老黃無實處處有之漢溫池州者良三月種五月生苗如初生嫩蘆而葉稍濶葉亦辛香秋社前後新芽頓長如列指狀采食無筋尖微紫名紫芽薑又名子薑秋分後者次之霜後則老性惡濕畏日秋熱則無薑氣味辛微溫無毒通神明辟邪氣益脾胃散風寒除壯熱治脹滿去胸中臭氣解菌菌諸毒生用發熱熟用和中留皮則凉去皮則熱八九月多食春多患眼孕婦忌食令兒盈指羣芳譜種植宜白沙地少與糞和種熟耕縱橫七八遍佳清明後三日種濶一步作畦長短隨地橫作壠壠相去一尺深五六寸壠中安薑一尺一科帶芽大三指蓋土三寸覆以蠶沙無則用熟糞雞糞尤妙芽出後有草即耘漸漸以土蓋之已後壠中却令高不得去土為芽向上長也芽長後從旁揠去老薑耘鋤不厭數五六月覆以柴棚或插蘆蔽日不耐寒熱八月收取九月置暖窖中寒甚作深窖以糠粃和埋暖處勿凍壞來年作種齊民要術崔實曰清明節後十日封生薑至四月立夏後蠶大食芽生可種之九月藏茈薑蘘荷其歲若溫皆待十月生薑謂之茈薑吳下田家志種薑宜甲子乙丑辛未壬申壬午椒椒一名花椒一名大椒一名檓爾雅云檓大椒注云實大者名為檓一名秦椒以産自秦地故名今北方秦椒另有一種今處處有之椒禀五行之精葉青皮紅花黃膜白子黑氣香最易蕃衍枝間有刺扁而大葉對生形尖有刺堅而滑澤四月開細花五月結子生青熟紅為油亦可食微辛甘晉中人多以炷燈閉口者殺人五月食損氣傷心令人多忘中毒者凉水麻仁漿解之陸璣詩疏椒樹似茱萸有針刺葉堅而滑澤蜀人作茶吳人作茗皆合煮其葉以為香今成臯諸山間有椒謂之竹葉椒其樹亦如蜀椒少毒熱不中合藥也可著飲食中東海諸島亦有椒樹枝葉皆相似子長而不圓甚香其味似橘皮齊民要術熟時收取黑子俗名椒目不用人手數近促之則不生也四月初畦種之治畦下水如種葵法方三寸一子篩土覆之令厚寸許復篩熟糞以蓋土上旱輒澆之常令潤澤生高數寸夏連雨時可移之移法先作小坑圓深三寸以刀子圓􅟮椒栽合土移之於坑中萬不失一若拔而移者率多死若移大栽者二月三月中移之先作熟穰泥掘出即封根合泥埋之行百餘里猶得生此物性不耐寒陽中之樹冬須草裹不裹即死其生於隂中者少禀寒氣則不用裹一木之性寒暑易容所謂習以性成候實口開便速收之天時晴摘下薄布曝之令一日即乾色赤椒好若隂時收者色黑失味其葉及青摘取可以為菹乾而末之亦足充事務本新書三鄉椒種秋深熟時㨂粒秋深摘下隂乾將椒子包裹掘地深埋春暖取出向陽掘畦種之二年後春月移栽樹小時冬月以糞覆根地寒處以草裹縛次年結子椒不歇條一年繁勝一年農政全書中伏後晴天帶露收摘忌手捻隂一日曬三日則紅而裂遇雨薄攤當風處頻翻若㷈則黑不香若收作種用乾土拌和埋於避雨水地內深一尺勿令水浸生芽其自開口者殺人羣芳譜種植先將肥潤地耕熟二月內取子種之以糞灰和細土覆蓋則易生此物乃陽中之隂不耐寒冬月草苫免致凍死來年分栽離七八尺用麻籸灰糞和細土栽忌水浸根又宜焦土乾糞壅培遇旱用水澆灌三年後換嫩枝方結實以髮纒樹根或種香白芷或種生菜皆辟蛇食椒川椒附本草川椒一名巴椒一名蜀椒一名南椒一名蓎藙一名㸃椒一名含丸使者見陶穀清異録蘇頌云木高四五尺似茱萸而小有針刺葉堅而滑可煮飲食四月結子無花但生於枝葉間顆如小豆而圓皮紫赤色李時珍曰蜀椒子光黑如人之瞳人故謂之椒目羣芳譜川椒肉厚皮皺粒小子黑外紅裏白入藥以此為良他椒不及也崖椒附本草崖椒一名野椒不甚香子灰色不黑無光蔓椒附本草蔓椒一名猪椒一名豕椒一名彘椒一名豨椒一名狗椒一名金椒野生林箐間枝軟如蔓子葉皆似椒山人亦食之地椒附本草地椒出上黨郡其苖覆地蔓生莖葉甚細花作小朵色紫白因舊莖而生即蔓椒之小者胡椒附本草胡椒一名昧履支向隂生者名澄茄向陽生者名胡椒西陽雜俎胡椒生西戎摩伽拖國其苗蔓生莖極柔弱葉長寸半有細條與葉齊條上結子兩兩對其葉晨開暮合合則裹其子於葉中子形似漢椒至芳辣六月採農政全書今其種已遍中國為日用之物矣番椒附草花譜番椒叢生白花子似秃筆頭味辣色紅甚可觀子種茴香茴香一名蘹香本草云俚俗多懷之襟袵咀嚼懷香之名或以此宿根深冬生苗作叢肥莖緑葉五六月開花如蛇牀花而色黃子如麥粒輕而有細稜俗呼為大茴香近道人家園圃種者甚多以寧夏者為第一其他處小者名小茴香辛平無毒理氣開胃夏月祛蠅辟臭煮臭肉下少許即不臭臭醬入末少許亦香故曰茴香羣芳譜種植收時隂乾宜向陽地以糞土和子種之仍種麻一窠以避日色十月斫去枯梢以糞土壅根下八角茴香附茴香自番舶來者實大如柏實裂成八瓣一瓣一核大如豆黃褐色有仁味更甜俗呼舶茴香又曰八角茴香廣西左右江峒中亦有之形色與中國茴香迥别但氣味同耳蒔蘿附本草蒔蘿一名慈謀敕一名小茴香羣芳譜云蒔蘿初生佛誓國今嶺南及近道皆有之三四月生苗開花其子簇生狀如蛇牀子而短微黑芳辛不及茴香善滋食味多食無損健脾開胃下氣利膈溫腸殺魚肉毒補水臟治腎氣壯筋骨治小兒氣脹霍亂嘔逆腹冷不下食兩肋痞滿忌同阿魏食奪其味也韭韭說文云一種而久者故謂之韭象形在一之上一地也一名豐本曲禮云韭曰豐本一名起陽草一名草鍾乳本草拾遺云言其溫補也一名懶人菜爾雅翼曰諺云韭者懶人菜以其不須歲種也莖名韭白根名韭黃花名韭菁叢生豐本長葉青翠八月開小白花成叢醃作茹益人詩豳風四之日其蚤獻羔祭韭禮記王制庶人春薦韭夏小正正月囿有韭宋史食貨志男女十歲以上種韭一畦濶一步長十步乏井者鄰伍為鑿之齊民要術收韭子一如收葱子法如市賣者宜試之以銅鐺盛水加於火上微煮須臾芽生者可種芽不生者是裛鬱矣治畦下水糞覆悉與葵同畦欲極深韭一剪一加糞又根性上跳故須深也羣芳譜韭根多年交結則不茂秋月掘出去老根分栽壅以雞豬糞亦可子種可生可熟可淹可久菜之最有益者是處有之葉高三寸便剪剪過糞土壅培之剪忌日中一年四五剪留子者止一剪子黑而扁九月熟收子風中隂乾勿令浥鬱韭葉熱根溫功用同生則辛而散痰散血熟則甘而補中補腎除熱下氣益陽止瀉子甘溫暖膝腰春食香夏食臭多食昏神暗目不可與蜜及牛肉同食熱病後十日食之即發冬月多食動宿飲吐水酒後尤忌宿韭忌食五月食韭損人北人冬月移根窖中養以火坑培以馬糞葉長尺許不見風日色黃嫩謂之韭黃味甚美但不益人多食滯氣發病又種植土欲熟糞欲勻畦欲深二月七月種先將地掘作坎取碗覆土上從碗外落子以韭性向內生不向外生也常薅令淨四時類要云收韭子種韭第一番割棄之主人勿食事類書云韭畦用雞糞尤佳至五年根必滿蟠虯而不長擇高腴地分種之正月上辛日掃去畦中陳葉以鐵杷摟起下水加熟糞高三寸便剪用凡近城郭有園圃者種三十餘畦貿易足供家費秋後又可採韭花供蔬茹至冬養韭黃比常韭易利數倍或只就畦中覆以馬糞北面竪籬障以禦北風至春其芽早出長二三寸便可賣較之他菜為利甚溥吳下田家志種韭宜甲子辛未己卯辛巳甲申辛卯山韭附爾雅蒮山韭疏韭生山中者名蒮本草山韭一名韱音纖形性與家韭相類但根白葉如燈心苗山中往往有之水韭附北戶録水韭生池塘中葉似韭字林云簽音嚴水中野韭也羣芳譜有二三尺者五六月堪食不葷而脆葱葱一名芤本草云草中有孔故字從孔一名菜伯一名和事草清異録云葱和羔衆味若藥劑必用甘草也所以文言曰和事草一名鹿胎初生曰葱針葉曰葱青衣曰葱𫀆莖曰葱白葉中泲曰葱苒葉溫白與鬚平味辛無毒有數種一種凍葱即冬葱夏衰冬盛莖葉氣味俱軟美食用入藥最善分莖栽蒔而無子人稱慈葱又稱大官葱謂宜上供也一種漢葱本草云一名木葱其莖粗硬故有木名春末開花成叢青白色冬即葉枯亦供食品胡葱生蜀郡山谷狀似大蒜而小形圓皮赤葉似葱根似蒜味似薤不甚臭八月種五月收一名蒜葱又名回回葱莖葉粗硬茖葱山葱也生於山谷似葱而小細莖大葉爾雅云茖山葱疏云葱生山中者名茖生沙者名沙葱又有一種樓葱亦冬葱之類江南人呼為龍角葱龍爪葱羊角葱皮赤莖上生根移下種之每莖上葉出岐如八角故名葱白辛葉溫根鬚平主發散是處皆有生熟皆可食更宜冬月戒多食四月每朝空心服葱頭酒調血氣正月忌食令人面起游風生同蜜食作下利燒同蜜食壅氣殺人生合棗食令人病合犬雉肉食多令人病血服地黃常山人忌用禮記曲禮葱泄處末注泄蒸葱也內則膾春用葱秋用芥脂用葱又切葱若薤實諸醯以柔之四民月令三月别小葱六月别大葱夏葱曰小冬葱曰大羣芳譜種植子味辛色黑作三瓣狀有皺紋收取隂乾若令浥濕則不生留春月調畦種良地三剪薄地再剪剪宜平旦避熱宜與地平勿太深太高八月止不止則無袍而損白凡栽葱曬稍蔫將冗鬚去淨疏行密排猪雞鴨糞和粗糠壅之不拘時冬葱暑種則茂吳下田家志種葱宜甲子甲申己卯辛未辛巳辛卯蒜蒜一名葫以來自番中又稱胡蒜一名大蒜一名葷菜葉如蘭莖如葱根如水仙味辛處處有之而北土以為常食八月分瓣種之當年便成獨顆及熟每瓤五七瓣或十餘瓣亦有獨顆者苗嫩時可生食夏初食薹秋月食種乾者可食至次年春盡花中有實亦作蒜瓣而小可食孫緬唐韻云張騫使西域始得大蒜初時中國止有小蒜一名茒蒜一名薍一名蒚爾雅云蒚山蒜一名澤蒜為其生於野澤也又名山蒜石蒜為其生於山或石邊也本草云山蒜澤蒜石蒜同一物也但分於山澤石間不同呂忱字林云􅀈音吟水中蒜然則蒜不特生於平原及山石而又生於水矣本草云别有山慈姑老鴉蒜石蒜之類根葉皆似蒜而不可食性辛溫有小毒其氣薰烈能通五臟逹諸竅去寒濕辟邪惡消癰腫化癥積肉食解暑毒嵐瘴第辛能散氣熱能助火傷肺損目伐性昏神有荏苒受之而不知者錬形家以小蒜大蒜韭藝薹胡荽為五葷道家以韭薤蒜藝薹胡荽為五葷佛家以大蒜小蒜興渠慈葱茖葱為五葷雖品各不同然皆辛薰之物生食增恚熟食發淫有損性靈故絶之云獨顆者切片炙癰疽腫毒最效月令三月戒蒜亦忌常食崔豹古今注蒜卯蒜也俗人謂之小蒜外國有蒜十許子共為一株籜幕裹之尤辛於小蒜俗人呼之為大蒜齊民要術蒜宜良軟地白軟地蒜美而科大黑軟次之剛强之地辛辣而瘦小三遍熟耕九月初種種法五寸一株諺曰左右過鋤一萬餘株二月半鋤之令滿三遍弗以無草而不鋤不鋤則科小條拳而軋之不軋則獨科葉黃鋒出則辮於屋下風凉之處桁之早出者皮赤科堅可以逺行晚則皮善碎冬寒取榖䎪奴勒反布地不爾則凍死收條中子種者一年為獨瓣二年則成大蒜科皆如拳又逾於凡蒜矣多能鄙事熟耕地一二次爬成溝二寸一窠種一瓣苗出高尺餘頻鋤鬆根旁頻以糞水澆之拔去薹則瓣肥大不則瘦小澤潞種蒜初出如剪韭二三次愈肥美矣一說九月初於菜畦中稠栽蒜瓣候來年春二月先將地熟鋤數次每畝上糞數十擔再鋤耙勻持木㮶插一竅栽一株栽遍或無雨常以水澆至五月大如拳極佳四民月令布榖鳴收小蒜六月七月可種小蒜八月可種大蒜吳下田家志種蒜宜戊辰辛未戊申丙子壬戌癸巳辛丑水晶葱附水晶葱葉似葱而實蒜不臭宜鬆土鋤溝擺於內用牛馬糞糠粃拌土蓋之仍以芝麻秸蓋於上八月種來年五七月收宜薑酸浸薤薤一名藠子音呌或作蕎者非一名蓧子蓧音釣因其根白呼為藠子江南人訛為蓧子一名火葱收種宜火薰一名菜芝爾雅翼云夫物英華之美者莫如芝故薤曰菜芝一名守宅一名家宅見酉陽雜俎本文作䪥韭類也爾雅云薤似韭而無實亦不甚葷葉中空似細葱葉而有稜氣亦如葱體光澤味辛濕滑無毒二月開細花紫白色根如小蒜一本數顆相依而生其根煮食芼酒糟藏醋浸皆宜故內則云切葱薤實諸醯以柔之爾雅䪥鴻薈注即薤菜也疏葉似韭之菜也一名鴻薈本草謂之菜芝是也禮記內則膏用薤本草蘇恭云有赤白二種白者補而美赤者苦而無味王氏農書生則氣辛熟則甘美種之不蠧食之有益齊民要術薤宜白軟良地三轉乃佳二月三月種八月九月種亦得秋種者春末乃生率七八支為一本諺曰葱三䪥四移葱者三支為一本種薤者四支為一科支多者科圓大故以七八為率䪥子三月葉青便出之未青而出者肉未滿令薤瘦燥曝挼去莩餘切却薑根留薑根而濕者即瘦細不得肥也先重耬耩地壟燥培而種之壟燥則䪥肥耬重則白長率一尺一本葉生即鋤鋤不厭數荒則羸惡五月鋒八月初耩不耩則白短葉不用剪剪則損白供常食者别種九月十月出賣爾雅翼今人種薤皆以大蒜置硫黃其中久則種分為薤羣芳譜八月栽根正月分蒔宜肥壤數枝一本則茂而根大五月葉青則掘之否則肉不滿山薤附爾雅葝山䪥本草蘇頌曰山薤莖葉與家薤相似而根差長葉差大僅若鹿葱體性亦與家薤同野薤附農書野薤生麥原中葉似薤而小味益辛亦可供食蒝荽蒝荽荽許氏說文作葰云薑屬可以香口一名香荽一名胡荽一作胡枲一名胡菜處處種之莖青而柔葉細有花岐立夏後開細花成簇如芹菜花淡紫色五月收子如大麻子亦辛香子葉俱可用生熟皆可食甚有益於世者根軟而白多鬚綏綏然故謂之荽張騫得種於西域故名胡荽後因石勒諱胡改作香荽又以莖葉布散呼為蒝荽味辛氣溫消榖止頭痛治五臟補不足利大小腸通心脾竅及小腹氣拔四肢熱治腸風合諸菜食氣香令人口爽辟飛尸鬼疰蠱毒冬春采之香美可食亦可作葅道家五葷之一伏石鍾乳久食損精神令人多忘凡腋氣口臭慝齒腳氣金瘡久病人不可食同斜蒿食令人汗臭難産服補藥及藥中有白术牡丹皮者忌齊民要術胡荽宜黑軟青沙良地三遍熟耕春種者用秋耕地開春凍解地起有潤澤時急種之一畝用子二升穊種漸鋤取賣供生菜也一畝用子一升疏密正好欲種時布子於堅地一升子與一掬濕土和之以腳蹉令破作兩段子有兩仁不破兩段則密水浥而不生著土者令注入殼中則生疾而長速種時欲燥此菜非雨不生所以不求濕下也於旦暮潤時以耬耩作壟以手撒子即勞令平春雨難期必須藉澤蹉跎失機則不得矣地正月中解凍者時節既早雖浸芽不生但燥種之不須浸子若二月始解者歲月稍晚恐澤少不時生失歲計矣便於暖處籠盛胡荽子一日三度以水沃之二三日則芽生於旦暮時投潤漫擲之數日即出矣大體與種麻法相似假令十日二十日未出者亦勿怪之尋自當出有草方令拔之菜生二三寸鋤去穊者供食及賣十月足霜乃收之取子者仍留根間拔令稀穊即不生以草覆上覆者得供生食又不凍死又五月子熟拔取曝乾濕則浥鬱格柯打出作蒿􅀢盛之冬日亦得入窖夏還出之但不濕亦得五六年停此菜早種非連雨不生所以不同春月要求濕下種麥底地亦得種止須急耕調熟六月中連雨生則根彊科大七月種者雨多亦得雨少則生不盡但根細科小不同耳羣芳譜種植宜肥濕地先將子捍開四五月晦日晚種以灰糞覆之水澆則易長六七月布種者可竟冬食春月挼子沃水生芽者小小供食而已都下火坑鬱蒸者莖葉鵝黃色甚香美脆嫩苐非出自然恐不益人野蒝荽附野蒝荽一名天胡荽一名石胡荽一名鵝不食草一名雞腸草小草也生石縫及隂濕處高二三寸冬月生苗細莖小葉形狀宛如嫩胡荽氣辛薰不堪食夏開細花黃色細子極易繁衍僻地則鋪滿辛寒無毒通臭氣利九竅吐風痰解毒明目散翳消瘇汁制砒石雄黃苜蓿苜蓿一名木粟爾雅翼作木粟言其米可炊飯也一名懷風一名光風草西京雜記云風在其間常蕭蕭然日照其花有光彩故名懷風又名光風一名連枝草西京雜記云茂陵人謂之連枝草一名牧宿本草云郭璞作牧宿謂其宿根自生可飼牧牛馬也一名塞鼻力迦見金光明經張騫自大宛帶種歸今處處有之苗高尺餘細莖分義而生葉似豌豆頗小每三葉攢生一處梢間開紫花結彎角角中有子黍米大狀如腰子三晉為盛秦齊魯次之燕趙又次之江南人不識也味苦平無毒安中利五臟洗脾胃間諸惡熱毒長宜飼馬尤嗜此物元史食貨志至元七年頒農桑之制令各社布種苜蓿以防飢年四民月令七月八月可種苜蓿齊民要術地宜良熟七月種之畦種水澆一如韭法春初既中生噉為羮甚香此物長生種者一勞永逸都邑負郭所宜種之羣芳譜種植夏月取子和蕎麥種刈蕎時苜蓿生根明年自生止可一刈三年後便盛每歲三刈欲留種者止一刈六七年後墾去根别用子種若效兩浙種竹法每一畝今年半去其根至第三年去另一半如此更換可得長生不煩更種若墾後次年種榖必倍收為數年積葉壞爛墾地復深故今三晉人刈草三年即墾作田亟欲肥地種榖也欽定授時通考卷六十二
