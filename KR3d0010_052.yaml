body:
  text: 勸課本朝重農耕織圖祖仁皇帝御製耕織圖序朕早夜勤毖研求治理念生民之本以衣食為天嘗讀豳風無逸諸篇其言稼穡蠶桑纖悉具備昔人以此被之管絃列於典誥有天下國家者洵不可不留連三復於其際也西漢詔令最為近古其言曰農事傷則饑之本也女紅害則寒之原也又曰老耆以壽終幼孤得遂長欲臻斯理者舍本務其何以哉朕每巡省風謡樂觀農事於南北土疆之性黍稌播種之宜節候早晚之殊蝗蝻捕治之法素愛諮詢知此甚晰聽政時恒與諸臣工言之於豐澤園之側治田數畦環以溪水阡陌井然在目桔橰之聲盈耳嵗収嘉禾數十鍾隴畔樹桑傍列蠶舍浴繭繅絲恍然如茆簷蔀屋因搆知稼軒秋雲亭以觀之古人有言衣帛當思織女之寒食粟當念農夫之苦朕惓惓於此至深且切也爰繪耕織圖各二十三幅朕於每幅製詩一章以吟咏其勤苦而書之於圖自始事迄終事農人胼手胝足之勞蠶女繭絲機杼之瘁咸備極其情狀復命鏤板流傳用以示子孫臣庶俾知粒食維艱授衣匪易書曰惟土物愛厥心臧庶於斯圖有所感發焉且欲令寰宇之内皆敦崇本業勤以謀之儉以積之衣食豐饒以共躋於安和富壽之域斯則朕嘉惠元元之意也夫皇帝御製題耕織圖序璣衡七政所以授時農桑二端斯為本富夏后則三壤之賦粒食思艱邠風陳七月之詩授衣紀候朱紘青縹祀分南北之郊帝耤公桑事重陰陽之帥是以七十二候之解時訓載在周書四十五日之功風俗詳於漢志禾傳嘉穀紀同頴以陳篇繭貢名都述八蠶而錬賦厥有成績備識前聞洪惟我祖考政先治本念切民依時逢東作加推隆躬耤之儀典溯西陵獻種襲親蠶之禮五行順令屢豐已荷降康六徳呈祥纘績聿彰設采然猶以下民力作編戸辛勤帝心時軫夫艱難民事不遺其纎悉爰命圖釐耕織析其目為廿三弁以篇章仍其題為􅕊六大文炳曜合三聖而同符巨帙裁編垂億年而無斁予小子敬承鴻業寅荷丕基綏萬國以圖寜願躋含哺之化合四秋以省歳冀敷挾纊之恩披寳繪以流觀殷懐蔀屋誦天章而步武嗣響薫絃惟本思艱圖易之謨廣為趨事赴功之勸原夫芸生類别首尊后稷之名咮美功多尤在稻人之掌先甲坼而浸種出子粒於隔年盆盎香浮顆殊紅粟池塘水暖鍼漾白芽浸種先事維耕耕勤耙耨而無虞草宅耙耨覆耕曰耖耖轉碌碡而彌見土肥碌碡然後族布連畦恂恂若幼布秧芒初刺水簇簇生新初秧蔭取於塗無忘土化之法淤䕃㧞胥以萃適諧芧茹之占㧞秧插六莖於熟田馬馳秧隴插秧等一撥於始播鳥抉耘夫一耘除無用之苗意主乎勿參勿貳植先生之稙功習乎至再至三二耘三耘猶且慮龜坼於夏畦防止瀦蓄灌溉戒禽饗於秋坂横鏺􅧉䥥收刈滯穗盈塍指屈登場之候登場築場九月肩赬持穗之氓持穗村舂水碓之旁籭篩糠而灑灑舂碓籭簸日揚風之候礱礧榖以隆隆簸揚礱乃得百室俱盈白粲入千倉之詠入倉三時告稔黄冠祭八蜡之神祭神具悉胼胝可忘耕作若迺機中縷縷之錦何異盤中粒粒之餐令溯仲春辰躔大火龍精隠躍輕舒蠶月之風蛾子瓏玲清浴菜花之水浴蠶膚滋白色二眠以七日為期二眠候驗黄光半葉待三眠而飼三眠起尤健食連朝聽􅉡􅉡之聲大起捉處通明照日藴絲絲之緒捉績雜槃筐於葦箔織薄深閨分箔錯梯几於桑林提籠南陌采桑經營布簇藉插茅編竹之功上簇熏炙成温分候火撥灰之課炙箔迨夫摘來似甕稱量籠簏之重輕積得如山檢㸃蛹蛾之變化下簇擇繭下竹簣而上桐葉一窖泥封窖繭北熱釡而南冷盆幾車繅就練絲槌箱連紙䕶蟻粟以羃絲蠶蛾壇壝瓣香仰駟房而設醴祀謝籰莩徐引擬緯耒於小正緯綜躡相連昉織文於禹貢織豈待蟲鳴驚婦絇絡秋燈絡絲宛如鳯下銜梭縷經宵杼經篚筐五色别擅移花接葉之工染色攀花刀剪萬家用紓短布單衣之厪剪帛成衣是則眷綢繆於織室無殊軫拮据於租庸民生在勤觸目皆丁男丁女君孰與足闗心惟新榖新絲所願戸積倉箱頌大田之多稼家勤機杼賦蠶織以勿休受之飢受之寒予一人職思其咎有餘粟有餘布爾萬姓遹求厥寜景仰徽猷永矢諴民之義詠歌勤苦羣知敦俗之心耕圖目録浸種耕耙耨耖碌碡布秧初秧淤䕃拔秧插秧一耘二耘三耘灌溉收刈登塲持穗舂碓篩簸揚礲入倉祭神耕第一浸種聖祖仁皇帝御製暄和節候肇農功自此勤勞處處同早辨東田穜稑種褰裳涉水浸筠籠世宗憲皇帝御製百穀遺嘉種先農著懋功春暄二月後香浸一溪中重穋隨宜辨筠籠用力同每多賢父老占節識年豐高宗純皇帝御製恭和聖祖仁皇帝原韻氣布青陽造化功東郊俶載萬方同溪流浸種如油緑生意含春秀色籠皇帝御製青陽序肇始兆庶力田疇藏種筠籠貯隔年堅栗收清香滿盆盎佳實浸汀洲三日秧鍼起從兹東作修耕第二耕聖祖仁皇帝御製土膏初動正春晴野老支笻早課耕辛苦田家惟穡事隴邊時聴叱牛聲世宗憲皇帝御製原隰韶光媚茅茨暖氣舒青鳩呼雨急黄犢駕犂初畎畮人無逸耕耘事敢疎勤劬課東作扶䇿厯村墟高宗純皇帝御製恭和聖祖仁皇帝原韻宿雨初過晚日晴烏犍有力足春耕田家辛苦那知倦更聴枝頭布穀聲皇帝御製綠畦新水活穡務始於耕雖藉烏犍力先勞赤足行泥翻畎畝闢波漾淺深盈舉趾土膏動化機地底萌耕第三耙耨聖祖仁皇帝御製每當旰食念民依南畆三時願不違已見深耕還易耨緑蓑青笠雨霏霏世宗憲皇帝御製農務時方急春潮堰欲平烟籠髙栁暗風逐去鷗輕壓笠低雲影鳴蓑亂雨聲耙頭船共稳斜立叱牛行高宗純皇帝御製恭和聖祖仁皇帝原韻九重宵旰厪民依課量隂晴總不違縹緲雲山迷樹色綠隂扶耙雨霏霏皇帝御製深耕繼易耨次第紀田功人踏微波面牛牽積淖中短蓑難障雨破笠不遮風水陸皆宜用胼胝南北同耕第四耖聖祖仁皇帝御製東阡西陌水潺湲扶耖泥塗未得閒為念饔飱由力作敢辭竭蹶向田間世宗憲皇帝御製南畆耕初罷西疇耖復親四蹄聴活活十頃望畇畇蝶舞黄萱晚鶯歸綠樹新春光長不負祗有力田人高宗純皇帝御製恭和聖祖仁皇帝原韻新田如掌水潺湲扶耖終朝那得閒手足沾塗渾不管月明共濯碧溪間皇帝御製方春農事接扶耖下深渠蕩滌溪泥細疏通地氣舒䇿牛田父急驅犢牧童徐没膝渉淤滓庶期深淖除耕第五碌碡聖祖仁皇帝御製老農力穡慮偏周早夜扶犁未肯休更駕烏犍施碌碡好教春水滿平疇世宗憲皇帝御製如輪轉機石厯碌向東皋驅犢亦何急平田敢告勞春塍縈似帯沃壤膩於膏水族堪供餉傾樽醉蠏螯高宗純皇帝御製恭和聖祖仁皇帝原韻帶雨扶犂一夕周作勞終畆敢辭休縱横碌碡如梭轉膏壤匀鋪遍舊疇皇帝御製耨耖序咸度方施碌碡平匀泥依軌直旋軸濺波清器本隨宜制功由運掌成樞機轉不息磊塊漫牽縈耕第六布秧聖祖仁皇帝御製農家布種避春寒甲坼初萌最可觀自昔虞書傳播穀民間莫作等閒看世宗憲皇帝御製種包忻拆甲岸畔競攜筐活活衝泥布紛紛落隴香追隨歡幼稚祝禱願豐穰氣侯今年早行看刺水秧高宗純皇帝御製恭和聖祖仁皇帝原韻二月春風料峭寒原田彌望水雲寛最憐舊穀生新頴欲布秧時仔細看皇帝御製田畦既平治嘉種布芳津埂堰沿溪直陂塘漾水匀渉波盈百頃播穀趁三春稠密無行列移栽待候循耕第七初秧聖祖仁皇帝御製一年農事在春深無限田家望嵗心最愛清和天氣好緑疇千頃露秧鍼世宗憲皇帝御製珍惜占城種攜兒上隴來一溪添雨足盈畆喜秧開宿露濃相裛韶陽暖復催忻忻頻笑指轉眼可移栽高宗純皇帝御製恭和聖祖仁皇帝原韻栁暗花明春正深田家那得冶遊心老翁䇿杖扶兒笑却喜初秧擺綠鍼皇帝御製布種盈畦畛授時春已深溶溶遮穀面簇簇茁秧鍼浥雨根滋隴含風香耕第八淤䕃聖祖仁皇帝御製從來土沃藉農勤農歉皆由用力分薙草灑灰滋地利心期千畆稼如雲世宗憲皇帝御製鳥鳴村陌靜春漲野橋低已愛新秧好旋看複隴齊淤時爭早作課罷豈安棲沾體兼塗足忙忙日又西高宗純皇帝御製恭和聖祖仁皇帝原韻短杓盛灰淤畆勤髙原下隰望中分鳴鳩喚雨聲聲好嶺外旋看起白雲皇帝御製土化沿周禮鳩鳴序不淆農家無暇豫地脈有肥磽刈草良苗茂灑灰短杓抛滋生先納垢至理味衡茅耕第九抜秧聖祖仁皇帝御製青䓤刺水滿平川移植西疇更勃然節序驚心芒種迫分秧須及夏初天世宗憲皇帝御製吉辰逢社後比戸趁忙時盈把分青壤和根灌綠漪兒童擔餉榼婦子製秧旗慣得為農樂辛勞自不知高宗純皇帝御製恭和聖祖仁皇帝原韻匀鋪綠毯滿平川萬井風和花欲然移自南疇向西陌㧞秧時節日長天皇帝御製韶光度九十莭物近清和柔毯鋪青甸新秧滿綠波移根透積淖拔穎出圓渦越隴蒔南畝連塍荷擔多耕第十插秧聖祖仁皇帝御製千畦水澤正瀰瀰競插新秧恐後時亞旅同心欣力作月明歸去莫嫌遲世宗憲皇帝御製令序當芒種農家插時天倐分行整整佇看影芊芊力合聞歌發栽齊聴鼓前一朝千頃遍長日正如年高宗純皇帝御製恭和聖祖仁皇帝原韻甫田萬井水瀰瀰㧞得新秧欲插時槐夏麥秋天氣好及時樹藝莫教遲皇帝御製好雨潤千陌蒔秧首夏時隔隄羣力作終畝共忘疲疎密排成列縱横務合宜佇欣千頃遍嘉頴漾清漪耕第十一一耘聖祖仁皇帝御製豐苗翼翼出清波荑稗叢生可若何非種自應芟薙盡莫教稂莠敗嘉禾世宗憲皇帝御製飽雨纎纎長含風葉葉柔載芟除宿莠挹注引新流隂借臨溪樹聲傳隔隴謳炊煙村畔起歸路緩驅牛高宗純皇帝御製恭和聖祖仁皇帝原韻新頴鵞黄逺似波揠苗助長槁如何惟應芟薙勤人力自鮮苞稂害穉禾皇帝御製良苗初發候稂莠必先除耘治勿留稗芟夷以漸鋤分畦滌陳草隔隴注清渠豐茂庶符願含颸薿薿舒耕第十二二耘聖祖仁皇帝御製曽為耘苗結隊行更憂宿草去還生隴間饋饁頻來往勞勩田家婦子情世宗憲皇帝御製鬱鬱平疇綠勞勞一載耘理苗疎是法非種去宜勤笠重初収霧鋤輕半帶雲日髙忙餉婦稚子故牽裙高宗純皇帝御製恭和聖祖仁皇帝原韻壺漿饁婦大堤行最是畦邊莠易生勞苦再耘還再饋可憐農叟望年情皇帝御製再耘近炎暑揮汗敢辭勞日炙畦波溽風來時樹高開襟扇頻颺餽餉婦親操寄語治民吏堂餐忍濫叨耕第十三三耘聖祖仁皇帝御製䆉稏盈畦日正長復勤穮蓘下方塘堪憐曝背炎蒸下惟冀青疇發紫芒世宗憲皇帝御製鋤莠日當午驕陽若火燔耘耔須盡力辛苦只今番蟬噪風前急蛙聲水底喧釀花宜鬱暑翠浪舞翩翩高宗純皇帝御製恭和聖祖仁皇帝原韻朱火炎炎日午長三耘曝背向林塘那無解慍傳風信天際㣲薰動綠芒皇帝御製去疾莫如盡三耘始絶根傴僂遍爬抉􅀈蓘望滋蕃人事戒疎懶天工協潤暄安良先斷秀治理念常存耕第十四灌溉聖祖仁皇帝御製塍田六月水泉㣲引溜通渠迅若飛轉盡桔橰筋力瘁斜陽西下未言歸世宗憲皇帝御製藝奪天工巧人勤地力加桔橰聲振鼓戽斗疾翻車灌注畦旋滿嘔啞日欲斜况兼風露美蒨蒨吐新華高宗純皇帝御製恭和聖祖仁皇帝原韻抱甕終輪氣力㣲桔橰輪轉迅如飛池塘水滿新禾潤樹下乘凉待月歸皇帝御製水利通溝洫田功茂育加桔橰流響逸䆉稏漾芬賖隔堰波翻影盈疇浪叠花踏歌忘力倦桞外日西斜耕第十五收刈聖祖仁皇帝御製滿目黄雲曉露晞腰䥥穫稻喜晴暉兒童處處収遺穂村舍家家荷擔歸世宗憲皇帝御製西成已在望早作更呼讙刈穂香生把盈筐露未乾啄遺鴉欲下拾滯稚爭歡主伯欣相慶豐年俯仰寛高宗純皇帝御製恭和聖祖仁皇帝原韻桐風蕭灑露珠晞滿野黄雲映落暉是處腰䥥収穫遍擔頭挑得萬錢歸皇帝御製耕春繼耘夏勤苦逮深秋農務三時接嘉禾千畝收腰䥥刈畦畔背負度隄頭遺穗兒童拾連塍晩稼稠耕第十六登塲聖祖仁皇帝御製年穀豐穰萬寳成築場納稼積如京迴思望杏瞻蒲日多少辛勤感倍生世宗憲皇帝御製紅秈収十月白水浸陂塍釀熟田家慶場新嵗事登雲堆香冉冉露積勢層層勞瘁三時過甕飱幸可憑高宗純皇帝御製恭和聖祖仁皇帝原韻登場此日望西成大有頻書慶帝京䆉稏滿車皆玉粒比隣亦覺笑顔生皇帝御製萬寳幸成熟登塲慶老農充盈皆玊粒堆積苦崇墉勞力甫田穫慰心稔歳逢所欣免債負百室樂熙雍耕第十七持穂聖祖仁皇帝御製南畆秋來慶阜成瞿瞿未釋老農情霜天曉起呼鄰里徧聴村村打稻聲世宗憲皇帝御製力田欣有嵗曬稻喜晴冬響落連耞急塵浮夕照濃䑕銜猶畏懦難啄自從容幸值豐亨世堯民比屋封高宗純皇帝御製恭和聖祖仁皇帝原韻塲圃平堅灰甃成如坻露積最闗情殷勤婦子爭持穗好聴千家拍拍聲皇帝御製年康徧堆積曝曬趁秋晴鋪穗如茵厚碾場若掌平連耞撃穰秸分粒擇華英恍見豐亨象沿村打稻聲耕第十八春碓聖祖仁皇帝御製秋林茅屋晩風吹杵臼相從近短籬比舍舂聲如和答家家篝火夜深時世宗憲皇帝御製野陌霜風早柴門晩日多舂聲接隣響杵韻洽豳歌顆顆珠傾篚瑩瑩雪滿籮為憐艱苦得把握屢摩挲高宗純皇帝御製恭和聖祖仁皇帝原韻木末金風陣陣吹松明火燒隔疎籬何來舂相深宵裏可是村謳唱和時皇帝御製民力眞艱苦農功無暇時曉舂依破壁夜碓隔疎籬願協田禾熟心知莭序移索綯亟乗屋已近禦寒期耕第十九籭聖祖仁皇帝御製漫言嘉穀可登盤穅秕還憂欲去難粒粒皆從辛苦得農家真作雨珠看世宗憲皇帝御製治粒頻求潔田家亦苦心篩風當户北避日就檐隂一飽功非易終年力不禁君看圓似玊我愛勝如金高宗純皇帝御製恭和聖祖仁皇帝原韻秋成那得暫遊盤顆粒精粗欲别難周折不辭身手瘁猶盈一掬㡬回看皇帝御製杵臼事差畢仍湏用竹籭精華益珍貴穅秕不留遺敢忽田功細相忘手力疲重農為政要稼穡必先知耕第二十簸揚聖祖仁皇帝御製作苦三時用力深簸揚偏愛近風林須知白粲流匙滑費盡農夫百種心世宗憲皇帝御製朝來風色好箕宿應維南敢借翻飛力寧教糠粃㕘乾圓輸縣吏狼藉戒童男得免催租負方無俛仰慙高宗純皇帝御製恭和聖祖仁皇帝原韻郭外人家茒舍深門前揚簸趁風林莫令飄墮成狼戾辜負耕夫力作心皇帝御製欲令精粗判臨風試簸揚聲輕如散雨影細乍流香箕帚收宜淨斗升謀實臧未能忘歉歳多貯為留防耕第二十一礱聖祖仁皇帝御製經營阡陌苦胼胝艱食由來念阻飢且喜稼成登石磑從兹鼓腹樂雍熙世宗憲皇帝御製地結霜痕白檐虛夜氣青聲殷礱早穀風勁閉寒扄玊色鮮堪比珠光瀉不停蒸炊謀室婦農祖薦朝聲高宗純皇帝御製恭和聖祖仁皇帝原韻相將南畆苦胼胝望嵗心酬庶免饑石磑碾來珠顆潤家家鼓腹樂雍熙皇帝御製礱礧及時用軸旋共挽推摩肩揮汗雨礪齒響殷雷珠顆匀圓瀉榖皮磊落堆稼成誠不易敦俗勸栽培耕第二十二入倉聖祖仁皇帝御製倉箱頓滿各欣然補葺牛羊雨雪天盼到葢藏休􅀈日從前拮据已經年世宗憲皇帝御製勤勞臨嵗暮入囷及良朝墉櫛寧奢望儲藏幸巳饒賦完農有暇門靜吏無囂苫廪牢封固無虞雨雪飄高宗純皇帝御製恭和聖祖仁皇帝原韻霜㸃楓林似火然千倉滿貯賜從天輸官不假徵催力喜值如雲大有年皇帝御製西成繼栗烈分貯萬蒼箱力作無閒暇功收有蓋藏完租消宿債足食積餘糧顆粒皆辛苦臨民勿怠荒耕第二十三祭神聖祖仁皇帝御製東疇舉趾祝年豐喜見盈寧百室同粒我烝民遺澤逺吹豳擊鼓報難窮世宗憲皇帝御製雨𤾉徵帝徳豐稔慰氓愚賽鼓村迎社神燈夜禱巫酒漿瀉罌盎肴核獻盤盂敢乞長年恵穰穰遂所需高宗純皇帝御製恭和聖祖仁皇帝原韻擊鼓吹豳報屢豐朝看索饗萬家同更期來嵗如今嵗嵗嵗年年願莫窮皇帝御製田祖司多稼庶民報祀誠升香騰瑞靄擊鼓和歡聲穫稻實倉廩知時順雨晴披圖衷永慕務本厚蒼生欽定授時通考卷五十二
