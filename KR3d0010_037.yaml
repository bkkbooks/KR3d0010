body:
  text: 功作灌溉周禮地官遂人治野夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路以達於畿注遂溝洫澮皆所以通水於川也遂廣深各二尺溝倍之洫倍溝澮廣二尋深二仞以南畝圖之遂從溝橫洫從澮橫九澮而川周其外焉又稻人以瀦畜水以防止水以溝蕩水以遂均水以列舍水以澮寫水注瀦者畜流水之陂也防瀦旁隄也遂田首受水小溝也列田之畦㽟也澮田尾去水大溝疏舍為止舍之舍寫是去水舍是止水考工記匠人為溝洫一耦之伐廣尺深尺謂之甽廣二尺深二尺謂之遂廣四尺深四尺謂之溝廣八尺深八尺謂之洫廣二尋深二仞謂之澮專達於川注通利田閒之水道達猶至也疏遂注溝溝注洫洫注澮澮注入川凡溝逆地阞謂之不行水屬不理孫謂之不行梢溝三十里而廣倍注溝謂造溝阞謂脈理屬讀為注孫順也不行謂决溢也梢溝謂水潄齧之溝凡行奠水磬折以參伍欲為淵則句於矩注謂行停水溝形當如磬直行三折行五以引水大曲流轉則其下成淵凡溝必因水勢防必因地勢善溝者水潄之善防者水淫之注潄齧也淫謂水淤泥土留著助之為厚凡為防廣與崇方其閷參分去一大防外閷注方猶等也閷者薄其上外閷又薄其上厚其下疏三分去一之外又去也凡溝防必一日先深之以為式里為式然後可以傅衆力注為溝為防程人功也里讀為已汜勝之書稻欲溼溼者缺其塍令水道相直夏至後大熱令水道錯齊民要術水稻薅訖决去水曝根令堅量時水旱而溉之將熟又去水陳敷農書大抵秧田愛往來活水怕冷漿死水青苔薄附即不長茂又須隨撤種濶狹更重圍繞作塍貴濶則約水深淺得宜又所藝之田隨於中間及四旁為深大之溝俾水竭泥坼次第灌溉已乾燥之泥驟得雨即蘇碎不三五日稻苗蔚然殊勝用糞也農桑通訣昔禹決九川距四海濬畎澮距川然後播奏艱食蒸民乃粒此禹平水土因井田溝洫以去水也後井田之法大備於周周禮遂人匠人之治夫間有遂十夫有溝百夫有洫千夫有澮萬夫有川遂注入溝溝注入洫洫注入澮澮注入川故田畝之水有所歸焉此去水之法也若夫古之井田溝洫脈絡布於草野旱則灌溉潦則泄去故說者曰溝洫之於田野可決而決則無水溢之害可塞而塞則無旱乾之患又荀卿曰修隄防通溝洫之水潦安水藏以時決塞則溝洫豈特通水而已哉又周禮稻人稼下地畜水止水均水舍水寫水之制與遂人匠人異後世灌溉之利昉於此秦廢井田開阡陌於今數千年遂人匠人所營之蹟無復可見惟稻人之法低濕水多之地猶祖述而用之天下農田灌溉之利大抵多古人之遺迹如關西有鄭國白公六輔之渠關外有嚴熊龍首渠河內有史起十二渠自淮泗及汴通河自河通渭則有漕渠郎州有右史渠南陽有召信臣鉗盧陂廬江有孫叔敖芍陂潁川有鴻隙陂廣陵有雷陂浙左有馬臻鏡湖興化有蕭何堰西蜀有李氷文翁穿江之跡皆能灌溉民田為百世利興廢修壞存乎其人言水利者不必他求但能修復故跡足為興利又南方熟於水利官陂官塘處處有之民間所自為溪堨水蕩難以數計大可灌田數百頃小可溉田數十畝若溝渠陂堨上置水閘以備啓閉若塘堰之水必置􅀈竇以便通泄此水在上者若田高而水下則設機械用之如翻車筒輪戽斗桔橰之類挈而上之如地勢曲折而水遠則為槽架連筒陰溝浚渠陂栅之類引而達之此用水之巧者若不灌及平澆之田為最或用車起水者次之或再車三車之田又為次之其高田旱稻自種至收不過五六月其間或旱不過澆灌四五次此可力致其常稔也傅子曰陸田者命懸於天人力雖修水旱不時則一年功棄水田制之由人人力苟修則地利可盡天時不如地利地利不如人事此水田灌溉之利也方今農政未盡興土地有遺利夫海內江淮河漢之外復有名水數萬支分派别大難悉數內而京師外而列郡至於邊境脈絡貫通俱可利澤或通為溝渠或蓄為陂塘以資灌溉安有旱暵之憂哉又近年懷孟路開浚廣濟渠廣陵復引雷陂廬江重修芍陂似此等處略見舉行其餘各處陂渠川澤廢而不治不為不多倘能循按故跡或創地利通溝瀆蓄陂澤以備水旱使斥鹵化而為膏腴汚藪變而為沃壤國有餘糧民有餘利然考之前史後魏裴延雋為幽州刺史范陽有舊督亢渠漁陽縣郡有故戾諸堰皆廢延雋營造而就溉田萬餘頃為利十倍今其地京都所在尤宜疏通導達以為億萬衣食之計夫舉事興工豈無今日之延雋倘有成效不失本末先後之序庶灌溉之事為農務之大本國家之厚利也大學衍義補井田之制雖不可行而溝洫之制則不可廢今京畿之地地勢平衍率多汙下一有數日之雨即便淹沒不必霖潦之久輒有害稼之苦農夫終嵗勤苦盻盻然望此麥禾以為衣食之計賦役之需垂成而不得者多矣良可憫也北方地經霜雪不甚懼旱惟水潦之是懼十嵗之間旱者十一二而潦恆至六七也為今之計莫若少倣遂人之制每郡以境中河水為主又隨地勢各為大溝廣一丈以上者以達於大河又各隨地勢各開小溝廣四五尺以上者以達於大溝又各隨地勢開細溝廣二三尺以上者委曲以達於小溝其大溝則官府為之小溝則合有田者共為之細溝則人各自為於其田每嵗二月以後官府遣人督其開挑而又時常巡視不使淤塞如此則旬日之間縱有霖雨亦不能為害矣朝廷於此遣治水之官疏通大河使無壅滯又於夾河兩岸築為長隄高一二丈許則衆溝之水皆有所歸不至溢出而田禾無淹沒之苦生民享收成之利矣是亦王政之一端也農政全書古之立國者必有山林川澤之利斯可以奠基而畜衆川主流澤主聚川則從源頭達之澤則從委處蓄之川流淤阻其害易見人皆知濬治者萬頃之湖千畝之蕩隄岸頺壞鮮知究心甚有縱豪强阻塞規覓小利者不知澤不得川不行川不得澤不止二者相為體用為上流之壑為下流之源全繫乎澤澤廢是無川也况國有大澤潦可為容不致驟當衝溢之害旱可為蓄不致遽見枯竭之形必究晰於此而水利之說可徐圖矣又荒政要覽論曰水利之在天下猶人之血氣然一息之不通則四體非復為有矣故大而江河川澤微而溝洫畎澮其小大雖不同而其疏通導利不可使一息壅閼則一也故成周溝洫之制與井田並行其捐膏腴之地以為溝洫損賦稅之重以治溝洫者凡幾也成周之君豈不愛膏腴之地賦稅之入而棄以為無用之溝洫哉誠以所棄者小而所利者大也然其所以得溝洫之利者治之者非一官領之者非一人營溝行水之制則職之匠人俾任濬導之功止水蓄水之令則領之稻人俾專儲蓄之利夫既有以浚之復有以積之此所以旱潦均無患也又取水之術有四一曰括二曰過三曰盤四曰吸括之道有二一曰獨括急流水中加逼脫可括上數丈也二曰遞括不論急緩但有流水以三輪遞括可利出入也過之道有二一曰全過今之過上龍必上水高於下水則可為之至則止二曰二過以人力節宣隨氣呼吸茍上流高於下流一二尺便可激至百丈以上也盤之法至多遞互輸瀉交輪叠盤可至數里上嵿但括法必須流水過法不論行止必須上流高於下流盤法在流水用水力在止水必須風及人畜之力獨吸法不論行止緩急不拘泉池河井不須風水人力只用機法自然而上但所取不能多止可供飲倘用溉田必須多作顧亦易辦又灌溉圖譜曰灌溉之利大矣江淮河漢及所在川澤皆可引而及田以為沃饒之資但人情拘於常見不能通變間有知其利者又莫得其用之具今特多方搜摘既述舊以增新復隨宜而制物或設機械而就假其力或用挑浚而永賴其功大可下潤於千頃高可飛流於百尺架之則遠達穴之則潛通世間無不救之田地上有可興之雨其用水有法概可見故緝諸篇庶資農事云灌溉具各圖說水栅水閘陂塘水塘翻車牛轉翻車水轉翻車筒車驢轉筒車髙轉筒車水轉筒車連筒架槽戽斗刮車桔橰轆轤瓦竇石籠浚渠隂溝水井缶綆水篣水柵圖說水柵排木障水也若溪岸稍深田在高處水不能及則於溪上流作柵遏水使之旁出下溉以及田所其制當流列植竪樁樁上枕以伏牛劈以柆木仍用塊石高壘衆楗斜以邀水勢此柵之小者秦雍之地所拒川水率用巨柵其䝉利之家嵗例量力均辦所需工物乃深植樁木列置石囤長或百步高可尋丈以橫截中流使旁入溝港凡所溉田畝計千萬號為陸海此柵之大者其餘境域雖有此水而無此柵非地利素不彼若蓋工力所未及也水閘圖說水閘開閉水門也間有地形高下水路不均則必跨據津要高築堤埧匯水前列斗門甃石為壁疊木作障以備啓開如遇旱涸則撒水灌田民賴其利又得通濟舟楫轉激碾磑實水利之總揆也陂塘圖說陂塘說文曰陂野池也塘猶堰也陂必有塘故曰陂塘其溉田大則數千頃小則數百頃考之書傳廬江有芍陂潁川有鴻隙陂廣陵有雷陂愛敬陂陽平沛郡有鉗廬陂餘難遍舉故跡猶存因以為利今人有能别度地形亦效此制足溉田畝千萬比作田圍特省工費又可畜育魚鱉栽種菱藕之類其利可勝言哉水塘圖說水塘即汙池因地形坳下用之瀦蓄水潦或修築圳堰以備灌溉田畝兼可畜育魚鱉栽種蓮芡俱各獲利纍倍大凡陸地平田别無溪澗井泉以溉田者救旱之法非塘不可江淮之間在在有之然官民異屬各為永業翻車圖說翻車今龍骨車也魏略曰馬鈞居京城有田園無水以灌作翻車又漢靈帝使畢嵐作翻車設機引水灑南北郊路今農家用之其制車身用板作槽長可二丈濶不等或四寸至七寸高約一尺槽中架行道板隨槽濶狹兩頭短尺許用置大小輪軸同行道板上下周以龍骨板上大軸兩端各帶拐木四置岸上木架間人慿架上踏動拐木則龍骨板隨轉循環刮水上岸關楗頗多必用木匠成造若岸高可用三車中間小池搬水上之足救三丈已上之田機巧為最牛轉翻車圖說牛轉翻車如無流水處用之其車比水轉翻車卧輪之制但去下輪置於車傍岸上用牛拽轉輪軸則翻車隨轉比人踏功將倍之水轉翻車圖說水轉翻車其制與踏翻車俱同但於流水岸邊掘一狹塹置車於內車之踏軸外端作一竪輪竪輪之旁架木立軸置二卧輪其上輪適與車頭竪輪輻支相間乃劈水旁激下輪既轉則上輪隨撥車頭竪輪而翻車隨轉倒水上岸此是卧輪之制若作立軸當别置水激立輪其輪輻之末復作小輪輻頭稍寬以撥車頭竪輪此立輪之法也然亦當視其水勢隨宜用之其水日夜不止絶勝踏車徐光啓曰此却未便水勢太猛龍骨板一受齟齬即決裂不堪與今風水車同病若長流水中不如筒車為穩平流用風别有一法筒車圖說筒車流水筒輪凡制此車先視岸之高下定輪之大小須輪高於岸筒貯於槽方為得法其車之所在自上流排作石倉斜劈水勢急凑筒輪其輪就軸作轂軸之兩旁閣於樁柱山口之內輪軸之間除受水板外又作木圈縛繞輪上就繫竹筒或木筒於輪之一周水激轉輪衆筒兜水次第傾於岸上所橫木槽謂之天池以灌田稻日夜不息絶勝人力若水力稍緩亦有木石制為陂柵橫約溪流旁出激輪又省工費或遇流水狹處但壘石斂水凑之亦為便易驢轉筒車圖說驢轉筒車即前水轉筒車但於轉軸外端别造豎輪豎輪之側岸上復置卧輪與前牛轉翻車之制無異凡臨坎井或積水淵潭可澆灌園圃勝於人力汲引徐光啓曰此却太拙筒車之妙妙在用水若用人畜之力是水行迂道比於翻車枉費十分之三高轉筒車圖說高轉筒車其高以十丈為凖上下架木各豎一輪下輪半在水內各輪徑可四尺輪之一周兩旁高起其中若槽以受筒索其索用竹均排三股通穿為一隨車長短如環無端索上離五寸俱置竹筒筒長一尺筒索之底托以木牌長亦如之通以鐵線縛定隨索列次絡於上下二輪復於二輪旁索之間架刳木平底行槽一連上與二輪相平以承筒索之重或人踏或牛拽轉上輪則筒索自下兜水循槽至上輪輪首覆水空筒復下如此循環不已日所得水不減平地車戽若積為池沼再起一車計及二百餘尺如田高岸深或田在山上皆可及也所轉上輪形如軭制易繳筒索用人則如輪軸一端作掉枝用牛則制作豎輪如牛轉翻車之法或於輪軸兩端造作拐木如人踏翻車之制若筒索稍慢則量移上輪其餘措置當自忖度不能悉陳徐光啓曰此製却可用之急流挈水雖少而行地頗高若在平水亦須用人畜之力然猶勝挈瓶也但車戽之制獨平水為難耳若果係迅流即數里可激而上此區區者何足以云别有水轉筒車與高轉筒車之制同故著其說於後圖不再見水轉筒車遇有流水岸側欲用高水可立此車其車亦高轉筒車之制但於下輪軸端别作豎輪旁用卧輪撥之與水轉翻車無異水輪既轉則筒索兜水循槽而上餘如前例又須水力相稱如打碾磨之重然後可行日夜不息絶勝人牛所轉此誠祕術今表暴之以諭來者連筒圖說連筒竹通水也凡所居相離甚遠不便汲用乃取大竹內通其節令本末相續連延不斷閣之平地或架越澗谷引水而至又能激而高起數丈注之池沼及庖湢之間如藥畦蔬圃亦可供用杜詩所謂連筒灌小園徐光啓曰豈有激而高起之理若能高起必是上流受處高於下流泄處故也果高則百丈亦可不高則分寸不能但是上流高於下流一二尺即能取水至百丈之上此則制作之巧耳架槽圖說架槽木架水槽也間有聚落去水既遠各家共力造木為槽遞相嵌接不限高下引水而至如泉源頗高水性趨下則易引也或在窪地則當車水上槽亦可遠達若遇高阜不免避礙或穿鑿而通若遇坳險則置之叉木駕空而過若遇平地則引渠相接又左右可移鄰近之家足得借用非惟灌溉多便抑可瀦蓄為用暫勞永逸同享其利戽斗圖說戽斗挹水器也唐韻云戽抒也抒水器挹也凡水岸稍下不容置車當旱之際乃用戽斗控以雙綆兩人掣之抒水上岸以溉田稼其斗或柳筲或木壘從所便也徐光啓曰此是岸下不必置車或所用水少權作此耳若以溉田即岸下亦是置車為妙刮車圖說刮車上水輪也其輪高可五尺軸頭濶至六寸如水頗下田可用此其先於岸側掘成峻槽與車輻同濶然後立架安輪輪軸半在槽內其輪軸一端擐以鐵鈎木拐一人執而掉之車輪隨轉則衆輻循槽刮水上岸溉田便於車戽徐光啓曰此必水與岸相去止一二尺方可用若嵗潦用以出水墟外尤便若並流水便可激輪出入則不煩人畜其利甚博也桔橰圖說桔橰挈水械也通俗文曰桔橰機汲水也說文曰桔結也所以固屬橰臯也所以利轉又曰橰緩也一俯一仰有數存焉不可速也然則桔其植者而橰其俯仰者歟莊子曰子貢過漢隂見一丈人方將為圃畦鑿隧而入井抱甕而出灌搰搰然用力甚多而見功寡子貢曰有械於此一日浸百畦鑿木為機後重前輕挈水若抽數如泆湯其名曰橰又曰獨不見夫桔橰者乎引之則俯舍之則仰今瀕水灌園之家多置之實古今通用之器用力少而見功多者轆轤圖說轆轤纒綆械也唐韻云圓轉木也集韻作犢轆汲水木也井上立架置軸貫以長轂其頂嵌以曲木人乃用手掉轉纒綆於轂引取汲器或用雙綆而順逆交轉所懸之器虛者下盈者上更相上下次第不輟見功甚速凡汲於井上取其俯仰則桔橰取其圓轉則轆轤皆挈水械也然桔橰綆短而汲淺獨轆轤深淺俱適其宜也徐光啓曰此大拙不如吸法為妙吸法有二一用人力工費力省一不用人力作之少費工科用之却甚利益瓦竇圖說瓦竇泄水器也又名函管以瓦筒兩端牙鍔相接置於塘堰之中時放田水須預於塘前堰內疊作石檻以護筒口不然則水湊其處非惟艱於窒塞抑以衝渲滲漏不能久穩必立此檻其竇乃成石籠圖說石籠又謂之卧牛判竹或用藤蘿或木條編作圈眼大籠長可二三丈高約四五尺以籖摏止之就置田頭內貯塊石以劈暴水或相接連延遠至百步若水勢稍高則壘作重籠亦可遏止如遇隈岸盤曲尤宜周折以禦奔浪併作洄流不致衝傷埂岸農家瀕溪護田多用此法比於起疊隄障甚省工力浚渠圖說浚渠凡川澤之水必開渠引用可入於田考之古有溝洫畎澮以治田水書云濬畎澮距川是也疏鑿已遠井田變古後世則引水為渠以資沃灌按史記秦鑿涇為渠又關西有鄭國白公六輔之渠外有龍首渠河內有史起十二渠今懷孟有廣濟渠俱各溉田千百餘頃利澤一方永無旱暵陰溝圖說陰溝行水暗渠也凡水陸之地如遇高阜形勢或隔田園聚落不能相通當於穿岸之旁或溪流之曲穿地成穴以磚石為圈引水而至若别無隔礙則當踏視地形用策索度其高下及經由處所畫為界路先引濬犁耕過後復浚掘乃作甃穴上覆元土亦是一法如灌溉之餘常流不絶又可蓄為魚塘蓮蕩其利亦博或貫穿城邑巷陌及注之園囿池沼悉周於用雖遠近大小深淺曲直不同然皆洑流內達膏澤旁通水利之中最為永便井圖說井地穴出水也說文曰清也故易曰井洌寒泉食甃之以石則潔而不泥汲之以器則養而不窮井之功大矣按周書云黃帝穿井又世本云伯益作井堯民鑿井而飲湯旱伊尹教民田頭鑿井以溉田今之桔橰是也此皆人力之井也若夫巖穴泉竇流而不窮汲而不竭此天然之井也皆可灌溉田畝水利之中所不可闕者缶圖說缶汲水器左傳宋災樂喜為政具綆缶杜注缶汲器爾雅疏云比卦初爻有孚盈缶注云辰在爻木上值東井井之水人所汲用缶楊惲傳曰田家作苦嵗時伏臘烹羊炮羔斗酒自勞酒後耳熱仰天擊缶而呼烏烏應劭曰缶瓦器也今汲器用瓦缶之遺制也綆圖說綆郭璞云汲水索也易卦云汔至亦未繘井方言繘自關而東周洛韓魏間謂之絡關西謂之繘綆或作航俗謂井索下繫以鉤今汲用之家必有轆轤為綆設也水篣圖說水篣集韻云竹箕也又籠也夫山田利於水源在上間有流泉飛下多經嶝級不無混濁泥沙淤澭畦埂農人乃編竹為籠或木條為捲芭承水透溜乃不壞田欽定授時通考卷三十七
