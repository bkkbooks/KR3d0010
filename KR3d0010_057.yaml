body:
  text: 蓄聚圖式王禎農書倉廩皆蓄積之所古有定制重民食也次而囷京下而窖竇世所共行俱穀藏去聲類也然又各有巧要以從省便凡欲儲貯務儉德者當取為法又北方高亢多粟宜用竇窖可以久藏南方墊濕多稻宜用倉廪亦可歷遠年倉圖說倉榖藏也釋名曰倉藏也天文集曰廩星主倉史記天官書胃為天倉此名著於天象者禮月令曰孟冬命有司修囷倉周禮倉人掌粟入之藏此名著於公府者詩曰乃求千斯倉管子曰倉廪實而知禮節此名著於民家者今國家備儲蓄之所上有氣樓謂之厫房前有簷楹謂之明厦倉為總名蓋其制如此夫農家貯穀之屋雖規模稍下其名亦同皆係纍年蓄積所在內外材木露者悉宜灰泥塗飾以辟火災木又不蠧可為永法明張朝瑞倉厫議一定倉基凡倉基俱南向以四畝為率或地不足四畝者聽其隨地建造前後左右段落務要酌量停勻毋使偏邪甚有基地不足三畝者聽其將社學及有倉耳房從便另造於别地不造入倉內亦可然地基窄狹者正㕔房門可小而兩倉房間架斷不可小以其每間盛穀原約四百石有餘小則難容也各倉基址必擇高阜之處以避水濕侵穀若地有不平者須填補方正平坦方可興工四靣水道必開濬歸一不得聽其二三漫流各縣先將四倉四至丈尺畝數坐落地名與應建倉厫㕔舍間數每倉畫圖一張貼說明白并應給買民基價數一一勘處停妥徑送二道及該府㕔查核一定倉式保民實政簿開各縣立四鄉倉每縣積穀務期萬石為率州縣大者倍之則大縣當儲二萬石中縣一萬五千石小縣一萬石矣今議頒倉式該府㕔督令各倉相度地基依式建造每縣各分四鄉每鄉建倉一所頭門一座約高一丈三尺八寸中濶一丈入深連簷一丈七尺六寸兩傍耳房每間濶八尺以便住看倉人役頂上用大竹箯覆之蓋瓦大門二扇每扇濶三尺東西厫房大縣共該貯穀五千石每邉應造厫房七間中縣約共四千石每邊應造厫房五間小縣約共二千五百石每邊應造厫房三間每厫房一間約貯穀四百石以上約高一丈三尺六寸濶一丈一尺二寸入深一丈六尺厫內先用地工將厫深築堅實外簷用石板鑲砌內用厚磚砌底仍用條石墊擱楞木從宜鋪釘松木杉木厚板方鋪簟席其倉頂上方木為椽椽上用板幔板上用大􅀢竹打笆覆之笆上用土土上蓋瓦其瓦須密各周圍厫墻角濶二尺八寸先行築實方用條石砌腳三層上用地伏磚扁砌純灰抿縫中用稍碎磚瓦少以泥和填實仍用鐡牽鈖釘如地勢高燥者四面俱用磚墻厫後及兩側牆俱包簷厫前牆上簷濶二尺四寸不拘七間五間三間中俱隔為三段七間者中三間兩傍各二間五間者中三間兩傍各一間三間者亦隔三段各開三門氣樓亦如之其厫內貼墻處用木柵釘相思縫厚板使榖不著墻以防浥爛厫口亦用相思厚板橫閘如地勢卑濕者厫前一面不用磚墻厫板外用圓木柵欄一帶上面建廊濶五尺六寸㕔前及兩倉外明堂空地俱用石板鋪平以便曬穀本倉外周圍墻垣墻腳濶三尺五寸約高一丈一尺上用墻梯瓦蓋先用地工深築堅實墻腳用大石塊砌高三尺方用土築務離倉墻一二丈內可容人行其土不可貼近本墻掘取以上各項倉房㕔舍務期堅固經久不在華美其丈量地基起造房屋並量木植磚石俱用大官鈔尺為凖其木匠小尺不用須使畫一勿致參差一辦倉料倉厫每邊七間合用柱木每根徑六寸矮柱每根徑六寸桁條每根徑五寸五分抽楣每根徑四寸椽木每根徑三寸穿栅木每根徑四寸地板楞木每根徑五寸地板壁板每塊厚八分正㕔三間合用中柱木每根徑一尺一寸用實木邊柱每根徑九寸大梁每根長二丈徑一尺四寸二梁每根長一丈徑一尺一寸步梁每根長八尺徑一尺抽楣木每根徑四寸五分桁條每根徑六寸椽木每根徑三寸門房三間合用柱木每根徑五寸桁條每根徑四寸抽楣木每根徑三寸大門二扇每扇濶三尺後社學三間合用柱木每根徑六寸桁條每根徑五寸五分抽楣木每根徑三寸五分大梁每根徑九寸長一丈八尺二梁每根徑八寸五分長一丈椽木每根徑二寸五分頂上用幔板鋪完蓋瓦其餘幫機連簷門窗等項開載不盡者俱要隨宜酌量採買製作務使與各項材木大小規式相稱凡磚瓦就於近倉之地立窰一二座令窰户自燒造石灰見買地伏磚每磈長一尺二寸濶七寸厚三寸稱重十八斤上燒常平二字開磚每塊長一尺一寸濶五寸厚一寸上燒常平二字方磚每塊長一尺濶一尺便磚每塊長七寸濶六寸二分瓦每塊長九寸濶七寸重一斤半凡採買木植俱要選擇圓長首尾相應乾燥老黃色者毋將背山白色嫩木搪塞虛應石板採買上好青白堅細者黃色踈爛者不用其磚瓦須擇青色者如黃色者不用以上各項物料各縣掌印官親將每倉應造厫房㕔舍逐一從實親自勘估酌量某項應用若干該價若干某項應用若干該價若干估定照數給銀責令原定各役採買木石等料搬運一到即具數報掌印官并佐二委官及總管各查驗揀選堪用者收之不堪者即時退換不得虛冒混收燒造磚瓦不如式者不許混用仍置部送縣印鉗日逐登填收發數目明白委官不時稽查各縣仍將查估過工料價銀總散數目逐一造冊報道查核東西兩邊倉厫與正㕔一應木石磚瓦皆用新料其門房社學材植等料倘有見成民房願賣可以改用者一照時價給與見銀平買庶工省費亷建造尤速惟不虧其價而人自樂從矣吕坤積貯條件穀積在倉苐一怕地濕房漏苐二怕雀入鼠穿此其防禦不在人力乎大凡建倉擇於城中最高處所院中地基務須𨫼背院墻水道務須多留凡鄰倉庾居民不許挑坑聚水違者罰修倉厫一倉屋根基須掘地實築有石者石為根腳無石者用熟透大磚磨邊對縫務極嚴匝厚須三尺釘橫俱用交磚做成一家以防地震房須寬寬則積不蒸須高高則氣得泄仰覆瓦須用白礬水浸雖連隂彌月亦不滲漏梁棟椽柱務極粗大應費十金者費十五二十金一時無處固利於茍完數年即更實貽之倍費故善事者一勞永逸一費永省究竟較多寡一費之所省為多也以室家視倉厫者當細思之一風窗本為積熱壞穀而不知雀之為害也既耗我穀而又遺之糞食者甚不冝人今擬風窗之內障以竹篾編孔僅可容指則雀不能入倉墻成後洞開風窗過秋始得乾透其地先鋪煤灰五寸加鋪麥糠五寸上幔大磚一重糯米雜信浸和石灰稠黏對合磚縫如木有餘再加木板一周缺木處所釘席一周可也一假如倉厫五間東西梢間各用板隔斷與門楣齊穀止積於四間留板隔東一間如常閒空值六七月久隂氣濕或新收穀石生性未除倘不發泄必生內熱州縣官責令管倉人役將穀自東第三間起倒入東一間閒空之處一間倒一間是滿倉翻轉一遍熱氣盡泄本味自全何紅腐之有一太倉禁用燈火今各倉積柴安竈全無禁約萬一火起何以救之以後不許仍用官吏以下飯食外靣喫來不得已者送飯冬月但用湯壺如違重治廩圖說廩倉之别名詩曰亦有高廩萬億及秭注云廩所以藏粢盛之穗說文曰倉黃面而取之故謂之靣或從一從禾今農家構及無壁厦屋以儲禾穗穜稑之種即古之􅂒也唐韻云倉有屋曰廩倉其藏穀之總名而廪庾又有屋無屋之辨也庾圖說庾鄭詩箋云露積榖也集韻庾或作㢏倉無屋者詩曰曾孫之庾如坻如京又曰我庾維億蓋謂庾積穀多也囷圖說囷圓倉也禮月令曰修囷倉說文廩之圓者圓謂之囷方謂之京吳志周瑜謁魯肅肅指其囷以與之西京雜記曰曹元理善算囷之穀數類而言之則囷之名舊矣今貯穀圜囤泥塗其內草苫於上謂之露囤者即囷也京圖說京倉之方者廣雅云字從廣􅂒倉也又謂四起曰京今取其方而高大之意以名倉曰京則其象也夫囷京有方圓之别北方高亢就地植木編條作囤故圓即囷也南方墊濕離地嵌板作室故方即京也此囷京又有南北之宜庶識者之擇而用也窖圖說窖藏穀穴也史記貨殖傳曰宣曲任氏獨窖食粟楚漢相拒滎陽民不得耕米石至數萬而豪傑金玉盡歸任氏任氏以是起富嘗謂穀之所在民命是寄今藏至地中必有重遇且風蟲水旱十年之內儉居五六安可不預備凶災夫穴地為窖小可數斛大至數百斛先投柴棘燒令其土焦燥然後周以糠􅀈貯粟於內五穀之中惟粟耐陳可歷遠年有於窖上栽樹大至合抱內若變􅀈樹必先槁又謂葉必萎黃又搗别窖北地土厚皆宜作此江淮高峻土厚處或宜倣之竇圖說竇似窖月令曰穿竇窖令人下掘或旁穿出土轉於他處內實以粟復以草墢封塞他人莫辨即謂竇也蓋小口而大腹竇小孔穴也故名竇囤圖說囤集韻云盛穀器或作囤一也北方以荆桞或蒿卉制為圓樣南方判竹編草或用籧蒢空洞作圍各用貯穀南北通呼為囤兼篅􅦽而言也然囤多露置可用貯糧篅􅦽在室可用盛種皆農家收穀所先具者故並次之篅說文云判竹圓以盛穀囤類也篅或作圌此􅦽與篅皆囤之别名但大小有差亦蓧簣之舊制不可遺也􅦽圖說􅦽集韻云􅦽筐盛種器蓋連底小囤便於移用穀匣圖說穀匣盛穀方木層匣也用板四葉相嵌而方大小不等高下隨宜下底足疊纍數層上作頂蓋貯穀於內置穴於下可以啓閉用之多在屋室亦可露置以瓦覆之比之囤京可以移頓較之篅􅦽可以增減既無雀鼠之耗又無濕􅀈之虞實穀藏之佳者蕢圖說蕢草器所以盛穀也集韻作簣蓧圖說蓧許慎說文曰耘器也或曰盛穀種器南方盛稻種用簞以竹為之北方藏粟種簍多以草木之條編之蓧蓋是此類筐圖說筐竹器之方者三禮圖曰大筐以竹受五斛以盛米致饋於聘賓小筐以竹受五升以盛米又曰筐以盛熬穀筥圖說筥亦作􅞠竹器之圓者注曰筥圓而長但可實物而已三禮圖曰筥受五升盛饔餼之米致於賔館良耜詩曰載筐及筥左傳筐筥錡釡之器字說云筐筥一器特方圓之異云耳江沔之間謂之籅趙岱之間謂之䈱淇衛之間謂之牛筐小者南楚謂之簍自關而西秦晉之間謂之箄筥其通語也種簞圖說種簞盛種竹器也其量可容數斗形如圓甕上有􅤮口農家用貯穀種庋之風處不致鬱浥勝窖藏也論語一簞食之簞乃食器與此字雖同然制度有大小之殊作用有彼此之效籮圖說籮編竹為之上圓下方挈米穀器量可一斛方言籮所以注斛陳魏宋楚之間謂之䈪自關而西謂之注箕皆籮之别名也􅓕圖說􅓕亦籮屬比籮稍匾而小用亦不同􅓕則造酒造飯用之漉米又可盛食物蓋籮盛其粗者而􅓕盛其精者精粗各適所受不可易也儋圖說儋貯米器也漢書揚雄無儋石之儲晉劉毅家無儋石之儲應劭曰齊人名罌為儋受二斛顏師古曰儋者一人所負擔也方言云罃陳魏宋楚之間曰㼶或曰㼡燕之東北朝鮮列水之間謂之瓺周洛韓鄭之間謂之甀儋或作甔字從瓦瓦器也今江淮間農家造泥為甕披以麻草用貯食米可以代儋細民甚便之籃圖說籃竹器無繫為筐有繫為籃大如斗量又謂之笭箵農家用採桑柘取蔬果等物易携提者方言籠南楚江沔之間謂之篣或謂之笯郭璞云亦呼籃蓋一器而異名也穀盅圖說榖盅集韻云虛器也又謂之氣籠編竹作圍徑可一尺高或二丈底足稍大易於竪立內置木撑數層乃先列倉中每間或五或六亦量積榖多少高低大小而制之常見倉廩囷京等所貯米穀蒸濕結厚數尺謂之􅀈頭以致壓􅀈變黃漸成􅀈腐往往耗損公私坐致陷害誠可甚惜今置此器使鬱氣升通米得堅燥免蹈前弊實濟物之良法凡儲蓄之家不可闕欽定授時通考卷五十七
