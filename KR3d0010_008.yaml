body:
  text: 土宜方輿圖說方輿總圖說直隸圖說盛京圖說江南圖說江西圖說浙江圖說福建圖說湖北圖說湖南圖說河南圖說山東圖說山西圖說西安圖說甘肅圖說四川圖說廣東圖說廣西圖說雲南圖說貴州圖說文獻通考昔堯時禹别九州至舜分為十二州周職方復分為九州而又與禹異漢承秦分天下為郡國而復以十三州統之晉時分州為十九自晉以後為州罙多所統罙狹且建治之地亦不一所南北分裂之後務為夸大僑置諸州離析磔裂循名失實而禹跡之九州罙不復可考矣夾漈鄭氏曰州縣之設有時而更山川之形千古不易故禹貢分州必以山川定疆界使兖州可移而濟河之兖州不可移梁州可遷而華陽黑水之梁州不可遷故禹貢為萬世不易之書後之作史者主於郡縣故州縣移易其書遂廢矣善哉言也分野考順天府古幽州尾箕分野永平府古幽州尾分野保定府古幽州尾箕分野易州古幽州尾箕分野河間府古幽州尾箕分野天津府古幽州尾箕分野正定府古冀州昴畢分野冀州古冀州昴畢分野趙州古冀州昴畢分野深州古冀州昴畢分野定州古冀州昴畢分野順德府古冀州昴分野廣平府古冀州昴分野大名府古冀兖二州室壁分野宣化府古幽州一統志地勢寬厚關塞險固總握中原之夷曠者莫過燕薊雖云長安有崤函之固洛邑為天下之中要之帝王都㑹億萬年悠久之業莫燕薊若矣又水有九河滄溟之雄山有太行居庸之固玊泉之流經緯乎禁籞之中碣石之壯盤踞乎畿甸之內故其風氣之清淑山川之壯觀誠有以卓冠四方為萬國之都㑹分野考奉天府古冀青二州箕尾分野錦州府古冀青二州箕尾分野一統志滄海朝宗白山拱峙渾河遼水繞帶西南黑水混同襟環東北控制諸邦跨馭六合允帝業之根本洵留守之雄都也又西接畿輔東控朝鮮瀕瀛海以帶龍江俯登萊而通朔漠此其大勢然也司民牧者兩郡攸分統軍政者三鎮是賴既星羅以碁布因畫井以分疆念王業之所基苞桑培及于萬世知邉防之為重屏翰永拱于神京矣分野考江寧府古揚州斗分野蘇州府古揚州斗分野太倉州古揚州斗分野松江府古揚州斗分野常州府古揚州斗分野鎮江府古揚州斗分野淮安府古揚州斗分野海州古徐州奎婁分野揚州府古揚州斗分野通州古揚州斗分野徐州府古豫州房心分野安慶府古揚州斗分野徽州府古揚州斗分野寧國府古揚州斗分野池州府古揚州斗分野太平府古揚州斗分野廬州府古揚州斗分野六安州古揚州斗分野鳳陽府古揚州斗分野泗州古徐州斗分野潁州府古豫州房心分野和州古揚州斗分野滁州古揚州斗分野廣德州古揚州斗分野江南通志鍾茅八公天柱九華黃塗潜霍山之作鎮而著名者不可勝數黃河江淮運河三江泗海穎睢淝滁水之經行而浸衍者不可勝數藪則震澤巢湖洮湖關則東關清流二峴名都雄鎮襟帶江淮分野考南昌府古揚州斗分野饒州府古揚州斗分野廣信府古揚州斗分野南康府古揚州斗分野九江府古揚州斗牛分野建昌府古揚州斗分野撫州府古揚州斗分野臨江府古揚州斗分野吉安府古荆揚二州斗分野瑞州府古揚州斗分野袁州府古揚州斗分野贑州府古揚州斗分野南安府古揚州斗分野一統志東接閩浙西連荆蜀北踰淮汴以達于京師據嶺海之全斥交廣之境提封數千里此江右之大較也分野考杭州府古揚州斗分野嘉興府古揚州斗分野湖州府古揚州斗牛分野寧波府古揚州牛女分野紹興府古揚州牛女分野台州府古揚州牛女分野金華府古揚州牛女分野衢州府古揚州牛女分野嚴州府古揚州牛女分野溫州府古揚州斗牛女分野處州府古揚州斗分野一統志崇山巨嶺所在限隔然嘉湖二郡實與江淮相表裏嚴衢二郡實與徽饒為鄰郊左接信都右連閩關大海東蟠繞出淮揚之域四通八達之區也又山川秀發風土清佳民人視為樂郊逰客引為福地東晉以后風流掩映粵自有宋建都臨安景物之嘉甲於南服士大夫類能形諸歌咏蓋越中之風致至是而極盛矣分野考福州府古揚州牛女分野泉州府古揚州牛女分野建寧府古揚州牛女分野延平府古揚州牛女分野汀州府古揚州牛女分野興化府古揚州牛女分野邵武府古揚州牛女分野漳州府古揚州牛女分野福寧府古揚州牛女分野永春州古揚州牛女分野龍巖州古揚州牛女分野臺灣府古海外地牛女分野福建通志閩地幅􅊷廣輪之數計四千餘里控豫引閩互為唇齒福泉四郡則襟帶大海長溪汀邵諸處綿亘崇岡建劍則溪灘互相環抱實為兩浙之鎖鑰區分障扼繡錯綺分以云形勢可謂備矣分野考武昌府古荆州翼軫分野漢陽府古荆州翼軫分野安陸府古荆州翼軫分野襄陽府古荆豫二州翼軫分野勛陽府古荆豫二州翼軫分野德安府古荆州翼軫分野黃州府古荆州翼軫分野荆州府古荆州翼軫分野宜昌府古荆州翼軫分野施南府古荆梁二州翼分野一統志荆于九州之土最稱閎衍回絡衡貫神禹之跡遍焉分野考長沙府古荆州翼軫分野嶽州府古荆州翼軫分野澧州古荆州翼軫分野寶慶府古荆州翼軫分野衡州府古荆州翼軫分野桂陽州古荆州翼軫分野常德府古荆州翼軫分野辰州府古荆州翼軫分野沅州府古荆州翼軫分野永州府古荆州翼軫分野靖州古荆州軫分野郴州古荆州翼軫分野永順府古荆州翼軫分野廣輿記湖廣大江中貫五溪外錯衡嶽為鎮洞庭雲夢為池此形勢之大槩也辰沅南蔽滇黔郴永上連兩粵地之四通五達莫楚若矣分野考開封府古兖豫二州角亢分野陳州府古兖豫二州角亢分野許州府古兖豫二州角亢分野歸德府古兖豫二州角亢分野彰德府古冀州室壁分野衛輝府古冀州室壁分野懷慶