front:
  text: 欽定四庫全書欽定授時通考卷二十八
  hash: sha256:5f70f2bc93c75f64f9a04d2dd78242333f7e12884216c03432a9171942832849
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3d0010_WYG_028-1a, image: WYG0732/WYG0732-0358c.png}
body:
  text: 穀種豆二穭豆豌豆野豌豆蠶豆豇豆紫豇豆藊豆山藊豆本草綱目李時珍曰穭乃自生稻名也此豆原是野生故名今人亦種之於下地矣又陳藏器曰穭豆生田野小而黑堪作醬爾雅戎菽一名驢豆古名䝁豆是也吳瑞曰穭豆即黑豆中最細者李時珍曰此即黑小豆也小科細粒霜後乃熟陳氏指爲戎菽誤矣爾雅亦無此文戎菽乃胡豆䝁豆乃鹿豆並四月熟又穭豆甘溫無毒遼志囘鶻豆髙二尺許直幹有葉無旁枝角長二寸每角止兩豆一根才六七角色黄味如粟務本新書豌豆二三月種諸豆之中豌豆最爲耐陳又收多熟早如近城郭摘豆角賣先可變物舊時農莊往往獻送此豆以爲嘗新蓋一歲之中貴其先也又熟時少有人馬傷踐以此校之甚宜多種農政全書豌豆生田野間其苗初搨地生後分莖叉葉似苜蓿葉而細莖葉稍間開淡葱白搨花結小角有豆如􅀈豆狀味甜本草綱目李時珍曰胡豆豌豆也其苗柔弱宛宛故得豌名種出胡戎嫩時青色老則斑麻故有胡戎青斑麻累諸名陳藏器拾遺雖有胡豆但云苗似豆生田野間米中往往有之然豌豆蠶豆皆有胡豆之名陳氏所云蓋豌豆也豌豆之粒小故米中有之爾雅戎菽謂之荏菽管子山戎出荏菽布之天下並註云即胡豆也唐史畢豆出自西戎囘鶻地面張揖廣雅畢豆豌豆留豆也别録序例云丸藥如胡豆大者即青斑豆也孫思邈千金方云青小豆一名胡豆一名麻累鄴中記云石虎改胡豆爲國豆此數說皆指豌豆也蓋古昔呼豌豆爲胡豆今則蜀人專呼蠶豆爲胡豆而豌豆名胡豆人不知矣又鄉人亦呼豌豆爲淮豆蓋囘鶻音相近也又李時珍曰豌豆種出西胡今北土甚多八九月下種苗生柔弱如蔓有鬚葉似蒺藜葉兩兩對生嫩時可食三四月間開小花如蛾形淡紫色結莢長寸許子圓如藥丸亦似甘草子出胡地者大如杏仁煮炒皆佳磨粉麵甚白細膩百穀之中最爲先登又豌豆氣味甘平無毒農政全書野豌豆生田野中苗初就地拖秧而生後分生莖义苗長二尺餘葉似胡豆葉稍大又似苜蓿葉亦大開淡粉紫花結角似家豌豆角但秕小味苦本草綱目李時珍曰野豌豆粒小不堪惟苗可茹名翹揺王禎農書蠶豆蠶時始熟故名百穀之中最爲先登蒸煮皆可便食是用接新代飯充飽今山西人用豆多麥少磨麵可作餅餌而食農政全書蠶豆今處處有之生田園中科苗高二尺許莖方其葉狀類黑豆葉而團長光澤紋脉堅直色似豌豆頗白莖葉稍間開白花結豆角其豆似豇豆而小色赤味甜又蠶豆種花田中冬天不拔花秸用以拒霜至清明後拔之又蠶豆八月初種臘月宜厚壅之此種極救農家之急且蝗所不食本草綱目李時珍曰蠶豆莢狀如老蠶故名王禎農書謂其蠶時始熟故名亦通吳瑞本草以此爲豌豆誤矣此豆種亦自西胡來雖與豌豆同名同時種而形性迥别太平御覽云張騫使外國得胡豆種歸指此也今蜀人呼此爲胡豆而豌豆不復名胡豆矣又李時珍曰蠶豆南土種之蜀中尤多八月下種冬生嫩苗可茹方莖中空葉狀如匙頭本圓末尖面緑背白柔厚一枝三葉二月開花如蛾狀紫白色又如豇豆花結角連綴如大豆頗似蠶形蜀人收其子以備荒歉又蠶豆氣味甘微辛平無毒農政全書豇豆今處處有之人家田園多種就地拖秧而生亦延籬落葉似赤小豆葉而極長􅕏開淡紫粉花結角長五七寸其豆味甘又豇豆穀雨後種六月收子收來便種八月又收子本草綱目李時珍曰豇豆紅色居多莢必雙生故有豇䜶䝄之名廣雅指爲胡豆誤矣又李時珍曰豇豆處處三四月種之一種蔓長丈餘一種蔓短其葉俱本大末尖嫩時可茹其花有紅白二色莢有紅白紫赤斑駮數色長者至二尺嫩時充菜老則收子此豆可菜可果可穀備用最多乃豆中之上品又豇豆氣味甘鹹平無毒李時珍曰豇豆開花結莢必兩兩並垂有習坎之義豆子微曲如腎形所謂豆爲腎穀者宜以此當之農政全書紫豇豆人家園囿中種之莖葉與豇豆同但結角色紫長尺許味微甜農政全書藊豆清明日下種以灰蓋之不宜土覆芽長分栽搭棚引上又徐光啟曰以口向上種粒粒出若扁種十不出一蓋豆瓣重頂土不起故爛耳本草綱目李時珍曰藊莢形扁也沿籬蔓衍也蛾眉象豆脊也又陶𢎞景曰藊豆人家種之於籬垣其莢蒸食甚美蘇頌曰蔓延而上大葉細花花有紫白二色莢生花下其實有黑白二種白者温而黑者少冷入藥用白者黑者名鵲豆蓋以其黑間有白道如鵲羽也李時珍曰藊豆二月下種蔓生延纒葉大如杯團而有尖其花狀如小蛾有翅尾形其莢凡十餘様或長或團或如龍爪虎爪或如猪耳刀䥥種種不同皆累累成枝白露後實更繁衍嫩時可充蔬食茶料老則收子煮食子有白黑赤斑四色一種莢硬不堪食惟豆子粗圓而色白可入藥又藊豆氣味甘微温無毒又李時珍曰硬殻白藊豆其子充實白而微黄其氣腥香其性溫平得乎中和脾之穀也其軟殻及黑鵲色者其性微涼可供食亦調脾胃農政全書山藊豆生田野中小科苗髙一尺許葉似蒺藜葉微大根葉比苜蓿葉頗長又似初生豌豆葉開黄花結小扁角兒味甜酉陽雜俎挾劒豆樂浪東有融澤澤中生豆莢形似人挾劒横斜而生農政全書刀豆處處有之人家園籬邊多種之苗葉似豇豆葉肥大開淡粉紅花結角如皂角狀而長其形似屠刀様故以名之味甜微淡又刀豆清明日鋤地作穴每穴下種一粒以灰蓋之只用水澆待芽出則澆以糞水蔓長搭棚引上本草綱目李時珍曰刀豆以莢形命名也又汪頴曰刀豆長尺許可入醬用李時珍曰刀豆人多種之三月下種蔓生引一二丈葉如豇豆葉而稍長大五六七月開紫花如蛾形結莢長者近尺微似皂角扁而劒脊三稜宛然嫩時煮食醬食蜜煎皆佳老則收子子大如拇指頭淡紅色同猪肉雞肉煮食尤美又刀豆氣味甘平無毒欽定授時通考卷二十八
