body:
  text: 欽定四庫全書欽定授時通考卷四十九勸課本朝重農祈穀謹案月令天子以元日祈穀於上帝蓋人君代天理物欽若敬授未有不以農事為先務我國家修明典禮尤重民生太宗文皇帝繼天立極肇祀郊壇世祖章皇帝創業垂統乗時定制每歲孟春上辛祈穀于上帝一切典禮與冬至大祀同聖祖仁皇帝釐定樂章禮文大備康熙二十八年復命另撰祈穀祝文將肫懇恤民之意切實祈求世宗憲皇帝視民如傷盡誠盡敬每歲躬祀郊壇為民請命天心協應叠降嘉祥薄海内外無不食德飲和仰䝉福佑我皇上御極以來闓澤覃敷深仁普洽蠲免賑恤之典史不勝書凡閭閻之疾苦稼穡之艱難無弗洞悉周知厪懷夙夜齋宮淵穆對越精誠皇衷之懇至肫勤視小民望歳之心尤切于萬萬惟上帝監觀四方惟列聖陟降左右錫兹祉福粒我蒸民至誠感神呼吸通于帝座理固然矣蓋以民事為己事以天心為己心聖聖相承道同心一非明禋將享之文所能擬諸形容也謹照大清會典及禮部所定現行儀注載祈穀禮儀於後祈榖儀凡上辛祈榖前後儀節陳設順治初詳定遵行惟配享神位逓增儀亦逓備今照題請儀注具列於後一前期五日詣犧牲所視牲皇帝親詣行禮遣官視牲一前期三日太常寺官進齋戒牌銅人皇帝致齋三日各衙門俱設齋戒牌應陪祀王以下各官齋戒如常儀一前期二日遣禮部堂官一員省牲一前期一日皇帝陞太和殿視祝文視玉視帛視香行禮復至龍亭前上香行禮太常寺官送祝文玉帛香至天壇神庫内青案上安設一前期一日禮部都察院太常寺光祿寺官俱朝服上香監宰牲並瘞毛血一正祭日鹵簿大駕全設皇帝御禮服出宮乗輦駕進壇西門降輦至更衣幄次更祭服盥手畢進大享殿内就拜位王以下陪祀各官俱序列燔柴迎帝神奏中平之章皇帝陛壇詣上帝香案前上香次詣太祖高皇帝太宗文皇帝世祖章皇帝聖祖仁皇帝世宗憲皇帝位前上香畢旋位行禮唱奠玉帛樂奏肅平之章皇帝陞壇詣上帝位前獻玉帛次詣太祖高皇帝太宗文皇帝世祖章皇帝聖祖仁皇帝世宗憲皇帝位前奠帛畢旋位唱進俎樂奏咸平之章皇帝陞壇以次進俎畢旋位行初獻禮樂奏夀平之章皇帝陞壇詣上帝位前獻爵畢讀祝官跪讀畢皇帝行禮復詣太祖高皇帝太宗文皇帝世祖章皇帝聖祖仁皇帝世宗憲皇帝位前獻爵禮畢旋位行亞獻禮樂奏景平之章皇帝陞壇以次獻爵如初獻儀禮畢旋位行終獻禮樂奏永平之章皇帝陞壇以次獻爵如前儀獻畢旋位太常寺官唱賜福胙皇帝就位受爵受胙行禮旋位復行禮謝福胙徹饌樂奏凝平之章捧玉官捧蒼璧退送神樂奏清平之章皇帝行禮職事官捧祝帛香饌恭送燎位望燎樂奏太平之章皇帝詣望燎位祝帛焚半奏禮畢皇帝由東甎門出更衣陞輦設鹵簿大駕教坊司作樂奏祐平之章皇帝還宮樂章迎帝神樂奏中平之章惟帝勤民兮求莫匪舒小民何依兮黍稷與與元日有事兮百辟趨為民請命兮食咸需遥瞻龍駕兮歴紫虛日臨黃道兮東風徐臣深昭事兮遑寧居願垂嘉惠兮大有書奠玉帛樂奏肅平之章民天惟食兮農事先粒我蒸民兮有大田風霆流形兮雨澤霑實穎實栗兮氣化全玉帛祇奏兮祗禋䖍仰祈寰宇兮享豐年進俎樂奏咸平之章鼎烹兮苾芬嘉薦兮無文奉雕俎兮大武羶薌建兮氣干雲昭普存兮民力惟明德兮馨聞初獻樂奏夀平之章初獻兮㫖酒盈著誠致潔兮犧尊盛儼對越兮在上惟昭明兮有融瑟黃流兮玉瓚帝心歆假兮賚嘉禎亞獻樂奏景平之章著尊啟兮告䖍清酤次第兮舉前禮再獻兮肅拜列瑶觴兮秩斯筵神悦懌兮如在惠我嘉生兮福便便終獻樂奏永平之章終獻兮泰尊移苾芬嘉㫖兮圭瓚交馳神既醉止兮錫祉禮成於三兮陳詞願灑餘瀝兮沐羣黎臣拜手兮望雲霓徹饌樂奏凝平之章俎豆具陳兮庶品齊舉荷昭鑒兮靡或遺饌告徹兮玉几登歌洋溢兮式禮無違肅微忱兮告終事上帝居歆兮錫純禧送帝神樂奏清平之章祇奉天威兮弗敢康小心翼翼兮昭穹蒼雲垂九天兮露瀼瀼翠旗羽節兮歸何鄉臣拜下風兮意徬徨願沛汪澤兮時其雨𤾉望燎樂奏太平之章翹首兮天閶邈彼雲海兮何蒼茫􅌊蕭束帛兮薦馨香精誠咸格兮降福穰四時順序兮百榖以昌臣同兆姓兮感荷恩光皇帝還宮導迎樂作奏祐平之章皇天有命列聖承之我后配德文匡武綏海隅寧謐神靈宴娭於萬斯年流慶降釐耕耤謹案仲春耕耤以供粢盛以重農事甚盛典也我朝列聖相承勤民務本世祖章皇帝智勇天錫統一寰宇順治十一年躬祀先農行耕耤禮欽定一切儀章為萬世法聖祖仁皇帝聖神文武仁孝性成康熙十一年耕耤行告祭奉先殿禮世宗憲皇帝仁育義正宵旰憂勤雍正二年以後每歲躬耕三推禮畢再行一推以示率先農功至意耤田嘉禾歲生至有十三穗者蓋精誠感格若斯之盛也又命直省郡邑各設耤田所在官吏遵行惟謹故自開國以來大有頻書海内家給人足比隆于唐虞三代之盛我皇上至誠大孝念切民依乾隆三年行耕耤禮四年照例舉行億萬斯年著為定例開蒸民粒食之源充六宇太和之氣山農野老熙熙然相忘于撃壤鼓腹之下者皆聖主敬天法祖肫勤教育之深恩也謹遵照大清會典及禮部所定現行儀注載躬祀先農壇耕耤禮儀於後祭先農壇儀皇帝舉耕耤禮則親祭先農壇其每年常祀定于春二月順治十一年二月世祖章皇帝行耕耤禮親祭先農壇康熙十一年二月聖祖仁皇帝行耕耤禮親祭先農壇前期遣官告祭奉先殿一應禮儀俱與順治十一年同雍正二年二月世宗憲皇帝行耕耤禮親祭先農壇一應禮儀與康熙十一年同以後每年舉行乾隆三年二月皇上行耕耤禮親祭先農壇前期親祭奉先殿四年二月上親行耕耤禮如前儀一前期二日太常寺官進齋戒牌銅人皇帝致齋二日王以下陪祀各官俱齋戒二日一前期二日太常寺官視牲一前期一日皇帝御中和殿視祝文畢太常寺官捧祝版送至先農壇神庫内安設一前期一日禮部都察院太常寺光祿寺官赴壇監視宰牲瘞毛血一正祭日皇帝具禮服乗輦至壇進具服殿盥手畢至壇上黃幄次立王以下陪祀各官俱排立迎神樂奏永豐之章皇帝陞壇上香行禮初獻奏時豐之章職事官獻帛爵讀祝畢皇帝行禮亞獻奏咸豐之章終獻奏大豐之章各獻畢奏賜福胙皇帝受爵受胙行禮謝福胙徹饌樂奏屢豐之章送神樂奏報豐之章皇帝行禮職事官捧祝帛香饌送瘞位樂奏慶豐之章皇帝親視奏禮成退次行耕耤禮樂章迎神樂奏永豐之章勾芒秉令土牛是驅天下一人蒼龍駕車念彼田疇民命所需生成有德尚式臨諸奠帛初獻樂奏時豐之章先農神哉耒耜教民田祖靈哉稼穡是親功德深厚天地同仁肅將幣帛肇舉明禋厥初生民萬彚莫辨神錫之庥嘉種乃誕執兹醴齊農功益見玉瓚椒醑肅雍舉奠亞獻樂奏咸豐之章上原下隰百穀盈止粒我烝民秀良興起樂舞具備吹豳稱兕再躋以獻肴馨酒㫖終獻樂奏大豐之章糜芑秬秠維神所貽以神饗神曰予將之秉耒三推東作允宜五風十雨率土何私徹饌樂奏屢豐之章於皇農事自古為烈莫敢不承今兹忻悦籩豆既豐簠簋云潔神視井疆執事告徹送神樂奏報豐之章麻麥芃芃秔稻連阡縱横萬里皆神所瞻人歌鼓腹史載有年歲有常典茀祿綿延望瘞樂奏慶豐之章玉版蒼幣來鑒來歆敬之重之藏於厚深典禮由古予行自今樂樂利利國以永寧耕耤儀凡耕耤儀節係順治十二年題定康熙十一年增告祭奉先殿典禮雍正二年頒定樂章一躬耕耤田必用亥日一前期一日遣官告祭奉先殿一皇帝躬祭先農壇行耕耤禮於前期視祝版日設皇帝耕耤耒耜鞭種青箱綵亭三座設三王九卿從耕青箱綵亭四座於午門外户部禮部堂官同順天府堂官入進器具穀種於太和殿下安設皇帝陞中和殿行閲視祝版禮畢皇帝御保和殿户部堂官先捧皇帝耕耤耒耜次捧鞭次捧稻種匣安設于中和殿殿内正中次捧三王耕耤麥種匣穀種匣九卿耕耤豆種匣黍種匣安設于中和殿内左右畢皇帝自保和殿陞中和殿至各陳設處閲畢還宮户部官捧耒耜穀種各匣至太和殿堦下授順天府捧出午門左門置各綵亭内教坊司作樂前導送至耕耤所安設一是日早皇帝致祭先農壇畢御具服殿更補服黃龍袍少憩從耕三王九卿及不從耕王以下各官俱更蟒袍補服禮部太常寺堂官奏請皇帝詣耕耤位南向立從耕三王九卿各就耕位立不從耕王以下各官俱在耕耤蓆棚外按翼排立耕耤耒耜鞭青箱綵亭三座及三王九卿青箱綵亭四座陳設左右教坊司領樂官四員頂帶老人四名歌三十六禾詞樂工十二名鑼鼓板樂工六名執义執扒執箒執鍁蓑衣斗篷樂工二十名五色彩旗樂工五十名順天府耆老三十四名上農夫十名中農夫十名下農夫十名俱兩旁排立鴻臚寺官贊進耒耜户部堂官北向跪進耒耜皇帝右手秉耒贊進鞭順天府尹北向跪進鞭皇帝左手持鞭耆老二人牽牛上農夫二人扶犁禮部太常寺鑾儀衞官恭導皇帝秉耒行耕耤禮教坊司樂工鳴鑼鼓歌三十六禾詞招颭彩旗唱和隨行皇帝三推三返再行一推禮畢贊受耒耜户部堂官跪受耒耜贊受鞭順天府尹跪受鞭各置綵亭内禮部堂官奏請皇帝旋位立户部堂官順天府尹執青箱播種耆老隨後覆土畢順天府尹以青箱置綵亭内禮部堂官奏請觀耕皇帝御觀耕臺南向坐不從耕王以下各官分翼序立三王各五推五返各用耆老一人牽牛農夫二人扶犁順天府㕔官隨後播種耕畢三王退就班位立諸王等俱候㫖序坐次九卿各九推九返各用耆老一人牽牛農夫二人扶犁順天府㕔官及兩縣各官隨後播種耕畢九卿退就本班立順天府官將青箱置左右所設三王九卿盛種綵亭内禮部堂官奏耕耤禮畢駕興由東階出先農門外陞輦教坊司作導迎大樂至齋宮陳設大樂作皇帝陞座暫御後殿王以下公以上在臺上文武各官在臺下東西向按翼排立禮部堂官奏請御齋宮樂作皇帝陞座順天府官兩縣官率耆老農夫等由西門入排立贊行三跪九叩頭禮農夫三十人服本等服色各持農器隨後行禮丹陛樂作禮畢退至耕所農夫終畝候耕畢府縣官至東門報終畝畢鴻臚寺官跪奏親耕既成禮當慶賀王以下各官排班丹陛樂作贊行三跪九叩頭禮禮畢退就班行一叩禮序坐賜茶畢大樂作駕興御後殿光祿寺設宴畢大樂作皇帝陞座王以下各官就原位行一叩頭禮序坐進宴丹陛樂作奏雨暘時若之章安宴桌畢進酒西簷下作管絃樂笙簫合奏奏五穀豐登之章皇帝舉酒王以下各官于本位跪行一叩頭禮復坐進饌東簷前作清樂奏家給人足之章徹樂王以下各官排班聽贊行一跪三叩頭禮丹陛樂作禮部堂官奏禮畢王以下各官出齋宮大門外排立恭候皇帝乗輦出鹵簿大駕前導教坊司作還宮樂奏祐平之章皇帝還宮耕耤三十六禾詞光華日月開青陽房星晨正呈農祥帝念民依重耕桑肇新千耤考典章吉蠲元辰時日良蒼龍鑾輅臨天閶青壇峙立西南方犧牲簠簋升芬芳皇心祇敬天容莊黃幕致禮䖍誠將禮成移蹕天田旁土膏沃洽春洋洋黛犁行地牛服韁司農穜稑盛青箱洪縻在手絲鞭揚率先稼穡為民倡三推一墢制有常五推九推數逓詳王公卿尹咸贊襄甸人千耦列雁行耰鋤既畢恩澤滂自天集福多豐穰來牟蕎蘥森紫芒華薌赤甲秈稈䄱秬秠三種黎白黃稷粟堅好碩且香糜芑大穗盈尺長五菽五豆充壠場穄粢􅓱䵖九色糧蜀秫王黍兼東廧烏禾同收除童粱雙歧合穎邊理疆千箱萬斛收神倉四時順序百穀昌八區九有富蓋藏歡騰億兆感聖皇皇帝進宴奏雨暘時若之章祥開黼座兮布瓊筵笙歌迭奏兮天樂宣三推既舉兮賜豐年五風十雨兮時不愆優渥霑足兮溉大田皇心悦豫兮福祿綿皇帝進酒奏五穀豐登之章龍犁轉兮春風生帝勤稼穡兮供粢盛戒農用兮勸服耕富教化行兮百穀成禾九穗兮麥兩莖黍稷重穋兮充棟楹歲登大有兮怡聖情堯樽特進兮玉醴盈勞酒禮飲兮邁鎬京皇帝進膳奏家給人足之章嘉禾炊饌兮雲子芳仙㕑瓊粒兮匕箸香吾皇重農兮禮肅將明昭感格兮錫嘉祥千倉萬箱兮百穀穰崇墉比櫛兮遥相望豐亨樂利兮遍八方家多充積兮野餘糧含哺鼓腹兮化日長朝饔夕飱兮夀而康萬國同慶兮璿圖昌直省耕耤儀雍正五年題准耕耤儀注頒行直省各擇東郊官地潔浄豐腴者立為耤田如無官地動支正項錢糧置買民田以四畝九分為耤田即於耤田後建立先農壇供奉神牌收貯祭品選擇勤謹農夫二名免其差役酌給口糧令居壇西配房看守朝夕灑掃每歲耕耤之日祭先農壇禮畢各官俱更蟒袍補服省城督撫秉耒知縣執青箱知府播種府城知府秉耒佐貳執青箱知縣播種知州正印官秉耒佐貳執青箱播種專城衞所用正印官秉耒如無屬員即選擇耆老執青箱播種耕時用耆老一人牽牛農夫二人扶犁俱照九卿之例九推九返農夫終畝耕畢各率耆老農夫行望闕三跪九叩頭禮其農具俱用赤色牛用黑色箱用青色所盛耔種悉從各處土宜即著守壇宇農夫灌溉耤田地方官不時勸課將每年所收米穀及用過粢盛數目造冊報布政司送户部查核至各省耕耤日期每年十月初一日頒時憲書後交欽天監選擇吉期禮部奏請欽定通行奉天府府尹直𨽻各省督撫轉飭所屬同日舉行永著為令豐澤園演耕儀耕耤之前二日皇帝詣豐澤園演耕是日禮部尚書順天府府尹各率其屬穿蟒袍補服於耕所祇候青箱穀種照例陳設皇帝御龍舟至先詣時應宮拈香畢至耕所順天府府尹進鞭皇帝扶犁三推御前大臣侍衞襄事禮畢皇子諸王學習農事駕回宮内務府官員終畝欽定授時通考卷四十九
