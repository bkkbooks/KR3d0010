body:
  text: 功作攻治詩豳風九月築場圃十月納禾稼疏場圃同地自物生之時耕治以種菜茹至物盡成熟堅築以為場納內也治於場而內之囷倉也又十月滌場疏在場之功畢故滌掃其場大雅或舂或揄或簸或蹂傳揄抒臼也或簸糠者或蹂黍者箋舂而抒出之簸之又潤濕之將復舂之趣於鑿也疏孔穎達曰抒臼謂抒米以出臼也出臼則簸之故或有簸糠者或蹂黍者謂蹂踐其黍然後舂之周禮地官舂人奄二人女舂抌二人奚五人注女舂抌女奴能舂與抌者抌抒臼也春秋運斗樞粟五變以陽化生而為苗秀為禾三變而粲謂之粟四變八臼米出甲五變而蒸飯可餐鄭氏詩箋疏粗也謂糲米也米之率糲十稗九鑿八侍御七疏正義曰言米之率其術在九章粟米之法云粟率五十糲米三十稗二十七鑿二十四御二十一言粟五升為糲米三升以下則米漸細故數益少四種之米皆以三約之得此數也通鑑前編外紀黃帝作杵臼而穀粟始鑿新論桓談曰宓犧之制杵臼萬民以濟及後人加功因延力借身重以踐碓而利十倍杵舂又復設機關用驢騾馬牛及役水而舂其利且百倍方言凡以火乾五穀之類出自山東齊楚以往曰熬隴冀以往曰􅀢秦晉之間曰焣說文米穀實也麵麥末也齊民要術凡穀成熟有早晚苗稈有高下收實有多少質性有强弱米味有美惡粒實有息耗早熟者苗短而收多晚熟者苗長而收少强苗者短黃穀之屬是也弱苗者長青白黑者是也收少者美而耗收多者惡而息事物原始世本曰公輸般作磨磑之始編竹附泥破穀出米曰磑鑿石上下合研米麥為粉曰磨二物皆始於周菽園雜記吳中民家計一嵗食米若干石至冬月舂白蓄之名冬舂米常疑開春農務將興不暇為此及冬預為之聞之老農云不特為此春氣動則米芽浮起米粒亦不堅此時舂者多碎而為粞折耗頗多冬月米堅折耗少故及冬舂之書蕉舂米一石得四斗曰精得三斗曰鑿得二斗曰粹嶺表録異記舂堂者以渾木刳為槽一槽兩邊排十杵男女間立以舂稻粱敲磕槽舷皆有遍拍閩部疏閩中水碓最多然多以木匱運輪不駛急溪中壅激為之則佳㑹稽志山家藉水力以舂有三制平流則以輪鼓水而轉峻流則以水注輪而轉又有木杓碓碓幹之末刳為杓以注水水滿則傾而碓舂之唐白居易詩雲碓無人水自舂是也篷櫳夜話歙人工製腐磨皆紫石細稜菽受磨絶膩滑無滓有自然之甘本草綱目李時珍曰糠諸粟穀之殼也其近米之細者為米粃味極甜儉年人多和劑蒸煮以救饑云各種攻治法稻齊民要術藏稻必須用簟久居者如劁麥法舂稻必須冬時積日燥曝一夜置霜露中即舂若冬舂不乾即米青赤脉起不經霜不燥曝則米碎矣秫稻法一切同天工開物攻稻篇凡稻刈穫之後離藁取粒束藁於手而擊取者半聚藁於場而曳牛滾石以取者半凡束手而擊者受擊之物或用木桶或用石板收穫之時雨多霽少田稻交濕不可登場者以木桶就田擊取晴霽稻乾則用石板甚便也凡服牛曳牛滚壓場中視人手擊取者力省三倍但作種之榖恐磨去殼尖減削生機故南方多種之家場禾多藉牛力而來年作種者則寧向石板擊取也凡稻最佳者九穰一秕倘風雨不時耘耔失節則六穰四秕者容有之凡去秕南方盡用風車扇去北方稻少用揚法即以揚麥黍者揚稻蓋不若風車之便也凡稻去殼用礱去膜用舂用碾然水碓主舂則兼併礱功燥乾之穀入碾亦省礱也凡礱有二種一用木為之截木尺許斫合成大磨形兩扇皆鑿縱斜齒下合植筍穿貫上合空中受穀木礱攻米二千餘石其身乃盡凡木礱穀不甚燥者入礱亦不碎故入貢軍國漕儲千萬皆出此中也一土礱析竹匡圍成圈實潔淨黃土於內上下兩面各篏竹齒上合芻空受穀其量倍於木礱穀稍滋濕者入其中即碎斷土礱攻米二百石其身乃朽凡木礱必用健夫土礱即孱婦弱子可勝其任庶民饔飱皆出此中也凡既礱則風扇以去糠秕傾入篩中團轉穀未剖破者浮出篩面重復入礱凡篩大者圍五尺小者半之大者其中心偃隆而起健夫利用小者弦高二寸其中平窪婦人所需也凡稻米既篩之後入臼而舂臼亦兩種八口以上之家堀地藏石臼其上臼量大者容五斗小者半之橫木穿插碓頭足踏其末而舂之不及則粗太過則粉精糧從此出焉晨炊無多者斷木為手杵其臼或木或石以受舂也既舂以後皮膜成粉名曰細糠以供犬豕之豢荒歉之嵗人亦可食也細糠隨風扇播揚分去則膜塵淨盡而粹精見矣凡水碓山國之人居河濱者之所為也攻稻之法省人力十倍人樂為之引水成功即筒車灌田同一制度也設臼多寡不一值流水少而地窄者或兩三臼流水洪而地室寬者即並列十臼無憂也江南信郡水碓之法巧絶蓋水碓所愁者埋臼之地卑則洪潦為患高則承流不及信郡造法即以一舟為地撅椿維之築土舟中陷臼於其上中流微堰石梁而碓已造成不煩椓木壅坡之力也又有一舉而三用者激水轉輪頭一節轉磨成麵二節運碓成米三節運水灌於稻田此心計無遺者之所為也凡河濱水碓之國有老死不見礱者去糠去膜皆以臼相終始惟風篩之法則無不同也凡磑砌石為之承藉轉輪皆用石牛犢馬駒惟人所使蓋一牛之力日可得五人但入其中者必極燥之榖稍潤則碎斷也粱秫羣芳譜蜀秫黏者可作餌不黏者可作糕煮粥可濟饑莖可織箔編席夾籬供㸑稍可作筅帚有利於民最博黍稷天工開物凡攻治小米揚得其實舂得其精磨得其碎風揚車扇而外簸法生焉其法篾織為圓盤鋪米其中擠勻揚播輕者居前簸棄地下重者在後嘉實存焉凡小米舂磨揚播制器詳見稻麥羣芳譜黍刈後乘濕即打則稃易脫遲則稃著粒上難脫黍米性黏可作餳可蒸煮為糕糜稷有薄殼粒米稍大可作飯麥齊民要術大小麥立秋前治訖立秋後則蟲生蒿艾簟盛之良多種久居供食者宜作劁麥倒刈薄布順風放火火既著即以掃帚撲滅仍打之如此者夏蟲不生然唯中作麥飯與麵用耳又瞿麥渾蒸曝乾舂去皮米全不碎炊作飱甚滑細磨下絹篩作餅亦滑美又青稞麥治打時少難唯伏日用碌碡碾磨總盡無麩羣芳譜小麥實居殼中芒生殼上性有南北之異北地麥晝花薄皮多麵食之宜人南方麥夜花食之難消地氣使然也大麥芒長殼與粒相黏未易脫小麥磨麵大麥堪碾米作粥飯煮粥甚滑磨麵作醬甚甘天工開物小麥收穫時束藁擊取如擊稻法其去秕法北土用揚蓋風扇流傳未遍率土也凡揚不在宇下必待風至而後為之風不至雨不收皆不可為也凡小麥既揚之後以水淘洗塵垢淨盡又復曬乾然後入磨磨大小無定形大者用肥健力牛曳轉其牛曳磨時用桐殼掩眸不然則眩暈其腹繫桶以盛遺不然則穢也次者用驢磨斤兩稍輕又次小磨則止用人力推挨者凡牛力一日攻麥二石驢半之人則强者攻三斗弱者半之若水磨之法其詳已載攻稻水碓中制度相同其便利又三倍於牛犢也凡牛馬與水磨皆懸袋磨上上寬下窄貯麥數斗於中陷入磨眼人力所挨則不必也又凡麥經磨之後幾番入羅勤者不厭重復羅匡之底用絲織羅地絹為之湖絲所織者羅麵千石不換若他方黃絲所為經百石而已朽也又凡麵既成後寒天可經三月春夏不出二十日則鬱壞為食適口貴及時也豆天工開物凡豆菽刈穫少者用耞多而省力者仍鋪場烈日曬乾牛曳石趕而壓落之凡打豆耞竹木竿為柄其端錐圓眼拴木一條長三尺許鋪豆於場執柄而擊之凡豆擊之後用風扇揚去莢葉篩以繼之嘉實灑然入廩矣是故舂磨不及麻磑碓不及菽也羣芳譜黑豆堪食用作豉及喂牲畜黃豆稍肥可食可醬可豉可油可腐腐之滓可喂猪荒年人亦可充饑油之滓可糞地萁可然火葉名藿嫩時可為茹緣豆可作粥飯煼食炒食水泡磨為粉澄濾作餌蒸糕蕩皮壓索為食中要物脂麻羣芳譜取油以白者為勝服食以黑者為良雞肋篇芝麻炒焦壓榨方可得油家孰事親油生笮者良有潤燥解毒止痛消腫之功蒸炒者可食用及燃㸃不入藥又麻餅笮去油麻滓也亦名麻籸可食荒嵗人以救饑入鹽作醬甚滑膩又可養魚肥田周禮疆㯺用蕡亦此意也蕎麥羣芳譜蕎麥舂取米可作飯磨為麵滑膩亞於麥麵北人作餅餌日用以供常食南人作粉餌食攻治具各圖說土礱木礱水礱礱磨揚扇風扇車杵臼碓缸碓水碓槽碓清青碾小碾水碾水碾三事磨水磨連二水磨水轉連磨油榨麵羅水打羅晒槃穀杷籭簸箕揚藍􅓕䉛筲升斗古斛今斛擊壤圖土礱圖說礱礧穀器所以去穀殼也編竹作圍內貯泥土狀如小磨仍以竹木排為密齒破穀不致損米就用拐木竅貫礱上掉軸以繩懸檁上人力運肘以轉之日可破穀四十餘石木礱圖說木礱多用松木為之形如大磨兩扇皆鑿齒下合植筍穿貫上合場中植架懸掉軸以衆力曳轉去穀出米殷殷如雷聲田家通力合作雜以倡和之聲慶成事也水礱圖說水礱水轉礱也礱制上同但下置輪軸以水激之一如水磨日夜所破穀數可倍人畜之力水利中未有此制今特造立庶臨流之家以憑倣用可為永利礱磨圖說有廢磨上級已薄可代穀礱亦不損米或人或畜轉之謂之礱磨復有畜力挽行大木輪軸以皮弦或大繩繞輪兩周復交於礱之上級輪轉則繩轉繩轉則礱亦隨轉計輪轉一周則礱轉十五餘周比用人工既速且省揚扇圖說揚扇集韻云揚風飛也揚穀器其制中置簨軸列穿四扇或六扇用薄板或糊竹為之復有立扇卧扇之别各帶掉軸或手轉足躡扇即隨轉凡舂碾之際以糠米貯之高檻底通作匾縫下瀉均細如簾即將機軸掉轉搧之糠粞既去乃得淨米又有舁之場圃間用之者謂之扇車凡揉打麥禾等稼穰籺相雜亦須用此風搧比之杴擲箕簸其功數倍風扇車圖說風扇車與揚扇功用略同而制尤備以木為四柱周以板穴其尾以出糠髙可六尺廣五尺餘其腹左為圜形以內簨軸及扇著其柄於外右為方斗盛榖實底作匾縫承以小門門之樞亦見於外其下作斜木斗二正側並列形如箕皆斜下向人以一手運軸一手啓門以寫榖實榖實重者從正面木斗直下粞稍輕從旁列木斗出糠灰最輕即從尾穴隨扇飛出農家攻治米榖最為便利杵臼圖說杵臼舂也按古舂之制䄷百一十斤稻重一䄷為米二十斗為米十斗曰毇為米六斗大半斗曰粲又曰糲米一石舂為九斗曰糳鑿米之精者斯古舂之制自杵臼始也碓圖說碓舂器用石杵臼之一變也廣雅曰􅀈碓也方言云碓梢謂之碓機自關而東謂之梴桓談新論曰杵臼之利後世加巧因借身重以踐碓而利十倍缸碓圖說缸碓掘埋缸坑深逾二尺下木地釘三莖置石於上後將大磁缸穴其底向外側嵌坑內取碎磁灰泥和之窒底孔令圓滑候乾透用半竹篘長七寸徑四寸如合脊瓦樣下稍闊以熟皮圍之倚缸下唇篘下兩邊石壓之或兩竹竿刺定隨注糙於缸用碓木杵搗於篘內缸既圓滑米自翻倒􅉡篘內然木杵既輕動防狂迸須踏碓時已起而落隨以左足躡其碓腰方穩順一缸可舂米三石始於浙又名浙碓今多於津要米商輳集處置設上農之家用米多亦宜置之水碓圖說機碓水搗器也通俗文云水碓曰翻車碓孔融論水碓之巧勝於聖人斷木掘地則翻車之類愈出後世之機巧今人造水輪輪軸長尺列貫橫木相交如滾搶之制水激輪轉則軸間橫木打所排碓梢一起一落舂之即連機碓也凡流水岸傍俱可設置度水勢高下如水下岸淺用陂柵平流用板木障水俱使傍流急注貼岸置輪高丈餘自下衝轉名撩車碓若水高岸深則輪減小而闊以板為級上用木槽引水直下射轉輪板名曰斗碓又曰豉碓隨地所制也槽碓圖說槽碓碓梢作槽受水以為舂也凡所居之地間有泉流稍細可選低處置碓一區一如常碓之制但前頭減細後稍深闊為槽可貯水斗餘上庇以厦槽在厦乃自上流用筧引水下注於槽水滿則後重而前起水㵼則後輕而前落即為一舂如此晝夜不止可毇米兩斛日省二工以嵗月積之知非小利海青輾圖說輥輾世呼曰海青輾喻其速也但比常輾減去圖槽就碢幹栝以石輥輥徑可三尺長可五尺上置板檻隨輾幹圓轉作竅下穀不計多寡旋輾旋收易於得米較之碢輾疾過數倍故比於鷙鳥之尤者人皆便之徐光啓曰江右木作槽輾山右石作搖輾皆取機勢倍勝常輾小碾圖說小碾一制在稻麥之外北方攻小米者家置石墩中高邊下邊沿不開槽鋪米墩上婦子兩人相向接手而碾之其碾石圓長如牛趕石而兩頭插木柄米墮邊時隨手以小篲掃上家有此具杵臼竟懸也水碾圖說水碾水輪轉碾也後魏書崔亮教民為碾奏於張方橋東堰谷水造水碾數十區豈水碾之制自此始歟其碾制上同但下作卧輪或立輪如水磨之法輪軸上端穿其碢幹水激則碢隨輪轉循槽轢榖疾若風雨日所毇米比於陸碾功利過倍水輾三事圖說水輾三事謂水轉輪軸可兼三事磨礱輾也初則置立水磨變麥作麵一如常法復於磨之外周造輾圓槽如欲毇米惟就水輪軸首易磨置礱既得糲米則去礱置碾碢幹循槽碾之乃成熟米夫一機三事始終俱備變而能通兼而不乏省而有要誠便民之活法造物之潛機今創此制幸識者述焉磨圖說䃺唐韻作磨磑也說文云䃺石磑也世本曰公輸班作磑方言或謂之䃀通俗文曰填磨曰硐磨牀曰摘今又謂主磨曰臍注磨曰眼轉磨曰幹承磨曰槃載磨曰牀多用畜力挽行或借水輪或掘地架木下置鐏軸亦轉以畜力謂之旱水磨比之常磨特為省力凡磨上皆用漏斗盛麥下之眼中則利齒旋轉破麥作麩然後收之篩羅乃得成麵世間餅餌自此始矣水磨圖說水磨當擇用水地先儘並岸劈水激轉或别引溝渠掘地棧木棧上置磨以軸轉磨中下徹棧底就作卧輪以水激之磨隨輪轉此卧輪磨也又有引水置甃為峻槽槽上兩旁植木架以承水激輪軸别作竪輪用擊在上卧輪一磨軸末一輪旁撥周圍木齒一磨既引水注槽激動水輪上旁二磨隨輪俱轉此立輪連二磨也復有兩船相傍上立四楹以茅竹為屋各置一磨索纜急水中船頭斜插板木湊水拋鐡爪水激立輪輪軸通長旁撥二磨泛漲則遷近岸為活法連二水磨圖說連磨連轉磨也其制中置巨輪輪軸上貫架木下承鐏臼復於輪之周回列繞八磨輪輻近與各磨木齒相間一牛拽轉則八磨隨輪輻俱轉用力少而見功多後魏崔亮在雍州讀杜預傳見其為八磨嘉其有濟時用劉景宜作磨奇巧特異策一牛之任轉八磨之重竊謂此雖並載前史然世罕有傳者今乃尋繹搜索度其可用述此制度庶來者效之以廣食利水轉連磨圖說水轉連磨制與陸轉連磨不同須用急流大水以湊水輪其輪高闊軸圍至合抱長隨宜中列三輪各打大磨一槃磨高匝列木齒磨在軸上閣以板木磨旁留一狹孔透輪軸以打上磨木齒此磨既轉其齒復傍打帶齒二磨三輪之功互撥九磨軸首一輪既上打磨齒復下打碓軸可兼數碓或遇天旱旋於大輪一周列置水筒晝夜溉田數頃此一水輪可供數事其利甚博陸轉連磨下用水輪亦可油榨圖說油榨取油具也用堅大四木各圍可五尺長可丈餘疊作卧枋於地其上作槽其下用厚板嵌作底槃槃上圓鑿小構下通槽口以注油於器凡欲造油先用大鑊㸑炒芝麻既熟即用碓舂或輾碾令爛上甑蒸過理草為衣貯之圈內纍積在槽橫用枋桯相拶復堅插長禊高處舉碓或椎擊劈之極緊則油從槽出此橫榨謂之卧槽立木為之者為之立槽傍用擊禊或上用壓梁得油甚速麵羅圖說麵羅以木為箱中懸羅而著撞機於外立直木以括之機之首又貫以直木下拄於軸軸有兩耳可容人足人倚於機而踏其軸軸搖則機動而麥末從羅下去麩成麵矣籭篩之屬多以竹治粉者或以絹惟麵羅之容最多而底最細其絹直以羅底名從所用也麵之上者羅至再曰重羅麵殆以精而益求其精者歟水打羅圖說水擊麵羅隨水磨用之其機與水排同按圖視譜當自考索羅因水力互擊樁柱篩麵甚速倍於人力又有就磨輪軸作機擊羅亦為捷巧曬槃圖說曬槃曝穀竹器廣可五尺許邊緣微起深可二寸其中平闊似圓而長下用溜竹二莖兩端俱出一握許以便扛移趁日攤布穀實曝之蠶時農家兼用為筐但底密而不通風氣終非蠶具穀杷圖說穀杷或謂透齒杷用攤曬穀王褒詩云曬盤留跡以杷名反覆能令五穀平籭圖說籭竹器用篩穀物說文云可以除粗取精集韻作篩又作篩或作篩其制有疏密大小之分疏而深者用於撲禾之後同稃穗子粒貯而篩之上餘穰藁下留穀物密者稍淺礱穀之後用之尤密者舂碓之後用之大者懸於架而運之小者全以人力箕圖說箕簸箕也說文云簸揚米去糠也莊子曰箕之簸物雖去粗留精然要其終皆有所除是也北人用柳南人用竹其制不同用則一也詩維南有箕載翕其舌故箕皆有舌易揚物也諺云箕星好風謂主簸揚農家所以資其用也揚籃圖說揚籃形如簸箕而小前有木舌後有竹柄農夫收穫之後場圃之間所蹂禾穗糠籺相雜執此􅀢而向風擲之乃得淨穀不待車扇又勝箕簸田家便之􅓕圖說􅓕亦籮屬比籮稍匾而用亦不同􅓕則造酒造飯用之漉米又可盛食物蓋籮盛其粗者而􅓕盛其精者精粗各適所受不可易也䉛圖說䉛漉米器說文淅箕也又云漉米藪又炊䉛也廣雅曰淅蓑㔯䉛方言云炊䉛謂之縮或謂之􅀢或謂之㔯江東呼為淅籖也蓋今炊米日所用者筲圖說筲飯筲也說文陳留謂飯帚曰筲從竹捎聲一曰飯器容五升今人亦呼飯箕為筲箕南曰䉛北曰筲南方用竹北方用柳皆漉米器或盛飯所以供造酒食農家所先雖南北名制不同而其用則一升斗圖說升十合量也漢志云以子穀秬黍中者千二百實其籥以井水凖其概二籥為合十合為升說文云升從斗象形唐韻曰升成也斗十升量也漢志云十升為斗斗者聚升之量也說文云斗象形有柄天文集云斗星仰則天下斗斛不平覆則嵗稔槩平斗斛器說文云槩杚斗斛從木既聲杚平也漢書以井水準其槩唐李畬為御史得米而嬴詢於吏曰御史米不槩是也古斛今斛圖說斛十斗量也漢志云十斗為斛斛者角升斗多少之量也周禮曰㮚氏為量改煎金錫則不耗漢法五量用銅方尺而圓其外旁有􅀈焉上為斛下為斗左耳為升右耳為合籥廣雅曰斛謂之鼓方斛謂之角擊壤圖說擊壤釋名曰擊壤野老之戲蓋擊塊壤之具因以為戲也藝苑曰擊壤古戲也又曰壤以木為之前廣後鋭長尺四寸闊三寸其形如履將戲先側一壤於地遙於三四十步以手中壤敲之中者為上風土記曰擊壤以木為之其形如履臘節僮少以為戲分部如摘博也欽定授時通考卷四十
