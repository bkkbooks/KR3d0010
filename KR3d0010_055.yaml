body:
  text: 蓄聚常平倉漢書宣帝紀大司農中丞耿壽昌奏設常平倉以給北邊又食貨志宣帝時大司農中丞耿壽昌白令邊郡皆築倉以榖賤時增其價而糴以利農榖貴時減價而糶名曰常平倉民便之通典漢明帝永平五年作常平倉後漢書劉般傳永平十年帝欲置常平倉公卿議者多以為便般對以常平倉外有利民之名而內實侵刻百姓豪右因緣為姦小民不能得其平置之不便帝乃止晉書武帝本紀咸寧二年九月起常平倉於東西市又食貨志泰始四年七月立常平倉豐則糴儉則糶以利百姓文獻通考齊武帝永明中天下米榖布帛賤上欲立常平倉市積為儲六年詔出上庫錢五千萬於京師市米買絲綿綾絹布隋書食貨志開皇三年京師置常平監唐會要武德元年詔置常平監官永徽六年京東西二市置常平倉開元七年關內隴右河北河南五道及荆揚襄夔綿益彭蜀資漢劍茂等州並置常平倉唐書食貨志貞觀中洛相幽徐齊并秦蒲州置常平倉粟藏九年米藏五年下濕之地粟藏五年米藏三年皆著於令又自太宗時置義倉及常平倉以備凶荒高宗以後稍假義倉以給他費至神龍中略盡玄宗即位復置之其後第五琦請天下常平倉皆置庫畜本錢至是趙贊又言自軍興常平倉廢垂三十年凶荒潰散餒死相食不可勝紀陛下即位京城兩市置常平官雖頻年少雨米不騰貴可推而廣之請兼儲布帛請於兩都江陵成都揚汴蘇洪置常平輕重本錢上至百萬緡下至十萬積米粟布帛絲麻貴則下價而出之賤則加估而收之諸道津會置吏閲商賈錢每緡稅二十竹木茶漆稅十之一以贍常平本錢德宗納其䇿屬軍用迫蹙亦隨而耗竭不能備常平之積舊唐書食貨志元和六年制諸道府州有少糧種處委所在官長用常平義倉米借貸淮南浙西宣歙等道十三年户部侍郎孟簡奏凡州府常平義倉等斗斛請凖舊例減估出糶但以石數奏申有司更不收管內州縣得專達以利百姓從之文獻通考開成元年户部奏應諸州府所置常平義倉伏請今後通公私田畝别納粟一升逐年添貯義倉斂之至輕事必通濟嵗月稍久自致盈充縱逢水旱之災永絶流亡之慮從之玉海淳化三年六月詔置常平倉命常參官領之嵗熟增價以糴嵗歉減價以糶用振貧民復舊制也又祥符二年分遣使臣出常平倉粟麥於京城開八場減價糶之六年又併兩赤縣入在京常平倉宋史食貨志淳化三年京畿大穰分遣使臣於四城門置場增價以糴虛近倉貯之命曰常平嵗飢即下其直豫民景德三年言事者請於京東西河北河東陜西江南淮南兩浙皆立常平倉計户口多寡量留上供錢自二三千貫至一二萬貫令轉運使每州擇清幹官主之領於司農寺三司無輒移用嵗夏秋視市價量增以糴糶減價亦如之所減不得過本錢而沿邉州郡不置詔三司集議於是增置司農官吏創廨舍藏籍帳度支别置常平案大率萬户嵗糴萬石户雖多止五萬石三年以上不糶即回充糧廪易以新粟災傷州郡糶粟斗無過百錢又景祐中淮南轉運副使吳遵路言本路丁口百五十萬而常平錢粟才四十餘萬嵗飢不足以救恤願自經畫增為二百萬他毋得移用許之後又詔天下常平錢粟三司轉運司皆毋得移用不數年間常平積有餘而兵食不足乃命司農寺出常平錢百萬緡助三司給軍費久之移用數多而蓄藏無幾矣又自景祐初畿內飢詔出常平粟貸中下户户一斛慶厯中發京西常平粟振貧民而聚斂者或增舊價糴粟欲以市恩皇祐三年詔誡之淮南兩浙體量安撫陳升之等言災傷州軍乞糴常平倉粟令於原價上量添十文十五文殊非恤民之意乃詔止於原價出糶文獻通考司馬光劄子言常平法公私兩利向者有因州縣缺常平糴本錢雖嵗豐無錢收糴又官吏厭糴糶之煩不肯收糴又有官吏不能察知在市實價憑行人與蓄積之家通同作弊當農人要錢急糶之時故意小估價例令官中收糴不得盡入蓄積之家直至過時蓄積之家倉廪盈滿方始頓添價中糶入官是以農夫糶榖止得賤價官中糴榖常用貴價致州縣常平倉斛斗有多年在市終不及元糴之價堆積腐爛者乃法因人壞非法之不善也又司馬光言常平倉者乃三代聖王之遺法非獨李悝耿壽昌能為之也穀賤不傷農穀貴不傷民民賴其食而官收其利法之善者無過於此比來所以隳廢者由官吏不得其人非法之失也今聞條例司盡以常平倉錢為青苗錢又以其穀換轉運司錢是欲盡壞常平專行青苗也國家每遇凶年所賴者祗有常平倉錢榖耳今一旦盡作青苗錢散之向去若有豐年將以何錢平糴若有凶年將以何穀賙贍乎臣竊聞先帝嘗出內藏庫錢一百萬緡助天下常平倉作糴本前日天下常平倉錢穀共約一千餘萬貫石今無故盡散之他日若思常平之法復欲收聚何時得及此數乎臣以謂散青苗錢之害猶小而散常平倉之害更大也名臣奏議御史中丞杜衍乞詳定常平制度疏略國家列郡置常平倉所以利農民備飢嵗也然而有名無實者制度不立耳臣以謂立制度在乎量州郡之逺邇計户口之衆寡取賤出貴差别其飢熟信賞必罰責課於官吏出納無壅增減有制本息之數勿假以供軍斂導之時力禁其爭利至於蜀漢狹境交廣寬鄉或通川易地之殊或邊郡巖邑之異各立條教以節盈虛限回易之嵗時虞其損敗制立典之侵刻督以嚴科則瘠瘦可充飢饉有備也文獻通考高宗紹興九年宗丞鄭鬲乞以常平錢於民輸賦未畢之時悉數和糴即詔行之上因諭宰執曰常平法不許他用惟待振飢取於民者還以豫民也續文獻通考乾道六年胡堅常進對奏廣糴常平上曰若一州得二十萬石常平米雖有水旱不足憂矣又金章宗明昌元年八月御史請復設常平倉省臣議言大定舊制豐年則增市價十之二以糴儉嵗則減市價十之一以糶增之減之以平粟價故謂常平非謂使天下之民專仰給於此也今生齒至衆如欲計口使餘一年之儲不惟數多難辦又慮出不以時而致腐敗非經久之計若令諸處自官兵三年食外可充三年之食者免糴其不及者俟豐年糴之庶可久行從之金史食貨志明昌三年帝謂宰臣曰常平倉往往有名無實况逺縣人户豈肯跋涉直就州府糶糴可各縣置倉令州府縣官兼提控管勾遂定制縣踞州六十里內就州倉六十里外則特置舊擬備户口三月之糧恐數多致損改令户二萬以上備三萬石一萬以上備二萬石一萬以下五千以上備一萬五千石五千户以下備五千石續文獻通考至大二年九月立常平倉又至元元年立常平倉元史食貨志常平倉至元六年始立八年以和糴糧及諸路倉所撥糧貯焉明史食貨志𢎞治中江西巡撫林俊請建常平及社倉又嘉靖初帝令有司設法多積米穀仍倣古常平法春振貧民秋成還官不取其息農政全書明張朝瑞議常平倉厫申文伏覩洪武初令天下縣分各立預備四倉官為糴穀收貯以備賑濟蓋次災則賑糶極災則賑濟曰賑濟則賑糶在其中矣賑糶即常平法也奈嵗久法湮各州縣僅存城內預備一倉其餘鄉社倉盡亡之矣天災流行國家代有為生民長久之計則常平倉斷乎當復兹令各屬縣備查四鄉有倉者因之有而廢者修之無者各於東西南北適中水陸通達人煙輳集高阜去處官為各立寬大堅固常平倉一所倉基約四畝合用工料本道查發贓罰并該府縣查處無礙官銀輳合陸續備辦建造每嵗將守巡道及府縣所理罪犯紙贖實將一半糴穀入倉或查有廢寺田産及無礙官銀聼其隨冝糴買又或民願納穀者一如祖宗已行之法請敕奬為義民或如近日救荒之令給與冠𢃄旌扁大約每鄉一倉上縣糴榖五千石中縣糴榖四千石下縣糴榖三千石不許逼抑科擾平民各擇近倉殷富篤實居民二名掌管免其雜差準其開耗每收穀一百石待後發糶之時每名準與平糶三石以酬其勞糶完即換掌管勿使重役城中預備倉照常造送盤查四鄉常平倉免送盤查止於年終各倉經管居民將舊管新收開除實在總撒數目用竹紙小册開報該縣縣將四倉類册申送各院並布政司及道府查考凡收糶俱該縣掌印官或委賢能佐二官監督不許濫委滋弊穀到用該縣原發較勘平凖斛斗收量明白暫貯别所積至百石以上方許稟官一收如有臨收留難及未收虛出倉收既收侵盜私用冒借虧欠等弊查追完足各縣徑自從輕發落其有侵冒至百石者通詳定奪每嵗秋冬之交本道或該府掌印管糧官單車間一巡視以防掌印官之治名而不治實者除無飢小飢之年不糶外或值中飢大飢四鄉管倉人役稟官監糶另委富民數名用官較平等收銀其出糶一節當與四鄰保甲之法並行如該鄉穀多即糶榖一日保甲一周穀少則分為二三日或四五日保甲一周務使該鄉積貯之穀數可待飢民冬春之糴數方善四鄉不能盡同各宜審量行之大率賑糶與賑濟不同不必每甲尋貧民而審别之以多寡其穀數如一甲應糴五斗或一石或二石則甲甲皆同惟以穀攤人不因人增穀糴銀每甲一封亦可庶乎易簡不擾或甲中十家輪糴則每日每甲糴不過二人每人糴不過二斗此荒年贍糶之大較也每鄉除無災都保不開外先期將有災保甲派定次序分定月日某日糶某保某甲明日出令保正副公舉貧民至期令其持價糴買如富者混買連坐保甲仍行宋張詠賑蜀之法一家犯罪十家皆坐不得糴中飢糶倉穀之半大飢糶倉穀之全俱照原糴價銀出糶不可加增寧少減之大約減荒年市價三分之一方可壓下穀價不至騰踊或倉穀糶盡而民飢未已則愼選員役持所糶之穀本赴有收去處循環糴糶源源而來民自無飢救荒有功員役分别奬賞此蓋儲用社倉之法而糶用常平之意者也四鄉糶完即將穀價送官聽掌印官於秋成之日就近各選殷實人户領銀盡數照時價糴穀牙腳等費晒揚等耗與造册紙張工食等項俱準開銷其穀晒揚乾潔官監上倉如法安置仍總計糴榖正銀并牙腳折耗等費每石約共銀若干報官貯册以為日後出糶張本官不得將銀貯庫過冬致高價難買如穀賤不糴責有所歸是倉不設於空僻去處者恐荒年盜起是齎之糧也榖不𨽻於臺使盤查者恐委盤問罪是遺之害也行平糶之政而不用稱貸取息之法者恐出納追呼蹈青苗法之擾民也蓋社倉之法立則以時斂散富者不得取重息而貧民霑惠於一嵗之中常平之法立則減價糶賣富者不得騰高價而貧民受賜於數十年後大飢之日昔蘇文忠公自謂在浙中二年親行荒政只用出糶常平米一事更不施行餘策若欲抄劄飢貧不惟所費浩大有出無收而此聲一布飢民雲集盜賊疾疫客主俱敝惟有依條將常平斛斗出糶即官私簡便不勞抄劄勘會給納煩費將數萬石斛斗在市自然壓下物價境內百姓人人受賜此前賢已試之法信不我欺故曰常平法斷當復也城內之預備倉有出無收其費甚巨四鄉之社倉易散難斂其弊頗多惟常平倉胡端敏公所謂不必更為立倉就當藏榖於四鄉倉之側者其法專主糶糴而糴本常存蓋不費之惠其惠易遍弗損之益其益無方誠救荒之良策矣但積榖固難建倉尤難建一時美觀之倉非難建百年永賴之倉為難欲如法建倉非多方處費不可其倉務要宏敞堅固可垂百年蓋藏之計寧廣毋狹寧質毋文毋惜小費毋急近功如工費一時不能接濟許於四倉之中擇近便或一倉或二倉先行起建餘聽漸舉至於各倉穀本以後計將守巡道并府縣所理罪犯紙贖實將一半糴穀入倉仍聽查處别項無礙官銀隨宜糴買陸續貯積不急取盈如民間有義助建倉及輸粟備賑者照依前例呈請分别奬勸但不許坐派大户科罰擾民年久倉有損壞如無官銀準及時支榖修理但不許賤算穀價仍令該府縣掌印官將創造過倉厫積貯過穀數等項逐欵填造一體申送稽核大清會典順治十七年議準常平倉穀春夏出糶秋冬糴還平價生息務期便民如遇凶荒即按數給散災户貧民飭有司實力奉行又康熙十九年覆準直省常平倉留本城備賑永停協解外郡又康熙四十三年覆準廣東存貯常平倉米穀照例存貯多餘米穀易銀近省者將銀兩交貯藩庫遠者將銀兩交貯府庫遇有荒年準司府將庫貯銀兩遣官赴鄰省豐熟地方採買運至被災之處照買價糶賣至存倉米穀照例出陳易新惟潮州府僻處山陬或遇荒歉米粟價值騰涌令存貯穀四萬八千七百餘石以備不虞又議準閩省現在捐輸穀二十七萬餘石常平倉穀約五十六萬餘石其內地積穀仍按原存州縣之額數存留其常平倉榖照依時價盡數發糶至臺灣一府三縣逺在海外現存捐輸穀八千六百餘石常平倉穀一十一萬餘石除每縣應存穀石其餘盡行發糶貯銀遇荒歉賑濟其所存穀石仍照每嵗出陳易新之例加謹收貯又覆準河南現存穀石每年將一半存倉備賑一半借給窮民預備倉附明會典洪武初令天下縣分各立預備四倉官為糴榖收貯以備賑濟就擇本地年高篤實民人管理明史食貨志明初州縣設預備倉東南西北四所以振凶荒永樂中令天下府縣預備倉之在四鄉者移置城內明史宣宗本紀宣德五年五月修預備倉出官錢收糴備荒續文獻通考正統五年令六部都察院推選屬官領敕分詣兩畿各省府州縣立預備倉發所在庫銀糴糧貯之軍民中有能出粟以佐官者授以散官旌其門明實録成化十年敕藩司異時州縣設預備四倉所以廣儲蓄備旱潦為民賴也比久廢弛宜核實現在儲蓄有無多寡之數仍儘各處在官贓贖糴粟為備有不敷聽於存留項內借撥或於各里上中户勸助以充其看守倉者於附近里分令殷實有行止者主之至通同官吏實收虛放為侵盜者論如律衛所地亦如之明史食貨志成化初廢臨德預備倉在城外者而以城內空厫儲預備米石名臨清者曰常盈德州者曰常豐又𢎞治三年限州縣十里以下積萬五千石二十里積二萬石衛千户所萬五千石百户所三百石考滿之日稽其多寡以為殿最又嘉靖初諭德顧鼎臣言成𢎞時每年以存留餘米入預備倉緩急有備今秋糧僅足兌運預備無粒米乞急復預備倉糧以裕民帝乃令有司設法多積米穀府積萬石州四五千石縣二三千石為率既又定十里以下萬五千石纍而上之八百里以下至十九萬石其後盡平糶以濟貧民儲積漸減隆慶時劇郡無過六千石小邑止千石久之數益減萬厯中上郡至三千石止而小邑或僅百石有司沿為具文屢下詔申飭率以虛數欺罔而已欽定授時通考卷五十五
