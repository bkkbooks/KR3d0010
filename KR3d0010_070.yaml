body:
  text: 農餘畜牧一書堯典日中星鳥以殷仲春厥民析鳥獸孳尾傳乳化曰孳交接曰尾疏産生為乳胎生為化孕産必愛之故乳化曰孳鳥獸皆以尾交接故交接曰尾又日永星火以正仲夏厥民因鳥獸希革傳夏時鳥獸毛羽希少改易革改也疏鳥獸冬毛最多春猶未脫故至夏始毛羽希少改易往前又宵中星虛以殷仲秋厥民夷鳥獸毛毨傳毨理也毛更生整理疏毨者毛羽美悅之狀故為理也夏時毛羽希少今則毛羽復生夏改而少秋更生多故言更生整理又日短星昴以正仲冬厥民隩鳥獸氄毛傳鳥獸皆生耎毳細毛以自溫焉疏氄毛謂附肉細毛詩小雅誰謂爾無羊三百維羣誰謂爾無牛九十其犉傳黃牛黑脣曰犉又爾羊來思其角濈濈爾牛來思其耳濕濕傳聚其角而息濈濈然呞而動其耳濕濕然箋言此者美畜産得其所又或降於阿或飲於池或寢或訛傳訛動也箋言此者美其無所驚畏也又爾羊其思矜矜兢兢不騫不崩麾之以肱畢來既升傳矜矜兢兢以言堅彊也騫虧也崩羣疾也肱臂也升升入牢也箋此言擾馴從人意也周禮天官太宰之職以九職任萬民四曰藪牧又膳夫膳用六牲注六牲馬牛羊雞犬豕也又庖人掌共六畜六獸六禽辨其名物注六畜六牲也始養之曰畜將用之曰牲鄭司農云六獸麋鹿熊麕野豕六禽鴈鶉鷃雉鳩鴿康成謂獸人冬獻狼又內則無熊則六獸當有狼而熊不屬六禽於禽獻及六摯宜為羔豚犢麛雉鴈凡鳥獸未孕曰禽又牧人掌牧六牲而阜蕃其物疏阜盛也蕃息也物謂毛物言使肥盛蕃息各有毛物又掌畜掌養鳥而阜蕃教擾之注鳥之可養使盛大蕃息者謂鵝鶩之屬疏鶩即今之鴨民間所畜故云焉又祭祀共卵鳥注其卵可薦之鳥疏雞亦在焉禮記月令季春之月合纍牛騰馬遊牝於牧注纍騰皆乘匹之名是月所合牛馬謂繫在厩者其牝欲遊則就牧之牝而合之又仲夏之月游牝别羣注孕妊之欲止也又則縶騰駒注為其牝氣有餘相蹄齧也又仲秋之月乃命宰祝循行犧牲視全具案芻豢瞻肥瘠察物色必比類量大小視長短皆中度注於鳥獸肥充之時宜省羣牲也養牛羊曰芻犬豕曰豢爾雅釋獸馬八尺為駥牛七尺為犉羊六尺為羬彘五尺為􅙊狗四尺為獒雞三尺為鶤注陽溝巨鶤古之名雞疏此别六畜絶大者名也史記貨殖列傳烏氏倮畜牧及衆斥賣求竒繒物間獻遺戎王戎王什倍其償與之畜畜至用谷量馬牛又塞之斥也唯橋姚已致馬千匹牛倍之羊萬頭粟以萬鍾計漢書卜式傳卜式河南人也以田畜為事入山牧十餘年致羊千餘頭上書願輸家財助邊上使使問欲為官乎式曰自少牧羊不習仕宦不願也歸復田牧復持錢二十萬與河南太守以給徙民召拜為中郎上曰吾有羊在上林中欲令子牧之式既為郎布衣草蹻而牧羊嵗餘羊肥息上過其羊善之式曰非獨羊也治民亦猶是矣以時起居惡者輒去毋令欺羣上竒其言拜緱氏令齊民要術服牛乘馬量其力能寒溫飲飼適其天性如不肥充繁息者未之有也又陶朱公曰子欲速富當畜五㹀牛馬猪羊驢五畜之㹀然畜㹀則速富之術也又諺曰羸牛劣馬寒食下言其乏食瘦瘠春中必死務在充飽調適而已又凡馬驢駒初生忌灰氣遇新爐者輒死經雨者則不忌四時類要凡驢馬牛羊收犢子駒羔法常於市上伺侯含重埀欲生輒買取駒犢一百五十日羊羔六十日皆能自活不復藉乳乳母好堪為種産者因留之以為種惡者還賣不失本價坐贏駒犢還更買懷子孕者一嵗之中牛馬驢得兩畨羊得四倍羊羔臘月正月生者留以作種餘月生者剩而賣之用二萬錢為羊本必嵗收千口所留之種率皆精好與世絶殊不可同日而語之何必羔犢之饒又贏酪之利也羔有死者皮好作裘褥肉好作乾臘及作肉醬味又甚美馬詩鄘風秉心塞淵騋牝三千集傳秉操塞實淵深也蓋人操心誠實而淵深則無所為而不成其致此富盛宜矣又魯頌駉駉牡馬在坰之野薄言駉者有驈有皇有驪有黃以車彭彭思無疆思馬斯臧傳駉駉良馬腹幹肥張也坰遠野也箋必牧於坰野者避民居與良田也坰之牧地水草既美牧人又良飲食得其時則自肥健耳臧善也周禮牧師掌牧地孟春焚牧中春通淫注焚牧地以除陳生新草也中春隂陽交萬物生之時可以合馬之牝牡也又庾人掌十有二間之政教以阜馬佚特教駣攻駒及祭馬祖祭間之先牧及執駒散馬耳圉馬注九者皆有政教焉阜盛壯也杜子春云佚當為逸鄭司農云馬三嵗曰駣二嵗曰駒散讀為中散大夫之散謂聒馬耳毋令善驚也康成謂逸者用之不使甚勞安其血氣也教駣始乘習之也攻駒制其蹄齧者散馬耳以竹括押其耳頭動搖則括中物後遂串習不復驚爾雅膝上皆白惟馵四骹皆白驓四蹢皆白首前足皆白騱後足皆白翑前右足白啓左白踦後右足白驤左白馵駵馬白腹騵驪馬白跨驈白州驠尾本白騴尾白駺馰顙白顛白逹素縣面顙皆白惟駹疏此辨馬白色所在之異名也馬之膝上皆白者惟馵也骹膝下也四膝下皆白名驓蹢蹄也四蹄皆白名首俗呼為踏雪馬亦蹄白似蹄雪也前兩足皆白名騱後二足皆白名翑前右足白名啓前左足白名踦後右足白名驤後左足白名馵駵馬赤色黑鬛馬也若駵馬腹下白者别名騵驪黑也白跨股腳白也謂黑馬髀間白名驈州竅也謂馬之白尻者名驠也本根株也馬尾株白者名騴但尾毛白者名駺馰白也顙額也額有白毛今之戴星馬也其白自額下逹鼻莖者名縣其面額皆白者惟駹馬又回毛在膺宜乘在肘後減陽在幹茀方在背闋廣疏此别馬旋毛所在之名也回旋也膺旋也旋毛在膺者名宜乘在肘後者名減陽幹脅也在脅者名茀方在背者名闋廣又逆毛居馻注馬毛逆刺又牡曰隲牝曰騇疏别馬牝牡之異名也郭云今江東呼䭸馬為隲騇即草馬之名也又駵白駁黃白騜駵馬黃脊騝驪馬黃脊騽青驪駽青驪驎驒青驪繁鬛騥驪白雜毛駂黃白雜毛駓隂白雜毛駰蒼白雜毛騅彤白雜毛騢白馬黑鬛駱白馬黑脣駩黑喙騧一目白瞷二目白魚疏此别馬毛色不純之異名也駵赤色也謂馬有駵處有白處者曰駁有黃處有白處者曰騜駵馬脊毛黃者名騝驪馬脊毛黃者名騽青毛黑毛相雜者名駽今之鐵驄也青驪驎驒郭云色有深淺斑駁隱𥻘名驒今之連錢驄毛色青黑而髦鬛繁多者名騥毛色黑白而復有雜毛相錯者名駂今謂之烏驄毛色黃白而復有雜毛者名駓今謂之桃華馬隂淺黑色也毛淺黑而白兼雜毛者名駰今謂之泥驄蒼淺青也毛有淺青及白兼雜毛者名騅彤赤也毛赤白兼雜毛者名騢即今之赭白馬也白馬黑總者名駱白馬黑脣者名駩喙口也黑喙者名騧一目白者名瞷二目白者名魚言似魚目也相馬經馬頭為王欲得方目為丞相欲得光脊為將軍欲得强腹脅為城郭欲得張四下為令欲得長凡相馬之法先除三羸五駑乃相其餘大頭小頸一羸弱脊大腹二羸小頸大蹄三羸大頭緩耳一駑長頸不折二駑短上長下三駑大髂短脅四駑淺䯑薄騧五駑騮馬驪肩鹿毛闋黃馬驒駱馬皆善馬也馬生墮地無毛行千里溺舉一腳行五百里相馬不藏法肝欲得小耳小則肝小肝小識人意肺欲得大鼻大則肺大肺大則能奔心欲得大目大則心大心大則猛利不驚目四驚則朝暮健腎欲得小腸欲得厚且長腸厚則腹下廣方而平脾欲得小膁腹小則脾小脾小則易養望之大就之小筋馬也望之小就之大肉馬也皆可乘致致瘦欲得見其肉謂前肩守肉致肥欲得見其骨骨謂頭顱馬龍顱突目平脊大腹䏶重有肉此三事備者亦千里馬也水火欲得分水火在鼻兩孔間也上唇欲急而方口中欲得紅而有光此馬千里馬上齒欲鉤鉤則壽下齒欲鋸鋸則怒頷下欲深下唇欲緩牙欲去齒一寸則四百里牙劒鋒則千里嗣骨欲廉如織杼而濶又欲長頰下側八骨是目欲滿而澤眶欲小上欲弓曲下欲直素中欲廉而張素鼻孔上隂中欲得平股下主人欲小股裏上近前也陽裏欲高則怒股中上之主人額欲方而平八肉欲大而明耳下元中欲深耳下近牙耳欲小而鋭如削筒相去欲促總欲載中骨高二寸總中骨也易骨欲直眼下直下骨也頰欲開赤長膺下欲廣一尺以上名曰挾一作扶尺能久走鞅欲方頰前喉欲曲而深胸欲直而出髀間前向鳬間欲開望視之如雙鳬頸骨欲大肉次之髻欲桎而厚且折季毛欲長多覆肝肺無病髮後毛是背欲短而方脊欲大而抗脢筋欲大夾脊筋也飛鳬見者怒胸欲筋也三府欲齊兩骼及中骨也尻欲頺而方尾欲減本欲大脅肋欲大而窪名曰上渠能久走龍趐欲廣而長升肉欲大而長脾外肉也輔肉欲大而明前腳下肉腸欲充腔小腔臁季肋欲張短肋懸薄欲厚而緩腳腔虎口欲開股肉腹下欲平滿善走名曰下渠日三百里陽肉欲上而高起髀外近前髀欲廣厚汗溝欲深明直肉欲方能久走髀後肉也輸一作翰鼠欲方直肉下也朒肉欲急髀裏也間筋欲急短而減善細走輸鼠下筋機骨欲舉上曲如懸匡馬頭欲高距骨欲出前間骨欲出前後臼外鳬臨蹄骨也附蟬欲大前後目夜眼股欲薄而博善能走後髀前骨臂欲長而膝本欲起有力前腳膝上句前肘後欲開能走膝欲方而痺髀骨欲短兩肩骨欲深名曰前渠怒蹄欲厚三寸硬如石下欲深而明其後開如鷂翼能久走相馬從頭始頭欲得高峻如削成頭欲重宜少肉如剝頭壽骨欲得大如綿絮苞圭石壽骨者髮所生處也白從額上入口名俞膺一名的顱奴乘客死主乘棄市大凶馬也馬眼欲得高眶欲得端正骨欲得成三角睛欲得如懸鈴紫艷光目不四滿下唇急不愛人又踐不健食目中縷貫瞳子者五百里下上徹者千里睫亂者傷人目下而多白畏驚瞳子前後肉不滿皆凶惡若旋毛眼眶上壽四十年值眶骨中三十年值中眶下十八年在目下者不借睛却轉後白不見者喜旋而不前目睛欲得黃目欲大而光目皮欲得厚目上白中有橫筋五百里上下徹者千里目中白縷者老馬子目赤睫亂齧人反睫者善奔傷人目下有橫毛不利人目有火字在者壽四十年目偏長一寸三百里目欲長大旋毛在目下名曰承泣不利人目中五采盡具五百里壽九十年良多血氣也駑多赤青肝氣也走多黃腸氣也材知多白骨氣也材多黑腎氣也駑用䇿乃使訛也白馬黑目不利人目多白却視有態畏物喜驚馬耳欲得相近而前竪小而厚一寸三百里三寸千里耳欲得小而前竦耳欲得短殺者良植者駑小而長者亦駑耳欲得小而促狀如斬竹筒耳方者千里如斬筒七百里如雞距者五百里鼻孔欲得大鼻頭文如王火字欲得明鼻上文如王公五十嵗如火四十嵗如天三十嵗如小一十嵗如今十八嵗如四八嵗如宅七嵗鼻如水文二十嵗鼻欲得廣而方脣不覆齒少食上脣欲得急下脣欲得緩上脣欲得方下脣欲得厚而多理故曰脣如板鞮御者啼黃馬白喙不利人口中色欲得紅白如火光為善材多氣良且壽即黑不鮮明上盤不通明為惡材少氣不壽一曰相馬氣發口中欲見紅白色如穴中看此皆老壽一曰口中欲正赤上理文欲使通直勿令斷錯口中青者三十嵗如虹腹下皆不盡壽駒齒死矣口吻欲得長口中色欲得鮮好旋毛在物後為御禍不利人刺芻欲竟骨端刺芻者齒間肉齒左右蹉不相當難御齒不周密不久疾不滿不原不能久走一嵗上下生乳齒各二二嵗上下生齒各四三歲上下生齒各六四嵗上下生成齒二成齒皆背三入四方生也五嵗上下著成齒四六嵗上下著成齒六兩廂黃生區受麻子也七嵗齒兩邊黃各缺區平受米八嵗上下盡區如一受麥九嵗下中央兩齒臼受米十嵗下中央四齒臼十一嵗下六齒盡臼十二嵗下中央兩齒平十三嵗下中央四齒平十四嵗下中央六齒平十五嵗上中央兩齒臼十六嵗上中央四齒臼若看上齒依下齒次第者十七嵗上中央六齒皆臼十八嵗上中央兩齒平十九嵗上中央四齒平二十嵗上中央六齒平二十一嵗下中央兩齒黃二十二嵗下中央四齒黃二十三嵗下中央六齒盡黃二十四嵗上中央二齒黃二十五嵗上中央四齒黃二十六嵗上中央六齒盡黃二十七嵗下中二齒白二十八嵗下中四齒白二十九嵗下中盡白三十嵗上中央二齒白三十一嵗上中央四齒白三十二嵗上中盡白頸欲得䐊而長頸欲得重頷欲折胸欲出臆欲廣頸項欲厚而强回毛在頸不利人白馬黑毛不利人肩肉欲寧寧者却也雙鳬欲大而上雙鳬胸兩遂肉如鳬脊欲得平而廣能負重背欲得平而方鞍下有回毛名負尸不利人從後數其脅肋得十者良凡馬十一者二百里十二者千里過十三者天馬萬乃一有耳一云十三肋五百里十五肋千里也腋下有回毛名曰挾尸不利人左脅有白毛直下名曰帶刀不利人腹下欲平有八字腹下毛欲前向腹欲大而埀結脉欲多大道筋欲大而直大道筋從腸下抵股者是腹下陰前兩邊生逆毛入腸帶者行千里一尺者五百里三封欲得齊如一三封者即尻上三骨也尾骨欲高而垂尾本欲大尾下欲無尾汗溝欲得深尻欲多肉莖欲得粗大蹄欲得厚而大踠欲得細而促骼骨欲得大而長尾本欲大而張膝骨欲圓而長大如杯盂溝上通尾本者踏殺人馬有雙腳脛亭行六百里回毛起踠膝是也䏶欲得圓而厚裏肉生馬後腳欲曲而立臂欲大而短骸欲小而長腕欲促而大其間才容靽烏頭欲高烏頭後足外節後足輔骨欲大輔足骨者後足骸之後骨後左右足白不利人白馬四足黑不利人黃馬白喙不利人後左右足白殺婦相馬視其四蹄後兩足白老馬子前兩足白駒馬子白毛者老馬也四蹄欲厚且大四蹄顛倒若堅履不可畜齊民要術久步即生筋勞筋勞則發蹄痛凌氣一曰生骨則發癰腫一曰發蹄生癰也久立則發骨勞骨勞則發癰腫久汗不乾則生皮勞皮勞者𩥇而不振汗未善燥而飼飲之則生氣勞氣勞者即𩥇而不起驅馳無節則生血勞血勞則發强行何以察五勞終日驅馳舍而視之不𩥇者筋勞也𩥇而不時起者骨勞也起而不振者皮勞也振而不噴者氣勞也噴而不溺者血勞也筋勞者兩絆却行三十步而已一曰筋勞者輾起而絆之徐行三十里而已骨勞者令人牽之起從後笞之起而已皮勞者夾脊摩之熱而已氣勞者緩繫之櫪上遠餧草噴而已血勞者高擊無飲食之大溺而已飲食之節食有三芻飲有三時何謂也一曰惡芻二曰中芻三曰善芻善謂飢時與惡芻飽時與善芻引之令食食常飽則無不胞銼草粗雖是豆榖亦不肥充細銼無節而食之者令馬肥不啌自然好矣何謂三時一曰朝飲少之二曰晝飲則胸􅀢水三曰暮極飲之一曰夏汗冬寒皆當節飲諺曰旦起騎榖日中騎水斯言旦飲須節水也每飲食令行驟則消水小驟數百步亦佳十日一放令其陸梁舒展令馬硬實也夏即不汗冬即不寒汗而極乾便民圖看馬捷法頭欲高峻面欲瘦而少肉眼下無肉多咬人胸堂欲濶肋骨過十二條者良三山骨欲平則易肥四蹄欲注實則能負重腹下兩邊生逆毛到膁者良又馬者火畜也其性惡濕利居高燥之地日夜餵飼仲春羣蓋順其性也季春必啖恐其退也盛夏午間必牽於水浸之恐其傷於暑也季冬稍遮蔽之恐其傷於寒也啖以猪膽犬膽和料餵之欲其肥也餵料時須擇新草篩簸豆料若熟料用新汲水浸淘放冷方可餵飼一夜須二三次起餵草料若天熟時不宜加熟料止可用豌豆大麥之類生餵夏月自早至晚宜飲水三次秋冬只飲一次可也飲宜新水宿水能令馬病冬月飲畢亦宜緩騎數里卸鞍不宜當簷下風吹則成病飼父馬令不鬭法多有父馬者别作一坊多置槽廄銼芻及穀頭各自别安唯著龓頭浪放不繫非直飲食遂性舒適自在至於黃溺自然一處不須掃除乾地服卧不濕不汗百匹羣行亦不鬭也飼征馬令硬實法細銼芻杴擲掦去葉專取銼和穀豆秣等置槽於迫地雖復雪寒仍令安厰下一日一走令其肉熱馬則硬實而耐寒苦也凡以猪槽飼馬以石灰泥馬槽馬汗繫著門此三事皆令馬落駒術曰常繫獼猴於馬坊令馬不辟惡消百病故也治馬病疫氣方取獺屎煮以灌之獺皮及肝更良不能得肉肝只用屎耳治馬患喉痺欲死方纒刀子露鋒創一寸刺咽喉令潰破即愈不治必死也治馬黑汗方取燥馬屎置瓦上以人頭亂髮覆之火燒馬屎及髮令烟出著馬鼻下熏之使烟入馬鼻中須臾即瘥也又方取猪脊引脂雄黃亂髮凡三物著馬鼻下燒之使烟入馬鼻中須臾即瘥治馬中熱方煮大豆及熱飯噉馬三度愈也治馬汗凌方取美䜴一升好酒一升夏著日中冬則溫熱浸䜴使液以手搦之絞去滓以斗灌口汗出則愈矣治馬疥方用雄黃頭髮二物以臘月猪脂煎之髮消以揩摶疥令赤及熱塗之即愈也又方湯洗疥拭令乾煮麵糊熱塗之即愈也又方燒柏脂塗之良又方研芥子塗之差六畜疥悉愈然柏瀝芥子並是燥藥其遍體患疥者宜歷落班駁以漸塗之待瘥更塗餘處一日之中頓塗遍體則無不死治馬中水方取鹽著兩鼻中各如雞子黃許大捉鼻令馬眼中淚出乃止良也治馬中榖方手捉甲上長髮向上提之令皮離肉如此數過以鈹刀子刺空中皮令突過以手當刺孔則有如風吹人手則是榖氣耳令人溺上又以鹽塗使人立乘數十步即愈耳又方取餳如雞子大打碎和草飼馬甚佳也又方取麥蘖末三升和榖飼馬亦良治馬腳生附骨不治者入膝節令馬長跛方取芥子熱搗如雞子黃許取芭豆三枚去皮留齊三枚亦搗熟以水和令相著和時用刀子不爾破人手當附骨上拔去毛骨外融密蠟周而擁之不爾恐藥燥瘡大著蠟罷以藥傅骨上取生布割兩頭作三道急裹之骨小者一宿便盡大者不過再宿然須要數看恐骨盡更傷好處看附骨盡取冷水淨洗瘡上刮取車軸頭脂作餅子著瘡上速以淨布急裹之三四日解去即生毛而無瘢此法甚良大勝炙者然瘡未瘥不得輒乘若瘡中出血便成大病也此方可治趼治馬被刺腳方用穬麥和小兒哺塗即愈治馬炙瘡未瘥不用令汗瘡白痂時慎風得瘥後從意騎耳治馬瘙蹄方以刀刺馬踠叢毛中使出血愈又方融羊脂塗瘡上以布裹之又方取鹹土兩石許以水淋取一石五斗釡中煎取二三斗剪去毛以泔清淨洗乾以鹹汁洗之三度即愈又方以湯洗淨燥拭之嚼芥子塗之以布帛裹三度愈若不斷用穀塗五六度即愈又方剪去毛以鹽湯淨洗去加燥拭於破瓦中煮人屎令沸熱塗之即愈又方以鋸子割所患蹄頭前正當中斜割之令上狹下濶如鋸齒形去之如剪箭括向深一寸許刀子摘令血出色必黑出五升許解放即愈又方先以酸泔清洗淨然後爛煮猪蹄取汁及熱洗之瘥又方取炊釡底湯淨洗以布拭水令盡取黍米一升作稠粥以故布廣三四寸長七八寸以粥糊布上厚裹蹄上瘡處以散麻纒之三日去之即當瘥也又方耕地中拾取禾茇東倒西倒者若東西橫地取南倒北倒者一壟取七科三壟凡取二十一科淨洗釡中煮取汁色黑乃止剪却毛泔水淨洗去痂以禾茇汁熱塗之一上即愈又方尿清羊糞令液取屋四角草就上燒令灰入鉢中研令熱用泔洗蹄以糞塗再三愈又方煮酸棗根取汁淨洗訖水和酒槽毛袋盛漬蹄沒瘡處數度即瘥也又方淨洗了搗杏仁和猪脂塗四五上即當愈治馬大小便不通眠起欲死須急治之不治一日即死以脂塗人手探榖道中去結屎以鹽納溺道中須臾得溺便當瘥也治馬卒腹脹眠卧欲死方用冷水五升鹽二斤研鹽令消以灌口中必愈治馬發黃方用黃柏雄黃木鱉子仁等分為末錯調塗瘡上紙貼之初見黃腫處便用針遍即塗藥治馬疥癆方馬疥癆及㿋癢用川芎大黃防風全蝎各一兩荆芥穗五兩為末分作五服白湯調冷灌之治馬梁脊破方成瘡不能騎坐如未破將馬腳下濕稀泥塗上乾即再易濕者三五次自消或只用溝中青鼻泥亦可已破成瘡者用黃丹枯白礬生薑燒存性人天靈蓋燒存性各等分為末入麝香少許瘡乾用麻油調若瘡濕有膿用漿水同葱白煎湯洗淨傅之立效治馬中結方穿山甲炒黃色大黃郁李仁各一兩風化石灰一合如無灰以朴硝代之共為末作一服用麻油四兩釅醋一升調勻灌之立效如灌藥不通用猪牙皂角為細末同麻油各四兩和勻填糞門中再灌前藥一服即愈常啖馬藥方鬱金大黃甘草貝母山梔子白藥黃藥欵花黃柏黃連知母桔梗各等分為末每服二兩以油蜜和灌之若駒則隨其大小量為加減啖後不得飲水至渴餵飼治馬諸病方用白鳯仙花連根葉熬成膏抹於馬眼角上汗出即愈治馬諸瘡方夜合花葉黃丹乾薑檳榔五倍子為末先以鹽水洗瘡後用麻油加輕粉調傅治馬傷料方用生蘿葡三五個切作片子啖之效治馬傷水方用葱鹽油相和搓作團納鼻中以手掩其鼻令氣不通良久使淚出即愈治馬錯水方緣馳驟喘息未定即與水飲須臾兩耳并鼻息皆冷或流冷涕即此證也先燒人亂髮燻兩鼻後用川烏草烏白芷猪牙皂角胡椒各等分麝香少許為細末用竹筒盛藥一字吹入鼻中立效又法葱一握鹽一兩用杵為泥罨兩鼻內須臾打通清水流出是其效也治馬患眼方用青鹽黃連馬牙硝㽔仁各等分同研為末用蜜煎入磁瓶內盛貯㸃時旋取多少以井水浸化㸃治馬頰骨脹方用羊蹄根草四十九個燒灰尉骨上冷即換之如無羊蹄根以楊柳枝如指頭大者炙熱尉之治馬喉腫方螺青川芎知母川鬱金牛蒡炒薄荷貝母同為末每服二兩蜜二兩用水煎沸侯溫調灌之又方取乾馬糞置瓶中以頭髮覆蓋燒烟熏其兩鼻治馬舌硬方用欵冬花瞿麥山梔子地仙草青黛硼砂朴硝油烟墨等分為細末每用五錢許塗舌上立瘥治馬傷脾方川厚朴去粗皮為末同薑棗煎灌一應脾胃有傷不食水草褰唇似笑鼻中氣短宜速與此藥治之治馬心熱方甘草芒硝黃柏大黃山梔子瓜蔞為末水調灌一應心肺壅熱口鼻流血跳躑煩燥宜急與此藥治之治馬肺毒方天門冬知母貝母紫蘇芒硝黃芩甘草薄荷葉同為末飯湯入少許醋調灌療肺毒熱極鼻中噴水治馬肝壅方朴硝黃連為末男子頭髮燒灰存性漿水調灌一應邪氣衝肝眼昏似睡忽然眩倒此方主治治馬卒熱肚脹方用藍汁二升井花水二升或冷水和灌之立效治馬流沫方當歸菖蒲白术澤瀉赤石脂枳穀厚朴加甘草為末每服一兩半酒一升葱白三握水煎溫灌之治馬氣喘方𤣥參葶藶升麻牛蒡兜苓黃耆知母貝母同為末每服二兩漿水調草後灌之一應喘嗽皆治治馬啌喘毛焦方用大麻子捒淨一升餵之大效治馬結糞方皂角燒灰存性大黃枳殼麻子仁黃連厚朴為末清米泔調灌若腸突加蔓荆子末同調治馬傷蹄方大黃五靈脂木鱉子去油海桐皮甘草土黃藝薹子白芥菜子為末黃米粥和藥攤帛上裹之治療馬結熱起臥戰不食水草方黃連二兩杵末白鮮皮一兩杵末油五合猪脂四兩細切又以溫水一升半和藥調停灌下牽行拋糞即愈治新生小駒子瀉肚方藁本末三錢七大麻子研汁調灌下咽喉便效次以黃連末大麻汁解之治馬氣藥方青橘皮當歸桂心大黃芍藥木通郁李仁瞿麥白芷牽牛子右件一十味各等分同搗羅為末用溫酒調灌每匹馬藥末半兩治馬急起臥方取壁土多年石灰細杵羅用油酒調二兩用水灌之立效治馬食槽內草結方好白礬末一兩分為二服每貼和飲水後啖之不過三兩度即內消却此法神驗治馬腎搐方烏藥芍藥當歸𤣥參山茵蔯白芷山藥杏仁秦艽每服一兩酒一大升同煎溫灌隔日再灌治馬尿血方黃耆烏藥芍藥山茵蔯地黃兜苓枇杷為末漿水煎沸候冷調灌應卒熱尿血皆主療之治馬結尿方滑石朴硝木通車前子為末每服一兩溫水調灌隔時再服結時甚則加山梔子赤芍藥同末治馬膈痛方羌活白藥甜瓜子當歸沒藥芍藥為末春夏漿水加蜜秋冬小便調療膈痛低頭飢不食草驢騾附說文驢似馬長耳又騾驢父馬母也字本作騾何承天纂文驢一曰漢驪其子曰􅐒農桑通訣驢覆馬生驟則准常以馬覆驢所生騾者形容壯大彌復勝馬然選七八嵗草驢骨口正大者母長則受駒父大則子壯草驢不産産無不死養草驢常須防勿令離羣也治驢漏蹄方鑿厚磚石令容驢蹄深二寸許熱燒磚令熱赤削驢蹄令出漏孔以蹄頓著磚孔中傾鹽酒醋令沸浸之牢捉勿令腳動待磚冷然後放之即愈入水遠行悉不發治驢打磨破潰方馬齒菜石灰一處搗為團曬乾後復搗羅為末先口含鹽漿水洗淨用藥末貼之驗欽定授時通考卷七十
