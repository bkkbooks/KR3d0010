body:
  text: 農餘畜牧二羊爾雅羊牡羒牝牂夏羊牡羭牝羖角不齊觤角三觠羷羳羊黃腹未成羊羜絶有力奮疏此别羊屬也牡名羒牝名牂夏羊黑羖䍽也牡名羭牝名羖羊角不齊一長一短名觤觠捲也角捲三匝名羷羊黃腹名羳新生未成名羜壯大有力名奮便名圖羊者火畜也其性惡濕利居高燥作棚宜高常除糞穢若食秋露水草則生瘡齊民要術常留臘月正月生羔為種者上十一月二月生者次之非此月數生者毛必焦卷骨髓細小所以然者是逢寒遇熟故也其八九十月生者雖值秋熱比至冬暮母乳已竭春草未吐是故不佳其三四月生者雖茂美而羔小未食常飲熱乳所以亦惡六七月生者兩熱相仍中之尤甚十一月及二月生者母既含重膚軀充儲草雖枯亦不羸瘦母乳適盡即得春草是以亦佳也大率十口一羝羝少則不孕羝多則亂羣不孕者必瘦瘦則非惟不蕃息經冬或死羝無角者更佳有角者喜相抵觸傷胎所由也供厨者宜刺刺一作剩之刺法十餘十日用布裹齒捶碎也羊必須老人及心性宛順者起居以時調其宜適卜式云牧民何異於是者若使急性人及小兒者欄約不得必有打傷之災或勞戲不看則有狼犬之害懶不驅行無肥充之理將息失所有羔死之患也惟遠水為良二日一飲頻飲則傷水而鼻膿緩驅行勿停息息則不食而羊瘦急行則坌塵而羊顙也春夏早放秋冬晚出春夏氣軟所以宜早秋冬霜露所以宜晚養生經云春夏早起與雞俱興秋冬晏起必待日光此其義也夏月盛暑須得隂凉若日中不避熱則塵汗相漸秋冬之間必致癬疥七月以後霜氣降後必須日出霜露晞解然後放之不爾則逢毒氣令羊口瘡腹脹也圈不厭近必須與人居相連開窗向圈所以然者羊性怯弱不能禦物狼一入圈或能絶羣也架北牆為厰為屋即復熱熱則疥癬且屋處慣暖冬月入田尤不耐寒圈中作臺開竇無令停水二日一除勿使糞穢穢則汚毛停水則挾蹄眠濕則腹脹也圈內須並牆豎柴栅令周匝羊不揩土毛常自淨不豎柴者羊揩牆壁上鹹相得毛皆成氊又豎柵頭出牆者虎狼不敢踰也羊一千口者三四月中種大豆一頃雜榖并草留之不須鋤治八九月終刈作青茭若不種豆榖者初草實成時收刈雜草薄鋪使乾勿令鬱浥䝁豆胡或蓬藜荆芥為上大小豆簸次之高麗豆箕尤有所便蘆薍二種則不種凡秋刈草非直為羊然大凡悉皆倍勝崔實日十月七日刈芻茭既至冬寒多饒風霜或春初雨落青草未生時則須飼不宜出放積茭之法於高燥之處豎桑棘木作兩圓栅各五六步許積茭著柵中高一丈亦無嫌任羊繞柵指食竟日通夜口常不住終冬過春無不肥充若不作柵假有千車茭擲與十口羊亦不得飽羣羊踐躡而已不得一莖入口不收茭者初冬乘秋似如有膚羊羔乳食其母比至正月母皆瘦死羔小未能獨食水草尋亦俱死非直不滋息或滅羣斷種矣余昔有羊二百口茭豆既少無以飼一嵗之中餓死過半假有在者疥瘦羸斃與死不殊毛復短淺全無潤澤余初謂家自不宜又疑嵗道疫病乃飢餓所致無他故也人家八月收穫之始多無庸假且買羊雇人所費既少所存者大傳曰三折臂始為良醫又曰亡羊治牢未為晚也世事略皆如此安可不存意哉寒月生者須然火於其邊夜不然火必凍死凡初産者宜煮榖豆飼之白羊留母二三日即母子俱放白羊性狠不得獨留并母久住則令乳之羖羊但留母一日寒月者內羔子坑中日父母還而出之坑中暖不苦風寒地熱使眼如常飽者也十五日後方喫草乃放之白羊三月得草力毛牀動則鉸之鉸訖於河水之中淨洗羊則生白淨之毛也五月毛牀將落鉸取之鉸訖更洗如前八月初胡葈子未成時又鉸之鉸了亦洗如初其八月半後鉸者勿洗白露已降寒氣侵人洗即不益胡葈子成然後鉸者匪直著毛難治又嵗稍晚比至寒時毛長不足令羊瘦損漠北塞之羊則八月不鉸鉸則不耐寒中國必須鉸不鉸則毛長相著作氊難成也便民圖棧羊法向九月初買脿羯羊多則成百少則不過數十羫初來時與細切乾草少著糟米拌經五七日後漸次加磨破黑豆稠糟水拌之每羊少飼不可多與與多則不食可惜草料又兼不得肥勿與水與水則退脿溺多可一日六七次上草不可太飽則有傷少則不飽不飽則退脿欄圈常要潔淨一年之中勿餵青草餵之則減脿破腹不肯食枯草矣家政法養羊法當以瓦器盛一升鹽懸羊欄羊喜鹽自數還啖之不勞人收又羊有病輒相汚欲令别病法當欄前作瀆深二尺廣四尺往還皆跳過者無病不能過者入瀆中行過便别之龍魚河圖羊有一角食之殺人農政全書牧養須已出未入不使沾星露之草則無耗羊一羣擇其肱而大者而立之主一出一入使之倡先或圈於魚塘之岸草糞則每早掃於塘中以飼草魚而羊之糞又可飼鰱魚一舉三得矣露草上有緑色小蜘蛛羊食之即死故不宜早放作氊法春毛秋毛中半和用秋毛緊强春毛軟弱獨用太偏是以須雜三月桃花水氊第一凡作氊不須厚大惟緊薄均調乃佳耳二年敷臥小覺垢以九月十月賣作􅀈氊明年四五月出氊時更買新者此為長存不穿敗若不數換非直垢汙穿冗之後便無所直虛成糜費此不朽之功豈可同年而語也令氊不生蟲法夏月敷席不臥上則不生蟲若氊多無人臥上者預收𣙜柴燥灰入五月中羅灰遍著氊上厚五寸許卷束於風凉之處閣置蟲亦不生如其不爾無不生蟲羝羊四月末五月初鉸之性不耐寒早鉸寒則凍死雙生者多易為孳息性既豐乳有酥酪之饒毛堪酒袋兼繩索之利其潤益又過於白羊也羊有疥者間别之不别相染汚或能合羣致死羊疥先著口者難治多死治羊疥方取黎蘆根㕮咀令破以泔浸之以瓶盛塞口於竈邊常令暖數日醋香便中用以磚瓦刮疥令赤若强硬痂厚者亦可以湯洗之去痂拭燥以藥汁塗之再上愈若多者日别漸漸塗之勿頓塗令遍羊皮不堪藥勢便死矣又方去痂如前洗燒葵根為灰煮醋澱熱塗之以灰厚傅再上愈寒時勿剪毛去即凍死矣又方臘月猪脂加熏黃塗之即愈羊膿鼻眼不淨者皆以中水治方以湯和鹽用杓研之極鹹塗之為佳更待冷接取清以小角受一雞子者溝兩鼻各一角非直水瘥永息天蟲五日後必飲以眼鼻淨為候不瘥更溝一如前法羊膿鼻口頰生瘡如乾癬者名曰可妬運迭相染易著者多死或能絶羣治之方豎長竿於圈中竿頭施橫枝令獼猴上居數日自然差此獸辟惡常安於圈中亦好治羊挾蹄方取羝脂和鹽煎使熱燒熱令微赤著脂烙之著乾勿令水汛入七日自然瘥耳凡羊經疥得差者至夏後初肥時宜賣易之不爾後年春疥發必死矣治羊火蹄方以羖羊脂煎熟去滓取鐵箆子燒熱將脂勻塗箆上烙之勿令入水次日即愈豕爾雅豕子豬䝐豶么幼奏者豱豕生三豵二師一特所寢橧四蹢皆白􅘻其跡刻絶有力􅙊牝豝疏此辨豕之種類也其子名豬䝐一名豶謂豶犍豬也么幼豕之最後生者名也皮理腠蹙者名豱三豵二師一特郭云豬生子常多故别其少者之名豬臥處名橧四蹄皆白名􅘻其跡名刻絶有力名􅙊豕之牝者名豝方言北燕朝鮮之間謂之豭關東西或謂之彘或謂之豕南楚謂之豨其子或謂之豚或謂之豯吳揚之間謂之豬子齊民要術母猪取短喙無柔毛者良喙長則牙多三牙以上則不煩畜為難肥故有柔毛治難淨也牝者子母不同圈子母一圈熹聚不食則不能充肥牡者同圈則無嫌圈不厭小圈小肥疾處不厭穢泥穢得避暑亦須小厰以避雨雪春夏中生隨時放牧糟糠之屬當日别與八九十月放而不飼所有糟糠則畜待冬春初猪性甚便水生之草杷取水藻等近岸猪食之皆肥初産者宜煮榖飼之其子三日掐尾六十日後犍三日則不畏風凡死者皆尾風所致者犍不截尾則前大後小犍者骨細肉多不犍者骨粗肉少如犍牛法者無風死之患十二月子生者豚一宿蒸之蒸法索籠盛腦凍不合出旬便死所以然者豚性腦少塞盛則不能自暖故須暖氣攻之供食豚乳下者佳簡取别飼之愁其不肥共母圈粟豆難足宜理車輪為食場散粟豆於內小豚足食出入自由則肥速農桑通訣江南水地多湖泊取近水諸物可以飼猪凡占山皆用橡食藥苗謂之山猪其肉為上江北陸地可種當約量多寡計畝數種之易活耐旱割之比終一畝其初已茂用之漸切以泔槽等水浸於大檻中令酸黃或拌麩糠雜飼之特為省力易得肥腯前後分别嵗嵗可鬻足供家費四時類要閹猪了待瘡口乾平復後取巴豆兩粒去殼爛搗和麻籸糟糠之類飼之半日後當大瀉其後日見肥大農政全書猪多總設一大圈細分為小圈每小圈止容一猪使不得閙轉則易長也肥猪法用管仲三斤蒼术四兩黃豆一斗芝麻一升各炒熟共為末餌之十二日則肥肥猪法麻子二升搗十餘杵鹽一升同煮和糠三升飼之立肥治猪病法割去尾尖出血即愈若瘟疫用蘿葡或及梓樹華與食之不食難救犬爾雅犬生三猣二師一玂未成毫狗長喙獫短喙猲獢絶有力狣尨狗也疏此别狗屬也犬生三子則曰猣二曰師一曰玂毫是㲦毛犬子未生㲦毛者名狗喙口也長口者名獫短口者名猲獢壯大絶有力者名狣尨即狗也便民圖凡人家勿養高腳狗彼多喜上桌凳竈上養矮腳者便益純白者能為怪勿畜之凡黑犬四足白者凶後二足白頭黃者吉足黃招財尾白者大吉一足白者益家白犬黃頭吉背白者害人帶虎斑者吉黃犬前二足白者吉胸白者吉口黑者招官事四足俱白者凶青犬黃耳者吉犬生三子俱黃四子俱白八子俱黃五子六子俱青吉治狗病方用水調平胃散灌之加赤殼巴豆尤妙治狗卒死方用葵根塞鼻內即活治狗癩方狗遍身膿癩用百部濃煎汁塗之狗蠅多者以香油遍身擦之立去猫附便民圖猫兒身短最為良眼用金銀尾用長面似虎威聲要􅀈老鼠聞之自避藏露瓜能翻瓦腰長會走家面長雞絶種尾大懶如蛇又法口中三坎者捉一季五坎者捉二季七坎捉三季九坎捉四季花朝口咬頭牲耳薄不畏寒毛色純白純黑純黃者不須揀若看花猫身上有花又要四足及尾花纒得過者方好治猫病方凡猫病用烏藥磨水灌之若煨火疲悴用硫黃少許入猪湯中炮熟餵之或入魚湯中餵之亦可小猫誤被人踏死用蘇木濃煎湯濾去柤灌之鵝鴨爾雅舒雁鵝注禮記曰出如舒雁今江東呼為􅕯疏李巡曰野曰雁家曰鵝又舒鳬鶩注鴨也疏李巡曰野曰鳬家曰鴨又鳬雁醜其足蹼注腳指間有幕蹼屬相著齊民要術鵝鴨并一嵗再伏者為種一伏者待時少三伏者冬寒雛亦多死也故取再伏大率鵝三雌一雄鴨五雌一雄鵝初輩生子十餘鴨生數十後輩皆漸少矣嘗足五榖飼之生子多不足者生子少欲放厰屋之下作窠以防猪犬狐狸驚恐之害多著細草於窠中令暖先刻白木為卵形窠别著一枚以誑之不爾不肯入窠東西浪生若獨著窠後有爭窠之患也生時尋即收取别作一暖處以柔細草覆之停置窠中凍即須死伏時大鵝一十子大鴨二十子小者減之多則不周數起者不任為種數起則凍死也其貪伏不起者須五六日一與食起之令洗浴久不起者飢羸身冷雖伏無熱鵝鴨皆一月雛出量雛欲出時四五日內不用聞打鼓紡車犬呌猪犬及舂聲又不用器淋灰不用輕見産婦觸忌者雛多厭殺不能自出假令出亦尋死也雛既出别作籠籠之先以粳米為粥糜一頓飽食之名曰填嗉不爾喜軒壺羌量而死然後以粟飯切苦菜蕪菁英為食以清水與之濁則易不易歷塞鼻則死入水中不用停久尋宜驅出此既水禽不得水則死臍未合久在水中冷徹亦死於籠中高處敷細草令寢處其上雛小臍未合不欲冷也十五日後乃出早放者匪直乏力致又有寒冷兼鳥鴟災也鵝惟食五榖稗子草采不食生蟲葛洪方日居射工之地常養鵝見此物食之故䳱羣此物也鴨靡不食矣水稗成實時尤是所便噉此足得肥充供厨者子鵝百日以外子鴨六七十日佳過此肉硬大率鵝鴨六年以上老不復生伏矣宜去之少者初生伏又未能工惟數年之中乃佳耳風土記鴨春季雛到夏五月則任啖故俗五六月則烹食之便民圖凡相鵝鴨母其頭欲小口上齕有小珠滿五者生卵多滿三者為次棧鵝易肥法稻子或小米大麥不計煮熟先用磚蓋成小屋放鵝在內勿令轉側門中木棒簽定只令出頭喫食日餵三四次夜多與食勿令住口撏去尾際毳衣如此三日加肥一斤養雌鴨法每年五月五日不得放棲只乾餵不得與水則日日生卵不然或生或不生土硫黃飼之易肥作杬子法純取雌鴨無令雜雄足其粟豆常令肥飽一鴨便生百卵俗所謂谷生者此卵既非隂陽合生雖伏亦不成雛宜以供贍杬木皮爾雅曰杬魚毒郭璞注曰杬大木子似粟生南方皮厚汁赤中藏卵黑無杬皮者虎杖根並作用爾雅曰荼虎杖郭璞注云似紅草粗大有細刺可染赤淨洗細莖銼煮取汁二斗及熟下鹽一升和之汁極冷內甕中熱則卵敗不堪久停浸鴨子一月煮食鹹徹則卵浮吳中多作者至十數斛久停彌善亦得經夏也雞爾雅雞大者蜀蜀子雓未成雞僆絶有力奮疏此别雞屬也雞者知時畜其大者名蜀蜀之雛子名雓雛之稍長未成雞者名僆壯大絶有力者名奮齊民要術雞種取桑落時生者良形小淺毛腳細短是也守窠少聲則無子春夏生者則不佳形大毛羽悅澤腳粗長者是游蕩饒聲産乳易厭既不守窠則無緣蕃息也雞春夏雛二十日內無令出窠飼以燥飯出窠早不免鳥鴟與濕飯則令臍濃雞棲宜㧻地為籠內著棧雖鳴聲不朗而安穩易肥又免狐狸之患若任之樹林一遇風寒大者損瘦小者或死燃柳柴雞雛小者死大者盲家政法養雞法二月先耕一畝作田秫粥灑之刈生芽覆上自生白蟲便買黃雌雞一隻雄一隻於地上作屋方廣丈五於屋下懸簀令雞宿上并作雞籠懸中夏月盛晝雞當還屋下息并於園中築作小屋覆雞得養子烏不得就龍魚河圖畜雞白頭食之病人雞有六指者亦殺人雞有五色者亦殺人養生論雞肉不可食小兒食令生疣蟲又令消體瘦鼠肉味甘無毒令小兒消殺除寒熱炙食之良也農政全書或設一大園四圍築墻中築垣分為兩所凡兩園墻下東西南北各置四大雞棲以為休息每一旬撥粥於園之左地覆以草二日盡化為蟲園右亦然俟左盡即驅之右如此代易則雞自肥而生卵不絶若遇瘟疫傳染即須以藍盛雞義口懸挂或移於樓閣上即免矣養雞令速肥不杷屋不暴園不畏烏鴟狐狸法别築墻匡開小門作小厰令雞閉兩目雌雄皆斬去六翮無令得飛出園多收桃稗胡之類以養之亦作小槽以貯水荆藩為樓去地一尺數掃去屎鑿墻為窠亦去地一尺惟冬天著草不茹則子凍春夏秋三時則不須直置匡上任其産伏留草則蜫蟲生雞出則著外許以罩籠之鵪鶉大還內墻匡中其供食者又别作墻匡蒸小麥飼之三七日便肥大矣又榖産雞子供常食法别取雌雄勿令與雌雄相雜墻匡斬翅荆樓土窠一法惟多與穀食之令竟冬肥盛自然穀産雞子矣一雞滋生至百餘卵不雛並食之無咎餅炙所須皆宜用此也瀹雞子法打破著沸湯中浮出即掠取生熟正得即加鹽醋也炒雞子法打破銅鐺中攪令黃白相雜細擘葱白下鹽米渾豉麻油炒之甚香美棧雞易肥法以油和麵捻成指尖大塊日與數十枚食之又以做成硬飯同土硫黃研細每次與五分許同飯拌勻餵數日即肥養雞不菢法母雞下卵時日逐食內夾以麻子餵之則常生卵不菢養生雞法雞初來時即以淨溫水洗其足自然不走治雞病方凡雞雜病以真麻油灌之皆立愈若中蜈蚣毒則研茱萸解之治鬭雞病方以雄黃末搜飯飼之可去其胃蟲此藥性熱又可使其力健魚陶朱公養魚經治生之法有五水畜第一水畜魚也以六畝地為池池中有九州求懷子鯉魚長三尺者二十頭牡鯉魚長三尺者四頭以二月上庚日內池中令水無聲魚必生至四月內一神守六月內二神守八月內三神守神守者鱉也內鱉則魚不復飛去在池中周繞九州無窮自謂游江湖也至來年二月得魚長一尺者一萬五千三尺者五千枚二尺者萬枚直五千得錢一百二十五萬至明年一尺者十萬枚二尺者五萬枚三尺者五萬枚長四尺者四萬枚留長二尺者二千枚作種所餘皆賣得錢五百一千萬候至明年不可勝計所以養鯉魚者不相食易長不費也農桑通訣凡育魚之所須擇泥土肥沃蘋藻繁盛為上然必召居人築舍守之仍多方設法以防獺害凡所居近數畝之湖如依陶朱法畜之可致速富今人但上江販魚取種塘內畜之飼以青蔬嵗可及尺以供食用亦為便法農圃四書魚種古法俱求懷子鯉魚納之池中但自涵育或在取近江湖藪澤陂泖水際之土數舟布底則二年之內土中自有大魚宿子得水即生也今之俗惟購魚䄮其䄮也漁人泛大江乘潮而布網取之者初也如針鋒然乃飼之以雞鴨之卵黃或大麥之麩屑或炒大豆之末稍大則鬻魚池養之家閩録云仲春取子於江曰魚苗畜於小池稍大入􅀢塘曰􅀢􅀈可尺計徙之廣池飼以草九月乃取有難長之䄮曰艋艘其首黃色曰螺師青以其食螺師也故名爾雅翼曰鱒魚螺蚌是也其口尖期年而鼻竅始通不得通則死長至尺許乃易大惟鯶魚為良其口濶而盆首似鯉而身圓謂之草魚食草而易長爾雅翼曰鯶魚食草白鰱乃魚之貴者白露左右始可納之池中或前一月或後一月皆不育漁人攜於舟若煎炙油氣觸之則目皆瞎京口録曰巨首細鱗池塘中多畜之鯔魚松之人於潮泥地鑿仲春潮水中捕盈寸者養之秋而盈尺腹背皆腴為池魚之最是食泥與百藥無忌京口録云頭匾而骨軟閩志云目赤而身圓口小而鱗黑吳王論魚以鯔為上也其魚至冬能牽被而自藏又凡鑿池養魚必以二有三善焉可以蓄水鬻時可去大而存小可以解泛此池泛可入彼池不可以漚麻一日即泛魚遭鴿糞則泛以圊糞解之魚之自糞多而返復食之則泛亦以圊糞解之池不宜太深深則水寒而難長魚食雞鴨卵之黃則中寒而不子故魚秧皆不子魚之行遊晝夜不息有洲島環轉則易長池之傍樹以芭蕉則滴露而可以解泛樹楝木則落子池中可以飽魚樹葡萄架子於上可以免鳥糞種芙蓉岸周可以辟水獺魚食楊花則病亦以糞解之食蟋蟀嫩草食稗子池之正北後宜特深魚必聚焉則三面有日而易長飼之草亦宜此方一日而兩番須有定時魚小時草必細食至冬則不食凡魚嘯子必沿水痕雖乾涸十年遇水即生其長甚易其嘯子也以五月鯉魚以五月下惟銀魚鱠殘魚嘯子於冰冰解三日乃生也飼魚不可撩水草恐有黑魚鮎魚等子在草上是能食魚黑魚者鱧魚也夜則仰首而戴斗鮎魚者鮧魚也即鯷魚也大首方口背青黑而無鱗是多涎池中不可著碱水石灰能令魚泛凡池之䕯相傳一夜生七子太密則魚皆鬱死必去其半乃佳便民圖凡魚遭毒翻白急疏去毒水别引新水入池多取芭蕉葉搗碎置新水來處使吸之則解或以溺澆池面亦佳農政全書江西養魚法掘小池方一丈深八尺底又作小池方五尺深二尺用杵築實畜水至清明前後出時買鰱魚鯶魚苗長一寸上下者每池鰱六百鯶二百每日以水荇帶草喂之無草時可用鹹蛋殼與食之常時積下至時用之冬月尤宜用之令魚并泥食之不散游至五月五日後五更時用夏布袱於塘近邊釘四樁張布袱其上次以夏布兜撈魚苗傾袱內選去雜魚另置一水盆中其鰱鯶入水桶旋送入中池中池方二三丈每池可放七八百池中生栽荇草栽法於二三月舊魚入大塘去水曬半乾栽荇草於內栽完放水長草以養新魚其中池移過大池之鯶魚每百日用草二擔則中池過塘時魚重一斤者至十月可得三四斤大塘者大小為魚多寡水宜深五尺以上每食魚只於大塘內取之中塘荇草盡再入之或用正本草若大池面方二三十步以上者可得三四斤以上魚即與老草連根食之刮苧麻取下葉以廣蓋之勿曬乾至晚入池中當夜食盡又冬月大魚無食有一法常時積舊草薦置僻處使人溺其上久之至冬月銼細以稻泥或黃土和草成碗大團子曬乾置池中心深處大魚則并泥食之中池中魚銼草宜更細入水二三日和土成團冬月塘乾取起魚寄别處池內或入大桶速乾水起生泥壅池生泥只取爛泥勿取乾者池瘦傷魚令生虱取過泥速栽荇草放水入魚魚虱如小豆大似團魚凡山中暴雨入池帶惡蟲蛇氣亦令魚生虱則極瘦凡取魚見魚瘦宜細檢視之有則以松毛遍池中浮之則除凡小池宜在大池之旁以便冬月寄魚小池過小魚於中中池即栽荇又作羊棬於塘岸上安羊每早掃其糞於塘中以飼草魚而草魚之糞又可以飼連魚如是可以損人打草但魚略有微滯耳水畜之利須擇背山面湖山聚水曲之處起造住宅先置田地山場凡僕從即便播榖種蔬樹植蠶繅以為衣食之源然後掘築方圍大塘以收水利塘內有九州八谷如同江湖納蝦鱉螺螄為神守使魚相忘若自以為江湖之中日夜游戲而不息矣蜜蜂附農桑通訣人家多於山野古窯中收取蜂蜜蓋小房或編荆囤兩頭泥封開一二小竅使通出入另開一小門泥封時時開却掃除常淨不令他物所侵及於家院掃除蛛網及關防山蜂土蜂不使相傷秋花雕盡留冬月可食蜜脾餘者割取作蜜蠟至春三月掃除如前常於蜂窠前置水一器不致渴損春月蜂盛一窠止留一王其餘摘之其有蜂王分窠羣蜂飛去用碎土撤而收之别置一窠其蜂即止春夏合蜜及蠟每窠可得大絹一匹有收養生息分百窠者不必他求而可致富也經世民事十月割蜜天氣漸寒百花已盡宜開蜂窶後門用艾燒烟微薰其蜂自然飛向前去若怕蜂蟄用薄荷葉嚼細塗在手面其蜂自然不蟄或用紗帛蒙頭及身上截或皮套五指尤妙約量冬至春其蜂食之餘者揀大蜜脾用利刀割下却封其窶將蜜絞淨不見火者為白沙蜜見火者為紫蜜入窶盛頓將絞下蜜柤入鍋內慢火煎熬候融化拗出絞柤再熬預先安排錫鏇或瓦盆各盛冷水次傾蠟水在內凝定自成黃蠟以柤內蠟盡為度要知其年收蜜多寡則看當年雨水何如若雨水調勻花木茂盛其蜜必多若雨水少花木稀其蜜必少或蜜不敷蜜蜂食用宜以草雞或一隻或二隻退毛不用肚腸懸掛窶內其蜂自然食之又力倍常至春來二月門開其封止存雞骨而已農政全書冬月割蜜過多則蜂飢飢時可將嫩雞白煮置房側令食之欽定授時通考卷七十一
