body:
  text: 穀種黍丹黍米蜀黍玉蜀黍野黍禮記曲禮黍曰薌合疏正義曰黍曰薌合者夫穀秫者曰黍秫既軟而相合氣息又香故曰薌合也集說黍熟則黏聚不散其氣又香故曰薌合周禮天官食醫凡㑹膳食之宜羊宜黍正義羊味甘熱黍味苦溫甘苦相成訂義羊火畜也黍髙燥所生與火畜相宜又夏官職方氏正西曰雍州其穀宜黍稷又河內曰冀州其穀宜黍稷爾雅秬黑黍注詩曰維秬維秠又秠一稃二米注此亦黑黍但中米異耳漢和帝時任城生黑黍或三四實實二米得黍三斛八斗是疏李巡曰黑黍一名秬黍秬即黑黍之大名也秠是黑黍之中一稃有二米者别名為秠若然秬秠皆黑黍矣而春官鬯人注云釀秬為酒秬如黑黍一秠二米言如者以黑黍一米者多秬為正稱二米則秬中之異故言如以明秬有二等也秬有二等則一米亦可為酒鬯人之注必言二米者以宗廟之祭惟祼為重二米嘉異之物鬯酒宜用之故以二米解鬯其實秬是大名故云釀秬為酒此云秠一稃二米鬯人注云一秠二米不同者鄭志答張逸云秠即皮其稃亦皮也爾雅重言以曉人然則秠稃古今語之異故鄭引此文以稃為秠也漢和帝時任城縣生黑黍或三四實實二米得黍三斛八斗是也尚書考靈曜夏火星昏中可以種黍春秋說題辭精移火轉生黍夏出秋改黍者縮也故其立字禾入米為黍酒以扶老春秋佐助期黍神名侜佞姓蘭郝孝經援神契黑墳宜黍麥淮南子渭水多力而宜黍博雅粢黍也黍釀謂之䅀說文以大暑而種故謂之黍黍禾屬黏者也孔子曰黍可以為酒古今注稻之黏者為黍亦謂稌為黍禾之黏者為黍亦謂之穄亦曰黃黍廣志黍有燕頷之名又有驢皮黍又曰牛黍稻尾秀成赤黍馬革大黑黍或云秬黍有濕屯黃黍齊民要術穄有赤白黑青黃鶯鴿凡五種又凡黍黏者收薄穄味美者亦收薄難舂雜隂陽書黍生於榆六十日秀秀後四十日成黍生於巳壯於酉長於戌老於亥死於丑惡於丙午忌於丑寅邜穄忌於未寅爾雅翼黍禾屬而黏者也以大暑而種故謂之黍從禾雨省聲孔子曰禾可為酒禾入水也然則又以禾入水三字合而為黍不但從雨而已黍以大暑而種故農家以三月上旬為上時四月上旬為中時五月上旬為下時然月令仲夏之月農既登黍矣天子以雛嘗黍羞以含桃先薦寢廟為鄭說者以為黍非新成直是舊黍蓋以鄭解孟秋所登之穀為黍稷故以仲夏為未熟若其熟何得言登且所謂舊黍者自去歲孟冬與彘併食數月於此矣豈待今而後嘗耶黍固有早晚其晚者不妨至孟秋始熟故庶人秋乃薦黍此天子之禮自重其先熟者而嘗薦之耳故蔡雍以為今之蟬鳴黍亦猶十月穫稻而天子所嘗乃九月熟者謂之半夏稻亦其類也黍之秀特舒散故說者以其象火為南方之穀詩亦云芃芃黍苗以此也又云彼黍離離彼稷之苗者黍大體似稷故古人併言黍稷今人謂黍為黍穄行役之人有憂於內則有不察於外故於此或不能辨也黍有赤黍黑黍黑黍已别見虋稱赤苗恐是赤者其類有黏不黏如稻之有粳糯其不黏者以為飯黏者别名秫以為酒說文秫稷之黏者即謂此也月令造酒命大酋秫稻必齊蓋以此秫與稻之糯為酒北人謂秫為黃米亦謂之黃糯釀酒比糯稻差劣黍之為物黏而􅀢故凡香之􅀢馥黏之黏䵒皆從之又古人作履黏以黍米謂之黎其雪桃亦用黍以黍黏去桃毛也孔子先食黍以黍為五穀之先桃為五果之下故捨不用耳黍又搗以為餳謂之餦餭楚辭曰粔籹蜜餌有餦餭言以蜜和米麵煎熬作粔籹又有美餳衆味甘具也及屈原死楚人以菰葉裹黍祠之謂之角黍􅀢音香黏音胡䵒音昵餦音張餭音黃粔音巨􅀢字典不載又秬黑黍也古者薦籩有白黑形鹽白為熬稻黑即秬也至藏氷則用黑牡秬黍以享司寒蓋此倣其方之色亦以為酒謂之秬鬯既芬香調暢矣若將用則鬯人以鬯酒入鬱人鬱人得之築鬱金草煮之以和此酒則謂之鬱鬯故鬯人掌共秬鬯而鬱人和鬱鬯以此也又釋草曰秬黑黍秠一稃二米是秬與秠之所以異者在此然則秠必不黑秬必不一稃二米也而鄭氏釋春官鬯人既云秬如黑黍一稃二米則是以秠之狀雜之於秬郭氏解釋草又曰秠亦黑黍則是又以秬之色雜之於秠秬既欲兼秠之狀秠又欲兼秬之色凡物之所以紊亂不復可推究者由此故也郭氏又引漢和帝時任城生黑黍或三四實實二米得黍三斛八斗以顯二米者為黑黍且任城所生漢之異事歷世所未有詩歌后稷降播乃民事之常如必待任城所生而後降之則沒世不可待矣至唐說者又言今上黨民間黑黍或值豐歲往往得二米者但稀濶而得之不以充貢耳以此附成郭氏之說且后稷所降既謂之種何得以豐歲偶有一二為說若皆以豐歲言之則禾有同穎麥有兩岐又可待以為種耶按今百穀之中一稃二米者唯麥為然舍麥未有二米者說文解秠亦云一稃二米詩云誕降嘉種維秬維秠天賜后稷之嘉穀也而解來字云周所受瑞麥來牟一來二縫秠與來牟皆后稷所受於天皆一稃二米則是秠者正此來牟耳但生民臣工所稱不同來牟又稱釐牟古者來釐丕三字相通要是一物鄭志自以所解鬯人不合釋草之文故答張逸併以秠稃皆解為皮且云爾雅重言以曉人然則不惟二物相混而秠但得為秬之皮轉失實矣豫故詳而論之農政全書王禎曰詩云維秬維秠秬黑黍也又曰秬鬯一卣此言黍之為酒尚矣今又有赤黍米黃而黏可蒸食白黍釀酒亞於糯秫又北地遠處惟黍可生其莖穗低小可以釀酒又可作饌粥黏滑而甘此黍之有補於艱食之地者也凡祭祀以之為上盛貴其色味之美也本草綱目李時珍曰按許慎說文云黍可為酒從禾入水為意也魏子才六書精藴云禾下從氽象細粒散垂之形泛勝之云黍者暑也待暑而生暑後乃成也詩云誕降嘉種維秬維秠維穈維芑穈即虋音轉也郭璞以虋芑為粱粟以秠即黑黍之二米者羅願以秠為來牟皆非也陶𢎞景曰黍荆郢州及江北皆種之其苗如蘆而異於粟粒亦大今人多呼秫粟為黍非矣北人作黍飯方藥釀黍米酒皆用秫黍也别録丹黍米即赤黍米也亦出北間江東時有而非土所宜多入神藥用又有黑黍名秬釀酒供祭祀用蘇恭曰黍有數種其苗亦不似蘆雖似粟而非粟也蘇頌曰今汴洛河陜間皆種之爾雅云虋赤苗芑白苗秬黑黍是也李巡云秬是黑黍中一稃有二米者古之定律者上黨秬黍之中者纍之以生律度衡量後人取他黍定之終不能協律或云秬乃黍之中者一稃二米之黍也此黍得天地中和之氣而生蓋不常有有則一穗皆同二米粒並均勻無大小故可定律他黍則不然地有肥瘠歲有凶穰故米有大小不常矣今上黨民間或值豐歲往往得二米者但稀濶故不以充貢爾又曰黏者為秫可以釀酒北人謂為黃米亦曰黃糯不黏者為黍可食如稻之有粳糯也李時珍曰此誤以黍為稷以秫為黍也蓋稷之黏者為黍粟之黏者為秫粳之黏者為糯别録本文著黍秫稻糯之性味功用甚明而注者不諳往往謬誤如此今俗不知分别通呼秫與黍為黃米矣又黍米氣味甘溫無毒孫思邈曰黍米肺之穀也肺病宜食之主益氣李時珍曰按羅願云黍者暑也以其象火為南方之穀蓋黍最黏滯與糯米同性其氣溫暖故功能補肺而作食作煩熱暖筋骨也孟說謂其性寒非矣直省志書宛平縣物産黍有白黑二種三河縣土産黍有黑白紅黃四種平谷縣土産黍有黑白紅黃黧五種清苑縣土産黍有黃有白有丹有大白有小白歷城縣方産黍有酒飯二種酒黏飯不黏鄒平縣物産黍黑白數種新城縣物産黍白黍黎頭二種齊河縣物産黍有紅黃白黑四種齊東縣物産黍黑白數種長清縣物産黍有黑白二種泰安州物産黍黃白黑三種萊蕪縣物産黍白黃紅黑四色有軟硬二種軟宜釀酒霑化縣物産黍之品黎頭黍托地白棗皮黍芝黃黍紅黍白黍滋陽縣物産黍有黑白二種曹州物産黍有黃紅黑白四色曹縣物産黍有數種五色早晚不同曹酒率用此米巨野縣物産黍黑白紅黃四種東平州物産黍黑白二種汶上縣物産黍黑白二種沂州物産黍有黑白二種清平縣物産黍有紅白黑三種皆可釀酒白者佳髙唐州物産黍其品三黑紅白觀城縣物産黍黑白二種日照縣物産黍有黑白二種黃縣物産黍有紅白黑三種福山縣物産黍有金銀黑三色釀酒招遠縣物産赤黍白黍黑黍萊陽縣物産黍紅白黑三種陽曲縣物産黍有軟硬二種祁縣軟硬二種軟宜釀酒定襄縣物産黍黃白紅青羊眼保德州土産黍有黑青紅黃數種臨汾縣物産黍有軟硬二種丹黑二色翼城縣物産黍有黃白二種臨晋縣物産黍有黃白赤黑四種米皆黃俗呼為黃米平陸縣土産黍有白紅黃黎其硬者為穈黍髙平縣物産黍紅白黎黑數種精潔美腴甲於他郡和順縣土産黍有軟硬二種其色白黑黃赤黎五色馬邑縣土産黍有青白黃三種與早晚大小之分祥符縣物産白黍黑黍紅黍黃黍洧川縣物産黍有黃白黑三種鄢陵縣土産黍紅白黎三色其最早者曰奪麥場延津縣物産黍有黃黍白黍粳黍糯黍襄城縣土産白黍白莩黃米為上黃黍黃莩黃米為次黑黍釀酒延川縣物産黍有軟硬二種有丹黑二色西鄉縣土産黍類露仁糧矮人糧馬尾糧黑穀糧罩粒頭清河縣物産黍有黃白黎色數種亦有紅者名大紅袍蒲圻縣物産黍之屬有黃黍黑黍高粱黍永明縣土産泡眼黍赤黍蓑衣黍建陽縣方産黍屬小早三月種六月收黃竹早宜飽水田四月種七月熟江西早三月種七月初收爛泥早天降早苦株早紅根早蘆絲早俱三月種七月收間有瘦田亦可種縮頸早宜肥田三月種七月半收福德早宜禾田三月種八月收半冬早黃穀早俱三月種九月收海寧縣土産黍之種四曰糯黍黃黍牛黍飯黍本草綱目丹黍米即赤黍也爾雅謂之虋吳瑞曰浙人呼為紅蓮米江南多白黍間有紅者呼為赤蝦米寇宗奭曰丹黍皮赤其米黃惟可為糜不堪為飯黏著難解寧原曰穗熟色赤故屬火北人以之釀酒作糕又氣味甘微寒無毒孫思邈曰微溫寇宗奭曰動風性熱多食難消餘同黍米齊民要術薥秫春月種宜用下土莖髙丈餘穗大如帚其粒黑如漆如蛤眼熟時收刈成束攢而立之其子作米可食餘及牛馬又可濟荒其莖可作洗帚秸稈可以織箔編席夾籬供㸑無有棄者亦濟世之一穀農家不可闕也農政全書徐光啓曰薥秫古無有也後世或從他方得種其黏者近秫故借名為秫今人但指此為秫而不知有粱秫之秫誤矣别有一種玉米或稱玉麥或稱玉薥秫蓋亦從他方得種其曰米麥薥秫皆借名之也又曰北方地不宜麥禾者乃種此尤宜下地立秋後五日雖水潦至一丈深而不能壞之但立秋前水至即壞故北土築堤二三尺以禦暴水但求隄防數日即客水大至亦無害也又曰秦中鹻地則種薥秫下地種薥秫特宜早須清明前後耩鹻音減本草綱目李時珍曰蜀黍不甚經見而今北方最多按廣雅荻粱木稷也蓋此亦黍稷之類而髙大如蘆荻者故俗有諸名種始自蜀故謂之蜀黍汪穎曰蜀黍北地種之以備缺糧餘及牛馬穀之最長者南人呼為蘆穄李時珍曰蜀黍宜下地春月布種秋月收之莖髙丈許狀似蘆荻而內實葉亦似蘆穗大如帚粒大如椒紅黑色米性堅實黃赤色有二種黏者可和糯秫釀酒作餌不黏者可以作糕煮粥可以濟荒可以養畜梢可作帚莖可織箔席編籬供㸑最有利於民者今人祭祀用以代稷者誤矣其穀殼浸水色紅可以紅酒博物志云地種蜀黍年久多蛇又蜀黍米氣味甘澀溫無毒本草綱目李時珍曰玉蜀黍種出西土種者亦罕其苗葉俱似蜀黍而肥矮亦似薏苡苗髙三四尺六七月開花成穗如秕麥狀苗心别出一苞如棕魚形苞上出白鬚垂垂久則苞坼子出顆顆攢簇子亦大如棕子黃白色可泄炒食之炒拆白花如炒拆糯殼之狀又玉蜀黍米氣味甘平無毒農政全書野黍生荒野中科苗皆類家黍而莖葉細弱穗甚瘦小黍粒亦極細小味甘性微溫採子舂去粗糠或搗或磨麵蒸糕食甚甜欽定授時通考卷二十四
