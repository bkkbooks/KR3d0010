body:
  text: 農餘蔬三菜瓜稍瓜黃瓜南瓜冬瓜絲瓜葫蘆瓠子茄菌木耳石耳地耳菜瓜菜瓜北方名苦瓜蔓葉俱如甜瓜生時色青質脆可生食間有苦者亦可作豉醃葅故名菜瓜熟亦微甜生秋月大小不一止可醃以備冬月之用學圃餘疏瓜之不堪生噉而堪醬食者名曰菜瓜圓者如甜瓜長者如王瓜皆一類也稍瓜附本草稍瓜一名越瓜一名菜瓜南北皆有二三月下種生苗就地生蔓青葉黄花並如冬瓜花葉而小夏秋之間結瓜有青白二色大如瓠子一種長者至二尺許俗呼羊角瓜子狀如胡瓜子大如麥粒羣芳譜稍瓜蔓生較黄瓜頗麤色緑而黑縱有白紋界之微凹體光而滑膚實而韌味甘寒利腸去煩熱止渴利小便解酒熱宣洩熱氣不益小兒不可與乳酥鮓同食宜忌大畧與黄瓜同黄瓜黄瓜一名胡瓜本草云張騫使西域得種故名拾遺録云大業四年避諱改為黄瓜俗又呼為王瓜蔓生葉如木芙蓉葉五尖而澀有細白刺如針芒莖五稜亦有細白刺開黄花結實青白二色質脆嫩多汁有長數寸者有長一二尺者遍體生刺如小粟粒多謊花其結瓜者即隨花並出味清凉解煩止渴可生食種陽地暖則易生行陣宜整兩行㣲相近用樹枝棚起如人胸高附蔓於上兩行外相逺以通人行喜糞壅頻鋤勿令生草瓜生至初花鋤三四次鋤勿著根令瓜苦亦有隨地蔓生者摘瓜時宜引手摘勿踏瓜蔓亦勿翻覆之此瓜可生食亦可醃以為葅性甘寒小兒不宜多食學圃餘疏王瓜出燕京者最佳其地人種之火室中逼生花葉二月初即結小實中官取以上供又一種秋生者亦佳五土俱宜閩中二三月間食入夏枯矣羣芳譜種植下種宜甲子庚子壬寅辛巳黃道開成日二月上旬為上時三月上旬為中時四月上旬為下時至五六月止可種藏瓜耳藏瓜皮厚可收藏者預先將畦斸數遍以土熟為度加熟糞一層又翻轉以耙耬平水飲足將子用軟布包裹水濕生芽出天晴日中種子於内掩以浮土二指厚毎晨以清糞水灌澆俟苗長茂帶土移栽苗大發旺用竹刀開其根跗間納大麥一粒結瓜碩大而久栽苗之畦修治與上同糞要熟而細一切草根須去盡又收子取生數葉即結瓜者謂之本母子留至極熟摘下截去兩頭取中央者洗浄晾乾置乾燥處勿令浥濕浥濕則難生又衛瓜瓜生蟻用羊骨引至旁葉去瓜中黄甲小蟲喜食瓜葉宜以綿兜􅇢去凡瓜忌香尤忌麝香一觸之輒痿死一法瓜旁種葱蒜能辟麝南瓜南瓜附地蔓生莖麤而空有毛葉大而緑亦有毛開黄花結實形横圓而䜿扁色黄有白紋界之微凹煮熟食味麫而膩亦可和肉作羮又有番南瓜實之紋如南瓜而色黑綠蒂頗尖形似葫蘆皆不可生食本草南瓜四月生苗引蔓甚𦂳一蔓可延十餘丈節節有根近地即著葉狀如蜀葵大如荷葉花如西瓜花結瓜正圓大如西瓜上有稜如甜瓜一本可結數十顆其色或綠或黄或紅子如冬瓜子肉厚色黄農桑通訣浙中一種陰瓜宜陰地種之秋熟色黄如金皮膚稍厚可藏至春食之如新疑即南瓜也冬瓜冬瓜一名白瓜一名水芝一名地芝見廣雅一名蔬在處蒔之附地蔓生莖麤如指有毛中空葉大而青有白毛如刺開白花實生蔓下長者如枕圓者如斗皮厚有毛初生青綠經霜則青皮上白如塗粉肉及子亦白八月斷其梢簡實小者摘去止留大者五六枚經霜乃熟十月足收之味甘微寒性急善走除小腹水脹利小便止渴益氣除滿耐老去頭面熱鍊五臟有熱病宜食陰虚及患寒疾人久病人忌之霜降後方可食不然反成胃病本草云其瓤謂之瓜練白虚如絮可以浣練衣服其子謂之瓜犀在瓤中成列齊民要術種冬瓜法傍牆陰地作區圍二尺深五寸以熟糞及土相和正月晦日種既生以柴木倚牆令其緣上旱則澆之又十月區種如區種瓜法冬則推雪著區上為堆潤澤肥好乃勝春種羣芳譜收藏宜高燥處忌近鹽醋及掃帚雞犬觸犯與芥子同安置可經年不壞又收子瓜蔕灣曲貼肉者雌瓜也俟極老取子收高燥處勿浥濕留作種絲瓜絲瓜一名蠻瓜一名布瓜一名天羅絮一名天絲瓜蔓生莖綠色有稜而光葉如黄瓜葉而大無刺深綠色宜高架喜背陽向陰開大黄花五出微似胡瓜花蘂瓣俱黄少以鹽漬可㸃茶結實狀如瓜有短而肥者有長而瘠者瓜大寸許長一二尺或三四尺深綠色有皺㸃瓜首如鼈首嫩者煮熟加薑醋食同雞鴨猪肉炒食佳不可生食性冷解毒多食敗陽九月將老者取子留作種瓤絲如網可滌器葫蘆葫蘆匏也一名瓠瓜一名匏瓜圓者曰匏亦曰瓢本草云壺酒器盧飲器此物象其形故名俗作葫蘆一名􅀢姑蔓生莖長須架起則結實圓正亦有就地生者大小數種有大如盆盎者有小如拳者有柄長數尺者有中作亞腰者莖韌有絲如筋葉圓有小白毛面青背白開白花有甘苦二種甘者性冷無毒利水道止消渴苦者有毒不可食惟可佩以渡水陸農師曰項短大腹曰瓠長如越瓜首尾如一者細而合上曰匏無柄而圓大形扁者似匏而肥圓者曰壺匏之有短柄大腹者本草李時珍曰長瓠懸瓠瓠之一頭有腹長柄者今人以為茶酒瓠壺盧瓠瓜蒲盧細腰者今之藥壺盧廣志謂之約腹壺亦有大小二種名狀不一其實一類各色也處處有之但有遲早之殊並以正月下種生苗引蔓延緣其葉似冬瓜葉而稍團有柔毛嫩時可食五六月開白花結實白色大小長短各有種色瓤中之子齒列而長謂之瓠犀爾雅云瓠棲瓣注云瓠中瓣也詩邶風匏有苦葉疏匏葉少時可為羮今河南及揚州人恒食之八月中堅强不可食故云苦菜􅃎風八月斷壺王禎農書匏之為用甚廣大者可煮作素羮可和肉煮作葷羮可蜜煎作果可削條作乾小者可作盒盞長柄者可作噴壺亞腰者可盛藥餌苦者可治病氾勝之書種瓠法以三月耕良田十畝作區方深一尺以杵築之令可居澤相去一步區種四實蠶矢一斗與土糞合澆之水二升所乾處復澆之著實以馬箠㱿其心勿令蔓延多實實細以藁薦其下無令親土多瘡瘢度可作瓢以手摩其實從蔕至底去其毛不復長且厚八月微霜下收取掘地深一尺薦以藁四邊各厚一尺以實置孔中令底下向瓠一行覆上土厚二尺二十日出黄色好破以為瓢其中白膚以養猪致肥其瓣以作燭致明一本三實一區十二實一畝得二千八百八十實十畝凡得五萬七千六百瓢瓢直十錢并直五十七萬六千文用蠶矢二百石牛耕功力直二萬六千文餘有五十五萬肥猪明燭利在其外又區種瓠法收種子須大者若先受一斗者得収一石受一石者得收十石先掘地作坑方圓深各三尺用蠶沙與土相和令中半若無蠶沙生牛糞亦得著坑中足躡令堅以水沃之候水盡即下瓠子十顆復以前糞覆之既生長二尺餘便總聚十莖一處以布纒之五寸許復用泥泥之不過數日纒處便合為一莖留强者餘悉搯去引蔓結子子外之條亦搯去之勿令蔓延留子法初生二三子不佳去之取第四五六區留三子即足旱時須澆之坑畔周匝小渠子深四五寸以水停之令其遙潤不得坑中下水羣芳譜種葫蘆冬瓜茄瓠瓠子黄瓜菜瓜俱宜天晴日中下種毎晨以清糞水澆之二月下旬栽則五月中旬結實若三月種則太遲矣種法正月預以糞和灰土實塡作一坑候土發過熱篩過以盆盛土種諸子常灑水日曬暖夜收暖處候生甲時分種於肥地常以清糞水灌澆上用低栅蓋之待長帶土移栽俟引蔓結子子外之條搯去之凡留子初生二三子不佳取第四五者留之毎科留三枚即足餘旋食之種大葫蘆正月中掘地作坑深數尺或至一丈塡實油麻菉豆爛草葉一層糞土一層如此數重向上一尺餘糞土塡之坑方四五尺毎坑只種十餘顆二月下子待生長尺許揀擇肥好者四莖毎兩莖相縛著一處仍以竹刀刮去半邊以物纒住以牛糞黄泥封之一如接樹法裹待生做一處只留一頭取此兩莖亦如前法四根合作一根長大只留一根待結葫蘆只揀取兩箇周正好大者餘俱去之依此葫蘆極大毎箇可盛一石長頸葫蘆如前法如欲將長頭打結待葫蘆生成趁嫩時將其根下土挖去一邊却輕擘開根頭掗入巴豆肉一粒在根裏仍將土罨其根俟二三日通根藤葉俱輭敝欲死却任意將葫蘆結成或縧環等式仍取去根中巴豆照舊培澆過數日復鮮如故俟老收之瓠子附瓠子江南名扁蒲就地蔓生處處有之苗葉花俱如葫蘆結子長一二尺夏熟亦有短者麤如人肘中有瓤兩頭相似味淡可煮食不可生噉夏月為日用常食至秋則盡不堪久留性冷無毒除煩止渴治心熱利水道調心肺治石淋吐蛔蟲壓丹石毒茄子茄子一名落蘇酉陽雜俎云錢王有子跛足以聲相近故呼落蘇一名小菰見晉書先蠶儀注一名崑崙瓜見大業拾遺錄云改呼茄子為崑崙紫瓜清異錄云人間但名崑味有紫青白三種老則黄如金來自暹羅紫者又名紫膨脝說本黄庭堅白者又名銀茄又一種白者名渤海茄形圓有蔕有蕚大者如甌又一種白花青色稍扁一種白而扁謂之番茄此物宜水勤澆多糞則味鮮嫩自小至大生熟皆可食又可曬乾冬月用如地瘠少水者生食之刺人喉一種水茄形稍長亦有紫青白三色根細末大甘而多津可止渴此種尤不可缺水與糞此數種在在有之味甘寒丹溪謂茄屬土甘而降火莖麤如指紫黑有刺葉如蜀葵葉亦紫黑有刺開花時摘其葉布通衢規以灰令人物踐踏之則子繁俗名嫁茄熟者食之厚腸胃火炙食之甚美北方以為常食南人不敢生食云動氣發瘡及痼痰患冷氣人忌用秋後茄發眼疾本草株高三四尺葉大如掌自夏至秋開紫花五瓣相連五稜如縷黄蘂綠蔕蔕包其茄茄中有瓤瓤中有子子如脂麻有團如栝樓者有長四五寸者王氏農書茄視他菜最耐久供膳之餘糟鹽豉醋無所不宜須廣種之羣芳譜種植二月下子須肥熟地常澆灌之俟四五葉帶土移栽相離尺許根宜築實虚則風入難活區土不宜有浮土恐雨濺泥汚葉則萎而不茂宜天晴栽鋤治培壅功不可缺又收種九月黄熟時摘取擘四瓣或六瓣曬極乾懸之房内或向陽處勿浥濕臨種時水泡取子淘浄去其浮者菌菌本草一名杜蕈一名菰子一名地雞一名獐頭陳藏器曰地生者為菌木生者為檽江東人呼為蕈凡菌從地中出者皆主瘡疥牛糞上黑菌尤佳若燒灰地上經秋雨生菌重臺者名仙人㡌大主血病菌冬春無毒夏秋有毒有蛇蟲從下過也夜中有光者欲爛無蟲者煮之不熟者煮訖照人無影者上有毛下無紋者仰卷赤色者並有毒凡煮菌投以薑屑飯粒若色黑者殺人否則無毒爾雅中馗菌註地蕈也似蓋今江東名為土菌亦曰馗厨可啖農桑通訣中原呼菌為菌茹又為莪又一種謂之天花桑樹上生者呼為桑莪江南山中松下生者名為松滑誠齋云傘不如笠釘勝笠蓋愈嫩愈美風味過於他菌又有紫菌白菌二種尤佳野蕈如赤菰黄耳皆可食陳仁玉菌譜合蕈生韋羌山寒極雪收春氣欲動土鬆芽活此菌候也菌質外褐色肌理玉潔芳薌韻味一發釜鬵聞百步外蓋菌多種例柔美皆無香獨合蕈香與味稱孟溪山中亦同時産惟蕈柄高無香氣土人以是别於韋羌焉稠膏蕈生孟溪山秋中霏雨零露浸釀山膏木腴䔒為菌花戢戢多生山絶頂高樹杪初如蘂珠圓瑩類輕酥滴乳淺黄白色味尤甘勝已乃傘張大幾掌味頓渝矣春時亦間生不能多稠膏得名土人謂稠木膏液所生耳合蕈他邦猶或有之此蕈獨此山所産故尤可貴煮法當徐下鼎瀋俟涫沸漉起謹勿匕撓撓則涎腥不可食性叄和衆味而特全於酒烹齊既調温厚滑甘或欲致逺則復湯蒸熟貯之瓶罌然其味去出山逺也栗殻蕈寒氣至稠膏將盡栗殻色者則其續也松蕈生松陰採無時竹蕈生竹根味極甘麥蕈多生溪邊沙壤鬆土中俗名麥丹蕈味殊美絶類北方摩姑玉蕈生山中初寒時色潔晳可愛故名玉然作羮微韌俗名寒蒲蕈黄蕈叢生山中梔鬱黄色俗名黄纘又有名黄㹠者性峭硬有味紫蕈赬紫色亦山中産俗名紫富蕈品為下四季蕈生林木中味甘而肌理麤峭不入品鵞膏蕈生高山狀類鵞子久乃􅓫開味殊甘滑不謝稠膏然與杜蕈相亂杜蕈者生土中俗言毒蜇氣所成食之殺人凡中其毒者必笑解之宜以苦茗雜白礬勻新水併咽之無不立愈潘之恒廣菌譜杉蕈出宜州生積年杉木上狀若菌採無時皁角蕈生皁樹上不可食香蕈香蕈生桐栁枳椇木上紫色者名香蕈天花蕈即天花菜出五臺山形如松花而大於斗香氣如蕈白色食之甚美蔴菰蕈出東淮北山間埋桑楮木於土中澆以米泔待菰生采之長二三寸本大末小白色柔軟其中空虚狀如未開玉簮花俗名雞足蔴菰謂其味狀相似也一種狀如羊肚有蜂窠眼者名羊肚菜雞㙡蕈出雲南生沙地間丁蕈也高脚繖頭土人采烘以充方物按通雅作雞堫雲南志謂之雞葼雞以形言葼者飛而斂足之貌說本楊慎或作蟻㙡以其産處下皆蟻穴貴州志云下有蟻若蜂房狀又名蟻奪雷蕈出廣西横州遇雷過即生須疾采之少遲則腐或老不堪用矣作羮甚美亦如雞㙡之屬其價並珍舵菜即海舶舵上所生菌也亦不多得竹蓐即竹菰也草更生曰蓐得溽濕之氣而成本草作竹肉因其味也生慈竹林夏月逢雨滴汁著地涌出如鹿角白色者可食生苦竹枝上如雞子如肉臠者有大毒又曰竹菰生朽竹根節上狀如木耳或紅白色酉陽雜俎云江淮有竹肉大如彈丸味如白雞即此物也惟苦竹生者有毒雚菌雚當作萑乃蘆葦之屬讀如桓或以為鸛尿所化非也今渤海蘆葦澤中鹹鹵地往往有之其菌色白輕虚表裏相似與衆菌不同出滄州秋雨以時乃有之若天旱久霖即稀日乾者良農桑通訣四時類要云三月種菌子取爛楮木及葉於地埋之常以泔澆灌之三兩日即生又法畦中下爛糞取楮可長六七寸截斷搥碎如種菜法勻布土蓋日澆潤之令長濕隨生隨食可供常饌今山中種香蕈亦如此法但取向陰地擇其所宜木楓櫧楮等樹伐倒用斧碎砍成坎以土覆壓之經年樹朽以蕈碎剉勻布坎内謂之驚禪雨雪之餘天氣蒸暖則蕈生矣雖踰年而獲可以繼取反土覆之時用泔澆灌越數時則以槌棒擊樹則堪博采采訖遺種在内來歲仍發復相地之宜嵗易代種新採趁生煮食香美曝乾則為乾香蕈今深山窮谷之民以此代耕殆天茁此品以遺其利也木耳附本草木耳一名木檽一名木菌一名木㙡一名樹雞一名木蛾曰耳曰蛾象形也曰檽以軟濕者佳也曰雞曰㙡因味似也南楚人謂雞為㙡曰菌猶蜠也亦象形也蜠乃貝子之名或曰地生為菌木生為蛾生朽木之上無枝葉乃濕熱餘氣所生其良毒亦隨木性今貨者亦多雜木惟桑栁楮榆之耳為多桑耳一名桑檽一名桑蛾一名桑雞一名桑黄一名桑臣一名桑上寄生桑檽以下皆軟耳之名桑黄以下皆硬菰之名槐耳一名槐檽一名槐菌一名槐雞一名赤雞一名槐蛾此槐樹上菌也當取堅如桑耳者煮漿粥安槐木上草覆之即生蕈榆耳八月採之令人不飢按藜床潘餘云榆肉榆蕈也腴脆無比大者數斤即指此種柘耳一名柘黄楊櫨耳出南山石耳附本草石耳一名靈芝生天台四明河南宣州黄山巴西邊徼諸山石崖上逺望如煙廬山亦有之狀如地耳山僧采曝餽逺洗去沙土作茹勝於木耳地耳附本草地耳一名地踏菰亦石耳之屬生於地者狀如木耳春夏生雨中雨後亟采之見日即不堪欽定授時通考卷六十一
