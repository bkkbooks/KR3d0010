  text: 欽定四庫全書欽定授時通考卷二十七
  hash: sha256:7970b25b3c7096e6ac0745f3810fdd1248798b2e4777d6850f89141ada5d3e9b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3d0010_WYG_027-1a, image: WYG0732/WYG0732-0349a.png}
body:
  text: 穀種豆一黄豆大豆小豆綠豆白豆詩邠風七月烹葵及菽朱註菽豆也大全濮氏曰菽豆葉謂之藿小雅皎皎白駒食我塲藿大全華谷嚴氏曰藿豆葉用以作羮大雅蓺之荏菽荏菽斾斾正義釋草云戎菽謂之荏菽孫炎曰大豆也此箋亦以爲大豆樊光舍人李巡郭璞皆云今以爲胡豆璞又云春秋齊侯來獻戎捷穀梁傳曰戎菽也管子亦云北伐山戎出冬葱及戎菽布之天下今之胡豆是也按爾雅戎菽皆爲大豆注穀梁者亦以爲大豆也郭璞等以戎胡俱是裔名故以戎菽爲胡豆也后稷種穀不應捨中國之種而種戎國之豆即如郭言齊桓之伐山戎始布其豆種則后稷之所種者何時絶其種乎而齊桓復布之禮有戎車不可謂之胡車明戎菽正大豆也斾斾生長茂盛之貌爾雅戎菽謂之荏菽註即胡豆也尚書帝命期夏火星昏中以種黍菽春秋說題辭菽者屬也春生秋熟理通體屬也菽赤黑隂生陽大體應節小變象陽色也春秋佐助期豆神名靈殖姓樂長七尺大目通於時節孝經援神契赤土宜菽大戴禮記五月參則見初昏大火中大火者心也心中種黍菽糜時也淮南子河水中濁而宜菽博雅大豆菽也小豆答也豍豆豌豆留豆也胡豆䜶䝄也豆角謂之莢其葉謂之藿也巴菽巴豆也爾雅翼菽豆也其類最多故凡穀之中居其二又古人說百穀以爲粱者黍稷之總名稻者溉種之總名菽者衆豆之總名三穀各二十種爲六十疏果之實助穀各二十凡爲百穀然予以爲榖之種類每物不下十數亦何假疏果而後爲百耶廣雅曰大豆菽也小豆答也豍豆豌豆留豆也胡豆䜶䝄也角謂之莢葉謂之藿巴菽巴豆也又廣志曰種小豆一歲三熟槧甘白豆麤大可食刺豆亦可食秬豆苗似小豆紫華可爲麵生朱提建寧胡豆有青有黄者此亦其大畧也然大豆以二月中旬種者爲上時至三四月則費子小豆以五月爲上時上伏中伏次之蓋秋而成故八月之雨謂之豆花雨呂氏春秋曰得時之菽長莖而短足其莢二七以爲族各枝數節競葉繁實菽穀之薄者故豳風九月菽苴采荼薪樗食我農夫菽苴穀之微者荼菜之苦者樗薪之惡者故以食農夫明俗之勤儉而民方以爲樂亦猶孔子云啜菽飲水盡其歡斯之謂孝不假於物之豐也漢書曰今歲飢民貧率食半菽言軍中無糧以菽雜他穀食之亦貧乏之義也然菽於用甚多故羞籩之實􅟿餌粉餈皆稻米黍米所爲合蒸則曰餌餅之則曰餈以其黏著故𢷬粉熬大豆以爲表餌言􅟿餈言粉蓋互相足此後鄭之義先鄭則别以粉爲豆屑所不同也又以爲豉楚辭曰大苦鹹酸辛甘行説者曰大苦豉也言取豉汁調以鹹酢椒薑飴蜜則辛甘之味皆發而行又以爲粥説云共工氏有不才子以冬至日死爲疫鬼畏赤小豆故冬至日以爲粥厭之嵇康養生論云豆令人重説者以爲啖豆三升則身重而行止難常食令人肥肌麤燥閩書楊泉物理論曰菽豆之總名也有黄豆白豆可食有緑豆可粉有黑豆可豉有赤豆有褐豆有藿豆有紅小豆有九月豆畬豆此外又有豌豆江豆水豆菜豆樹豆葛豆藊豆刀豆皂莢豆虎爪豆蛾眉豆蟹眼豆蠶豆可入疏品均豆也天工開物凡菽種類之多與稻黍相等播種收穫之期四季相承果腹之功在人日用蓋與飲食相終始一種大豆有黑黄兩色下種不出清明前後黄者有五月黄六月爆冬黄三種五月黄收粒少而冬黄必倍之黑者刻期八月收凡大豆視土地肥磽耨草勤怠雨露足慳分收入多少凡爲豉爲醤爲腐皆大豆中取質焉江南又有高脚黄六月刈早稻方再種九十月收穫江西吉郡種法甚妙其刈稻田竟不耕墾每禾藁頭中拈豆三四粒以指扱之其藁凝露水以滋豆豆性充發復浸爛藁根以滋已生苗之後遇無雨亢乾則汲水一升以灌之一灌之後再耨之餘收穫甚多凡大豆入土未出芽時防鳩雀害敺之惟人一種綠豆圓小如珠綠豆必小暑方種未及小暑而種則其苗蔓延數尺結莢甚稀若過期至於處暑則隨時開花結莢顆粒亦少豆種亦有二一曰摘緑莢先老者先摘人逐日而取之一曰拔綠則至期老足竟畝拔起也凡綠豆磨澄晒乾爲粉盪片搓索食家珍貴做粉溲漿灌田甚肥凡已刈稻田夏秋種緑豆必長接斧柄擊碎土塊發生乃多凡種綠豆一日之内遇大雨扳土則不復生既生之後防雨水浸疏溝澮以洩之凡耕綠豆及大豆田地耒耜欲淺不宜深入蓋豆質根短而苗直耕土既深土塊曲壓則不生者半矣深耕二字不可施之菽類此先農之所未發者一種豌豆此豆有黑斑㸃形圓同綠豆而大則過之其種十月下來年五月收凡樹木葉遲者其下亦可種一種蠶豆其莢似蠶形豆粒大於大豆八月下種來年四月收兩浙桑樹之下遍環種之蓋凡物樹葉遮露則不生此豆與豌豆樹葉茂時彼已結莢而成實矣襄漢上流此豆甚多而賤果腹之功不啻黍稷也一種小豆赤小豆入藥有奇功白小豆一名飯豆當飡助嘉榖夏至下種九月收穫種盛江淮之間一種穭豆此豆古者野生田間今則北土盛種成粉盪皮可敵綠豆燕京負販者終朝呼穭豆皮則其產必多矣一種白藊豆乃沿籬蔓生者一名蛾眉豆其他豇豆虎斑豆刀豆與大豆中分青皮褐色之類間繁一方者猶不能盡述皆充蔬代穀以粒烝民者齊民要術大豆爾雅曰戎菽謂之荏菽孫炎注曰戎菽大菽也張揖廣雅曰大豆菽也小豆荅也豍豆豌豆留豆也胡豆䜶豆也廣志曰種小豆一歲三熟槧甘白豆粗大可食刺豆亦可食秬豆苗似小豆紫花可爲麵生朱提建寧大豆有黄落豆有御豆其豆角長有場豆葉可食胡豆有青有黄者本草經云張騫使外國得胡豆今世大豆有黑白二種及長稍牛踐之名小豆有綠赤白三種黄髙麗豆黑高麗豆燕豆豍豆大豆類也豌豆豇豆䝁豆小豆類也雜隂陽書大豆生於槐九十日秀秀後七十日熟豆生於申壯於子長於壬老於丑死於寅惡於甲乙忌於卯午丙丁農政全書王楨曰大豆之黑者食而充飢可備凶年豐年可備牛馬料食黄豆可作豆腐可作醤料白豆粥飯皆可拌食白黑黄三豆色異而用别皆濟世之穀也又種大豆鋤成行壟舂穴下種早者二月種四月可食名曰梅豆豆皆三四月種地不宜肥有草則削去種黑豆三四月間種其豆亦可作醤及馬料本草綱目李時珍曰豆菽皆莢穀之總稱也篆文菽象莢生附莖下垂之形豆象子在莢中之形廣雅云大豆菽也小豆荅也又别録曰大豆生太山平澤九月采之蘇頌曰今處處種之黑白二種入藥用黑者𦂳小者爲雄用之尤佳寇宗奭曰大豆有緑褐黑三種有大小兩類大者出江浙湖南湖北小者生他處入藥力更佳又可磑爲腐食李時珍曰大豆有黑白黄褐青斑數色黑者名烏豆可入藥及充食作豉黄者可作腐榨油造醤餘但可作腐及炒食而已皆以夏至前後下種苗髙三四尺葉團有尖秋開小白花成叢結莢長寸餘經霜乃枯按呂氏春秋云得時之豆長莖短足其莢二七爲族多枝數節大菽則圓小菽則團先時者必長蔓浮葉疏節小莢不實後時者必短莖疏節本虛不實又汜勝之種植書云夏至種豆不用深耕豆花憎見日則黄爛而根焦矣如歲所宜以囊盛豆子平量埋隂地冬至後十五日發取量之最多者種焉蓋大豆保歲易得可以備凶年小豆不保歲而難得也又黑大豆氣味甘平無毒久服令人身重又陶𢎞景曰黑大豆爲蘖牙生五寸長便乾之名爲黄卷用之熬過服食所須李時珍曰一法壬癸日以井華水浸大豆候生芽取皮隂乾用又李時珍曰大豆有黑青黄白斑數色惟黑者入藥而黄白豆炒食作腐造醤榨油盛爲時用不可不知别其性味也又黄大豆氣味甘温無毒農政全書黄豆苗今處處有之人家田園中多種苗髙一二尺葉似黑豆葉而大結角比黑豆葉角稍肥大其葉味甘雜隂陽書考小豆生於李六十日秀秀後六十日成成後忌與大豆同農政全書赤小豆本草舊云江淮間多種蒔今北土亦多有之苗髙一二尺葉似豇豆葉微團􅕏開花似豆花微小淡銀褐色有腐氣故亦呼腐婢結角比緑豆角頗大角之皮角微白帶紅其豆有赤白黧色三種本草綱目赤小豆李時珍曰按詩云黍稷稻粱禾麻菽麥此即八穀也董仲舒註云菽是大豆有兩種小豆名荅有三四種王禎云今之赤豆白豆緑豆䝁豆皆小豆也此則入藥用赤小者也又蘇頌曰赤小豆今江淮間多種之寇宗奭曰關西河北汴洛多食之李時珍曰此豆以𦂳小而赤黯色者入藥其稍大而鮮紅淡紅色者並不治病俱於夏至後下種苗科高尺許枝葉似豇豆葉微圓峭而小至秋開花似豇豆花而少淡銀褐色有腐氣結莢長二三寸比緑豆莢稍大皮色微白帶紅三青二黄時收之可煮可炒可作粥飯餛飩饀並良也又赤小豆氣味甘酸平無毒又别録曰腐婢生漢中小豆花也七月采之隂乾四十日陶𢎞景曰花與實異用故不同品方家不用未解何故有腐婢之名本經不言是小豆花别録乃云未審是否今海邊有小樹狀如巵子莖葉多曲氣似腐臭土人呼爲腐婢療瘧有效以酒漬皮服療心腹疾此當是真此條應入木部也蘇恭曰腐婢相承以爲葛花葛花消酒大勝而小豆全無此效當葛花爲真掌禹錫曰按别本云小豆花亦有腐氣與葛花同服飲酒不醉與本經治酒病相合陶蘇二說並非甄權曰腐婢即赤小豆花也蘇頌曰海邊小樹葛花赤小豆花三物皆有腐婢之名名同物異也寇宗奭曰腐婢既在穀部豆花爲是不必多辨李時珍曰葛花已見本條小豆能利小便治熱中下氣止渴與腐婢主療相同其爲豆花無疑但小豆有數種甄氏藥性論獨指爲赤小豆姑從之又腐婢氣味辛平無毒農桑通訣北方唯用緑豆最多農家種之亦廣人俱作豆粥豆飯或作餌爲炙或磨而爲粉或作麫材其味甘而不熱頗解藥毒乃濟世之良穀也南方亦間種之農政全書山緑豆生輝縣太行山車箱衝山野中苗莖似家緑豆莖微細葉比家緑豆葉狹窄􅕏開白花結角亦瘦小其豆黯緑色味甘本草綱目緑豆李時珍曰緑以色名也舊本作菉者非矣又馬志曰綠豆圓小者佳粉作餌炙食之良大者名植豆苗子相似亦能下氣治霍亂也吳瑞曰有官緑油緑主療則一李時珍曰緑豆處處種之三四月下種苗髙尺許葉小而有毛至秋開小花莢如赤豆莢粒粗而色鮮者爲官緑皮薄而粉多粒小而色深者爲油緑皮厚而粉少早種者呼爲摘緑可頻摘也遲種呼爲拔緑一拔而已北人用之甚廣可作豆粥豆飯豆酒煼食麨食磨而爲麫濾取粉可以作餌頓餻盪皮搓索爲食中要物以水浸濕生白芽又爲菜中佳品牛馬之食亦多頼之眞濟世之良穀也又緑豆氣味甘寒無毒本草綱目孟詵曰白豆苗嫩者可作菜食生食亦妙汪頴曰浙東一種味甚勝用以作醬作腐極佳北方水白豆相似而不及也李時珍曰飯豆小豆之白者也亦有土黄色者豆大如緑豆而長四五月種之苗葉似赤小豆而畧尖可食莢亦似小豆一種蓘豆葉如大豆可作飯作腐亦其類也又白豆氣味甘平無毒欽定授時通考卷二十七
