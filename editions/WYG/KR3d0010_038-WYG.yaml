body:
  text: 功作泰西水法用江河之水為器一種龍尾車記龍尾車者河濵挈水之器也治田之法旱則挈江河之水入焉潦則挈田間之水出焉治水之法淺涸則挈水而入方舟焉䟽濬則挈水而出畚鍤焉不有水之器不得水之用三代而上僅有桔橰東漢以來盛資龍骨龍骨之制日灌水田二十畝以四三人之力旱嵗倍焉髙地倍焉駕馬牛則功倍費亦倍焉溪澗長流而用水大澤平曠而用風此不勞人力自轉矣枝節一蓌全車悉敗焉然而南土水田支分櫛比國計民生于焉是頼即兹器所在不為無功已獨其人終嵗勤動尚憂衣食至北土旱災赤地千里欲拯斯患宜有進焉今作龍尾車物省而不煩用力少而得水多其大者一器所出若決渠焉累接而上可使在山是不憂髙田築為堤塍而出之計日可盡是不憂潦嵗與下田去大川數里數十里鑿渠引之無論水稻若諸水生之種可以必濟即黍稷菽麥木棉蔬菜之屬悉可灌溉是不憂旱濬治之功出水當五分之一今省十九焉是不憂䟽鑿龍蟠之斗旱熯之年上源枯竭穿渠旁引多用此器下流之水可令復上是不憂漕也蓋水車之屬其費力也以重水車之重也以障水以帆風以運旋本身龍尾者入水不障水出水不帆風其本身無銖兩之重且交纒相發可以力轉二輪遞互連機可以一力轉數輪故用一人之力常得數人之功又向所言風與水能敗龍骨之車也在鶴膝斗板龍尾者無鶴膝無斗板器居水中環轉而已湍水疾風彌增其利故用風水之力而常得人之功若有水之地悉皆用之竊計人力可以半省天災可以半免嵗入可以倍多財計可以倍足方于龍骨之類大畧勝之然而千慮之一以當起予可也智士用之曲盡其變不盡方來或者無煩覼縷焉龍尾圖說龍尾者水象也象水之宛委而上升也龍尾之物有六一曰軸軸者轉之主也水所由以下而為上也二曰墻墻者以束水也水所由上也三曰圍圍者外體也所以為固抱也四曰樞樞者所以為利轉也五曰輪輪者所以受轉也六曰架架者所以制髙下也承樞而轉輪也六物者具斯成器矣或人焉或水焉風馬牛焉巧者運之不可勝用也一曰軸圜木為軸長短無定度視水之淺深斟酌焉而為之度二十五分其軸之長以其二為之徑木之圜必中規而上下等以八繩附臬之法八平分其軸之周直繩而施之墨軸之兩端因直繩之兩端而施之墨八繩之交得軸之心也以八平分之一分為度以度八繩之墨皆平行相等而為之界以句股求弦之法兩界斜相望而墨為之弦弦之竟軸而得一螺旋之墨因螺旋之墨而立之墻為螺墻墻之間而得螺旋之溝為螺溝螺溝者水道也軸得一墨焉則得一墻焉一溝焉水得一道焉或二之或三之四之以上同于是多則均一則專惟所為之既墻而圍之既建而迤之而轉之水則自螺旋之孔入也水之入於螺旋之孔也水自以為已下也而不自知其已上也故曰軸者轉之主也水所由以下而為上也注曰圜與圓同量水淺深者下文言句四股三弦五則岸髙九尺者軸之長當一丈五尺也凡作軸皆度岸髙以三五之法凖之二十五分之二者如軸長一丈則徑八寸如本篇第一軸立靣圖己丁長一丈則丁丙之徑八寸也此畧言軸欲大耳若徑至三寸以上不嫌長丈八寸以上不嫌長二丈也軸過小則水為之不升八繩附臬者周禮樹八尺之臬縣八繩下垂皆附于臬今軸身作線大畧似之也八平分者如軸兩端圖甲乙丙丁戊圏為軸之周所分甲乙乙丙等八分者平分度也軸之兩端卧其軸各作已甲過心線依法分之即上下合也次于軸兩端之邉依所分各界兩兩相對各作平行直線八線附木皆平直是為八平分軸之周如立靣圖巳丁庚丙諸線是也次于丙端各作甲巳丁丙諸線則得軸兩端之各庚心也以八平分之一為度者謂以甲乙為度從庚至辛作庚辛辛壬等短界線至丙而止八線皆如之各線之短界線皆平行皆相等也墨為之弦者從庚向癸以句股法作庚癸斜弦線内纒之至子外纒之至丑至寅至卯至辰斜纒軸靣竟軸而止則得一螺旋線也單線則為單墻單溝也若欲為雙溝者則平分庚丑線得午從午外上向巳内下向未亦依法作螺旋線也若作四槽者又平分庚午于壬依法作之欲作三槽六槽九槽者先分軸為九平分欲作五槽十槽者先分軸為十平分依法作之二曰墻軸之上因各螺旋之繩而立之墻墻之法或編之或累之皆塗之墻之兩端不至于軸之兩端其至也無定度惟所為之以樞之短長稱之八分其軸長以其一為墻之髙可滅也不可加也墻其累之也欲堅而無墮也其編之也欲密而平也其塗之也欲坸而無罅也兩墻之間謂之溝溝水道也水行溝中而墻制之使無下行也故曰墻者所以束水也水所由上注曰編墻之法削竹為柱依螺旋之線而立之每立一柱即與軸靣之八平分長線為直角如立柱于本篇一圖之午即柱為垂線與庚丙長線為直角也而又與軸兩端之丙丁為一直線也若本篇二圖之癸丙是也削柱欲均安柱欲正列柱欲順立柱欲齊既畢則以繩編之畧如織箔之勢繩以麻或紵或菅或布或篾惟所為之既畢以瀝青和蠟或和熟桐油和石灰瓦灰塗之或以生漆和石灰瓦灰塗之凡瀝青加蠟與桐油取和澤而止石瓦灰相半桐油或漆和之取燥濕得宜而止累墻之法取柔木之皮如桑槿之屬剥取皮裁令廣狹相等以瀝青和蠟依螺旋之線層層塗而積之累畢如前法塗之既畢而兩墻之間成螺旋之溝水從溝行而墻不漏者是墻之善也八分之一者如軸長八尺則墻髙一尺此亦畧言髙之所至也一以下任意作之故曰可減不可增一法若欲為長軸則墻之髙與軸之徑等三曰圍墻之外削版而圍之版欲無厚墻之兩端順墻柱之勢穿軸而立四柱焉依墻之髙而束之環圍板之端入于環圍之外以鐵為環而約之長者中分圍之長以鐵環約之又長者三分其長以兩環約之圍之版其相合也與其合于墻之上也皆合之以塗墻之齊圍之外皆塗之以受雨露也圍其合也欲無罅圍之合于墻也欲無罅有圍故水入螺旋之孔而不絶無罅故水行于螺旋之溝而不洩則水旋而上也故曰圍者外體也所以為固抱也注曰圍之板量圍徑之大小與其長酌全體之重輕而制厚薄焉其長竟墻其廣一寸以上視圍徑之小大增損之太廣而合之則角見也其内面稍刳之以就墻之圓外面者圍既合而削之當墻之盡穿軸為四柱者所以居環而受圍也如本篇三圖之卯寅辰午等是也環以堅韌之木為四弧弧各加于環柱之上合之成環焉環之下方或為溝焉居中以受圍板之端或居外或居内為刻而受之如為溝于未此居中也為刻于申此居外也于酉居内也鐵環之束在兩端者與木環相抵卯午也戍亢也或中分約之者心斗是也若兩中環者則在尾與箕也或不用鐵環以繩約之而塗之齊與劑同合以塗墻之劑者瀝青和蠟或油灰或漆灰也若塗圍之周者則漆灰為上油灰次之瀝青和蠟者恐不耐暑日也為下而欲速成則用之欲解而時修則用之是者暑日架之則以苫蓋之水入于螺旋之孔者孔在環之内軸之外四柱之中戍亥角亢之間是也雖下向必入者以迤故水趨於圍也既其出則在卯寅辰午之間矣一法墻之兩端以二圓版葢之開圍板之下端而水入之開上端之圓板而出之其效同焉四曰樞軸之兩端鐵為之樞當心而立之樞之用在圜輪在圍若在軸者皆圜之輪在上樞方其上樞之上輪在下樞方其下樞之下方之者以居輪立樞欲正欲直不正不直者輕重不倫也既正既直輕重均轉之如將自轉焉則雖大而無重也故曰樞者所以為利轉也注曰當心者本篇一圖之庚心也樞之大小長短無定度量全體之輕重制大小焉量輪之所在與地之所宜制短長焉輪所在者有七下方詳之也方則止故可以居輪正者當庚之心直者與軸端圓面為直角與軸上八平分線俱為一直線也求正尚有軸端諸線可憑求直稍難焉今立一試法視一圖軸兩端諸分線以規一抵軸端邉之乙一抵樞之頂心為度次去乙抵戊量之又去戊抵己量之皆至于樞之頂心者即樞直也如將自轉者成速之甚也五曰輪輪有七置輪有三式七置者當圍之中焉圍之兩端焉軸之兩端焉兩樞焉在圍者夾其圍而設之輻輻之末周之以輞焉輞樹之齒焉在軸與樞者方其處而入之轂轂樹之齒焉凡輪皆以他輪之齒發之其疾徐之數視輪與他輪之大小焉其齒之多寡焉故輪欲密附而少為之齒輪附而齒少他輪大而齒多則其出水也必疾矣故曰輪者所以為受轉也注曰輪有七置者因地勢也量物力也相大小而制疾徐也在圍之中者本篇四圖之丁是也在圍之兩端者丙與戊是也在軸之兩端者乙與巳是也在兩樞者甲與庚是也若車大而軸長出水之地髙則在丁矣若平地受水而用人力畜力風力者當在甲乙丙矣用水力當在戊巳庚矣夾圍之輻子丑之類是也辛者容圍之空也壬癸輞也寅卯之類齒也方其處者軸與樞當受轂之處也辰入樞之空也戍入軸之空也午轂也酉亦轂也未申亥角之類皆齒也他輪者或人車或馬牛驘車或風車或水車之輪也此諸車之輪者非謂其大卧輪也蓋指接輪焉接輪者農家所謂撥子是也試言人車則有卧軸也卧軸之一端有接輪卧軸之上有拐木也今于甲乙丙任置一輪焉如置在軸之乙輪即以卧軸之接輪交于乙輪人踐拐木而轉之接輪與乙輪相發也若馬牛驘車及風車則有卧軸也卧軸之兩端皆有接輪今以其一交于乙輪以其一交于彼車之大卧輪駕畜焉颿風焉而轉之接輪與乙輪相發也若水轉之車則有卧軸也卧軸之一端有接輪卧軸之上有立輪立輪之外有受水之箑也今于戊巳庚任置一輪焉如置在軸之巳輪即以卧輪之接輪交于巳輪水激于箑而卧軸為之轉接輪與巳輪相發也疾徐之數與他輪相視者如乙巳之輪齒十二人車之接輪齒十二是拐木一轉而得一轉也如樞輪之齒八而人車之接輪齒十六是拐木一轉而得二轉也人車之接輪齒二十四是一轉而得三轉也若樞輪之齒八而駕畜颿風之卧輪齒七十二是一轉而得九轉也故曰輪欲密附密附則齒為之少他輪欲大大則齒多然而密者過密焉則力為之不任大者過大焉則遲故曰因地勢量物力相大小而制徐疾焉今圖樞輪之齒八軸輪十二圍輪十六約畧作之非定率也趣欲使兩輪之交踈密相等焉長短相入焉相闗相發而不滯則足矣其小者欲無用輪方其樞之末别為衡衡之一端入于樞焉其一端植之柱焉柱之體圓又為之掉枝而首為圓孔焉以掉枝之圓孔入于柱而轉之若大者而欲無用輪則以兩掉枝同加于柱兩人對執而轉之最大者兩掉枝之末各為持衡四人或六人對持其衡而轉之六曰架架者一上一下皆為砥柱或木焉或石焉或瓴甋焉柱之植欲堅以固也下柱居水中以鐵為管施之柱首迤而上向以受下樞之末制管髙下量水之勢令得入于螺溝之下孔而止也上者居岸以鐵為管施之柱首迤而下向以受上樞之末若輪與衡在上樞之末者則中樞而設之頸以鐵為山口而架樞其上出其樞之末以受輪與衡也制髙下之數以句股為法而軸心為之弦弦五焉則句四焉股三焉過偃則不髙過髙則不升注曰瓴甋磚也堅者其本體堅固者其立基固也上柱者本篇五圖之甲乙是也下柱者丙丁是也上管以受上樞戊也下管以受下樞巳也句股法者一髙一下如四圖之亢房線而置之令上樞之末在亢下樞之末在房也三四五者如上樞之末為亢至下樞之末為房長一丈如法置之則自下樞之末房依地平作平行線自上樞之末亢作垂線而兩線相遇于氐其亢氐線必長六尺氐房線必長八尺也若迤建于岸之側謂無從作垂線者則以句股法反用之以圍板為倒弦别作一尾箕垂線為股尾為直角作尾心横線為倒句若尾箕長一尺五寸偃仰移就之令尾心長二尺即心箕必二尺五寸而亢房線必合三四五之句股法也凡圍板長一丈水髙必六尺求多焉不可得相水度地制器者以此計之若水過深岸過髙器不得過長則累接而上之累接之法亦以接輪交而相發也用井泉之水為器二種玉衡車記玉衡車者井泉挈水之器也既逺江河必資井飬井汲之法多從綆缶饔飱朝夕未覺其煩所見髙原之處用井灌畦或加轆轤或藉桔橰似為便矣乃俛仰盡日潤不終畝聞三晉最勤汲井灌田旱熯之嵗八口之力晝夜勤動數畝而止他方習惰既見其難不復問井灌之法嵗旱之苖立視其槁饑成以後非殍則流吁可憫矣今為此器不施綆缶非藉轆轤無事桔橰一人用之可當數人若以灌畦約省夫力五分之四髙地植榖家有一井縱令大旱能救一夫之田數家共井亦可無饑餓流亡之患若資飲食則童㓜一人足供百家之聚矣且不湏俛仰無煩提挈畧加幹運其㨗若抽故烟火會集之地一井之上尚可活一㷀民也玉衡圖說玉衡者以衡挈柱其平如衡一升一降井水上出如趵突焉玉衡之物有七一曰雙筩雙筩者水所由代入也二曰雙提雙提者水所由代升也三曰壺壺者水之總也水所由續而不絶也四曰中筩中筩者壺水所由上也五曰盤盤者中筩之水所由出也六曰衡軸衡軸者所以挈雙提下上之也七曰架架者所以居庶物也七物者備斯成器矣更為之機輸焉巧者運之不可勝用也注曰趵突泉水上出也一曰雙筩練銅或錫為雙筩其圜中規而上下等半其筩之長以為之徑下有底中底而為之圜孔以其底之半徑為孔之徑筩之旁齊于底而樹之管管外出而上迤也管之容其圜中規管之下端抒之以合於筩開筩之下端為㨊孔融錫而合之于管管之上端亦抒之既樹之則與筩之邉為平行三分其底之徑以其一為管之徑底之圜孔為之舌以揜之舌者方版方版之旁為之樞底孔之旁為之紐樞入於紐如戸焉而開闔之舌之開闔與管之孔無相背也紐居左則管居右舌其合于底也欲密管之孔合于筩之孔欲利而無罅樞紐之動也欲不滯凡水入也必從其底之孔也有舌焉而開闔之開之則入闔之則不出左開則右闔矣是左入而右不出也是恒有一孔焉入而終無出也故曰雙筩者水所由代入也注曰凡徑皆言圓孔也肉不與焉如本篇一圖甲至乙丙至丁是也半長為徑者徑三寸則筩長六寸如丁丙廣三寸則甲丁長六寸也半徑為孔者徑三寸孔徑一寸五分如丁丙三寸則辛壬一寸五分也上迤者斜迤而上如戊至巳丙至庚也抒者斜削之如戊至丙巳至庚是也㨊長圓也欲與戊丙之孔合也融錫合之小釬也管之上邉與筩邉平行將以合于壺之下孔也巳庚是也三分之一者底徑三寸則管徑一寸未至申之度也方板者丑寅卯午是也樞者卯辰午是也紐者癸子是也舌如槖籥之舌以樞合紐令丑卯之板恒加于辛壬孔之上向内而開闔之也二曰雙提旋堅木以為砧其圜中規而上下等曷知其中規而上下等也砧之大入于雙筩也欲其密切而無滯也展轉之上下之猶是也斯之謂中規而上下等當砧之心而立之柱三分其砧之徑以其一為柱之徑柱之短長無定度以水之深也井之髙也斟酌焉而為之度柱之上端為之方枘而入于衡凡水之入也入于雙筩之孔也孔有舌焉砧升則舌開而水為之入砧降則舌合而水為之不出水之入而不出者舌也舌之開闔者砧也砧之上下者柱也舌闔矣水不出矣砧又下焉水將安之則由筩之管而升于壺左右相禪也故曰雙提者水所由代升也注曰砧形如截蔗本篇一圖酉戌亥角是也其髙不言度者趣其入于筩也不轉側動搖而已矣若為鼎足之柱以固之即無厚可也三分之一者砧徑三寸則柱徑一寸如酉角三寸則亢氐一寸也凡雙筩入井近下則水濁近上則水竭故柱之短長宜量水深與井髙也枘笋也當房心之上刻而方之為尾箕是也三曰壺鍊銅以為壺壺之容半加于雙筩之容其形㨊圜腹廣而上下弇之弇之度視廣之度殺其十之二當其弇而設之蓋壺之底為㨊圜之長徑設二孔焉皆在其徑孔之㨊圜其大小也與管之上端等融錫而合之壺之兩孔各為之舌而揜之舌之制如筩中之舌也壺之内當兩孔之中而設之紐兩舌之樞悉係焉而開闔之左右相禪也當蓋之中為圜孔焉而合于中筩蓋之合于壺也欲其無罅也既成以鐵為雙環而交纒束之當其合而錮之錫以備繕治也夫水之入于管也左右禪也而終無出也水從管入者以提柱之逼之也則上衝而壺之舌為之開以入于壺水勢盡而彼舌開則此闔矣是代入于壺也而終無出也其代入也壺為之恒滿而上溢其終無出也而有筩之容以俟其底之入也故曰壺者水之總也水所由續而不絶也注曰半加容者如之又加半焉如雙筩共容四升則壺容六升也弇歛也腹廣而上下弇如本篇二圖甲乙丙丁形是也蓋者戊巳庚辛也㨊圓之長徑底圖之乙丙是也二孔者未申也酉戍也皆在其徑者二孔之心在乙丙線之上也二孔㨊圓者如酉戍短乾亥長以合于一圖之未申巳庚也二舌者寅卯也辰午也紐者子丑也以樞合紐令寅卯之板恒加于未申孔之上向丙而開闔之也辰午加于酉戌亦如之左右相禪也蓋之圓孔庚辛是也蓋合于壺者巳戊加于甲丁也雙環纒束者本篇三圖之角亢氐房是也既錮之又束之者水力大而易渫也四曰中筩鍊銅或錫以為中筩中筩之徑與長筩旁管之徑等中筩之下端為敞口以闗于蓋上之孔融錫而合之其長無定度量水之出于井也斟酌焉而為之度或銅錫之中筩裁數寸其上以竹木焉續之竹木之筩之徑必與下筩之徑等其上出之徑寧縮也無贏也水之入于壺也代入也而終無出也則無所復之也必由中筩而上故曰中筩者壺水所由上也注曰中筩者本篇三圖之坎艮庚辛是也上出之徑必縮于下合之徑者所以為出水之勢也五曰盤鍊銅或錫以為盤中盤之底而為之孔以當中筩之上端融錫而合之盤底之旁為之孔而植之管管外出而下迤也盤之容與壺之容等管之徑與中筩之徑等管之長無定度其下迤也及于索水之處也中筩之水其上溢也盤畜之管洩之故曰盤者中筩之水所由出也注曰本篇四圖之甲乙丙丁盤也丙丁為孔以合于中筩之上端上端者三圖之坎艮也底旁之孔者戊巳也下迤者巳庚也六曰衡軸直水為衡衡之長無過井之徑雙提之柱其相去也視雙筩雙提之上枘入于衡之兩端其相去也視雙提直水為軸軸長于衡而無定度圜其尾去首二尺而圜其頸當頸尾之中而設之鑿當衡之中而設之枘衡衡也軸縱也鑿枘而合之欲其固也軸展側焉衡低昻焉提上下焉左右相禪也故曰衡軸者所以挈雙提上下之也注曰衡之長本篇四圖之壬辛是也枘入于衡者子丑是也軸之長卯午是也卯尾午首辰頸也衡軸鑿枘之合寅是也鑿孔也衡横軸縱卯辰子丑之交加也七曰架井之兩旁為之柱或石焉或瓴甋焉或木焉柱之上端為山口山口者容軸之圜也以利轉也軸之首設之小衡與衡平行也長二尺或三尺小衡之兩端設二木而三合之如句股以小衡為弦句股之交立之柄持其柄而搖之以轉軸也水之中穿井之脇而設之梁横亘焉梁之上為二陷以居雙筩之底欲其固也中其陷而設之孔稍大於雙筩之底孔水所從以入也梁居水中其木必榆榆之為木也無味水不受之變梁在其下而柱在其上車所由孔安而利用也故曰架者所以居庻物也注曰本篇四圖之卯亥也辰乾也柱也當辰卯為山口者所以容軸之圓也小衡者申未也三合者未申酉為三角形也酉戌柄也立之柄者立柄於酉戍酉未為直角也坎艮梁也角亢氐房陷也心尾陷中孔也若欲為專筩之車則為專筩專柱而入之中筩如恒升之法而架之而升降之其得水也當玉衡之半井狹則為之注曰專一也架法見恒升篇恒升車記恒升車者井泉挈水之器也其用與玉衡相似而更速焉更易焉以之灌畦治田致為利益矣若為之複井井之底為竇而通之以大井瀦水以小井為筩而出之則無用筩也若江河泉澗索水之處過髙龍尾之力有不能至則用是車焉挈水以升架槽而灌之或迤而建之以當龍尾恒升圖說恒升者從下入而不出也從上出而不息也恒升之物有四一曰筩筩者水所由入也所以束水而上也二曰提柱提柱者水所由恒升也三曰衡軸衡軸者所以挈提柱上下之也四曰架架者所以居庶物也四物者備斯成器矣更為之機輪焉巧者運之不可勝用也一曰筩刳木以為筩筩之長無定度下端所至居水之中已上則易竭已下則易濁上端所至出井之上度及於索水之處而止筩之徑無定度因井之大小索水之多寡斟酌焉而為之度筩之容任圜與方其圜中規其方中矩而上下等筩之周以鐵環約之環無定數視筩短長斟酌焉而為之數筩之下端為之底欲其密而無漏也中底而為之孔孔之方圜反其筩若圜筩而方孔七分底之徑以其四為孔之徑若方筩而圜孔七分底之徑以其五為孔之徑孔之上象孔之方圜為之舌而掩之如玉衡之雙筩掩之欲其密而無漏也開闔之欲其無滯也筩之上端為之管管外出而下迤也本廣而末狹也水從孔出焉既入而提柱之勢能以舌掩之既掩而提之提之則從管而出也故曰筩者水所由入也所以束水而上也注曰玉衡之雙筩與中筩為二此則合之筩入於井量井淺深筩長短而置之近上趨恒得水而止近下趨無受濁而止與玉衡同也圓筩用竹尤簡用木則方筩為易焉如本篇一圖甲乙丙丁圓筩也丙丁其底也戊巳底方孔也庚辛壬癸方筩也壬癸其底也子丑底圜孔也寅方舌也酉圜舌也甲卯辛卯管也辰午未申之屬環也環之多寡踈密趨不漏而止餘見玉衡篇二曰提柱鍊銅以為砧圜者中規方者中矩砧之大入于筩也欲其密切而無滯也展轉之上下之猶是也當砧之心而設之孔孔之方圜方之徑皆與筩底之孔等孔之上為之舌以掩之舌之制如筩底之舌也直木以為柱柱有二式一用長一用短用長者為實取之柱用短者為虛取之柱實取之柱其砧入于水而升降焉其長之度下及於筩之底上出於筩之口其出於筩之口無定度趨及於衡而止虛取之柱無用長入筩數尺而止升降於無水之處以氣取之欲挈之先注水於砧之上髙數寸以閉其罅而噏之凡井淺者實取焉井深者虛取焉五分其筩之徑以其一為柱之徑砧之合於柱也鍊銅或鐵為四足隅立於方砧之四維方孔之四旁而皆上聚之聚之度趨不害於舌之開闔而止以其聚合於柱之下端合之欲其固也砧之厚以其枝於隅足也可無厚既合而入於筩砧降而底之舌為之掩砧升則開之開之則水入掩之則水不出一升一降是水恒入而不出也既入之水而砧降焉則無復之也則上衝於舌而入於砧之孔砧升而砧之舌為之掩一升一降是水恒入而不出也兩入而不出則溢於筩而出常如是虛者實者同於是故曰提柱者水所由恒升也注曰玉衡之提柱與壺之孔之舌為二此則合之又玉衡之水皆實取此有虛取之法焉氣法也凡砧之入於筩求密切而無滯也求密切之法成砧而入之能無漏者國工也不能無漏者稍弱其砧之徑以氊􅄢之屬皮革之屬附於砧之四周焉附之法若砧厚者稍剡其周之上下如鼓木當其剡而刻為陷環既附而堅束之砧薄者則為兩重之砧夾其氊或革以隅足貫之而􅈏之柱如本篇二圖之甲乙是也四足者丙丁戊酉也砧者己庚辛壬也砧之孔癸子也其舌丑寅也砧可無厚無厚則輕餘見玉衡篇三曰衡直木以為衡衡之長無定度量筩之大小水之淺深多寡焉長則輕衡之兩端皆綴之石以為重其兩重等五分其衡二在前三在後而設之鑿直木以為軸軸之長無定度圜其兩端中分其長而設之枘衡衡也軸縱也鑿枘而合之欲其固也軸之兩端各為山口之木而架之中分其衡之前而綴之提柱綴之欲其密切而利轉也抑其後重而提柱為之升揚其後重則前重降而提柱隨之也提柱之降也實取者挹水而升于砧也其升也則下入于筩而上出於筩也虛取者降而得氣焉氣盡而水繼之故曰衡者所以挈提柱之上下也注曰氣盡而水繼之者天地之間悉無空際氣水二行之交無間也是謂氣法是謂水理凡用水之術率此一語為之本領焉本篇三圖之甲乙衡也丙丁兩石重也戊巳衡也子衡軸之交也庚辛壬癸山口之木也寅提柱也綴之于丑卯辰筩上端也午管也餘見玉衡篇四曰架木為井幹以持筩持之欲其固也筩之下端為盤以承之盤與筩合之欲其固也中盤而為之孔孔之徑稍强于筩底之孔之徑盤之下為鼎足而置之井底注曰本篇四圖之卯未辰午井幹也加于地平之上申戍酉亥之間為正方之空夾筩而特之丁戊井靣地平也己庚井底也辛壬癸盤也辛子壬丑癸寅盤足也若欲為雙升之車則雙筩焉如玉衡之法而架之而升降之此升則彼降用力一而得水二也是倍利於恒升也尤宜於江河注曰力一水二者一升一降各得水一焉無虚用力也恒升者一升一降而得水一也架法見玉衡篇鶴飲圖說鶴飲者為長槽或竹或木其長無度以水深淺為度尾殺於首三之一首施戽樸屬為良戽之容則以觳一斗二升戽臀下靣覆處施木刀如棹末之制俾與水無忤中其槽設兩耳函軸廼於岸側菑樹立也兩楹柱也髙地僅尺俾母杌楹之顛對設以軹小穿也貫軸其中惟治昻其尾入之戽也水滿則首一昻而流之奔於槽外也其孰禦視桔橰之功挈無虛而㨗也虹吸圖說虹吸刳木為筒筒之容或方或圜圜徑寸方徑不及寸者分之二毋薜毋暴毋齘筒之長無定度竑井及泉以為度筒之下端横曲尺有二寸而為之口口迤而上髙數寸口之容弱於腹之容惟阞口之内有舌開闔戚速而無倚於圍筒之上端出井及尋横曲二尺有竒廼垂垂四尺竒迤而下長及常而為之管管視筒之腹惟惌筒之曲若審惟樸屬為良筒之圍内以寸緄縢之敜以油灰之齊腛塗其郤母俾針芒之或耗筒兩端有檠相以施約無甐無杌而止管入以籥惟嚴假鞴鼓之度水衝於管遄捎其籥則霤吐為趵突也以終古薜破裂也暴墳起不堅緻也齘切齒怒亦偪窄之意竑量也阞謂三分之一八尺曰尋倍尋曰常惌小孔也審兩木交湊處樸屬附著堅固也緄繩也縢約束也敜塞也齊與劑同腛厚也甐壊杌動也遄速也捎除去也泉水之上出者曰趵突欽定授時通考卷三十八
