front:
  text: 欽定四庫全書欽定授時通考卷四十二
  hash: sha256:f7461493dbac03fa506b4f28145cc24db1d46a642a0f5e0afba0a7b64b84e005
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3d0010_WYG_042-1a, image: WYG0732/WYG0732-0566a.png}
body:
  text: 勸課彙考易井君子以勞民勸相本義勞民者以君養民勸相者使民相養皆取井養之義詩鄘風靈雨既零命彼倌人星言夙駕説于桑田箋文公于雨下命主駕者雨止為我晨早駕欲徃為辭説于桑田教民稼穡務農急也又小雅曾孫來止以其婦子饁彼南畝田畯至喜攘其左右嘗其㫖否禾易長畝終善且有曾孫不怒農夫克敏箋成王出觀農事饋食耕者以勸之也司穡至則又加之酒食以勞之爾禮記月令孟春之月天子乃以元日祈榖於上帝乃擇元辰天子親載耒耜措之於參保介之御間帥三公九卿諸大夫躬耕帝耤天子三推三公五推卿諸侯九推反執爵於太寢三公九卿諸侯大夫皆御命曰勞酒疏孟獻子曰夫郊祀后稷以祈農事也是故啔蟄而郊郊而後耕郊用上辛耕用亥日又王命布農事命田舎東郊皆修封疆審端徑術善相丘陵阪險原隰土地所宜五榖所殖以教導民必躬親之田事既飭先定凖直農乃不惑註田田畯也主農之官舎東郊順時氣而居以命其事也步道曰徑術周禮作遂小溝也直謂封疆徑遂也又仲秋之月乃勸種麥毋或失時集説麥所以續舊榖之盡而及新榖之登尤利於民故特勸種而罰其惰者又祭義天子為藉千畝冕而朱紘躬秉耒諸侯為藉百畝冕而青紘躬秉耒管子春出原農事之不本者謂之㳺楚箴民生在勤勤則不匱亢倉子農道篇古先聖王之所以理人者先務農業農業非徒為地利也貴行其志也古先聖王之所以茂耕織者以為本教也是以天子躬率諸侯耕籍田大夫士第有功級勸人尊地産也后妃率嬪御蠶於郊桑公田勸人力婦教也男子不織而衣婦人不耕而食男女貿功資相為業此聖王之制也故敬時愛日埓實課功非老不休非疾不息一人勸之十人食之當時之務不興土功不料師旅男不出御女不外嫁以妨農也漢書食貨志三考黜陟進業曰登再登曰平三登曰泰平後漢書和帝永元五年令郡縣勸民蓄蔬食以助五榖拾遺記力勤十頃能致嘉穎文心雕龍昔伊祈氏始蜡以祭八神其辭云土反其宅水歸其壑昆蟲毋作草木歸其澤則上皇祝文愛在兹矣舜之祠田云荷此長耜耕彼南畝四海俱有利民之志頗形於言矣舊唐書開元二十二年上自苑中種麥率皇太子已下躬自收穫謂太子等曰此將薦宗廟是以躬親亦欲令汝等知稼穡之難也因分賜侍臣謂曰比嵗令人巡檢苖稼所對多不實故自種植以觀其成且春秋書麥禾豈非古人所重也册府元龜德宗貞元五年初以二月為中和節詔文武百辟進農書獻穜稑五代史唐明宗長興四年三月帝幸龍門七里亭農事方春田民遍野帝見其㓢桑稼樹枉駕勞問親自勸課其月太原石敬塘進耒耜一具時帝嘗廵近郊見農民田具細弱而犁耒尤拙曰農器若此宜其無所穫也因詔河東河北進農具以為式様太原首有是進降詔褒之宋史太祖紀開寳六年五月幸玊津園觀刈麥十月幸玊津園觀稼八年四月幸玉津園觀種稻又太宗紀太平興國三年四月幸城南觀麥九年五月車駕出南薰門觀稼召從臣列坐田中令民刈麥咸賜以錢帛雍熙二年五月上幸城南觀麥賜田夫布帛有差謂近臣曰耕耘之夫最可矜憫玊海宋眞宗天禧四年詔館閣校勘四時纂要齊民要術二書鏤本摹賜又出繪龍封鵞祈禳祕法令長吏遵行宋史高宗本紀紹興十九年七月頒諸農書於郡邑十一月立州縣墾田增虧賞罰格朱文公文集當職久處田間習知穡事兹忝郡寄職在勸農竊見本軍已是地瘠税重民間又不勤力耕種耘耨鹵莽滅裂較之他處大段不同所以土脈踈淺草盛苖稀雨澤稍愆便見荒歉皆縁長吏勸課不勤使之至此深懼無以下固邦本仰寛顧憂今有合行勸諭下項一大凡秋間收成之後須趁冬月以前便將户下所有田段一例犁翻凍令酥脆至正月以後更多著徧數節次犁耙然後布種自然田泥深熟土肉肥厚種禾易長盛水難乾一耕田之後春間須是揀選肥好田段多用糞壤拌和種子種出秧苖其造糞壤亦須秋冬無事之時預先剗取土面草根㬠曝燒灰施用大糞拌和入種子在内然後撒種一秧苖既長便須及時趁早栽插莫令遲緩過却時節一禾苖既長稈草亦生須是放乾田水仔細辨認逐一㧞出踏在泥裏以培禾根其塍畔斜生茅草之屬亦須節次芟削取令浄盡免得分耗土力侵害田苖將來榖實必須繁盛堅好一山原陸地可種粟麥麻豆去處亦須趁時竭力耕種務盡地力庶幾青黃未交之際有以接續飲食不致饑餓一陂塘之利農事之本尤當協力興修如有怠惰不趁時工作之人仰衆列狀申縣乞行懲戒如有工作浩瀚去處私下難以糾集即仰經縣自陳官為修築如縣司不為措置即仰經軍投陳切待别作行遣一桑麻之利衣服所資切須多種桑麻柘苧婦女勤力養蠶織紡造成布帛其桑木每遇秋冬即將旁生拳曲小枝盡行斬削務令大枝氣脈全盛自然生葉厚大餧蠶有力一大凡農桑之務不過前項數條然鄉土風俗亦自有不同去處尚恐體訪有所未盡更宜廣詢博訪謹守力行只可過於勤勞不可失之怠惰傳曰民生在勤勤則不匱經曰惰農自安不昏作勞不服田畝越其㒺有黍稷此皆聖賢埀訓明白凡厥庶民切宜遵守右今印榜勸諭民間各請體悉前件事理父兄教誨子弟子弟遵承教誨務敦本業耕耘收斂以養父母母或惰逰賭博喫酒妨廢農桑庻幾衣食給足禮義興行感召和平共躋仁夀又竊惟民生之本在食足食之本在農此自然之理也若夫農之為務用力勤趨事速者所得多不用力不及時者所得少此亦自然之理也本軍田地磽埆土肉厚處不及三五寸設使人户及時用力以治農事猶恐所收不及他處而土風習俗大率懶惰耕犂種蒔既不及時耕耨培糞又不盡力陂塘灌溉之利廢而不修桑柘麻苧之功忽而不務此所以營生足食之計大抵疎畧是以田疇愈見痩瘠收拾轉見稀少加以官物重大别無資助之術一有水旱必至流移下失祖考傳付之業上虧國家經常之賦使民至此則長民之吏勸農之官亦安得不任其責哉當職久在田園習知農事到官日久目覩斯弊恨以符印有守不得朝夕出入阡陌與諸父兄率其子弟從事於耘耡耒耜之間使其婦子含哺鼔腹無復饑凍流移之患庻幾有以上副聖天子愛養元元夙夜焦勞惻怛之意昨去冬嘗印榜勸諭管内人户其於農畝桑蠶之業孝弟忠信之方詳備悉至諒已聞知然近以春初出按外郊道旁之田猶有未破土者是父兄子弟猶未體當職之意而不能勤力以趨時也念以教訓未明未忍遽行笞責今以中春舉行舊典奉宣聖天子德意仍以舊榜并星子知縣王文林種桑等法再行印給凡我父兄及汝子弟其敬聽之哉試以其説隨事推行於朝夕之間必有功效當職自今以徃更當時出郊野廵行察視有不如教罰亦必行先此勸諭各宜知悉又契勘生民之本足食為先是以國家務農重榖使凡州縣守倅皆以勸農為職每嵗二月載酒出郊延見父老喻以課督子弟竭力耕田之意蓋欲吾民衣食足而知榮辱倉廩實而知禮節以共趨於富庶仁夀之域德至渥也當職幸來此承攝敢墜彛章今有勸諭事件開具如後一今來春氣已中土膏脈起正是耕農時節不可遲緩仰諸父老教訓子弟遞相勸率浸種下秧深耕淺種趨時早者所得亦早用力多者所收亦多無致因循自取饑餓一陂塘水利農事之本今仰同用水人協力興修務令多蓄水泉凖備將來灌溉如事干衆即時聞官糾率人功借貸錢本日下修築不管誤事一耘犁之功全藉牛力切須照管及時餧飼不得輙行宰殺致妨農務如有違戾凖敕科決脊杖二十每頭追賞五十貫文錮身監納的無輕恕今仰人戸遞相告戒毋致違犯一種田固是本業然粟豆麻麥菜蔬茄芋之屬亦是可食之物若能種植青黄未交得以接濟不為無補今仰人户更以餘力廣行栽種一蠶桑之務亦是本業而本州從來不宜桑柘蓋縁民間種不得法今仰人户常於冬月多徃外路買置桑栽相地之宜逐根相去一二丈間深開窠窟多用糞壤試行栽種待其稍長即與削去細碎拳曲枝條數年之後必見其利如未能然更加多種吉貝麻苧亦可供備衣著免被寒凍一鄉村小民其間多是無田之家須就田主討田耕作每至耕種耘田時節又就田主生借榖米及至秋冬成熟方始一併塡還佃戸既賴田主給佃生借以養活家口田主亦藉佃客耕田納租以供贍家計二者相須方能存立今仰人户遞相告戒佃户不可侵犯田主田主不可撓虐佃户如當耕牛車水之時仰田主依常年例應副榖米秋冬成熟之時仰佃戸各備所借本息塡還其間若有負頑不還之人仰田主經官陳論當為監納以警頑慢一本州管内荒田頗多蓋縁官司有俵寄之擾象獸有踏食之患是致人户不敢開墾今來朝廷推行經界向去産錢官米各有歸著自無俵寄之擾本州又已出榜勸諭人户陷殺象獸約束官司不得追取牙齒蹄角今更别立賞錢三十貫如有人户殺得象者前來請賞即時支給庻幾去除灾害民樂耕耘有欲陳請荒田之人即仰前來陳狀切待勘㑹給付永為已業仍依條制與免三年租稅一今來朝廷推行經界本為富家多置産業不受租産貧民業去産存枉被追耰所以打量步畝從實均攤即無增添分文升合雖是應役人户日下不免小勞然實為子孫永逺無窮之利其打量紐算之法亦甚簡易昨來已印行曉示今日又躬親按試要使民户人人習熟秋成之後依此打量不過一兩月間即便了畢想見貧民無不歡喜只恐豪富作弊之家見其不利於已必須撰造語言妄有扇揺今仰深思彼此一等皆是王民豈可自家買田收穀却令他人空頭納税非惟官法不容亦恐别招隂譴不須如此計較行事沮撓良法一本州節次行下諸縣不得差人下鄉乞覔騷擾科敷抑配强買物色及以補發經總制錢發納上供銀罷科茶等為名科發人户錢物所以上體朝廷寛恤之意欲使民得安居不廢農業今恐諸縣奉行違戾仰被擾人指定實迹前來陳訴切待追究重作行遣一本州印給榜文勸諭人户莫非孝弟忠信禮義廉恥之意今恐人户未能遍知别具節畧連黏在前請諸父老常為觧説使後生子弟知所遵守去惡從善取是舎非愛惜體膚保守家業子孫或有美質即遣上學讀書學道修身興起門户右今出榜散行曉諭外更請父老各以此意勸率鄉閭教戒子弟務令通曉毋致違犯元史食貨志世祖中統元年頒農桑輯要之書於民又命各路宣撫司擇通曉農事者充隨處勸農官又世祖至元二十八年頒桑雜令明史呉元年上出視圜丘世子從行上因命左右導之徧歴農家觀其居處飲食器用還謂之曰汝知農之勞乎夫農惟五榖身不離畎畝手不釋耒耜終歳勤動不得休息其所居不過茅茨草榻所服不過練裳布衣所飲食不過菜羮糲飯而國家經費皆其所出故令汝知之凡一居處服用之間必念農之勞取之有制用之有節使之不苦於饑寒方盡為上之道若復加之横斂則民不勝其苦矣故為民上者不可不體下情又明太祖嘗幸鍾山自獨龍岡步至淳化門謂侍臣曰朕不歴田畝久適見田者冒烈暑而耕心惻然憫之不覺徒步至此欽定授時通考卷四十二
