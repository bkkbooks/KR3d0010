body:
  text: 欽定四庫全書欽定授時通考卷四十七勸課本朝重農敕諭一太祖髙皇帝諭今日仗義伐明天必佑我天佑可以克敵但我國儲積未充縱得其人民畜産何以飬之若飬其人民畜産恐我國之民反致耗損惟及是時撫輯吾國固疆圉修邉備重農積榖為先務耳大宗文皇帝天聰七年諭各牛录額真曰田疇廬舎民生攸頼勸農講武國之大經爾等宜各徃該管屯地詳加體察不可以部務推諉若有二三牛录同居一堡者著於各田地附近之處大築墻垣散建房屋以居之遷移之時宜聽其便至於樹藝之法窪地當種粱稗髙田隨地所宜種之地瘠湏加培壅耕牛湏善飼飬爾等俱一一嚴飭如貧民無牛者付有力之家代種一切徭役宜派有力者勿得累及貧民如此方稱牛录額真之職若以貧民為可虐濫行役使惟爾等子弟徇庇免其差徭則設爾牛录額真何益耶至所居有卑濕者宜令遷移若憚於遷移以致傷稼害畜俱爾等牛录額真是問方今疆土日闢凡田地有不堪種者儘可更換許訴部臣換給如給地之時爾等牛录額真章京自占便地沃壤將逺瘠之地分給貧人許貧人陳訴崇徳二年諭昨嵗春寒耕種失時以致乏榖今嵗雖復春寒然三陽伊始農事不可失也宜早勤播種而加耘治焉夫耕耘及時則稼無災傷可望有秋若播種後時耘治無及或被蟲災或逢水澇榖何由登乎凡播種必相其土宜土燥則種麥榖土濕則種秫稗各屯堡撥什庫無論逺近皆宜勤督耕耘若不時加督率致廢農事者罪之世祖章皇帝順治六年諭自兵興以來地多荒蕪民多逃亡流離無告深可憫惻著户部都察院傳諭各撫按轉行所司凡各處逃亡民人不論原籍别籍必廣加招徠編入保甲俾之安心樂業察本地方無主荒田州縣官給以印信執照開墾耕種永准為業俟耕至六年之後有司官親察成熟畝數撫按勘實奏請奉㫖方議徴收錢糧其六年以前不許開徴不許分毫僉派差徭如縱容衙官衙役鄉約甲長借端科害州縣印官無所辭罪務使逃民復業田地開闢漸多各州縣以招民勸耕之多寡為優劣道府以責成催督之勤惰為殿最每嵗終撫按分别具奏順冶八年諭田野小民全頼地土飬生朕聞各處圏占民地以備畋獵徃來下營之所夫畋獵原為講習武事古人不廢然恐妨民事必於農隙今乃奪其耕耨之區㫁其衣食之路民生何以得遂朕心大為不忍爾部速令地方官將前圏地土盡數退還原主令其乘時耕種諭朕出獵囘見禾稼茂盛足覘有秋恐爾等仍前放鷹馳獵以致蹂躪田禾殊堪軫念今後必俟農隙之時方許放鷹勿得玩違順治十二年諭戸部曰朕有天下皆我太祖太宗積徳施仁開創鴻緒以貽藐躬朕既為生民之主一夫不獲時厪朕衷念自明運式㣲流賊煽亂朕奉天成命救民於水火之中率土人民如依父母以為必䝉愛育得享昇平豈意比年以來水旱頻仍干戈未靖轉輸旁午民不聊生蕩析離居鬻及妻子㷀㷀無告轉輾呼號想其怨咨必歸於朕言念及此何以仰副祖宗付託之意中夜以興澘焉出涕雖未能減賦蠲租實欲除苛去甚與良有司共圖休飬已有諭㫖令内外大小官員悉心條奏通達下情嗣後各地方錢糧凡横歛私徴暗加火耗荒田逃戸灑派包賠非時預徴蠲免不實災傷遲報踏勘騷擾妄興詞訟妨奪農時等弊一切嚴行禁革有違犯者該督撫即行糾叅治罪如督撫狥縱部院科道官訪實劾奏順治十四年諭時方入秋田禾在野必雨暘時若乃望西成今霖潦未休傷稼可慮干和召沴定有由來朕夙夜祗懼循省愆尤大小臣工亦俱宜洗心滌慮協圖修省以格天心仍遣官於圜邱䖍禱晴霽順治十七年諭今夏亢陽日乆農事堪憂朕念致災有由痛自刻責榖為民天非雨不遂竭誠祈禱積有日時乃精誠未逹雨澤尚稽晝夜焦心不遑啟處兹卜是月之十三日豫行齋戒黎明步至南郊是夜子刻祭告圜邱祈禱丼雨以拯災黎若仍不雨則再行躬禱務回天意聖祖仁皇帝康熈十年諭禮部今嵗三春無雨風霾日作耕種愆期民生何頼皆由朕躬凉徳政治未協大小臣工不能殫忠為國恪修職業瞻顧因循惟圖自便偏私怠忽致干天和用是朕夙夜靡寧深切儆惕今實圖修省勵精勤政體上天仁愛之意感召休和為民請命内閣六部都察院等衙門大小官員各有職掌皆宜體朕倚任至意共効贊襄持亷秉公克盡厥職洗心滌慮痛改前非以迓天和爾部即遵諭通飭祈雨事宜照例作速舉行諭今已入夏亢暘不雨農事堪憂朕念切民生躬自刻責特頒嚴㫖戒飭各臣修省過愆祈求雨澤乃精誠未逹霖雨尚稽朕心晝夜焦勞不遑啟處兹朕䖍誠齋戒躬詣天壇祭告懇祈丼霖速降以拯生民爾部作速擇吉其祭告儀物即行備辦諭耕耤大典事闗勸農來春應照例舉行其應行事宜詳察典例具奏康熈十二年諭户部自古國家乆安長治之謨莫不以足民為首務必使田野開闢蓋藏有餘而又取之不盡其力然後民氣和樂聿成豐亨豫大之休見行墾荒定例俱限六年起科朕思小民拮据開荒物力艱難恐催科期迫反致失業朕心深為軫念以後各省開墾荒地俱著再加寛限通計十年方行起科其該管地方官員原有議叙定例如新任之官自圖紀叙故掩前功紛更擾民者著各該督撫嚴行稽察題叅處分康熈十八年諭禮部民資粒食以生今時值夏令雨澤未降乆旱傷麥秋種未下農事堪憂皆由朕躬凉徳政治未協大小臣工不能亷己愛民勤修職業致干天和朕用是夙夜靡寧深切警惕實圖修省諸臣亦宜循省過愆恪共乃職期於共襄治理感召休和兹當䖍誠齋戒躬詣天壇親行祈禱為民請命爾部即擇期具儀來奏諭民生以食為天必蓋藏素裕而後水旱無虞自古耕九餘三重農貴粟所以藏富於民經乆不匱洵國家之要務也比以連年豐稔粒米充盈小民不知蓄積恣其狼戾故去年山東河南一逢嵗歉即以饑饉流移見告雖議蠲議賑加意撫綏而被災之民生計難遂良由地方有司各官平日不以民食為重未行申明勸諭之故近據四方奏報雨澤霑足可望有年恐豐熟之後百姓仍前不加撙節妄行耗費著各該地方大吏督率有司曉諭小民務令力田節用多積米糧庶俾俯仰有資凶荒可備以副朕愛飬斯民至意康熈二十一年諭禮部農事為民生之本必雨雪以時庶春耕不悞秋成可期今嵗入冬以來尚未降雪愆陽日乆時序失宜田畝暵乾恐妨明年東作應䖍行祈禱爾部即照例作速舉行康熈二十三年諭戸部民為邦本必年榖順成家給人足乃愜朕撫育羣生之意比者廵行近畿見閭閻生計僅支日用乃米價漸貴民食維艱又聞河南地方年嵗荒歉所在苦饑小民無以資生恐致流移失所朕心深切軫念直𨽻應作何平糴及勸諭捐輸河南應行緩徴併鼓勵捐輸設法賑濟等項事宜著九卿詹事科道㑹同確議具奏諭吏部尚書伊桑阿朕車駕南巡省民疾苦路經髙郵寳應等處見民廬舎田疇被水淹没朕心深為軫念詢問其故緣髙寳等處湖水下流原有海口以年乆沙淤遂致壅塞今將入海故道濬治䟽通可免水患自是往還每念及此不忍於懐此一方生靈必圖拯濟安全咸使得所始稱朕意爾同工部尚書薩木哈徃被水災州縣逐一詳勘期於旬日内覆奏務期濟民除患縱有經費在所不惜爾等體朕至意速行康熈二十五年諭工部右侍郎孫在豐朕前因巡幸爰至江南見髙寳興鹽山江泰等處積水汪洋民罹昏墊朕甚憫之應行開濬下河䟽通海口俾水有所歸民間始得耕種特發帑金拯救七邑災民屢集廷議兼詢輿情允協僉謀事當釐舉兹命爾前徃淮揚所屬下河一帶車路等河并串場河白駒丁溪草堰場等口挑濬事務專屬於爾監修爾宜徃來親歴多方經畫講求源流脉絡次第興工督率帶去司官等務實心任事毋得怠忽擾害其司道府㕔州縣等官如有違犯貽悞及勢豪縉衿妄行干預包攬生事阻撓工程者指名叅奏濬過工程丈尺用過夫料數目造冊畫圖貼說具奏爾受兹專委湏竭忠盡力悉心區處速竣大工使海口䟽通水消田墾蒸黎復業以副朕救民至意諭大學士勒徳洪等日者遣部員自㡬林烏喇至黑龍江以蒙古席白逹呼里索倫等人力耕種田榖大穫夫民食所闗至重來嵗仍遣前種田官員以蒙古席白逹呼里索倫等人力耕種郎中博竒所監種田地較諸處收穫為多足供驛站人役之口糧又積貯其餘榖博竒効力視衆為優其註之冊此遣去諸員可互易其地監視耕種博竒又復大穫則議叙焉康熈二十八年諭山東廵撫錢珏朕軫恤民隐載舉時廵懋宣徳化勤求疾苦比至山東所經城邑百姓扶老擕幼夾道歡迎朕問及連嵗順成民生少得安業第思百姓足則國家充裕若期比戸豐盈必以蠲租减賦除其雜派為先邇年以來各省地丁錢糧已經節次豁免山東地丁正賦意欲來嵗蠲除兹因廵幸至此特先諭該撫速行曉示日傳三百里遐村僻壤咸使聞知以副朕省耕問俗之意諭内閣頃者時已初夏雨澤雖降而猶未霑足其命禮部照前祈禱之禮三日禁止殺牲不理刑名事務䖍恭齋祓以祈丼雨諭大學士伊桑阿今嵗旱已乆其傳諭九卿詹事科道朕與卿等静處以俟之耶應行應革事有無耶抑何以禱祀而求之耶其㑹同詳議以聞諭禮部時已仲夏雨澤未霑農事堪憂已經遣官於諸壇祈求未應朕夙夜靡寧今特遣官於天壇地壇社稷壇䖍行禱祀爾部即察例擇期來奏諭禮部自春徂夏時雨愆期朕念切民生躬自刻責祗祓齋居戒飭臣工共圖修省曾經遣官徧禱天地神祗㣲雨雖降未沛祥霖今三伏届期農事可慮朕心彌切焦勞不遑寧處兹乃潔誠齋戒遣官於天壇䖍行禱祀尚期仰格蒼昊下拯黔黎爾部即察例擇日來奏康熈二十九年諭戸部朕撫御區宇夙夜孜孜惟期厚民之生使漸登殷阜重念食為民天必蓋藏素裕而後水旱無虞曾經特頒諭㫖著各地方大吏督率有司曉諭小民務令多積米糧庶俾俯仰有資凶荒可備已經通行其各省徧設常平及義倉社倉勸諭捐輸米榖亦有㫖允行後復有㫖常平等倉積榖闗係最為𦂳要現今某省實心奉行某省奉行不力著再行各該督撫確察具奏朕於積貯一事申飭不啻再三藉令所在官司能具體朕心實有儲蓄何至如直𨽻地方偶罹旱灾輒為補苴之術嗣後直省總督廵撫及司道府州縣官員務宜恪遵屢次諭㫖切實舉行俾家有餘糧倉庾充牣以副朕愛飬生民至意諭戸部朕惟阜民之道端在重農必東作功勤然後西成有頼畿輔地方去嵗遭罹荒歉已經蠲免錢糧特發帑金兼支倉粟賑濟雖小民糊口有資其子粒牛具恐多匱乏今時届首春田功肇始若弗經營措給將誤俶載之期播種不齊倉箱何望直𨽻被灾州縣衛所窮民有不能自備牛種等項者該督撫率有司勸諭捐輸及時分行助給務令田疇徧得耕易毋致少有荒蕪八旗官兵皆倚屯莊收穫用以資生若有被灾貧乏耕作無力者該都統等通行各該佐領酌量佽助牛種所有莊田勿致播種後時以副朕敦本勸農愛飬兵民至意康熈三十年諭戸部塞外聚榖甚屬要務故耕稼土田以廣積貯為至切也逹爾湖之地其田以内府莊田之人耕之可令總管内務府於各莊屯内遣其丁壯其榖種耒耜及諸田器耕牛皆令豫備於三旗内府官員新滿洲䕶軍披甲之中熟諳農事者擇而遣之呼爾湖之地其田以八旗諸王莊屯之丁壯耕之其榖種耒耜及諸田器耕牛咸令豫備熟諳農事之人擇而遣之墾闢耕種之時稷與大麥油麥春麥四種榖皆可藝植稷宜多種之春麥宜少種之遣徃耕田之人田既耕種畢則酌留耘田之人其餘人遣還榖既熟則所留耘田之人可以收穫此農人所食之米於古北口所貯之米石中計口而授之西拉木倫之地其耕田悉照原議遣盛京人役前徃俟農畢秋成之後視豐收地方其治田人員該部議叙爾等其議以聞康熈三十一年諭大學士伊桑阿等積榖者至要之務也誠有所積貯雖遇灾傷㫁不致於饑饉但小民不知儲蓄每值豐收之年恣意糜費及逢儉嵗遂底困窮今時届麥秋可敕各該地方官勸諭百姓比戸量力共相樂輸委積儲峙州縣官將捐助者姓名與米數註冊秋成之後亦倣此行焉其春時乏食者貸與之至秋照數收入以為積蓄夫每年於麥榖告登之候勸勉捐輸則數嵗之間倉廪充裕即罹灾祲民食自可不虞匱乏矣康熈三十二年諭内閣日者盛京招民有議叙之例今西安等處流民尚有未歸本業者兹西安等處流民招復㡬戸復歸本業助給牛種等物令之耕種收穫一季者其宜議叙吏戸二部察例以聞諭内閣聞山東今年田收之後蝗螟叢生必已遺種於田矣而今嵗雨水連綿來春少旱蝗則復生未可知也先事豫圖可不為之計與乘時竭力盡耕其田庶㡬蝗種瘞於土而糜爛不復更生矣若遺種即有未盡來嵗復萌地方官即各於疆理區畫逐捕不使滋蔓其亦大有益也命戸部速牒直𨽻山東河南陜西山西廵撫等示所領郡縣咸令悉知田則必於今嵗來春皆勉力耕耨蝗螟之灾務令消滅若郡縣有不能盡耕耨其田者蝗或更生則必力為捕滅母使蝗灾為吾民患諭戸部朕念切民生時厪宵旰或在宫禁之中或經廵省之地務以編氓疾苦備悉諮詢其從各省來京陛見官員及徃來奉使人等亦無不以該省雨澤曾否應時田畝有無收穫並閭閻資生情形一一體訪比年以來因國家經費尚充遂將各省地丁額賦及舊欠錢糧節次蠲免即從前未經停征之漕糧亦逐年免征總欲使海隅蒼生培固元氣庶臻於家給人足之風今嵗畿輔地方雖禾稼未獲稔收初意小民餬口之需猶足資給未必生計遂至艱難頃者展謁山陵沿途察訪民隐見今嵗雨水過溢田畝被渰没者甚多榖耗不登米價翔貴又聞順天河間保定永平四府所屬皆然目前米價既貴將來春夏之際時值益昂小民必艱粒食此朕目所親覩若來嵗錢糧仍然徴收朕心實有未忍順天河間保定永平四府康熈三十三年應徴地丁銀米著通行蠲免所有歴年舊欠悉與豁除行文該撫曉諭各屬務令人霑實惠以副朕子育黎元至意康熈三十三年諭内閣朕處深宫之中日以閭閻生計為念每廵歴郊甸必循視農桑周咨耕耨田間事宜知之最悉誠能豫籌穡事廣備災祲庶㡬大有裨益昨嵗因雨水過溢即慮入春㣲旱則蝗蟲遺種必致為害隨命傳諭直𨽻山東河南等省地方官令曉示百姓即將田畝亟行耕耨使覆土盡壓蝗種以除後患今時已入夏恐蝗有遺種在地日漸蕃生已播之榖難免損蝕或有草野愚民云蝗蟲不可傷害宜聽其自去者此等無知之言切宜禁絶捕蝗弭災全在人事應差戸部司官一員前徃直𨽻山東廵撫令其申飭各州縣官親履隴畝如某處有蝗即率小民設法耨土覆壓勿致成災其河南山西陜西等省亦行文該撫一體曉諭欽依康熈三十六年諭内閣下河地方乆罹水患朕心時切軫念前命挑濬白駒岡門等口原欲使水盡流通田皆涸出今見興化㤗州等州縣積水尚多田仍淹没民生甚屬苦累著行文總漕總河親徃㑹勘將下河積水何故壅塞不能迅流應作何盡令歸海涸出民田之處詳閱議奏康熈三十七年諭内閣霸州新安等處此數年來水發時渾河之水與保定府南之河水常有泛漲旗下及民人莊田皆被淹没詳詢其故蓋因保定府南之河水與渾河之水滙流於一處勢不能容以致泛溢此二河道著左都御史于成龍徃保定府南河著原任總督王新命徃作何修治令其水自分流詳看繪圖議奏今值農事方興不可用百姓之力遣旗下丁壯備器械給以銀米令其修築伊等徃時部院衙門司官筆帖式酌量奏請帶徃於十日之内即令啟行諭大學士伊桑阿等開濬下河民生攸繋朕為閭閻疾苦深切軫念曾命覬音布孫在豐于成龍王新命等專司開濬伊等俱奏工程告竣民生大䝉利益載在冊籍存部可攷人亦具在可以質詢也由今觀之祗是虛糜國帑水勢並未消減田畝並未涸出所謂有益民生者果何在耶今桑格又奏當行開濬而九卿並不詳詰從前開濬諸人亦不稽考冊籍遽議准行如果此次開濬巨浸全消疆理盡復民業得濟朕於錢糧絶無吝惜即動發帑金令其興工而已至捐助事例並不宜允行即今山陜所捐銀米其事尚未明晰也若下河果如其所請䟽鑿開濬而桑格等能必水即消田即出有裨於民以身家保奏即令開濬之御史呉甫生亦以此事條奏所言甚是可將其䟽并發九卿詳詢前次督濬者復稽攷冊籍確議以聞康熈三十九年諭户部國家要務莫如貴粟重農朕宵旰圖治念切居生惟期年榖順成積貯饒裕於以休飬黎元咸登樂利今聞直𨽻各省雨澤以時秋成大熟當此豐收之時正當以饑饉為念誠恐嵗稔榖賤小民㒺知愛惜粒米狼戾以致家無儲蓄一遇嵗歉遂至仳離著該督撫嚴飭地方有司勸諭民間撙節煩費加意積貯務使蓋藏有餘閭閻充裕以副朕重農敦本愛飬元元至意康熈四十一年諭戸部朕躬理㡬務年乆深知稼穡之事念阜民之道期於有備去冬北地少雪今春雨澤㣲降尚未霑足誠恐蝗蝻易生有傷農事所在官吏亟宜先時預防直𨽻山東山西河南陜西江北地方歴年積貯倉糧果否足額該督撫宜確加稽核務使廪有餘儲不致匱乏其一切預備事宜湏悉心講求料理縱年嵗不甚豐稔亦可賑濟無虞至直𨽻各省現今雨澤有無多寡著該督撫即行具摺奏聞以紓朕宵旰勤民之意康熈四十二年諭東省在京官員朕四次經過山東於民間生計無不深知東省與他省不同田間小民俱依有身家者為之耕種豐年則有身家之人所得者多而窮民所得之分甚少一遇凶年則已身並無田畝産業有力者流移於四方無力者即轉死於溝壑此等情狀爾東省大臣庶僚及有身家者亦當深加體念似此荒歉之嵗雖不能大為拯濟若能輕減所入田租以各贍養其佃戸不但深有益於窮民即爾等田地日後亦不致荒蕪如果民受實惠豈不勝謝恩千百倍耶這奏謝已悉所司知之諭山西巡撫噶禮朕君臨天下四十餘載無一刻不以蒼生為念近因西省望幸甚切故於冬時農隙減從輕騎由晉以入秦入境以來觀風問俗見官方㣲有亷風民生畧有起色閭閻之間俗樸尚儉朕心少慰朕自弱齡讀書徃徃以不知窮簷僻壤之疾苦為嘆息所以留心於官方吏治凡有徃來者必先諮詢民情豐歉偶有失時定加蠲賑且思晉省不通水運嵗或不登即難籌畫雖有州縣存貯之糓米未必實數具在反益不肖有司之虧空也今嵗山西收成頗佳爾等仰體朕愛民如子之至意曉諭民間若豐嵗用奢則荒年必至匱乏教以禮義導以守法重農務本藏富於民則朕無西顧之憂矣凡朕所經之處必大沛恩澤因今嵗東省災甚已蠲四十三年地丁錢糧又免雲貴廣西四川地丁錢糧所以不能施惠但將四十二年以前山西所屬州縣未完銀兩米草盡行蠲免以示朕加惠黎元之念康熈四十四年諭山東巡撫趙世顯朕為兩河告成楊家莊新河建閘故來巡視因爾等同地方士民所請過江而南見百姓雖不能家給豐裕且幸安居樂業而無菜色朕心少慰矣編氓皆吾赤子數十年休息培養民雖至愚皆已深知所以扶老擕幼日計數萬隨舟擁道歡聲洋溢者降衷之誠也但人多路隘菜花麥秀徧地青苗不能保其無損朕甚惜焉爾等即出示曉諭萬勿蹋壊田苗有負厪念康熈四十六年諭浙江福建總督梁鼐等朕頃因視河駐蹕淮上江浙兩省官員及地方紳士軍民咸環道逺迎懇請臨幸朕勉順羣情渉江而南循省風俗所至郡縣見雨暘應時麥苗蕃殖比閭樂業可冀盈寧雖山東一路尚未悉覩而江浙田疇鬱蔥在望深愜朕懐方今二麥垂熟正將刈穫之時一切扈從人員皆以次舟行不致蹂踏誠恐百姓縁途迎送老稚扶擕動盈千萬越阡度陌未免踐傷朕心甚為軫惜雖民情依戀出於悃誠但農事方殷應令所過地方悉停止岸傍迎送且車駕來時小民業已瞻覲兹節候漸熱朕舟行乘夜迎凉亦未可定民雖逺來無由親見爾等督撫其張示徧加曉喻使各知悉俾無負朕重農愛民之意諭内閣朕每次巡幸循歴方隅雖窮鄉僻壤小民之生計鮮不周知觀東南西北地勢水土與夫飲食衣服器用悉皆不同榖桑麻綿耕種各隨土宜非人力所能移奪地方官員將小民現在力作之務若能加意勸導使不致荒廢即為實能盡心之人今責成地方官令五畝之田種桑二株百畝之田種桑四十株此四十株之桑葉養蠶㡬何此桑從何處移植即令移植未必水土盡與桑木之性相合更閲㡬年便可成用此等物情言者並未計及且山東人於蠶種初出時皆置之山間橡樹之上俟其結繭並無用桑育蠶之事此等處言者亦未之知小民惟利是從雖以法禁之不止若無利雖百計嚴督之不行此亦理之所必然者今當昇平之日惟以無事為本乃不度地理之燥濕不計水土之順逆欲强迫百姓募南人以教之蠶此㫁㫁乎不可行也李紹周所奏已悉下所司知之諭起居注官揆叙等朕今年於二月二十八日抵揚州彼時麥已秀矣至四月二十日囘鑾則正在刈麥之時南方麥秀雖早於北方而仍與北方同熟至於榖稼菓品大畧皆然江南梅花正月即放至五月始實朕取至暢春園種之見其三月花放亦於五月結實花放於兩月之前而同至五月結實此皆水土之故也南方之物開花吐穟雖早而成實遲故食之難消北方之物開花吐穟雖遲而成實速故食之易消皆土性冷煖自然不可强者試於塞外種稻其地髙寒難以收穫種别項之榖則無如塞外豐茂者江南不及京都京都不及塞外朕以此等土性向張玉書李光地言之彼皆心服謂朕所見極是朕巡行各省所見諸物無不留心詳察故知之甚明確也諭江浙在京官員大學士張玉書等朕在宫中無刻不以民間疾苦為念恐遇旱澇必思豫防至巡幸各省於風俗民情無不諮訪即物性土宜皆親加詳考每至一方必取一方之土以騐試其燥濕今嵗南巡江浙見天氣乆晴所經河渠港蕩之水比舊較淺即慮夏間或有亢𤾉之患是時麥田雖甚豐稔然南方二麥用為麯蘖者多不似北方專資麵食南方惟頼稻米北方則兼種黍稷粱粟有攜北方黍稷及蔬菜之類至南方種植者多不收穫此水土異宜不可强也且江浙地勢卑下不雨則蒸濕人不能堪有雨則凉人皆爽豁雖地稱水鄉而水溢易洩澇嵗之為患尚淺旱嵗則為旱甚劇北方經月不雨亦尚無礙南方夏秋間經旬缺雨則田皆坼裂禾苖漸槁矣喜雨亭記云十日無雨則無禾蓋謂此也江浙農功全資灌溉今河渠港蕩比舊俱淺者皆由素無瀦蓄所致雨澤偶愆濵河低田猶可戽水濟用髙仰之田力無所施往往三農坐困朕兹為民生再三籌畫經乆之計無如興水利建閘座蓄水灌田之為善也江南省之蘇松常鎮及浙江省之杭嘉湖諸郡所屬州縣或近太湖或通潮汐所有河渠水口宜酌建閘座平時閉閘蓄水遇旱則啟閘放水其支河港蕩淤淺者並宜䟽濬引水四達仍酌量建閘多蓄一二尺水即可灌髙一二尺之田多蓄四五尺水即可灌高四五尺之田凖此行之可俾髙下田畝永遠無旱澇矣爾等其以朕意曉諭諸臣詳議以聞諭工部朕宵旰勤民視如赤子無一時一事不思為閭閻圖經乆之計江南浙江生齒殷繁地不加增而仰食者日衆其風土隂晴燥濕及種植所宜迥與西北有異朕屢經巡省察之甚悉大抵民恃田畝為生田資灌溉為急雖東南名稱水鄉而水溢易泄旱暵難支夏秋之間經旬不雨則土坼而苗傷矣濵河低田猶可戽水濟用髙仰之地力無所施往往三農坐困朕兹為民生再三籌畫非修治水利建立閘座使蓄水以灌輸田疇無以為農事緩急之備江南省蘇州松江常州鎮江浙江省杭州嘉興湖州各府屬州縣或近太湖或通潮汐宜於所有河渠水口度地建閘隨時啟閉水有餘則宣泄之水不足則瀦蓄以備用其有支河港蕩淤淺者宜並加䟽濬使引水四達仍行建閘多蓄一二尺之水即田髙一二尺者資以灌溉矣多蓄四五尺之水即田髙四五尺者資以灌溉矣行之永乆可俾髙下田畝無憂旱澇此於運道無渉而於民生實大有裨益今漕運總督與江浙督撫方料理截漕散賑爾部速移文該督撫等令將各州縣河渠應建閘蓄水之處並應建若干座通行確查明晰具奏康熈四十七年諭工部去嵗杭州等處田畝被災民生疲敝這支河港蕩淤淺之處若勸諭百姓開濬恐地方官員藉此私派害民亦未可定况需費無多著動用正項錢糧速行䟽濬特諭康熈五十三年諭户部丼肅一帶地方去年春麥失收秋田亦歉經該督撫奏報甚明其地俱係山田稍遇旱暵易致災荒是以舊嵗特沛恩澤蠲免租賦現在雖據該督設法賑濟借糶資給牛種此外更應作何籌畫使小民得所永有禆益著遣工部右侍郎常泰大理寺少卿陳汝咸到彼㑹同該督撫詳察地方百姓情形確議具奏康熈五十四年諭直𨽻廵撫趙𢎞燮朕嘗讀無逸篇留心稼穡乆矣去嵗臘前瑞雪盈尺時届陽節細雨連綿輿情歡悦早得布種矣所慮者起發太盛則收穫之際恐有二疸之虞爾等徧示民間時值耘耕即令苗稀䟽豫防風霾朕以民生為念勸農為本已有所知不得不示康熈五十八年諭戸部朕幸熱河一路麥苗盈野收成頗佳但麥熟之嵗徃徃雨水早而且多朕留心稼穡歴年最乆所見如此爾部即速傳直𨽻河南山左山右口外地方速將已收之麥晾乾入屯收貯以免潮濕壊爛則今年所收足用二年矣康熈六十年諭大學士九卿去冬雪大所以今春雨澤甚少大約冬雪多則春雨必少春雨少則秋霖必多此非有占騐而得知者也朕六十年來留心農事較量雨𤾉徃徃不爽且南方有雪有益於田土北方雖有大雪被風飄散於田土無益今嵗山東得雨河南山西陜西未甚得雨備荒最為𦂳要不可不豫為籌畫若直𨽻山東河南料理已屬非易至山西陜西其補救尤難古人云三年耕則有一年之蓄九年耕則有三年之蓄言雖可聽行之不易如設立社倉原屬良法但前李光地張伯行曾經舉行終無成效至於各省積貯榖石雖俱報稱數千百萬實在存倉者無㡬即出陳易新之法亦不為不善第春間僅有所出秋後並無所入州縣官侵蝕入已急則即以折銀掩飾此等積弊朕知之甚詳其報荒之真偽虛實朕亦無不洞悉如熱河所積榖石每年減價平糶秋收糴還補倉數目無多稽杳頗易所以每有餘糧耳語云大兵之後必有凶年昔征𠞰三逆時豐收足以供給並無一州一縣貽悞及平定以後亦間有歉收者雖然綢繆未雨不可不為豫慮也邇來稍覺暵旱政事或有缺失應行改正之處爾等㑹同詳議具奏欽定授時通考卷四十七
