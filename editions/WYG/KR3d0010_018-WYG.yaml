body:
  text: 土宜水利四耿橘大興水利申册竊照東南之難在賦税而賦税之所出與民生之所養全在水利葢瀦泄有法則旱澇無患而年穀每登國賦不虧也計常熟縣民間田租之入最上每畝不過一石二斗而實入之數不過一石乃糧之重者每畝至三斗二升而實費之數殆逾四斗是什四之賦矣以故為我民者一遇小小水旱輒流散四方逋負動以數萬計惟有水利大興俾嵗時無害為今日救時之急務矧本縣坐落江海之交潮汐三面而至且居蘇常諸府下流諸湖水由此入海其水之利害視他處為尤鉅而其經理為尤急也卑職以其暇日單騎輕舠遍歴川原進諸父老講求水利之故凡地形髙下之宜水勢通塞之便疏瀹障排之方大小緩急之序夫田力役之規官帑補助之則經費量度之法催督考驗之術一一條畫著為圖説以至區里利害之殊土性肥瘠之異錢糧輕重之等田野荒熟之故風俗淳澆之由形勢險夷之辨無不備具務紓百世之訏謨期垂一方之永利為此將查歴過通縣河圩形勢繪圖貼説造册具申開河法凡九條一照田起夫量工給食宋臣范仲淹曰荒歉之嵗召民為役日以五升因而賑濟徐光啟曰此宋時斗斛也幸勿慮多葢老成長慮之見如此常熟民素驕侈傭趁之人頗少况挑河非重其直不應故莫善于照田起夫量工給銀之法然照田起夫亦難言矣説者謂有近水利者逺水利者不得水利者及田止十畝以下者分為四等除十畝以下者免役外餘以三等為伸縮葢往年之役如此職深以為不然本縣之田未有不藉水而成者但河有枝幹之殊水有大小之異耳水大者則當施瀦蓄之法水小者則當施疏鑿之方彼幹河引江湖之水而枝河非引幹河之水者乎田近幹河者稱利矣田近枝河者非幹河之利乎若必為四等之説則奸户積書朦朧作弊上户那而為中户中户那而為下户近利那而為逺利逺利那而為不得利而田少愚弱之氓反差重役如小民之偏苦何故開河必觀水勢所向應用某區某圖之民必無論大户小户通融驗𣲖然後于法均于事便于民無擾耳派夫之法先弔黄册查明該區該圖坐圩田地總數隨令里書將業户一一註明然後通融算派某河應役田若干畝每田若干畝坐夫一名田多者領夫田少者湊補足數名曰協夫其勘明坍江板荒田地俱豁免如此貧富適均衆擎易舉矣一水利不論優免濬河以備旱澇便轉輸也論田而士夫之田多於小民論河而灌運之利當亦多於小民故同心協力舉地方之大利在士夫原有此意矣職客嵗開濬福山河以此意白之本縣士夫士夫咸各樂從興工之日倡率鼓舞工反先於百姓而百姓蒸蒸無不子來趨事爭先恐後已有成績矣今後凡濬河築岸之事必如往規庶勞逸均而上下悦服也一準水面算土方多寡分工次難易開河之法其説甚難均是河也中間不無淤塞深淺之殊地形亦有髙下凹凸之異而土方之多寡工次之難易必有判焉不相同者宋臣郟僑云以地面為丈尺不以水面為丈尺不問髙下匀其淺深欲水之東注必不可得須於勘河之時先行分段編號算土之法若本河有水即沿河㸃水有深淺不同之處差一尺者即另為一段假如通河水深一尺而有深二尺者即易段也深三尺者又易段也深四尺者極易段也深與議開尺寸等者免挑段也濶倣此各立樁編號以記之隨令精算者逐段計算土方其法每土四傍上下各一丈為一方每方計土一千尺假如本河議開面濶五丈底濶三丈水面下開深五尺每長一丈該土二方徐光啟曰誤算矣然不言總深亦難算其實數假若原深一丈而加深廣五尺該土三方又八百尺也假若不論深以此權説應開實土有水一尺者實開土一方又五百二十尺也有水二尺者實開土一方零八十尺也有水三尺者開土六百八十尺也有水四尺者開土三百二十尺也又如某段水深一尺該穵土方四分實開土一方六分為難工某段水深二尺該穵土方八分實開一方二分為易工三尺四尺五尺倣此濶倣此若本河無水即督夫先于中心挑一水線深廣各三尺或二尺務要徹頭徹尾一脈通流却于水面上丈量露出餘土有厚薄不同之處差一尺者另為一段假如通河皆餘土一尺而有餘二尺者即難段也餘三尺者又難段也餘四尺者大難段也餘五尺者極難段也立樁編户算土如前法但此乃計水上之土而水下應挑之土可一律齊矣然後通算本河該實開土若干方兩旁得利田若干畝起夫若干名每夫該土若干方分工定宕第從土方土少者宕長土多者宕短齊土方不齊丈尺而後夫役為至均河形為至平也附打水線法水線至平也而人心不平奸巧百出如三十三年開福山塘打水線十數日不成管工官皆不知職既識破其術隨設法五里委一官官各乗馬一里委一皂皂各飛奔如是往來不停看其水線不令隂阻乃一日而成奸巧立破何以故渠功少者於水線中暗藏小壩官來則暫決之過則壩住雖土髙無水之地而兩頭藏壩中間水可不絶此奸不破髙低不明水線為虚何以知其然也隂壩初決者其水流動不然者其水靜定也一分工定宕難易有號矣土方有數矣而夫役之來道里逺近不同市野食宿異便而土性亦有緊漫堅散之殊崖岸不無險夷髙下之别强者奸者於此爭利焉倘無術以處之亦非盡善之道也然此不可為之河濱宜先為之於堂上查照區圖逺近自頭至尾算定丈尺捱定工次要令逺近適中一一明註此工簿内用印發各千百長照簿豎立夫樁一定不移庶紛爭之擾可免而亦無作奸之處矣第初時量河最要的確臨期分宕務秉至公不則吏書虚報丈尺而實剋夫價者有矣强梁之徒夫多宕少者亦有矣大都正官能一親行自無此弊一堆土法夫役偷安類於近便岸上抛土不思老岸平坦一遇天雨淋漓此土隨水流入河心儵挑儵塞徒費錢糧徒勞工夫亦竟何益必于河岸平坦之處務令逺挑二十步之外照魚鱗法層層散堆若有嬾夫就便亂抛者重究若有古岸髙出田上者即挑土岸内相幇以固子岸亦可其平岸之處不得援此為例若岸有半圮之處即宜挑土補塞築成髙岸挑成一層堅築一番層層而上岸必堅牢一舉兩得不可姑置岸上待後日築之後來日久人玩貽害河道不小也若田中有漊蕩或原因取土致田深陷者即用河土填平若㟁邊有民房有園亭逼近不便挑土者即令業户自定樁笆於房園邊旋築成岸亦兩利之道也若河狹則不可耳一考工法金藻水學曰勤省視者官亷能也或不省視與無亷能同省視不賞罰與不省視同賞罰不繼續與不賞罰同職亦曰亷能矣省視矣賞罰矣繼續矣而無考驗之法與不亷能不省視不賞罰不繼續同夫考工之法先必立信樁様樁以防其奸偽様樁者用木橛刻畫尺寸與應濬尺寸同信樁則一木橛可已法于號段既定之後每段將畫尺木橛釘入河心與水面平本河無水者與水線之水面平俗所謂水平椿是也俟開方之後以此橛為準葢橛露一尺則工滿一尺矣故曰様樁却將二橛書明號段直對様樁釘入兩岸老土深與岸平名曰信樁此樁四旁封識老岸數尺不許抛土鎮壓致難認記另具直丈竿一條丈䉡一條立竿様樁之頂拽䉡信椿之上以量虚河深淺如䉡在竿十尺上則虚河深十尺矣必十尺以下所有尺寸乃算實工虚河尺丈籍而藏之夫役認宕時又各立小樁書某字第幾號某千長下百長某分管領夫協夫某應濬長若干名曰夫樁又按仰月形三濶丈尺之數為横丈竿三條俱畫尺寸做成木輪車架此三竿每查工之日必攜籍持竿拽䉡架車而往先稽號樁而知其宕之長短即據信樁様樁拽䉡豎竿而得其工之淺深工完之後沿河推運三竿車而驗其工之濶挾勤惰在目賞罰必加而後人力齊工不虚耳必信樁者虞様樁之上下其手也又虞老岸之偽增其髙也驗老岸驗信樁驗様樁驗三竿車而後偽無容矣迨工完之後復打水線以驗之有淤滯處隨令復濬務求線道流通方可決壩放水其或濬深水多打水線不便則于放水之後用木鵝沿河較覈木鵝者用直木一條長與河深平鐵裹其下端隨濬過尺寸處拴繫長繩兩岸拽之直立水中循水面而進遇鵝仆處則土髙水淺處也將該管千百長究治仍令撈泥務如原議分數須木鵝通行無滯然後為完工矣一分管員役諺曰寧管千軍莫管一夫言無紀律而難御也故督責之法必自下而上由小及大則工程易起故每宕百丈必用百長一名分催千丈必用千長一名督催然此役須㸃該區田多大户充之葢大户必愛惜身家又衆所推服令此輩各照信地千長立一小旗一大樁百長立一小樁各書應管丈尺分數千長催百長百長催小夫而水利官又専督千百長責任攸分大小相驅然後卑職不時親詣稽查考其工次别其勤惰量加賞罰即頑猾之民亦不得不盡其力矣附用千百長法千百長非身家才榦兼全者不能服衆邇來照將尖册㸃用十得八九乃法立弊生區書將大户田花分顯小户於册首㸃者半係小户除將該書枷號外其千長多用該區公正不足則令公正舉報乃㕘之捋尖始稱得人得人而工不難完矣一立章程賞勤罰惰以示鼓舞號段定矣宕認夫集矣催督有人矣然衆力難齊衆心難一不有以約之則勤者何所勸而惰者無以懲將使勤而為惰矣今定一河工比簿每十日親查一次是為一限假如缺河自水面而下應開深五尺則第一限要見工二尺為浮泥易做也二限黄泥難做要見功一尺五寸三限通完深濶如式工大者亦以此法寛立期限凡比工每百長管百夫就以十夫為一分千長管十百長就以一百長為一分又立一賞功單如依限如式開完者即給一功單日後遇有過犯許齎單贖罪以示勸其有奸頑惰功者即查千百長該管十分中一分不及限者責各小夫二分不及限者並責百長三分不及限者並責千長以示懲庶章程既立賞罰明而民自鼓舞莫敢躭延矣附比簿式都領夫田協夫田共實熟田算􅉽夫應開土方今􅉽字號歸見尺寸分工算該開河丈初限日開深尺開濶尺堆土離河丈尺月日起至日止二限日開深尺開濶尺堆土離河丈尺月日起至日止三限日開深尺開濶尺堆土離河丈尺月日起至日止一幹河甫畢刻期齊濬枝河凡田附幹河者少而附枝河者多葢河有枝幹譬之樹焉千百枝皆附一幹而生是幹為重矣然敷葉開花結子功在于枝不可忽也彼枝河切近圩坵灌溉之益所闗匪細若濬幹河而不濬枝河則枝河反髙水勢難以逆上而幹河兩旁所及有限枝河所經之多田反成荒棄即幹河之水又焉用之法當于幹河半工之時即耑官料理枝河責令各枝河得利業户俱照田論工一齊並舉仍責令該枝河千百長催督務要先期料理停妥俟幹河工完之日先放各枝河水放畢隨於各枝河口築一小壩俟小壩成然後決大壩而放河水其工之次第如此葢濬幹河時凡幹河水悉放之枝河而後大工可就濬枝河時凡枝河之水悉歸之幹河而後衆小工易成况枝河髙幹河低不過一決之力若先放湖水則方浚之初水勢必大此時枝河不能直入必假車戽勞費鉅矣濬河者往往於幹河告成之後心懈力疲置枝河於不問為民者亦曰姑俟異日也而前工荒矣葢機不可失而勞不可辭其工之始終又如此幹河之大者量給官銀枝河則専用民力焉徐光啟旱田用水疏謂欲論財計先當辨何者謂財唐宋之所謂財者緡錢耳今世之所謂財者銀耳是皆財之權也非財也古聖王所謂財者食人之粟衣人之帛也若以銀錢為財則銀錢多將遂富乎是在一家則可通天下而論甚未然也銀錢愈多粟帛將愈貴困乏將愈甚矣故前代數世之後每患財乏者非乏銀錢也承平久生聚多人多而又不能多生穀也其不能多生穀者土力不盡也土力不盡者水利不修也能用水不獨救旱亦可弭旱灌溉有法纖濶無方此救旱也均水田間水土相得興雲歊霧致雨甚易此弭旱也能用水不獨救潦亦可弭潦疏理節宣可蓄可洩此救潦也地氣越發既有時雨必有時暘此弭潦也不獨此也三夏之月大雨時行正農田用水之候若徧地耕墾溝洫縱横播水于中資其灌溉必減大川之水先臣周用曰使天下人人治田則人人治河也是可損決溢之患也故用水一利能違數害調燮隂陽此其大者不然神禹之功僅抑洪水而已抑洪水之事則決九川距海濬畎澮距川而已何以曰水火金木土穀惟修正徳利用厚生惟和一舉而萬事畢乎用水之術不過五法盡此五法加以智者神而明之變而通之田之不得水者寡矣水之不為田用者亦寡矣用水而生穀多穀多而以銀錢為之權當今之世銀方日增而不減錢可日出而不窮又以宋臣李綱所言節用救弊覈實開闔貿遷諸法設誠而致行之不加賦而國用足豈虚言也哉謹條例如左一用水之源源者水之本也泉也泉之别為山下出泉為平地仰泉用法有六其一源來處髙於田則溝引之溝引者於上源開溝引水平行令自入於田諺曰水行百丈過牆頭源髙之謂也但須測量有法即數里之外當知其髙下尺寸之數不然溝成而水不至為虚費矣其二溪澗傍田而卑於田急則激之緩則車升之激者因水流之湍急用龍骨翻車龍尾車筒車之屬以水力轉器以器轉水升入於田也車升者水流既緩不能轉器則以人力畜力風力運轉其器以器轉水入於田也其三源之來甚髙於田則為梯田以遞受之梯田者泉在山上山腰之間有土㝷丈以上即治為田節級受水自上而下入於江河也其四溪澗逺田而卑於田緩則開河導水而車升之急者或激水而導引之開河者從溪澗開河引水至其田側用前車升之法入於田也激水者用前激法起水於岸開溝入田也其五泉在於此用在於彼中有溪澗隔焉則跨澗為槽而引之為槽者自此岸達於彼岸令不入溪澗之中也其六平地仰泉盛則疏通而用之微則為池塘於其側積而用之為池塘而復易竭者築土椎泥以實之甚則為水庫以畜之平地仰泉泉之瀵湧上出者也築土者杵築其底椎泥者以椎椎底作孔膠泥實之皆令勿漏也水庫者以石砂瓦屑和石灰為劑塗池塘之底及四旁而築之平之如是者三令涓滴不漏也此蓄水之第一法也一用水之流流者水之枝也川也川之别大者為江為河小者為塘浦涇浜港汊沽瀝之屬也用法有七其一江河傍田則車升之逺則疏導而車升之疏導者江南之法十里一縱浦五里一横塘縱横脈散勤勤疏濬無地無水此井田之遺意宋人有言塘浦欲深濶謂此也其二江河之流自非盈涸無常者為之牐與壩釃而分之為渠疏而引之以入於田田髙則車升之其下流復為之牐壩以合於江河欲盈則上開下閉而受之欲減則上閉下開而洩之職所見寧夏之南靈州之北因黄河之水鑿為唐來漠延諸渠依此法用之數百里間灌溉之利纖濶無方寧城絶塞城中之人家臨流水前賢之遺可驗矣因此推之海内大川倣此為之當享其利濟亦孔多也其三塘浦涇浜之屬近則車升之逺則疏導而車升之其四江河塘浦之水溢入於田則堤岸以衞之堤岸之田而積水其中則車升出之堤岸者以禦水使不入也大則為黄河之帚小則為江南之圩宋人有言堤岸欲髙厚謂此也車升出之者去水而為萟稻或已萟而去其水使不没也其五江河塘浦源髙而流卑易涸也則於下流之處多為牐以節宣之旱則盡閉以留之潦則盡開以洩之小旱潦則斟酌開閤之為水則以準之水則者為水平之碑置之水中刻識其上知田間深淺之數因知牐門啟閉之宜也浙之寧波紹興此法為詳他山鄉所宜則傚也其六江河之中洲渚而可田者堤以固之渠以引之牐壩以節宣之其七流水之入於海而迎得潮汐者得淡水迎而用之得鹽水牐壩遏之以留上源之淡水職所見迎淡水而用之者江南盡然遏醎而留淡者獨寧紹有之也一用水之瀦瀦者水之積也其名為湖為蕩為澤為淀為海為波為泊也用瀦之法有六其一湖蕩之傍田者田髙則車升之田低則堤岸以固之有水車升而出之欲得水決隄引之湖蕩而逺於田者疏導而車升之此數者與用流之法畧相似也其二湖蕩有源而易盈易涸可為害可為利者疏導以洩之牐壩以節宣之疏導者懼盈而溢也節宣者損益隨時資灌溉也宋人有言牐竇欲多廣謂此也其三湖蕩之上不能來者疏而來之下不能去者疏而去之來之者免上流之害去之者免下流之害且資其利也吳之震澤受宣歙之水又從三江百瀆注之於海故曰三江既入震澤底定是也其四湖蕩之洲渚可田者隄以固之其五湖蕩之瀦太廣而害於下流者從其上源分之江南五壩分震澤以入江是也其六湖蕩之易盈易涸者當其涸時際水而藝之麥藝麥以秋秋必涸也不涸於秋必涸於冬則藝春麥春旱則引水灌之所以然者麥秋以前無大水無大蝗但苦旱耳故用水者必稔也一用水之委委者水之末也海也海之用為潮汐為島嶼為沙洲也用法有四其一海潮之淡可灌者迎而車升之易涸則池塘以蓄之閘壩堤堰以留之海潮不淡也入海之水迎而返之則淡禹貢所謂逆河也其二海潮入而泥沙淤墊屢煩濬治者則為牐為壩為竇以遏渾潮而節宣之此江南舊法宋元人治所用百年來盡廢矣近并濬治亦廢矣乃田賦則十倍宋元民貧財盡以此故也其濬治之法則宋人之言曰急流搔乘緩流撈剪淤泥盤吊平陸開挑今之治水者宜兼用之也其三島嶼而可田有泉者疏引之無泉者為池塘井庫之屬以灌之其四海中之洲渚多可灌又多近於江河而迎得淡水也則為渠以引之為池塘以蓄之一作原作瀦以用水作原者井也作瀦者池塘水庫也髙山平原與水違行澤所不至開挑無施其力故以人力作之鑿井及泉猶夫泉也為池塘水庫受雨雪之水而瀦焉猶夫瀦也髙山平原水利之所窮也惟井可以救之池塘水庫皆井之屬故易井之彖稱井養而不窮也作之之法有五其一實地髙無水掘深數尺而得水者為池塘以蓄雨雪之水而車升之此山原所通用江南海壖數十畝一環池深丈以上圩小而水多者良田也其二池塘無水脈而易乾者築底椎泥以實之其三掘土深丈以上而得水者為井以汲之此法北土甚多特以灌畦種菜近河南及真定諸府大作井以灌田旱年甚獲其利宜廣推行之也井有石井磚井木井柳井葦井竹井土井則視土脈之虚實縱横及地產所有也其起法有桔橰有轆轤有龍骨木斗有恒升筒用人用畜髙山曠野或用風輪也其四井深數丈以上難汲而易竭者為水庫以畜雨雪之水他方之井深不過一二丈秦晉厥田上上則有數十丈者亦有掘深而得醎水者其為池塘為淺井亦築土堆泥而水留不久不若水庫之涓滴不漏千百年不漏也其五實地之曠者與其力不能為井為水庫者望幸於雨則歉多而稔少宜令其人多種木種木者用水不多灌溉為易水旱蝗不能全傷之既成之後或取果或取葉或取財或取藥不得已而擇取其落葉根皮聊可延旦夕之命雖復荒嵗民猶戀此不忍遽去也語曰木奴千無凶年本朝怡賢親王敬陳水利疏竊直隸之水總會於天津以達於海其經流有三自北來者曰白河自南來者曰衞河而淀池之水貫乎白衞二河之間是為淀河白衞為漕艘要津邇年以來白河安瀾無泛溢之虞衞河發源河南輝縣至山東臨清州與汶河合流東下河身陡峻勢如建瓴不免冲潰泛溢查滄州之南有磚河青縣之南有興濟河乃分減衞水之故道又靜海縣之權家口直接寛河東趨白塘口入海俱應就現在河形逐段開疏築壩減水白塘口入海之處舊有石閘二座磚河興濟河之委應開直河一道歸併白塘出口澇則開閘放水可殺運河之漲而河東一帶積澇亦得藉以消洩旱則引流灌溉溝洫通而水利溥滄青靜海天津數百里斥鹵之地盡為膏腴之壤矣至東西二淀跨雄霸等十餘州縣廣袤百餘里畿内六十餘河之水會於西淀經霸州之苑家口會同河合子牙永定二河之水滙為東淀葢羣河之所瀦蓄也故治直隸之水必自淀始凡古淀之尚能存水者均應疏濬深廣併多開引河其已為田者必四面開渠中穿溝洫經緯條貫􅎃絡交通洩而不竭蓄而不盈而後圩田種稻旱澇有備魚鼈蜃蛤萑蒲之生息日滋小民享淀池之利不煩督責而淀常治矣子牙永定二河以淀為壑子牙為滹漳下流清濁二漳發源山西至武安縣交漳口會流經廣平正定而滹沱㵚陽大陸之水會焉天津歸海之水以子牙為正流其餘諸水附之以達於海今河身髙墊支港堙塞安得不冲不泛考任邱舊志子牙下流有清河夾河月河皆分子牙之流同趨於淀宜㝷求故道開決分注以緩奔放之勢永定河俗名渾河其源本不甚大縁水濁泥多淤髙必決其流既改故道遂堙應於每年水退後挖去淤泥俾現在河形不致淤髙庶保將來不復遷徙二河出口俱在東淀之西淀之淤塞實由於此臣等面奉上諭令引渾河别開一道今應自柳岔口引渾河稍北遶王慶坨之東北入淀子牙河現由王家口分為二股今應障其西流約束歸一兩河各依南北岸分道東流仍於淀内築堤使河自河而淀自淀河身務須深濬常使淀水髙於河水仍隨時挑濬毋令淤塞二河之濁流自不能為患而萬派之朝宗可得安瀾矣再各處隄防應俟水退之後照舊修築其大小溵淀俱可以圩田種樹如此之處不少統俟來春查明具奏怡賢親王敬陳畿輔西南水利疏京西一帶諸山實維太行之麓水勢因之盡朝宗而左騖故自西北山而下者皆東南會於兩淀自西南山而下者皆東北會於大陸二泊兩道分流畢由東淀達直沽入海則是今日所歴諸河即去冬查勘畿南河淀之上流也謹將勘過情形并開挖疏引措置水田事宜敬陳之盧溝以西諸水拒馬其鉅流也發源山西廣昌之淶山東流至房山鐵鎖崖分為二派一派東入涿州一派南入淶水合流而為白溝河他若馬頭河牤牛河胡良河皆入焉馬頭牤牛二河均難資其灌溉惟胡良所經地稱膏腴溝渠圩岸宛若江南擴而廣之房涿之間皆稻鄉也淶水一派石亭赤土樓村秔稻最盛而房之張坊至駱家莊涿之髙村及城之西北一路分渠引流具有條理又有王家莊茂林莊毛家屯等村溝渠現存改為旱田者約百餘頃土人以水源微弱為辭此河下流為白溝水勢甚盛未有下流盛而上源微者今應於房山鐵鎖崖分流之處深溝側注以均其來白溝之上相地建閘以節其去不惟王家茂林等處之百餘頃復為水田即河流所經之定興新城等縣亦沾澆灌之利矣拒馬之南為三易水曰濡曰武曰雹濡水出州北之窮獨山西折而南入定興與淶水合流源泉入焉源泉舊有石壩乃壅水開渠之遺址當時近水皆稻粱遶城皆芰荷今皆荒廢所應修復武水出武峯􅊐流經定興合濡水而歸河陽渡雹水出石獸崗流經安肅入安州之依城河三水具挾源泉分流疏渠其勢甚便鍾家莊唐湖川鹽臺陂民皆藝稻是在因地擴充務使水無遺利雹水之南曰徐水來自五迴嶺經滿城至安肅而曹水會焉合一畝方順龍泉諸水滙為依城河餘小泉以百數水源盛而水饒疏而引之不可勝用也滱水發源山西之靈邱由倒馬闗入唐縣為唐河横水自西北來會居民引以溉稻直達下素町畦相望經曲陽之鎮里髙門所溉尤多南入定州而白龍泉復來會之王耨張謙等村傍河皆圩岸應推廣以極水力所得稻田難以頃計矣唐河之南有沙河來自山西之繁峙入曲陽界合平陽河南流阜平當城胭脂二河行唐之郜河咸會焉其上流亦名􅉽水經自樂歴定州沿流多資灌溉他如阜平之崔家莊行唐之龍岡甘泉河新樂之何家莊浴河俱有水田而泉渠頗多堙廢徧行疏滌所獲尤多沙河之南有滋河源出山西枚回山經靈壽入行唐之張茂村伏焉至無極南孟社而復出疏鑿成渠皆天然水利也以上諸水盡攝於西淀自此而南水之載在圖經者惟滹沱最大發源山西繁峙之泰戲山由雁門入直隸之平山界治河綿曼等水皆入焉冶河源自山西平定州松嶺流至平山初不與滹水相合自二水合流而滹沱之勢遂猛屢奔潰為真定害治之故道本與洨合今應於入滹之處塞而斷之循其故流加以挖濬引入洨河則滹沱之猛可減洨河發源獲鹿之蓮花營洚北村二泉其源頗有堙塞至欒城合北沙河而流始大澆溉可資但苦岸髙難以升引應作壩以壅之開溝縱横俱可通流水漲則決壩以洩此萬全之利也洨河下流自寧晉入泊舊有石閘三座遺跡尚存現今兩岸居民尚戽水以澆畦麥其為水利之用亦可想見矣洨河以南諸水自贊皇來者有槐水有午水自臨城來者有泲水泥河泜河沙河自内邱來者有李陽河七里河小馬河柳河或名在而跡已湮或源存而流已徙然石橋宛在斷碣猶存前人洩澇歸泊之路今皆任民耕種以致山川暴下瀰漫四野貪尺寸之利貽害無窮今已委員查勘酌量疏通令漫水有歸田疇不受其害小柳河之東為聖女河泉從地湧引流可田南為白馬河居民建閘溉田下流遂湮水漲之時以鄰為壑故北之聖女南之牛尾二河俱被其衝突為任邑害今應濬入泊之路嚴閉閘之禁害去而利乃可興矣又南為百泉河出邢臺之風門山歴南和等處有閘十三座溉田數百頃而任縣不沾一勺之潤今應立法均利自下而上各以三日為期則沿流一帶皆水田也但河身尚隘宜展而倍之百泉之南為野河源出邢臺之西山下入沙河沙河源出山西遼州之湡水至沙河縣分為二支一流至任縣為灃河一流至南和為乾河抵任縣合洺河沙河縣之普潤閘溉田四十餘頃洺河亦發源於遼州入直隸與沙河合近年常苦涸竭若引㵚陽之水假沙洺之道兩河之間俱可沾其浸溉㵚陽河諸水之鉅流也源出河南磁州之神麕山至邯鄲會渚沁二水至寧晉貫大泊而出抵冀州與滹沱水合所經之處疏渠灌稻元郭守敬曾言可灌田三千頃明建惠民等八閘民以殷富近為磁州民築壩截流八閘已廢其六今應照舊修復以上諸水入任縣泊者謂之南泊入寧晉泊者謂之北泊二泊固諸河之委滙皆禹貢大陸澤故地也南泊舊注㵚河自滹漳闐淤河髙於泊難以議開唯谿爪一河不足消全泊之漲今查穆家口河道原自通流略加疏濬為力無多北泊周圍百里地窪水深亦恃㵚河為宣洩之路自滹沱南徙故道漸湮東注河身亦多淺隘今應大加展挖務俾寛深如此則南泊之水歸穆家口而咽喉已通北泊之水入㵚陽河而尾閭亦快積澇日消舊㟁漸復涸出之地尚可以數計哉然後作小堤以繞之多開斗門疏渠種稻則沮洳之場皆樂土也惟滹沱一水源逺流長獨行赴海而善決善淤遷徙靡常自古患之自去年北徙直趨束鹿奔軼四出官民請疏入泊之道然此道本非正流闐淤已成平地旋加挖掘工費甚繁今查有乾河一道係滹水入㵚舊路自張岔開挑六七里便可直接決河從此改流由焦岡而入㵚水沛然而東寧晉泊既逺淤壅之患即束鹿深州等處亦無冲潰之害矣畿南州縣地方遼濶臣等未及遍歴者已遣効力人員悉心經理即當酌量緩急次第興工以仰副我皇上愛養民生興修水利之至意可也怡賢親王敬陳京東水利疏臣等歴看京東之水若北河若薊若浭以及永平之欒河皆經流之最大者白河為漕運要津農田之蓄洩不與焉然河西數十里内止有鳳河一道别無行水之溝亦無瀦水之澤一有雨潦不但田廬瀰漫即運河堤岸亦宛在水中查涼水河源自京城西南由南苑出𢎞仁橋至張家灣入運請於髙各庄開河分流循鳳河故道疏濬由大河頭入仍於分流之處各建一閘以時啓閉庶積潦有歸且可沾溉田疇矣運河之東則香河其下為寶坻沿河堤岸坍頹應飭修築并於牛牧屯以上斜築長堤以障東溢再通州烟郊以南之水皆滙於窩頭分為二股一股南入運河一股東流經香河縣之吳村滙於百家灣入七里屯達於寶坻查七里屯以上大半淤塞地皆沙鹵難以開鑿若將南流一股疏通深暢則經流歸於運河又夏店之箭杆河經香河入寶坻之溝頭河漫流入淀應從溝頭疏濬會七里屯之水達於大河水有攸歸農田亦有利焉寶坻西北接壤薊州薊州運河自三台營會諸山之水東南至寶邑會白龍港又南經玉田豐潤合浭水達海河身深濶源逺流長棄之則害用之則利請先築河堤務須髙厚然後於下倉以南建石橋空下閘水升注兩岸以資灌溉多開溝澮自近而逺縱横貫注用之不乏矣浭水發源遷安之泉庄委折蛇行土人有三灣六曲之稱河道狹而堤堰卑東決則淹豐潤西決則淹玉田應於劉歆莊王木匠庄各開直河一道舊流亦無令壅塞俾得兩處分瀉可無冲決之患至沿河一帶建閘開渠數十里内無非沃壤土人動言浭水湍急為患不知敗稼之洪濤即長稼之膏澤現在近河居民引流種菜千畦百隴在在皆然曾未見利於圃而不利於農者也玉田本屬稻鄉藍泉河出藍山西南流入薊運夾河瀦水為湖伏秋水發一望彌漫應將河身疏通深廣束以堤防西北另開小河一道引水入河下流使湖無泛濫而河得安瀾仍於曲河頭建閘開溝引水繞東湖而南湖内外田地均沾灌溉再於湖心最下之處圩為水櫃以濟泉水之不足其利可以萬全又泉河發源小泉山東流會孟家泉煖泉達於薊運河現在引流種稻所當搜滌泉源多方宣布以廣水利者也豐潤負山帶水湧地成泉疏流導河隨取而足如城東之天宮寺牛鹿山鐵城坎以及沿河沮洳之處可種稻田數百畆多至千餘畝而止縣南接連大泊一帶平疇萬頃土膏滋潤内有王家河㲼河龍堂灣泥河共四道春夏不涸而田疇不沾其利為可惜也應請滌其源疏其流壩以壅之堤以蓄之東北引陡河為大渠横貫四河中間多開溝洫瀠洄宣布數十里内取之左右皆逢其源而泊内多可耕之田矣陡河自灤州之館山東流繞縣境而南旁河村庄曰上稻地下稻地南曰官渠葢昔年圩田種稻之地遺趾尚存若沿河堅築隄防多設壩閘以時蓄洩疆理一循舊跡不勞區畫而兩岸良田不可數計至板橋狼窩舖等處東連榛子鎮一帶流泉大槩入灤州境灤河洶湧滂沛推壅沙石既不可束以隄防亦難以資灌溉然各屬支流藉以滙歸故少漲溢之患而涓瀝皆農田之資灤州近城之别故河淤塞漫流數十年於兹若照舊疏濬不惟城闉不受侵囓而西南負郭之田皆收浸潤之利城南則有龍溪出五子山東即清河之源城西則有沂河經芹菜山南折而東又轉而南二河之間地勢平衍土岡環之東南一望無際皆可播流而溉也西南則游觀庄之靳家黄坨河引泉可田南則稻河吳家龍堂等處引河可田西北則自沙河驛之東榛子鎮之西龍溪黄崖煖會於牤牛河經雙橋而圍山瀑水入之流清而駛地平而潤沿岸一帶建壩開溝無處非水耕火耨之地矣灤州之北為遷安城北徐流營湧出五泉合流入桃林河又三里橋湧泉流出灤河蠶姑廟泉河與灤河相接龍王廟之泉頭流為三里河經十里橋而南夾河皆可田黄山之麓一泓湛然西入石渠即浭河自出自泉庄至新集地與水平播之可種稻田百餘頃盧龍縣北之燕河營湧泉成河及營東五泉漫溢四出至張家莊一帶皆可挹取為樹藝之利京東土壤膏腴甲於天下臣等勘過情形大槩如此惟是工程浩大地方遼濶隨宜酌量容有變通之處統俟工完彚齊送册慕天顔請浚孟河白茆河疏臣前疏請浚白茆港孟瀆河福山港三丈浦黄四港申港包港安港西港七丫等處葢既鑒上年之竒旱預料今年之大澇從長籌畫實非泛言雖部議未邀即允然闗切地方民事豈容緩圖臣再四籌畫先擇其不易而費簡者若七丫一帶業已勸民濬滌淤沙通崇明之運道福山港三丈浦道里民自願分役疏通再如黄四申包安西等港另行酌量緩急多方設法次第興舉外惟是常熟之白茆港係蘇常諸水東北出江第一要河自明季失修湮塞成陸旱則潮汐不通澇則宣洩無路若此港一通不惟常熟水旱無虞即崑山長洲太倉無錫江隂無不共沾其利又武進之孟瀆河係常鎮諸水歸江要道凡髙溧西北諸水競趨東南則流注於宜興金壇更轉洩於丹陽武進惟藉孟河一口出江今亦年久失修河身壅積武進以西丹陽以東宜興金壇以北諸水歸江阻道於是水旱並災人力難施矣此兩河者蓄洩之利等於劉淞淤塞之形亦不亞於劉淞今劉淞疏通蘇松常資其益者甚鉅白茆孟河淤塞蘇常鎮被其害者亦復不小此臣身在地方目擊親切日夜籌畫而不敢忽者也是以分委道員細加察勘據各該道請照劉淞事例先動正帑濟工不惟水利克修現在望賑饑民得以赴工趁食不設賑而民已全活數善備焉總漕桑格等覆勘疏臣等會勘得下河各州縣地方歴被水災皆縁上源受水之處甚多而洩水入海之處甚少兼之各邑通水故道俱多淤澱以致泛濫横溢成此積水之患也今欲救此災黎舍開浚故道多分水勢之法别無善䇿是以前疏内議修芒稻河者欲分髙郵邵伯兩湖之水入江使不至下河也議挑曹家灣楊家絆七節橋者係開通髙郵邵伯兩湖淤塞之水路使通芒稻河於下江也議挑車兒埠之滔子河者欲使泰州所受之水由苦水洋入海也議挑澗河者欲分運河之水流於澗河由射陽湖下海使不至髙郵也議挑海陵溪者欲使髙郵所受之水通岡門下海也議挑車路白塗海溝三河者欲使興化所受之水由丁溪草堰白駒入海也議挑鰕鬚二溝戛梁河并朦朧西首淤塞之射陽湖者欲使髙寶興泰鹽山等處之水俱由廟灣下海此海口為下河最窪最寛之地洩各處上流之水尤為宣暢也今臣細加覆勘與前無異目今水勢汪洋民間被淹田地多未涸出者皆由水道澱塞不通之故若使挑濬之工一舉水循故道下流歸海田地自然涸出實為大有益於生民欽定授時通考卷十八
