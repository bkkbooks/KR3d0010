body:
  text: 農餘木一松柏檜楸杉椿梧桐楮槐榆柳檉栁櫸栁箕柳楊松松竦幹虬枝磥砢多節嵗久皮皴望若龍鱗李時珍曰百木之長猶公故字従公四時常青不改柯葉三針者為括子松七針者為果松千嵗之松下有茯苓上有絲乂有赤松白松鹿尾松其産深山峭壁偃蹇離竒者其根為巖石所礙下有磐石則上為偃葢非其性也事類全書栽松春社前帶土栽培百株百活舎此時決無生理也斫松木須五更初便削去皮後無白蟻山人斫老松根取松脂燃之以代油燭亦貧家之利農桑通訣插松用驚蟄前後五日斬新枝斸阬入枝下泥杵𦂳相視天隂即插遇雨十分生無雨即省分數種松柏法八九月中擇成熟松子柏子同去臺収頓至來春春分時甜水浸子十日治畦下水土糞漫散子於畦内如種菜法或單排㸃種上覆土厚二指許畦上搭短棚蔽日旱則頻澆常須濕潤至秋後去棚長高四五寸十月中夾薥稭籬以禦北風畦内亂撒麥糠覆樹令稍上厚二三寸止南方宜微葢至榖雨前後手爬去麥糠澆之次冬封葢亦如此二年之後三月中帶土移栽先橛區用糞土相合内區中水調成稀泥植栽於内擁土令區滿下水塌實無用杵築脚踏次日有裂縫處以脚躡合常澆令濕至十月祛倒以土覆藏毋使露樹至春去土次年不須覆栽大樹者於三月中移廣留根土謂如一丈樹留土方三尺地逺移者二尺五寸一丈五尺樹留土三尺或三尺五寸用草繩纒樹根上樹大者従下剸去枝三二層樹記南北運至區處栽如前法種樹書栽松須去尖大根惟留四邊鬚根則無不盛春分後勿種松秋分後方冝種法大槩與竹同只要根實不令動揺自然活齊民要術油松法將青松斫倒去枝于根上鑿取大孔入生桐油數斤待其滲入則堅久不蛀他木同本草松子出遼東雲南者尤大食之香美又松脂一名松膏一名松香一名松膠一名松肪一名􅅹青皆為物用柏柏一名椈爾雅云柏椈隂木也凡木皆向陽柏獨向隂指西故字従白西方正色也樹聳直皮薄肌膩三月開細瑣花結實成毬狀如小鈴多瓣霜後瓣裂中有子大如麥芬香可愛處處有之古以生泰山者為良今陜州冝州密州皆佳而乾陵尤異木之文理多為雲氣人物鳥獸川柏亦細膩以為几案光滑悦目農政全書種柏九月中柏子熟時採俟來年二三月間用水淘取沉者着濕地二三日淘一次候芽出將劚熟地調成畦水飲足以子匀撒其中覆細土半寸再以水壓下二三日澆一次勿太濕勿太乾既生四圍竪矮籬䕶之恐為蝦蟇所食常澆水糞俟長高數尺分栽又秋時剪小枝二三尺亦可插活檜檜柏葉松身葉尖硬亦謂之栝今人名圓柏以别側柏爾雅翼又有一種别名檜柏不甚長其枝葉乍檜乍柏一枝之間屢變人家庭宇植以為玩老學菴筆記海檜有二種海檜夭矯堅瘦皆天成又有刻削盤屈而成者名土檜海檜絶難致几人家所有大扺土檜也農桑通訣檜種如松法插枝者二三月檜芽蘖動時先熟斸黄土地成畦下水飲畦一遍滲定再下水候成泥漿斫下細如小指檜枝長一尺五寸許下削成馬耳狀先以杖刺泥成孔插檜枝於孔中深五六寸以上栽宜稠密常澆令潤澤上短矮棚蔽日至冬換作煖廕次年二月月去後候樹高移栽如松柏法便民圖松杉柏檜俱三月下種次年三月分栽無不活洞庭陸氏曰移松杉柏檜冬至及年盡雖不帶土根亦活正月九分活二月七分活清明後半活楸楸梓榎爾雅曰槐小葉曰榎大而皵楸小而皵榎椅梓鼠梓乂曰如木楸曰喬郭璞注曰槐當為楸楸細葉者為榎老乃皮粗皵者為楸小而皮粗皵者為榎椅梓即楸楰楸屬今人謂之苦楸江東人謂之虎梓詩義疏曰楸梓之疏理色白而生子者為梓者説文曰檟楸也然則楸梓二木相類者也白色有角名為梓似楸有角者名為角楸或名子楸黄色無子者為栁楸世人見其色黄呼為荆黄楸也然楸之與梓本同未異梓名木王植于林諸木皆内拱造屋有此木則羣材皆不震楸木濕時脆燥則堅良材也榎檟也亦楸屬葉大而早脱故謂之楸葉小而早秀故謂之榎齊民要術冝割地一方種之梓楸各别無令和雜又種梓法秋耕地令熟秋未冬初梓角熟時摘取曝乾打取子耕地作壟漫散即再勞之明年春生有草枝令去勿使荒没後年正月間劚移之方步兩步一樹此樹須大不得㮣栽即無子可於大樹四面掘坑取栽移之一方兩步一根兩畝一行一行百二十株五行合六百株十年後一樹千錢柴在外車板盤合樂器所在任用勝於松柏農政全書春月斷其根瘞於土遂能發條取以分種又花葉飼猪並能肥大且易養杉杉一名檆爾雅云披檆一名沙一名㯳類松而幹端直大者數圍高十餘丈文理條直葉麤厚㣲扁附枝生有㓨至冬不凋結實如楓有赤白二種赤杉實而多油白杉虚而乾燥有斑文如雉尾者謂之野鷄斑入土不腐燒灰最發火藥種樹書插杉枝用驚蟄前後五日斬新枝鋤開根入枝下泥杵𦂳視天隂則插插了遇雨十分無雨即省分數農政全書插杉法江南宣歙池饒等處山廣土肥先將地耕過種芝蔴一年來嵗正二月氣盛之時截嫩苗頭一尺二三寸先用橛舂穴插下一半築實離四五尺成行密則長稀則大勿雜他木每年耘鋤至高三四尺則不必鋤椿椿集韻作櫄禹貢作杶左傳作橁今俗名香椿本草陳藏器云俗呼為猪椿易長而有夀南北皆有之木身大而實其幹端直紋理細膩肌色赤皮有縦紋易起農桑輯要木實而葉香有鳳眼者謂之椿木疎而氣臭者謂之樗又曰有花而莢者謂樗無花不實謂椿廣羣芳譜椿樗二木形幹相類無花木身大幹端直者為椿有花木身小幹多迂矮者為樗一類二種也農政全書椿宜於春分前後栽之又其葉自發芽及嫩時皆香甘生熟鹽醃皆可茹梧桐梧桐爾雅曰榮桐木又曰櫬梧郭璞注云即梧桐也今人以其皮青號曰青桐又名櫬皮其木無節直生理細而性𦂳四月開花五六月結子莢長三寸許五片合成老則開裂如箕名曰櫜鄂子綴其上大如黄豆雲南者更大可生噉亦可炒食遁甲書云梧桐可知月正閏嵗生十二葉一邊六葉従下數一葉為一月有閏則十三葉視葉小處則知閏何月立秋之日如某時立秋至期一葉先墜又有白桐一名華桐一名泡桐華而不實蔡邕月令曰桐始華桐木之後華者也岡桐一名油桐一名荏桐一名罌子桐一名虎子桐實大而圓取子作桐油入漆及油器物艌船為時所須人多偽為之惟以篾圏撣起如皷面者為真海桐生南海及雷州白而堅韌可作繩入水不爛齊民要術青桐九月収子二三月中作一步圓畦種之方大則難裹所以須圓小治畦下水一如葵法五寸下一子少與熟糞和土覆之生後數澆令潤澤此木宜濕故也當嵗即高一丈至冬竪草於樹間令滿外復以草圍之以葛十道束置不然則湅死也明年三月中移植於㕔齋之前華浄妍秀極為可玩明年冬不須復裹成樹之後剝下子一石子於葉上生多者五六少者三四也炒食甚美多噉亦無妨也白桐無子冬結似子者乃是明年之花房亦遶大樹掘坑取栽移之成樹之後任為樂器青桐則不中用於山石之間生者作樂器尤佳青白二桐並堪車板盤合屧等用作農政全書正二月内以黄土拌鉅末少許或盆或地上俱可種上覆土末寸半許時時用水澆灌使土長濕待長尺餘移栽冬間不用苫葢又江東江南之地惟桐樹黄栗之利易得乃將旁近山塲盡行鋤轉種芝蔴収畢仍以火焚之使地熟而沃首種三年桐其種桐之法要在二人並耦可順而不可逆一人持桐油一瓶持種一籮一人持小鋤一把將地㔇起即以油少許滴土中隨以種置之次年苖出仍要耘耔一遍此桐三年乃生首一年猶未盛第二年則盛矣生五六年亦衰即以栗櫼剝之一二年其栗便生且最大但其味畧滯耳首種三年桐為利近速圖久逺之利仍要樹千年桐法亦如前種黄栗之法候秋季落子多収擇高厚之處掘地為坑下用礱糠鋪底將種放下上用稻草葢定以土覆之俟來年春氣盛時治地成畦約一尺二寸成行分種空地之中仍要種豆使之二物争長又可使直而不曲待長一二尺即將山塲依前法燒鋤過約濶五尺成行移苖栽之次年耘耔楮楮一名榖一名榖桑有二種雄者皮斑而葉無椏叉謂之斑榖三月開花成長穗如栁花狀不結實雌者皮白無花葉有椏似葡萄葉開碎花結實如楊梅其實初夏生大如彈丸青緑色六七月成熟漸深紅八九月采實名楮桃一名穀實陸璣詩疏構幽州謂之穀桑或曰楮桑荆揚交廣謂之穀中州人謂之楮食其嫩芽可當菜茹酉陽雜俎穀田久廢必生構葉有瓣曰楮無曰構本草李時珍曰楮本作柠其皮可績為紵故也又凡穀樹雄者不結實歉嵗人采花食之雌者實如楊梅半熟時水澡去子蜜煎作果食齊民要術宜澗谷間種之地欲極良秋上楮子熟時多収浄淘曝令燥耕地令熟二月耬耩之和麻子漫散之即勞秋冬仍留麻勿刈為楮作煖若不和麻子種卒多凍死明年正月初附地芟殺放火燒之一嵗即没人不燒者瘦而長亦遲三年便中斫未滿三年者皮薄不任用斫法十二月為上四月次之非此兩月而斫者則多枯死也每嵗正月常放火燒自有乾葉在地足得火然不燒則不滋茂也二月中間斫去惡根斸者地熱楮科亦以留濶澤也移栽者二月蒔之亦三年一斫三年不斫者徒失錢無益也楮地賣者省功而利少煮剝賣皮者雖勞而大其柴足以供然自能造紙其利又多種三十畝者嵗斫十畝三年一徧嵗収絹百疋廣州記蠻夷取穀皮熟搥為掲裏􅄢布以擬毡甚煖也其木腐後生菌耳味甚佳農桑通訣南方鄉人以穀皮作衾甚堅好鬻之實為貧家之利焉槐槐爾雅曰櫰有青黄白黑數種白槐似柟而葉差小其葉細而包青絲者直謂之槐有守宫槐一名紫槐幹弱花紫晝合夜開又色黑者為猪屎槐材不堪用四五月開黄花未開時狀如米粒採取曝乾炒過煎水染黄甚鮮青槐花無色不堪用七八月結實作莢如連珠中有黒子以子多者為好淮南子曰槐之生也季春五日而目十日而䑕耳更旬而始規二旬而葉成諸槐功用大畧相等木有極高大者材實重可作器物齊民要術槐子熟時多収擘取數曝勿令蟲生五月夏至前十餘日以水浸之如浸麻子去也六七日當芽生好雨種麻時和麻子撒之當年之中即與麻齊麻熟刈去獨留槐槐既細長不能自立根别樹木以繩欄之冬天多風雨繩欄宜以茅裹不則傷皮成痕瘢也明年劚地令熟還於下種麻脅槐令長三年正月移而植之亭亭條直千百若一所謂蓬生麻中不扶自直若隨宜取栽匪直長遲樹亦曲惡宜於園中割地種之若園好未移之間妨廢耕墾也農政全書初生嫩芽煠熟水泡去苦味可薑醋拌食曬乾亦可代茶飲也榆榆爾雅曰榆白枌又曰藲荎註曰枌榆先生葉却著莢皮色白藲荎今之刺榆也廣志曰有姑榆有郎榆案今世有刺榆木甚牢肕可以為犢車材梜榆可以為車轂及器物山榆可以為蕪荑凡種者宜種刺挾兩種利者為多其餘軟弱例非佳好之木也四民月令二月榆莢成及青収乾以為旨蓄旨美也蓄積也司部収青小蒸曝之至冬以釀酒滑香宜養老詩云我有旨蓄亦以御冬也色變白將落可作􅛙䤅隨早晏勿失其適􅛙音牟䤅音頭榆醬齊民要術榆性扇地其隂下五穀不植隨其高下廣狹東西北三方所扇各與樹等種者宜於園地北畔秋耕令熟至春榆莢落時収取漫散犁細畊勞之榆生共草俱長明年正月初附地芟殺以草覆上放火燒之一根上必十數條俱生止留一根強者餘悉搯去之一嵗之中長八九尺矣不燒則長遲矣後年正月二月移栽之初生即移者喜曲故須叢林長至三年乃移栽初生三年不用採葉尤忌採心採心則科茹大長更須依法燒之則依前茂矣不用剝沐剝者長而細又多瘢痕不剝則短麄而無病諺曰不剝沐十年成轂言易麄也必欲剝者宜留二寸於壍坑中種者以陳屋草布壍中散榆莢於草上以土覆之燒亦如法陳草速朽肥良勝糞無陳草者用糞糞之亦佳不糞雖生而瘦既栽移者燒亦如法也又種榆法其餘地畔種者致雀損穀既非叢林率多曲戾不如割地一方種之其田土薄地不冝五榖者唯宜榆及白楊地須近市賣柴莢葉省功也梜榆刺榆凡榆三種色别種之勿令和雜梜榆莢葉味苦凡榆莢味甘甘者春時將煮賣是須别也先耕地作壟然後散榆莢蠪者看好料理又易三寸一莢稀穊得中散訖勞之榆生芟殺燒斫一如前法三年春可將莢葉賣之五年之後便堪作椽不梜者即可斫賣一根十文梜者鏇作獨樂及盞一箇三文十年之後魁椀瓶榼器皿無所不任一杭七文一魁二十瓶榼器皿一百文也十五年後中為車轂及蒲桃􅀢􅀢一口值二百車糓一具值絹三疋其嵗嵗科簡剝治之功指柴顧人十束雇一人無業之人争來就作賣柴之利己自無貲嵗出萬束一束三文則三十貫莢葉在外也况諸器物其利十倍於柴十倍嵗収三十萬斫後復生不勞更種所謂一勞永逸能種一頃嵗収千疋唯須一人守䕶指揮處分既無牛耕種子人功之費不慮水旱風蟲之災比之穀田勞逸萬倍男女初生各與小樹二十株比至嫁娶悉任車轂一樹三具一具值絹三疋成絹一百八十疋聘財資遣麄得充事農桑通訣榆醬能助肺殺諸蟲下氣榆葉曝乾搗羅為未鹽水調匀日中炙曝天寒於火上熬過拌菜食之味頗辛美榆皮去上皺澁乾枯者將中間嫩處剉乾磑為粉當歉嵗亦可代食昔沛豐嵗饑民以榆皮作屑煮食之人賴以濟焉農政全書榆根皮作麵可和香劑嫩葉煠浸淘浄可食榆錢可羮又可蒸糕餌榆皮濕搗如糊粘瓦石極有力汴洛以石為碓嘴用此膠之栁栁易生之木也性柔脆北土最多枝條長軟葉青而狹長其長條數尺或丈餘􅀈􅀈下垂者名垂栁木理最細膩陳藏器曰江東人通名楊栁北人都不言楊楊樹枝葉短栁樹枝葉長李時珍曰楊枝硬而揚起故謂之楊栁枝弱而垂流故謂之栁葢一物二種也栁至春晚葉長成花花中結細子如粟米大細扁而黑上帶白絮如絨名栁絮又名栁絨隨風飛舞着毛衣即生蟲入池沼隔宿化為浮萍乂慿栁可以為楯車輞雜材及椀陶朱公書凡種栁千樹則足柴十年以後髠一樹得一載嵗髠二百樹五年一週齊民要術種栁正月二月中取弱栁枝大如臂長一尺半燒下頭二三寸埋之令没常足水以澆之必數條俱生留一根茂者餘皆所法别竪一柱以為依生每一尺以長繩柱欄之若不欄必為風所摧不能自立一年中即高一丈餘其旁生枝葉即搯去令直聳上高下任人取足便搯去正心即四散下垂婀娜可愛若不搯心則枝不四散或邪或曲生亦不佳也六七月中取春生少枝種則長倍疾少枝葉青氣壯故長疾也下田停水之處不得五穀者可以種栁八九月中水盡燥濕得所時急耕則钃楱之至明年四月又耕熟勿令有塊即作塲壟一畝三壟一壟之中逆順各一到塲中寛狹正似蔥壟従五月初盡七月末每天雨時即觸雨折取春生少枝長疾三嵗成椽比於餘木雖㣲脆亦足堪事一畝二千六百六十根三十畝六萬四千八百根根直八錢合収錢五十一萬八千四百文百樹得柴一載合柴六百四十八載直錢一百文柴合収錢六萬四千八百文都合収錢五十八萬三千二百文嵗種三十畝三年種九十畝嵗賣三十畝終嵗無窮檉栁附檉栁爾雅曰檉河栁乃河旁赤莖小楊植生水旁皮正赤如絳枝葉如松一名雨師一名赤檉本草云天將雨檉先起氣應之負霜不凋乃木之聖故字従聖一名河栁一名人栁一名三眠栁一名觀音栁一名長壽仙人栁幹小枝弱葉細如絲一年三次作花花如蓼花穗長二三寸色微紅櫸栁附櫸栁一名鬼栁本草云其樹高舉其木如栁故名爾雅注作柜即孟子所謂把栁也多生溪澗側高大者四五丈合二三人抱其葉似栁非栁似槐非槐鄭樵通志云櫸乃榆類其實亦如榆錢鄉人採其葉為甜茶便民圖種把栁二月間先將田用糞壅灌戽水耕平以栁鬚斷作三寸許每人一握隨田廣狹併力一日齊種頻以濃糞澆之有草即用小刀剜出田勿令乾八月斫起刮去栁皮曬乾為器根旁敗葉掃浄則不蛀至臘月間將重長小條復斫去長者亦可為器舊根常留箕栁附種箕栁法山澗河旁及下田不得五穀之處水盡乾時熟耕數遍至春凍釋于山陂河坎之旁刈取其栁三寸栽之漫散即勞勞訖引水停之至秋任為簸箕五條一錢嵗収萬錢山栁赤而脆河栁白而韌楊楊有二種白楊青楊白楊一名高飛一名獨搖㣲帶白色高者十餘丈性勁直堪為屋材青楊又有二種一種梧桐青楊身􅋍直高大一種身矮多岐枝不堪用楊與栁自是二物栁枝長脆葉狹長楊枝短硬葉圓濶北方材木全用楊槐榆栁四種是以人多種之齊民要術種白楊秋耕地熟至正月二月中以犁作壟一壟之中以犂逆順各一到塲中寛狹各似作蔥壟作訖又以鍬掘底一坑作小塹斫取白楊枝大如指長三尺者屈着壟中以土壓上令兩頭出土向上直竪二尺一株明年正月中剝去惡枝一畝三壟一壟七百二十株一根兩株一畝四千三百二十株三年中為蠶擿都􅀈反五年任為屋椽十年堪為棟梁以蠶擿為率一根五錢一畝嵗収二萬一千六百文柴又作梁埽住在外嵗種三十畝三年九十畝一年賣三十畝得錢六十四萬八千文周而復始永世無窮比之農夫勞逸萬倍去山逺者實宜多種千根以上所求必備博聞録楊栁根下先理大蒜一枚不生蟲種樹書種水楊須先用木樁釘穴方入楊庶不損皮易長臘月二十四日種楊樹不生蟲欽定授時通考卷六十七
