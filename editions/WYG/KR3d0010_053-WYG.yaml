body:
  text: 欽定四庫全書欽定授時通考卷五十三勸課本朝重農織圖目録浴蠶二眠三眠大起捉績分箔採桑上簇炙箔下簇擇繭窖繭練絲蠶蛾祀謝緯織絡絲經染色攀花剪帛成衣織第一浴蠶聖祖仁皇帝御製豳風曾著授衣篇蠶事初興穀雨天更考公桑傳禮制先宜浴種向晴川世宗憲皇帝御製門多楊桞風溪漲桃花水村酒醖羊羔春閨浴蠶子纎纎弄翠盆戢戢蠕香紙雪繭與冰絲婦功從此始高宗純皇帝御製恭和聖祖仁皇帝原韻曾讀豳風七月篇遲遲日影麗光天新蠶未起先宜浴盆滿明波人滿川皇帝御製衣裳始上古教織自西陵考禮婦功重浴蠶績事興化生喜温暖澣濯避嚴凝盆漾柴灰水匀齊時可乗織第二二眠聖祖仁皇帝御製柔桑初剪緑參差陌上歸來日正遲村舍家家簾幕靜春蠶新長再眠時世宗憲皇帝御製百舌鳥初鳴再眠蠶在箔陌桑青已柔隄草緑猶弱正宜旭日和惟恐春寒作媍忙兒不知棗栗頻啼索高宗純皇帝御製恭和聖祖仁皇帝原韻女桑揺緑葉參差曉起人慵欲採遲雙燕入簾春晝靜再眠恰是仲春時皇帝御製治室務精潔初生連蟻微布筐置槌架移箔捲簾幃頻以柔桑飼毋勞纎手揮二眠須静待色變候無違織第三三眠聖祖仁皇帝御製紅女勤劬日載陽鳴鳩拂羽恰條桑只因三卧蠶將老剪燭頻看夜未央世宗憲皇帝御製春風拂簾櫳春露繁桑柘遶箔理三眠燒燈遶五夜大姑席未安小姑梳未暇喔喔唱隣雞提筐邀比舍高宗純皇帝御製恭和聖祖仁皇帝原韻淑景頻催喜載陽微行歩歩採條桑三眠三起新蠶老篝火看時夜未央皇帝御製已近清和月黄花映箔初三眠宜少飼一罅不令疎晝夜功無閒平匀葉有餘挑燈頻體驗勤視寸心舒織第四大起聖祖仁皇帝御製春深處處掩茅堂滿架吳蠶婦子忙料得今年收繭倍氷絲雪縷可盈筐世宗憲皇帝御製今春寒暖匀南陌條桑好箔上葉憂稀枝頭採戒早不知春幾多但覺蠶欲老阿誰紅粉粧㝷芳踏堤草高宗純皇帝御製恭和聖祖仁皇帝原韻春光荏苒去堂堂無那黄鶯一日忙箔上吳蠶方大起氷絲色映緑筠筐皇帝御製倐度三眠序脱膚大起時足腸盈衆箔健食藴千絲心已隨春老室湏向暖移桑乾飼無歇奚用露華滋織第五捉績聖祖仁皇帝御製連宵食葉正紛紛風雨聲喧隔戸聞喜見新蠶瑩似玉燈前檢㸃最辛勤世宗憲皇帝御製生熟乃有時老嫩莫紛糅恐煩姑與嫜服勞夜繼晝松火發瓦盆星芒射階霤次第了架頭怱忙顧童幼高宗純皇帝御製恭和聖祖仁皇帝原韻蠶筐髙下架頭紛食葉聲煩似雨聞捉績欣看光練練一家婦女共辛勤皇帝御製欲老食偏健雨聲隔戸聞炙盆火湏熟捉績視宜勤減飼絲將足依時箔欲分練光瑩似玉珍惜勿紛紜織第六分箔聖祖仁皇帝御製愛逢晴日映疎簾新緑如雲葉漸添天氣晴和蠶事廣移筐分箔徧茅檐世宗憲皇帝御製新燕掠風輕新蠶偕日長分箔天氣暄食葉雨聲響少媍採林間倦歸歇陌上門前桑騷騷黄雲接青壤高宗純皇帝御製恭和聖祖仁皇帝原韻柳絮飛時晝下簾柔桑蘩細食徐添却憑纎手為分箔未暇朝餐日過檐皇帝御製春深益滋長薄箔遍分藏眠起驗無舛衆多虞有妨迴環結萑葦高下置槃筐充楝皆排架頻年喜美穰織第七採桑聖祖仁皇帝御製桑田雨足葉蕃滋恰是春蠶大起時負莒攜筐紛笑語戴鵀飛上最高枝世宗憲皇帝御製清和天氣佳比戸採桑急瀼瀼零露繁冉冉緑隂濕髙柯學猱升落葚教兒拾昨摘滿籠歸姑猶嗔不給高宗純皇帝御製恭和聖祖仁皇帝原韻墻畔青條著雨滋繁隂初覆葉齊時春深八繭蠶争餧稚子攜筐上緑枝皇帝御製採葉供蠶食季春碧滿林桑柔鋪有䕃絲老結無心筐負條㣲折鈎輕幹未侵芳郊甘澤洽落葚小童尋織第八上簇聖祖仁皇帝御製頻執纎筐不厭疲久忘膏沐與調飢今朝士女歡顔色看我氷蠶作繭時世宗憲皇帝御製東隣催早耕西舍呼浸穀花殘蜀鳥啼春老吳蠶熟蚑蚑鞠雪腰盈盈皤絲腹剪草架初齊女郎看上簇高宗純皇帝御製恭和聖祖仁皇帝原韻覔樹㝷枝手足疲柔桑采采飼蠶飢今朝報道新抽繭老幼羣欣上簇時皇帝御製絲腸欣旣足通體現晶瑩布箔必稠密編茅務穏平簇登草匀揷網入繭徐成善育闗豐儉審宜貴致精織第九炙箔聖祖仁皇帝御製蠶性由來苦畏寒深垂簾幕夜將闌爐頭更爇松明火老媪殷勤日探看世宗憲皇帝御製温扇花信風寒醸麥秋雨葭簾張蠏舍松盆暖蠶戸香生雪繭明光吐銀絲縷門忌少人蹤語燕喧衡宇高宗純皇帝御製恭和聖祖仁皇帝原韻重簾不捲畏風寒猶爇松明向夜闌皚雪霏霏堆滿箔殷勤弱女把燈看皇帝御製隂寒釀梅雨比戸下帷簾箔上繭将作爐頭炭漸添含生緣避冷本性豈趨炎緩炙休過燥功宜晝夜兼織第十下簇聖祖仁皇帝御製自昔蠶繅重婦功曾聞獻繭在深宫披圖喜見纍纍滿茅屋清光積雪同世宗憲皇帝御製前月浴新蠶今日摘新繭浴蠶柳葉纎摘繭柳綿捲膏沐曾未施風光覺潛轉隣曲慰勞來懽情一共展高宗純皇帝御製恭和聖祖仁皇帝原韻獻繭由來重女功繪圖今見列璇宫聖人不為丹青美玉穀珠絲此意同皇帝御製鄰里欣相賀家家蠶事成匀圓雪光皎錯落玊輝瑩下簇分多寡聚籠衡重輕用功常不懈始得萬絲盈織第十一擇繭聖祖仁皇帝御製氷繭方看作素紈重綿亦藉禦深寒就中自有因材法揀取筐間次第觀世宗憲皇帝御製傾筐香雪明擇繭檐日上大半作絲綸三分充綿纊囑嫗理從容擇慣知瘠壯所慮梅雨過插秧趁溪漲高宗純皇帝御製恭和聖祖仁皇帝原韻弱繭何時成綺紈拮据冀免一身寒八蠶獨蛹還須擇几上分明取次觀皇帝御製衆繭湏精擇因材用不同化蛾作佳種排箔引凉風首選織絍美次供綿絮充由來無棄物器使在虚衷織第十二窖繭聖祖仁皇帝御製一年蠶事已成功歴數從前屬女紅聞說及時還窖繭荷鋤又在緑隂中世宗憲皇帝御製挽袖解長裙香汗濕紅頰農事委良人蠶功獨在妾層層下簇完勞勞窖繭接作苦感天公氷雪滿箱篋高宗純皇帝御製㳟和聖祖仁皇帝原韻春日遲遲執婦功何心愛戀牡丹紅繭成好向村頭窖荷插攜兒緑蔭中皇帝御製藏繭置深甕沿堤荷揷從布桐看曡曡鋪簣襯重重窖地鹽微摻理原泥密封出繰待七日潤澤倍鮮穠織第十三練絲聖祖仁皇帝御製炊煙處處繞柴籬翠釡香生煮繭時無限經綸從此出盆頭喜色動雙眉世宗憲皇帝御製煙流矮屋青水汲前溪潔掉車若捲風暎釡如翻雪絲頭入手長左右旋轉忙軋軋聽交響行人聞繭香高宗純皇帝御製恭和聖祖仁皇帝原韻煑繭吹煙颺短籬絲腸纍纍練成時探湯試展纎纎手那聽枝頭叫畫眉皇帝御製離坎功相濟經綸展藴藏瑩瑩翻釡燦軋軋轉車忙撥緒箸抽繭繅絲手探湯工夫漸成熟隔牖挹清香織第十四蠶蛾聖祖仁皇帝御製蛾兒布子如金粟水際分飛任所之莫令繭絲遺利盡來年留作授衣資世宗憲皇帝御製隣始通往來暫時解忙促出繭影翩翩翅光膩粉沃秧苗已抽青桑葉再見緑送蛾須水邊流傳笑農俗高宗純皇帝御製恭和聖祖仁皇帝原韻蠶蛾絲淨方生子送向溪頭任所之更願明春歸舍早今年已是去年資皇帝御製揀擇作新種槌箱紙四圍子生勤覆養蛾化任分飛蕩漾隨楊陌翩翻傍葦磯如山復如粟珍䕶待春歸織第十五祀謝聖祖仁皇帝御製勞勞拜簇祭神桑喜得絲成願已償自是西陵功德盛萬年衣被澤無疆世宗憲皇帝御製豐祀報先蠶灑庭佇來格釃酒注罇罍獻絲當圭璧堂下趨妻孥堂上拜主伯神惠乞來年盈箱賜倍獲高宗純皇帝御製恭和聖祖仁皇帝原韻年年勞苦事耕桑及早還將租税償今日蠶成䖍祀謝西陵功德戴無疆皇帝御製蠶成申報祀䖍謝望豐穰天駟輝騰逈西陵澤衍長香昇陳滿几絲獻祝盈箱衣被免寒凍抒誠遍里鄉織第十六緯聖祖仁皇帝御製緑隂掩映野人家每到蠶時静不譁一自夏初成繭後籬邊新聽響繅車世宗憲皇帝御製盈盈緯車婦荆布事素樸絲絲理到頭的的出新濯心忙不遑食腕倦何曾覺忽聽歸鴉啼斜陽掛屋角高宗純皇帝御製恭和聖祖仁皇帝原韻蠶繅輪捲遍千家午静人慵鳥語譁浸緯欣看供織作阿香軋軋轉雷車皇帝御製横絲互旋轉紡績用功初錢眼貫成緒繅星引就車周迴繳樞速圍繞度筒徐次第法精細從兹杼柚舒織第十七織聖祖仁皇帝御製從來蠶績女功多當念勤劬惜綺羅織婦絲絲經手做夜寒猶自未停梭世宗憲皇帝御製一梭復一梭頻擲青燈側豔豔機上花朶朶手中織嬌女眠齁齁秋蟲語唧唧檐頭月漸髙紙忩明曉色高宗純皇帝御製恭和聖祖仁皇帝原韻織女工夫午夜多莫將容易著絲羅銀蘭照處方成寸已自循環擲萬梭皇帝御製作帛織機始宵燈照戸阿堅持寸心靜不覺萬絲多綜躡難停杼縱横頻擲梭七襄紀小雅光彩燭星河織第十八絡絲聖祖仁皇帝御製無衣卒歳早關情寒氣催人蟋蟀聲茅屋疎籬秋夜永短檠相對絡絲成世宗憲皇帝御製紅女亦頗勞凄然當戸歎燈昏絡素絲籰重困柔腕纎纎鬢影寒沈沈夜氣半妾心不敢忙心忙絲緒亂高宗純皇帝御製恭和聖祖仁皇帝原韻秋惹深閨無限情可堪蟋蟀送寒聲玉關萬里征夫遠惆悵新絲絡不成皇帝御製繳軖音劻繼張柅絲縷勿縈紆牽引絡於籰貫穿度自莩挑燈宵正永轉軸腕忘劬力作休言倦計功課小姑織第十九經聖祖仁皇帝御製織絍精勤有季蘭牽絲分理織羅紈鳴機來往桑林裏已作吳綃匹練看世宗憲皇帝御製昨為籰上絲今作軸中經均匀細分理珍重相叮嚀君看千萬縷始成丈尺絹城市紈袴兒辛苦何嘗見高宗純皇帝御製恭和聖祖仁皇帝原韻砌下風飄待女蘭新絲經理欲成紈安排頭緒分長短約伴同來仔細看皇帝御製層層排絡籰上架徃來牽衆縷有條貫一心善斡旋鳴機得頭緒運軸自綿延綸綍應加愼如絲勿妄宣織第二十染色聖祖仁皇帝御製凝膏比潔絡新絲傳得新方色陸離一代文明資賁飾須教五采備彰施世宗憲皇帝御製深淺練縓纁蒼黄運巧智把絲曬柴荆臨風含綺思煥然五色紛爛若雲霞熾好語付機工金梭織錦字高宗純皇御製恭和聖祖仁皇帝原韻經緯功成尚染絲晴光萬縷燦離離天工奪處關人巧棚上還看五色施皇帝御製絲成皆潔白染練焕縑緗璀璨萬條理陸離五采彰雲霞昭賁飾黼黻佐文章朱綠元黄備含輝咸質良織第二十一攀花聖祖仁皇帝御製巧樣爭傳濯錦紋堪憐織女最殷勤雲章霞綵娛人意自著㝷常縞布裙世宗憲皇帝御製織絹當織長挽花要挽雙緒繁勞玉腕梭冷燼銀缸新樣勝吳綾斜文賽蜀錦成匹落誰家詎忍裁衾枕高宗純皇帝御製恭和聖祖仁皇帝原韻簇簇堆成錦繡紋攀花鬭巧最精勤堪憐織女深秋裏纔著新縫素布裙皇帝御製巧擅女工首雲章繪素綈緯經合樞紐心手應髙低運掌絲無舛擲梭花漸提織成由意匠何處覓端倪織第二十二剪帛聖祖仁皇帝御製手把齊紈氷雪清秋衣欲製重含情逡廵莫漫施刀尺萬縷千絲織得成世宗憲皇帝御製千絲復萬絲成帛良非偶握尺重含情欲剪頻低首紅分的的桃青擘柔柔柳但免舅姑寒妾單亦何醜高宗純皇帝御製恭和聖祖仁皇帝原韻溪尾如藍秋水清裁衣寄逺重闗情金刀欲下躊躇意絲縷皆從素手成皇帝御製帛成良不易欲剪復低徊珍惜勞心製奚容信手裁乍看千縷合倐見百花開尺寸休輕棄都從辛苦來織第二十三成衣聖祖仁皇帝御製已成束帛又縫紉始得衣裳可庇身自昔宫庭多澣濯總憐蠶織重勞人世宗憲皇帝御製九月届授衣縫紉難容緩戔戔逐剪裁楚楚稱長短刀尺迎風寒𤣥黄委雲滿帝力併天時農蠶慰飽暖高宗純皇帝御製恭和聖祖仁皇帝原韻戔戔束帛費縫紉只為祁寒事切身聖主憂勤圖畫裏宵衣永庇萬方人皇帝御製已届授衣候成裳庶庇身剪裁度修短鍼綫細縫紉無褐憐昏墊忍飢厪苦貧農桑郅治本題繪憫黎民欽定授時通考卷五十三
