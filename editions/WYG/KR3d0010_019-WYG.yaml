body:
  text: 穀種彚考詩豳風黍稷重穋禾麻菽麥正義曰苗生既秀謂之禾種植諸穀名為稼禾稼者苗幹之名又曰鄭司農云先種後熟謂之重後種先熟謂之穋又曰禾稼禾麻再言禾者以禾是大名也非徒黍稷重穋四種而已其餘稻秫蓏粱之輩皆名為禾麻與菽麥則無禾稱故於麻麥之上更言禾字以總諸禾也朱子集傳禾者穀連藁秸之總名禾之秀實而在野曰稼大雅誕降嘉種傳天降嘉種箋云天應堯之顯后稷故為之下嘉種疏曰后稷善能於稼穡上天乃下善穀之種與之正義曰降者從上之辭故知降嘉種者是天降嘉種也朱子集傳降降是種於民也書曰稷降播種是也魯頌黍稷重穋稙穉菽麥奄有下國俾民稼穡有稷有黍有稻有秬注先種曰稙後種曰穉大全孔氏曰重穋稙穉生熟早晚之異稱非穀名周禮天官太宰以九職任萬民一曰三農生九穀注鄭司農云九穀黍稷秫稻麻大小豆大小麥𤣥謂九穀無秫大麥而有粱苽疏𤣥謂九穀無秫大麥而有粱苽者以秫亦異與稷黏疎為異故去之大麥所用處少故亦去之必知有粟苽者下食醫云凡膳食之宜有犬宜粱魚宜苽故知有粱苽也且前七穀之中依月令麥屬東方黍屬南方麻屬西方豆屬北方稷屬中央故知有黍稷麻豆麥稻與小豆所用處多故知有稻有小豆也必知有大豆者生民詩云藝之荏菽荏菽大豆后稷之所植故知有大豆也又疾醫以五穀五藥養其病注五穀麻黍稷麥豆也疏此依月令五方之數又膳夫凡王之饋食用六穀注六穀稌黍稷粱麥苽苽雕胡也孟子五穀者種之美者也管子凡五穀者萬物之主也穀貴則萬物必賤穀賤則萬物必貴兩者為敵則不俱平故人君御穀物之秩相勝而操事於其不平之間又五穀者民之司命也范子計然曰五穀者萬民之命國之重寳也漢書食貨志種穀必雜五穀以備災害田中不得有木又董仲舒説上曰春秋他穀不書至於麥禾不成則書之以此見聖人於五穀最重麥與禾也說文穀續也百穀之總名禾嘉穀也以二月而種八月始熟得時之中故謂之禾禾木也木王而生従木従􅑰省􅑰象其穂又禾之秀實為稼根節為禾廣雅釋草粢稻其穂謂之禾小爾雅廣物藁謂之稈稈謂之芻生曰穀謂之粒菜謂之蔬禾穂謂之穎格物總論穀種之美者也其為種也不一考之前載有言三穀者粱稻菽是也有言五穀者麻黍稷麥菽是也有言六穀者稻黍稷粱麥苽是也有言九穀者稷秫黍稻麻大小豆大小麥是也有言百穀者又包舉三穀各二十種者為六十蔬果之實助穀各有二十是也葢人食之則飽不再食則飢未有不資以為生也然不種則不生不時則不穫故古者重穀而務農焉種以時而生以時耕以時而穫以時苗而秀秀而實昔春而種者子粒耳秋而收者萬顆也昔春而入土者升斗耳秋而登場者倉箱也國與民俱足獨不在此乎故聖王必貴五穀而賤金玊楊泉物理論粱者黍稷之總名稻者溉種之總名菽者衆豆之總名三穀各二十種為六十蔬果之實助穀各二十凡為百穀故詩曰播厥百穀穀者衆種之大名也農桑輯要穀名考五穀禾麻菽麥豆也周禮註又以麻黍稷麥豆為五穀嘉禾瑞穀瑞麥禮含文嘉神農就田作耨天應以嘉穀山海經帝之下都崑崙之墟有木禾郭璞曰穀類也後魏地形志羊頭山下神農泉北有穀闗即神農得嘉穀處尚書序唐叔得禾異􅅕同穎獻諸天子王命唐叔歸周公於東作歸禾傳畝壟穎穂也禾各生一壟而合為一穂異畝同穎天下和同之象又周公既得命禾旅天子之命作嘉禾傳天下和同政之善者故周公作書以善禾名篇告天下正義曰嘉訓善也言此禾之善故以善禾名篇後世同穎之禾遂名為嘉禾由此也白虎通成王時有三苗異畝而生同為一穟大㡬盈車長㡬充箱民有得而上之者成王訪周公而問之公曰三苗為一穟天下當和為一乎果有越裳氏重譯而來獻白雉古今注漢和帝元年嘉禾生濟陰城陽一莖九穂安帝延光二年六月九真言嘉禾生百十六本七百六十八穂爾雅注漢和帝時任城生黒黍或三四實實二米得黍三斛八斗呉志黄龍三年夏由拳野稻自生改禾興縣冬十月會稽南始平言嘉禾生十二月改元嘉禾晉起居注武帝元帝世嘉禾三生其莖七穂魏書靈徴志太祖天興二年七月獲嘉禾於平城縣異莖同穎八月廣甯送嘉禾一莖十一穂平城南十里郊嘉禾一莖九穂告於宗廟又世祖神䴥二年七月嘉禾生於魏郡安陽縣三本同穎又肅宗熙平二年八月幽州獻嘉禾三本同穎正光三年肆州獻嘉禾一根生六穂又孝静帝天平四年八月虞曺郎中司馬仲璨獻嘉禾一莖五穂宋書符瑞志文帝元嘉二十二年六月嘉禾生藉田一莖九穂生華林園百六十穂二十四年七月乙夘嘉禾旅生華林園及景陽山二十五年六月壬寅嘉禾旅生華林園十株七百穂壬子嘉黍生藉田孝武帝大明元年嘉禾生清暑殿鴟尾中一株六莖南齊書符瑞志武帝永明元年正月新蔡郡固始縣獲嘉禾一莖五穂八月新蔡縣獲嘉禾二莖九穂一莖七穂十一月固始縣獲嘉禾一莖九穂二年梁郡睢陽縣界野田中獲嘉禾一莖二十三穂梁書武帝本紀天監四年五月辛夘建康縣朔陰里生嘉禾一莖十二穂大同六年九月始平太守崔碩表獻嘉禾一莖十二穂大業拾遺錄七年九月太原郡獻禾一本三穂長八尺穂長三尺五寸大尺圍芒穂皆紫色鮮明可愛有老人年八十餘以素木匣盛之賜物三十段勅授嘉禾縣令玉海唐武徳元年六月虞州獻嘉麥一莖六穂八月永州獻嘉禾異畝同穎二年七月益州獻嘉禾一莖六穂四年二月肅州獻嘉禾一莖五穎貞觀二年六月長安獻嘉禾三年十二月潞州獻嘉禾景雲二年六月洛州言兩岐麥明皇先天二年八月懷州言嘉禾四穂開元八年五月平原麥一莖兩岐分秀九年五月絳州