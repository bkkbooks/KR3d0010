之宗廟又成祖本紀永樂十年七月己酉平陽縣獻嘉禾百六十四本四穂者一本三穂者數本秀水縣志成化九年秋八月嘉禾生每莖離根二節節間傍生一莖秀二穂或三莖秀二穂或四莖五莖四五穂寜晉縣志成化二十六年秋七月寧晉嘉禾七穂時禾生一莖七穂者甚衆下王莊有二三四莖合為一穂者湧幢小品正徳六年如臯縣嘉禾一本有至百莖者其一本二十莖者尤多太和縣志正徳十三年戊寅麥秀兩岐百餘莖秋穀之並穎者倍同州志嘉靖元年白水産瑞禾一莖四五穂者五十餘本三穂者百餘本餘不勝紀金華府志嘉靖三十九年蘭谿縣産瑞粟六穂者一本五穂四穂者各二本三穂者四本二穂者甚多雲南府志隆慶元年昆陽産嘉禾一莖五穂凡二百餘本来安縣志隆慶辛未嵗大稔穀有雙米者六合縣志萬厯元年見嘉禾是秋禾登一稃二米永昌府志萬厯十七年九月騰越北郊竟畝穀生三穂雲南府志萬厯二十九年昆陽易門産嘉禾一莖三四穂者四十餘本五穂者二百餘本鳯翔縣志萬厯四十年秋八月本縣興國里産嘉禾一莖四穂者數本一莖三穂者數十本一莖雙穂者數百本國朝江南通志順治元年懐遠縣産瑞麥一莖雙穂甘肅通志順治二年廣武營等堡麥秀兩岐江南通志順治十一年含山縣産嘉禾一莖五穂山西通志順治十二年潞城嘉禾一莖三四穂或五六穂甘肅通志順治十八年成縣麥有一莖三穂及四五穂不等雲南通志康熙元年寧州禾遍産雙穂四川通志康熙八年茂州麥秀七岐福建通志康熙九年晉江民獻兩穂麥山西通志康熙十一年平順産嘉禾太平瑞穀一莖二三穂江南通志康熙二十年蒙城麥秀五岐並三岐者數十本雲南通志康熙四十三年㠄峩産嘉禾一莖三穂至四五穂四十五年河西産嘉禾一莖三穂四川通志康熙四十七年綿竹縣麥秀六岐或四五岐雲南通志康熙四十七年路南産嘉禾一莖三穂四穂江南通志康熙五十三年徐州麥秀雙岐有四五岐者自是連嵗皆稔湖廣通志康熙五十六年湖廣産嘉禾一莖數穂内閣奉上諭雍正四年八月順天府尹進呈耤田所産嘉禾自一莖雙穂三穂以至八穂九穂皆碩大堅好異於常穀山西通志雍正四年太平嘉禾一莖十有三穂雲南通志雍正四年建水耤田内産嘉禾一莖雙穂至三四穂山西通志雍正五年洪洞清源瑞穀穂長尺餘者一莖八九穂浙江通志雍正五年九月仁和錢塘農民獻水田稻米瑞穀一莖兩穂七年西安常山二縣旱田粟米嘉穀一本之中兩穂三穂四穂者遍於各鄉巡撫臣李衞奏進詔賜大學士九卿等觀看上諭朕念切民依今歲令各省通行耕耤之禮為百姓祈求年穀幸邀上天垂鑒雨暘時若中外逺近俱獲豐登且各處皆産嘉禾以昭瑞應而其尤為罕見者則京師耤田之穀自雙穂至於十三穂御苑之稻自雙穂至於四穂河南之穀則多至十有五穂山西之穀則長至一尺六七寸有餘又畿輔二十七州縣新開稻田共計四千餘頃約收禾稻二百餘萬石暢茂穎栗且有雙穂三穂之奇廷臣僉云嘉禾為自昔所未有而水田為北地所創見屢詞陳請宣付史館朕惟古者圖畫豳風於殿壁所以誌重農務本之心今䝉上天特賜嘉穀養育萬姓實堅實好確有明徵朕祗承之下感激歡慶著圖頒示各省督撫等朕非誇張以為祥瑞也朕以誠恪之心仰䝉天鑒諸臣以敬謹之意感召天和所願自兹以往觀覽此圖益加儆惕以修徳為事神之本以勤民為立政之基將見歲慶豐穰人歌樂利則斯圖之設未必無裨益云湖廣通志雍正五年江華産嘉禾一莖數穂甘肅通志雍正五年環縣獻雙岐瑞麥五莖蘭州耤田産瑞穀自三穂至六穂共十三莖武威耤田産瑞穀自三穂以至七穂共一百七莖雍正五年十月十七日内閣奉上諭今歲各省俱産嘉禾頃馬覿伯復奏稱鄂爾坤圖喇地方皆産瑞麥有一莖至十五穂之多㳟進前來廷臣見之皆以為極邉初墾之地有此上瑞尤為罕覯朕觀自古聖帝賢王皆専務實心實政不以祥瑞為尚朕深明此理擯斥虚文而今年各處所産之嘉穀朕之所以宣示中外者葢因今歲為通行耤田典禮之初即獲感召天和休嘉普慶如是是以特為表著以明天人感應之理捷於影響庶期中外諸臣益加誠敬共相儆勉於将來也從前屢頒諭㫖甚明但恐嗣後地方有司未必人人深悉朕心競尚嘉禾之美名或借端粉飾致有隠匿旱潦之事而不以上聞者亦未可定著将雍正五年以後各省田畝産有嘉禾之處俱停其進獻奏聞御批諭㫖雍正六年九月二十六日署理直𨽻總督臣何世璂協理直𨽻總督臣劉師恕奏通州呈送瑞禾數本其一莖者穂長一尺五六寸並雙穂三穂以及八九穂至十三四穂不等上諭朕從來不言祥瑞是以從前降㫖自雍正五年以後各省所産嘉禾俱停其進獻今據貴州巡撫張廣泗奏稱黔省各屬新闢苗疆今年風雨應時歲登大有所産稻穀粟米之屬自一莖兩穂至十五六穂不等稻穀每穂四五百粒至七百粒之多粟米每穂長至二尺有竒實從來所未見特将瑞穀呈覽並繪圖附進等語朕覽各種瑞穀碩大堅實迥異尋常不但目所未見實亦耳所未聞若但見圖畫而未見穀本則人且疑而不信矣又據廣西巡撫金鉷摺奏今年粤西通省豐收十分者十之九九分者十之一穀價每石自二錢以至三錢二三分乃粤西未有之事等語朕思古州等處苗蠻界在黔粤之間自古未通聲教其種類互相讐殺草菅人命又常越境擾害鄰近之居民刼奪往來之商客以致數省通衢行旅阻滯迂道然後得逹而内地犯法之匪類又往往逃竄蔵匿其中此實地方之患不得不為經理者又總督鄂爾泰籌畫周至調度有方巡撫張廣泗敬謹奉行殫心奮力俾苗衆革面革心抒誠向化地方寕謐和氣致祥感召天和黔粤二省歲登大稔而黔省磽瘠之區苗彞新闢之地又蒙天賜瑞穀顯示嘉徵仰見天心以經理苗疆為是特昭瑞應以表封疆大臣之善績朕心實為慶幸若歸美於朕朕不居也著将張廣泗所進瑞穀圖交與武英殿繪畫刋刻頒賜各省督撫俾觀覽之共知勉勵御批諭㫖雍正七年五月十八日雲貴廣西總督鄂爾泰泰報貴州貴陽等十七府州縣俱係十分收成􅅙豆有粒大如栗者豌豆有粒大如榛者尤從來所未有又雍正七年八月十八日雲貴廣西總督鄂爾泰奏報各屬晚稻嘉禾自二三穂以上無論高低原隰漢土苗疆通屬皆同現據呈驗者已不下萬枝而長大稻穂每穂計米竟至三百餘粒至小米穀穂長大自一尺三四寸至一尺八九寸不等者亦不止萬枝並有一穂上又生九小穂一莖上竟有二十四穂者又雍正七年九月十六日貴州巡撫臣張廣泗奏稻穀自一莖兩三穂起至十五六穂不等其粟米則穂長一尺四五寸至二尺不等更有稻穀一本三十穂者粟米一本四十八穂者甚至一穂之上復生為六岐九岐者敬貯萬八千穂繪具全圖委官領齎恭呈御覽又雍正七年九月十九日廣東總督臣郝玉麟署理廣東巡撫印務臣傅泰奏恵州府河源縣送到嘉禾四十八本内一莖二穂者一十四本一莖三穂者二十本一莖四穂者一十二本一莖五穂者二本又雍正七年十一月初七日雲貴廣西總督鄂爾泰奏雲南等府州縣呈送瑞禾瑞穀自一莖十三穂至七八穂五六穂者一千餘稞貴州稻穀有一莖數穂及穀穂長至二尺自四百粒以至七百餘粒者小米有一莖二十七穂者高粱稗子有一莖十五穂者普安州屬早稻刈穫之後稻根上復生長稻孫仍又吐花結實重有三分收成又雍正九年九月二十六日巡察直𨽻等處農務臣舒喜奏永平府昌黎縣刈穫高粱得一莖四穂高粱四株五穂者二株六穂者二株又雍正十年十一月初四日廣東廵撫臣楊永斌奏各屬送到瑞穀自一莖雙穂以至七穂一本自二穂以至一百二十九穂自四五尺以及長至一丈一尺不等四川通志雍正十年四川省城耤田並郫縣耤田内各産嘉禾或三岐三穂或兩岐兩穂欽定授時通考卷十九
