body:
  text: 榖種稻二直省志書宛平縣物産稻有糯粳二種香河縣物産粳稻糯稻水稻旱稻昌平州物産稻處處有之惟玉泉山枹榆泉更佳膳米於是需焉房山縣土産稻紅白二種石窩稻色白粒大米粒羙盛煮經三晝夜不餲遵化州物産稻有東方稻雙芒稻虎皮稻之類皆食米糯稻有旱糯白糯黄糯皆可釀酒種者粳稻九糯稻一旱田九水田一滿城縣土産稻有黄鬚者有烏鬚者有秔稻有旱稻米微紅又有糯稻淶水縣土産稻種於水田者惟石亭新莊村有之所出不多邢臺縣物産稻有三種紅口芒稻糯稻歴城縣方産稻秔糯也秔宜飯糯宜酒歴雖山城而城北一帶盡屬水田粳稻之羙甲於山左鄒平縣物産稻漯水之濱近始播種新城縣物産稻東方瀕湖産水稻間有之泰安州物産稻紅白二種萊蕪縣物産稻有粳糯二種萊蕪水田皆旱稻故米不佳濱州物産稻沿河地可藝滋陽縣物産稻有糯有粳曹縣物産稻有數種水陸不同又粘者謂之糯米色黒宜釀鉅野縣物産稻子黒白二色沂州物産稻有糯有粳青州府物産海上斥鹵原隰之地皆宜稻播種苗出耘過四五遍即坐而待穫但雨揚以時毎畆可收五六石次四五石秋收見户舂米貿遷得髙價可比魚鹽若江南水田雖純藝稻然功多作苦農夫經歳胼胝泥淖之中收入反薄畆多二三石次一二石不如此中海稻功半而利倍也安邱日照雖有旱稻而粗硬不佳益都種之不多穫二年後俱變為莠矣水中亦然日照縣物産有糯有硬照産皆在陸地稍旱則失收農家不敢多種萊陽縣物産稻種分水旱紅白早晩昌邑縣物産稻水旱二種永安稻佳文水縣物産稻輭硬二種臨汾縣物産稻粳糯二種聞喜縣土産稻紅色惟董澤數村出洧川縣物産稻有旱稻水稻二種其色紅鄢陵縣土産稻不秧種紅澀欠佳洛陽縣土産稻香粳稻栁條青糯稻遂平縣土産稻屬黏米晚望水白馬尾池紅毛晚糯稻白稻紅粟稻羅山縣物産稻有早糯占晩白芒黑之屬光州土産稻白黄黒糯晚麻秈黄𤓰秈駞黎囘直頭秈望水白商城縣土産秈稻晩稻黒稻糯稻紅稻渭南縣物産稻有二種硬者炊飯名粳黏者釀酒名糯産花園及大嶺川者佳湭河川次之韓城縣土産澽壖宜稻志以小江南稱之然貿之域外者無幾西鄉縣土産稻類紅榖大小二種冷水榖百日榖麻黏榖銀珠榖香榖黄秧早金線早黄𤓰早紅米早望水白安南黏青幹黏土黄黏鐵脚漢葉裏藏葢早黄已上俱飯稻百莖稻黄殻糯栁條糯虎皮糯寸榖矮脚黄三百顆釣魚竿香兒糯麻榖糯已上俱酒稻六合縣物産稻之屬粳穿珠稻紅蓮稻榖色青有紅粒炊熟味甘香陸龜䝉詩近炊香稻識紅蓮六十日稻閃西風下馬看穂長救公饑輭稈青箭子稻了田青百日赤三朝齊靠籬望洗耙早五十日熟紫芒稻蟬鳴稻花裏黄鵪鶉秈觀音秈銀條秈落芒秈深水紅𤓰熟稻晚白稻早白稻香粳稻大粒長胖農人畏種之云種多則傷田間榖糯趕陳糯虎皮糯火珠糯輭稈糯燕口糯槐花糯白殻糯堆粒糯光頭糯矮脚糯金釵糯待西風烏絲糯豬鬃糯佛手糯鐵梗糯魚麟糯隨秈糯香糯繩兒糯粒長不圓味最羙懐寧縣物産秈稻種遲早不一其名甚多田有宜早稻者秋前收仍種晚禾有宜遲稻七月登揚者有八月九月登場者大約百日内熟糯稻有大糯有秈糯其名不一大糯較佳晚稻名晩白者佳赤與烏者次之宿松縣物産稻有秔秫二種為早榖為龍鬚早為團白為小白為無名種為休寧矮為金包銀為賽子白為三度禾為鴨掌為抝馬為牽岡為水波為寒先皆秔屬為魚子為虎皮為蜜蜂為白秈皆秫屬歙縣物産秈有桃花紅有髙郵紅自髙郵移種者米色如臙脂有白禾稻之稍遲者長稃白米質柔味甘香瑩可愛然實輕易取盈於量而歉於衡田主貴之佃户不貴也秔土人呼為大米然地不甚宜種名不一糯其種有青稈羊脂白矮釀之多酒有早歸生六月成有交秋糯七月成寧國縣土産稻各種皆有其米不黏者名粳稻有掃箒白百日黄六月烏三朝齊銀條白葉裏藏矮萁早長萁早茄柯早下馬早湖洲秈白沙秈蝦鬚秈蓮子秈竹了秈毛黄秈寒秈䑕牙秈金稈秈鐵稈秈冷水秈金裹銀三尺黄瘦八尺雁脚紅金絲黄湖洲白生鬚黄老來白光頭黄烏間白穿珠白思憶稻矮赤稻撩霜晚霜下晩釣竿晩蘇州晩觀音晩隔山拖沿坵熟福建秈三擔禾愛八擔紅粳稻其米黏者名糯稻有烏嘴糯抄秋糯早紅糯遲秈糯白殻糯紅殻糯鴨脚糯烏節糯硃砂糯楊枝糯栁條糯楊花糯青稭糯柿紅糯麻子糯雪花糯魚子糯馬鬚糯望水白齊頭黄蓋下萁見缸消八斗糙溼縣物産稻有早稻晚稻秈稻秫稻山稻南陵縣物産秔稻晩稻白芒稻黒稻糯稻貴池縣土宜秔其名有六十日白六十日紅八十日白掃箒白百日黄六月烏江西早矮萁早蠐包早茄柯早下馬早下馬看救公饑湖廣秈廣東秈白沙秈蝦鬚秈蓮子秈竹子秈毛黄秈寒秈䑕牙秈金稈秈冷水秈金裹銀三月黄雁脚紅撩霜晩霜下晩釣竿晩將軍晚蘇州晚觀音晚糯其名有烏角糯抄秋糯早紅糯白殻糯紅殻糯栁條糯楊花糯青稭糯隨秈糯柿紅糯麻子糯魚子糯雪花糯馬鬃糯望水白齊頭黄葢下箕見紅消七斗糙青桿糯江西瀘溪有糯稱池州占葢諸種之一也太平府物産多秈稻多晚稻多糯稻有黒稻秈十三種秈占城稻有六十日稻俗稱拖犂歸有赤紅秈有百日秈黄秈稻細秈稻蘆稉秈麻秈稻大粒秈蝦鬚秈穿珠秈一名觀音白晚稻六種早晩稻一名望水白又名大子白晚稻白稃白芒白米雁來糧弔梗青一名寒青稻糯稻十三種早糯稻一名雀不覺又名秈糯随秈糯燕口紅虎皮糯硃砂糯一名臙脂糯羊鬚糯黄糯稻即秫稻細頸糯青殻糯抄社糯珠子糯橘皮糯紅陸糯廬江縣土産紅秈稻白秈稻早糯稻晚糯稻黒晩稻白晚稻香稻舒城縣物産白早稻黄𤓰秈直頭秈江南秈福徳禾梳子秈白晩稻黒晩稻銀條秈雀不知紅嘴糯女兒紅芝麻糯堆榖糯羊鬚糯銅嘴糯馬鬃糯觀音糯青科糯齊秈早黄州糯無為州物産竹牙秈麻菇秈落芒秈早白稻早紅稻青柯糯虎皮糯鵲不知烏尖糯紅嘴糯白晩稻紅晩稻黒晚稻巢縣土産紅稻有百日秈直頭秈麻菇秈竹牙秈四紅秈胡秈稻王𤓰秈拖黎黄白稻有觀音秈銀條秈六十日秈青稭秈冷水秈大粒秈亂芒秈麻榖秈千家愛糯稻有羊鬚糯硃砂糯虎皮糯栁條糯齊秈糯牛筋糯青科糯紅芒糯馬鬃糯纍糯深水糯燕尾糯晚稻有黒晚稻紅晩稻臨淮縣物産秔稻有麻子秈稻早先白稻黄𤓰秈稻鵪鶉秈稻烏山秈稻脹破榖稻矮白稻紅芒稻黒稻糯稻有羊鬚糯馬鬃糯虎皮糯烏鬚糯槐花糯辮子糯大糯小糯六月黄糯定逺縣物産麻子秈黄𤓰秈烏山秈早先白鵪鶉秈脹破殻矮白稻紅芒稻黒稻女兒紅羊鬚糯馬鬃糯烏鬚糯大糯小糯辮子糯虎皮糯槐花糯六月糯五河縣物産稻有秈稻芒稻香稻早白稻深水紅稻黄鷺公稻老來變稻下馬看稻黒糯臙脂糯馬鬃糯飛上倉糯泗州物産香稻亦芒稻也類晚粳色微黄紅稃白實鹽城縣物産稻有粳糯二種有早晩二熟有紅黄紫赤黒斑青白數色清河縣物産有稻曰秔曰糯曰秈秈秔之早熟者曰旱稻旱田種者曰小芒稻後種先熟者曰香稻味之芬芳者亦秔屬也治北七十里舊有香稻莊揚州府物産有黄稑烏節大小香斑秈及小赤秈小白秈龍爪秈六月秈齊梅秈蘆稈秈葉裏秈麻觔秈大鵞秈白殻白芒早白晚白晚黄赤鬚黒支焦黄烏口大紅芒小紅芒下馬看六月白鷺鶿白了田青救公饑綆子籠下歡潮水白拖犂歸深水紅梅裏黄弔殺雞張子赤磊塊赤山骨崙鶴脚烏馬尾赤泰州紅又名海陵紅紫紅芒雀不知觀音白皆秔類趕陳羊脂燕口羊鬚秋紅橘皮烏飪麻觔虎皮豬鬃粉皮秋風雀不覺皆秫屬儀真縣物産多糯曰燕口曰紅芒曰麻筋曰穂前黄多晩曰江南白曰駝兒白曰深水紅曰長芒白多秈曰𤓰熟曰龍𤓰曰鯽魚曰斑秈曰葉裏藏有黒稻曰鶴脚烏曰豬林髙郵州物産早稻五十日六十日秈稻斑秈六月秈齊梅秈蘆稈秈龍爪秈鯽魚秈葉裏秈苞裏齊拖犂歸小赤秈小白秈麻觔秈大鵞秈大香秈小香秈白稻早白稻晚白輭頸頸白羊鬚白駝兒白青稭白青芒兒白頂霜白晩稻黄花稻小黄稻深水紅鶴脚烏下馬看弔殺雞母豬麟糯稻秋風糯麻觔糯烏􅁝糯趕上陳雀不覺半鬚糯寳應縣土産白秈一水秈玉斑秈齊頭白六月白香稻紅秈早紅蓮觀音栁苗强水不易沒農多種之古上樓有芒宜水田五十日七月上旬即熟視他種所穫較少蘆管秈宜水田小黄稻宜旱田晩稻俗呼上白米是也刈穫最遲畏水不敢多種大晚稻紅米宜水田糯稻臙脂糯殻紅米白烏金糯米黒色虎皮糯殻色斑駁魚鱗糯拖犂歸七月熟趕上陳七月熟雀不知七月熟泰州物産海陵紅俗名泰州紅馬尾赤鶴脚烏雀不知隨犂歸救公饑六十日白觀音秈駝兒白小香早香黒早白早早秈斑秈焦芒青芒赤芒黄芒紫紅芒烏殻深水紅了田青下馬看鯽魚秈香粢鱔魚黄皆秔稻趕陳糯羊脂糯燕口糯羊鬚糯虎皮糯秋紅糯紅糯皆秫稻通州物産稻種甚多有早黄晚黄早白晚白早紅晩青青芒白芒青鬚黒皮黄稑白殻烏節焦黄鷺鶿白串珠白潮水白深水紅了青田其粒長性硬曰紅白秈曰稚子斑早熟者曰救公饑曰拖犂歸茂密而庭碩者曰下馬看見收曰粃六升曰籠下歡曰薄十分瘦長雪色曰箭子稻中秋熟曰閃西風初秋可蒔曰六十日不畏旱者曰撇殺天和他米炊之甚香曰香滋糯曰川米早白最先熟而晩白則皮薄易釀芒赤米白曰虎皮性軟色芳曰粉皮一曰羊脂稈硬曰豬鬃皮厚曰薑黄早種宜釀曰趕陳雖熟不枯曰青枝稈柔可以為索曰麻筋亦有香如香滋者曰香秔呉縣物産稻秔之屬箭子稻紅蓮稻䆉稏稻雪裏揀師姑秔早白稻金成稻烏口稻早稻中秋稻紫芒稻枇杷紅下馬看大頭花𤓰熟稻晚白稻黄梗秈一粒珠麻皮秔作飯粒長薄十分作粥易膩梗殺蟛蜞香子米八月白牛尾白丈水紅老來紅五石稻救公饑包十石累泥烏土塘青天落黄糯之屬金釵糯閃西風羊脂糯青稈糯秋風糯趕陳糯矮糯鵞脂糯川粳糯虎皮糯羊鬚糯臙脂糯野人糯榧子糯恍雄雞烏鬚糯觀音糯梗秈糯佛手糯小娘糯蟹殻糯喜蛛糯鴨嘴糯香梗糯珠子糯長洲縣物産六十日稻四月種六月熟米小色白遲至八九十日熟一名早紅蓮又名救公饑紫芒稻紫榖白粒金釵糯粒長鵞兒糯崑山縣土産稻之屬三十有六晚白稻紅緑稻早粳稻金城稻六十日稻中秋稻雪裏揀紫芒稻救公饑下馬看紅蓮稻麥争場香粳稻薄十分黄梗秈麻子烏烏口稻百日赤稻烏兒稻趕陳糯臙脂糯鐵梗糯虎皮糯羊鬚糯再熟稻榧子糯水晶糯小娘糯香子糯閃西風稻竈王糯矮兒糯瞞官糯羊脂糯金釵糯蘆黄糯常熟縣物産紅蓮稻芒長粒大箭子稻粒長色白味香晩熟早白稻晚白稻又名蘆花白䆉稏稻色斑粳長性硬或名勝紅蓮紫芒稻紫殻白米雪裏揀稈軟有芒粒大色白師姑秔即矮稻無芒粒白救公饑六十日可望熟又名早紅蓮香子稻一名香􅢸色斑粒長以一勺入他米炊之飯皆香閃西風一名早中秋八月半熟麥争場最早熟百日赤芒赤米白早熟占城稻即早稻金城稻粒尖性硬又名赤榖烏口稻皮芒黒秋初亦可種下馬看即江隂黄粳俗呼三朝齊枇杷紅皮薄色如枇杷時裏白早熟一名節澳稻烏兒稻芒黒米白即晚烏輭黄粳米白粒大性輭味香羙金釵糯粒長性輭棗子糯殻黒青稈糯皮黄粒白已熟而稈猶青羊鬚糯色白性輭趕陳糯米白熟早鵞脂糯川粳糯粒大無芒一名圓頭糯虎皮糯色斑晚熟臙脂糯殻紅粒白矮兒糯晚熟瞞官糯即冷粒糯鐵梗糯稈勁無芒畏風易落細葉糯米白性輭呉江縣物