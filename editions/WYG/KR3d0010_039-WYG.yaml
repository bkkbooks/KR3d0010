  text: 欽定四庫全書欽定授時通考卷三十九
  hash: sha256:18d0a444acd64bcb172663be45cc18c3d68078056421b52e54a0f112328bd600
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3d0010_WYG_039-1a, image: WYG0732/WYG0732-0512c.png}
body:
  text: 功作收穫詩豳風八月其穫傳禾可穫也十月穫稻本草注粳糯通名為稻糯溫十月熟黍稷重穋禾麻菽麥嗟我農夫我稼既同傳後熟曰重先熟曰穋箋既同言已聚也詩小雅既方既皁既堅既好不稂不莠傳實未堅曰皁稂童粱也莠似苗也箋方房也謂孚甲始生而未合時也盡生房矣盡成實矣盡堅熟矣盡齊好矣而無稂莠擇種之善民力之専時氣之和所致疏衆穀既秀穗上已有孚甲盡生房矣稍復結粒盡成實矣粒又稍成盡堅熟矣並無死傷盡齊好矣不有童粱之稂不有似苗之莠是五穀大成也又彼有不穫穉此有不斂穧彼有遺秉此有滯穗伊寡婦之利傳秉把也箋成王之時百穀既多種同齊熟收刈促遽力皆不足而有不穫不斂遺秉滯穗聴矜寡取之以為利正義穧者禾之鋪而未束者秉刈禾之把也大雅實發實秀實堅實好實穎實栗傳發盡發也不榮而實曰秀穎垂穎也栗其實栗栗然疏苗至秋分禾又出穗實盡發于管實生粒皆秀更復少時其粒實皆堅成實又齊好實穗重而垂穎實成就而栗栗然收入𢎞多焉恒之秬秠是穫是畝恒之穈芑是任是負箋種之成熟則穫而畝計之抱負以歸周頌奄觀銍艾傳銍穫也禮記月令孟夏之月農乃登麥天子乃以彘嘗麥仲夏之月農乃登黍天子乃以雛嘗黍孟秋之月農乃登穀天子嘗新命百官始收斂仲秋之月乃以犬嘗麻麻始熟也命有司趣民收斂季秋之月農事備收天子乃以犬嘗稻稻始熟也内則黍稷稻粱白黍黃粱稰穛注孰穫曰稰生穫曰穛集韻稰禾子落貌說文穛早取禾也吕氏春秋不舉銍艾大飢乃來野有寢禾或談或歌旦則有昏喪粟甚多博雅秆䅝稭槀也黍穰謂之䅀稻穰謂之稈稷穰謂之䅳小爾雅藁謂之稈稈謂之芻生曰穀謂之粒禾穗謂之穎截穎謂之銍拔心曰揠拔根曰擢把謂之秉秉四曰筥筥十曰􅀈農桑通訣孔氏書傳曰種曰稼斂曰穡種斂者嵗事之終始也食貨志云收穫如寇盜之至蓋謂收之欲速也記曰種而不耨耨而不穫譏其不能圖功收終也是知收穫者農事之終為農者可不趨時致力以成其終而自廢前功乎大抵北方禾黍其收頗晚而稻熟或宜早南方稻秫其收多遲而陸禾亦宜早通變之道宜審行之今按古今書傳所載南北習俗所宜具述而備論之庶不失早晚先後之節也各種收穫法稻齊民要術稻將熟去水霜降穫之早刈米青而不堅晚刈零落而損收農桑通訣南方水地多種稻秫早禾則宜早收六月七月則收早禾其餘則至八月九月詩云十月穫稻齊民要術云稻至霜降穫之此皆言晚禾大稻也故稻有早晚大小之别然江南地下多雨上霖下潦劖刈之際則必假之喬扦多則置之笐架待晴乾曝之可無耗損之失天工開物凡秧既分栽後早者七十日即收穫最遲者歴夏及冬二百日方收穫其冬季播種仲夏即收者則廣南之稻地無霜雪故也粱秫齊民要術粱秫收刈欲晚性不零落早刈損實農桑通訣粱與粟同熟收割之法一同又薥秫熟時收刈成束攢而立之黍齊民要術刈穄欲早刈黍欲晚穄晚多零落黍早米不成皆即濕踐之穄踐訖即蒸而裛之不蒸者難舂米碎蒸則易舂米堅香氣經夏不歇黍宜曬之令燥濕聚則鬱凡黍黏者收薄穄味美者亦收薄難舂稷尚書考靈曜稷秋虚昏中以收斂大戴禮夏小正八月粟零零也者降也零而後取之也齊民要術熟速刈乾速積刈早則鎌傷刈晚則穗折遇風則收減濕積則藁爛積晚則耗損連雨則生耳農桑通訣凡北方種粟秋熟當速刈之南方收粟用粟鑒摘穗北方收粟用鎌并藁取之田家刈畢稇而束之以十束積而為􅀈然後車載上塲為大積積之視農功稍隙解束以旋旋鑱穗撻之羣芳譜刈稷欲早八九月熟便刈遇風即落麥禮記月令孟夏之月麥秋至孟子今夫麰麥播種而耰之其地同樹之時又同至于日至之時皆熟矣齊民要術青稞麥與大麥同時熟農桑通訣農家所種宿麥早熟最宜早收故韓氏直說曰五六月麥熟帶青收一半合熟收一半若候齊熟恐被急風暴雨所摧必至抛費每日至晚即便載麥上塲堆積用苫密覆以防雨作如搬載不及即於地内苫積天晴乘夜載上塲即攤一二車薄則易乾碾過一遍翻過又碾一遍起稭下塲揚子收起雖未淨直待所收麥都碾盡然後將未淨稭稈再碾如此可一日一塲比至麥收盡已碾訖三之二矣大抵農家忙併無有似蠶麥古語云收麥如救火梅天雨更多故若少遲慢一值隂雨即為災傷遷延過時秋苗亦誤鋤治今北方多用麥釤麥綽釤麥覆于腰後籠内籠滿則載而積于塲一日可收十餘畝較之南方以鎌刈者其速十倍豆氾勝之書穫豆之法莢黑而莖蒼輒收無疑其實將落反失之故曰豆熟於場于場穫豆則青莢在上黑莢在下齊民要術大豆收刈欲晚此不零落刈早損實九月中候近地葉有黃落者速刈之葉少不黃必浥鬱刈不速逢風則葉落盡遇雨澤爛不成又小豆葉落盡則刈之葉末盡者難治而易濕也豆莢三青兩黃拔而倒竪籠從之生者均熟不畏嚴霜從本至末全無秕減乃勝刈者農桑通訣豌豆三四月熟蠶豆蠶時熟天工開物菉豆種有二一曰摘緑莢先老者先摘人逐日而取之一曰拔緑則至期老足竟畝拔取也脂麻齊民要術胡麻刈束欲小束大則難燥打手復不勝以五六為一叢斜倚之不爾則風吹倒損收也候口開乘車詣田斗藪倒竪以小杖微打之還叢之三日一打四五遍乃盡耳若乘濕横積蒸熱速乾雖曰鬱裛無風吹虧損之慮浥者不中為榖子然於油無損也蕎麥齊民要術蕎麥下兩重子黑上一重子白皆是白汁滿似如濃即須收刈之但對稍相答鋪之其白者日漸黑如此乃為得所若待上頭總黑半已下黑子盡總落矣農桑輯要蕎麥待霜降收恐其子粒焦落乃用推鐮穫之收穫具各圖説銍艾鐮粟鋻䥛麥釤据刀推鐮禾鉤禾擔搭爪杈笐喬扞摜稻簟麥綽麥籠抄竿拖耙積苫連耞銍艾圖說銍穫禾穗刃也書禹貢曰二百里納銍小爾雅云截穎謂之銍截穎即穫也據陸詩釋文云銍穫禾短鐮也纂文曰江湖之間以銍為刈說文云此則銍器斷禾聲也故曰銍艾穫器今之刨鐮也方言曰刈釋音乂韻作艾芟草亦作刈賈策若艾草菅注艾讀曰刈古艾從草今刈從刀宜通用鐮圖說鐮艾禾曲刀也釋名曰鐮廉也薄甚所刈甚廉考工記又作鎌風俗通曰鐮刀自揆積芻蕘之效然鐮之制不一有佩鐮有兩刃鐮有袴鐮有鉤鐮有鐮柌之鐮皆古今通用芟器也粟鋻圖說粟鋻截禾穎刃也集韻云鋻剛也其刃長寸餘上帶圓銎穿之食指刃向手内農人收穫之際用摘禾穗與銍鐮制不同而名亦異然其用則一此特加便捷耳䥛圖說䥛似刀而上彎如鐮而下直其背指厚刃長尺許柄盈二握江淮之間恒用之方言云自闗而西謂之鉤江南謂之鍥鍥䥛集韻通用又謂之彎刀以刈草禾或斫柴篠以代鐮斧一物兼用農家便之麥釤圖說麥釤艾麥刃也集韻曰釤長鐮也狀如鐮長而頗直比鏺薄而稍輕所用斫而劖之故曰釤用如鏺也亦曰鏺其刃務在剛上下嵌繫綽柄之首以芟麥也比之刈穫功過累倍捃刀圖說捃刀集韻云捃拾也俗謂拾麥刀刃長可五寸濶近二寸上下竅繩穿之繫于指腕隨手芟􅀈取其便也麥禾既熟或收刈不時莖穗狼籍不能淨盡單貧之人得以收其遺滯蓋捃拾之間用此器也推鐮圖說推鐮斂禾刃也如蕎麥熟時子易焦落故制此具便于收斂形如偃月用木柄長可七尺首如兩股短叉架以橫木約二尺許兩端各穿小輪圓轉中嵌鐮刀前向仍左右加以斜杖謂之蛾眉杖以聚所劖之物凡用則執柄就地推去禾莖既斷上以蛾眉杖約之乃回手左擁成􅀈以離舊地另作一行子既不損又速于刀刃數倍此推鐮體用之效也禾鉤圖說禾鉤斂禾具也用禾鉤長可二尺嘗見壠畝及荒蕪之地農人將芟倒禾􅀈或草􅀈用此匝地約之成稇則易于就束比之手槤甚速便也禾擔圖說禾擔負禾具也其長五尺五寸剡匾木為之者謂之輭擔斫圓木為之者謂之楤擔匾者宜負器與物圓者宜負薪與禾釋名曰擔任也力所勝任也凡山路􅇖嶮或水陸相半舟車莫及之處如有所負非擔不可搭爪圖說搭爪上用鐵鉤帶榜中受木柄通長尺許狀如彎爪用如爪之搭物故曰搭爪以檈草禾之束或積或擲日以萬數速於手挈可謂智勝力也杈圖說扠箝禾具也揉木為之通長五尺上作二股長可二尺上一股微短皆形如彎角以􅀢取禾􅀈也又有以木為幹以鐵為首二其股者利如戈㦸唯用叉取禾束謂之鐵禾杈笐笐架也集韻作􅀢竹竿也或省作笐今湖湘間收禾並用笐架懸之以竹木構如屋狀若麥若稻等稼穫而􅀢音繭之悉倒其穗控于其上久雨之際比於積垜不致鬱浥江南上雨下水用此甚宜北方或遇霖潦亦可做此庶得種糧勝于全廢今特載之冀南北通用喬扦圖說喬扦挂禾具也凡稻皆下地沮濕或遇雨潦不無渰浸其收穫之際雖有禾􅀈不能卧置乃取細竹長短相等量水淺深每以三莖為數近上用篾縛之叉于田中上控禾把又有用長竹横作連脊挂禾尤多凡禾多則用笐架禾少則用喬扦雖大小有差然其用相類故並次之摜稻簟圖說摜稻簟摜抖擻也簟承所遺稻也農家禾有早晚次第收穫即欲隨手得糧故用廣簟展布置木物或石於上各舉稻把摜之子粒隨落積於簟上非惟免汚泥沙抑且不致耗失又可曬穀物或捲作􅖧誠為多便南方農種之家率皆置此徐光啟曰不如摜牀為便今農家所用棧條即簟也麥綽圖說麥綽抄麥器也篾竹編之一如箕形稍深且大旁有木柄長可三尺上置釤刀下横短拐以右手執之復於釤旁以繩牽短軸左手握而掣之以兩手齊運芟麥入綽覆之籠也嘗見北地芟取蕎麥亦用此具但中加密耳麥籠圖說麥籠盛芟麥器也判竹編之底平口綽廣可六尺深可二尺載以木座座帶四碢用轉而行芟麥者腰繫鉤䋲牽之且行且曳就借使刀前向綽麥乃覆籠内籠滿則舁之積處往返不已一籠日可收麥數畝又謂之腰籠抄竿圖說抄竿扶麥竹也長可及丈麥已熟時忽為風雨所倒不能芟取别用一人執竿抄起卧穗竿舉則釤隨鏺之殊無損失必兩習熟者能用不然則有矛盾之差矣拖杷圗說拖杷耬麥長杷也首列二十餘齒短木柄以批契維腰曵之嘗見麥野為風雨所損莖穗交亂不能淨鏺故制此具腰後縦横耬之仍手握柄鐮芟其遺餘所得稭穗隨擁積之有一杷畢功得麥十餘斛積苫圗說積苫芟麥既積編草覆之也農桑輯要云苫須扵農隙時備下以防雨作農桑直說云作苫用穀草黄野草皆可但紐作腰緊一頭留稍者為苫凡露積須苫繳蓋不為雨所敗也嘗見農家有以麻經或草索織之又可速就連耞圖說連耞擊禾器國語曰權節其用耒耜耞芟廣雅曰拂謂之架說文曰拂架也拂擊禾連架釋名曰架加也加杖於柄頭以撾穗而出穀也其制用木條數莖以生革編之長可三尺濶可四寸又有以獨挺為之者皆於長木柄頭造為擐軸舉而轉之以撲禾也欽定授時通考卷三十九
