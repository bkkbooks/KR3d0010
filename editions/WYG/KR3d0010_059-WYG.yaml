body:
  text: 農餘蔬一蔓菁菲同蒿蔞蒿牡蒿藾蒿䕲蒿白菜芥芥藍菠薐莧菜馬齒莧冬葵龍葵蔠葵蒲葵天葵苦菜蕹菜芸薹蔊菜薇巢菜蕨迷蕨水蕨藜藋灰藋薺菜蔓菁蔓菁一名蕪菁北人名蔓菁并汾河朔間燒食其根呼為蕪根蕪菁南北之通稱一名葑一名須一名薞蕪一名蕘一名芥爾雅云須薞蕪疏云陳宋之間謂之葑幽州人謂之芥陳楚謂之蘴齊魯謂之蕘闗西謂之蕪菁趙魏謂之大芥七者一物也一名九英菘塞北河西種者名九英蔓菁亦曰九英菘一名諸葛菜蜀人呼為諸葛菜一名馬王菜苗猺獠狫地方産菜味􅉣多刺即諸葛菜也相傳為馬殷所遺故名一名雞毛菜夏月則枯蔬圃復謂之雞毛菜苗名蘴孫緬云蘴蕪菁苗也根為沙吉木兒蒙古人呼其根云根長而白形如胡蘿蔔霜後特軟美蒸煮煨任用梢似芋魁含有膏潤頗近穀氣莖粗葉大而厚濶夏初起薹開黄花四出如芥結角亦如芥子勻圓似芥子紫赤色莖葉稍遜於根亦柔膩不類他菜人久食蔬菜無穀氣即有菜色食蔓菁者獨否蔓菁四時皆有四時皆可食春食苗初夏食心亦謂之薹秋食莖冬食根數口之家能蒔數百本亦可終嵗足蔬子可打油然燈甚明每畝根葉可得五十石每三石可當米一石是一畝可得米十五六石則三人卒嵗之需也此菜北方甚多河東太原所出其根極大又出西番吐谷渾地氣味苦溫無毒常食通中下氣利五臟止消渴去心腹冷痛解麫毒入丸藥服令人肥健尤宜婦人劉賓客嘉話録公曰諸葛所止令兵士獨種蔓菁者何絢曰取其纔出甲者生啗一也葉舒可煮食二也久居隨以滋長三也棄去不惜四也囘則易㝷而採之五也冬有根可劚食六也比諸蔬屬其利不亦溥乎曰信矣三蜀之人亦呼蔓菁為諸葛菜江陵亦然兼明書今人呼菘為蔓菁云北地生者為蔓菁江南生者為菘此蓋習俗之非也余少時亦謂菘為蔓菁常見醫方用蔓菁子為辟穀藥又為塗頭油又用之消毒腫每訝菘子有此諸功殊不知其所謂近讀齊民要術乃知蔓菁是蘿蔔苗即醫方所用蔓菁子是也漢桓帝時年饑勸人種蔓菁以充饑諸葛亮征漢令軍人種蘿菔則蘿菔蔓菁為一物無所疑也雲南記嶲州界縁山野間有菜大葉而麤莖其根若大蘿蔔土人蒸煮其根葉而食之可以療饑名之為諸葛菜云武侯南征用此菜蒔於山中以濟軍食亦猶廣都縣山櫟木謂之諸葛木也南方草木狀蕪菁嶺嶠以南俱無之偶有士人因官擕種就彼種之出地則變為芥亦橘種江北為枳之義也齊民要術種不求多唯須良地故墟新糞壞牆垣乃佳若無故墟糞者以灰為糞令厚一寸灰多則燥不生也耕地欲熟七月初種之一畝用子三升從處暑至八月白露節皆得早者作菹晩者作乾漫散而勞種不用溼溼則地堅葉焦既生不鋤九月末收葉仍留根取子十月中犁粗㽟拾取耕出者若不耕㽟則留者英不茂實不繁也春夏畦種供食者與畦葵法同剪訖更種從春至秋可得三輩常供好菹取根者用大小麥底六月中種十月將凍耕出之一畝得數車早出者根細羣芳譜種法先薙草雨過即耕不雨先一日灌地使透次日熟耕作畦或耬種或漫撒覆土厚一指五六日内有雨不須灌無雨戽水灌溝中遙潤之勿澆土令地實以沙土髙者為上宜厚壅之擇子下種出甲後即耘出小者為茹若不欲移植取次耘出存其大者令相去尺許若欲移植俟苗長五七寸擇其大者移之先耕熟地作畦深七八寸起土作壟藝苗其上壟土虚浮根大倍常一法子欲陳用鰻鱺汁浸之曝乾種可無蟲取子者當六七月種來年四月收若中春種亦即生薹與秋種者同熟但根小莖矮子少耳供食者正月至八月皆可種凡遇水旱他穀已晩但有隙地即可種此以濟口食一法地方一尺五寸植一本一步十六本一畝三千六百本每本子一合可得三石六斗比菜子可多三四倍利菲附爾雅菲芴注即土瓜也疏菲似葍莖麤葉厚而長有毛三月中蒸䰞為茹甘美可作羮幽州人謂之芴今河内人謂之宿菜又菲蒠菜注菲草生下濕地似蕪菁華赤色可食同蒿同蒿一名蓬蒿形氣同蓬蒿也莖肥葉緑有刻缺微似白蒿甘脆滑膩四月起薹高二尺餘開花深黄色狀如單瓣菊花一花結子近百成毬如地菘及苦蕒子最易繁茂以佐日用最為佳品主安氣養脾胃消水飲多食動風氣熏心令氣滿王氏農書春二月種可為常食秋社前十日種可為秋菜如欲出種春菜食不盡者可為子俱是畦種其葉又可湯泡以配茶茗實菜中之有異味者羣芳譜種植肥地治畦如種他菜法蔞蒿附蔞蒿一名白蒿一名蘩爾雅云蘩皤蒿注云白蒿也一名蔏爾雅云購蔏注云蔞蒿也生下田初出可啖一名由一作游胡爾雅云繁由胡一名旁勃爾雅云北海人謂之旁勃有水陸二種爾雅通謂之蘩曰蘩皤蒿即今陸生艾蒿也辛熏不美曰蘩由胡即今水生蔞蒿也又曰蘩之醜秋為蒿則通指水陸二種而言謂其春時各有種名至秋老則皆呼為蒿矣形狀相似但水生者辛香而美生陂澤中二月發苗葉似嫩艾而岐細面青背白其葉或赤或白其根白脆采其根莖生熟葅曝皆可食蓋嘉蔬也牡蒿附爾雅蔚牡菣注無子者疏一名馬新蒿本草一名齊頭蒿諸蒿葉尖此獨奓而秃故有齊頭之名三四月生苗其葉扁而本狹奓有秃岐嫩時可茹秋開細黄花結實大如車前實而内子細㣲不可見故人以為無子也藾蒿附爾雅苹藾蕭注今藾蒿也初生亦可食疏葉青白色莖似箸而輕肥始生香可生食又可蒸食本草苹即陸生皤蒿俗呼艾蒿䕲蒿附爾雅莪蘿注今莪蒿也亦曰䕲蒿疏一名蘿蒿生澤田漸洳之處葉似斜蒿而細科生三月中莖可生食又可蒸香美味頗似蔞蒿本草一名抱娘蒿似小薊宿蒿先於百草白菜白菜一名菘埤雅云菘性凌冬不彫四時長有有松之操故其字㑹意諸菜中最堪常食有二種一種莖圓厚微青一種莖扁薄而白葉皆淡青白色子如蕓薹子而灰黑八月種二月開黄花四瓣如芥花三月結角亦如芥燕趙遼陽淮揚所種者最肥大而厚一本有重十餘斤者南方者畦内過冬北方多入窖内燕京圃人又以馬糞入窖壅培不見風日長出苗葉皆嫩黄色脆美無滓謂之黄芽菜乃白菜别種莖葉皆扁味甘溫無毒利腸胃除胸煩解酒渴利大小便和中止𠻳冬汁尤佳夏至前菘菜食發皮膚風癢動氣發病又有春不老一名八斤菜葉似白菜而大甚脆嫩四時可種醃食甚美菜譜有春菘有晩菘芥芥一名辣菜一名臘菜其氣味辛辣有介然之義又可過冬也本草云冬月食者俗呼臘菜春月食者俗呼春菜四月食者謂之夏菜一名水蘇一名勞祖性辛溫無毒溫中下氣豁痰利膈處處有之種類不一有青芥又名刺芥葉大子粗葉似菘有柔毛味極辣可生食其子可藏冬瓜紫芥莖葉純紫可愛作虀最美白芥一名胡芥一名蜀芥來自戎中而盛於蜀八九月種至春深莖高二三尺葉如花芥葉青白色為茹甚美莖易起而中空性脆最畏狂風大雪須謹䕶之三月開黄花結角子如粱米黄白色又有一種莖大而中實者尤高子亦大白芥子堪入藥味極辛美利九竅明耳目通中他如南芥刺芥按此即青芥旋芥馬芥葉如青芥花芥葉多刻缺如蘿蔔英石芥低小者皺葉芥大芥一名皺葉芥大葉皺紋色尤深緑味更辛辣入藥用之類皆菜之美者三月開黄花結莢一二寸子如蘇子大色紫味辛芥心嫩者為芥藍極脆李時珍曰芥性辛熱而散乆食耗真元昬眼目發瘡痔劉恂嶺南異物志云南土芥高五六尺子大如雞子此又芥之尤異者也四民月令六月大暑中伏後可收芥子七月八月可種芥齊民要術取葉者七月半種地欲糞熟一畝用子一升種法與蕪菁同既生亦不鋤之十月收取子者二三月好雨澤時種性不耐寒經冬則死故須春種旱則畦種水澆五月熟而收子王氏農書今江南農家所種如種葵法俟成苗必移栽之早者七月半後種遲者八月種厚加培壅草即鋤之旱即灌之冬芥經春長心中為鹽淡二菹亦任為鹽菜如收子者即不摘心蓋南北異宜故種畧不同而其用則一芥藍附芥藍芥屬也葉色如藍故南人謂之芥藍仍可擘取食故北人謂之擘藍其葉大於菘根大於芥薹苗大於白芥子大於蔓菁花淡黄色其苗葉根心俱任為蔬子可壓油亦四時可種四時可食大畧如蔓菁也但食根之菜如芥蘆菔蔓菁之屬魁皆在土中此則魁在土上為異耳收根者須四五月種少長擘食其葉漸擘魁漸大八九月并根葉取之葉作葅或作乾菜根剥去皮或煮食或糟藏醬豉留根至明春復發苗可採食三月花四月實子每畝可收三四石農政全書種芥藍宜耕熟地厚壅之土強者多用草灰和之耕熟後或漫散子取次耘之或種苗長數寸移植之或就平地種或作埒大畧與種蔓菁同法但須疎行則魁大子多每本令相去一尺餘又凡菜種多冬榮夏枯獨芥藍乾枯收子之後根復生蘖經數年不壞蓋一種之後無論子粒傳生即原本亦供數年採拾冬月悉取葉空留根來年亦生或并斸去大根稍存入土細根來年亦生又芥藍莖葉用芝蔴油煮如常煮菜法食之并歃其汁能散積痰其葉及子亦能消食積解麵毒又菜名藍者不止因葉色似藍北人直用作澱可染紬帛勝於福青菠薐菠薐一名波斯草一名赤根菜詢芻録云南人呼菠菜北人呼赤根菜一名鸚鵡菜出西域頗陵國今訛為菠薐蓋頗陵之轉聲也見劉賓客嘉話録莖柔脆中空葉緑膩柔厚直出一尖傍出兩尖似鼓子花葉之狀而稍長大根長數寸大如桔梗色赤味甘美四月起薹尺許開碎白花叢簇不顯有雌雄雌者結實有刺狀如蒺藜子葉與根味甘冷滑無毒利五臟通腸胃熱開胸膈下氣調中止渴潤燥解酒毒服丹石人最宜麻油炒食甚美北人以為常食春月出薹嫩而且美春暮薹漸老沸湯晾過曬乾備用甚佳可久食誠四時可用之菜也八九月種者可備冬食正二月種者可備春蔬農桑輯要菠薐作畦下種如蘿蔔法春正月二月皆可種逐旋食用秋社後二十日種於畦下以乾馬糞培之以備霜雪十月内以水沃之以備冬食羣芳譜種植正二月内將子水浸一二日候脹撈出控乾盆覆地上俟芽出擇肥鬆地作畦於每月下旬下種與十餘日前種者同出亦一異也春種多蟲不如秋種者佳莧莧凡五種赤莧一名蕢爾雅云蕢赤莧注云今莧菜之赤莖者本草云一名花莧莖葉深赤白莧人莧俱大寒又名糠莧胡莧二莧味勝他莧但大者為白莧小者為人莧或謂之細莧其實一也其子霜後方熟細而黑色又細莧俗名野莧猪好食之亦名猪莧紫莧莖葉皆紫無毒不寒吳人用以染𤓰者五色莧今稀有諸莧皆三月種葉如藍莖葉皆高大易見故名莧或曰莧從見諧聲也開細花成穗穗中細子扁而光黑與青葙子雞冠子無别老則抽莖甚高六月以後不堪食子霜後始熟九月收五莧俱氣味甘冷利無毒並利大小腸治初痢滑胎通竅明目除邪氣寒熱白莧補氣除熱赤莧主赤痢射工沙虱紫莧殺蟲毒治氣痢忌與鼈共食農桑輯要人莧但五月種之今人有三四月種者如欲出種留食不盡者八月收子馬齒莧附馬齒莧一名馬莧一名五行草以其葉青梗赤花黄根白子黑也一名五方草亦五行之義一名長命菜其性耐乆難燥一名九頭獅子草一名馬齒龍可處處有之柔莖布地葉對生比並圓整如馬齒故名六七月開細花結小尖實實中細子如葶􅐗子狀苗煮熟曬乾可為蔬有二種葉大者名㹠耳草不堪用小葉者又名䑕齒莧節葉間有水銀每十觔可得八兩或十兩氣味酸寒無毒散血消腫利腸滑胎解毒通淋治産後虚汗冬葵葵說文曰菜也農書曰陽草也天有十日癸與終始故葵從癸有紫莖白莖二種葉之小者為鴨脚葵今南北皆有之一名露葵古人採葵必待露解一名滑葵言其性也為百菜之主備四時之饌本豐而耐旱一作寒味甘而無毒供食之餘可為葅腊枯枿之遺可為榜簇子若根則能療疾咸無棄材誠蔬茹之上品也詩豳風七月烹葵及菽本草綱目李時珍曰古人種為常食今種之者頗鮮其實大如指頂皮薄而扁實内子輕虚如榆莢仁六七月種者為秋葵八九月種者為冬葵正月復種者為春葵然宿根至春亦生四民月令正月可種葵芥又六月六日種葵中伏以後可種冬葵齊民要術臨種時必燥曝葵子葵子雖經嵗不浥然溼種者瘠而不肥地不厭良薄即糞之春必畦種水澆春多風旱非畦不得且畦者省地而菜多一畦供得一口畦長兩步廣一步大則水難勻深掘以熟糞對半和土覆其上令厚一寸鐵齒耙耬之令熟足蹋使堅平用水澆潤水盡下子又以熟糞和土覆其上令厚一寸餘葵生三葉然後澆之澆用晨夕日中便止每一搯輒耙耬地令起下水加糞三搯更種一嵗之中凡得三輩凡畦種之物悉如之早種者必秋耕十月末地將凍散子勞之人足踐踏之乃佳踐者菜肥地釋即生鋤不厭數五月初更種之春者既老秋葉落未生故種此相接六月一日種白莖秋葵白者宜乾紫莖者乾即黒而澀仍留五月種者取子春葵子熟不均故須留中輩於此時附地剪却春葵冷根上枿生者柔輭美於秋葵搯秋菜必留五六葉不搯則莖孤葉多則科大八月半剪去留其岐岐多者則去地一二寸獨莖者亦可去地四五寸枿生肥嫩比至收時高與人膝等莖葉皆美科雖不高菜實倍多若不剪早生者雖高數尺柯葉堅硬全不中食收待霜降傷早黄爛傷晩黒澀羣芳譜葵甚易生地不論肥瘠宜於不堪作田之地多種以防荒年採瀹曬乾收貯龍葵附本草一名苦葵一名苦菜益州有苦菜乃是苦蘵即龍葵也一名天茄子一名水茄一名天泡草一名老鴉酸漿草與酸漿相類故加老鴉以别之一名老鴉眼睛草五爪龍亦名老鴉眼睛草同名異物也李時珍曰龍葵龍珠一類二種也皆處處有之四月生苗髙二三尺莖大如筯似燈籠草而無毛葉似茄葉而小五月以後開小白花五出黄蘂結子正圓大如五味子上有小蔕數顆同綴其味酸中有細子亦如茄子之子但生青熟黑者為龍葵生青熟赤者為龍珠蔠葵附爾雅蔠葵蘩露注承露也大莖小葉華紫黄色本草一名落葵一名藤葵一名天葵一名繁葵一名御菜一名臙脂菜坡詩注云豐湖有臙脂藤生菜滑美勝􅐜蔓生葉似杏葉而肥厚軟滑可茹八九月開細紫花累累結實如五味子熟則紫黑色揉取汁紅如臙脂女人飾面㸃唇及染布物謂之胡臙脂亦曰染絳子但色易變耳其葉最能承露其子埀埀亦如綴露故得露名蒲葵附羣芳譜蒲葵葉似葵可食天葵附羣芳譜天葵一名莃一名菟葵爾雅云莃菟葵注云頗似葵而小葉狀如藜有毛雷公所謂紫背天葵是也葉如錢而厚嫩背㣲紫生崖石凡丹石之類得此始神但世人罕識唐本草注苗如石龍苪葉光澤花白似梅莖紫色煮汁極滑堪噉苦菜苦菜一名苦苣一名苦蕒一名編苣一名游冬博雅云游冬苦菜也埤雅云此草凌冬不凋故名一名天香菜葉狹而緑帶碧莖空㫁之有白汁花黄如初綻野菊花春夏旋開一花結子一叢如同蒿子花罷則萼斂子上有白毛茸茸隨風飄揚落處即生今處處有之但在北方者至冬而凋在南方者冬夏常青為少異耳味苦寒無毒夏天宜食能益心和血通氣主治腸澼渴熱中疾惡瘡霍亂後胃氣煩逆忌與蜜同食作肉痔脾胃虚寒人不可多食禮記月令孟夏之月苦菜秀又内則濡豚包苦實蓼疏言濡豚之時包裹豚肉以苦菜殺其惡氣又實之以蓼爾雅荼苦菜疏一名荼草一名選陸璣詩疏生山田及澤中得霜甜脆而美蕹菜蕹菜蕹與壅同此菜惟以壅成故謂之蕹榦柔如蔓中空葉似菠薐及鏨頭開白花堪茹南人編葦為筏作小孔浮水上種子於水中長成莖葉皆出葦孔中隨水上下南方之竒蔬也陸種者宜濕地畏霜雪九月藏土窖中三四月取出壅以糞土節節生芽一本可成一畦生嶺南今江夏金陵多蒔之蕓薹蕓薹菜塞外有雲臺戍始種此菜故名一名寒菜一名胡菜一名薹菜一名薹芥一名油菜單莖圓肥淡青色葉附莖上形如白菜嫩時可炒食既老莖端開花如蘿蔔花結角中有子本草九月十月下種生葉冬春採薹心為茹三月則老不可食開小黄花四瓣子灰赤色炒過榨油黄色燃燈甚明蔊菜蔊菜一名􅀢音罩菜一名竦米菜生南方田園小草也冬月布地叢生長二三寸柔梗細葉三月開細花黄色結細角長一二分角内有細子味極辛辣沙地生者尤伶仃薇薇字說云㣲賤所食因謂之㣲一名野豌豆一名大巢菜本草項氏曰巢菜有大小二種大者即薇乃野豌豆之不實者小者即東坡所謂元修菜也生麥田及原隰中本草云非水草也莖葉氣味皆似豌豆其藿作蔬入羮皆宜爾雅薇垂水注生於水邊疏草生於水濱而枝葉垂於水者曰薇陸璣詩疏薇山菜也今官園種之以供宗廟祭祀巢菜附四川志巢菜州縣俱出葉似槐而小其子如小豆夏時種以糞田其苗可食蘇軾元修菜詩序菜之美者有吾鄉之巢陸游巢菜詩序蜀蔬有兩巢大巢豌豆之不實者小巢生稻畦中東坡所賦元修菜是也吳中絶多名漂搖草一名野蠶豆但人不知取食耳蕨蕨一名虌爾雅云蕨虌注云廣雅云紫藄非也江西謂之虌陸璣詩疏云山菜也周秦曰蕨齊魯曰虌埤雅云狀如大雀拳足又如其足之蹷也故謂之蕨俗云初生亦類虌故曰虌也二三月生芽拳曲狀如小兒拳長則展寛如鳯毛髙三四尺莖嫩時無葉採取以灰湯煮去涎滑曬乾作蔬味甘滑肉煮甚美薑醋拌食亦佳荒年可救饑根紫色皮肉有白粉搗爛洗澄取粉名蕨粉可蒸食亦可盪皮作線色淡紫味滑美陸璣謂可供祭祀今山中處處有之齊民要術二月中髙八九寸老有葉瀹為茹滑美如葵三月中其端散為三枝枝有數葉葉似青蒿長麄堅長不可食用爾雅翼蕨紫色而肥野人今嵗焚山則來嵗蕨菜繁生其舊生蕨之處蕨葉老硬敷披人誌之謂之蕨基迷蕨附爾雅藄月爾注即紫藄也似蕨可食本草李時珍曰紫藄似蕨有花而味苦初生亦可食三蒼謂之迷蕨水蕨附本草水蕨似蕨生水中呂氏春秋云菜之美者有雲夢之䔇即此菜也藜藜一名萊一名紅心灰藋一名臙脂菜一名鶴頂草一名落藜生不擇地處處有之即灰藋之紅心者莖葉稍大嫩時亦可食老則莖可為杖氣味甘平㣲毒殺蟲煎湯洗蟲瘡潄齒䘌搗爛塗諸蟲傷蔏藋附爾雅拜蔏藋注蔏藋亦似藜疏此亦似藜而葉大者名拜一名蔏藋灰藋附灰藋一名灰滌菜一名金鎖天今訛為灰條菜處處原野有之四月生苗莖有紫紅線稜葉尖有刻缺面青背白莖心嫩葉皆有細白灰如沙為蔬亦佳氣味甘平無毒治惡瘡蟲咬面䵟等疾忌著肉作瘡五月漸老高者數尺七八月開細白花結實成簇如毬中有細子蒸曝取仁可炊飯及磨粉食救荒本草云結子成穗者味甘散者味苦生牆下樹下者忌用白者謂之蛇灰有毒薺菜薺一名䕶生草本草云薺生於濟故謂之薺釋家取其莖作挑燈杖可避蚊蛾謂之䕶生草野生有大小數種小薺花葉莖扁味美最細者名沙薺大薺科葉皆大而味不及小薺莖硬有毛者名菥蓂爾雅云菥蓂大薺疏云又名􅌸菥一名大蕺一名馬辛味欠佳冬至後生苗二三月起莖五六寸開細白花結莢如小萍有三角莢内細子名蒫爾雅云蒫薺實疏云薺子味甘人取其葉作葅及羮四月收師曠所謂嵗欲豐甘草先生即此野菜譜江薺生臘月生熟皆可食花時不可食但可作虀用倒灌薺生旱田采之熟食亦可作虀蒿柴薺其葉可食其稭可燃掃帚薺春采熟食碎米薺三月采皆可作虀春秋繁露薺以美冬水氣也薺甘味也乘於水氣故美者甘勝寒也薺之言濟所以濟大水也欽定授時通考卷五十九
