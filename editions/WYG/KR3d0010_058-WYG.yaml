body:
  text: 農餘彚考詩􅃎風六月食鬱及薁七月亨葵及菽八月剝􅀥傳鬱棣屬薁蘡薁也剝擊也又七月食𤓰八月㫁壺九月叔苴采荼薪樗食我農夫傳壺瓠也叔拾也苴麻子也樗惡木也箋𤓰瓠之畜麻實之糝乾荼之菜惡木之薪亦所以助男養農夫之具又九月築場圃傳春夏為圃秋冬為場箋場圃同地自物生之時耕治之以種菜茹至物盡成熟堅築以為場疏種樹菜果則謂之圃茹者咀嚼之名以為菜之别稱故書傳謂菜為茹又小雅中田有廬疆埸有𤓰是剝是菹箋中田田中也農人作廬焉以便其田事於畔上種𤓰周禮太宰以九職任萬民一曰三農生九穀二曰園圃毓草木三曰虞衡作山澤之材四曰藪牧飬蕃鳥獸五曰百工飭化八材八曰臣妾聚斂疏材注任猶倳也樹果蓏曰圃園其樊也虞衡掌山澤之官主山澤之民者澤無水曰藪牧牧田在逺郊皆畜牧之地疏材百草根實可食者疏應劭曰木曰果草曰蓏張晏曰有核曰果無核曰蓏臣瓚曰木上曰果地上曰蓏百草或取根謂菱芡之屬或取實謂若榛栗之屬皆是根實可食也又甸師共野果蓏之屬注郊外曰野果桃李之屬蓏𤓰瓞之屬又載師掌任土之法以場圃任園地注圃樹果疏之屬季秋於中為場樊圃謂之園疏田首之界家有二畝半以為井竈葱韭者故得種樹果蓏之屬又閭師凡任民任圃以樹事貢草木注謂葵韭果蓏之屬又委人掌斂野之賦斂薪芻凡疏材木材凡畜聚之物注野謂遠郊以外也凡疏材草木有實者也凡畜聚之物𤓰瓠葵芋禦冬之具也疏疏是草之實材是木之實故鄭并言之九職中聚斂疏材云百草根實不以木解材文略也又山虞掌山林之政令仲冬斬陽木仲夏斬隂木注鄭司農云陽木春夏生者隂木秋冬生者若松柏之屬康成謂陽木生山南者隂木生山北者冬斬陽夏斬隂堅濡調又凡服耜斬季材以時入之注季猶穉也服與耜宜用穉材尚柔刃也服牝服車之材又澤虞共澤物之奠注籩豆之實芹茆菱芡之屬义掌染草掌以春秋斂染草之物注染草茅蒐槖蘆豕首紫茢之屬疏更有藍皁象斗之等衆多故以之屬兼之也又場人掌國之場圃而樹之果蓏珍異之物以時斂而藏之注果􅀥李之屬蓏𤓰瓠之屬珍異葡萄枇杷之屬又柞氏掌攻草木及林麓夏日至令刊陽木而火之冬日至令剥隂木而水之若欲其化也則春秋變其水火注刊剝互言耳皆謂斫去次地之皮生山南為陽木生山北為隂木火之水之則使其肄不生化猶生也謂時以種穀也變其水火者乃所火則水之所水則火之則其土和美疏斬而復生曰肄若以水火斬而不復重生故云使其肄不生也又薙氏掌殺草春始生而萌之夏日至而夷之秋繩而芟之冬日至而耜之注故書萌作甍杜子春云甍當為萌謂耕反其萌牙書亦或為萌康成謂萌之者以兹其斫其生者夷之以鉤鐮迫地芟之也若今取茭矣含實曰繩芟其繩則實不成孰耜之以耜側凍土剗之疏云含實曰繩者秋時草物含實也又若欲其化也則以水火變之注謂以火燒其所芟萌之草已而水之則其土亦和美矣月令季夏燒薙行水利以殺草如以熱湯是其一時著之史記貨殖列傳陸地牧馬二百蹄索隠曰按馬有四足二百蹄有五十匹也牛蹄角千漢書音義曰百六十七頭也千足羊澤中千足彘韋昭曰二百五十頭水居千石魚陂徐廣曰魚以斤兩為記也石正義曰言陂澤養魚一歳收得千魚賣也山居千章之材章大材也安邑千樹􅀥燕秦千樹栗蜀漢江陵千樹橘淮北常山已南河濟之間千樹荻陳夏千畝漆齊魯千畝桑麻渭川千畝竹及名國萬家之城帶郭千畝畝鍾之田徐廣曰六斛四斗也若千畝巵茜徐廣曰巵音支鮮支也茜音倩一名紅藍其花染繒赤黃也千畦薑韭徐廣曰千畦二十五畝駰案韋昭曰畦猶壠此其人皆與千户侯等又通邑大都酤一歳千釀正義曰醸千瓮酟醯醋曰酒酟醯醬千􅒤醬千甔孟康曰儋石􅑥受一石故云儋屠牛羊彘千皮販穀糶千鍾薪槀千車船長千丈木千章竹竿萬个正義曰釋名云竹曰个木曰枚其軺車百乘牛車千兩木器髤者千枚徐廣曰髤音休漆也銅器千鈞素木鐵器若巵茜千石馬蹄躈千牛千足羊彘千雙僮手指千漢書音義曰僮奴婢也古者無空手游日皆有作務須手指故曰手指以别馬牛蹄角也筋角丹砂千斤其帛絮細布千鈞文采千匹榻布皮革千石顔思古曰麤厚之布也漆千斤糵麴鹽豉千荅鮐鮆千斤説文云鮐海魚也鮆刀魚也鯫千石鮑千鈞正義曰鯫謂雜小魚也鮑白也棗栗千石者三之言􅀥栗三千石乃與上物相等狐鼦裘千皮羔羊裘千石旃席千具佗果菜千鍾果菜雜果菜於山野采取子貸金錢千貫節駔會貪賈三之廉賈五之此亦比千乘之家其大率也漢書食貨志田中不得有樹用妨五穀環廬樹桑菜茹有畦𤓰瓠果蓏殖於疆場雞豚狗彘毋失其時又循吏傳黃霸為潁川太守使郵亭鄉官皆畜雞豚為條敎班行民間勸以務耕桑節用殖財種樹畜養又龔遂為渤海太守勸民務農桑令口種一樹榆百本䪥五十本葱一畦韭家二母彘五雞秋冬課收斂益畜果實蔆芡勞來循行郡中皆有畜積又貨殖傳先王之制敎民種樹畜養五穀六畜及至魚鼈鳥獸萑蒲材幹器械之資所以養生送終之具靡不皆育育之以時而用之有節山不茬蘖澤不伐夭蝝魚麛卵咸有常禁所以順時宣氣蕃阜庻物稸足功用如此之備也園籬齊民要術凡作園籬者於牆基之所方整耕治凡耕作三壟中間相去各二尺秋上酸􅀥熟時收於壟中穊種之至明年秋生髙三尺許間㫁去惡者相去一尺留一根必須稀穊均調行五條直相明當至明年春剝去横枝剝必留距若不留距侵皮痕大逢寒即死此剝樹常法也剝訖即編為巴籬隨宜夾剝務使舒緩急則不復得長故也又至明年春更剝其末又編之髙七尺便足欲髙作者亦任人意折柳樊圃斯其義也種樹書曰棘能辟霜花果以棘園中即茂其種柳作之者一尺一樹初時斜挿挿時即編其種榆莢者一同酸􅀥如其栽榆與柳斜直髙與人等然後編之數年長成共相蹙迫交柯錯葉特似房櫳既圖龍蛇之形復寫鳥獸之狀緣勢嶔㟢其貌非一若值巧人其便採用則無事不成尤宜作杌其盤紆茀鬱其文互起縈布錦繡萬變不窮農政全書凡作園於西北兩邉種竹以禦風則果木畏寒者不至凍損若於園中度地開池以便養魚灌園則所起之土桃向西北二邉築成土阜種竹其上尤善西北既有竹園禦風但竹葉生髙下半仍透風老圃家作稻草苫縛竹上遮滿之若種慈竹則上下皆隱蔽矣又凡作園籬諸品冬青取其幹可作骨取子作藥取其葉冬夏不凋病在二十年後即爛壞或云以豬糞壅之則久宜試二三八九月移爵梅取其條葉作刷綠布取其幹可作骨取其遠年者根株盤結可作几杌等器正二月移五加皮取其幹可作骨取其刺可却姦取其芽可食取其根皮作藥作酒正月揷金櫻子取其刺可却姦取其花香味可翫取其子可作藥正月揷梅取其花香味可翫取其幹可作骨取其幹上微有刺移種不拘時枸把取其芽可食取其子作藥取其根作藥取其幹作骨正八九月揷飛來子取其花可食種不拘時椒取其刺可却姦取其幹可作骨取其實可食可作藥取其葉可作味核可作油四月種茱萸取其榦可作骨取其實可食可作藥梔子取其榦可作骨取其花香單臺者取其子作藥作染色取其葉不凋猫奶子取其榦可作骨取其刺可却姦取其葉冬夏不凋取其花香取其嫩葉可食名神仙茶此移種者迎春花取其花早種於籬内酸􅀥取其榦可作骨取其枝可却姦取其子可食取其仁藥材移種不拘時木筆取其榦可作骨取其花美分移於籬内桑取其榦可作骨取其葉可飼蠶取其椹可食可作藥壓條枳取其榦可作骨取其刺可却姦取其枝可蓋牆可賣取其子可傅生接博移種槿取其榦可作骨取其花不拘時揷野薔薇取其刺可却姦取其花可蒸露可揷可移榖樹取其榦可作骨取其汁可作膠書金字取其子中藥材取其皮可造紙取其木可種蕈楝取其榦可作骨且速成榆取其榦可作骨且速成莢可食白楊取其榦可作骨速成修取為薪且不若楊柳之多蛀也宜揷刺杉取其榦可作骨刺可却姦皁莢榦作骨且速成芽可食有刺可却姦種山礬不凋花香易成揷金銀花花香中藥移椿樹易成芽可食種枇杷易成冬月開花花藥材榦葉俱青揷小葉樹易成芽可食木龍易成葉貼毒瘡不凋栽種淮南子夫移樹者失其隂陽之性則莫不枯槁髙誘曰失猶易齊民要術凡移栽一切樹木欲記其隂陽不令轉易隂陽易位則難生小小栽者不須記也大樹髠之不髠風搖則死小則不髠先為深坑内樹訖以水沃之著土令如薄泥東西南北摇之良久搖則泥入根間無不活者不搖虛多死其小樹則不須爾然後下土堅築近上二寸不築取其柔潤也時時灌溉常令潤澤每澆水盡即以燥土覆之覆則保澤不覆則乾涸埋之欲深勿令搖動凡栽樹訖皆不用手捉及六畜觸突戰國䇿曰夫栁縱横顛倒樹之皆生十人樹之一人搖之則無生矣凡栽樹正月為上時諺曰正月可栽樹言得時易生也二月為中時三月為下時􅀥雞口槐兔目桑蝦蟇眼榆負瘤散自餘雜木鼠耳䖟趨各其時此等名目皆是葉生形容之所象似以此時栽種者葉皆即生早栽者葉晚出雖然寧太早為佳不可晚也樹大率種數既多不可一一備舉凡不見者栽時之法皆求之此條崔寔曰正月自朔暨晦可移諸樹竹漆桐梓松柏雜木唯有果實者及望而止過十五日則果少實務本新書曰一切移栽枝記南北根深土逺寛掘土以蓆包包裹不令見日大車上船載以人撁拽緩緩而行車前數百步平治路上車轍務要平坦不令車輪搖擺於處所依法栽培樹樹決活古人有云移樹無時莫令樹知區宜寛深以水攪土成泥仍糝新粟大麥百餘粒即下樹栽樹大者須以木扶架若根不動搖雖丈許之木可活仍須芟去繁枝則不招風務本直言云近聞諸般材木比之往年價直重貴蓋因不種不栽一年少如一年可為深惜古人云木奴千無㓙年木奴者一切樹木皆是也自生自長不費衣食不憂水旱其果木材植等物可以自用有餘又可以易換諸物若能多廣栽種不惟無㓙年之患抑亦有久逺之利焉種樹書曰凡移樹不要傷根鬚須濶不可去土恐傷根徐光啓曰土封縱小無絶根鬚其法宜先寛掘土封漸用竹木剔去旁土勿傷細根約量人力可致者以繩束之新坑務搯令濶大令根鬚條直不可卷曲移樹者以小牌記取南枝不若先鑿窟沃水攪泥方栽築令實不可踏仍多以木扶之恐風揺動其顛則根揺雖尺許之木亦不活根不揺雖大可活更莖上無使枝葉繁則不招風又曰移樹木用穀調泥漿水於根下沃之無不活者又曰凡栽植忌西風又曰凡植果木先於霜降後鋤掘轉成圓垜以草索盤定泥土復以鬆土填滿四遭用肥土澆實次年正二月移至今種處宜寛作區安頓端正然後下土半區將木棒斜築根垜底下須實上以鬆土加之髙於地面二三寸度其淺深得所不可培壅太髙但不露大根為限若本身髙者必用椿木扶縳庶免風雨搖動灌以肥水天晴每朝水澆半月根實生意動則已大樹秃稍小不必秃若路遠未能便種必須遮蔽日色垜碎日炙則難活矣凡移果樹宜寛深開掘先入糞和泥乾次日用土蓋根無宿土者深栽泥中輕輕提起樹根使與地平則其根舒暢易活必三四日後方可用水澆灌勿令揺動柳宗元郭槖駞傳駞所種樹或移徙無不活且碩茂早實以蕃他植者雖窺伺傚慕莫能如也有問之對曰槖駞非能使木壽且孶也以能順木之天以致其性焉爾凡植木之性其本欲舒其培欲平其土欲故其築欲宻既然已勿動勿慮去不復顧其蒔也若子其置也若棄則其天者全而其性得矣故吾不害其長而已非有能碩而茂之也不抑耗其實而已非有能早而蕃之也他植者則不然根拳而土易其培之也若不過焉則不及茍有能反是者則又愛之太恩憂之大勤旦視而暮撫已去而復顧甚者爪其膚以驗其生枯搖其本以觀其踈宻而木之性日以離矣雖曰愛之其實害之雖曰憂之其實讎之故不我若也農政全書凡諸木俱宜在下弦後上弦前移種地氣隨月而盛觀諸潮汐此理易晰矣方氣盛時生氣全在枝葉故移則傷其性接則失其氣伐用則潤氣滿中久而生蠧也又分栽者於樹木根傍生小株每株就本根連處截㫁未可便移須待次年方可移置别處或叢生亦必按時月分植則易活也又壓條者身截半㫁屈倒於地熟土兠一區可深五指餘卧條於内用木鈎子攀抝在地以燥土壅近身半段露稍頭半段勿壅以肥水灌區中至梅雨時枝葉仍茂根必生矣次年此日初葉將萌方㫁連處是年霜降後移栽尤妙又凡扦揷花木先於肥地熟斸細土成畦用水滲定正二月間樹芽將動時揀肥旺發條㫁長尺餘每條上下削成馬耳狀以小杖刺土深約與樹條過半然後以條揷入土壅入每穴相去尺許常澆令潤搭棚蔽日至冬換作煖䕃次年去之候長髙移栽初欲扦揷天隂方可用手過雨十分無雨難有分數矣大凡草木有餘者皆可採條種㝷枝條嫩直者刀削去皮二寸許以蜜固底次用生山藥搗碎塗蜜上將細軟黃泥裹外埋隂處自然生根又春花以半開者摘下即揷之蘿蔔上實土花盆内種之灌溉以時花過則根生矣不傷生意又可得種亦竒法也立夏日取交春一個時辰内扦揷各色樹木入地四五寸無不活者當年即便生結又云於正二月上旬取樹木嫩枝扦揷勝於種核五年方大揷扦全活則二年已生矣食經曰種名果法三月上旬斫好直枝如大母指長五尺内著芋魁種之無芋大蕪菁根亦可用便民圖凡果樹茂而不結實者於元日五更以斧斑駁雜砧則子繁而不落謂之嫁果十二月晦日夜同若嫁李樹以石頭安樹了中又正月間根芽未生於根旁寛深掘開㝷攢心釘地根鑿去謂之騸樹留四邊亂根勿動仍用土覆蓋築實則結子肥大勝揷接者農桑輯要凡木皆有雌雄而雄者多不結實可鑿木作方寸大以雌木填之乃實以銀杏雄樹試之便驗社日以杵舂百果樹下則結實牢不實者亦宜用此法種樹書鑿果樹納少鍾乳粉則子多且美又樹老以鍾乳末和泥於根上揭去皮抹之復茂農政全書雄木無用而衆雌之中間有一二雄者更妙諺云羣雌間一雄結實飽蓬蓬接果務本新書凡桑果以接博為妙一年後便可獲利昔人以之譬螟子者取其速肖之義也凡接枝條必擇其美宜用宿條向陽者則氣壯而茂嫩條隂弱而難成根株各從其類然荆桑亦可接魯桑梅可接杏桃可接李接工用細齒截鋸一連厚脊利刃小刀一把要當心手凝穏又必趂時以春分前後十日為宜或取其條襯青為期然必待時暄可接蓋欲藉陽和之氣也一經接博二氣交通以惡為美以彼易此其利有不可勝言者矣接博其法有六一曰身接先用細鋸截去元樹枝莖作盤砧髙可及肩以利刃小刀際其盤之兩旁微起小罅深可寸半先用竹籖之測其深淺却以所接條約五寸長一頭削作小箆子先噙口中假津液以助其氣却内之罅中皮肉相對揷之訖用皮樹封繫寛𦂳得所用牛糞和泥斟酌封裹之勿令透風外仍上留二眼以泄其氣徐光啓曰開砧宜用老鴉觜為妙髙如馬低如瓦二曰根接鋸截㫁元樹身去地五寸許以所接條削箆揷之一如身接法就以土培封之以棘圍䕶之三曰皮接用小利刃刀子於元樹身八字斜剉之以小竹籖測其深淺以所接枝條皮肉相向揷之封䕶如前法候接枝發茂去其元樹枝莖使之莖茂耳四曰枝接如皮接之法而差近之耳五曰靨接小樹為宜先於元樹横枝上截去留一尺許於所取接條樹上眼外方半寸刀尖割㫁皮肉至骨併帶凝揭皮肉一方片須帶芽心口噙少時取出印濕痕於横枝上以刀尖依痕刻㫁元樹靨處大小如之以接接之上下兩頭以桑皮封繫𦂳慢得所仍用牛糞泥塗䕶之隨樹大小酌量多少接之六曰搭接將已種出芽條去地三寸許上削作馬耳將所接條倂削馬耳相搭接之封繫如前法糞壅農桑輯要正月取樹本大如斧柯及臂者皆堪接謂之樹砧砧若稍大即去地一尺截之若去地近截之則地力大狀矣若夫所接之木稍小即去地七八寸截之若砧小而髙截則地氣難應須以細齒鋸截鋸齒麤即損其砧皮取快刀子於砧緣相對側劈開令深一寸每砧對接兩枝候俱活即待葉生去一枝弱者所接樹選其向陽細嫩枝如筯麄者長四寸許陰枝即少實其枝須兩節兼須是二年枝方可接接時微批一頭入砧處插入砧緣劈處令入五分其入須兩邊批所接枝皮處揷了令與砧皮齊切令寛急得所寛即陽氣不應急則力大夾煞全在細意酌度揷枝了别取本色樹皮一片長尺餘濶二三分纒所接樹枝並砧緣瘡口恐雨水入纒訖即以黃泥泥之其砧面並枝頭並以黃泥泥之對揷一邊皆同此法泥訖仍以紙裹頭麻繩縛之恐泥落故也砧上有葉生即旋去之乃以大糞壅其砧根外以刺棘遮䕶勿使有物動撥其枝春雨得所尤易活其實内子相類者林檎梨向木𤓰砧上栗子向櫟砧上皆活蓋是類也張約齋種花法注云春分和氣盡接不得夏至陽氣盛種不得春接樹必待貼頭回青無有不活大都在春分前後亦有宜待穀雨者何云春分不接也種則立夏後便不宜矣立春正月中旬宜接櫻桃木樨徘徊黃薔薇正月下旬宜接桃梅杏李半支紅臘梅梨􅀥栗柿楊梅紫薔薇浙人亦云然宜試之恐彼中稍暖故得早耳二月上旬可結紫笑綿橙匾橘已上種接莖於十二月間沃以糞壤兩至春時花果自然結實立秋後可接林檎川海棠黃海棠寒球轉身紅視家棠梨葉海棠南海棠以上接法並要時將頭與木身皮對皮骨對骨用麻皮𦂳𦂳纒上用箬葉寛覆之如萌出相長即撒去箬葉無有不盛也但取實内核相似葉相同者皆可接換下向根貼謂之樹貼如桃貼接杏接梅櫟貼接栗蓋此類也枳接柑橘亦宜本色接換本色美者最妙若貼大宜髙截貼小宜近地截截訖用利刀銛貼上齒痕㝷樹木佳者取到接頭須經二年肥盛嫩枝如筯大者㫁長三四寸以上根頭一寸半用薄刀子刻下中半刻成判官頭樣削其骨成馬耳狀又將馬耳尖頭薄骨翻轉割去半分將接頭口内噙養溫暖以借生氣然後將刀於貼盤左右皮内膜外批豁兩道或三道納所噙接頭於渠子内極要快摙𦂳宻須使老樹肌肉與接頭肌肉相對著或二或三皆了用竹籜攔寸許劈開雙指齊貼面於接頭外面所批痕處包裹定麻皮復用竹籜包其貼頂縛定次用爛泥封其纒處舊麻縛着上用寛兠盛土培養接頭勿令透風見日土乾則灑之所包土上條芽長出非接頭上者悉令去之以防分力培土上露接頭一二眼通活氣上用竹籜蔽之以防日雨種樹書凡接花木雖已接活内有脂力未全包生接頭切要愛䕶如梅雨浸其皮必不活又凡接矮果及花用好黃泥曬乾篩過以小便浸之又曬乾篩過再浸之凡十餘度以泥封樹皮用竹筒破兩半封裹之則根立生次年㫁其皮截根栽之又接樹須取向南隔年者接之則著子多經數次接者核小但核不可種耳不可接者乃用過貼先移葉相似之小樹於其畔可以枝相交合處以刀各削其半對合著竹籜包裹麻皮纒固泥封之大樹所合枝傍截半段小樹所合枝去稍弱不必半段欲花果兩般合色則勿去其稍來年春始截㫁復待長定然後移栽農政全書接樹有三訣第一襯青第二就節第三對縫依此三法萬不失一修葺澆灌便民圖修葺法正月間削去低枝小亂者勿令分樹氣力則結子自肥大又曰凡樹脚下常令耘草清淨草多則引蟲蠧亦能偷力乏樹勿使下有坑坎雨後水漬根朽葉黃宜令平滿髙如地面三五寸農政全書凡果木皆須剪去繁枝使力不分試看開花結果之際凡無花無果細枝後來亦須發葉豈不減力若預先芟去則力聚於花果矣又凡果俱三年老枝上所生則大而甘又凡樹欲取材如椐榆杉柏之類可令挺枝無旁枝其他取花葉芽實者皆令枝旁生剝削令至六七尺其下可通人行如此便於採掇凡本樹未發芽前半月以上俱可修理種樹書澆灌法凡木早晩以水沃其上以喞筒唧水其上必須用停久冷糞正宜臘月亦必和水三之一草之類宜四季用肥如正月則用五分糞五分水二月三分糞七分水三四月二分糞八分水五六七八月十一二月八分糞二分水臘月純糞不妨遇天旱只宜白水澆或加一分糞二月或用澆肥多有所忌假如二月樹上已發嫩條必生新根澆肥則根桔而死如萌未發者不妨三月亦然又有一等不怕肥者如石榴茉莉之屬雖多肥不妨五月夏至梅雨時澆肥根必腐爛八月亦不可澆肥白露雨至必生細根肥之則死六七月花木發生已定者皆可輕輕用肥謹依月令等級澆之及小春時便能發旺如柑橘之類則不可但用肥則皮被破脂流冬必死矣徐光啓曰蘇人種柑橘用肥培壅一切樹木俱宜十一二月正月餘皆不可合用灰糞和土或麻餅屑和土壅根髙三五寸澆水實定不可太過收種下種農政全書收種下種法凡收子核必擇其美者作種必待果實熟甚劈取於牆下向陽暖處深寛為坑以牛馬糞和土以半於坑底鋪平取核尖頭向上排定復以糞土覆之令厚尺餘至春生芽萬不失一忌水浸風吹皆令仁腐一切草木種子俱瓢盛懸掛為佳凡取種子必充實老黒者曬乾以瓶收貯髙懸勿近地氣恐生白膜則無用隔年亦不生及時秧子勿使遲誤亦不宜太早地不厭髙土肥為上鋤不厭數土鬆彌良各要按時及節臨下子時必日中曬曝擇淨然合浸者浸之不浸便用撒入土内子細者撒在土面下子訖即以糞沃其上成行與打潭種者亦然下子者必要晴雨則不茁三五日後又要雨旱則不生須頻澆水種樹書凡果候肉爛和核種之否則不類其種衛果齊民要術衞果法正月盡二月可剝樹枝二月盡三月可揜樹枝埋樹枝土中令生二歳以上可移種凡五果花盛時遭霜則無子常預於園中往往貯惡草糞天雨新晴北風寒切是夜必霜此時放火作熅少得烟氣則免於霜矣種樹書草木羊食者不長凡花最忌麝香𤓰尤忌之賸栽蒜薤之類則不損又法於上風頭以艾和雄黃末焚即如初又木自南而北多遇寒而枯只於臘月去根旁土麥穰厚覆之燃火深培如故則不過一二年皆結實若歳用此法則南北不殊猶人注艾耳又果樹生小青蟲虰蜻肹掛樹自無便民圖治蠧蟲法正月間削杉木作釘塞其穴則蟲立死正月一日五更把火遍照一切果樹下則無蟲災或清明日亦可農桑輯要木有蠧蟲以芫花納孔中或納百部葉蟲立死農政全書凡治樹中蠧蟲以硫黃研極細末和河沙少許令稠遍塞蠧孔中其孔多而細即遍塗其枝榦蟲即盡死矣又法用鐵線作鉤取之又用硫黃雄黃作烟塞之即死或用桐油紙油燃塞之亦驗如生毛蟲以魚腥水潑根或埋蠶蛾於地下又凡鳥來食果或張網罩樹多損樹枝或持竿鼓柝甚費力須用弩射取一二置竿首倚竿於樹其鳥悉不來採果伐木便民圖採果實法凡果實初熟時以兩手採摘則年年結實果子熟時須一頓摘其美者遲留之雖待熟亦不美勿先摘動被人盗吃飛禽就來窺食切宜謹之遯齋閒覽用人髪掛枝上則飛鳥不敢近種樹書凡果實未全熟時摘若熟了即抽過筋脉來歳必不盛徐光啓曰宜少留以飬其力有過不採者甚壞樹果實異常者根下必有毒蛇切不可食齊民要術凡伐木四月七月則不蟲而堅韌榆莢下桑椹落亦其時也然則凡木有子實者候其子實將熟皆其時也非時者蟲蛀且脆也凡非時之木水漚一月或火煏取乾蟲則不生水浸之木皆亦柔韌禮記月令孟春之月禁止伐木孟夏之月無伐大樹逆時氣也季夏之月樹木方盛乃命虞人入山行木為斬伐季秋之月草木黃落乃伐薪為炭仲冬之月日短至則伐木取竹箭淮南子曰草木未落斧斤不入山林九月草木解也崔寔曰自正月以終季夏不可伐木必生蠧蟲或曰以上旬伐之雖春夏不蠧猶有剖析間解之害又犯時令非急勿伐十一月伐竹木十二月斬竹伐木不蛀斫松在下弦後上弦前永無白蟻他樹亦同欽定授時通考卷五十八
