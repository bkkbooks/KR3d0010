front:
  text: 欽定四庫全書欽定授時通考卷七十五
  hash: sha256:95f9698737922583ce5de223d3899ad37fe707b158b1ebe4dfd4040cb20f4c05
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3d0010_WYG_075-1a, image: WYG0732/WYG0732-1051c.png}
body:
  text: 蠶事繰絲淮南子繭之性為絲然非得工女煮以熱湯而抽其統紀則不能成絲農書藏繭甕中七日之後出而繰之頻頻換木即絲明快隨以火焙乾即不黯斁而色鮮潔也蠶書常令煮繭之鼎湯如蟹眼必以筯其緒附於先引謂之餵頭毋過三絲則絲麤不及則脆其審舉之凡絲自鼎道錢眼升於鏁星星應車動以過添梯乃至于車錢眼為版長過鼎面廣三寸厚九黍中其厚插大錢一出其端横之鼎耳後鎮以石緒總錢眼而上之謂之錢眼鏁星為三蘆管管長四寸樞以圓木建兩竹夾鼎耳縛樞於竹中管之轉以車下直錢眼謂之鏁星車之左端置環繩其前尺有五寸當車牀左足之上建柄長寸有半匼柄為鼓鼓生其寅以受環繩繩應車運如環無端鼓因以旋鼔上為魚魚半出鼓其出之中建柄半寸上承添梯添梯者二尺五寸片竹也其上揉竹為鈎以防絲竅左端以應柄對鼔為耳方其穿以閑添梯故車運以牽環繩繩簇鼔鼔以舞魚魚振添梯故絲不過偏而制車如轆轤必活其兩輻以利脫絲士農必用繰絲之訣惟在細圎匀𦂳無使褊慢節核麤惡不匀熱釡釡要大置於竈上釡上大盆甑接口添水至甑中八分滿甑中用一板攔斷可容二人對繰也繭少者止可用一小甑水須熱宜旋旋下繭泠盆盆要大先泥其外用時添水八九分釡要小用突竈半破甎坏圓壘一遭中空其髙比繰絲人身一半其圎徑相盆之大小當中壘一小臺坐串盆于小臺上其盆要比圎壘髙一唇靠圓壘安打絲頭小釡竈比圓壘低一半揜火透圎壘竈後火煙過處名揜火與揜火相對圓壘匝近上開煙突口做一卧突長七八尺以上先於安突一面壘一臺比突口微低又相去七八尺外安一臺髙五尺用長一丈椽二條斜磴在二臺上二椽相去濶一甎坏許用甎坏泥成一卧突如二椽上平鋪甎坏一層兩邊側立上復平葢泥了便成一卧突也須與竈口相背謂如竈口向南突口向北是也繰盆居中火衝盆底與盆下臺煙焰遶盆過煙出卧突中故得盆水常溫又匀也又得煙火與繰盆相逺繰絲人不為煙火所逼故得安詳也又熱釡可繰麤絲單繳者雙繳亦可但不如泠盆所繰者潔淨光明也泠盆可繰全繳細絲中等繭可繰雙繳比熱釡者有精神而又堅韌雖日泠盆亦是大溫也又軖車牀髙與盆齊軸長二尺中徑四寸兩頭三寸或四角或六角臂通長一尺五寸須脚踏又繰車竹筒宜細鐵條子串筒兩椿子亦須鐵也又打絲頭用一人小釡内添水九分滿竈下燃麤乾柴候水大熱下繭于熱水内用筯輕剔撥令繭滚轉盪匀挑惹起囊頭手捻住於水面上輕提掇數度復提起其囊頭下即是清絲摘去囊頭一手撮捻清絲一手用漏杓綽繭欵送入温水盆内將清絲掛在盆外邊絲老翁上盆邊釘挿一橛子名絲老翁又繰絲用一人将絲老翁上清絲約十五絲之上總為一處穿過錢眼繳過䈏頭蛾眉杖子上兩繳杖子下兩繳掛於軖上又取絲老翁上清絲如前掛於軖上右脚踏軖右轉長切照覷撥掠兩絲窩于内有繭絲先盡蛹子沉了者繭絲斷了繭浮出絲窩者其絲窩減小即取清絲約量添加務要兩絲窩大小長均黄省曾曰繰之不可及也淹而甕之泥之每大缸用鹽四兩荷葉包之於缸甕之口又塞實荷葉至七日而蛾死泥之也仍數視之有少罅則蛾生凡拈絲綿之線一分銀是拈一兩其為綿也蛾口為最上岸次之黄繭又次也繭衣者最下蛾口者出蛾之繭也上岸者繰湯無緒撈而出者也繭衣繭外之蒙茸蠶初作繭而營者也農政全書愚意繰絲要作連冷盆釜俱改用砂鍋或銅鍋比鐵釜絲必光亮以一鍋專煮湯供絲頭釜二具串盆二具繰車二乘五人共作一鍋二釜共一竈門火烟入於卧突以熱串盆一人執爨以供二釜二盆之水為溝以瀉之為門以啟閉之二人直釜專打絲頭二人直盆主繰即五人一竈可操繭三十斤勝於二人一車一竈繰絲十斤也是五人當六人之功一竈當三繰之薪矣繅車圖説繅車繅絲自鼎靣引絲以貫錢眼升繅於星星應車動以過添梯乃至於軖方成繅車秦觀蠶書載繅車之制今呼車為軖軖必以牀以承軖軸軸之一端以鐵為裊掉復用曲木擐作活軸右足踏動軖即隨轉自下引絲上軖總名曰繅車熱釡圖説繰絲自鼎面引絲直錢眼此繰絲必用鼎也今農家象其深大以盤甑按釡亦可代鼎故農桑直説云釡要大置於竈上釡上大盤甑接口添水至甑中八分滿可容兩人對繅水須常熱宜旋旋下繭繰之多則煮損凡繭多者宜用此釡以趨速效泠盆圖説泠盆用溫水南北各有所宜通訣云南州誇泠盆泠盆繳絲何輕匀北俗尚熱釡熱釡絲圓儘多緒即今南北均所長熱釡泠盆俱此軖軖頭轉機須足踏錢眼添梯絲度滑非絃非管聲咿􅥆村北村南響相答織染書經禹貢荆州厥篚𤣥纁蔡傳周禮染纁𤣥纁絳色幣也大全鄭氏曰染纁者三入而成又再染以黒則為緅又再染以黑則為緇𤣥色在緅緇之間其六入者是染𤣥纁之法也此州染𤣥纁善故貢之徐州厥篚𤣥纎縞蔡傳𤣥赤黑色幣也纎縞皆繒也禮曰及期而大祥素縞麻衣中月而禫禫而纎記曰有虞氏縞衣而養老則知纎縞皆繒之名也曽氏曰𤣥赤而有黒色以之為衮所以祭也以之為端所以齊也以之為冠以為首服也黑經白緯曰纎纖也縞也皆去㐫即吉之服也禮記月令蠶事既登分繭稱絲效功以共郊廟之服毋有敢惰注登成也分繭分布于衆婦之繅者稱絲效功以多寡為功之上下又季夏之月命婦官染采黼黻文章必以法故無或差貸黑黄倉赤莫不質良毋敢詐偽以給郊廟祭祀之服以為旗章以别貴賤等級之度疏于此月之時命掌婦功之官染此五色之采白與黑謂之黼黑與青謂之黻青與赤謂之文赤與白謂之章染此等之物必以舊法故事無得有參差貸變必以此月染之者以其盛暑濕染帛為宜也周禮天官太宰之職以九職任萬民七曰嬪婦化治絲枲注謂國中婦人有徳行者變化絲枲以為布帛之等也又染人掌染絲帛凡染春暴練夏纁𤣥秋染夏冬獻功注暴練練其素而暴之纁謂絳也夏大也秋乃大染又冬官㡛氏湅帛以欄為灰渥淳其帛實諸澤器淫之以蜃清其灰而盝之而揮之而沃之而盝之而塗之而宿之明日沃而盝之晝暴諸日夜宿諸井七日七夜是謂水涷注沃以欄木之灰漸釋其帛也澤器謂滑澤之器蜃蛤也淫薄粉之令帛白清澄也於灰澄而出盝晞之晞而揮去其蜃更渥淳之朝更沃至夕盝之又更沃至旦盝之亦七日如漚絲也漢書食貨志冬民既入婦人同巷相從夜績女工一月得四十五日必相從者所以省費燎火同巧拙而合習俗也隋書地理志豫章之俗頗同吴中一年蠶四五熟勤于紡績亦有夜浣紗而旦成布者俗呼鷄鳴布管子女貢織帛又女有常事一女不織民有為之寒者又善為國者使女勤于纖微而織歸于府又一女不織民或為之寒故事再其本則無賣其子者事三其本則衣食足事四其本則正籍給事五其本則逺近通死得藏墨子染于蒼則蒼染于黄則黄五入則為五色不可不慎又婦人夙興夜寐紡績織紝此其分事也淮南子黼黻之美在于杼軸齊民要術六月命女工織縑練可燒灰染青紺雜色又四月繭既入簇趨繰刮線具機杼敬經絡崔寔曰八月擘絲治絮製新浣故及韋履賤好預買以備冬寒又八月涼風戒寒趣練縑帛染綵色農桑通訣織紝婦人所親之事傳曰一女不織民有寒者古謂庶士以下各衣其夫秋而賦事烝而獻功􅄽則有辟是也凡紡絡經緯之有數梭𣙜機杼之有法雖一絲之緒一綜之交各有倫叙皆須積勤而得累工而至日夜精思不致差悮絲絲可成幅疋如閨閫之屬務之不惟防閑驕逸又使知其被服之所自不敢易也絲籰圖説絲籰絡絲具也方言曰援兗豫河濟之間又謂之轅説文曰籰収絲者也或作􅀈從角間今字從竹又從矍竹器從人持之矍矍然此籰之義也然必竅貫以軸乃適於用為理絲之先具也絡車圖説絡車方言曰河濟之間絡謂之給説文曰車樹為柅易姤曰繫于金柅通俗文曰張絲曰柅葢以脱軖之絲張于柅上上作懸鉤引致緒端逗于車上其車之制必以細軸穿籰措于車座兩柱之間人既繩牽軸動則籰隨軸轉絲乃上籰此北方絡絲車也南人但習掉籰取絲終不若絡車安且速也經架圖説經架牽絲具也先排絲籰于下上架横竹列環以引衆緒總于架前經􅑉一人往來挽而歸之紖軸然後授之機杼緯車圖説緯車方言曰趙魏之間謂之厯鹿車東齊海岱之間謂之道執今又謂繀車通俗文曰織纖謂之繀受緯曰莩其樹上立柱置輪輪之上近以鉄條中貫細筒乃周輪與筒繚環繩右手掉綸則筒隨輪轉左手引絲上筒遂成絲繀以充織緯織機圖説織機織絲具也按黄帝元妃西陵氏曰儽祖始勤蠶事月大火而浴種夫人副禕而躬桑乃獻繭絲遂稱織紝之功因之廣織以給郊廟之服見路史傅子曰舊機五十綜者五十躡六十綜者六十躡馬生者天下之名巧也患其遺日喪功乃易以十二躡今紅女繒惟用二躡又為簡要凡人之衣被于身者皆其所自出也梭圖説梭通俗文曰織具也所以行緯之莎砧杵圖説砧杵𢷬練具也東宫舊事曰太子納妃有石砧一枚又𢷬衣杵十荆州記曰秭歸縣有屈原宅女嬃廟𢷬衣石葢古之女子對立各執一杵上下𢷬練于砧其丁東之聲互相應答合亦作臥杵對坐𢷬之又便且速易成帛也絮車圖說絮車構木作架上控鈎繩滑車下置煮繭湯甕絮者掣繩上轉下滑徹甕内鈎繭出沒灰湯漸成絮段莊子所謂洴澼絖者古者纊絮綿一也今以精者為綿麤者為絮因蠶家退繭造絮故有此車煮之法常民藉以禦寒次于綿也彼有搗繭為胎謂之牽縭者較之車煮工拙懸絶矣欽定授時通考卷七十五
