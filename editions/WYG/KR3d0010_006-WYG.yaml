front:
  text: 欽定四庫全書欽定授時通考卷六
  hash: sha256:f3ff302034b064dc8ffcd1a8ae43addb713c7c126b18e7b7e3e90252dad42682
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3d0010_WYG_006-1a, image: WYG0732/WYG0732-0072a.png}
body:
  text: 天時冬書堯典申命和叔宅朔方曰幽都平在朔易傳北稱朔亦稱方都謂所聚也易謂歲改易於北方平均在察其政以順天常疏一歲之事在東則耕作在南則化育在西則成熟在北則改易故以方名配歲事爲文言順天時氣以勸課人務也春則生物秋則成物日之出也物始生長人當順其生長致力耕耘日之入也物皆成熟人當順其成熟致力收歛東方之官當恭敬導引日出平秩東作之事使人耕耘西方之官當㳟敬從送日入平秩西成之事使人收歛日之出入自是其常但由日出入故物有生成雖氣能生物而非人不就勤於耕稼是導引之勤於收藏是從送之平秩南訛亦是導日之事平在朔易亦是送日之事依此春秋而共爲賓餞勸課下民皆使致力是敬導之平均次序即是授人田里各有疆場是平均之也日短星昴以正仲冬厥民隩鳥獸氄毛傳日短冬至之日昴白虎之中星亦以七星並見以正冬之三節隩室也民改歲入此室處以辟風寒鳥獸皆生耎毳細毛以自溫焉詩豳風一之日觱發二之日栗烈傳一之日周正月也觱發風寒也二之日殷正月也栗烈氣寒也疏仲冬之月待風乃寒季冬之月無風亦寒小雅上天同雲雨雪雰雰傳雰雰雪貌豐年之冬必有積雪疏明年將豐必有積雪爲宿澤也左傳襄公十三年冬城防書事時也於是將早城臧武仲請俟畢農事禮也注土功雖有常節通以事間爲時大戴禮方冬三月草木落庶虞藏五榖必入於倉於時有事烝於皇祖皇考息國老六人以成冬事書傳主冬者昴昏中可以收歛農桑通訣立冬之節首五日水始氷次五日地始凍後五日雉入大水爲蜃次小雪中氣初五日虹藏不見次五日天氣騰地氣降後五日閉塞而成冬次仲冬大雪節氣初五日鶡鴠不鳴次五日虎始交後五日荔挺出次冬至中氣初五日蚯蚓結次五日麋角解後五日水泉動次季冬小寒節氣初五日雁北鄉次五日鵲始巢後五日雉始鴝次大寒中氣初五日雞始乳欵冬華次五日征鳥厲疾後五日水澤腹堅凡此六氣一十八候皆冬氣正養藏之令十月立冬小雪詩豳風十月穫稻爲此春酒以介眉壽傳春酒凍醪也疏穫稻爲酒唯助養老又十月滌場朋酒斯饗曰殺羔羊躋彼公堂稱彼兕觥萬壽無疆箋十月民事男女俱畢無饑寒之憂國君閒於政事而饗羣臣禮記月令孟冬之月日在尾昏危中旦七星中註孟冬日月會于析木之津斗建亥之辰其日壬癸其帝顓頊其神𤣥㝠註壬之言任也癸之言揆也日之行東北從黑道閉藏萬物月爲之佐時萬物懐任于下揆然萌芽顓頊高陽氏也𤣥㝠少皡氏之子曰脩曰熈爲水官又水始氷地始凍雉入大水爲蜃虹藏不見陳澔曰此記亥月之候蜃蛟屬此飛物化爲潛物也虹非有質而曰藏言其氣之下伏也又是月也以立冬先立冬三日太史謁之天子曰某日立冬盛德在水天子乃齊立冬之日天子親帥三公九卿大夫以迎冬于北郊又天氣上騰地氣下降天地不通閉塞而成冬又命有司循行積聚無有不歛注謂芻禾薪蒸之屬又天子乃祈來年於天宗注此周禮所謂蜡祭也天宗謂日月星辰也郊特牲天子大蜡八伊耆氏始爲蜡蜡也者合聚萬物而索饗之也蜡之祭也主先嗇而祭司嗇也饗農及郵表畷禽獸仁之至義之盡也迎貓爲其食田䑕也迎虎謂其食田豕也祭坊與水庸事也曰土反其宅水歸其壑草木歸其澤注歲十二月周之正數謂建亥之月也白虎通律中應鐘鐘動也言萬物應陽而動下藏也三禮義宗十月立冬爲節者冬終也立冬之時萬物終成因爲節名十月小雪爲中者氣叙轉寒雨變成雪故以小雪爲中齊民要術十月培築垣墻塞向墐戸上辛命典饋漬麯釀冬酒作脯腊先氷凍作凉餳煮曝飼可折麻緝績布縷作白履不借草履之賤者曰不借賣縑帛弊絮糴粟豆麻子移植橙柑橘栽種大小豆春菜生薑蘿蔔收藏地黄莙薘菜天蘿子茶子橘皮天豆栗子薏苡椒冬𤓰子芙蓉條石橘蘿蔔山藥枸把皂角苧雜事移葵接花果澆灌花木穫稻納禾稼開磚煮膠收炭造牛衣修牛馬塞北戸用葢爐石堦砌收二桑葉壅苧蔴耘麥地收猪種泥飾牛馬屋壓桑西域志天竺國以十月二十六日爲冬至冬至則麥秀歲時事要十月天時和暖似春花木重花故曰小春占驗禮記月令孟冬行春令則凍閉不密地氣上泄民多流亡行夏令則國多暴風方冬不寒蟄蟲復出行秋令則雪霜不時小兵時起土地侵削師曠占五榖貴賤常以十月朔日占風從東來春賤逆此者貴家塾事親朔日値立冬主災異値小雪有東風春米賤西風春米貴其日用斗量米若綴在斗來春陡貴甚驗又十月有三卯糴平無則榖貴農政全書十月立冬晴則一冬多晴雨則一冬多雨亦多隂寒諺云賣絮婆子看冬朝無風無雨哭號咷立冬日西北風主來年旱天熱晴過寒諺云立冬晴過寒弗要柴積又主有魚雨主無魚諺云一㸃雨一個模魚䳉冬前霜多主來年旱冬後多晚禾好十六日爲寒婆生日晴主冬暖此說得之崇德舉人徐伯和自江東石洞秩滿而歸云彼中客旅遠出專看此日若晴暖則但隨身衣服而已不必他備言極有准也月内有雷主災疫有霧俗呼曰沫露主來年水大仍相去二百單五日水至老農咸謂極驗或云要看霧著水面則輕離水面則重諺云十月沫露塘瀊十一月沫露塘乾冬初和暖謂之十月小春又謂之晒糯榖天漸見天寒日短必須夜作諺云十月無工只有梳頭吃飯工又云河東西好使犁河射角好夜作立冬前後起南北風謂之立冬信月内風頻作謂之十月五風信諺云冬至前後鴻水不走十一月大雪冬至禮記月令仲冬之月日在斗昏東辟中旦軫中注仲冬日月㑹于星紀斗建子之辰又氷益壯地始坼鶡旦不鳴虎始交陳澔曰此記子月之候鶡旦夜鳴求旦之鳥是月也日短至陳澔曰短至短之極也又芸始生荔挺出蚯蚓結麋角解水泉動注芸與荔挺皆香草結屈也解脫也水者天一之陽所生陽生而動言枯涸者漸滋發也漢書律厯志律中黄鐘黄者中之色鐘者種也陽氣施種於黄泉孳萌萬物爲六氣元也三禮義宗十一月大雪爲節者形於小雪爲大雪時雪轉甚故以大雪名節孝經說斗指子爲冬至至有三義一者隂極之至二者陽氣始至三者日行南至四民月令冬十一月糴秔稻粟豆麻子便民圖纂十一月種大小麥稻收割畢將田鋤成行壠令四畔溝洫通水下種以灰糞葢之諺云無灰不種麥須灰糞均調爲上宜雪壓易長務本新書十一月種油菜稻收畢鋤田如麥田法既下菜種和水糞之芟去其草再糞之雪壓亦易長明年初夏間收子取油甚香美齊民要術冬十一月隂陽爭血氣散冬至日先後各五日寢别内外可釀醢糴秔稻粟豆麻子此月如有雪則收貯雪水埋地中混榖種倍收不怕栽種小麥油菜萵苣桑移植松栢檜收藏鹽水蘿蔔牛蒡子豆餅水果子鹽菜宜冬至前澆培石榴柑橘橙柚梨栗棗柿雜事做酒藥接雜木造農具夾笆籬澆菜伐木斫竹打豆油置碎草牛脚下春糞田盫芙蓉條試榖種鋤油菜占驗禮記月令仲冬行夏令則其國乃旱氛霧㝠㝠雷乃發聲行秋令則天時雨汁𤓰瓠不成國有大兵行春令則蝗蟲爲敗水泉咸竭民多疥癘四時纂要冬至數至元旦五十日者民食足陶朱公書冬至日觀雲須于子時至平旦觀之若青雲北起主歲稔民安赤雲主旱黑雲主水白雲主人災黄雲大熟無雲主㓙又冬至日占風若南風主榖貴北風主歲稔西風主禾熟若東南風久有重霧主水西南風主久隂諺云冬至西南百日隂半晴半雨到清明易通卦驗冬至日謹候見雲迎送從其鄉來歲美民和春秋感精符南至有雲迎日年豐之象尚書璇璣鈐冬至隂雲祁寒有雲迎日者來歲大美京房易占虹以冬至四十六日内出東方貫艮中春多旱夏多火災粟貴玉海開元十一年十一月癸酉日長至太史奏有雲迎日祥風至日有冠珥太平之嘉應紀歴撮要冬至前米價長貧兒受長養冬至前米價落貧兒轉消索清臺占法冬至後一日得壬炎旱千里二日得壬小旱三日得壬平四日得壬五榖豐五日得壬少水六日得壬大水七日得壬河决流八日得壬海翻騰九日得壬大熟十日至十二日得壬五榖不成農政全書十一月冬至諺曰乾冬濕年坐了種田又云閙熱冬至冷淡年葢吳人尚冬至欲晴故也或云冬至雨年必晴冬至晴年必雨此說頗准嘉興縣志冬至晴主來歲稔嘉定縣志十一月十七爲彌陀生日忌南風相傳有偈云南風吹我面有米也不賤北風吹我背無米也不貴極騐沈存中筆談是月中遇東南風謂之歲露有大毒若飢感其氣開年著瘟病又云風色多與下年夏至相對農桑輯要欲知來年五榖所宜是日取諸種各平量一升布囊盛之埋窖隂地後五日發取量之息多者歲所宜也十二月小寒大寒禮記月令季冬之月日在婺女昏婁中旦氐中注季冬日月㑹于𤣥枵斗建丑之辰又雁北鄉鵲始巢雉雊雞乳陳澔曰此記丑月之候雊雉鳴也又氷方盛水澤腹堅命取氷注腹厚也此月日在北陸氷堅厚之時又日窮于次月窮于紀星廻于天數將幾終歲且更始又專而農民毋有所使註言專一汝農民之心令之豫有志于耕稼之事不可徭役徭役之則志散失業也國語及寒擊菒除田以待時耕註菒槀同寒謂季冬大寒時也漢書律厯志律中大呂呂旅也言隂大旅助黄鐘宣氣而牙物也後漢書禮儀志季冬之月星㢠廻歲終隂陽以交勞農大享臘註漢氏以午祖以戌臘午南方故以祖冬者歲之功物畢成故以戍臘白虎通大大也呂者拒也言陽氣欲出隂不許也呂之爲言拒者旅抑拒難之也三禮義宗小寒爲節者亦形於大寒故謂之小言時寒氣猶未極也又大寒爲中者上形於小寒故謂之大十一月一陽爻初起至此始徹隂氣出地方盡寒氣併在上寒氣之逆極故謂大寒易通卦驗小寒合凍蒼陽雲出氐大寒降雪黑陽雲出心風俗通臘者所以迎刑送德也大寒至常恐隂勝故以戍日臘戍者温氣也齊民要術十二月休農息役惠必下浹遂合耦田器養耕牛選任田者以俟農事之起去豬盍車骨後三歲可合瘡膏藥及臘日祀炙􅝍􅝍一作􅀢燒飲治刺入肉中及樹𤓰田中四角去䗣蟲栽種橘松花樹麥宜臈日桑檾麻收藏臘米臘水臘酒臘肉臘葱風魚脯腊臘糟猪脂氷雜事造農具舂米舂粉浸米可止瀉痢浸燈心剝桑壓果木沃桑泥墩牡丹土合臘藥掃以猪脂啗馬臘水作麫糊標背不蛀伐竹木舂稻必須冬時積日燥暴一夜置霜露中即舂若冬舂不乾即果青赤脉起不經霜不燥暴則米碎矣范成大冬舂行序臘日舂米爲一歲計多聚杵臼盡臘中畢事藏之土瓦倉中經年不壞謂之冬舂米詩臘中儲蓄百事利第一先舂年米計羣呼步碓滿門庭運杵成風雷動地篩匀箕健無粞糠百斛只費三日忙齊頭圓㓗箭子長隔蘿耀日雪生光土食瓦龕分盖藏不蠧不腐常新香去年薄收飯不足今年頓頓炊白玉春耕有種夏有粮接到明年秋刈熟鄰叟來觀還嘆嗟貧人一飽不可賖官租私債緣如麻有米冬舂能幾家占驗禮記月令季冬行秋令則白露早降介蟲爲妖四鄙入保行春令則胎夭多傷國多固疾命之曰逆行夏令則水潦敗國時雪不降氷凍消釋陶朱公書朔日値大雪或冬至皆主有灾風雨主麥好西風主盗賊起又念四夜黄昏時候鄉人束稻草於竿㸃火在田間行走名曰照田蠶看火色卜水旱色白主水色赤主旱猛烈年豐葳㽔歲歉取北風爲上又除夜燒盆爆竹與照田蠶看火色同是夜取安静爲吉通考十二月朔日値大寒主有虎出爲災値小寒主有祥瑞東風半日不止主六畜大災風主春旱又月内有霧亦主來年有水有冷雨暴作主來年六七月内横水又常以歲除夜五更視北斗占五榖善惡其星明則成熟暗則有損貪狼主蕎麥巨門主粟祿存主黍文昌主芝蔴亷貞主麥武曲主粳糯破軍主赤豆輔星主大荳雜占臘月柳眼青主來年夏秋米賤臘月雷鳴雪裡主隂雨百日又月内雷主來年旱澇愆期紀歴撮要氷結後水落主來年旱結後水漲名上水氷主水若𦂳後來年大水又除夜東北風五禾大熟農政全書冬天南風三兩日必有雪至後第三戍為臘臘前三兩番雪謂之臘前三白大宜菜麥諺云臘雪是被春雪是鬼又主來年豐稔諺云一月見三白田翁笑嚇嚇又主殺蝗子十二月謂之大禁月忽有一日稍暖即是大寒之候諺云一日赤膊三日齷齪又云大寒須守火無事不出門又云大寒無過丑寅大熱無過未申十二月立春在殘年主冬暖諺云兩春夾一冬無被暖烘烘欽定授時通考卷六
