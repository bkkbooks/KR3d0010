  text: 欽定四庫全書欽定授時通考卷二十九
  hash: sha256:5c7459ccdb2fa5f6517d6a04de3eba009910a48aff89b100080388729a8e3423
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3d0010_WYG_029-1a, image: WYG0732/WYG0732-0367a.png}
body:
  text: 穀種豆三黎豆山黧豆山黑豆苦馬豆鹿藿􅀈豆囘囘豆爾雅欇虎櫐注今虎豆纒蔓林樹而生莢有毛刺今江東呼爲㯿欇疏欇一名虎櫐郭云今虎豆纒蔓林樹而生莢有刺今江東呼爲㯿或曰葛類也子如菉豆而葉大本草綱目陳藏器曰豆子作貍首文故名李時珍曰黎亦黑色也此豆莢老則黑色有毛露筋如虎貍指爪其子亦有㸃如虎貍之斑煮之汁黑故有諸名又曰黎豆生江南蔓如葛子如皂莢子作貍首文人炒食之别無功用陶氏註蚺蛇膽云如黎豆者即此也爾雅云諸慮一名虎涉又註櫐根云苗如豆爾雅欇虎櫐郭璞註云江東呼櫐爲藤似葛而粗大纒蔓林樹莢有毛刺一名豆蒐今虎豆也千歲櫐是矣李時珍曰爾雅虎櫐即黎豆也古人謂藤爲櫐後人訛櫐爲貍矣爾雅山櫐虎櫐原是二種陳氏合而爲一謂諸慮一名虎涉又以爲千歲櫐並誤矣千歲櫐見草部貍豆野生山人亦有種之者三月下種生蔓其葉如豇豆葉但文理偏斜六七月開花成簇紫色狀如扁豆花一枝結莢十餘長三四寸大如拇指有白茸毛老則黑而露筋宛如乾熊指爪之狀其子大如刀豆子淡紫色有斑㸃如貍文煮去黑汁同猪雞肉再煮食味乃佳又黎豆氣味甘微苦溫有小毒多食令人悶農政全書山黧豆一名山豌豆生密縣山野中苗髙尺許其莖窊面劒脊葉似竹葉而齊短兩兩對生開淡紫花結小角兒其豆扁如􅀈豆味甜農政全書山黑豆生密縣山野中苗似家黑豆每一葉攢生一處居中大葉如菉豆葉傍兩葉似黑豆葉微圓開小粉紅花結角比家黑豆角極瘦小其豆亦極細小味苦農政全書苦馬豆生延津縣郊野中在處有之苗髙二尺許莖似黄茋苗莖上有細毛葉似胡豆葉微小又似蒺藜葉却大枝葉間開紅紫花結殻如拇指頂半頂間多虛俗呼爲羊尿胞内有子如麻子大茶褐色子葉俱味苦爾雅蔨鹿藿其實莥注今鹿豆也葉似大豆根黄而香蔓延生疏蔨一名鹿藿其實名莥郭云今鹿豆也葉似大豆根黄而香蔓延生本草云味苦唐本註云此草所在有之苗似豌豆有蔓而長大人取以爲菜亦微有豆氣名爲鹿豆也本草綱目李時珍曰豆葉曰藿鹿喜食之故名俗呼䝁豆䝁鹿音相近也王盤野菜譜作野緑豆爾雅云蔨音卷鹿藿也其實莥音紐即此又别録曰鹿藿生汶山山谷陶𢎞景曰方藥不用人亦無識者但葛苗一名鹿藿蘇恭曰此草所在有之苗似豌豆而引蔓長粗人採爲菜亦微有豆氣山人名爲鹿豆韓保昇曰鹿豆可生噉五月六月採苗日乾之郭璞註爾雅云鹿豆葉似大豆蔓延生根黄而香是矣李時珍曰鹿豆即野緑豆又名䝁豆多生麥地田野中苗葉似緑豆而小引蔓生生熟皆可食三月開淡粉紅花結小莢其子大如椒子黑色可煮食或磨麫作餅蒸食又鹿藿氣味苦平無毒農政全書􅀈豆生平野中北地處處有之莖蔓延附草木上葉似黑豆葉而窄小微尖開淡粉紫花結小角其豆似黑豆形極小味甘農政全書回回豆又名那合豆生田野中莖青葉似蒺藜葉又似初生嫩皂莢而有細鋸齒開五瓣淡紫花如蒺藜花様結角如杏花様而肥豆如牽牛子微大味甘各土豆産附直省志書宛平縣物産豆有青白黄黑赤菉紅藜菀菜扁龍爪刀羊角蠶等種香河縣物産猪食豆羅裙帶豆昌平州物産菉豆有官綠油綠摘綠拔綠四種黑豆有雌有雄雌者長大而暗雄者圓小而明白藊豆凡十餘種或長或團或如龍爪虎爪或如猪耳刀䥥大豆有綠褐烏三種小豆有赤白二種清苑縣土産菽有秕虱有猫眼歴城縣方産菉豆紅豆豇豆黑豆豌豆大豆有青黑作豉用黄豆小豆赤白黎黑四種扁豆俗名眉豆二種或青而長或白而肥蠶豆形似蠶蠶月生金豆長豆角刀豆鄒平縣物産豆黄黑菉赤白蠶豆數種扁豆豇豆連莢可食刀豆僅可醬食臨邑縣物産有菽江南豆月豆萊蕪縣物産豆有黑黄綠扁醬青豇赤八種秋熟豌一種夏熟又有赤小豆白小豆黎小豆扒山豆之類眉豆有數種刀豆形如刀蠶豆長豆角有數種陽信縣物産菽紅白黄黑爲用各異而綠豆最佳豆角有長扁各數種可熟食霑化縣物産豆之品大黄豆青黄豆天鵞蛋大黑豆小黑豆牛腰齊皮狐腿老䑕眼蘆花白明菉豆毛菉豆東北風紅摘豆茶豆小豆扁豆曹縣物産豆夏熟者曰豌豆匾豆秋熟者曰豇豆黄豆而黄亦有數種曰青豆青亦有數種曰黑豆黑亦有數種又曰金豆玉豆黎豆菉豆又有赤小豆白小豆綠小豆又有扒山豆管豆又有一種大黑豆鉅野縣物産豆黄豆黑豆青豆茶豆豇豆紅白黑三種菜豆蠶豆小豆紅白黑三種菉豆匾豆豌豆管豆眉豆凡十八種汶上縣物産豆黄豆青豆黑豆大小二種茶豆豇豆紅白黑三種小豆紅白黑三種菉豆匾豆豌豆管豆凡十八種陽穀縣物産黄豆黑豆綠豆白薑豆紅薑豆黑薑豆白小豆紅小豆黑小豆彎豆梅豆茶豆扁豆刀豆蠶豆豆角濮州土産豆有菉黄赤白青茶眉刀裙帶龍爪羊角之屬范縣物産豆有十二菉豆黄豆黑豆茶豆紅豇豆白豇豆豌豆匾豆􅀈豆青豆紅小豆白小豆菜豆有八眉豆蠶豆龍爪豆羊角豆白不老羅裙帶仙鶴頂刀豆觀城縣物産豆花黑黄三種日照縣物産豆其種不一大者青黄黑三色小者赤綠二色又有豌豆龍爪刀鞘裙帶白稨豆黄縣物産豆有纒絲豆紅黄豆紫羅帶豆福山縣物産豆黄豆青黄豆纒絲豆鐵黑豆小黑豆香豆俗名雀卵綠豆白小豆赤小豆花小豆玉小豆兔脚豆招遠縣物産大豆有黑青黄白綠斑數色而黄者爲多綠豆有明綠黑綠東北風之類豆以風名遇東北風則易壊故名之豇豆有紅白花三種定襄縣物産豆黄黑菉豌藊薑小連刀梅箸纒絲太平縣物産豆多種其形色大小間雜不等菜豆角有龍爪羅裙帶葉裏藏數種臨晉縣物産黑豆大小二種緊黑者爲雄豆入藥良黄豆亦有大小二種綠豆有官綠油綠二種早種者名摘角綠遲種者名拔角綠豌豆藊豆一名沿籬豆一名蛾眉豆又名茶豆豇豆有二種一種蔓長丈餘須懸架則蕃一種蔓短鋪地結莢嫩時充菜土人呼爲菜角又大赤豆土人亦呼豇豆平陸縣土産菽之名色不一惟黄豆黑豆之大者可以爲豉豇豆扁豆則可爲菜他如菉黄青紅黑白豌茶龍眼羊眼龍爪虎爪麥蘆小豆皆可日用絳州物産菽之屬纒絲豆人靣豆龍爪豆紫羅帶白不老祥符縣物産紅豇豆白豇豆菉豆黑豇豆花豇豆扁豆青豆黑豆銅皮豆紅小豆豌豆黑小豆黄豆花豆白小豆蠻小豆綠豆鄢陵縣土産豆有青白黄紅黑茶褐等色天鵞蛋老鴉眼花斑雞虱羊眼等名然大青豆及羊眼黑豆堪作豉豇豆曰羅裙帶白不老者堪爲菜紅小豆堪入藥餘皆平常延津縣物産菽有大黄大青大紫大黑扁黑扁白菉豆青豌白豌白眼紫眼羊眼等種淮南王以豆爲乳脂今豆膏豆粉豆腐較他處尤佳得淮南遺法禹州土産花斑石豆雞虱豆春不老虎爪豆葉縣土産紫豆紅滚豆龍爪豆瑪瑙豆遂平縣土産豆屬菀豆紅豆羊眼豆雞虱豆龍爪豆紫羅帶香子豆鵞眉豆紅米豆猪腦豆朴姜豆西鄉縣土産黄豆黑豆氷豆青豆茶褐豆羊眼豆赤豆菉豆麻小豆白小豆臨秋豆白扇豆六合縣物産菽之屬黑大豆青大豆有透骨青者用同黄豆黄大豆赤小豆黑小豆綠豆圓小者佳白豆一名飯豆豌豆香珠豆色紫小者尤香佛手豆白果豆粒大而香同白果羊眼豆蠶豆一名胡豆豇豆匾豆一名沿籬豆黑白二種刀豆一名挾劒豆貴池縣土宜豆有麫條蛾眉魴魮富郎冲天角豆茶豆案豆鹽城縣物産菽有茶豆荸薺豆有青黄紫赤黑白綠紅數色最早熟者有六十日雁來枯之類揚州府物産菽有大黄大青大紫大黑大褐鴨卵青白扁黑扁白小赤小小紅菉豆樓子綠摘角綠䳺鶉斑赤江白江摘角江青豌白豌白眼紫眼羊眼雁來枯杪社黄半夏黄佛指通州物産豆粒有大小色有青黄紫黑白之别名有茶青扁莆麻皮雞趾牛莊僧衣香珠蓮心烏眼沉香白果之不同吳縣物産菽之屬緇豆又名僧衣豆斑豆蠏眼豆羊眼豆香珠豆色紫小而香賊懊惱極小雲南豆似白扁豆大而長崑山縣土産中秋豆雁來紅佛手豆瑪瑙豆常熟縣物産紫羅豆有青黑花紋河陽青早熟西鄉高田種之豇青黑色長角十八豇蔓生俗名裙帶豆嘉定縣物産大黑豆凡豆之屬皆出嘉定者佳而黑豆爲之魁他邑爭購作種豌豆有大小二種四鄉俱有之大有如指頂者其味絶美他邑所出甚稀形小性硬逈不如也土人或種之花田中冬天不拔花萁用以拒霜至清明後始拔豆隨熟太倉州物産豆有黄青黑三種黄曰蘇州黄員珠黄烏眼黄水白豆扇子黄髙脚黄青曰大青小青茨菰青肉裏青黑曰大黑小黑六月烏雜色者曰僧衣豆香珠豆羊眼豆最大者曰嚇殺人小曰賊歎氣州岡自種豆収亦薄惟東土所出獨壯美絶勝他邑蠶豆出雙鳳法輪寺前者尤佳自雙鳳至南門亦㨿勝大有如指頂者他邑僅三之一性亦粗硬上海縣物産豆有南京黄以種自秣陵故名隨稻黄九月中方香綻可食六月豆種最早六月即可採食砂仁豆色紫味香豆中上品黑豆赤豆有大小二種米赤豆較赤豆畧小可和米炊飯菉豆水白豆青豆色青七月即熟白香圓白豆之最大者以色味形得名茅柴赤凡豆不宜肥土土肥則莢稀此種不用耘茅草之地叢生尤盛故名紫羅豆色紫粒小俗謂紫香圓又一種青黑花紋名僧衣豆龍爪豆江豆刀豆豌豆蠶豆白藊豆江隂縣物産黄豆名珍珠黄烏眼黄者爲上青豆名白果青最佳靖江縣食貨菽之屬其産於邑者粒有大小色有青黄紫白黑之别青色者粒大味美曰扁莆曰膠州青骨裏青豹腰青粒圓多實曰圓珠翠碧粒小曰茶青其淡碧而味色絶美者曰白果六月拔八月枯烏眼黄粒有黑眼水靣白粒大品佳麻皮黄牛墾莊兔子圓雞趾黄獐皮黄皆黄色之屬也六月白搶塲白白果豆皆白色之屬也色紫者僧衣香珠蓮心三種竝妙烏香珠大黑子黑之屬外有五色雜而宜飯者俗呼赤豆其粒細而長蔓生者曰蠏眼早収者曰麻熟丹徒縣物産豆有大小豆色有青黄黑紫褐名有雁來青雁來枯癡黄半夏黄鐵殻黄香珠茶褐荸薺白果牛啃莊早綿青烏豆水白豆馬鞍豆小豆亦有赤豆綠豆小黑豆白豆龍爪豆飯豆紅黑豇豆佛指豆十六粒豆蠶豆黑白扁豆刀豆丹陽縣物産豆黄豆以東鄉沼漕渠者爲佳石門縣物産豆有梅豆含豆香珠豆棋花豆裙帶豆一茶匙眉莢豆僧衣豆桐鄉縣物産有舜隆豆瑞安縣物産豆有六月烏六月白八月白雲豆三収豆珍珠豆苜蓿豆寧州土産輭莢豆錢豆米豆道士冠脚魚卵東鄉縣物産豆有六月爆泥豆花豆虎爪豆瀘溪縣物産菽之屬有沉香豆秋後種諸田間羊眼豆虎爪豆羊鬚豆俱以形似六月爆豆之最早者龍南縣物産菽有六月黄八月黄蒲圻縣物産菽之類有兔兒圓羅裙帶道人冠咸寧縣物産伴栗豆青皮豆雁來紅龍爪豆猪牙豆元修豆羅田縣物産菽類有羅裙帶雁來紅羊眼豆蛾眉豆巴山豆西山豆六月報猪牙豆蜜蜂豆龍爪豆茶柯豆青皮豆高脚黄兔兒丸雞婆豆飯豆白殻豆泥豆鴉鵲豆徳安府物產菉豆曰摘菉曰藤菉曰一朶雲曰蔓草菉曰穀椿菉黄豆有黄色青色黑色茶花色數種更有名纒絲者骨裏青者六月爆者楊雀卵者統謂之黄豆寧鄉縣物産豆種十有一曰豆角卽上笆豆一名紅豆又曰羅裙帶刀豆􅀈皮豆一名蠶豆又名白扁豆八月白以上皆藤生摘岡菉豆懶人豆一名爛蒿薦秋江豆黄豆黑豆飯豆以上皆枝實邵陽縣食貨菽之屬黄豆菉豆六月黄八月白水白豆皂角豆羊眼豆茶豆粟稿豆飯豆江豆衮豆冬豆蠶豆硃砂豆青皮豆刀靶豆蛾眉豆龍爪豆裙帶豆泥豆線豆扁豆烏豆棕豆永明縣土産菽之品硃砂豆羊眼豆大松豆小黄豆雪豆韶豆大青豆黑茶豆黑冷豆泉州府物産菽之屬有紅豆春豆九月豆騎草豆畬豆白卯豆六月綱豆建寧縣物産花羅豆大烏豆寒露豆虎爪豆六月黄上樹豆田豆岡豆惠來縣物産豆之屬有蕉子虎爪九月黄九月白六月黄六月烏十八粒壓早高明縣土産豆有樹豆生數尺高四季熟猪牙豆靴嘴豆有刀鞘豆花眉豆又五月収豆廣西府物産豆之屬南豆灣豆架豆靴豆老䑕豆黄花豆白早豆羊眼豆寸金豆欽定授時通考卷二十九
