body:
  text: 功作播種詩小雅大田多稼既種既戒既備乃事以我覃耜俶載南畝播厥百穀禮記月令季冬之月告民出五種命農計耦耕事吕氏春秋稼欲生於塵而植於堅者愼其種勿使數亦無使疏于其施土無使不足亦無使有餘汜勝之書種傷濕鬱熱則生蟲也取麥種候熟可穫擇穗大强者斬束立塲中之高燥處曝使極燥無令有白魚有輙揚治之取乾艾雜藏之麥一石艾一把藏以瓦器竹器順時種之則收常倍取禾種擇高大者斬一節下把懸髙燥處苗則不敗又薄田不能糞者以原蠶矢雜禾種種之則禾不蟲又取馬骨剉一石以水三石煮之三沸漉去滓以汁漬附子五枚三四日去附子以汁和蠶矢羊矢各等分撓令洞洞如稠粥先種二十日時以溲種如麥飯狀當天旱燥時溲之立乾薄布數撓令易乾明日復溲天隂雨則勿溲六七溲而止輙曝謹藏勿令復濕至可種時以餘汁溲而種之則禾稼不蝗蟲無馬骨亦可用雪汁雪汁者五穀之精也使稼耐旱常以冬藏雪汁噐盛埋於地中治種如此則收常倍齊民要術凡五穀種子浥鬱則不生生亦㝷死種雜者禾則早晩不匀舂復減而難熟特宜存意不可徒然粟黍穄粱秫常嵗嵗别收選好穗純色者劁刈髙懸之徐光啟云收種特宜密藏晉人云封函多不生謬也至春治取别種以擬眀年種子耬耩秫種一斗可種一畝量其家田所須種子多少種之其别種種子嘗須加鋤鋤多則無秕也先治而别埋先治塲淨不雜窖埋又勝噐盛還以所治穰草蔽窖徐光啟云窖埋為佳者土中恒受生氣故將種前二十許日開出水淘浮秕去則無莠即曬令燥種之汜勝之術曰牽馬令就穀堆食數口以馬踐過為種無虸籌蚄蟲也又看地納粟先種黒地㣲帯下地即種􅀈種然後種髙壤白地其白地候寒食後榆莢盛時納種以次種大豆油麻等田候昏房心中下黍種陳旉農書篩細糞和種子打壟撮放惟疏為妙燒土糞以糞之霜雪不能凋雜以石灰蟲不能蝕更能以鰻鱺魚頭骨煮汁浸種尤善又凡種植先看其年氣候早晩寒暖之宜乃下種即萬不失一若氣候尚有寒當從容熟治苗田以待其暖則無窘迫滅裂之患多見今人纔暖便下種忽為暴寒所折失者十常三四農桑通訣凡下種之法有漫種耬種瓠種區種之别漫種者用斗盛穀種挟左腋間右手料取而撒之隨撒隨行約行三歩許即再料取務要布種均匀則苗生稀稠得所秦晉之間皆用此法南方惟種大麥則㸃種其餘粟豆麻小麥之類亦用漫種北方多用耬種其法甚備齊民要術云凡種欲牛遲緩行種人令促歩以足躡隴底欲土實種易生也今人製造砘車隨耬種子後循隴碾過使根土相著功力甚速而當瓠種者竅瓠貯種隨行隨種務使均勻犁隨掩過覆土既深雖暴雨不至􅀈撻暑夏最為耐旱且便於撮鋤今燕趙間多用之區種之法凡山陵近邑髙危傾坂及丘城上皆可為區田糞種水澆備旱災也農政全書凡種子皆宜淘去浮者穀浮者秕果浮者油也各種種法水稻汜勝之書種稻區不欲大大則水深淺不適冬至後一百一十日可種稻稻地美用種畝四升四民月令三月可種稉稻美田欲稀薄田欲稠五月可别種及藍盡夏至後二十日止齊民要術稻三月種者為上時四月上旬為中時中旬為下時地既熟淨淘種子浮者去之秋則生稗漬經三旬漉出内草篅裛之復經三宿芽生長二分一畝三升擲三日之内令人驅鳥又北土田者納種如前法既生七八寸㧞而栽之既非歳易草稗俱生芟亦不死故須用栽而薅之陳旉農書纔撒種子忽暴風却急放乾水免風浪淘薄聚却穀也忽大雨必稍増水為暴雨漂颭浮起榖根也若晴即淺水從其曬暖也然不可太淺太淺即泥皮乾堅不可太深太深即浸没沁心而萎黄矣惟淺深得宜乃善農桑輯要秧田平後必曬乾入水澄清方可撒種則種不陷土中易出落秧宜清易㧞落散宜濁易生根農桑通訣作為畦埂耕耙既熟放水勻停擲種子於内候苗生五六寸㧞而秧之今江南皆用此法農書南方水稻有三曰秈曰稉曰稬三者布種同時毎歳收種取其熟好堅栗無秕不雜榖子曬乾蔀藏置髙爽處至清明節取出以盆盎别貯浸之三日漉出納草篅中晴則暴暖浥以水日三數遇隂寒則浥以溫湯候芽白齊透然後下種須先擇美田耕治令熟泥沃而水清以既芽之榖漫撒稀稠得所秧生既長小滿芒種之間分而蒔之旬日髙下皆遍農政全書今人用榖種畝一斗以上密種而少糞難耘而薄收也但插蒔早者用種須少插蒔遲者用種宜稍多過夏至者用種不得不多亦有小暑後插蒔而用種如常則先種麻燈心席草之屬田底極肥故也羣芳譜早稻清明節前浸用稻草包裹一斗或二三斗投於池塘水内缸内亦可晝浸夜收不用長流水難得生芽若未出用草酓之浸三四日微見白芽如鍼尖大取出於隂處隂乾密撒田内候八九日秧青放水浸之糯稻出芽較遲浸八九日如前微見白芽方可種撒時必清明則苗易堅又插秧芒種前後插之早稻宜上旬㧞秧時輕手㧞出就水洗根去泥約八九十根作一束却於犁熟水田内插栽毎四五根為一叢約離六七寸插一叢脚不宜頻那舒手插六叢那一遍逐漸插去務要正直天工開物凡播種先以稻包浸數日俟其生芽撒於田中生出寸許其名曰秧秧生三十日即㧞起分栽若田畝逢旱乾水溢不可插秧過期老而長節即栽於畝中生榖數粒結果而已又凡秧田一畝所生秧供移栽二十五畝乂凡稻旬日失水即愁旱乾夏種冬收之榖必山間源水不絶之畝其榖種亦耐乆其土脉亦寒不摧苗也湖濵之田待夏潦已過六月方栽者其秧立夏播種撒藏髙畝之上以待時也南方平原田多一歳兩栽兩穫者其再栽秧俗名晩稬非粳類也六月刈初禾耕治老膏田插再生秧其秧清明時已偕早秧撒布早秧一日無水即死此秧歴四五六月任從烈日暵乾無憂又凡早稻種秋初收藏當午曬時烈日火氣在内入倉闗閉太急則其榖黏𢃄暑氣勤農之家偏受此患明年田有糞肥脉發燒東南風助暖則盡發炎火大壊苗穗若種榖晩凉入廪或冬至數九天收貯雪水氷水一甕交春即不騐清明濕種時毎石以數碗激灑立解暑氣又凡稻撒種時或水浮數寸其榖未即沉下驟發狂風堆積一隅謹視風定而後撒則沉勻成秩矣又凡榖種生秧後防雀鳥聚食立標飄揚鷹俑則雀可敺矣旱稻齊民要術旱稻二月半種稻為上時三月為中時四月初及半為下時漬種如法裛令開口耬耩䅖種之䅖種者省耕而生科又勝擲者若歳寒早慮種時晩即不漬種恐芽蕉也其髙田種者至春黄塲時納種不宜濕下又科大如穊者五六月中霖雨時㧞而栽之栽法欲淺令其根須四散則滋茂深而直下者聚而不科其苗長者亦可㧞去葉端數寸勿傷其心也入七月不復任栽七月百草成時晩故也徐光啟曰水稻秧長亦用此法南土立秋後十日尚可栽北土不然農政全書徐獻忠曰旱稻種法大率如種麥治地畢豫浸一宿然後打潭下子又旱稻最須水宜用區種畦種兩法粱秫齊民要術粱秫欲稀苗穊穗不成一畝用子三升半種與植榖同時晚者全不收也農桑通訣蜀秫春月種羣芳譜粱種欲成實不枇用臘雪水浸過耐旱避蟲時欲仲春得雨為妙小雨欲接濕大雨須俟少乾先耙後種春種欲深夏種欲淺早禾晩禾欲兼種防歳有所宜行欲稀諺云稀榖大穗來年好麥黍尚書考靈曜夏火昏中可以種黍汜勝之書黍者暑也種者必待暑先夏至二十日此時有雨强土可種黍一畆三升黍心未生雨灌其心心傷無實黍心初生畏天露令兩人對持長索槩去其露日出乃止凡種黍覆土鋤治皆如禾法欲疏於禾賈思勰曰疏黍雖科而米黄又多减及空令穊雖不科而米白且均不减更勝疏者汜氏云欲疏於禾其義未聞四民月令四月蠶入簇時雨降可種黍禾謂之上時夏至先後各二日可種黍齊民要術凡黍穄田一畆用子四升三月上旬種者為上時四月上旬為中時五月上旬為下時夏種黍穄與植榖同時非夏者大率以椹赤為候諺云椹釐釐種黍時燥濕候黄塲種訖不曵撻常記十月十一月十二月凍樹日種之萬不失一凍樹者凝霜封著木條也假令月三日凍樹還以月三日種黍他皆倣此十月凍樹宜早黍十一月凍樹宜中黍十二月凍樹宜晩黍若從十月至正月皆凍樹者早晩黍悉宜也稷尚書考靈曜春鳥星昏中可以種稷汜勝之書種無期因地為時三月榆莢時雨膏地彊可種禾齊民要術凡榖田良田一畆用子五升薄田三升此為植榖晩田加種也二月三月種者為稙禾四月五月種者為穉禾二月上旬及麻菩楊生種者為上時三月上句及清明節桃始華為中時四月上旬及棗葉生桑花落為下時歳道宜晩者五六月初亦得凡春種欲深宜曵重撻夏種欲淺宜置自生春風冷生遲不曵撻則根虚雖生輙死夏氣熱而生速曵撻遇雨必堅垎其澤澤多者或亦不須撻必須撻者宜須待白背濕撻令地堅硬故也凡種榖雨後為佳遇小雨宜接濕種遇大雨待薉生小雨不接濕無以生禾苗大雨不待白背濕轆則令苗瘦薉若盛者先鋤一遍然後納種乃佳也春若遇旱秋耕之地得仰壟待雨春耕者不中也夏若仰壟非直盪汰不生兼與草薉俱生凡田欲早晩相雜有閏之歳節氣近後宜晩田然大率欲早早田倍多於晩早田淨而易治晩田蕪薉難出其收多少從歳所宜非闗早晩然早榖皮薄米實而多晩榖皮厚米少而虛也陳旉農書二月種粟必疏播種子羣芳譜稷三月種麥尚書大傳秋昏虛星中可以種麥說文秋種厚埋故謂之麥汜勝之書夏至後七十日可種宿麥早種則蟲而有節晩種則穗小而少實當種麥若天旱無雨澤則薄漬麥種以酢漿并蠶矢夜半漬向晨速投之令與白露俱下酢漿令麥耐旱蠶矢令麥忍寒四民月令凡種大小麥得白露節可種薄田秋分種中田後十日種美惟穬早晚無常正月可種春麥盡二月止齊民要術種大小麥先㽟逐犁䅖種者佳再倍省種子而科大逐犁墎之亦得然不如作䅖耐旱其山田及剛强之地則耬下之其種子宜加五省於下田凡耬種者非直土淺易生然於鋒鋤亦便穬麥八月中戊社前種者為上時擲者畝用子二升半下戊前為中時用子三升八月末九月初為下時用子三升半或四升小麥八月上戊社前為上時擲者用子一升半中戊前為中時用子二升下戊前為下時用子二升半又種瞿麥法以伏為時良田一畝用子五升薄田三四升又青稗麥毎十畝用種八斗種樹書種麥之法撒欲勻陳旉農書八月社前即可種麥麥經兩社即倍收而子顆堅實士農必用古農語云社後種麥爭回耬社前種麥爭回牛言奪時之急如此之甚也務本直言麥種初收時旋打旋揚與蠶沙相和辟蟲傷資地力苗又耐旱農桑通訣種植之日有先後則所擲之子有多寡凡種須用耬犁下之又用砘車碾過日種數畝葢成壟易於鋤治乂有漫種一法農人左手挾噐盛種右手握而勻擲於地既遍則用耙勞覆之又頗省力此北方種麥之法南方惟用撮種故用種不多然糞而鋤之人工既到所收亦厚農桑輯要麥種宜與剉碎翠耳或艾暑日曝乾熱收藏以瓦噐順時種之無不生茂農政全書種須簡成實者棉子油拌過則無蟲而耐旱宜有雨諺云麥怕胎裏旱又云無灰不種麥以灰糞拌種妙種小麥須揀去雀麥草子簸去秕粒在九十月種種法與大麥同若太遲恐寒鴉食之則稀出少收又小麥早種毎畝種七升晩種九升大麥早種種一斗晩種一斗二升麥溝口種之蠶豆豆亦忌水畏寒臘月宜用灰糞葢之天工開物凡北方厥土墳壚易解釋者種麥之法耕具差異耕即兼種其服牛起土者耒不用耕並列兩鐡於横木之上其具方語曰鏹鏹中間盛一小斗貯麥種於内其斗底空梅花眼牛行揺動種子即從眼中撒下欲宻而多則鞭牛疾走子撒必多欲稀而少則緩其牛撒種即少既撒種後用驢駕兩小石團壓土埋麥凡麥種𦂳壓方生南方不與北同者多耕多耙之後然後以灰拌種手指拈而種之種過之後隨以脚跟壓土使𦂳以代北方驢石也豆汜勝之書大豆保歳易為宜古之所以備㐫年也謹計家口之數種大豆率人五畝此田之本也三月榆莢有雨髙田可種土和無塊畝五斗土不和則益之種大豆夏至後二十日尚可種戴甲而生不用深耕大豆須勻而稀豆花憎見日見日則黄爛而根焦也小豆不保歳難得椹黒時注雨種畝一升四民月令二月昏參夕杏花盛桑椹赤可種大豆謂之上時四月時雨降可種大小豆美田欲稀薄田欲稠齊民要術春大豆次植榖之後二月中旬為上時一畝用子八升三月上旬為中時用子一斗四月上旬為下時用子一斗二升歳宜晩者五六月亦得然稍晩稍加種子必須耬下種欲深故豆性强苗深則及澤又小豆夏至後十日種者為上時一畝用子八升初伏斷手為中時一畝用子一斗中伏斷手為下時一畝用一斗二升中伏以後則晩矣諺曰立秋葉如荷錢猶能得豆者指謂宜晩之歳耳不可為常矣耬下以為良漫擲次之摘種為下陳旉農書四月種豆農政全書種大豆鋤成行壟舂穴下種早者二月種四月可食名曰梅豆豆皆三四月種地不宜肥有草則削去種黒豆三四月間種天工開物大豆有黒黄兩色下種不出清明前後江南又有髙脚黄刈早稻方再種江西吉郡種法甚妙其刈稻田竟不耕懇每禾藁頭中拈豆三四粒以指扱之其藁凝露水以滋豆豆充發復浸爛藁根以滋其已生之苗後遇無雨亢乾則汲水一升以灌之後再耨之收穫甚多又菉豆必小暑方種未及小暑而種則其苗蔓延數尺結莢甚稀若過期至于處暑則隨時開花結莢顆粒亦少乂蠶豆八月下種豌豆十月下種脂麻四民月令胡麻二月三月四月五月時雨降可種之齊民要術胡麻二三月為上時四月上旬為中時五月上旬為下時月半前種者實多而成月半後種者子少而多稗也種欲截雨脚若不緣濕不生一畝用子二升漫種者先以耬耩然後撒子耬耩者炒沙令燥中和半之不和沙下不均壟種若荒得用鋒耩蕎麥齊民要術凡種蕎麥立秋前後皆十日内種之農政全書蕎麥立秋前後漫撒種即以灰糞葢之稠宻則結實多稀則結實少若種遲恐花經霜不結子天工開物凡蕎麥南方必刈稻北方必刈菽稷而後種説見種具説見種具播種具各圖説種簟耬車瓠種砘車撻輥軸秧彈秧馬橇種簞圖說種簞盛種竹器也其量可容數斗形如圓甕上有􅤮口農家用貯穀種庋之風處不致鬱浥齊民要術云藏稻必用簞蓋稻乃水穀宜風燥之種時就浸水内又其便也徐光啟云草篅判竹圜以盛榖耬車圖說耬車下種器也一云耬犁其金似鑱而小魏志畧曰皇甫隆教民作耬犁省力過半得穀加五夫耬中土皆用之他方或未經見恐難成造其制兩柄上彎髙可三尺兩足中虛闊合一壟横桄四匝中置耬斗其所盛種粒各下通足竅仍旁挾兩轅可容一牛用一人牽旁一人執耬且行且搖種乃自下此耬種之體用近有剏制下糞耬種耬斗後另置篩過細糞或拌蠶沙耩時隨種而下覆於種上尤便又名曰種蒔曰耩子曰耬犁用則一也瓠種圖說瓠種竅瓠貯種量可斗許乃穿瓠兩頭以木箄貫之後用手執為柄前用作嘴瀉種於耕壟畔隨耕隨瀉務使均匀又犁隨掩過遂成溝壟覆土既深暑夏最為耐旱且便於撮鋤苗亦鬯茂燕趙及遼以東多有之齊民要術曰兩耬重耩竅瓠下之以批契維腰曵之此舊制以今較之頗拙於用故從今法寡力之家比耕耙耬砘易為功也砘車圖說砘車砘石碢也以木軸架碢為輪故名砘車兩碢用一牛四碢兩牛力也鑿石為圓徑可尺許竅其中以受機括畜力挽之隨耬種所過㝷壟碾之使種土相著易為生發然亦㸔上脉乾濕何如用有遲速也古農法云耬種後用撻則壟滿土實又有種人足躡壟底各是一法今砘車碾溝壟特速此後人所創尤簡當也撻圖說撻打田篲也用科木縛如掃篲復加匾濶上以土物壓之亦要輕重隨宜以打地長三四尺廣二尺餘古農法耬種既過後用此撻使壟滿土實苗易生也農桑通訣云又用曳打塲圃極為平實輥軸圖說輥軸碾草木軸也其軸木徑可三四寸長約四五尺兩端俱作轉簨挽索用牛拽之江淮之間漫種稻田草禾並出用此輥軸使草禾俱入泥内再宿之後禾乃復出草則不起又嘗見一方稻田不見插秧惟務撒種却於軸間交穿板木謂之鴈翅狀如礰礋而小以􅀈打水土成泥就碾草禾江南地下易於得泥故用輥軸若夫北方塗田頗少放水之後欲得成泥故用鴈翅輥打此各隨地之所宜用也秧彈圖說秧彈平聲秧壟以篾為彈彈猶弦也世呼船牽去聲曰彈字義俱同盖江鄉櫃田内平而廣農人蒔秧漫無準則故制此長篾掣於田之兩際其直如弦循此布秧了無欹斜猶梓匠之䋲墨也秧馬圖說秧馬蘇軾詩序云予昔遊武昌見農夫皆騎秧馬以榆棗為腹欲其滑以楸梧為背欲其輕腹如小舟昂其首尾背如覆瓦以便兩脾雀躍於泥中擊束藳其首以縛秧日行千畦較之傴僂而作者勞佚相絶矣史記禹乗四載泥行乘橇解者曰橇形如箕摘行泥上豈秧馬之類乎橇圖說橇泥行具也史記禹乘四載泥行乘橇孟康曰橇形如箕摘行泥上嘗聞向時河水退灘淤地農人欲就泥裂漫撒麥種奈泥深恐没故制木板為履前頭及兩邊皆起如箕中綴毛繩前後繋足底板既濶則舉歩不陷今海陵人以行及刈過葦泊中皆用之欽定授時通考卷三十四
