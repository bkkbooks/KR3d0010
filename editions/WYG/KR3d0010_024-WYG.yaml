body:
  text: 糓種黍丹黍米蜀黍玉蜀黍野黍禮記曲禮黍曰薌合疏正義曰黍曰薌合者夫糓秫者曰黍秫既輭而相合氣息又香故曰薌合也集說黍熟則黏聚不散其氣又香故曰薌合周禮天官食醫凡㑹膳食之宜羊宜黍正義羊味甘熱黍味苦温甘苦相成訂義羊火畜也黍髙燥所生與火畜相宜又夏官職方氏正西曰雍州其糓宜黍稷又河内曰冀州其糓宜黍稷爾雅秬黑黍注詩曰維秬維秠又秠一稃二米注此亦黑黍但中米異耳漢和帝時任城生黑黍或三四實實二米得黍三斛八斗是疏李廵曰黑黍一名秬黍秬即黑黍之大名也秠是黑黍之中一稃有二米者别名為秠若然秬秠皆黑黍矣而春官鬯人註云釀秬為酒秬如黒黍一秠二米言如者以黑黍一米者多秬為正稱二米則秬中之異故言如以明秬有二等也秬有二等則一米亦可為酒鬯人之註必言二米者以宗廟之祭惟祼為重二米嘉異之物鬯酒宜用之故以二米解鬯其實秬是大名故云釀秬為酒此云秠一稃二米鬯人註云一秠二米不同者鄭志答張逸云秠即皮其稃亦皮也爾雅重言以曉人然則秠稃古今語之異故鄭引此文以稃為秠也漢和帝時任城縣生黑黍或三四實實二米得黍三斛八斗是也尚書考靈曜夏火星昬中可以種黍春秋說題辭精移火轉生黍夏出秋改黍者縮也故其立字禾入米為黍酒以扶老春秋佐助期黍神名侜佞姓蘭郝孝經援神契黒墳宜黍麥淮南子渭水多力而宜黍博雅粢黍也黍釀謂之䅀說文以大暑而種故謂之黍黍禾屬黏者也孔子曰黍可以為酒古今注稻之黏者為黍亦謂稌為黍禾之黏者為黍亦謂之穄亦曰黄黍廣志黍有燕頷之名又有驢皮黍又曰牛黍稻尾秀成赤黍馬革大黑黍或云秬黍有濕屯黄黍齊民要術穄有赤白黒青黄鶯鴿凡五種又凡黍黏者收薄穄味美者亦收薄難舂雜隂陽書黍生於榆六十日秀秀後四十日成黍生於巳壯於酉長於戌老於亥死於丑惡於丙午忌於丑寅邜穄忌於未寅爾雅翼黍禾屬而黏者也以大暑而種故謂之黍從禾雨省聲孔子曰禾可為酒禾入水也然則又以禾入水三字合而為黍不但從雨而已黍以大暑而種故農家以三月上旬為上時四月上旬為中時五月上旬為下時然月令仲夏之月農既登黍矣天子以雛嘗黍羞以含桃先薦寢廟為鄭說者以為黍非新成直是舊黍蓋以鄭解孟秋所登之糓為黍稷故以仲夏為未熟若其熟何得言登且所謂舊黍者自去歳孟冬與彘併食數月於此矣豈待今而後嘗耶黍固有早晚其晚者不妨至孟秋始熟故庻人秋乃薦黍此天子之禮自重其先熟者而嘗薦之耳故蔡邕以為今之蟬鳴黍亦猶十月穫稻而天子所嘗乃九月熟者謂之半夏稻亦其類也黍之秀特舒散故說者以其象火為南方之糓詩亦云芃芃黍苗以此也又云彼黍離離彼稷之苗者黍大體似稷故古人併言黍稷今人謂黍為黍穄行役之人有憂於内則有不察於外故於此或不能辨也黍有赤黍黑黍黑黍已别見虋稱赤苗恐是赤者其類有黏不黏如稻之有粳糯其不黏者以為飯黏者别名秫以為酒說文秫稷之黏者即謂此也月令造酒命大酋秫稻必齊蓋以此秫與稻之糯為酒北人謂秫為黄米亦謂之黄糯釀酒比糯稻差劣黍之為物黏而􅀢故凡香之􅀢馥黏之黏䵒皆從之又古人作履黏以黍米謂之黎其雪桃亦用黍以黍黏去桃毛也孔子先食黍以黍為五糓之先桃為五果之下故捨不用耳黍又𢷬以為餳謂之餦餭楚辭曰粔籹蜜餌有餦餭言以蜜和米麫煎熬作粔籹又有美餳衆味甘具也及屈原死楚人以菰葉裹黍祠之謂之角黍􅀢音香黏音胡䵒音暱餦音張餭音黄粔音巨􅀢字典不載又秬黑黍也古者薦籩有白黑形鹽白為熬稻黑即秬也至蔵氷則用黒牡秬黍以享司寒蓋此倣其方之色亦以為酒謂之秬鬯既芬香調暢矣若將用則鬯人以鬯酒入鬱人鬱人得之築鬱金草煮之以和此酒則謂之鬱鬯故鬯人掌共秬鬯而鬱人和鬱鬯以此也又釋草曰秬黑黍秠一稃二米是秬與秠之所以異者在此然則秠必不黑秬必不一稃二米也而鄭氏釋春官鬯人既云秬如黑黍一稃二米則是以秠之狀雜之於秬郭氏解釋草又曰秠亦黑黍則是又以秬之色雜之於秠秬既欲兼秠之狀秠又欲兼秬之色凡物之所以紊亂不復可推究者由此故也郭氏又引漢和帝時任城生黑黍或三四實實二米得黍三斛八斗以顯二米者為黑黍且任城所生漢之異事歴世所未有詩歌后稷降播乃民事之常如必待任城所生而後降之則沒世不可待矣至唐說者又言今上黨民間黑黍或值豐歳往往得二米者但稀濶而得之不以充貢耳以此附成郭氏之說且后稷所降既謂之種何得以豐歳偶有一二為說若皆以豐歳言之則禾有同穎麥有兩岐又可待以為種耶按今百糓之中一稃二米者唯麥為然舎麥未有二米者說文解秠亦云一稃二米詩云誕降嘉種維秬維秠天賜后稷之嘉糓也而解來字云周所受瑞麥來麰一來二縫秠與來麰皆后稷所受於天皆一稃二米則是秠者正此來麰耳但生民臣工所稱不同來麰又稱釐麰古者來釐丕三字相通要是一物鄭志自以所解鬯人不合釋草之文故答張逸併以秠稃皆解為皮且云爾雅重言以曉人然則不惟二物相混而秠但得為秬之皮轉失實矣予故詳而論之農政全書王禎曰詩云維秬維秠秬黑黍也又曰秬鬯一卣此言黍之為酒尚矣今又有赤黍米黄而黏可蒸食白黍釀酒亞於糯秫又北地遠處惟黍可生其莖穂低小可以釀酒又可作饌粥黏滑而甘此黍之有補於艱食之地者也凡祭祀以之為上盛貴其色味之美也本草綱目李時珍曰按許慎說文云黍可為酒從禾入水為意也魏子才六書精藴云禾下從氽象細粒散垂之形氾勝之云黍者暑也待暑而生暑後乃成也詩云誕降嘉種維秬維秠維穈維芑穈即虋音轉也郭璞以虋芑為粱粟以秠即黑黍之二米者羅願以秠為來牟皆非也陶𢎞景曰黍荆郢州及江北皆種之其苗如蘆而異於粟粒亦大今人多呼秫粟為黍非矣北人作黍飯方藥釀黍米酒皆用秫黍也别録丹黍米即赤黍米也亦出北間江東時有而非土所宜多入神藥用又有黑黍名秬釀酒供祭祀用蘇恭曰黍有數種其苗亦不似蘆雖似粟而非粟也蘇頌曰今汴洛河陜間皆種之爾雅云虋赤苗芑白苗秬黒黍是也李廵云秬是黒黍中一稃有二米者古之定律者上黨秬黍之中者累之以生律度衡量後人取他黍定之終不能協律或云秬乃黍之中者一稃二米之黍也此黍得天地中和之氣而生蓋不常有有則一穂皆同二米粒並均匀無大小故可定律他黍則不然地有肥瘠歳有凶穰故米有大小不常矣今上黨民間或值豐歳往往得二米者但稀濶故不以充貢爾又曰黏者為秫可以釀酒北人謂為黄米亦曰黄糯不黏者為黍可食如稻之有粳糯也李時珍曰此誤以黍為稷以秫為黍也蓋稷之黏者為黍粟之黏者為秫粳之黏者為糯别録本文著黍秫稻糯之性味功用甚明而註者不諳往往謬誤如此今俗不知分别通呼秫與黍為黄米矣又黍米氣味甘温無毒孫思邈曰黍米肺之糓也肺病宜食之主益氣李時珍曰按羅願云黍者暑也以其象火為南方之糓蓋黍最黏滯與糯米同性其氣温暖故功能補肺而作食作煩熱煖筋骨也孟說謂其性寒非矣直省志書宛平縣物産黍有白黑二種三河縣土産黍有黑白紅黄四種平谷縣土産黍有黑白紅黄黧五種清苑縣土産黍有黄有白有丹有大白有小白歴城縣方産黍有酒飯二種酒黏飯不黏鄒平縣物産黍黒白數種新城縣物産黍白黍黎頭二種齊河縣物産黍有紅黄白黑四種齊東縣物産黍黑白數種長清縣物産黍有黑白二種泰安州物産黍黄白黑三種萊蕪縣物産黍白黄紅黑四色有輭硬二種輭宜釀酒霑化縣物産黍之品黎頭黍托地白􅀥皮黍芝黄黍紅黍白黍滋陽縣物産黍有黑白二種曹州物産黍有黄紅黑白四色曹縣物産黍有數種五色早晚不同曹酒率用此米鉅野縣物産黍黑白紅黄四種東平州物産黍黑白二種汶上縣物産黍黑白二種沂州物産黍有黑白二種清平縣物産黍有紅白黑三種皆可釀酒白者佳髙唐州物産黍其品三黒紅白觀城縣物産黍黑白二種日照縣物産黍有黑白二種黄縣物産黍有紅白黑三種福山縣物産黍有金銀黑三色釀酒招遠縣物産赤黍白黍黒黍萊陽縣物産黍紅白黑三種陽曲縣物産黍有輭硬二種祁縣輭硬二種輭宜釀酒定襄縣物産黍黄白紅青羊眼保徳州土産黍有黒青紅黄數種臨汾縣物産黍有輭硬二種丹黑二色翼城縣物産黍有黄白二種臨晋縣物産黍有黄白赤黑四種米皆黄俗呼為黄米平陸縣土産黍有白紅黄黎其硬者為穈黍髙平縣物産黍紅白黎黑數種精潔美腴甲於他郡和順縣土産黍有輭硬二種其色白黑黄赤黎五色馬邑縣土産黍有青白黄三種與早晚大小之分祥符縣物産白黍黒黍紅黍黄黍洧川縣物産黍有黄白黑三種鄢陵縣土産黍紅白黎三色其最早者曰奪麥場延津縣物産黍有黄黍白黍秔黍糯黍襄城縣土産白黍白莩黄米為上黄黍黄莩黄米為次黒黍醸酒延川縣物産黍有輭硬二種有丹黑二色西郷縣土産黍類露仁糧矮人糧馬尾糧黑糓糧罩粒頭清河縣物産黍有黄白黎色數種亦有紅者名大紅袍蒲圻縣物産黍之屬有黄黍黑黍高粱黍永明縣土産泡眼黍赤黍蓑衣黍建陽縣方産黍屬小早三月種六月收黄竹早宜飽水田四月種七月熟江西早三月種七月初收爛坭早天降早苦株早紅根早蘆􅁝早俱三月種七月收間有瘦田亦可種縮頸早宜肥田三月種七月半收福徳早宜禾田三月種八月收半冬早黄糓早俱三月種九月收海寧縣土産黍之種四曰糯黍黄黍牛黍飯黍本草綱目丹黍米即赤黍也爾雅謂之虋呉瑞曰浙人呼為紅蓮米江南多白黍間有紅者呼為赤蝦米寇宗奭曰丹黍皮赤其米黄惟可為糜不堪為飯黏著難解寗原曰穂熟色赤故屬火北人以之醸酒作糕又氣味甘微寒無毒孫思邈曰微温寇宗奭曰動風性熱多食難消餘同黍米齊民要術薥秫春月種宜用下土莖髙丈餘穂大如帚其粒黑如漆如蛤眼熟時收刈成束攢而立之其子作米可食餘及牛馬又可濟荒其莖可作洗帚稭稈可以織箔編席夾籬供㸑無有棄者亦濟世之一糓農家不可闕也農政全書徐光啓曰薥秫古無有也後世或從他方得種其黏者近秫故借名為秫今人但指此為秫而不知有粱秫之秫誤矣别有一種玉米或稱玉麥或稱玉薥秫蓋亦從他方得種其曰米麥薥秫皆借名之也又曰北方地不宜麥禾者乃種此尤宜下地立秋後五日雖水潦至一丈深而不能壞之但立秋前水至即壞故北土築堤二三尺以禦暴水但求隄防數日即客水大至亦無害也又曰秦中鹻地則種薥秫下地種薥秫特宜早須清明前後耩鹻音減本草綱目李時珍曰蜀黍不甚經見而今北方最多按廣雅荻粱木稷也蓋此亦黍稷之類而髙大如蘆荻者故俗有諸名種始自蜀故謂之蜀黍汪穎曰蜀黍北地種之以備缺糧餘及牛馬糓之最長者南人呼為蘆穄李時珍曰蜀黍宜下地春月布種秋月收之莖髙丈許狀似蘆荻而内實葉亦似蘆穂大如帚粒大如椒紅黑色米性堅實黄赤色有二種黏者可和糯秫釀酒作餌不黏者可以作糕煮粥可以濟荒可以養畜梢可作帚莖可織箔席編籬供㸑最有利於民者今人祭祀用以代稷者誤矣其糓殻浸水色紅可以紅酒博物志云地種蜀黍年乆多蛇又蜀黍米氣味甘􅉣温無毒本草綱目李時珍曰玉蜀黍種出西土種者亦罕其苗葉俱似蜀黍而肥矮亦似薏苡苗髙三四尺六七月開花成穂如秕麥狀苗心别出一苞如㯶魚形苞上出白鬚垂垂乆則苞坼子出顆顆攢簇子亦大如㯶子黄白色可渫炒食之炒拆白花如炒拆糯殻之狀又玉蜀黍米氣味甘平無毒農政全書野黍生荒野中科苗皆類家黍而莖葉細弱穂甚瘦小黍粒亦極細小味甘性微温採子舂去麤糠或搗或磨麵蒸餻食甚甜欽定授時通考卷二十四
