body:
  text: 農餘木二女貞木槿櫧烏臼楂漆㯶櫚皂莢梔子茱萸枸杞五加女貞女貞一名貞木一名蠟樹李時珍曰凌冬青翠有貞守之操故以貞女狀之近時以放蠟蟲故俗名蠟樹亦呼為冬青與冬青同名異物盖一類二種也皆因子自生最易長女貞葉厚而柔長面青背淡長者四五寸甚茂盛五月開細花青白色花甚繁九月實成似牛李子纍纍滿樹生青熟紫木肌白膩冬青又名水冬青或稱細葉冬青樹似枸骨子而極茂盛身大合抱髙丈許木理白細而堅重有文葉似櫨子樹葉而小又似椿葉微窄而頭頗圓光潤堪染緋其嫩芽煠熟水浸去苦味淘淨五味調之可食五月開白花結子如豆紅色放子收蠟皆同農政全書曰唐宋以前澆燭所用白蠟皆蜜蠟也此蟲白蠟自元以来人始知之今則為日用物矣四川湖廣滇南閩嶺呉越東南諸郡有之以川滇衡永産者為勝便民圖臘月下種来春發芽次年三月移栽長七月許可放蠟蟲栽貞女畧如栽桑法縱横相去一丈上下則樹大力厚須糞壅極肥嵗耕地一再過有草便鋤之令枝條壯盛即多蠟也宋氏雜部冬青子可種堪入酒至長盛時五月養以蠟子七月收蠟不宜盡採留迨来年四月又得生子取養蠟曬乾以越布䝉於甑口置蠟布上置器甑中釡内水沸蠟遂鎔下入器凝則堅白而為燭材其滓盛之以絹囊復投於熱油中則蠟盡油遂可為燭凡養蠟子經三年停亦三年水冬青葉細利於養蠟子又巴蜀擷其子漬淅米水中十餘日搗去膚種之蠟生則近跗伐去發肄再養蠟養一年停一年採蠟必伐木無老榦本草綱目蠟蠱大如蟣虱芒種後延縁樹枝食汁吐涎粘於嫩莖化為白脂乃結成蠟狀如凝霜處暑後剝取謂之蠟渣過白露則粘住難刮矣其渣煉化濾淨或甑中蒸化􅅹下器中待凝成塊即為蠟也其蟲微時白色作蠟及老則赤黑色乃結苞於樹枝初若黍米大入春漸長大如鷄頭子紫赤色纍纍抱枝宛若樹之結實也盖蟲將遺卵作房正如雀甕蛸之類爾俗呼呼為蠟種亦曰蠟子子内皆白卵如細蟣一包數百次年立夏日摘下以箬葉包之分繫各樹芒種後苞拆卵花蟲乃延出葉底復上樹作蠟也樹下要潔淨防蟻食其蟲徐光啓曰女貞之為白蠟勝國以前畧無紀載今則遍東南諸省皆有之向嘗疑焉以為古人著書未暇逺徴遐僻耳非米昔無今有也然見婺州人言彼中放蠟不過二十年吳興人言不過十許年即余邑五年前亦無人知此自余庚戌營先隴始樹女貞數百本擬作蠟近年来村中亦多自生蠟蟲頃寄子半用吳興子半用土子土人言土子為勝則昔無今有理亦有之事固非目前所見遽可懸斷也本草彚編蟲白蠟與蜜蠟之白者不同乃小蟲所作其蟲食冬青樹汁久而化為白脂粘敷樹枝人謂蟲矢著樹而然非也至秋刮取以水煮溶濾置冷水中則凝聚成塊矣碎之文理如白石膏而瑩澈人以和油澆燭大勝蜜蠟也徐光啓曰蟲白蠟純用作燭勝他燭十倍若以和他油不過百分之一其燭亦不淋故為用頗廣多植無害農政全書女貞收蠟有二種有自生者有寄子者自生者初時不知蟲何来忽遍樹生白花枝上生脂如霜雪人謂之花取用煉蠟明年復生蟲子向後恒自傳生若不曉寄放樹枯則已若解放者傳窮無窮也寄子者取他樹之子寄此樹之上其法或連年或停年或就樹或伐條若樹盛者連年就樹寄之俟有衰頓即斟酌停年以休其力培壅滋茂仍復寄放即宋氏雜部所謂養一年停一年者也伐條者取樹栽徑寸以上者種之俟盛長寄子生蠟即離根三四尺截去枝榦收蠟隨手下壅冬月再壅明年旁長新枝芽蘖以後恒擇去繁冗令直達又明年亦復修理恒加培壅第三年可放蠟子四年再放五年復放迨收蠟仍剪去枝如是更代無窮此所謂經三年停三年者也凡寄子皆于立夏前三日内從樹上連枝剪下去餘枝獨留寸許令子抱木或三四顆乃至十餘顆作一簇或單顆亦連枝剪之剪訖用稻榖浸水半日許灑取水剝下蟲顆浸水中一刻許取起用竹箬虚包之大者三四顆小者六七顆作一苞韌草束之置潔淨甕中若隂雨頓甕中可數日天熱其子多迸出宜速寄之寄法取箬包剪去角作孔如小豆大仍用草係之樹枝間其子多少視枝小大斟酌之枝大如指者可寄枝大細榦太粗者勿寄也寄後數日間鳥来啄箬包攫取子勤驅之漸漸暖蟲漸出包先縁樹上下行若樹根有草即附草不復上矣故樹下須芟刈極淨也更數日復下至枝條嚙皮入咂食其脂液因作花約畧蟲出盡即取下包視有餘子并作包别寄他樹秋分後撿看花老嫩若太嫩不成蠟太老不成蠟不可剝矣剝時或就樹或剪枝俱先洒水潤之則易落乘雨後或侵晨帶露華采之尤便次取蠟花投沸湯中鎔化候稍冷取起水面蠟再煎再取滓沈鍋底勺去之若蠟未淨再依前法煎澄之既淨乗熱投入繩套子候冷牽繩起之成蠟堵也又浸穀水漬蠟子剝下包之此是婺州法吳興人但于立夏候剪子到小滿前三日連舊枝作苞寄之亦生蠟擕李及吾邑有自生之子不煩寄放亦生蠟可見傳生之物氣足為上若吾鄉傳有土子不論節氣但俟其氣足欲迸時速剪下寄之可也又立夏前二日剪子此是常法但浙東氣暖從他方鬻子還恐蟲迸出故以此為期若吳興在北吾邑又在吳興北則吾鄉往吳興及浙東買子者宜立夏後剪小滿前後寄也若浙東從吾鄉鬻子仍須立夏前剪去耳吾鄉以北愈寒寄宜愈遲依此消息之又蠟子若本地所無傳貿他方者可行千里如浙中獨金華業此最盛而鬻子於紹興台州湖州川中獨南部西充嘉定最盛而鬻子于潼川其間相去各數百里盖蠟子在立夏前氣已足可剪小滿前雖未出可寄耳亦須疾行遲則蟲先期出不及寄折損多矣諺云走馬販蠟謂此若依前法先作包置器中蟲出不離箬包中尚可遲二三日寄也又或云樹生花即無子生子即無花此間有之不盡然也大槩多生子並生者但欲留種不宜早收花絶不可見至春中方著枝如螺靨入夏頓長則花與子不相見耳子盛長時有膏如餳蜜去之即子枯又冬青樹凋枯以猪糞壅之即茂或云以猪溺灌之木槿附水槿葉似女貞而邉有鋸齒五葉攢生不花李時珍所謂女蠟樹必此也蜀中又有一種揷蠟葉似菊尤易生揷之一年便可寄子三四年大如酒盃口即衰壞須更揷矣此與水槿異種水槿雖扞揷易生却難大又蜀中蠟子生女貞樹上少生揷蠟樹上者多故當以蜀種為勝本草綱目李時珍曰有水蠟樹葉微似榆亦可放蟲生蠟宋氏雜部水槿細葉小黃花又名水椐臘月斬其條而揷之易成大木材可為器宜養蠟子以取蠟櫧附櫧子處處山谷有之其木大者數抱髙二三丈葉長大如栗葉稍尖而厚堅光澤鋸齒峭小凌冬不凋三四月開白花成穗如桑花結實大如槲子外有小包霜後包裂子墜子圓褐而有尖大如菩提子内仁如杏仁生食苦澀煮炒乃帶甘亦可磨粉甜櫧子粒小木文細白俗名麵櫧苦櫧子粒大木粗赤文俗名血櫧其色黒因名䥫櫧山海經前山其木多櫧注櫧子似柞子可食冬月采之木作屋柱難腐本草綱目李時珍曰甜櫧子亦可産蠟農政全書余所聞樹可放蠟者數種以意度之當不止此即如餉蠶之樹世人皆知有桑柘矣而東莱人育山繭者於樹無所不用獨楊樹否耳諸樹中獨椒繭最上桑柘次之椿次之樗為下由此言之事理無窮聞見之外遺佚甚多坐井自拘何為㢤烏臼烏臼一名鵶臼樹髙數仞葉似小杏葉而微薄淡綠色五月開細花色黄白實如鷄頭初青熟黒分三瓣八九熟熟咋之如胡麻子汁味如猪脂壓油燃燈極明南方平澤甚多易生易長種之佳者有二曰葡萄臼穗聚子大而穰厚曰鷹爪臼穗散而殻薄根皮味苦微溫有毒農政全書烏臼樹收子取油甚為民利江浙人種之極多樹大或收子二三石子外白穰壓取臼油造蠟燭子中仁壓取清油然燈極明塗髪變黑又可入漆可造紙用每收子一石可得白油十斤清油二十斤彼中一畝之宫但有樹數株者生平足用不復市膏油也臨安郡中每田十數畝田畔必種臼數株其田主嵗收臼子便可完糧如是者租額亦輕佃戸樂于承種謂之熟田若無此樹要當于田收完糧租額必重謂之生田兩省之人既食其利凡髙山大道溪邉宅畔無不種之亦有全用熟田種者用油之外其查仍可壅田可燎㸑可宿火其葉可染皂其木可刻書及雕造器物且樹久不壞至合抱以上收子逾多故一種即為子孫數世之利又臼不須種野生者甚多若收子即佳種種出者亦不中用必須接博乃可未接者江浙人呼為草臼種草臼榦如酒杯口大便可接大至一兩圍亦可接但樹小低接樹大髙接耳接須春分後數日接法與雜果同又聞山中老圃云臼樹不須接博但于春間將樹枝一一捩轉碎其心無傷其膚即生子與接博者同又種烏臼取白油清油種女貞樹取白蠟其利濟人百倍他樹又烏臼楂之屬但取膏油似不入救荒品中但膏油不可闕而民間所用多取諸麻菽荏菜烏臼之屬比諸麻菽荏菜有十倍之收且取諸荒山隙地以供膏油而省麻菽以充糧省荏菜之田以種榖其益于積貯不為少矣羣芳譜採臼子在中冬但以熟為候採須連枝條剝之但留取指大以上枝其小者總無子亦宜剝去則明年枝實俱繁盛其剝刀長三四寸廣半寸形如却月鉤刃在鉤内以竹木竿為柄刀著柄端令刃向上剝時向上鑱之不傷枝榦剝下枝仍充燎㸑揀取浮子曬乾入臼舂落外白穰篩出之蒸熟作餅下柞取油如常法即成白油如蠟以製燭若穰少不滿一榨者即作餅入他油餅雜榨之榨下盛油缾中置一草帚候油出冷定臼油即凝附草帚不雜他油矣其篩出黒子用石磨麤礲碎簸去殻存下核中仁復磨或碾細蒸熟榨油如常法即成清油凡製燭每臼油十斤加白蠟三錢則不淋蠟多更佳常時肆中賣者白油十斤雜清油十斤白蠟不過一二錢其燭則淋又養魚池邉勿種臼落葉入水變黑色令魚病楂附楂木生閩廣江右山谷間橡栗之屬也其樹易成材亦堅韌勁挺者中為扛實如橡斗斗無刺為異耳斗中函子或一或二或三四甚似栗而殻甚薄殻中仁皮色如榧瓤肉亦如栗味甚苦而多膏油江右閩廣人多用此油燃燈甚明勝于諸油亦可食農政全書楂在南中為利甚廣乃字書既無此字而偏方雜記亦未之見或直書為茶尤非也獨本草有櫧子云小于橡子味苦澁皮樹如栗或者櫧楂聲近土俗音訛邪其不言子可為油或昔人未食其利如烏臼女貞之類耶不敢傅㑹姑志之以俟再考又種楂法秋間收子時簡取大者掘地作一小窖勿令及泉用沙土和子置窖中至次年春分取出畦種秋分後分栽三年結實又作油法每嵗于寒露前三日收取楂子則多油遲則油乾收子宜晾之髙處令透風樓上尤佳過半月則罅發取去斗欲急開則攤曬一兩日盡開矣開後取子曬極乾入碓磑中碾細蒸熟榨油如常法又楂油能療一切瘡疥塗數次即愈其性寒能退濕熱用造印色生者亦不沁或云以澤首尤勝諸膏油不染衣不膩髪其查可㸑用法每餅作四破先于冷竈中罨架起下用乾柴發火發火後用餅屑漸次撒入則起燄燒熟者可以宿火勝用炭墼漆漆說文云木汁可以䰍物一作桼如水滴而下生漢中山谷梁益陜襄皆有金州者最善廣州者性急易燥今廣浙中出一種漆六月取汁漆物黄澤如金即唐書所謂黃漆也廣南漆作飴糖氣沾沾無力樹似榎而大髙二三丈身如柿皮白葉似椿花似槐子似牛李子木心黃六七月刻取滋汁農政全書春分前移栽易成有利一云臘月種又取用者以竹筒釘入木中取汁或以剛釡斫其皮開以竹管承之滴汁則為漆也凡取時須荏油解破故淳者難得可重重别制拭之色黒如瑿若鐵石者為上等黄嫩若蜂窠者不佳凡驗漆惟稀者以物蘸起細而不斷斷而復收更又塗于乾竹上䕃之速乾者並佳試訣有云微扇光如鏡懸絲急似鈎撼成琥珀色打著有浮漚齊民要術凡漆器不問真偽送客之後皆須以水淨洗置牀薄上於日中半日許曝之使乾下晡乃收則堅牢耐久若不即洗者鹽醋浸潤氣徹則皺器便壞矣其朱裏者仰而曝之朱本和油性潤耐日故盛夏連雨土氣蒸熟什器之屬雖不經夏用六七月中各須一曝使乾俗人見漆器暫在日中恐其炙壞合著隂潤之地雖欲愛慎朽敗更速矣又凡木畫服翫箱椀之屬八五月盡七月九月中每經雨以布纒指揩令熱徹膠不動作光淨耐久若不揩拭者地氣蒸熟徧上生衣厚潤徹膠便皺動處起發颯然破矣農桑通訣用漆在燥熱及霜冷時則難乾得隂濕雖寒月亦易乾物之性也若苦霑人以油治之㯶櫚㯶櫚一名栟櫚出領南西川今江南亦有之最難長初生葉如白芨髙二三尺則樹端數葉大如扇上聳四散岐裂大者髙二三尺其莖三稜四時不凋其榦正直無枝條身赤黒皆筋絡宜為鋰杵亦可旋為器物其皮有絲毛錯縱如織每皮一匝為一節二旬一采皮轉復生上剝取縷解可織衣帽褥椅之屬每嵗必兩三剝之否則樹死或不長也剝之多亦傷樹三月於木端莖中出數黃苞苞中有細子成列乃花之朶也狀如魚腹孕子謂之㯶魚亦曰㯶筍漸長出苞則成化穗黃白色結實纍纍大如豆生黃熟黒甚堅實便民圖㯶櫚二月間撒種長尺許移栽成行至四尺餘始可剝每年四季剝之半年一剝亦可其皮作繩入水千嵗不爛昔有人開塚得一索已生根皂莢皂莢一名皂角一名烏犀一名懸刀廣志謂之雞栖子生雍州川谷及魯之鄒縣懷孟産者為勝今處處有之其木極有髙大者葉似槐葉瘦長而尖枝間多刺夏開花秋後結實有三種形小者為猪牙皂莢良一種長而肥厚多脂而粘一種長而瘦薄不粘用之當以肥厚者為佳味辛鹹性溫有小毒栢實為之使惡麥門冬畏空青人參苦參可作沐藥不入湯農政全書猪者良其角亦有長尺一二寸者種者二三月種不結角者南北二面去地一尺鑽孔用木釘釘之泥封竅即結或曰樹不結鑿一大孔入生鐵三五斤以泥封之便開花結子既實以蔑束其本數匝木楔之一夕自落用以洗垢滌膩最良角與刺俱堪入藥亦物之利益于世者梔子梔子一名木丹一名越桃一名鮮支處處有之有三種一種木髙七八尺葉似兔耳厚而深綠春榮秋瘁入夏開小白花大如酒柸皆六出中有黄蕊甚芬芳結實如訶子狀生青熟黃中仁深紅可染繒帛入藥用山梔子皮薄圓小如鵲腦房七稜至九稜者佳一種花小而重臺者園圃中品一種徽州梔子小枝小葉小花髙不盈尺可作盆景耳山谷詩話云染梔子花六出雖香不濃郁山梔子花八出一株可香一圃酉陽雜俎云相傳即西域薝蔔花或曰薝蔔金色花小而香西方甚多非梔也齊民要術十月選成熟梔子取子淘淨曬乾至来春三月選沙白地斸畦區深一尺全去舊土却收地上濕潤浮土篩細填滿畦區下種稠密如種茄法細土薄糝上搭箔棚遮日髙可一尺旱時一二日用水於棚上頻頻澆酒不令土脈堅垎四十餘日芽方出土薅治澆溉至冬月厚用蒿草藏䕶次年三月移開相去一寸一科鋤治澆溉宜頻冬月用土深擁根株其枝梢用草包䕶至次年三四月又移一步半一科栽成行列須圍内穿井頻澆冬月用土深擁須北面莢籬障以蔽風寒第四年開花結實十月收摘甑内微蒸過曬乾用梅雨時以沃壤一團揷嫩枝其中置鬆畦内常灌糞水候生根移種亦可種樹書黃梔子候其大時摘青者曬收至黃熟則消花水矣大朶重臺者梅醬糖蜜製之可作羮果茱萸茱萸有二種吳茱萸處處有之江淮蜀漢尤多以吳地者為好所以有吳之名樹髙丈餘皮青綠色葉似椿而闊厚紫色三月開紅紫細花七八月結實似椒子嫩時微黃熟則深紫李時珍曰枝柔而肥葉長而皺其實結於梢頭纍纍成簇而無核一種粒大一種粒小小者入藥為勝氣味辛溫食茱萸一名藙一名榝一名艾子一名辣子一名越椒一名欓子李時珍曰蜀人呼為艾子楚人謂之辣古人謂之藙及椒南北皆有之其木甚髙大有長及百尺者枝莖青黃莖間有刺上有小白㸃葉類油麻葉黃花綠子叢簇枝上味辛而苦宜入食羮中能發辛香蘇恭謂開口者為食茱萸孟詵謂閉口者為欓子馬去謂粒大色黃黒者為食茱萸粒𦂳小色青綠者為吳茱萸山茱萸則不任食也禮記内則三牲用藙注藙茱萸也爾雅謂之椒爾雅椒椒醜莍注莍萸子聚生成房貌今江東亦呼莍椒榝似茱萸而小赤色疏醜類也莍實之房也椒榝之類實皆有莍彚自裹齊民要術二月栽之宜故城隄冡髙燥之處凡於城上種蒔者先宜隨長短掘壍停之經年然後於壍中種蒔保澤沃壤與平地無差不爾者土堅澤流長物不達經年倍樹木尚小候實開便收之挂著屋裏壁上令隂乾勿使煙熏煙熏則苦而不辛也用時去中黑子肉醬魚鮮偏可所用萬畢術曰井上宜種茱萸茱萸葉落井中有化水者無瘟病風土記俗尚九月九日謂之上九茱萸到此日氣烈熟色赤可拆其房以揷頭云辟惡氣禦冬枸杞枸杞一名枸棘一名天精一名地仙一名却老一名苦杞一名甜菜一名地節一名羊乳枸杞二木名此木棘如枸之刺莖如杞之條故兼稱之處處有之春生苗葉軟薄堪食其莖榦髙三五尺叢生六月月開花經紫色隨結實微長生青熟紅味甘美根皮名地骨皮古以韋山為上近以甘州者為絶品今陜之蘭州靈州以西並是大樹子圓如櫻桃乾時可作果食爾雅杞枸檵注今枸杞也陸璣詩疏一名苦杞一名地骨春生作羮茹微苦其莖似莓子秋熟正赤莖葉及子服之輕身益氣耳種樹書收子及掘根種於肥壤中待苗生剪為蔬食甚佳博聞錄種枸枸法秋冬間收子淨洗日乾春耕熟地作町闊五寸紐草稕如臂大置畦中以泥塗草稕上然後種子以細土及牛糞盖令徧苗出頻以水澆之又可揷種務本新書枸杞宜於故區畦種葉作菜食子根入藥秋時收好子至春畦種一如種菜法又三月中苗出時移栽如常法伏内壓條特為滋茂一法截條長四五指許掩於濕土地中亦生農桑通訣春夏採葉秋採莖實冬採根朱孺子幼事道士王元正居大石巖汲於溪見二花犬因逐之入於枸杞叢下掘之根形如二丈食之忽覺身輕諺云去家千里勿食蘿摩枸杞言其補精氣也五加五加一名文章草一名金玉香草一名金鹽一名五花一名追風使一名木骨一名豺漆一名豺節本草綱目云五葉交加者良故名五加又名五花丹鉛錄作五加云一枝五葉者佳故也蜀人呼為白刺蘄州人呼為木首江淮湖南州郡皆有之春生苗莖葉皆青作藂有刺類薔薇葉五出香氣似橄欖春時結實如豆粒而扁色青得霜乃紫黒根類地骨皮輕脆芬香一云生南方者微白而柔軔大類桑白皮生北方者微苦而硬苗可作茹農政全書取根深掘肥地二尺許埋一根令没舊根甚易活苗生從一頭剪取每剪訖鋤土壅之久服輕身耐老明目下氣補中益精氣堅筋骨强志意葉可作蔬菜食五七月採根隂乾造酒有服五加皮散而獲延年者不勝計或即為散以代湯茶餌之驗亦同又正二月取枝揷亦易活欽定授時通考卷六十八
