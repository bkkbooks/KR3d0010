body:
  text: 天時總論上書堯典敬授人時傳人時謂耕穫之候民事早晚之所闗舜典咨十有二牧曰食哉惟時傳所重在於民食惟當敬授民時立君所以牧民民生在於粒食是君之所重論語云所重民食謂年榖也種殖収斂及時乃穫故惟當敬授民時洪範八庶徵曰雨曰𤾉曰燠曰寒曰風曰時五者來備各以其敘庶草蕃廡傳雨以潤物𤾉以乾物煖以長物寒以成物風以動物五者備至各以次序則衆草蕃滋廡豐茂也舉草茂盛則榖成必矣又嵗月日時無易百榖用成傳各順常則百榖成左傳凡分至啟閉必書雲物為備故也註分春秋分也至冬夏至也啓立春立夏閉立秋立冬汲古叢語分至啟閉順四時而成八節也以其得隂陽之中謂之分以其當寒暑之極謂之至以其生長謂之啟以其収藏謂之閉然則四孟啟閉者隂陽闔闢之功二至二分者陰陽老少之變也又九扈為九農正扈民無滛者也疏春扈鳻鶞相五土之宜趣民耕種者也夏扈竊𤣥趣民耘苗者也秋扈竊藍趣民収斂者也冬扈竊黄趣民蓋藏者也棘扈竊丹為果驅鳥者也行扈唶唶晝為民驅鳥者也宵扈嘖嘖夜為農驅獸者也桑扈竊脂為蠶驅雀者也老扈鷃鷃趣民収麥令不得晏起者也扈止也止民使不滛放論語行夏之時註夏以寅為人正商以丑為地正周以子為天正然時以作事則嵗月自當以人為紀故孔子嘗曰吾得夏時焉而説者以為夏小正之屬孟子不違農時榖不可勝食也註使民得務農不違奪其時則五榖饒足不可勝食也爾雅春為青陽夏為朱明秋為白藏冬為𤣥英四時和謂之玉燭春為發生夏為長贏秋為収成冬為安寧四時和為通正謂之景風甘雨時降萬物以嘉謂之醴泉疏此釋太平之時四氣和暢以致嘉祥之事也青陽言春之氣和則青而溫陽也朱明言夏之氣和則赤而光明也白藏言秋之氣和則白而収藏也𤣥英言冬之氣和則黒而清英也玉燭言四時和氣溫潤明照故曰玉燭李巡曰人君徳美如玉而明若燭聘義云君子比徳於玉焉是知人君若徳輝動於内則和氣應于外統而言之謂之玉燭也春為發生夏為長贏秋為収成冬為安寧此亦四時之别號也四時和為通正者言上四時之功和是為通暢平正也謂之景風言所以致景風景風即祥風也甘雨時降萬物以嘉者嘉善也甘雨即時雨也不為萬物所苦故曰甘甘雨既以時降則萬物莫不嘉善之也謂之醴泉者言四時平暢即所以使地出醴泉也管子嵗有四秋而分有四時故曰農事且作請以什伍農夫賦耜鐵此之謂春之秋大夏且至絲纊之所作此之謂夏之秋而大秋成五榖之所㑹此之謂秋之秋大冬營室中女事紡績緝縷之所作也此之謂冬之秋又隂陽者天地之大理也四時者隂陽之大經也東方曰星其時曰春其氣曰風風生木與骨宗正陽治隄防耕芸樹藝正津梁修溝瀆甃屋行水柔風甘雨乃至百姓乃壽百蟲乃蕃此謂星徳南方曰日其時曰夏其氣曰陽陽生火與氣九暑乃至時雨乃降五榖百果乃登此謂日徳中央曰土土徳實輔四時入出以風雨節土益力土生皮肌膚其徳和平用均此謂嵗徳西方曰辰其時曰秋其氣曰隂隂生金與甲其徳静正嚴順百物乃収此謂辰徳北方曰月其時曰冬其氣曰寒寒生水與血大寒乃至五榖乃熟此謂月徳是故聖王務時而寄政焉又春三月天地乾燥水糾列之時也山川涸落天氣下地氣上萬物交通故事已新事未起草木荑生可食寒暑調日夜分分之後夜日益短晝日益長利以作土功之事土乃益剛當夏三月天地氣壯大暑至萬物榮華利以疾􅘥殺草薉使令不欲擾當秋三月山川百泉踊降雨下山水出海路距雨露屬天地湊汐利以疾作収斂無留一日把百日餔民無男女皆行於野不利作土功之事當冬三月天地閉藏暑雨止大寒起萬物實熟利以填塞空郄繕邊城塗郭術實廥倉凡一年之事畢矣吕氏春秋黄帝曰四時之不可正正五榖而已耳凡稼早者先時暮者不及時寒暑不節稼乃生災冬至以後五句有七日而昌生於是乎始耕事農之道見生而藝生見死而穫死迨時而作遇時而止老弱之力可使盡起不知時者未至而逆之既往而慕之當其時而薄之此從事之下也又春之徳風風不信其華不盛華不盛則果實不生夏之徳暑暑不信則土不肥土不肥則長遂不精秋之徳雨雨不信其榖不堅榖不堅則五種不成冬之徳寒寒不信其地不剛地不剛則凍閉不開天地之大四時之化而猶不能以不信成物又况乎人事又得時之禾長稠而穗大本而莖殺蔬穖而穗大其粟圓而薄糠其米多沃而食之彊如此者不風先時者莖葉帶芒以短衡穗矩而芳奪秮米而不香後時者莖葉帶芒而末衡穗閱而青零多粃而不滿得時之黍芒莖而徼下穗芒以長搏米而薄糠舂之易而食之不噮而香如此者不飴先時者大本而華莖殺而不遂葉藁短穗後時者小莖而麻長短穗而厚糠小米鉗而不香得時之稻大本而莖葆長秱疏穖穗如馬尾大粒無芒搏米而薄糠舂之易而食之香如此者不益先時者大本而莖葉格對短秱短穗多粃厚糠薄米多芒後時者纖莖而不滋厚糠多粃􅂒辟米不得恃定熟印夭而死得時之麻必芒以長疎節而色陽小本而莖堅厚枲以均後熟多榮日夜分復生如此者不蝗得時之菽長而短足其美二七以為族多枝數節競葉蕃食大菽則圎小菽則搏以芳稱之重食之息以香如此者不蟲先時者必長以蔓浮葉疏節小英不實後時者短莖疏節本虚不實得時之麥秱長而莖黒稱之重食之致香以息使人肌澤且有力如此者不蚼蛆先時者暑雨未至朋動蚼蛆而多疾其次羊以節後時者弱苗而穗蒼狼薄色而美芒是故得時之稼興失時之稼約莖相若稱之得時者重粟之多量粟相若而舂之得時者多米量米相若而食之得時者忍饑是故得時之稼其臭香其味甘其氣章百日食之耳目聰明心意叡智四衞變彊􅀈氣不入身無苛殃黄帝曰四時之不正也正五榖而已矣淮南子攝提格之嵗嵗早水晚旱稻疾蠶不登菽麥昌民食四升單閼之嵗嵗和稻菽麥蠶昌民食五升執除之嵗嵗早旱晚水小饑蠶閉麥熟民食三升大荒落之嵗蠶小登麥昌菽疾民食二升敦牂之嵗嵗大旱蠶登稻疾菽麥昌禾不為民食二升協洽之嵗蠶登稻昌菽麥不為民食三升涒灘之嵗嵗和小雨行蠶登菽麥昌民食三升作鄂之嵗蠶不登菽麥不為禾蟲民食五升閹茂之嵗嵗小饑蠶不登麥不為菽昌民食七升大淵獻之嵗大饑蠶開菽麥不為禾蟲民食三升困敦之嵗嵗大霧起大水出蠶稻麥昌民食三升赤奮若之嵗早水蠶不出稻疾菽不為麥昌民食一升又仲春始出仲秋始内昏張中則務種榖大火中則種黍菽虚中則種宿麥昴中則収斂蓄積晉書藝文志炎帝分八節以始農功汜勝之書耕之本在于趣時和土務糞澤早鋤穫春凍解地氣始通土一和解夏至天氣始暑隂氣始盛土復解夏至後九十日晝夜分天地氣和以此時耕田一而當五名曰膏澤皆得時功陳旉農書四時八節之行氣候有盈縮踦贏之度五運六氣所主隂陽消長有太過不及之差其道甚微其效甚著蓋萬物因時受氣因氣發生其或氣至而時未至或時至而氣未至則造化發生之理因之也若仲冬而梅李實季秋之月而昆蟲不蟄藏類可見矣隂陽一有愆忒則四序亂而不能生成萬物寒暑一失代謝即節候差而不能運轉一氣傳曰不先時而起不後時而縮故農事必知天地時宜則生之蓄之長之育之成之熟之無不遂矣由庚萬物得其道崇丘萬物得極其高大由儀萬物之生各得其宜者謂天地之間物物皆順其理也故堯命羲和厯象日月星辰以欽授民時俾咸知東作南訛西成朔易之候稽之天文則星鳥星火星虚星昴於是乎審矣驗之物理則鳥獸孳尾希革毛毨氄毛亦以詳矣而厥民析因夷隩可得而稽倣之也大則取象於天地無乖升降之機明則取法乎日星不亂經營之度定之以時應之以數此欽天勤民㫖意豈率然哉其所以時和嵗豐良由此也今人雷同以建寅之月朔為始春建已之月朔為首夏殊不知隂陽有消長氣候有盈縮冒昩以作事其克有成耶設或有成亦幸而已聖王之涖事物皆設官分職以掌之各置其官師以敎導之農師之職其可已耶春秋之時法度並廢宜凶荒薦至乃書有年書大有年葢幸而書之抑見天道有常而人自愆忒也詩稱豐年穰穰其崇如墉其比如櫛以言其得法度時宜故豐登有常也洪範九疇彞倫攸敘則百榖用成彞倫攸斁則百榖用不成然則順天地時利之宜識隂陽消長之理則百榖之成斯可必矣古先哲王所以頒朔明時者匪直大一統也將使斯民知謹時令樂事赴功也故農事以先知備豫為善農桑通訣舜在璿璣玉衡以齊七政説者以為天文器後世言天之家如洛下閎鮮于妄人輩述其遺制營之度之而作渾天儀厯家推步無越此器然而未有圗也葢二十八宿周天之度十二辰日月之㑹二十四氣之推移七十二候之遷變如環之循如輪之轉農桑之節以此占之四時各有其務十二月各有其宜先時而種則失之太早而不生後時而蓺則失之太晚而不成故曰雖有智者不能冬種而春収此圗之作以交立春節為正月交立夏節為四月交立秋節為七月交立冬節為十月北斗旋於中以為準則每嵗立春斗杓建於寅方日月㑹於營室東井昏見於牛建星辰正於南由此以往積十日而為旬積三旬而為月積三月而為時積四時而成嵗一嵗之中月建相次周而復始氣候推遷與日厯相為體用所以授民時而節農事即謂用天之道也夫授時厯每嵗一新時圗常行不易非厯無以起圗非圗無以行厯表裏相參轉運而無停渾天之儀粲然具在是矣然按月農時特取天地南北之中氣立作標準以示中道非膠柱鼓瑟之謂若夫逺近寒暖之漸殊正開常變之或異又當推測晷度斟酌先後庶㡬人與天合物乘氣至則養之節不至差謬此又圖之體用餘致也不可不知務農之家當家置一本攷厯推圗以定種蓻如指諸掌故亦名曰授時指掌活法之圖羣芳譜一嵗共十二月二十四氣七十二候大寒後十五日斗柄指艮為立春正月節立始建也春氣始至而建立也一候東風解凍凍結於冬遇春風而解也二候蟄蟲始振蟄藏也振動也感三陽之氣而動也三候魚陟負冰上遊而近水也立春後十五日斗柄指寅為雨水正月中陽氣漸升雲散為水如天雨也一候獺祭魚嵗始而魚上則獺取以祭二候候雁北陽氣逹而北也三候草木萌動天地交泰故草木萌生發動也雨水後十五日斗柄指甲為驚蟄二月節蟄蟲震驚而出也一候桃始華二候倉庚鳴倉庚黄鸝也倉清也庚新也感春陽清新之氣而初出故鳴三候鷹化為鳩即布榖也仲春之時鷹喙尚柔不能捕鳥瞪目忍饑如痴而化化者反歸舊形之謂春化鳩秋化鷹如田䑕之于鴽也若腐草雉爵皆不言化不復本形者也驚蟄後十五日斗柄指卯為春分二月中分者半也當春氣九十日之半也一候𤣥鳥至𤣥鳥燕也春分來秋分去二候雷乃發聲四陽漸盛隂陽相薄為雷乃者象氣出之難也三候始電電陽光也四陽盛長氣洩而光生也凡聲屬陽光亦屬陽春分後十五日斗柄指乙為清明三月節萬物至此皆潔齊而明白也一候桐始華桐有三種華而不實曰白桐亦曰花桐爾雅謂之榮桐至是始華也二候田䑕化為鴽鴽鶉也䑕隂而鴽陽也三候虹始見虹日與雨交天地之滛氣也清明後十五日斗柄指辰為榖雨三月中雨為天地之和氣榖得雨而生也一候萍始生萍隂物静以承陽也二候鳴鳩拂其羽拂羽飛而翼迫其聲也三候戴勝降于桑蠶候也榖雨後十五日斗柄指巽為立夏四月節夏大也物至此皆假大也一候螻蟈鳴螻蟈一名鼫䑕一名􅕪陰氣始故螻蟈應之二候蚯蚓出蚯蚓陰類出者承陽而見也三候王瓜生王瓜土瓜也立夏十五日斗柄指已為小滿四月中物長至此皆盈滿也一候苦菜秀荼為苦菜感火氣而苦味成不榮而實曰秀榮而不實曰英此苦菜宜言英二候蘼草死蘼草草之枝葉靡細者葶藶之屬凡物感陽生者强而立感陰生者柔而靡靡草則陰至所生也故不勝陽而死三候麥秋至麥以夏為秋感火氣而熟也小滿後十五日斗柄指丙為芒種五月節言有芒之榖可播種也一候螳螂生螳螂飲風飡露感一陰之氣而生至此時破殻而出二候鵙始鳴鵙百勞也惡聲之鳥梟類也不能翺翔直飛而已三候反舌無聲諸書為反舌為百舌鳥能反覆其舌感陽而鳴遇微陰而無聲也芒種後十五日斗柄指午為夏至五月中萬物至此皆假大而極至也一候鹿角解夏至一陰生鹿感陰氣故角解二候蜩始鳴莊子謂蟪蛄夏蟬也語曰蟪蛄鳴朝三候半夏生半夏藥名居夏之半而生也夏至後十五日斗柄指丁為小暑六月節暑氣至此尚未極也一候溫風至溫熱之風至小暑而極故曰至二候蟋蟀居壁感肅殺之氣初生則在壁感之深則在野三候鷹始摯摯擊也月令鷹乃學習殺氣未肅摯鳥始學擊摶迎殺氣也小暑後十五日斗柄指未為大暑六月中暑至此而盡洩一候腐草為螢離明之極則幽陰至微之物亦化而為明不言化者不復原形也二候土潤溽暑土氣潤故欝蒸為溽濕三候大雨時行前後濕暑而後候則大雨時行以退暑也大暑後十五日斗柄指坤為立秋七月節秋揫也物至此而揫斂也一候凉風至西方淒清之風也温變而肅也二候白露降大雨之後凉風來天氣下降茫茫而白尚未凝珠故曰白露降三候寒蟬鳴今初秋夕陽聲小而急疾者是也立秋後十五日斗柄指申為處暑七月中陰氣漸長暑將伏而潛處也一候鷹乃祭鳥金氣肅殺鷹感其氣始捕擊必先祭二候天地始肅三候禾乃登禾者榖連藳桔之總名成熟曰登處暑後十五日斗柄指庚為白露八月節陰氣漸重露凝而白也一候鴻雁來淮南子作候鴈自北而南來也二候𤣥鳥歸𤣥鳥北方之鳥故曰歸三候羣鳥養羞羞謂藏美食以備冬月之養白露後十五日斗柄指酉為秋分八月中至此而陰陽適中當秋之半也一候雷始収聲雷屬陽八月陰中故収聲入地萬物隨以入也二候蟄蟲坯户坯益其蟄穴之户使通明處稍小至寒甚乃墐塞之也三候水始涸水春氣所為春夏氣至故長秋冬氣返故涸也秋分後十五日斗柄指辛為寒露九月節氣漸肅露寒而將凝也一候鴻鴈來賓鴈後至者為賓二候雀入大水為蛤嚴寒所至蜚化為潛也三候菊有黄華菊獨華於陰故曰有也寒露後十五日斗柄指戍為霜降九月中氣愈肅露凝為霜也一候豺乃祭獸以獸祭天報本也方餔而祭秋金之義二候草木黄落色黄揺落也三候蟄蟲咸俯皆垂頭畏寒不食也霜降後十五日斗柄指乾為立冬十月節冬終也物終而皆収藏也一候水始冰水而初凝未至于堅故曰始冰二候地始凍土氣凝寒未至於坼故曰始凍三候雉入大水為蜃大水淮也立冬後十五日斗柄指亥為小雪十月中氣寒而將雪矣第寒未甚而雪未大也一候虹藏不見陰陽氣交為虹陰氣極故虹伏言其氣下伏也二候天氣上升三候地氣下降天地變而各正其位不交則不通故閉塞也小雪後十五日斗柄指壬為大雪十一月節言積寒凜冽雪至此而大也一候鶡鴠不鳴陽鳥感六陰之極而不鳴二候虎始交虎感㣲陽萌動故氣益盛而交也三候茘挺生大雪後十五日斗柄指子為冬至十一月中日南陰極而陽始生也一候蚯蚓結六陰寒極之時蚯蚓交結如蠅二候麋角解冬至一陽生麋感陽氣故角解三候水泉動水者一陽所生一陽初生故泉動也冬至後十五日斗柄指癸為小寒十二月節時近小春故寒氣猶小一候鴈北鄉鴈避熱而南今則北飛禽鳥得氣之先故也二候鵲始巢至後二陽已得來年之氣鵲遂為巢知所向也三候雉鴝雉陽鳥也鴝雌雄同鳴感於陽而有聲也小寒後十五日斗柄指丑為大寒十二月中時巳二陽而寒威更甚者閉塞不盛則發洩不盛所以啓三陽之泰此造化之微權也一候雞乳乳育也雞木畜麗於陽而有形故乳二候征鳥厲疾至此而猛厲迅疾也三候水澤腹堅冰徹上下皆凝故曰腹堅一元黙運萬彚化生四序循環千古不易極之而陽九百六不過此氣之推遷耳吳下田家志一九二九扇子不離手三九二十七冰水甜如蜜四九三十六拭汗如出浴五九四十五頭戴秋葉舞六九五十四乘凉入佛寺七九六十三床頭尋被單八九七十二思量葢夾被九九八十一家家打炭墼又一九二九相喚弗出手三九二十七籬頭出篳篥四九三十六夜眠如露宿五九四十五太陽開門户六九五十四貧兒争意氣七九六十三布衲兩肩攤八九七十二猫狗尋陰地九九八十一犂耙一齊出欽定授時通考卷一
