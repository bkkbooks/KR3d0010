body:
  text: 功作墾耕詩小雅畇畇原隰曾孫田之傳畇畇墾闢貌疏孔頴達曰墾耕其地闢除其草萊以成柔田也周頌駿發爾私終三十里亦服爾耕十千維耦箋駿疾也發伐也亦大服事也使民疾耕發其私田竟三十里者一部一吏主之於是民大事耕其私田萬耦同時舉也禮記月令季夏之月土潤溽暑大雨時行燒薙行水利以殺草如以熱湯注薙謂迫也芟草也此謂欲稼萊地先薙其草草乾燒之至此大雨流水潦畜於其中則草死不復生而地美可稼也周禮地官稻人以涉揚其芟作田注揚去前年所芟之草而治田種稻訂義黄氏曰草芟著土則復生故以涉揚之草死田肥故曰作田又凡稼澤夏以水殄草而芟夷之注殄絶也夏六月之時以水絶草之後生者至秋水涸芟之明年乃稼秋官柞氏掌攻草木及林麓夏日至令刋陽木而火之冬日至令剥隂木而水之若欲其化也則春秋變其水火注刋剥謂斫去次地之皮生山南為陽木生山北為隂木火之水之使其肄不生化猶生也謂時以種榖也所火則水之所水則火之則其土和美疏柞氏薙氏治地皆擬後年乃種田薙氏除草柞氏攻木兼云草者以攻木之處有草兼攻之也陽木得隂而鼓隂木得陽而發故須其時刋剥之刋木正欲種田生榖故云欲使生榖則當變其水火也又薙氏掌殺草春始生而萌之夏日至而夷之秋繩而芟之冬日至而耜之若欲其化也則以水火變之注萌之以兹基斫其生者夷之以鉤鐮迫地芟之也含實曰繩芟其繩則實不成實耜之以耜側凍土剗之以火燒其所芟萌之草已而水之則其土亦和美矣疏兹基即今之鋤也含實曰繩秋時草物含實也以耜側凍土剗之者冬時地凍以耜附側剗之考工記堅地欲直庛柔地欲句庛直庛則利推句庛則利發管子丈夫二犂童五尺一犂以為三日之功荀子楛耕傷稼注耕不精曰楛吕氏春秋凡耕之大方力者欲柔柔者欲力息者欲勞勞者欲息棘者欲肥肥者欲棘棘羸弱也急者欲緩緩者欲急濕者欲燥燥者欲濕上田棄畝下田棄甽五耕五耨必審以盡其深殖之度隂土必得大草不生又無螟蜮今兹美禾來兹美麥是以六尺之耜所以成畝也其博八寸所以成甽也耨柄尺此其度也其耨六寸所以間稼也地可使肥又可使棘人肥必以澤使苗堅而地隙人耨必以旱使地肥而土緩草諯大月冬至後五旬七日菖始生菖者百草之先生者也於是始耕又凡耕之道必始於壚為其寡澤而後枯必厚其靹為其唯厚而反􅀈􅀈或作選者􅀢之堅者耕之澤其靹而後之上田則被其處下田則盡其汙無異三盗任地夫四序參發大甽小畝為青魚胠苗若直獵地竊之也既種而無行耕而不長則苗相竊也弗除則蕪除之則虚則草竊之也故去此三盗者而後粟可多也所謂今之耕也營而無獲者其蚤者先時晚者不及時寒暑不節稼乃多菑實其為畮也髙而危則澤奪陂則埒見風則蹶髙培則拔寒則彫熱則修一時而五六死故不能為來來丕成也不俱生而俱死虚稼先死衆盜乃竊望之則有餘就之則虚又凡農之道厚之為寳斬木不時不折必穂稼就而不穫必有天菑夫稼為之者人也生之者地也養之者天也是以稼之容足耨之容耨據之容手此之謂耕道汜勝之書春地氣通可耕堅硬强地黒壚土輒平摩其塊以生草草生復耕之天有小雨復耕和之勿令有塊以待時所謂强土而弱之也春候地氣始通㭬橛木長尺二寸埋尺見其二寸立春後土塊散上沒橛陳根可拔此時二十日以後和氣去即土剛以此時耕一而當四和氣去耕四不當一杏始榮華輒耕輕土弱土望杏花落復耕耕輒藺之草生有雨澤耕重藺之土甚輕者以牛羊踐之如此則土强此謂弱土而强之也春氣未通則土厯適不保澤終歲不宜稼非糞不解慎無旱耕須草生至可種時有雨即種土相親苗獨生草穢爛皆成良田此一耕而當五也不如此而旱耕塊硬苗穢同孔出不可鋤治反為敗田秋無雨而耕絶土氣土堅垎名曰脂田及盛冬耕泄隂氣土枯燥名曰脯田脯田與脂田皆傷田二歳不起稼則一歳休之凡愛田常以五月耕六月再耕七月勿耕謹摩平以待種時五月耕一當三六月耕一當再若七月耕五不當一冬雨雪止輒以藺之掩地雪勿使從風飛去後雪復藺之則立春保澤凍蟲死來年宜稼得時之和適地之宜田雖薄惡収可畝十石四民月令正月地氣工騰土長冐橛陳根可拔急菑强土黑壚之田二月隂凍畢釋可菑美田緩土及河渚水處三月杏華勝可菑沙白輕土之田五月六月可菑麥田齊民要術凡開荒山澤田皆七月芟艾之草乾即放火至春而開墾其林木大者􅞑殺之葉死不扇便任耕種三歳根枯莖朽以火燒之耕荒畢以鐵齒􅘜􅜒再徧耙之漫擲黍穄勞亦再徧明年乃中為榖田又凡耕髙下田不問春秋必須燥濕得所為佳若水旱不調寧燥無濕燥雖耕塊一經得雨地即粉解濕耕堅垎湖洛數年不佳諺曰濕耕澤鋤不如歸去言無益而有損濕耕者白背速􅘜􅜒之亦無傷否則大惡也又凡秋耕欲深春夏欲淺犂欲亷犂亷耕細牛復不疲秋耕䅖青者為上北至冬月青草復生者其美與小豆同也初耕欲深轉地欲淺耕不深地不熟轉不淺動生土也菅茅之地宜縱牛羊踐之踐則根浮七月耕之則死非七月復生矣凡秋収之後牛力弱未及即秋耕者榖黍穄粱秣茇之下即移羸速鋒之也又凡秋収了先耕蕎麥地次耕餘地務遣深細不得趁多看乾濕隨時葢磨著切見世人耕了仰著土塊並待孟春葢若冬乏水雪連夏亢陽徒道秋耕不堪下種無問耕得多少皆須旋葢磨如法陳旉農書夫耕耨之先後遲速各有宜也旱田穫刈纔畢隨即耕治㬠暴加糞壅培而種荳麥蔬茹因以熟土壤而肥沃之以省來歳功􅃥且其収足又以助歳計也晚田宜待春乃耕為其藁秸柔韌必待其朽腐易為牛力山川原隰多寒經冬深耕放水乾涸雪霜凍沍土壤蘇碎當始春又遍布朽薙腐草敗葉以燒治之則土暖而苗易發作寒泉雖冽不能害也若不能然則寒泉常浸土脈冷而苗稼薄矣詩稱有冽氿泉無浸穫薪冽彼下泉浸彼苞稂葢謂是也平陂易野平耕而深浸即草不生而水亦積肥矣俚語有之曰春濁不如冬清殆謂是也蘇氏直説為農大綱一則牛欺地二則人欺苗牛欺地則所種不失其時人欺苗則省力易辦反是則徒勞無益矣凡地除種麥外並宜秋耕秋耕之地荒草自少極省鋤工如牛力不及不能盡秋耕者除種粟地外其餘黍豆等地春耕亦如大抵秋耕宜早春耕宜遲秋耕宜早者乘天氣未寒將陽和之氣掩在地中其苗易榮遇秋天氣寒冷有霜時必待日髙方可耕地恐掩寒氣在内令地薄不収子粒春耕宜遲者亦待春氣和暖日髙時依前耕䎱農桑通訣墾耕者其農功之第一義歟墾除荒也耕犂也凡墾闢荒地春曰燎荒如平原草萊深者至春燒荒趁地氣通潤草芽欲發根荄柔脆易為開墾夏曰䅖青夏日草茂時開謂之䅖青可當草糞但根鬚壯宻須藉强牛乃可盖莫若春為上秋曰芟夷其次秋暮草木叢宻先用鏺刀徧地芟倒暴乾放大至春而開墾乃省力如泊下蘆葦地内必用􅟮刀引之犂鑱隨耕起墢特易牛乃省力沾山或老荒地内科本多者必須用钁劚去餘有不盡根科俗謂之埋頭耕也當使熟鐵煆成鑱尖套於退舊生鐵鑱上縱遇根株不至擘缺妨誤工力或地段廣濶不可徧劚則就斫枝莖覆於本根上候乾焚之其根即死而易朽又有經暑雨後用牛曵磟碡或輥子之所斫根查上和泥碾之乾即挣死一二歳後皆可耕種又大凡開荒必趁雨後又要調停犂道淺深麤細淺則務盡草根深則不至塞墢麤則貪生費力細則貪熟少功惟得中則可又今漢沔淮頴上率多創開荒地當年多種脂麻等種有痛収至盈溢倉箱速富者如舊稻塍内開耕畢便撒稻種直至成熟不須薅拔縁新開地内草根既死無荒可生若諸色種子年年揀浄别無稂莠數年之間可無荒歳所収常倍於熟田葢曠閑既久地有餘力苗稼鬯茂子粒蕃息也諺云坐賈行商不如開荒言其穫刈多也除荒墾闢之功如此又耕地之法未耕曰生已耕曰熟初耕曰塌再耕曰轉生者欲深而猛熟者欲淺而亷此其畧也北方農俗所傳春宜早晚耕夏宜兼夜耕秋宜日髙耕中原地皆平曠旱田陸地一犂必用兩牛三牛或四牛以一人執之量牛强弱耕地多少其耕皆有定法所耕地内先並耕兩犂墢皆内向合為一壠謂之浮䗲自浮䗲為始向外繳耕終此一段謂之一繳之外又間作一繳耕畢於三繳之間歇下繳却自外繳耕至中心􅀈作一􅡡盖三繳中成一􅡡也其餘欲耕平原率皆倣此南方水田泥耕其田髙下濶狹不等以一犂用一牛挽之作止囘旋惟人所便髙田早熟八月燥耕而熯之以種二麥其法起墢為疄兩疄之間自成一甽一段耕畢以鋤横截其疄洩利其水謂之腰溝二麥既収然後平溝甽蓄水深耕俗謂之再佃田也下田熟晚十月収刈既畢即乘天晴無水而耕之節其水之淺深常令塊墢半出水面日暴雪凍土乃蘇碎仲春土膏脈起即再耕治又有一等水田泥淖極深能䧟牛畜則以禾扛横亘田中人立其上而鋤之南方人畜耐暑其耕四時皆以中晝此南方地勢之異宜也農政全書徐光啟曰古治田者歳易故可夏耕今居廣虚之地者宜仍用古法若麥田種秋苗自然五六月耕不待論也又韓氏直説言秋耕宜早氣天氣未寒將陽和之氣掩在地中其苗易榮寒暖之氣豈能掩在地中乎以月令地氣沮泄之説為近嶺表異録新龍等州山田揀荒平處以鋤鍬開為町疃伺春雨邱中貯水即先買鯇魚子散於田内一二年内魚兒長大食草根並既盡為熟田又収魚利乃種稻且無稗草齊民之上術也墾耕具各圖説耒耜犂耕槃牛軛鑱鏵鐴剗鋒長鑱钁臿鐵搭􅟮刀鏺櫌耒耜圖説耒耜上句木也説文曰耒手耕曲木從木椎手鄭元云耒下前曲接耜其受鐵處歟耜臿也説文云㭒從本㠯聲徐鉉等曰今作耜考工記匠人為溝洫耜廣五寸二耜為耦注云古者耜一金兩人併發之今之耜岐頭兩金象古之耦也疏云耜岐頭者後漢用牛耕種故有岐頭兩脚耜也耒耜二物而一事猶杵臼也犂圖説犂墾田器犂以牛故從牛山海經曰后稷之孫叔平始教牛耕注曰用牛犂也王楨曰易耒耜而為犂不問地之堅强輕弱莫不任使欲淺欲深求之犂箭欲亷欲猛取之犂梢犂之為器豈不簡易而利用哉其制詳陸龜䝉耒耜經耕槃圖説耕槃駕犂具也舊制稍短駕一牛或二牛故與犂相連今各處用犂不同或三牛四牛其槃以直木長可五尺中置鉤環耕時旋擐犂首與軛相為本末不與犂為一體故復表出之牛軛圖説牛軛字亦作軏服牛具也隨牛大小制之以曲木竅其兩旁通貫耕索仍下繫鞅板用控牛項軛乃穏順了無軒側説文曰軛轅前木也鑱鏵圖説鑱犂之金也集韻註鋭也吳人云鐵犂長尺有四寸廣六尺剜土既多其鋒必秃還可鑄接貧農利之鏵集韻云耕具也説文鏵作䒩兩刃鍤也從木象形鏵與鑱頗異鑱狹而厚惟可正用鏵濶而薄翻覆可使老農云開墾生地宜用鑱翻轉熟地宜用鏵盖鑱開生地著力易鏵耕熟地見功多然北方多用鏵南方多用鑱雖習尚不同若取其便則鑱鏵不偏廢也鐴圖説鐴犂耳也其形不一耕水田曰瓦繳曰髙脚耕陸田曰鏡面曰碗口隨地所宜制也剗圖説剗剗土除草故名周禮注謂以耜側凍土而剗之是也刃如鋤而濶上有深袴插於犂底所置鑱處具犂輕小用一牛或人輓行北方幽冀等處遇有下地經冬水涸至春首浮凍稍甦乃用此器剗土而耕草根既斷土脈亦通俗亦名鎊鋒圖説鋒古農器也其金比鑱小而加鋭其柄如耒首如刃鋒故名鋒取其銛利也地若堅垎鋒而後耕牛乃省力又不乏刃古農法云鋒地宜深鋒苗宜淺齊民要術云速鋒之地恒潤澤而不硬注曰刈榖之後即鋒茇下令秃起則潤澤易耕又云苗生壟平鋒而不耩農書云無鐴而耕曰耩既鋒矣固不必耩盖鋒與耩相類今耩多用岐頭若易鋒為耩亦可代也長鑱圖説長鑱踏田器也鑱此犂鑱頗狹制為長柄謂之長鑱杜工部同谷歌曰長鑱長鑱白木柄即謂此也柄長三尺餘後偃而曲上有横木如拐以兩手按之用足踏其鑱柄後跟其鋒入土乃捩柄以起土墢也在園圃區田皆可代耕比于钁劚省力得土又多古謂之蹠鏵今謂之踏犂亦耒耜之遺制也钁圖説钁斸田器也爾雅謂之鐯斫又云魯斫葢農家開闢地土用以斸荒凡田園山野之間用之者又有濶狹大小之分然總名曰钁臿圖説臿顔師古曰鍫也所以開渠者或曰削所守也唐韻作疀作臿同作插爾雅疏方言云燕之東北朝鮮冽冰之間謂之􅝁宋魏之間謂之鏵或謂之鍏江淮南楚之間謂之臿趙魏之間謂之喿皆謂鍫也然多謂之臿葢古謂臿今謂鍫一器二名宜通用鐵搭圖説鐵搭四齒或六齒其齒鋭而㣲鉤似耙非耙劚土如搭是名鐵搭就帶圓銎以受直柄柄長四尺南方農家或牛犂舉此劚地以代耕墾取其疏利仍就􅘜􅜒塊壤兼有耙钁之效嘗見數家為朋工力相摶日可斸地數畝江南地少土潤多有此等人力猶北山田钁戸也􅟮刀圖説􅟮刀闢荒刃也其制如短鎌而背則加厚嘗見開墾蘆葦蒿萊荒等地根株駢宻雖强牛利器鮮不困敗故於耕犂之前先用一牛引曵小犂仍置刃裂地闢及一隴然後犂鑱隨過覆墢截然省力過丰又有於本犂轅首裏邊就置此刃比之别用人畜尤省便也鏺圖説鏺集韻云兩刃刈也其刃長二尺餘濶三寸横插長木柄内牢以逆楔農人兩手執之遇草萊或麥禾等稼折腰展臂匝地芟之柄頭仍用掠草杖以聚所芟之物使易収束太公農器篇云春鏺草棘又唐有鏺麥殿今人亦云芟曰鏺葢體用互名皆此器也櫌圖説櫌槌塊器説文云櫌摩田器晉灼曰櫌椎塊椎也吕氏春秋曰鋤櫌白挺櫌椎也今田家所制無齒杷首如木椎柄長四尺可以平田疇擊塊壤又謂木斫即此櫌也欽定授時通考卷三十二
