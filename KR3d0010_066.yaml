body:
  text: 農餘果四甜𤓰西瓜北𤓰蓮子蓮藕甘蔗蔆芡葧臍慈姑百合甜𤓰甜瓜一名甘瓜一名果瓜北土中州種蒔甚多二三月下種蔓生葉大數寸五六月花開黄色六七月熟其類甚繁有團者長者尖者扁者大而徑尺者小而一捻者稜之或有或無色之或青或緑或黄斑糁斑白路黄路種種不同甘肅甜瓜大如枕皮瓤皆甘勝於蜜以皮曝乾柔韌甘美而有味浙中一種陰瓜種宜隂處秋熟色黄如金皮膚稍厚藏至春食之如新凡𤓰大曰瓜小曰瓞子曰􅀈肉曰瓤跗曰環蔕曰疐其畏麝諸瓜皆同凡食瓜過多但飲酒或水服麝或食鹽花即消化性寒滑無毒少食止渇除煩熱利小便通三焦壅塞夏月不中暑多食動宿冷病破腹手足無力詩豳風七月食瓜爾雅瓞瓝其紹瓞注俗呼瓝𤓰為瓞紹者𤓰蔓緒亦著子但小如瓝禮記曲禮為天子削𤓰者副之巾以絺為國君者華之巾以綌為大夫者累之士疐之庶人齕之注副析也既削又四析之乃横斷之而巾覆焉華中裂之不四析也累倮也謂不巾覆也疐之不中裂横斷去疐而已齕之不横斷玉藻𤓰祭上環注上環横切之圓如環也龍魚河圖𤓰有兩蔕兩鼻者殺人羣芳譜種植二月上旬為上時三月上旬為中時四月上旬為下時五六月止可種藏𤓰耳預將生數葉便結𤓰者為本母子候熟蔕自落取來截去兩頭其中叚子淘淨曝乾収作種臨種時用鹽水洗之取熟糞土種之仍將洗子鹽水澆之得鹽氣則不籠死坑深五尺大如斗納瓜子大豆各四粒𤓰生數葉將豆搯去𤓰生至初花鋤三四次勿令生草但鋤不可傷根傷根則瓜苦候秧拖時搯去蔓心再用熟糞培根下勤澆灌摘𤓰勿令踏蔓及翻覆之踏則瓜爛翻則𤓰死若生蟻置骨其旁引而棄之西𤓰西瓜一名寒𤓰蔓生花如甜瓜葉大多椏缺面深青背㣲白葉與莖皆有毛如刺微細而硬其稜或有或無其色或青或綠或白其形或長或圓或大或小其瓤或白或黄或紅紅者味尤勝其子或黄或紅或黒或白白者味更劣其味或甘或淡或酸酸者為下而本草綱目云味甘淡寒無毒除煩止渇消暑熱療喉痺口瘡解酒毒子取仁可薦茶皮可蜜煎糖煎醬醃食𤓰後食其子即不噫𤓰氣以𤓰劃破曝日中少頃食之頗凉収藏得法可至來年春夏近糯米及酒氣則易爛羣芳譜種植秋月擇其𤓰之嘉者留子曬乾収作種欲種𤓰地耕熟加牛糞至清明時先以燒酒浸𤓰子少時取出漉浄拌灰一宿相離六尺起一淺坑用糞和土瘞之於四周中留鬆土種子其中不得復移𤓰易活而甘美栽宜稀澆宜頻糞宜多蔓短時作綿兠每朝取蟲恐食蔓長則已頂蔓長至六七尺則搯其頂心令四旁生蔓欲瓜大者每科揀其端正旺相者止留一瓜餘蔓花皆搯去則實大而味美性畏香尤忌麝麝觸之乃至一顆不収北瓜附形如西瓜而小皮色白甚薄瓤甚紅子亦如西瓜而微小狹長味甚甘美與西瓜同時想亦西瓜别種也蓮子蓮子一名藕實一名澤芝蓮房成菂菂在房如蜂子在窠六七月采嫩者生食脆美至秋房枯收之去黒殻謂之蓮肉黒而沈水者其堅如石謂之石蓮子其房大者謂之百子蓮味甘平濇無毒交心腎厚腸胃固精氣强筋骨補虚損利耳目除寒熱治諸血病熟食良切碎可作粥飯生動氣易脹宜去心爾雅荷芙蕖其實蓮其中的的中薏疏李巡曰芙蕖其總名也的蓮實也薏中心也陸璣疏云蓮青皮裹白子為的的中有青為薏又的薂註即蓮實埤雅花時即有實始而黃黃而青青而綠綠而黒中肉白内青心二三分為苦薏齊民要術八九月取堅黒蓮子瓦上磨尖頭令皮薄取墐土作熟泥封三指長令蔕頭泥多而重磨頭泥少而尖種時擲至池中重頭向下自能周正薄皮在上易生數日即出不磨者卒不可生食療本草服食不饑石蓮肉蒸熟去心為末煉蜜丸桐子大日服三十丸此仙家方也陸璣詩疏蓮菂可磨以為飯如粟也輕身益氣令人强健又可為糜幽州揚豫取備饑年蓮藕蓮藕湖澤陂池皆有之以蓮子種者生遲以藕芽種者最易發其芽穿泥成白蒻即藌也長者至丈餘五六月嫩汲水取之可作蔬茹俗呼藕絲菜節生二莖一為藕荷其葉貼水其下旁行生藕一為芰荷其葉出水其旁莖生花冬月至春掘藕食之藕白有孔有絲大者如肱臂長六七尺凡五六節大抵野生及紅花者蓮多藕劣種植及白花者蓮少藕佳白花藕大而孔扁生食味甘煮則不美紅花及野藕生食味澀蒸煮則佳氣味甘平無毒消食解渇散氣生肌蒸食開味補五臟實下焦𢷬浸澄粉服食輕身益年與蜜同食令人腹臟肥不生蟲亦可休糧爾雅藕荷芙蕖其本蔤其根藕注蔤乃莖下白蒻在泥中者埤雅藕生生應月月生一節遇閏輒益一節收藏好肥白嫩藕埋隂濕地可經久如新欲致逺以泥裹之則不壞甘蔗甘蔗叢生莖似竹内實直理有節無枝長者六七尺短者三四尺根下節密以漸而疎葉如蘆而大聚頂上扶疎四垂八九月收莖可留至来年春夏王灼糖霜譜云有數種曰杜蔗即竹蔗緑嫩薄皮味極醇厚專用作霜曰白蔗一名荻蔗一名艻蔗一名蠟蔗可作糖曰西蔗作霜色淺曰紅蔗亦名紫蔗即崑崙蔗也止可生啖不堪作糖江東為勝今江浙閩廣蜀川湖南所生大者圍數寸髙丈許又扶風蔗一丈三節見日即消遇風則折交趾蔗特醇厚本末無厚薄其味至均圍數寸長丈餘取汁曝之數日成飴入口即消彼人謂之石蜜多食蔗衂血燒其滓烟入目則眼暗齊民要術說文曰藷蔗也按書傳或為芉蔗或干蔗或邯􅀈或都蔗所在不同又家法政曰三月可種甘蔗羣芳譜種植榖雨内於沃土橫種之節間生苗去其繁冗至七月取土封壅其根加以糞穢候長成收取雖常灌水但俾水勢流滿潤濕則已不宜久蓄又蔗有四色紅蔗止堪生噉艻蔗可作砂糖西蔗可作霜色淺不甚貴杜蔗綠嫩味極厚專用作霜凡蔗最困地力今年為蔗田者明年改種五榖以滋息之蔆蔆一名芰爾雅云蔆蕨攗註云今水中菱禮記疏云蔆芰也屈到嗜芰即菱角也武陵記云兩角者蔆三角四角者芰本草綱目云其葉枝散故字從芰其角稜峭故謂之蔆而俗呼為蔆角楊慎以芰為鷄頭者誤也一名水栗見風俗通一名沙角見本草一名薢茩說文云楚謂之芰秦謂之薢茩生水澤處處有之落泥中最易生種陂塘者為家菱葉實俱大野生者小皆三月生蔓延浮水上葉扁而有尖光面如鏡葉下之莖有股如蝦股一莖一葉兩兩相差如蝶翅狀五六月開花黃白色實更肥美有無角者其色嫩青老黑又有皮嫩而紫色者謂之浮菱食之尤美李時珍曰其實或三角四角兩角無角家蔆角軟而脆亦有兩角彎卷如弓形者其色有青有紅有紫嫩時剝食皮脆肉美老則殻黒而硬墜入水中謂之烏蔆冬月取之風乾為果生熟皆佳野蔆其角堅直刺人其色嫩青老黒嫩時剝食甘美老則蒸熟食之野人曝乾刴米為飰為粥為糕為果皆可代糧其莖亦可暴收和米作飰以救荒歉盖澤農有利之物也羣芳譜種植秋間取熟黒者撒池中来春自生芡芡一名鷄頭古今注云芡鷄頭也一名芰方言云北燕謂之䓈青徐淮泗之間謂之芡南楚江湘之間謂之鷄頭或謂之鳥頭埤雅云其蓬似鷄首故謂鷄頭一名雁喙一名雁頭一名鴻頭爾雅翼云葉有芒刺兼有觜若鷄雁之頭故有諸名一名鷄壅見莊子一名卵蔆見管子一名蒍子本草經注云芡實即今蒍子也圖經云其莖嫩者名蒍亦名䓈菜一名水硫黄孫公談圃云芡甘滑可食名為水硫黃詳見東坡雜記生水澤中處處有之三月生葉貼水大於荷葉皺文如縠蹙衂如沸面青背紫俗名鷄頭盤莖葉皆有刺莖長丈餘有孔有絲嫩者剝皮可作蔬茹五六月開紫花結苞外有刺如蝟花生苞頂如鷄喙内有斑駁軟肉裹子纍纍如珠璣殻内白米狀如魚目薏苡大味甘平濇無毒補中强志聰耳明目開胃助氣止渇益腎除溼痺腰脊膝痛久服身輕不饑耐老莖止煩渇除虛熱生熟皆宜根狀如三稜煮熟如芋可食治心痛氣結病羣芳譜種植秋間熟時取實之老者以蒲包包之浸水中三月間撒淺水内待葉浮水面移栽淺水每科離二尺許先以麻餅或豆餅拌匀河泥種時以蘆記為根十餘日後每科用河泥三四碗壅之葧臍葧臍一名芍一名鳬茈爾雅云芍鳬茈爾雅翼云名為鳬茈當是鳬好食之一名鳬􅗔本草綱目云鳬􅗔音訛也一名黒三稜一名地栗皆形似也日用本草云小者為葧臍大者為地栗舊名烏芋以形似芋而色烏也今皆名葧臍又鳬􅗔音訛也生淺水中其苗三四月出土一莖直上無枝葉狀如龍鬚色正青肥田生者麤似細葱髙二三尺其本白蒻秋後結實大者如山查栗子臍有聚毛纍纍下生入泥底野生者黒而小食之多滓種出者皮薄色淡紫肉白而大軟脆可食味甘微寒滑無毒治消渇除胸實熱氣作粉食厚腸胃療膈氣消宿食黄疸治血痢下血血崩辟蠱毒消誤吞銅鐵羣芳譜種宜榖雨日慈姑慈姑或作􅗔菰嵗根生十二子如慈姑之乳衆子故名爾雅翼云嵗有閏則生十三子一名藉姑一名水萍一名河鳬茈一名白地栗苗名翦刀草一名翦撘草一名燕尾草一名槎丫草莖榦似嫩蒲又似三稜苗甚軟其色深青綠每叢十餘莖内抽出一兩莖上分枝開小白花四瓣蘂深黄色根大者如杏小者如栗色白而瑩滑五六七月采葉正二月采根煮熱味甘甜時人以作果羣芳譜種植慈姑豫於臘月間折取嫩芽種於水田来年四月盡如種秧法種之離尺許田最宜肥每顆花挺一枝上開數十朶色香俱無惟根至秋冬取食甚佳百合百合一名􅭹一名張瞿一名蒜腦藷一名夜合根如葫蒜數十片相累或云是蚯蚓相纒結變作之其葉短而濶微似竹葉白花四垂者百合也葉長而狹尖如栁葉紅花不四垂者山丹也莖葉似山丹而髙紅花帶黃而四垂上有黒斑㸃其子先結在枝葉間者卷丹也又有一種色微綠者開花最遲俗名真百合四時類要二月種百合此物尤宜雞糞每坑深五寸如種蒜法又云取根曝幹搗為麪細篩甚益人農政全書宜肥地加雞糞熟鋤春取根大者劈雜於畦中如種蒜法五寸一科二月半鋤之滿三遍則不鋤不長三年大如盞頻澆則花開爛熳清香滿庭秋分亦可分欽定授時通考卷六十六
