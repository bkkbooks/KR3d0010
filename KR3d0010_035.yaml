body:
  text: 功作淤隂周禮地官草人掌土化之法以物地相其宜而為之種凡糞種騂剛用牛赤緹用羊墳壤用麋渴澤用鹿鹹瀉用貆勃壤用狐埴壚用豕彊㯺用蕡輕爂用犬注凡所以糞種者皆謂煮取汁也赤緹縓色也瀉鹵也貆貒也勃壤粉解也埴壚黏疏者或曰土之黏而黑者彊㯺彊堅者輕爂輕脆者杜子春謂騂謂地色赤而土剛彊也鄭司農云用牛以牛骨汁漬其種也疏土化之法用骨灰漬種蕡則以麻子搗之以濆種也所用之汁不同因以助其種之生氣以變易地氣則薄可使厚過可使和而稼之所穫必倍常詩云誕后稷之穡有相之道是也禮記月令季夏之月燒矱行水利以殺草如以熱湯可以糞田疇可以美土疆疏糞壅苗之根也蔡云穀田曰田麻田曰疇言爛草可以糞田使肥也可以美土疆者謂彊㯺磊磈難耕之地此月亦可止水漬之乃壅糞使田美也汜勝之書伊尹作為區田教民糞種負水澆稼區田以糞氣為美非必須良田也乂銼馬骨牛羊猪麋鹿骨一斗以雪水三斗煮之三沸取汁以清附子率汁一斗附子五枚漬之五日去附子搗麋鹿羊矢分等置汁中熟撓和之候晏溫又溲曝如法汁乾乃止若無骨煮繅蛹汁和溲以區種之大旱澆之其收至畝百石以上齊民要術凡田地中有良有薄者即須加糞糞之其踏糞之法凡人家秋收後治糧場上所有穰穀􅀈等並須收貯一處每日布牛腳下三寸厚每平旦收聚堆積之還依前布之經宿即堆聚計經冬一具牛踏成三十車糞至十二月正月之間即載糞糞地計小畝畝别用五車計糞得六畝勻攤耕蓋陳敷農書土壤氣脉其類不一肥沃磽埆美惡不同治之各有宜也且黑壤之地信美矣然肥沃之過或苗茂而實不堅當取生新之土以解利之即疏爽得宜也磽埆之土信瘠惡矣然糞壤滋培即其苗茂盛而實堅栗也雖土壤異宜顧治之何如耳治之得宜皆可成就諺謂糞藥言用糞猶用藥也又凡農居之側必置糞屋低為簷楹以避風雨飄浸且糞露星月亦不肥矣糞屋之中鑿為深池甃以磚甓勿使滲漏凡掃除之土燒然之灰簸揚之糠粃斷藁落葉積而焚之沃以糞汁積之既久不覺其多凡欲播種篩去瓦石取其細者和勻種子疏把撮之待其苗長又撒以壅之何患收成不倍厚也哉或謂土敝則草木不長氣衰則生物不遂凡田土種三五年其力已乏斯說殆不然若能時加新沃之土壤以糞治之則精熟肥美其力常新壯矣何衰何敝之有又治田於秋冬之間深耕俾霜雪凍沍土壤蘇碎又積腐藁敗葉剗矱枯朽根荄遍鋪燒治即土暖且爽於始春以糞擁之若用麻枯尤善但麻枯難使須細杵碎和火糞窖罨如作麯樣候其發熱生鼠毛即攤開中間熱者置四旁收斂四旁冷者置中間又堆窖罨如此三四次直待不發熱乃可用不然即燒殺物矣切勿用大糞以其瓮腐芽蘖又損人手腳成瘡痍難療唯火糞與燖猪毛及窖爛粗穀殼最佳亦必渥漉田精熟了乃用糠糞踏入泥中蕩平田面乃可撒榖若不得已而用大糞必先以火糞久窖罨乃可用多見人用小便生澆灌立見損壞農桑通訣田有厚薄土有肥磽耕農之事糞壤為急糞壤者所以變薄田為良田化磽土為肥土也古者分田之制上地皆百畝歲一耕之中地家二百畝間歲耕其半下地家三百畝耕百畝三歲一周蓋以中下之地瘠薄磽確茍不息其地力則禾稼不蕃後世井田之法變强弱多寡不均所有之田歲歲種之土敝氣衰生物不遂為農者必儲糞朽以糞之則地力常新壯而收穫不減又草糞者於草木盛茂時芟倒就地就地內掩罨腐爛也農夫不知乃以其耘除之草棄置他處殊不知和泥渥漉深埋禾苗根下漚罨既久則草腐而土肥美也江南三月草長則刈以踏稻田歲歲如此地力常盛又火糞積土同草木堆疊燒之土熟冷定用碌軸碾細用之江南水地多冷故用火糞種麥種蔬尤佳乂泥糞於溝港內乘船以竹夾取青泥栨撥岸上凝定栽成塊子擔去同大糞和用比常糞得力甚多又凡退下一切禽獸毛羽親肌之物最為肥澤積之為糞勝於草木又下田水冷亦有用石灰為糞治則土暖而苗易發又糞田之法得其中則可若驟用生糞及布糞用多糞力峻熱即燒殺物反為害矣大糞力壯南方治田之家常於田頭置磚檻窖熟而後用之其田甚美北方農家亦宜效此利可十倍又為圃之家於厨棧下深濶鑿一池細甃使不滲泄每舂米則聚礱簸榖殼及腐草敗葉漚漬其中以收滌器肥水與滲漉泔淀漚久自然腐爛一歲三四次出以糞苧因以肥桑愈久愈茂而無荒廢枯催之患矣又凡農圃之家欲要計置糞壤須用一人一牛或驢駕雙輪小車一輛諸處搬運積糞月日既久積少成多施之種藝稼穡倍收桑果愈茂歲有增羡此肥稼之計也夫掃除之隈腐朽之物人視之而輕忽田得之為膏潤惟務本者知之所謂惜糞如惜金也故能變惡為美種少收多諺云糞田勝如買田信斯言也凡區之間善於稼者相其各各地里所宜而用之庶得乎土化之法沃壤之效俾擅上農矣農政全書田附郭多肥饒以糞多故村落中民居稠密處亦然凡通水處多肥饒以糞壅便故又苗糞蠶豆大麥皆好草糞如翹蕘陵苕江南皆特種以壅田非野草也苜蓿亦可壅稻毛羽和燖湯積之久則潰腐如欲速潰置韭菜一握其中明日爛盡矣下田水不得冷惟山田泉水未經日色則冷閩廣用骨及蚌蛤灰糞田亦因山田水冷也又肥積苔華是糞壤法也濵湖人漉取苔華以當糞壅亦甚肥不可不知又胡麻油查可糞田勸農書製糞有多術有踏糞法有窖糞法有蒸糞法有釀糞法有煨糞法有煮糞法而煮糞為上南方農家凡養牛羊豕屬每日出灰於欄中使之踐踏有爛草腐柴皆拾而投之足下糞多而欄滿則出而疊成堆矣比方猪羊皆散放棄糞不收殊為可惜然所有穰􅶣等並須收貯一處每日布牛羊足下三寸厚經宿牛以躁踐便溺成糞平旦收聚除置院內堆積之每日如前法得糞亦多窖糞者南方皆積糞於窖愛惜如金北方惟不收糞故街道不淨地氣多穢井水多鹹使人清氣日微而濁氣日盛須當照江南之例各家皆置糞厠濫則出而窖之家中不能立窖者田首亦可置窖拾亂磚砌之藏糞於中窖熟而後用甚美蒸糞者農居空間之地宜誅茅為糞屋簷務低使蔽風雨凡掃除之土或燒燃之灰簸揚之糠粃斷藁落葉皆積其中隨即拴蓋使氣蒸薰糜爛冬月地下氣暖則為深潭夏月不必也釀糞者於厨棧下深鑿一池細砌使不滲漏每舂米則聚礱簸穀殼及腐草敗葉漚漬其中以收滌器肥水漚久自然腐爛煨糞者乾糞積成堆以草火煨之煮糞者鄭司農云用牛糞即用牛骨浸而煮之其說具區田中糞既經煮皆成清汁樹雖將枯灌之立活此至佳之糞也用糞時候亦有不同用之於未種之先謂之墊底用之於既種之後謂之接力墊底之糞在土下根得之而愈深接力之糞在土上根見之而反上故善稼者皆于耕時下糞種後不復下也大都用糞者要使化土不徒滋苗化土則用糞於先而使瘠者以肥滋苗則用糞於後徒使苗枝暢茂而實不繁故糞田最宜斟酌得宜為善若驟用生糞及布糞過多糞力峻熱即殺物反為害矣故農家有糞藥之喻謂用糞如用藥寒溫通塞不可悮也各種淤䕃法稻農桑輯要壅稻田或河泥或麻豆餅或灰糞各隨其地土之宜麻豆餅畝十斤和灰糞棉餅畝三百斤插禾前一日將棉餅化開勻攤田內耖或草羣芳譜稻田須青草或糞壤灰土厚鋪於內酓爛打平方可撒種又摥稻後將灰糞或麻豆餅屑撒田內農桑通訣榖殼朽腐最宜秧田農書南方稻田有種肥田麥者不冀麥實當春麥青青之時耕殺田中蒸罨土性秋收稻榖必加倍也又旱稻以灰糞蓋之或稻草灰和水澆之每鋤草一次澆糞水一次至於三即秀矣黍稷齊民要術美田之法緑豆為上小豆胡麻次之悉皆五六月䆊種七八月犁掩殺之為春穀田其美與蠶矢熟糞同又糞種黍地耕熟蓋下糠農桑通訣苗糞江淮迤北用為常法麥齊民要術冬雨雪止以物輒藺麥上掩其土勿令從風飛去後雪復如此則麥耐旱多實農政全書麥宜有雨諺云要喫麵泥裹纒春雨更宜農書凡麥田既種以後糞無可施為計在先也陜洛間憂蟲食者或以砒霜拌種子南方所用惟炊燼也蕎麥汜勝之書蕎麥立秋前後漫撒種即以灰糞蓋之淤䕃具圖說農舟划船野航大車下澤車推車杴杷竹杷杷畚箕帚瓢柸農舟圖說農家之舟質朴渾堅任載芻糧異於漁釣者流也當收糞時即以此舟遍歷城市虛往實歸尤上農所亟划船圖說划船集韻划謂撥進也其船制短小輕便易於撥進别名秧塌嘗見淮上瀕水及灣泊田土待冬春水涸耕過至夏初遇有淺漲所漫乃划此船就載宿浥稻種遍撒田間水內候水稍退種苗即出可收早稻乂江南春夏之間用此箝貯泥糞及積載秧束以往所佃之地若際水則以鍬棹撥至或隔陸地則引纜掣去泥中草上尤為順快水陸互用便於農事野航圖說野航田家小渡舟也或謂之舴艋村野之間水陸相間所在橋梁豈能畢備造此以便往來制頗朴陋廣才尋文凡所任載不煩人駕但於渡水兩旁維以竹草之索各倍其長過者掣索那抵彼岸或略具篙楫田農便之大車圖說大車考工記曰大車牝服二柯鄭𤣥謂平地任載之車詩無將大車論語大車無輗皆是也凡造車之制先以腳圓徑之髙為祖然後可視梯檻長廣得所制雖不等道路皆同軌也中原陸地任重適逺惟恃此車糞壤皆可載下澤車圖說下澤車田間任載車也古謂之箱詩曰乃求萬斯箱又皖彼牽牛不以服箱箱即此車也周禮車人行澤者反䡦又行澤者欲短轂則利轉今俗謂之板轂車其輪用厚闊板木相嵌斫成圓樣就留短轂無有輻也泥淖中易干行轉了不沾塞即周禮行澤車也蓋如車制而略但獨轅著地如犁托之狀上有望撅以擐牛挽槃索上下坡坂絶無軒輊之患推車圖說推車之制獨輪居中夾以兩轅而箱無板或盛四桶以載水或盛二簍以載糞或絡以繩亦載行李一人以系絡於肩而推之鳴鑾逐曲殊有步伐杴圖說杴臿屬但其首方濶柄無短拐此與鍬臿異也煆鐵為首謂之鐵杴最宜土切剡木為首謂之木杴可㩍穀物取灰取泥用之尤便方言鐵者名跳杴木者名杴部鐵刃杴竹揚杴圖說鐵刃杴裁割田間塍埂用之以泥糞者候泥將乾劃為方塊分布於田尤需此器以竹為之者謂之竹揚杴與揚籃少異揚去糠粃仍斂而積之惟竹杴輕且便也杷圖說杷鏤鏉器也方言云宋魏間謂之渠拏或謂之渠疏直柄橫首柄長四尺首闊一尺五寸列鑿方竅以齒為節夫畦畛之間鎪剔塊壤疏去瓦礫場圃之上摟聚麥禾擁積秸穗此益農之功也竹杷圖說竹杷場圃樵野間用之爬以㩍藁葉以疏糞壤有爬羅剔抉之功或執以拾糞其制稍密杷圖說杷無齒杷也所以平土壤聚榖物說文云無齒為杷禾譜字作戞周生烈曰夫忠蹇朝之杷杷正人國之掃篲秉杷執篲除凶掃穢國之福主之利也杷杷之為器也見於書傳至今不替其用為不負紀録矣畚圖說畚土籠也左傳樂喜陳畚梮注云畚簣籠集韻作畚晉書王猛少貧賤嘗鬻畚為事說文云畚􅀈屬又蒲器也所以盛種杜林以為竹筥揚雄以為蒲器然南方以蒲竹北方用荆桞或負土或盛物通用器也箕圖說簸箕有舌糞箕無舌曲禮注曰箕去棄物謂收糞也南方以竹為之或以木或以油皮紙直可盛水不漏北方多屈荆條為之記曰良弓之子必學為箕有以也夫帚圖說帚今作帚又謂之篲集韻云少康作箕帚其用有二一則編竹為之潔除室內制則扁短謂之條帚一則束篠為之擁掃庭院制則叢長謂之掃帚又有種生掃帚一科可作一帚謂之獨掃農家尤宜種之以備場圃間用也瓢杯圖說瓢杯剖瓢為之製為樽語稱瓢飲是也柸以挹水農家便之其損者以傾肥水亦積糞所必需也欽定授時通考卷三十五
