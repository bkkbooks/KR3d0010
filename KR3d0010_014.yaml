  text: 欽定四庫全書欽定授時通考卷十四
  hash: sha256:951cccfdcbb0b2f06343a6e78a1526e5ee09ee5666ae6e23a5fd4b0d98f3f719
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3d0010_WYG_014-1a, image: WYG0732/WYG0732-0173c.png}
body:
  text: 土宜田制圖説下農桑通訣田制篇器非農不作田非器不成周禮遂人凡治野以土宜教氓稼穡而後以時器勸氓命篇之義遵所自也夫禹别九州其田壤之法固多不同而稷教五穀則樹藝之方亦隨以異故皆以人力器用所成者書之各有科等用列諸篇之右田制各圖説區田圍田架田匱田梯田塗田沙田圃田農桑通訣按舊説區田地一畝濶一十五步每步五尺計七十五尺每一行占地一尺五寸該分五十行長一十六步計八十尺每行一尺五寸該分五十四行長濶相乘通二千七百區空一行種於所種行內隔一區種一區除隔空外可種六百七十五區每區深一尺用熟糞一升與區土相和布穀勻覆以手按實令土種相著苗出看稀稠存留鋤不厭頻旱則澆灌結子時鋤土深壅其根以防大風搖擺古人依此布種每區收穀一斗每畝可收六十六石今人學種可減半計徐光啓曰當考古今度量又參考泛勝之書及務本書謂湯有七年之旱伊尹作為區田教民糞種負水澆稼諸山陵傾阪及田丘城上皆可為之其區當於間時旋旋掘下正月種春大麥二三月種山藥芋子三四月種粟及大小豆八月種二麥豌豆節次為之不可貪多夫儉豐不常天之道也故君子貴思患而預防之如嚮年壬辰戊戌飢歉之際但依此法種之皆免飢殍此已試之明效也竊謂古人區種之法本為禦旱濟時如山郡地土高仰歲歲如此種藝則可常熟惟近家瀕水為上其種不必牛犁但鍬钁墾斸又便貧難大率一家五口可種一畝已自足食家口多者隨數增加男子兼作婦人童稚量力分工定為課業各務精勤若糞治得法沃灌以時人力既到則地利自饒雖遇災不能損耗用省而功倍田少而收多全家歲計指期可必實救貧之捷法備荒之要務也農政全書按賈思協曰區田以糞氣為美非必須良田也諸山陵近邑高危傾阪及丘城上皆可為區田區田不耕旁地庶盡地力凡區種不先治地便荒地為之以畝為率今一畝之地長十八丈廣四丈八尺當橫分十八丈作十五町町間分為十四道以通人行道廣一尺五寸町皆廣一尺五寸長四丈八尺尺直橫鑒町作溝溝一尺深亦一尺積穰於溝間相去亦一尺嘗悉以一尺地積穰不相受令𢎞作二尺地以積穰種禾黍於溝間夾溝為兩行去溝兩邊各二寸半中央相去五寸旁行相去亦五寸一溝容四十四株一畝合萬五千七百五十株種禾黍令上有一寸土不可令過一寸亦不可令減一寸凡區種麥令相去二寸一行一溝容五十二株一畝凡四萬五千五百五十株麥上土令厚二寸凡區種大豆令相去一尺二寸一溝容九株一畝凡六千四百八十株禾一斗有五萬一千餘粒黍亦少此少訐大豆一斗一萬五千餘粒區種荏令相去三尺胡麻相去一尺區種天旱常溉之一畝常收百斛上農夫區方深各六寸間相去九寸一畝三千七百區一日作千區區種粟二十粒美糞一升合土和之畝用種二升秋收區别三升粟畝收百斛丁男長女治十畝十畝收千石歲食三十六石支二十六年中農夫區方九寸深六寸相去二尺一畝千二十七區用種一升收粟五十一石一日作三百區下農夫區方九寸深六寸相去二尺一畝五百六十七區用種六升收二十八石一日作二百區諺曰頃不比畝善謂多惡不如少善也區中草生茇之區間草以剗剗之若以鋤鋤苗長不能耘之者以􅧉鐮比地刈其草薉又兗州刺史劉仁之昔在洛陽於宅田以七十步之地域為區田收粟三十六石然則一畝之收有過百石矣少地之家所宜遵用也徐光啓曰區收一斗畝六十六石即區田一畝可食二十許人矣蓋古今斗斛絶異周禮食一豆肉飲一豆酒中人之食也孔明每食不過數升而仲達以為食少事煩若如今斗則中人豈能頓盡孔明數升已自不少而廉頗五斗得無太多計如今之畝若斗則每畝可收數石可食兩人以下耳見文學張𢎞言有糞壅法即今常種稻田亦可得穀畝二十許斛也近年中州撫院督民鑿井灌田竊意遠水之地自應種旱穀若鑿井以為水田此令民終歲􅀈􅀈也若云救旱穀則炎天燥土一井所灌其潤幾何必須教民為區田家各二三畝以上一家糞肥多在其中遇旱則汲井溉之此外田畝聽人自種旱穀則豐年可以兩全即遇大旱而區田所得亦足免於飢窘比於廣種無收效相遠矣圍田築土作圍以繞田也蓋江淮之間地多藪澤或瀕水不時淹沒妨於耕種其有力之家度視地形築土作堤環而不斷內容頃畝千百皆為稼地後值諸將屯戌因令兵衆分工起土亦倣此制故官民異屬復有墟田謂疊為墟岸捍護外水與此相類雖有水旱皆可救禦凡一熟餘不惟本境足食又可贍及鄰郡實近古之上法將來之永利架田架猶筏也亦名葑田集韻云葑菰草也葑亦作湗江東有葑田又淮東二廣皆有之東坡請開杭之西湖狀謂水涸草生漸成葑田徐光啓曰東坡所云與此異考之農書云若深水藪澤則有葑田以木縳為田丘浮繫水面以葑泥附木架上而種藝之其木架田丘隨水高下浮泛自不淹浸周禮所謂澤草所生種之芒種是也芒種有二義鄭玄謂有芒之種若今黃穋穀是也一謂待芒種節過乃種今人占候夏至小滿至芒種節則大水已過然後以黃穋穀種之於湖田然則有芒之種與芒種節候二義可並用也黃穋穀自初種以至收刈不過六七十日亦以避水溢之患竊謂架田附葑泥而種既無旱暵之災復有速收之效得置田之活法水鄉無地者宜效之匱田築土護田似圍而小面俱置瀽穴如此形制順置田段便於耕蒔若遇水荒田制既小堅築高峻外水難入內水則車之易涸淺浸處宜種黃穋稻周禮謂澤草生種之芒種黃穋稻是也黃穋稻自種至收不過六十日則熟以避水溢之患如水過澤草自生糝稗可收高涸處亦宜陸種諸物皆可濟飢此救水荒之上法一名壩水溉田亦曰壩田與此名同而實異梯田謂梯山為田也夫山多地少之處除磊石及峭壁例同不毛其餘所在土山下自橫麓上至危顛一體之間裁作重磴即可種藝如土石相半則必疊石相次包土成田又有山勢峻極不可展足播植之際人則傴僂蟻沿而上耨土而種躡坎而耘此山田不等自下登陟俱若梯磴故總曰梯田上有水源則可種秫粳如止陸種亦宜粟麥蓋田盡而地地盡而山山鄉細民必求墾佃猶勝禾稼其人力所至雨露所養不無少穫然力田至此未免艱食又復租稅隨之良可憫也塗田書云淮海惟揚州厥土惟塗泥夫低水種皆須塗泥然瀕海之地復有此等田法其潮水所泥沙泥積於島嶼或墊溺盤曲其頃畝多少不等上有鹹草叢生候有潮來漸惹塗泥初種水稗斥鹵既盡可為稼田所謂瀉斥鹵兮生稻梁盈邊海岸築壁或樹立樁橛以抵潮汛田邊開溝以注雨潦旱則灌溉謂之甜水溝其稼收比常田利可十倍民多以為永業又中土大河之側及淮灣水滙之地與所在陂澤之曲凡潢汙洄互壅積泥滓退皆成淤灘亦可種藝秋後泥乾地裂布掃麥種於上其所收比淤田之效也夫塗田淤田各因潮漲而成以地法觀之雖若不同其收穫之利則無異也沙田南方江淮間沙淤之田也或濱大江或峙中洲四圍蘆葦駢密以護堤岸其地常潤澤可保豐熟普為塍埂可種稻秫間為聚落可藝桑麻或中貫湖溝旱則平溉或傍繞大港潦則泄水所以無水旱之憂故勝他田也舊所謂坍江之田廢復不常故畝無常數稅無定額正謂此也宋乾道年間近習梁俊彥請稅沙田以助軍餉既施行矣時相葉顒奏曰沙田者乃江濱出沒之地水激於東則沙漲於西水激於西則沙復漲於東百姓隨沙漲之東西而田焉是未可以為常也其事遂寢時論是之圃田種蔬果之田也周禮以場圃任園地注曰圃樹果蓏之屬其田繚以垣墻或限以籬塹負郭之間但得十畝足贍數口若稍遠城市可倍添田數至半頃止結廬於上外周以桑課之蠶利內皆種蔬先足長生韭一二百畦時新菜二三十種惟務多取糞壤以為膏腴之本慮有天旱臨水為上否則量地鑿井以備灌溉地若稍廣又可兼種麻苧果穀等物比之常田歲利數倍此園夫之業可以代耕至於養素之士亦可托為隱所因得供贍又有宦遊家若無别墅就可棲身駐迹如漢陰之獨力灌畦河陽之間居鬻蔬亦何害於助道哉欽定授時通考卷十四
