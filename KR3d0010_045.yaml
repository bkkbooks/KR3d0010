body:
  text: 勸課官司詩豳風田畯至喜傳田畯田大夫也疏畯農夫也農夫田官也今之嗇夫是也此官選俊人主田謂之田畯典農之大夫謂之農夫以王者尤重農事知其爵為大夫也又周頌嗟嗟臣工敬爾在公王釐爾成來咨來茹嗟嗟保介維莫之春亦又何求如何新畬集注此戒農官之詩保介農官之副也又率時農夫播厥百穀駿發爾私終三十里亦服爾耕十千維耦疏率是主田之吏農夫使民耕田而種百穀農夫主田之吏也集注亦戒農官之詞蓋成王始置田官而嘗戒命之也周禮天官甸師下士二人掌帥其屬而耕耨王藉以時入之以共齍盛注郊外曰甸師長也其屬府史胥徒也又地官大司徒卿一人大司徒之職辨十有二壤之物而知其種以教稼穡樹藝又載師上士二人中士四人掌任土之法凡田不耕者出屋粟注空田者罰以三家之稅粟以共吉凶二服及喪器也疏夫三為屋罰以三夫之稅粟云吉凶二服及喪器是民自共用不可出官物故集此罰物為之又閭師中士二人任農以耕事凡庶民不耕者祭無盛注盛黍稷也又遂人中大夫二人以土宜教氓稼穡以興鋤利氓以時器勸氓以彊豫任氓注時器鑄作耒耜錢鎛之屬彊豫謂民有餘力復豫之田又遂師下大夫四人上士八人中士十有六人旅下士三十有二人各掌其遂之政令戒禁巡其稼穡而移用其民以救其時事注移用其民使轉相助救時急事也四時耕耨斂艾芟地之宜早晚不同而有天期地澤風雨之急又遂大夫每遂中大夫一人各掌其遂之政令以歲時稽其夫家之衆寡六畜田野辨其可任者與其可施舍者以教稼穡以稽功事令為邑者歲終則㑹政致事正歲簡稼器修稼政三歲大比則率其吏而興氓明其有功者屬其地治者凡為邑者以四達戒其功事而誅賞廢興之注功事九職之事所以為功業簡猶閲也興氓舉民賢者能者如六鄉之為興猶舉也又縣正每縣下大夫一人各掌其縣之政令徵比以頒田里以分職事趨其稼事而賞罰之又酇長每酇中士一人各掌其酇之政令以時校登其夫家比其衆寡若歲時簡器與有司數之凡歲時之戒令皆聽之趨其耕耨稽其女功注簡器簡稼器也有司遂大夫又里宰每里下士一人掌比其邑之多寡以歲時合耦于鋤以治稼穡趨其耕耨行其秩叙疏鋤助也謂合兩兩相佐助於里宰處云以治稼穡者謂治理其民使為春耕秋穡又草人下士四人掌土化之法又稻人上士二人中士四人下士八人掌稼下地又土訓中士二人下士四人掌道地圖以詔地事道地慝又廩人下大夫二人上士四人中士八人下士十有六人掌九穀之數又倉人中士四人下士八人掌粟入之藏又司稼下士八人巡野觀稼以年之上下出斂法疏觀稼謂秋熟時觀稼善惡禮記月令命有司發倉廩賜貧窮振乏絶命司空循行國邑周視原野修利隄防道達溝瀆開通道路母有障塞注溝瀆與道路皆不得不通所以除水潦便民事也又命野虞出行田原為天子勞農勸民母或失時命司徒循行縣鄙命農勉作毋休于都驅獸無害五穀毋大田獵又令告民出五種命農計耦耕事集說令典農之官告民出其所藏五穀之種計度耦耕之事耦二人相偶也穀梁傳私田稼不善則非吏注非責也吏田畯也言吏急民使不得營私田左傳九扈為九農正注扈有九種春扈鳻鶞夏扈竊𤣥秋扈竊藍冬扈竊黃棘扈竊丹行扈唶唶宵扈嘖嘖桑扈竊脂老扈鷃鷃以九扈為九農之號各隨其宜以教民事疏春扈鳻鶞相五土之宜趣民耕種夏扈竊𤣥趣民耘苗秋扈竊藍趣民收斂冬扈竊黃趣民蓋藏棘扈竊丹為果驅鳥行扈唶唶晝為民驅鳥宵扈嘖嘖夜為農驅獸桑扈竊脂為蠶驅雀老扈鷃鷃趣民收麥令不得晏起謂以扈為官還令依此諸扈而動作也管子立政水雖過度無害于五穀歲雖凶旱有所秎穫司空之事也相高下視肥墝觀地宜明詔期前後農夫以時均修焉使五穀桑麻皆安其處由田之事也行鄉里視宫室觀樹藝簡六畜以時均修焉勸勉百姓使力作無偷懷樂家室重去鄉里鄉師之事也韓詩外傳召伯出就蒸庶於阡陌隴畝之間而聽斷焉廬於樹下百姓大悅耕桑者倍力以勸於是歲大稔民給家足前漢書惠帝紀四年春正月舉民孝弟力田者復其身又高后紀元年二月初置孝弟力田二千石者一人注特置孝弟力田官而尊其秩欲以勸厲天下令各敦行本務又文帝紀十二年置三老孝弟力田常員又武帝紀元狩三年遣謁者勸種宿麥舉吏民能假貸貧民者以名聞又平帝紀元始四年置大司農部丞十三人人部一州勸農桑又百官公卿表治粟內史秦官景帝後元年更名大農令武帝太初元年更名大司農騪粟都尉軍官不常置農都尉武帝初置又食貨志春令民畢出在壄冬則畢入於邑春將出民里胥平旦坐于右孰鄰長坐於左孰畢出然後歸夕亦如之注里胥如今里吏也門側之堂曰孰坐於門側者督促勸之知其早晏防怠惰也又武帝末趙過為騪粟都尉能為代田一畝三甽歲代處故曰代田過使教田太常三輔大農置工巧奴與從事為作田器二千石遣令長三老力田及里父老善田者受田器學耕種養苗狀民或苦少牛無以趨澤故平都令光教過以人挽犁過奏光以為丞教民相與庸挽犁率多人者田日三十畝少者十三畝以故田多墾闢過試以離宫卒田其宫壖地課得穀皆多其旁田畝一斛以上令命家田三輔公田又教邊郡及居延城是後邊城河東𢎞農三輔太常民皆便代田用力少而得穀多又水衡少府太僕大農各置農官又藝文志農家者流蓋出于農稷之官播百穀勸耕桑以足衣食注汜勝之成帝時為議郎使教田三輔有好田者師之徙為御史又何武傳武為刺史行部入傳舍出記問墾田頃畝五穀美惡已乃見二千石以為常又黃霸傳霸為潁川太守務耕桑種樹畜養米鹽靡密初若煩碎霸精力能推行之又龔遂傳遂為渤海太守見齊俗奢侈好末技不田作乃躬率以儉約勸民務農桑令口種一樹榆百本䪥五十本葱一畦韭家二母彘五雞民有帶持刀劍者使賣劍買牛賣刀買犢春夏不得不趨田畝秋冬課收斂益畜果實蓤芡勞來循行郡中皆有畜積吏民皆富實又召信臣傳信臣為南陽太守好為民興利務在富之躬勸耕農出入阡陌止舍離鄉亭稀有安居時行視郡中水泉開通溝瀆起水門提閼凡數十處以廣溉灌歲歲增加多至三萬頃民得其利畜積有餘後漢書和帝紀永元十六年遣三府掾分行四州貧民無以耕者為雇犁牛直又禮儀志立春之日夜漏未盡五刻郡國縣道官下至斗食令史皆服青幘立春幡施土牛耕人於門外以示兆民正月令曰郡國守相勸民始耕又百官志凡郡國以春行所主縣勸民農桑救乏絶又邊郡置農都尉主屯田殖穀又卓茂傳茂遷密令天下大蝗獨不入密縣界督郵言之太守不信自出案行見乃服焉是時王莽秉政置大司農六部丞勸課農桑遷茂為京部丞密人老少皆流涕隨送又魯恭傳恭拜中牟令郡國螟傷稼不入中牟河南尹袁安聞之使仁恕掾肥親往廉之曰蟲不犯境此一異也永初元年代鮪為司徒又劉寬傳延熹八年徵拜尚書令遷南陽太守典歷三郡每行縣止息亭傳見父老慰以農里之言又杜詩傳詩拜成臯令再遷為沛郡都尉轉汝南都尉七年遷南陽太守修治陂池廣拓土田郡內比室殷足時人方於召信臣南陽為之語曰前有召父後有杜母又張堪傳堪拜漁陽太守開稻田八千餘頃勸民耕種以致殷富百姓歌曰桑無附枝麥穗兩岐張君為政樂不可支又秦彭傳建初元年遷山陽太守興起稻田數十頃每於農月親度頃畝分别肥脊差為三品各立文簿藏之鄉縣於是姦吏局蹐無所容詐三國魏志武帝紀建安元年募民屯田許下州郡例置田官所在積穀又國淵傳太祖欲廣置屯田使淵典其事淵屢陳益相土處民計民置吏明勸課之法五年中倉廪豐實競勸樂業又梁習傳建安十八年習表置屯田都尉領客六百夫於道次耕種菽粟又任峻傳太祖以峻為典農中郎將數年中所在積粟倉廪皆滿又蘇則傳則為金城太守親自教民耕種歲大豐收又杜畿傳畿拜河東太守課民畜㹀牛草馬下逮雞豚犬豕皆有章程百姓勸農家家豐實又倉慈傳太祖開募屯田於淮南以慈為綏集都尉遷燉煌太守抑挫權右撫恤孤貧甚得其理大族田地有餘而小民無立錐之土慈皆隨口割賦稍稍使復其本又王昶傳昶為洛陽典農時都畿樹木成林昶斫開荒萊勤勸百姓墾田特多晉書職官志郡國及縣農月皆隨所領户多少為差散吏為勸農又縣五百以上皆置鄉三千以上置二鄉五千以上置三鄉萬以上置四鄉鄉置嗇夫一人文獻通考典農中郎將典農都尉典農校尉並曹公置晉太始一年罷農官為郡縣後復有之晉書食貨志武帝泰始五年敕戒郡國計吏諸郡國守相令長務盡地力禁游食商販又泰始八年司徒石苞奏州郡農桑宜增掾屬令吏有所循行帝從之苞既明於勸課百姓安之文獻通考晉元帝課督農功二千石長吏以入穀多少為殿最其非宿衛要任皆宜赴農使軍各自佃作即以為廪晉書王宏傳宏為汲郡太守撫百姓如家耕桑樹藝屋宇阡陌莫不躬教示曲盡事宜文獻通考梁司農卿位視散騎常侍主農功倉廩陳因之後因有司農上士一人掌三農九穀稼穡之政令屬大司徒又勸農謁者梁武帝天監九年置屬司農魏書文成帝紀元年遣尚書伏真等三十人巡行州郡觀察墾殖田畝文獻通考魏太武帝令有司課畿內之人各列家别口數所種頃畝明立簿目所種於地首標姓名以辨播殖之功魏書食貨志天興初制定畿內田四方置八部帥以監之勸課農耕量校收入以為殿最隋書公孫景茂傳景茂為道州刺史好單騎巡人家閲視百姓産業有修理者於都㑹時乃褒揚稱述如有過惡隨即訓導而不彰也繇是人行義讓有無均通男子相助耕耘婦子相從紡績大村或數百户如一家之務又食貨志河清三年定令每歲春月各依鄉土早晚課入農桑自春及秋男二十五以上皆布田畝蠶桑之月婦女十五以上皆營蠶桑孟冬刺史聽審邦教之優劣定殿最之科品人有人力無牛或有牛無力者須令相便皆得納種使地無遺利人無游手焉文獻通考唐龍朔二年改司農為司稼咸亨初復舊卿一人少卿一人掌東耕供進耒耜及邦國倉儲之事領上林太倉鉤盾導官四署唐書百官志凡十道巡按以判官二人為佐務繁則有支使其三察農桑不勤又諸屯監一人從七品下丞一人從八品下掌營種屯田句㑹功課及畜産帳簿以水旱蝝蝗定課屯主勸率營農督斂地課又節度使兼支度營田招討經略使則有副使判官各一人支度使復有遣運判官巡官各一人歲以八月考其治否觀察使以豐稔為上考又田曹司田參軍事掌園宅口分永業及蔭田又上州司田參軍事一人從七品下中州司田參軍事一人正八品下下州司田參軍事一人從八品下五千人以上有副使一人萬人以上有營田副使一人又縣令掌導風化凡民田將授縣令給之文獻通考唐開元十有二年夏四月令兵部員外郎兼侍御史宇文融兼充勸農使巡按人邑安撫户口所在與官僚及百姓商量處分賦役差科於人非便者並量事處分續狀奏聞務令安輯勿使繁勞又上元二年諸州各置司田參軍一人主農事每縣各置田正二人於當縣揀明嫻田種者充務令勸課又寶應元年詔建巳月諸州刺史縣令及司田參軍令設法勸課令其耕種不得失時貧不能濟户仍方員處置量事借貸務令存立歲終巡案量其功效唐書食貨志唐開府軍以扞衝要因隙地置營田天下屯總九百九十二司農寺每屯三頃州鎮諸軍每屯五十頃水陸腴瘠播殖地宜與其功庸煩省收率之多少皆决於尚書省苑內屯以善農者為屯官屯副御史巡行蒞輪上地五十畝瘠地二十畝稻田八十畝則給牛一諸屯以地良薄與歲之豐凶為三等與民田歲穫多少以中熟為率有營則以兵若夫千人助收𨽻司農者歲三月卿少卿循行治不法者凡屯田收多者褒進之歲以仲春籍來歲頃畝州府軍鎮之遠近上兵部度便宜遣之開元二十五年詔屯官叙功以歲豐凶為上下鎮戍地可耕者人給十畝以供糧方春屯官巡行謫作不時者文獻通考唐令諸户以百户為里五里為鄉四家為鄰三家為保每里設正一人掌按比户口課殖農桑又唐考功之法有二十七最二十曰耕耨以時收穫成課為屯官之最唐書裴行儉傳子倩歷信州刺史勸民墾田二萬畝以治行賜紫金服又田仁會傳永徽中為平州刺史歲旱自暴以祈而雨大至穀遂登人歌曰父母育我兮田使君挺精誠兮上天聞中田致雨兮山出雲倉廩實兮禮義申願君常在兮不患貧又李惠登傳惠登拜刺史政清靜居二十年田畝闢户口日增人歌舞之節度使于岫狀其績詔加御史大夫升隋為上州又何易于傳易于為益昌令縣距州四十里刺史崔朴常乘春與賔屬泛舟出益昌旁民挽牽易于身引舟朴驚問狀易于曰方春百姓耕且蠶惟令不事可任其勞朴愧與賔客疾遣去五代史雜傳張全義為河南尹披荆棘勸耕殖躬載酒食勞民畎畝之間文獻通考宋太祖開基分命朝臣出守列郡號權知軍州事軍謂兵州謂民政焉其後文武官參為知州軍事二品以上及帶中書樞密院宣徽使職事稱判太守掌總理郡政宣布條教歲時勸課農桑旌别孝弟又建隆元年應天下諸縣除赤畿外有望緊上中下掌總治民政勸課農桑宋史太宗紀淳化五年九月遣使分行宋亳陳潁泗壽鄧蔡等州按行民田被水及種蒔不及者並蠲其租文獻通考至道元年六月詔州縣官吏勸民墾田之數悉書于印紙以俟旌賞二年以陳靖為勸農使按行陳許蔡潁襄鄧唐汝等州勸民墾田以大理寺皇甫選光祿寺丞何亮副之宋史真宗紀天禧四年九月分遣近臣張知白朝迥樂黃目等各舉常參官諸路轉運及勸農使文獻通考真宗置諸路提㸃刑獄公事以朝臣充始命屯田李拱為之副以武臣閣門祗候以上充天禧四年加勸農使俄改提㸃刑獄勸農使又以武臣為副使天聖嘉祐中罷熙寧十年復置勸課農桑又熙寧二年分遣諸路常平官使專領農田水利事應吏民能知土地種植之法陂塘墟垾堤堰溝洫之利害者皆得自言行之有效隨大小酬賞宋史徽宗紀政和元年夏四月立守令勸農黜陟法二年夏四月詔縣令以十二事勸農於境內躬行阡陌程督勤惰注一曰敦本業二曰興地力三曰戒游手四曰謹時候五曰戒茍簡六曰厚蓄積七曰備水旱八曰戒牽牛九曰置農器十曰廣栽植十一曰恤苖户十二曰無妄訟文獻通考宋南渡之後紹興十五年閏十一月司農簿宋朴請令守令以歲仲春出郊勞農遂為故事宋史食貨志太平興國中兩京諸路許民共推揀土地之宜明樹藝之法者一人縣補為農師令相視田畝肥瘠及五種所宜文獻通考宋制委户部長二左曹分按法曰農田掌農田及田訟務限奏豐稔驗水旱蟲蝗勸課農桑請佃地土令佐任滿賞罰繳奏諸州雨雪撿按災傷逃絶人户又初朝議置勸農之名然無職局天禧四年始詔諸路提㸃刑獄朝臣為勸農使使臣為副使所至取民籍視其差等不如式者懲革之勸恤農民以時耕墾招集逃散撿括稻稅凡農田事悉領焉金史章宗紀泰和三年六月遣官行視中都田禾水澤分數八年夏四月詔諭有司以苗稼方興宜速遣官分道巡行農事以備蟲蝻又宣宗紀興定四年秋七月詔參知政事李復亨為宣慰使御史中丞完顔伯嘉副之循行郡縣勸農元史世祖紀至元六年八月詔諸路勸課農桑命中書省采農桑事列為條目仍令提刑按察司與州縣官相風土之所宜講究可否别頒行之又至元七年二月立司農司以參知政事張文謙為卿設四道巡行勸農司閏十一月申明勸課農桑賞罰之法十二月改司農司為大司農司添設巡行勸農使副各四員以御史中丞孛羅兼大司農卿又張文謙傳文謙邢州沙河人至元七年拜大司農卿奏立諸道勸農司巡行勸課又董文用傳至元八年立司農司授山東東西道巡行勸農使文用巡行勸勵無間幽僻入登州境見其墾開有方以郡守移刺某為能作詩表異之於是列郡咸勸地利畢興五年之間政績為天下勸農使之最明史職官志户部尚書以樹藝課農官以蠲減賑貸均糴捕蝗之令憫災荒又方克勤授濟寧知府時始詔民墾荒閲三歲乃稅吏徵率不俟期民謂詔㫖不信輒棄去田復荒克勤與民約稅如期區田為九等以差等徵發吏不得為奸野以日闢視事三年一郡饒足又陳幼學授確山知縣墾萊田八百餘頃調繁中牟縣南荒地多茂草根深難墾令民投牒者必入草十斤未幾草盡得沃田數百頃悉以畀民有大澤積水占膏腴地二十餘里幼學疏為河者五十七為渠者百三十九俱引入小清河民大獲利遷湖州知府霪雨連月禾盡死幼學大舉荒政活饑民三十四萬有竒欽定授時通考卷四十五
