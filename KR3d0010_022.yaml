body:
  text: 穀種稻三直省志書新建縣食貨稻之屬占稻九十日占百日占百二十日占北風占大生占見秋紅占背塘占晚赤占齊頭占矮占柳占土黃占通仙占無名占毛占麻占白米秋占洞占救公饑團穀早尖穀早一丘水七十日早由風早百日早見秋早南早陜西早瀏陽早南陵穀小赤穀赤穀烏穀冷水秋早大禾大赤米黃尖嘴大禾大時禾七斗糙烏大禾硬藁占之外曰糯有百日糯鐵糯柳條糯倒藁糯赤粒糯油麻糯椎子糯金絲糯大糯馬牙糯紅殼秫虎皮秫奉新縣土産稻團穀早尖穀早救公饑隨犂歸七十日早百日早北風粘遲穀油紅穀大禾芒大禾代禾皆粳稻早糯烏糯白糯黃糯紅菱糯大糯皆釀酒糯靖安縣物産早占百日早油紅蘆花早油赤七月熟洞秥粽子糯麻糯九月熟槌糯冷水糯寒秥大禾糯十月熟武寧縣土産百日占晚赤占白米秋占洞占寒占雷州占救公饑君行早赤穀烏穀臨江早一丘水望暑白黃泥占尖穀冷水秋大禾紅殼糯白糯柳條糯稜子糯苦株糯烏節糯黃絲糯晚糯寧州土産大糯赤糯百日糯鐵腳糯柳條糯油麻糯金絲糯倒藁糯碓子糯馬牙糯百日秥北風秥百二十日秥九十日秥大生秥晚赤秥赤穀矮秥見秋紅秥北塘秥白米秥齊頭秥柳秥白米秋秥油紅秥秋秥小赤穀土黃秥無名秥南陵穀毛秥虎皮秫通山秥冷水秋大禾紅殼秫大赤米黃尖嘴烏大禾硬藁懶擔糞早大禾七斗糙麻秥洞秥髙安縣物産稻有團穀早尖穀早救公饑七十日早百日早秋風秥冷水秥遲穀大禾皆硬稻早糯烏糯白糯黃糯紅菱糯鐵腳糯交秋糯重陽糯遲糯大糯鴨腳糯皆釀酒上髙縣物産早穀有茆葉早五十工洗白早頓齊秥蘇州早童子秥撫州早紅米早白殼糯紅菱糯黃扁糯鐵腳糯晚穀有秋風秥吉安早黃泥早亂麻秥冬秥木子秥長鬚秥粳禾糯重陽糯燕口糯大禾糯柳條糯黑鬚糯紅殼糯白殼糯建昌縣物産稻粳之早者有望暑白救公饑刷帚早一丘水諸名秫之早者曰大糯有赤白二種粳之遲者有北風秥八月白烏穀芒穀之類秫之遲者有團糯粘糯荔枝糯之類又有晚秥稻晚糯稻之類則刈早稻而復植於早田者德化縣物産早穀有駝犂白留姑早王瓜早六十日九十日等名白穀有竹了秥蘆花白大白穀等名紅穀有鴨腳秈柳條赤等名晚稻米白而質膩種後晚生烏穀殼黑而多芒五月始種芒穀一名種穀有烏白二種糯穀有早紅糯殼糯黃金糯哽雞糯數種玉山縣物産早穡白穀紅穀早糯白糯紅糯晚糯晚禾建陽早紅米糯鉛山縣物産救公先三朝齊竹了早白沙早髙腳紅紅根早北風秥夏桃紅三有禾五家傅猴孫糯上早糯八月糯重陽糯胡椒糯苦株糯師姑糯響穀糯羊鬚糯秈粟糯興安縣物産早穡有六十日早上早等名白穀有竹了白沙紅根早桐子白福德早等名紅穀有桃紅竹雞斑早紅遲紅晚穀俗呼大禾穀糯穀有早糯赤糯重陽糯白穀糯徽州糯連根糯等名東鄉縣物産早秥救公饑夏桃紅白沙秥池州鮮倉背笑下馬看竹丫秥冬秥早糯晚糯白穀糯青絲糯焦紅糯南豐縣物産五十日秥六十日秥淮禾早大穀早白沙早龍牙秥黃土秥江東秥百日秥清流秥華山秥溫涼秥茅裏秥八月白鐵腳粳光頭藜缺芒藜細穀藜三有糯響鈴糯重陽糯虎皮糯椒子糯老人糯長腰糯鹽夫糯光頭糯廣昌縣物産六十日粘白沙早光冬冬秥茅裏秥紫糯重陽糯虎皮糯瀘溪縣物産稻之屬有早黏有遲黏有糯稻名目不一其早黏春社日前後浸種立夏前後蒔立秋而熟最早者名五十日黏次名六十日黏他種青黃不接而此兩種先可食田家種以繼不足俗云救公饑是也餘一名桅上早有紅白二種七十日始熟白沙黏三月種六月熟米圓而大江東早耐寒多粒大穀黏細穀黏二種以粒大小異名耳百日黏福德黏八月白晚稻而早熟者米香白可貴至若李廣黏石城黏龍牙黏流水黏池州黏冬黏鐵腳黏俱色朱而堅九月始熟稻之黏者重陽糯應節候而熟故名黏禾稻與早禾同熟即五十日糯也關公糯殼紅而米白老人糯芒刺長而穀赤石冊糯早晚有異名目不一萬安縣土産江州禾冷水白百日黏紅穀晚穀烏嘴大稻晚糯秋風糯青鐵墜白糯黃鐵墜鐵腳撑綿子白羊蹄糯硬木香大秋風油麻糯光骨蕾柳條糯清江縣土産稻最早熟者名救公饑色白味香甘有團穀早雲南早諸種孚甲薄而米堅好有秋風黏蓑衣黏諸種色赤甲厚有金穀黏田之低窪者種之六月插秧九月方熟有晚稻至冬乃熟色白粒長種之者少而性則冷又有早糯有晚糯宜春縣物産黏穀紅白二種有五十日黏六十日黏八十日黏百日黏大黏鬚黏晚穀贑州早團穀早旱穀糯穀有早糯晚糯白殼糯燕口糯鴨婆糯矮腳糯重陽糯子紅糯萍鄉縣物産鬚秥圃秥安福秥團穀秥百日秥紅米秥白穀秥贑州早救公早務原早大米禾大紅禾百日糯重陽糯北京糯紅鬚糯粽子糯黃絲糯烏鴉糯雩都縣物産早稻大穀早晚稻八月白冷水白葉底黏早糯重陽糯大糯蝦鬚糯安逺縣物産早禾八月黏火燒黏大禾早糯黏子糯蝦鬚糯晚糯寧都縣物産六旬黃七旬熟日日赤八月白留外婆救公饑師姑早和尚光倉背笑大穀早鼠牙早矮腳紅金包銀響玎璫石上珠廬江早茅裏苫重陽糯瑞金縣物産稻晚稻早稻早糯大糯金包銀水珠糯湖廣糯陜西糯羊鬚糯龍南縣物産六月早七月早八月早晚稻早糯黏糯重陽糯大冬糯大禾穀定南縣物産火燒黏六月熟重陽糯黏糯早糯蒲圻縣物産稻之類有洗白早金環早陵江早無名早無名遲麻赤穀馬鬃糯柳條糯蝦鬚糯咸寧縣物産山黃稻望水白留姑早銀包金黃姑早竹雞斑花黏六十日早香稻折稻大粒穀和尚苗銀朱苗烏鬚苗馬牙糯見缸消細子糯六月零糯下馬看浮糟糯蝦鬚糯橘皮黃漢陽府物産稻屬有洗耙早拖犂回一丘水七十日