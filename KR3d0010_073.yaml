body:
  text: 蠶事飼養詩經衛風降觀于桑傳桑木名可食蠶者又爰求柔桑箋柔桑稚桑也蠶始生宜稚桑禮記祭義桑於公桑風戾以食之疏戾乾也凌早採桑必帶露而濕蠶性惡濕故乾而食之會稽志春蠶多四眠餘蠶皆三眠越人謂蠶眠為幼謂之幼一幼二幼三幼大蠶經蠶有三光白光飼食青光厚飼皮皺為飢黃光以漸減食齊民要術蠶小不宜見露氣採桑著懷中令暖然後切之每飼蠶卷窗帷飼訖還下蠶見明則食食多則生長蠶書蠶生明日桑或柘葉風戾以食之寸二十分晝夜五食九日不食一日一夜謂之初眠又七日再眠如初既食葉寸十分晝夜六食又七日三眠如再又七日若五日不食二日為之大眠食半葉晝夜八食又三日健食乃食全葉畫夜十食不三日遂繭凡眠已初食布葉勿擲擲則蠶驚毋食二葉合璧事類蠶俯曰眠眠時不食桑柘經一晝夜而脫殼蠶有三眠者有四眠者黃省曽曰蠶之自蟻而三眠也俱用切葉其飼火蠶也必勤葉盡則飼毋使蠶吞火氣而病農桑輯要深秋桑葉未黃多廣收拾爆乾搗碎于無煙火處收頓春蠶眠後用又臘八日新水浸菉豆薄攤曬乾又淨淘白米控乾以上二物皆隂處收頓以備大眠起用拌葉飼蠶又初飼蠶法宜旋切細葉微篩不住頻飼一時辰約飼四頓一晝夜通飼四十八頓又蠶必晝夜飼若頓數多者蠶必疾老少者遲老二十五日老一箔可得絲二十五兩二十八日老得絲二十兩若月餘或四十日老一箔止得絲十餘兩飼蠶者慎勿貪眠以懶為纍每飼蠶後再宜繞箔看葉要均勻若值隂雨天寒比及飼蠶先用乾桑柴或去葉稈草一把點火繞箔照過逼出寒濕之氣然後飼之則蠶不生病一眠候十分眠才可住食至十分起才可投食若八九分起便投葉飼之直到老不齊又多損失停眠至大眠蠶欲向眠時見黃光便住食抬食直候起齊慢飼葉宜薄摻厚則多傷慢食之病蓋因生蠶得食力須勤飼最忌露水濕葉并雨濕葉飼之則多生病又大眠起燠宜頻除蠶宜頻飼或正南風起將門窗簾薦放下此際不宜抬解箔上布蠶須相去一指布蠶一箇取臘月所藏菉豆水微浸生芽曬乾磨作細麵臘月所藏白米蒸熟作粉亦可第四頓收食拌葉勻飼解蠶熱毒絲多易繅堅韌有色如葉少去秋所收桑葉再搗為末水灑新葉微濕摻末拌勻接闕飼蠶又萵苣亦可接士農必用飼蟻之法當宿澆其桑旋摘其葉宿澆則多液旋摘則不乾利刃以細切之疏篩以薄布之非利刃則無液非細切則蓋蠶非篩則不勻非勻則偏食然葉渣之微液不能久存少頃之間即成枯涸故須旋切而頻篩也第一日飼一復時可至四十九頓第二日飼至三十頓葉微加厚第三日飼至二十餘頓又稍加厚宜極暖極暗大凡初蟻宜暗眠起宜微明向食宜明又初飼蟻法宜旋切細葉微篩一時辰約飼四頓一晝夜通飼四十九頓或三十六頓懶者頗疑煩冗豫曰新蟻止食桑葉脂脈若頓數不多譬如乳嬰兒小時失乳後必羸弱病生蟻初生須隔夜採東南枝肥葉甕中另頓旋取細切又抽飼斷眠法蠶向眠時量黃白分數抽減所飼之葉漸次細切薄摻頻飼候十分黃光不問隂晴早夜急須抬過抬時住食起齊時投食此為抽飼斷眠之法謂抽減眠蠶之葉不致覆壓専飼未眠之蠶使之速眠不惟眠起得齊且無葉罨燠熱之病農桑通訣蠶有十體寒熱飢飽稀密眠起緊慢緊慢謂飼時緊慢也又蠶忌食濕葉忌食熱葉蠶初生忌煎煿魚肉忌側近舂搗忌敲擊有聲之物未滿月産婦不宜作蠶母忌帶酒人將桑飼蠶及抬解布蠶蠶生至老大忌煙薰忌放刀于竈上箔上竈前忌熱湯潑灰忌産婦孝子入家忌燒皮毛亂髮忌酒醋五辛羶魚麝香等物忌當日迎風窗忌西照日忌正熱著猛風暴寒忌正寒忽令過熱忌不潔人入蠶室蠶室忌臭穢又擘黑法第三日帶燠揭蟻欵手擘如小碁子大布于中箔可盈滿漸漸加葉飼早晴可捲東窗苫及當日背風窗漸漸變色隨色加減食至純黃則不飼是謂頭眠抬頭一復時可六頓次日可漸漸加葉可開捲窗一半初向黃時宜極暖眠定宜暖起齊宜微暖抬停眠起齊頭食宜薄一復時可四頓次日可漸加葉或開捲窗初向黃時宜暖眠定宜微暖起齊宜溫抬大眠起齊投食一復時可三頓第一頓宜薄但可覆白第二頓比前又薄第三頓如第一頓此三頓食如不短則其蠶至老食慢次日可漸加葉可全開捲窗照窗初向黃時宜微暖眠定宜溫齊宜涼正食時每飼後可挾蠶筐繞槌巡之但見有斑黎處即摻葉補合拌米粉至第七八頓食後于己午間將切下葉攤在箔上新水灑拌極勻待少時納羅白粉子拌令極勻每葉一筐用新水一升粉子四兩如無止用新葉一筐可飼一箔拌桑麵切葉灑拌新水極勻羅桑麵拌勻于大眠後間飼三五頓蠶欲老飼之宜細薄宜頻宜微暖又蠶有不齊頻飼以督其後者使之相及而各取其齊蠶眠不齊病原于初今既然矣當從此治之如于純黃之中雜見其退白而向黃者是與純黃不相逺頻飼以督之則猶得相及頻飼則可逺其眠如己見純黃又多青白此與純黃既逺雖飼之頻亦莫及蓋蠶之變色為之小小其眠則絶食退膚為變之大也為蛹為蛾則變之尤大而至于化也凡至純黃則結嘴不食而眠如人之大病周身之血氣一為變換一晝夜不大則眠為得所今以青白者尚多飼而亂之動而蹂之則眠而失其所矣比其青白者變黃而向眠則此已通眠而動起動起之初欲得少食亦如人之病起欲得少食以接氣血也以後者方眠勒其食而不投以困以餓又必待後者動起而飼之多病少絲端為可惜故蠶經云眠起不齊絲減少良謂此也又蠶初生色黑漸漸加食三日後漸變白則向食宜少加厚變青則正食宜益加厚復變白則慢食宜少減變黃則短食宜愈減純黃則停食謂之正眠眠起自黃而白自白而青自青復白自白而黃又一眠也每眠例如此候之以加減食凡葉不可帶雨露及風日所乾或浥臭者食之令生諸病常收三日葉以備霖雨則蠶常不食濕葉且不失飢採葉歸必待熱氣退乃與食蠶時晝夜之間大槩亦分四時朝暮類春秋正晝如夏夜深如冬寒暄不一雖有熟火各合斟酌多少不宜一例自初生至兩眠正要溫暖蠶母須著單衣以體為測身寒則蠶必寒便添熟火身熱則蠶亦熱約量去火一眠之後但天氣晴明己午之間時暫揭窗簾以通風日南風則捲北窗北風則捲南窗放入倒瀏風氣則不傷蠶大眠起後飼三頓剪開紙窗透風日必不頓驚生病大眠後捲簾薦去紙窗天氣炎熱門口置甕旋添新水以生涼氣如遇風雨夜涼即下簾薦農政全書蠶火類也宜用火以養之用火之法須别作一爐令可抬舁出入蠶既鋪葉餵矣待其循葉而上乃始進火火須任燒令熟以穀灰蓋之即不暴烈生焰才食了即退火鋪葉然後進火每每如此則蠶無傷火之患若蠶飢而進火即傷火若才鋪葉蠶猶在葉下未能循援葉上而進火即下為糞剃所蒸上為葉蔽遂有熟蒸之病又士農必用曰正熱猛著寒便禁口不食即用鏊子盛無煙熱牛糞火用乂托火鏊于槌箔下往來辟去寒氣蠶自食葉蠶槌圖説禮季春之月具曲植植即槌也務本直言云穀雨日竪槌立木四莖各過梁柱之髙夫槌隨屋每間竪之其立木外傍刻如鋸齒而深各莖挂桑皮繞繩四角按二長椽椽上平鋪葦箔梢下槌之凡槌十懸中間離九寸以居擡飼之間皆可移之上下農桑直説云每槌上中下間鋪三箔上承塵埃下隔濕潤中備分擡蠶筐圖説蠶筐古承幣帛竹器今用育蠶其名亦同蓋形制相類圓而稍長淺而有緣適可居蠶蟻及蠶分居時用之閣以竹架易於擡飼梅聖俞前蠶箔詩云相與為蠶曲還殊作筠筐北簇南筐皆為蠶具然彼此論之若南蠶大時用箔北蠶小時用筐庶得其宜兩不偏也蠶盤圖説蠶盤盛蠶器也秦觀蠶書云種變方尺及乎將繭乃方尺四織萑葦範以蒼筤竹長七尺廣五尺以為筐懸筐中間九寸凡槌十懸以居食蠶今呼為盤又有以木為框以疏簟為底架以木槌用與上同蠶架圖説蠶架擱蠶盤筐具也以細枋四莖竪之髙可八九尺上下以竹通作橫桄十層層每皆擱養蠶盤筐隨其大小蓋筐用小架盤用大架此南方盤筐有架猶北方椽箔之有槌也蠶網圖説蠶網擡蠶具也結繩為之如魚網之制其長短廣狹視蠶盤大小制之沃以漆油則光緊難壞貫以網索則維持多便至蠶可替時先布網於上然後灑桑蠶聞葉香皆穿網眼上食候蠶上葉齊手共提網移置别盤遺餘拾去比之手替省力過倍南蠶多用此法北方蠶小時亦用之蠶杓圖説蠶杓集韻杓作勺量器也周禮勺容一升所以㪺酒説文曰杓音標今云酌物為杓以勺從木姑與今同此作蠶杓斫木刳之首如大棒柄長三尺許如盤蠶空隙或飼葉偏疏則必持此送之以補其處至蠶老歸簇或稀密不倫亦用均布倘有不及復以竹接其柄此南俗蠶法北方箔簇頗大臂指間有不能周遍亦冝假此以便其事幸毋忽諸桑几圖説桑几狀如髙凳平穿二桄就作登級几柔桑不勝梯附須登几上乃易得葉齊民要術云採桑必須髙几士農必用云擔負髙几繞樹上下今蠶家採彼女桑兹為便器桑梯圖説梯木階也夫桑之稚者用几採擇其桑之髙者須梯剝砍梯若不長未免攀附勞條不還則鳩腳多亂樛枝折垂則乳液旁出必欲趁手髙下隨意去留須梯長可也齊明要術云採桑必須長梯梯不長則髙枝折正謂此也桑斧圖説桑斧砍斧也其斧銎匾而刃濶與樵斧不同詩謂蠶月條桑取彼斧戕以伐逺揚士農必用云轉身運斧條葉偃落於外即謂以伐逺揚也凡斧所剝砍不煩再刃者為上至遇枯枝徑節不能拒遏又為上如剛而不缺利而不乏尤為上也然用斧有法必須轉腕回刃向上砍之枝查既順津脈不出則葉必復茂故農語云斧頭自有一倍葉以此知科砍之利勝惟在夫善用斧之效也桑籠圖説籠大篝也即今謂有係筐也桑者便於㩦挈古樂府云羅敷善採桑採桑城南頭青絲為籠繩桂枝為籠鉤今南方桑籠頗大以擔負之尤便於用桑鉤圖説桑鉤採桑具也凡桑者欲得逺揚枝葉引近就摘故用鉤木以代臂指攀援之勞昔者親蠶皆用筐鉤採桑唐上元初獲定國寶十三內有採桑鉤一以此知古之採桑皆用鉤也然北俗伐桑而少採南人採桑而少伐嵗嵗伐之則樹木易衰久久採之則枝條多結欲南北隨宜採砍互用則桑斧桑鉤各有所施故兩及之劖刀圖説劖刀剝桑刀也刀長尺餘濶約二寸木柄一握南人砍桑劖桑俱用此刀北人砍桑用斧劖桑用鐮鐮刃雖利終非本器殆不若劖刀之輕且順也若南人砍桑用斧北人劖桑用刀去短就長兩為便也切刀圖説切刀斷桑刀也蠶蟻時用小刀蠶漸大時用大刀或用漫􅀈蠶多者又用兩端有柄長刀切之名曰懶刀懶刀如皮匠刮刀長三尺許兩端有短木柄以手按刀半裁半切斷葉雲積可供十筐先於長凳上鋪葉勻厚人於其上俯按此刀左右切之一刃之利可桑百箔桑砧圖説爾雅曰砧謂之榩郭璞曰砧木礩也砧從石榩從木即木砧也砧截木為碢圓形竪理切物乃不拒刃此北方蠶小時用刀切葉砧上或用几或用夾南方蠶無大小切桑俱用砧也徐光啓曰木砧傷葉吳中用麥秸造者為佳桑夾圖説桑夾挾桑具也用木礩上仰置叉股髙可二三尺於上順置􅀈刀在手茹葉右手按刃切之此夾之小者若蠶多之家乃用長椽二莖駢竪壁前中寬尺許乃實納桑葉髙可及丈人則躡梯上之兩足後踏屋壁以胸前向壓住兩手緊按長刃向下裁切此桑夾之大者南方切葉惟用刀砧不識此桑具故特厯説庶倣用之以廣其利欽定授時通考卷七十三
