body:
  text: 土宜水利二續文獻通考明洪武八年十月濬涇陽縣洪渠堰涇陽屬西安府其堰嵗久壅塞不通灌溉遂命長興侯耿炳文督工濬之涇陽髙陵等五縣之田大獲其利明史沐英傳英在滇百務具舉簡守令課農桑較屯田增損以為賞罰墾田至百萬餘畝滇池隘浚而廣之無復水患子春在鎮七年大修屯政闢田三十餘萬畝鑿鐵池河灌宜良涸田數萬畝民復業者五千餘户為立祠祀之續文獻通考永樂元年四月設溧水縣廣通鎮閘壩置閘官一員直隸和州吏目張良興言州麻澧二湖之田約五萬餘頃唐宋時俱係熟田比嵗間有耕者輒為水淹祈自本州至含山縣界增築墟埂三十餘里以防水潦從之又宣德四年五月福建福清縣民奏縣之光賢里官民田百餘頃舊隄六百餘丈以障海水因隄壞田荒永樂中縣民嘗奏請築隄工部移文令農隙用工至今有司未嘗興築民不得耕上命工部責有司修築因諭尚書吳中曰陂池隄堰民賴其利外無賢守令舉其政爾宜申飭郡縣務及時修濬慢令者罪之大政紀成化元年十月巡撫陜西都御史項忠開龍首鄭白二渠功成關中水泉斥鹵宋有龍首渠嵗久湮廢居民病之忠奏開之渠餘三十里涇陽鄭白渠亦久廢奏募工疏通於平地則度勢髙卑而穿渠遇巖石則聚火鎔鑠而穿竇不二年而成名曰廣惠渠凡灌田七萬頃人懷其惠立生祠祀之夏原吉奏治蘇松水利疏臣按浙西諸郡蘇松最居下流太湖綿亘數百里受納杭湖宣歙諸州溪澗之水散注澱山等湖以入三江頃為浦港湮塞滙流漲溢傷害苗稼拯治之法要在浚滌吳淞江諸浦導其壅塞以入於海但吳淞江延袤二百五十餘里廣一百五十餘丈西接太湖東通大海前代屢塞不能經久自下江長橋至夏駕浦約一百二十餘里雖云通流多有狹淺之處自夏駕浦抵上海縣南蹌浦口一百三十餘里湖沙漸漲已成平陸欲即開浚工費浩大且灧沙遊泥浮泛動蕩難以施工今得劉家港即古婁江徑通大海常熟之白茆港徑入大江皆繫大川水流迅急宜浚吳淞江南北兩岸安亭等浦港以引太湖諸水入劉家白茆二港使直注江海又松江大黃浦乃通吳淞江要道今下流壅遏難流傍有范家濱至南蹌浦口可徑通海宜浚令深濶上接大黃浦以達泖湖之水此即禹貢三江入海之迹每年水涸之時修築墟岸以禦暴流如此則事可成於民為便也吳巖興水利以充國賦疏竊惟國家財賦多出於東南而東南財賦皆資於水利近年以來東南地方下流淤塞圍岸傾頽臣等悉心推究東南氷利之切要者二事一疏濬下流嘗考浙西諸郡蘇松最居下流太湖綿亘數百餘里受納天目諸山溪澗之水由三江以入於海是太湖者諸郡之水所瀦而三江又太湖之所泄也禹貢所謂三江既入震澤底定是已若下流淤湮衆水泛溢淹沒禾稼為害匪輕為今之計要在隨其源委相其利害酌量便宜為之區處如白茅港七浦塘劉家河此蘇州東北泄水之大川如吳淞江大黃浦此蘇州南北交境與松江南境泄水之大川而吳淞之南北與白茆諸港又各有支渠引上流諸水以歸於其中而並入於海此所謂源委者也就其中論之蘇州之七浦塘劉家河松江之大黃浦並皆深濶通利無阻惟白茅一港自𢎞治七年疏濬之後今二十五六年吳淞一江自天順間疏濬之後今六十有餘年聞之白茆入海之處潮沙壅積勢若丘阜吳淞雖名一江僅如溝洫潮回水落雖舟楫亦艱於行其旁渠港亦多湮塞下流既壅上流曷歸加以霪霖能不泛溢此其利害之可見者也今能濬白茆一港使之通利如七浦劉家河則蘇州東北之水有所歸而不積矣濬吳淞一江使之通利如大黃浦則吳淞南北兩界之水有所歸而不積矣一修築圍岸臣嘗考之浙西之田髙下不等隨其多寡各自成圍逺近相望吳越以來素稱膏腴宋儒范仲淹嘗論於朝曰江南圍田中有渠外有門閘旱則開閘引江水之利潦則閉閘拒江水之害旱潦不及為農美利雖然圍田全仗乎岸塍岸塍常利於修築修築堅完旱潦有備否則反是臣願自今以後每嵗於農隙之時治農府州縣官督令田主佃户各將圍田取土修築水漲則専增其裏水涸則仍築其外務令髙濶堅固可通往來隨其旱潦而車戽出入如此先事有備而田皆成熟矣徐貫治東南水患疏竊見嘉湖常鎮水之上流蘇松水之下流上流不浚無以開其源下流不浚無以導其歸於是督同委官人等將蘇州府吳江長橋一帶菱蘆之地疏濬深濶導引太湖之水散入澱山陽城昆承等湖又開吳淞江并大石趙屯等浦泄澱山湖水由吳淞江以達於海開白茆港并白魚洪鮎魚口等處泄昆承湖水以注於江又開七浦鹽鐵等塘泄陽湖水以達於海下流疏通不復壅塞開湖水之漊涇泄天目諸山之水自西南入於太湖開常州之百瀆泄荆溪之水自西北入於太湖又開各斗門以泄運河之水由江隂以入江上流疏通不復湮滯人無墊溺之憂嵗有豐稔之望葉紳請治水以防災荒疏竊惟直隸之蘇松常浙江之杭嘉湖約其土地雖無一省之多計其賦稅實當天下之半况他郡所輸猶多雜賦六郡所出純為粳稻誠國家之基本生民之命􅍺不可一日而不經理也若水道不通為六郡農田之害所係亦重矣夫天目諸山之水瀦為太湖而六郡環乎其外太湖之水又由江湖以入於海聞昔人於溧陽則為堰壩以遏其衝於常州則穿港瀆以分其勢於蘇松則開江河以導其流惟是入海之處潮汐往來易為湮塞故前代或置開江之卒或置撩淺之夫以時浚治僅免水患歷嵗既久其法廢弛遂致諸湖巨浸壅遏其中江河故道淤漲於外土民利其膏腴或堰而為田築而為圃是以淹沒田疇漂淪廬舍固其所也方𢎞治四年一潦逮五年復潦今嵗大水視昔尤甚伏祈聖明思念東南大害於廷臣中選差有才力通曉水利者一二員授以節鉞重以委任會同撫按講求民瘼設法賑恤俟民困稍蘇然後指定地方分投相視何地為山水入湖之衝何港為太湖入海之道自源徂流一一講究相與度其經費量其事期然後大加浚治使下流得以宣泄然當此飢饉之際欲興大役若非任事者處之得其道則民力不堪不能不重困也大政紀嘉靖三年大理卿鄭嶽上言臣勘事陜西道經畿內河南諸處見大行西倚潼關東繞懷衛北極燕薊其水皆東注南入於海盧易滹沱流離漳洺衛沁洛瀍其大也宜督居民瀕水開田築隄防以障泛溢鑿溝渠以通灌溉其平疇曠土無川澤之利者量鑿洫澮或為陂塘下通水泉之出上收雨潦之入每府增置通判一人以江左諳水利者居之督率郡邑専理農事則數年之後皆為沃壤而水旱不足憂矣章下户部侍郎王承裕覆議從之乃命各撫按官會同二司隨宜舉行胡體乾修舉水利疏禹之治水有三導川入海泄之以去害也瀦水為澤蓄之以興利也濬畎及川乂之以播種也蓋髙山大原衆水雜流必有一低下處為之壑如人之有腹臟焉彭蠡震澤是也旁溪别緒萬理朝宗必有一合流入海之川為之泄如人之有腸胃焉江淮河漢是也今以三吳水利觀之有宣歙杭湖數郡之山原而導之得所入然後有太湖之汪洋有太湖環五百里之容受而泄之得所歸然後有蘇松常五郡之財賦漫衍浸注為蕩為漾縱橫分合為濱為塘於是江浦領之徑帶迂回而放之海此吳中形勢之大都亦諸方言水利之準則矣禹貢載治水成功則曰九川滌源九澤既陂四海會同而盡力溝洫乃則壤隩宅中事也故總敘其事不過始之以決九川距四海終之以濬畎澮距川今列水利事宜一曰禁淤湖蕩廣水利之翕聚也二曰疏經河通其幹也三曰開溝渠濬其支也四曰築隄岸防川澤之泛濫固田間之圍攔也并山鄉積水沿海護塘共為六條所採昔人之議俱江南治水方略引以為例他可類推云呂光洵修水利以保財賦重地疏臣聞善治病者必攻其本善救患者必探其源水利之興廢乃吳民利病之源也臣嘗巡歷各該地方相視髙下詢問父老頗得其説輒敢條為五事仰俟裁擇一曰廣疏濬以備瀦泄二曰修墟岸以固橫流三曰復板閘以防淤澱四曰量緩急以處工費五曰専委任以責成功何謂廣疏濬以備瀦泄蓋三吳之地古稱澤國其西南翕受太湖陽城諸水形勢尤卑而東北際海岡隴之地視西南特髙大抵髙者其田常苦旱卑者其田常苦潦昔人治之髙下曲盡其制既於下流之地疏為塘浦導諸河之水由北以入於江由東以入於海而又畝引江潮流行於岡隴之外是以瀦泄有法而水旱皆不為患近年以來縱浦黃塘多湮塞不治惟二江頗通一曰黃浦二曰劉家河太湖諸水源多而勢盛二江不足以泄之而岡隴支河又多壅絶無以資灌溉於是上下俱病而嵗常告災臣據各府所報河浦湮塞之處在下流者以百計而其大者六七所在上流者亦以百計而其大者十餘所治之之法當自要害者始宜先治澱山等處一帶茭蘆之地導引太湖之水散入陽城昆承三泖等湖又開吳淞江并大石趙屯等浦泄澱山之水以達於海濬白茆港并鮎魚口等處泄昆承之水以注於江開七浦鹽鐵等塘泄陽城之水以達於江又導田間之水悉入於水浦小浦之水悉入於大浦使流者皆有所歸而瀦者皆有所泄則下流之地治而潦無所憂矣乃濬臧村等港以溉金壇濬澡港等河以溉武進濬艾祁通波以溉青浦濬顧浦吳塘以溉嘉定濬大瓦等浦以溉崑山之東濬許浦等塘以溉常熟之北凡岡隴支河湮塞不治者皆濬之深廣使復其舊則上流之地亦治而旱無所憂矣此三吳水利之大經也何謂修墟岸以固橫流蓋四府最居東南下流而蘇松又居常鎮下流其水易瀦而難泄雖導河濬浦引注於江海而每遇秋霖泛漲風濤相薄則河浦之水逆行田間衝齧為患宋轉運使王純臣常令蘇湖作田塍禦水民甚便之而司農丞郟亶亦云治河以治田為本其説多可採行臣嘗詢故老以為二三十年以前民間足食無事嵗時得因其餘力營治墟岸而田益完美近年空乏勤苦救死不贍不暇修繕故田墟漸壞而嵗多水災是吳下之田以墟岸為存亡也失今不治則坍沒日甚而農桑日蹙矣宜令民間如往年故事每嵗農隙各出其力以治墟岸墟岸髙則田自固雖有霖潦不能為害且足以制諸湖之水不得漫行而咸歸於河浦則河浦之水自髙於江江之水自髙於海不待決泄自然湍流而岡隴之地亦因江水稍髙又得畝引以資灌溉蓋不但利於低田而已何謂復板閘以防淤澱河浦之水皆自平原流入江海水漫而潮急沙隨浪湧其勢易淤不數年即沮洳成陸嵗修之則不勝其費昔人論其便宜去江海十餘里或七八里夾流而置閘時其啓閉以禦淤沙嵗旱則閉而不啓以蓄其流嵗潦則啓而不閉以泄其流閘有三利蓋謂此也而宋臣郟僑亦云錢氏循漢唐遺事自松江而東至於海又導海而北至於揚子江又沿江而西至於江隂界一河一浦大者皆有閘小者皆有堰臣按郡志蓋與僑之言頗合然多湮廢惟常熟縣福山閘尚存正德間巡按御史謝琛議復吳塘等閘而不果即今金壇縣議復莊家閘江隂縣議復桃花閘嘉定縣議於橫瀝練塘等處各置閘如舊臣訪諸故老皆以為便以是推之凡河浦入海之地皆宜置閘然後可以久而不壅蓋不獨數處為然也何謂量緩急以處工費夫經略得宜則事易集施為有漸則民不煩往嵗凡有興作皆併役於一時是以功未成而財食告匱為今之計宜令所在有司檢勘某水利害大某水利害小某水至急某水差緩其最大而急者則今嵗修之次者明年修之次者又明年修之則興作有序民不知勞而其工費之資亦可以先時而集矣但方今嵗時荒歉公私俱絀既不可加斂於民而內帑又不敢望乞將見年未完錢糧係解大户侵欺者督令有司設法清追數十餘萬兩存留在官略倣宋臣范仲淹以官糧募飢民修水利之法行令有司查審應賑人數籍其老病無力者為一等壯健有力者為一等無力者日給米一升聽其自便有力者日給米三升就令開濬通將前項官銀及賑濟錢糧一體通融給散各令造册查考則官不徒費民不徒勞所謂一舉而兩利者也丘濬大學衍義補井田之制雖不可行而溝洫之制則不可廢今京畿之地地勢平衍率多汙下一有數日之雨即便淹沒不必霖潦之久輒有害稼之苦農夫終嵗勤苦盻盻然而望此麥禾以為一年衣食之計賦役之需垂成而不得者多矣良可憫也北方地經霜雪不甚懼旱惟水潦之是懼十嵗之間旱者什一二而潦恆至六七也為今之計莫若少倣遂人之制每郡以境中河水為主又隨地勢各為大溝廣一丈以上者以達於大河又各隨地勢各開小溝廣四五尺以上者以達於大溝又各隨地勢開細溝廣二三尺以上者委曲以達於小溝其大溝則官府為之小溝則合有田者共為之細溝則人各自為於其田每嵗二月以後官府遣人督其開挑而又時常巡視不使淤塞如此則旬月以上之雨下流盈溢或未必得其消涸若夫旬日之間縱有霖雨亦不能為害矣朝廷於此又遣治水之官疏通大河使無壅滯又於夾河兩岸築為長堤髙一二丈計則衆溝之水皆有所歸不至溢出而田禾無淹沒之苦生民享收成之利矣是亦王政之端也嚴訥水利墟圖論今天下以墾田當司農巨供者蘇松為最蘇松介在湖海厥土塗泥利害以水墟岸者所以隄水而田即周禮稻人匠人所掌塗防者也田甚下濕岸則陡立如城河循其外而中田焉禾在田雖芃芃起矣而河流猶出其上舟行者蓋俯而窺也岸或咫隙莫禦而田且沛澤矣其田之最髙阜去水逺而水不及溉者則又終古舄鹵田在上下壤之間土厚而水深則號膏腴以其得水蓄泄可為旱潦備而所能蓄泄者以有墟岸耳嵗苦旱則河之水續桔橰而上以入於田河不龜坼田不乏溉嵗苦潦則戽水出於河而岸障之雖勞人力不盡待命於天自三江道湮疏濬失宜恆雨注積而無從尾閭也水襄於岸寸許而膏腴汨為巨浸不能與下濕者論良瘠矣廟堂深為國計軫念民瘼枚擇憲臣専董水政林公承簡書之重躬橇載之勤周爰咨諏尋源徹委決壅導積滌茹存匯塘之浦之涇之港之溪之閘之以為宣節之大計者既殫厥心矣條縷其目知墟岸為切務而修築焉卑令髙缺令補廢令興薄令培而厚浮令杵而堅規畫既定先有司而躬督察之凡閲嵗而次第告成故老相傳以為正德庚午嘉靖辛酉才淫雨匝旦漂沒無算今浹旬彌月而民幸不悉魚者先見之豫圖而成勞之隂賜也張瀚淮鳳墾田議往年出守廬陽巡行阡陌勸民開塘蓄水又嘗往來鳳淮兩府之間一望數十里皆紅蓼黃茅大抵多不耕之地間有耕者又苦天澤不時非旱則潦蓋雨多則橫潦瀰漫無所歸束無雨則任其焦萎救濟無所資夫水土不平耕作無所施力必先度量地勢髙下跟尋水所歸宿濬河以受溝之水開溝渠以受橫潦之水官道之水設大堤以通行偏小之村亦增卑以成徑惟欲於道傍多開溝洫使接續通流水由地中行不占平地又度低窪處所多開塘堰以瀦蓄之夏潦之時水歸溝塘亢旱之日可資灌溉髙者麥低者稻平衍地多則木棉桑枲皆得隨宜樹藝土本膏腴地無遺利遍野皆衣食之資矣圖書編論浚渠築堰禹之治水不過曰決九川距四海濬畎澮距川而已而天下之言智者莫踰焉何哉洪範五行水曰潤下知水之性潤下則知禹之治水矣是故先決九川以導於海使水之大者有所歸次濬畎澮以距於川使水之小者有所泄此所以九州同四隩宅而萬世永利也商之衰也五行之官世失其業周人始命遂人十夫為溝百夫為洫千夫為澮萬夫為川而溝洫之制始立稻人以瀦蓄水以防止水以溝蕩水以遂均水以列舍水以澮瀉水而溝洫之制益詳至於匠人氏又辨其深廣之度而通其蓄泄之宜其法可謂盡善矣然周人豈夷陵谷而為之哉亦不過因其自然之利而修伯禹之故而已周之衰也遂人稻人匠人之官又世失其業列國之君皆自利以病人國暴秦之興又廢溝洫開阡陌而水利廢矣是故孫叔敖起芍陂則楚受其惠文翁穿溲口則蜀以富饒史起鑿漳水於魏則鄴傍有稻粱之詠鄭國導涇水於秦則谷口有禾黍之謡許景山復蕭何之故堰則興元之荒瘠復為膏腴趙尚寬修召信臣之故渠則南陽之㵼鹵變為沃壤之數君子者孰非因其自然之利而修其已然之法哉謂之得周官之遺意亦可也國家司空有總職水利有専官省以督之府府以督之縣而縣之陂塘墟堰又莫不有長重以憲臣之稽察皆以愍惠元元而興水利也然遇水旱民輒告病者是必有其故矣此無他陂塘墟堰之長皆失其業而郡縣長吏又莫之省憂故也欲修周官之職加疏濬之功通灌溉之利絶漂沒之患甚盛心也愚者以為周官之職不可卒復而溝洫之遺意尚亦可尋周官曰溝必因水勢防必因地勢蓋溝以導水不因水勢則其流易壅防以止水不因地勢則其土易壞為今之計莫若申飭郡縣長吏督率陂塘墟堰之長察水勢之曲直原地勢之髙卑可堤則堤可決則決因陂塘墟堰之舊加疏濬築塞之功而又嚴侵占之禁明考課之法則灌溉之利興漂沒之患免矣雖然賈讓有言曰立國居民疆理土地必遺川澤之利分度水勢所不及大川無防小水得入陂障卑下以為墟澤使秋水多得所休息左右遊波寬衍而不迫此誠萬世水利之上䇿又古之畿甸數百畝之田必溝數十溝之水必川數大川之水必就窪而為湖溝因水潄防因水淫淵因水罄折而向於渠為湖為渚也湖渚多而天下西北之水不助河而為暴然後數千里中原之地可樹藝而農唐虞之盛由五事宣八風雨㿩時若無崩竭淫溢之災無轉漕輸將之費而封濬分畫功臻於永賴此謂本務又伊洛水田議河南本有水利可以興水田古之人蓋嘗為之矣如太陽三渠去府城南十里而近分洛水以溉田者宣利渠去永寧縣南三里而近又有新興萬箱等渠皆亦分洛水以溉田者伊陽渠去嵩縣東十里而近永寧渠去嵩縣南六里而近又有鳴臯順陽濟民等渠皆分伊水以溉田者而盧氏縣之東澗水則嘗析而為渠流入於城中以灌蔬圃者也可以灌蔬圃則亦可以灌田興水田之利也至於伊洛瀍澗載在經史流經府城外夏秋間每泛溢而東者寧不可以隄障之車戽而耕種為水田乎蓋其人習於種旱穀憚於胼手胝足之勞而又不諳埂塍之制不慣於栽插耘耔之方術也聞永寧嵩縣亦已有水田其民頗稱饒裕豫方欲募召能作水田之人於蘇松及永寧嵩縣之已有成效者以分教乎凡伊洛三川之民興粳稻之利於此一方而惜乎不久即遷官去入閩矣洛民每苦糧重疏欲與汝南道丈地而均糧格不行倘水田之利成每畝可收穀三四鍾其每畝所上糧一斗比之蘇松猶為輕則即不盡水田以水田與不水田相參錯為輕重數年以後嵗稍多收民間亦或稍致饒裕如永寧嵩縣也糧則稍重於輸將不為難豫請輕折而不得欲興水田以利斯民而以轉官去不獲遂心又以為大夫士亦安於故常而不樂為此也且著為議以告後來者又江西水利議江西列郡為州者一為縣者七十有二陂塘無慮數萬有竒以興一方之水利宜大有益於民事者乃今修濬方新而旋復壅決所在控告者月無虛牘而民事無補矣推原其故則以溝洫久廢互相因循莫為修舉曰富強自為封殖也曰貧瘠苦於資計也曰勢分而衆心易偷也曰利巨而當事易撼也又其大者江湍湖匯勢易毁齧而平豐等處一決輒數百丈彭蠡四際一漲率為巨浸膏腴汙萊人謀無措也且職水利者奉上官之檄至捉里胥以支應致使旱乾水溢待命於天或者歸諸氣數適然委之無可奈何焉非民之利也昔唐韋丹為江西觀察築隄捍江為陂塘五百餘所溉田萬有二千頃功德被於八州兹江右之地當當時故趾彼既築以利民若此况於數百載之後求其故智安得藉口於杜亞先事之無功而並棄賈讓之下䇿乎是故在髙原宜鑿池引水以資其利在下隰宜築隄開港以殺其勢門閘不復修舉壩堰之䇿猶可行也民力宜恤三時務農之後亦可勞也専利之禁必嚴而曲防者有罪議貸之令必申而惰事者無赦擇賢吏焉専其委任俾利建百年勿惜一時之費計安萬姓勿恤一人之讟如是而水利不興未之見矣滇南水利䇿滇南水利於天下猶之彈丸黑子也然而滇之人非穀不養榖非農不入農非水利不殖夫曲靖之水洱海之旱患之久矣而未聞有治之者不重也曲靖之水前未有也蓋諸山源水合流南出東則東山西則真峯山束焉中為草場舊稱荒海水至以通流水去以牧馬既而馬廢不牧地聽開墾稍稍築圍然未甚也近十嵗間則悉核而征之於是起圍遍於荒海而水之所委無幾矣乃始嵗嵗患潦而民之黃糧軍之屯糧胥病矣及水之盛則或決圍而圍田亦病矣夫其所為病如此治而愈之非難也而有不能者蓋有二焉官不能捐稍入之利而武辨豪右窟穴其間者倡為成功之説忍而不能去奈何其以小利害大事也謂宜博詢利害即不盡除猶當先其甚者去之官減其額嵗嵗稍除期以水不為災而止可矣故曰審計為急也洱海之旱非他也梁王山之水分流而下者故皆有壩蓄之諸甸今略已湮廢而青海周官海之流亦罔瀦蓄以故一遇恆㿩赤地千里而莫之救也夫陂塘蓄泄前人經營以為水計慮者甚悉也其始之稍隳以補苴易矣則廢而任之以至於大壞而有司者猶莫以為意避擅興之嫌偷恬靜之譽需秩滿遷次則去之耳後來繼今者又復盡然非課之章程厲以誅賞此病不除故曰課功為急也雖然滇之水利非獨此也鄧川之龍泉勢將齧川永昌之疊水河每患淤塞其他源委當講者亦多矣欽定授時通考卷十六
