body:
  text: 蠶事分箔齊民要術蠶眠常須三箔中箔上安蠶上下空置下箔障土氣上箔防塵埃務本新書蠶初生即要涼快以陳稈草作蓐勿用麥秸一日一擡失擡多生白醭擡蠶必衆手疾擡若箕內堆聚多時蠶身有汗後必病損漸漸隨擡減耗縱有老者簇內多作薄皮蠶沙冝頻除不除則久而發熱熱氣熏蒸後多白殭每擡之後箔上蠶冝稀布稠則強者得食弱者不得食必繞箔遊走又風氣不通忽遇倉卒開門暗值賊風後多紅殭布蠶須要手輕不髙從髙摻下遞相擊撞蠶多不旺已後簇內懶老翁赤蛹是也農桑要旨底箔須鋪二領蠶蟻生後每日髙捲出一領曬至日斜復布於生蠶箔底明日又將底箔撤出曬曝如前番覆鋪使受自然陽和之氣停眠起食後然後撤去如蠶有白殭是小時隂氣蒸損天晴急用簸箕三四具轉蠶中庭使日氣煦照擡一箔則復布一箔得日氣則盡解矣野語云蠶燠乾松者其蠶無病蠶燠成片濕潤白積者蠶為有病速冝擡解如正可擡却遇隂雨風冷則不敢擡用茅草細切如豆每一箔可用一斗或二升勻撒蠶上上再摻葉移時蠶因食葉沿上茅草能隔燠沙天晴再擡如無茅草稈草次之士農必用一箔蓐上下蟻三兩蠶至老可分三十箔每蟻一錢可老蠶一箔也係長一丈濶二尺之箔如箔小可減蟻下蟻多則蠶稠為後患也養蠶過三十箔者可更加下蟻箔養蠶少者用筐可也又擘黑法第三日己午時間於别槌上安三箔微帶燠薄揭蟻欵手擘如小碁子布於中箔擡頭眠别槌上布四箔薄帶沙燠揭蠶分如大碁子大布滿中二箔飽食分如小錢大布滿三箔擡停眠分如小錢微大布滿六箔飽食蠶可撥可摻不須分揭可布滿十二箔擡大眠分如折二錢大布滿二十五箔眠齊落蓐可分至三十箔分擡之便惟在頻欵稀勻使不致先濕損傷也蠶滋多必須分之沙燠厚必須擡之失分則不勝稠疊失擡則不勝蒸濕故須頻蠶者柔軟之物不禁觸㺯小而分之猶能愛護大而擡之莫能顧惜久堆亂積逺擲髙拋生病損傷實由於此故冝安欵而稀勻也桑蠶直説四眠蠶别是一種與養春蠶同但第三眠止擡開十五箔擡飽食二十箔大眠擡三十箔農桑通訣每槌上下鋪三箔上承塵埃下隔濕潤鋪砌碎稈草於上中箔以備分擡用細切搗軟稈草勻鋪為蓐黏成一片鋪蓐上安蠶農政全書黃省曽曰其替擡也用粳礱之灰摻焉則蠶體快而無疾或布網而替擡蠶箔圖説蠶箔曲薄承蠶具也禮具曲植曲即箔也周勃以織薄曲為生顔師古注云葦簿為曲北方養蠶者多農家宅院後或園圃間多種萑葦以為箔材秋後芟取皆能自織方可四丈以二椽棧之懸於槌上至蠶分擡去蓐時取其舒卷易用南方萑葦甚多農家尤冝用之以廣蠶事蠶椽圖説蠶掾架蠶箔木也或用竹長一丈二尺皆以二莖為偶控於槌上以架蠶箔須直而輕者為上久不蠧者又為上入簇農書簇箔冝以杉木解枋長六尺濶三尺以箭竹作馬眼槅插茅踈密得中復以無葉竹篠縱橫搭之又簇背鋪以蘆箔而以篾透背面縛之即蠶可駐足無跌墜之患且其中深穩稠密旋旋放蠶其上初略欹斜以俟其糞盡微以熟灰火溫之待入網漸漸加火不冝中輟稍冷即遊絲亦止繅之即斷絶多煮爛作絮不能一緒抽盡矣齊民要術蠶老值雨則壞繭宜於屋裏簇之薄布薪於箔上散蠶訖又薄以薪覆之一槌得安十箔又法以大蓬蒿為薪散蠶令遍懸之於梁柱或垂繩鈎戈梟爪龍牙上下數重所在皆得懸訖薪下微生炭火以暖之得暖則作速傷寒則作遲數入候看熱則去火蓬蒿生涼無鬱浥之憂死蠶旋墜無汚繭之患沙䇿不住無瘢䀶之疵鬱浥則難練繭汚則絲散瘢痕則無用蓬嵩簇亦良其外簇者晚遇天寒則全不作繭用火易練而絲明白曝死者雖白而漕脆膁練長衣著幾將倍矣甚者虛實失嵗功堅脆懸絶資生要理安可不知哉務本新書簇蠶地宜髙平內宜通風勻布柴草布蠶宜稀密則熱熱則繭難成絲亦難繅東北位並養六畜處樹下坑上糞惡流水之地並不得簇士農必用治簇之方惟在乾暖使內無寒濕蠶欲老可簇地盤燒令極乾除掃灰淨於上置簇又簇中繭病有六一簇汚二落簇三遊走四變赤蛹五變殭六黑色汚簇之病蠶老食葉不淨其葉蒸濕帶葉入簇故繭亦濕潤此為簇汚其餘五病皆地濕天寒所致韓氏直説安圓簇於髙阜處打成簇腳一簇可六箔蠶十分中有九分老者宜少摻葉就箔上用簸箕般去宜欵手摻於簇上務令稀勻上復覆蒿梢或豆秸復摻蠶如前至三箔覆梢倒根在上自後蠶可近上摻至六箔覆蒿令簇圓上用箔圍苫繳簇頂如亭子樣至晚又用苫將簇從下繳至上苫相接日出髙時捲去至晚復繳三日外繭成不用馬頭簇亦依上苫繳柴薪要廣簇又玲瓏中間宜架起蠶多者宜馬頭簇放腳宜南北又曬簇上蠶後第三日辰已時間開苫箔日曬至未時復苫蓋如前如當日過熱上榰單箔遮日色又翻簇上蠶時被雨霑濕雨才止才晴即選一簇地盤不以成繭不成繭翻騰遷移别簇封苫如前小雨則不須但可曝曬又一法臨簇有雨只於蠶屋中木槌下地面上安簇開門忩使透風氣早夜或隂雨變寒則閉門忩添牛糞火比翻簇之法又為妙也又一法槌箔上虛撒蒿槌周圍簇梢與蒿箔苫為之蠶自作繭猶勝於雨中簇也又十蠶九老方可就箔上撥蠶入簇如是則無簇汚蒸熱之患繭必早作而多絲黃省曽曰簇以稻草為之殺疏之必潔則不牽絲乃握而束之厚籍以所殺疏之草殼可以禦地濕可以承墜蠶乃以握許登之勿覆以紙至次日少以稻稈摻焉以屬其所綴之未成者勿用菜萁善絆擾而薄繭七日而摘半月而蛾生凡蠶色之青也為老之候其在簇而有雷則以退紙覆之以護其畏農桑通訣南方例皆屋簇北方例皆外簇然南簇在屋以其蠶少易辨多則不任北方蠶多露簇率多損壓壅閼南北簇法俱未得中今有善蠶者一説南北之間蠶少疏開窗户屋簇之則可蠶多選於院內構長春草厦內制蠶簇周以木架平鋪蒿梢布蠶於上用席箔圍護自無簇病實良策也農政全書蓬蒿簇勝今簇逺甚而人不用之何故簇地盤是北法南方正值梅天萬難作此所以皆須屋內簇定須著火團簇圖説簇用蒿梢叢柴苫席等也凡作簇先立簇心用長椽五莖上撮一處繫定外以蘆箔繳合是為簇心仍周圍勺竪蒿梢布蠶簇訖復用箔圍及苫繳簇頂如圓亭比此團簇也馬頭簇圖説馬頭長簇兩頭植柱中架橫梁兩傍以細椽相搭為簇心餘如常法此橫簇皆北方蠶簇法也嘗見南方蠶簇止就屋內蠶盤上布短草簇之人既省力蠶亦無損又按南方蠶書云簇箔以杉木解枋長六尺濶三尺以箭竹作馬眼槅插茅踈密得中復以竹篠縱橫搭之簇背鋪以蘆箔而竹篾透背面縛之此皆南簇較之上文北簇則蠶有多少故簇有大小難易之不同也然嘗論之南北簇法俱未得中何哉夫南簇蠶少規制狹小殆若戲技故獲利亦薄北簇雖大其弊頗多蒿薪積疊不無覆壓之患風雨浸浥亦有翻倒之虞復外內寒燠之不勻或髙下稀密之易所以致簇病內生繭少皆出此故習俗既久未能遽革今聞善蠶者約量本家育蠶多少選於院內空地就添椽木苫草等物作連脊厦屋尋常别用至蠶老時置簇於內隨其短長先搆簇心空直如洞就地握成長槽隨宜濶狹旁可人行以備火患外則用以層架隨層卧布蒿梢以均蠶居既畢用重箔圍之若蠶少屋多疏開窗户就內簇之亦可如此則上有覆庇下無濕潤架既寬平蠶乃自若又總簇用火便于照料南北之間去短就長制此良法宜皆用之則始終無慊矣擇繭齊民要術收取種繭必取居簇中者近上則絲薄近下則子不生農書下箔即急剝去繭衣免致蒸壞如多即以鹽藏之蛾乃不出且絲柔韌潤澤也藏繭之法先曬繭令燥埋大甕地上甕中先鋪竹簀次以大桐葉覆之乃鋪繭一重以十斤為率摻鹽二兩上又以桐葉平鋪如此重重隔之以至滿甕然後密蓋以泥封之務本新書養蠶之法繭種為先今時摘繭一槩併堆箔上或因繅絲不及有蛾出者便就出種罨壓熏蒸因熱而生決無完好其母病則子病誠由此也今後繭種開簇時須擇近上向陽或在苫草上者此乃強良好繭另摘出於通風涼房內淨箔上一一單排日數既足其蛾自生免熏罨鑽延之苦又繭宜併手忙擇涼處薄攤蛾自遲出免使抽繅相逼黃省曽曰繭長而瑩白者細絲之繭大而晦色青蔥者粗絲之繭皆撏去其蒙戎之衣其內潰而漬濕者謂之隂繭及薄而雜者綿之繭可為粗絲不可以經日經日則絲爛而難抽不可以焚香焚香則蛆穴而難抽大者謂之粗工韓氏直説蠶成繭硬紋理粗者必繅快此等繭可以蒸餾繅冷盆絲其繭薄紋理細者必繅不快不宜蒸餾此宜繅熱盆絲也其蒸餾之法用籠三扇用軟草札一圈加於釡口以籠兩扇坐於上其籠不以大小籠內勻鋪繭厚三四指許頻於繭上以手背試之如手不禁熱可取去底扇續添一扇在上亦不要蒸得過了過了則軟了絲頭亦不要蒸得不及不及則蛾必鑽了如手背不禁熱恰得合宜於蠶房槌箔上從頭合籠內繭在上用手微撥動如箔上繭滿打起更攤一箔候冷定上用細柳梢微覆其繭只於當日却要蒸盡如蒸不盡來日必定蛾出農桑通訣為繭多不及繅故即以鹽藏之蛾乃不出此南方淹繭法用甕頗多嘗讀北方農桑直説云生繭即繅為上如人手不及殺繭慢慢繅者殺繭法有三一曰日曬二曰鹽浥三曰籠蒸籠蒸最好人多不解日曬損繭鹽浥甕藏者穩農政全書鹽著於繭到底浥濕今人只於甕中藏繭另用紙或箬或荷葉包鹽一二兩置繭上亦可但只須甕口密封不走氣耳此必鹽泥乃可繭甕圖説繭甕藏繭器也為繭多繅不及稍遲則蛾穿繭出故藏之以緩蛾變古詩云盤中水晶鹽井上梧桐葉陶器固泥封窖繭過旬浹正謂此也繭籠圖説以鹽泥藏繭終憂浥濕置繭於籠蒸之蛾自不出有一般快釡湯內用鹽二兩油一兩令所蒸繭不致乾了絲頭如鍋小繭多油鹽旋入欽定授時通考卷七十四
