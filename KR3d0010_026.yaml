body:
  text: 穀種麥黑龍江麥雀麥燕麥蕎麥詩鄘風爰采麥矣沫之北矣集傳麥穀名秋種夏熟者大全白虎通曰麥金也金旺而生火旺而死周頌貽我來牟帝命率育傳牟麥率用也注牟字書作牟音同或作􅓿孟子云􅓿大麥也廣雅云麳小麥牟大麥也疏孟子趙岐注云牟大麥也禮記王制庶人夏薦麥麥以魚集注麥與黍皆南方之穀故配以魚與豚皆隂物也月令仲秋之月乃勸種麥無或失時其有失時行罪無疑注麥者接絶續乏之穀尤宜重之疏前年秋穀至夏絶盡後年秋穀夏時未登是其絶也夏時人民糧食缺短是其乏也麥乃夏時而熟是接其絶續其乏也周禮天官食醫凡㑹膳食之宜鴈宜麥正義鴈味甘平大麥味酸而溫小麥味甘微寒氣味相成訂義鴈陽也麥秋種而夏熟得陽氣為多與鴈相宜夏官職方氏正東曰青州其穀宜稻麥尚書大傳秋昏虛星中可以種麥春秋說題辭麥之為言殖也寢生觸凍而不息精射刺直故麥含芒事且立也春秋佐助期麥神名福習孝經援神契黑墳宜黍麥大戴禮記三月祈麥實麥實者五穀之先見者故急祈而祀之也又九月鞠華而樹麥時之急也淮南子濟水通和而宜麥說文麥金也金王而生火王而死麥芒穀秋種厚薶故謂之麥從來有穗者從久牟周所受來牟也一麥二縫象其芒刺之形天所來也麧堅麥也䵀小麥屑核也䴾磨麥也􅀈麥核息也十斤為三斗從麥啻聲䵄煮麥也麮麥甘鬻也䅌麥莖也廣志􅀈麥似大麥出凉州旋麥三月種八月熟出西方赤小麥赤而肥出鄭縣有半夏小麥有秀芒大麥有黑穬麥齊民要術爾雅曰大麥牟小麥麳廣志曰鹵水麥其實大麥形有縫稅麥似大麥出凉州旋麥三月種八月熟出西方赤小麥赤而肥出鄭縣語曰湖豬肉鄭稀熟山提小麥至粘弱以貢御有半夏小麥有秃芒大麥有黑積麥陶隱居本草云大麥為五穀長即今稞麥也一名牟麥似穬麥惟無皮耳穬麥此是今馬食者然則大穬二麥種别名異而世人以為一物誤矣按世有落麥者秃芒是也又有春種穬麥也雜隂陽書大麥生於杏二百日秀秀後五十日成麥生於亥壯於邜長於辰老於巳死於午惡於戌忌於子丑小麥生於桃二百一十日秀秀後六十日成忌與大麥同蟲食杏者麥貴種樹書小麥忌戌大麥忌子又臘日種麥及豆來年必熟麥苗盛時須使人縱牧於其間令稍實則其收倍多麥屬陽故宜乾原稻屬隂故宜水澤又小麥不過冬大麥不過年又麥最宜雪諺云冬無雪麥不結爾雅翼麥者接絶續乏之穀夏之時舊穀已絶新穀未登民於此時乏食而麥最先熟故以為重董仲舒曰春秋於他穀不書至於麥禾則書之以此見聖人於五穀最重麥與禾也因說武帝勸關中種麥而明堂月令亦有仲秋勸種麥之文凡以接續所賴懼民不以為意耳又禾下即種為稍勞故鄭司農注稻人稱今時謂禾下麥為荑下麥言芟荑其禾於下種麥又注剃氏云俗間謂麥下為荑言芟荑其麥以其下種禾豆則是卒歲之間無曠土閒民此惰農所難故勸之麥比他穀獨隔歲種故號宿麥說者亦或以為首種傳曰秋昏虛星中可以種麥說文曰麥芒穀秋種厚薶故謂之麥秋種冬長春秀夏實具四時之氣自然兼有寒溫熱冷故小麥微寒以為麴則溫麵熱而麩冷其地暖處亦可春種至夏便收然比秋種者四氣不足故有毒河渭以西白麥麵凉以其春種缺二時氣使然也麥既備有四時之氣而說文以麥為金者特以其金王而生又遇火而死鄭注月令則云麥實有稃甲屬木此據明堂月令四時與中央所食為說養生家則以為麥心之穀養心氣心病宜食是又以為南方之穀皆各自為義然麥性微寒以為金則許氏之說優矣古稱髙田宜黍稷下田宜稻麥今小麥例須下田故古歌有曰髙田種小麥終久不穗若大麥則不然詩所謂青青之麥生於陵陂者謂大麥也古者朝事之豆有䵄蕡先儒以䵄為熬麥許叔重以為煮麥又小麥屑皮謂之麩小麥屑之核謂之䵀麥核屑十斤為三斗者謂之􅀈麥末謂之麵麥甘鬻謂之麮餅􅀢謂之若䴭䴳䃺麥若搗謂之䴾堅麥謂之麧又相謁食麥謂之䬯陳楚之間謂之􅀈楚人謂之飵秦人謂之􅀈䭓又牟者周所受瑞麥來牟也一作牟又作􅓿即今之大麥也說文云牟大也孟子曰今夫牟麥播種而耰之其地同樹之時又同勃然而生至於日至之時皆熟矣此牟之候也吕氏春秋曰孟夏之月百穀三葉而穫大麥其始蓋后稷受之於天故詩曰貽我來牟又曰於皇來牟劉向以為釐牟麥也始自天降皆以和致和獲天助也然則來牟一物惟廣雅以牟為大麥來為小麥按說文云來周所受瑞麥來牟一來二縫象芒刺之形天所來也故謂行來之來說文以此解來則來牟不應為二物然則來牟為大麥明矣后稷憂勤萬民天賜之麥蓋使其麥豐稔則謂之貽我來牟耳不必雨之種也然古今雨粟事亦甚多安知其始不如此乎雖然后稷所植多矣而獨言此者以其至艱書曰暨稷播奏庶艱食鮮食今麥早種則蟲而有節晚種則穗小而少實又為性多穢一種之終歲不絶耘鋤之功此所以為艱食歟方言曰䴭䴳牟䴽䵆䴹麴也自關而西秦豳之間曰晋之舊都曰䴭齊右河濟曰䴳或曰牟北鄙曰䴽麴其通語也蓋大麥以為麴還得牟之本名䴽是小麥為之䴽細餅麴也䵆有衣麴也大麥宜為飯又可為酢其蘖可為餳本草綱目小麥李時珍曰來亦作䅘許氏說文云天降瑞麥天所來也如足行來故麥字從來從夕夕音綏足行也詩云貽我來牟是矣又云來象其實夕象其根梵書名麥曰迦師錯又李時珍曰北人種麥漫撒南人種麥撮撒北麥皮薄麵多南麥反此又小麥氣味甘微寒無毒李時珍曰新麥性熱陳麥平和又李時珍曰北麵性溫食之不渴南麵性熱食之煩渴西邊麵性凉皆地氣使然也按李廷飛延夀詩云北多霜雪故麵無毒南方雪少故麵有毒顧元慶簷曝偶談云江南麥花夜發故發病江北麥花晝發故宜人又且魚稻宜江淮羊麵宜京洛亦五方有宜有不宜也又大麥李時珍曰麥之苗粒皆大於來故得大名牟亦大也通作牟又蘇恭曰大麥出關中即青稞形似小麥而大皮厚故謂大麥不似穬麥也蘇頌曰大麥今南北皆能種蒔穬麥有二種一種類小麥而大一種類大麥而大陳藏器曰大穬二麥前後兩出穬麥是連皮者大麥是麥米但分有殼無殼也蘇以青稞為大麥非矣青稞似大麥天生皮肉相離秦隴巴西種之今人將大麥米糶之不能分也陳承曰小麥今人以磨麵日用者為之大麥今人以粒皮似稻者為之穬麥今人以似小麥而大粒色青黃汴洛河北之間又呼為黃稞關中一種青稞比近道者粒微小色微青然大穬二麥其名差互今之穬麥似小麥而大者當謂之大麥今之大麥不似小麥而穬脆者當謂之穬麥不可不審李時珍曰大穬二麥注者不一按吳普本草大麥一名穬麥五穀之長也王禎農書云青稞有大小二種似大小麥而粒大皮薄多麵無麩西人種之不過與大小麥異名而已據此則穬麥是大麥中一種皮厚而青色者也大抵是一類異種如粟粳之種近百總是一類但方土有不同耳大麥亦有粘者名糯麥可以釀酒又大麥氣味鹹溫無毒又穬麥李時珍曰穬之殼厚而粗礦也又蘇頌曰穬麥即大麥一種皮厚者陳藏器謂即大麥之連殼者非也又穬麥氣味甘微寒無毒天工開物凡麥有數種小麥曰來麥之長也大麥曰牟曰穬雜麥曰雀曰蕎皆以播種同時花形相似粉食同功而得麥名也四海之內燕秦晋豫齊魯諸道蒸民粒食小麥居半而黍稷稻粱僅居半西極川雲東至閩浙吳楚腹焉方長六千里中種小麥者二十分而一種餘麥者五十分而一穬麥獨産陜西一名青稞即大麥隨土而變而皮成青黑色者雀麥細穗穗中又分十數細子間亦野生蕎麥實非麥類然以其為粉療飢傳名為麥則麥之而已凡北方小麥歷四時之氣自秋播種明年初夏收南方者種與收期時日差短江南麥花夜開江北麥花晝發亦一異也大麥種穫期與小麥同蕎麥則秋半下種不兩月而即收其苗遇霜即殺邀天降霜遲遲則有收矣閩書麥廣雅曰大牟也小䅘也本草云北方之麥秋種冬長春秀夏實全備四時之氣故無毒南方之麥冬種夏實四時之氣不備故有毒有大麥有小麥有蕎麥稈紅花白實三稜而黑秋花冬實有穬麥類麥而殼稍異福州曰米麥泉州曰蔚麥興化曰穬麥福寧曰玉麥惟穬為古名聖祖御製幾暇格物編黑龍江所産之麥最佳色潔白性復宜人相傳中國麥種之佳者係西域㩦來鄂羅斯地在西陲萬里有餘黑龍江之上流原係鄂羅斯所居其種亦自西來所以麥之佳較他處尤勝也直省志書宛平縣物産有三種大小蕎良鄉縣物産大麥小麥春麥雁麥蕎麥固安縣土産麥大小穬無芒蕎清苑縣土産麥有大有小有蕎有春有秋有米有玉柏鄉縣物産米大麥芒大麥小麥火麥紅麥白麥蕎麥邢臺縣物産麥有五種大麥冬種者春種者皮粗而粒大成米謂之大麥仁止可炊飯食之佳小麥有黃皮麥有紅麥白麥光頭麥紫庭白籽實麥縣西北先熟東南次之西山中又次之上下熟差十日歷城縣方産小麥有白有紫白者粒肥而佳大麥穗有六稜者為六稜麥露仁者為青顆麥宜飯醋蘖宜餳有春秋兩名種宜畦中濕地玉麥蕎麥入伏種霜前收可佐二麥之歉新城縣物産大麥小麥時麥三種蕎麥齊東縣物産大麥小麥蕎麥春麥泰安州物産麥有麳牟蕎三種萊蕪縣物産麥有大小二種白紅二色春種者曰春麥牟麥又有蕎麥夏三伏內種濱州物産麥有大麥小麥蕎麥新增一種曰轉蔓麥城武縣物産麥有紅白二種曹州物産大麥小麥小麥有紅白二種蕎麥有白色一種昌邑縣物産麥有大小春玉蕎五種定襄縣物産大麥小麥蕎麥油麥燕麥翼城縣物産麥有大小赤白數種平陸縣土産麥有大小二種大麥則曰露仁曰草大麥小麥則曰火麥曰白麥絳州物産麥之屬大麥有芒芽可為飴糖小麥有芒無芒種甚多蕎麥燕麥炒以為餱可食和順縣土産麥春麥雪麥大麥地寒不多種油麥性寒多種當五穀之半馬邑縣土産麥有小大二種俱春分前種之去秋無雨則地燥而不能下種春無雨則不苗夏無雨則不秀大麥刈於小暑小麥刈於大暑與雁門以南迥不同焉外有蕎麥一種初伏乃種霜早則盡萎又油麥一種亦秋熟而種之者少祥符縣物産芒大麥紅小麥蕎麥米大麥白小麥太康縣物産小麥大麥米大麥山大麥洧川縣物産麥有大麥小麥裕麥數種鄢陵縣土産麥秋種亦有春種者大麥三月黃佳小麥自黃皮蝤子之外有白麥御麥為最佳其他曰紅稈曰鐡稈曰光頭曰條兒之類難以悉舉延津縣物産麥䵀麥晚麥短稈春麥赤鬚盧麥北麥襄城縣土産芒大麥後種先熟米大麥亦可釀酒芋麥煮仁作飯最佳小麥襄土第一奇種耐旱多收八九月種者為上蕎麥俗名陪麥永寧縣物産麥有大小腴鴈四種咸陽縣物産小麥有芒麥有無芒麥為和尚麥色白者為白麥色紫者為紫麥早熟者為三月黃生畢原者上品大麥穗有六稜者為六稜麥有露仁者為青稞俱可釀酒渭南縣物産麥有三種小麥出渭河北者粒小食之易化河以南者粒差大而色不光鮮然一種名三月黃者先諸麥熟細膩潔白河北弗如也大麥皮粗粒大煮食之佳謂之大麥仁蕎麥作麵不甚佳可備諸穀之不熟乾州物産小麥皮薄麵多佳於他處每斗更重二斤平凉縣物産畨麥一曰西天麥苗葉如薥秫而肥短末有穗如稻而非實實如塔如桐子大生節間花垂紅絨在塔末長五六寸三月種八月收西凉縣土産大麥黑大麥畨麥燕麥冷山麥換香頭斑鳩早大幹麥裏周全紅花麥芝麻麥西畨麥白麥甜荍麥苦荍麥青顆麥竹根早紅麥六合縣物産麥之屬大麥有糯者可以釀酒磨麵作醬亦甘美管麥大麥之無芒者麵與小麥同造醬甘美歙縣物産大麥有髙麗麥有糯麥為飯亦宜小麥有長穬麥稃厚而麵少有白麥麵亦少有赤穀麥麩少而麵多太平府物産大麥五種白大麥一名牟麥長粒長芒稃粘於粒管麥即無芒大麥落秸稃自退六稜中早紅粘三種舊志所載今無小麥七種白小麥稃白芒短長關小麥黃白稃芒長排子小麥黃白稃芒短和尚小麥一名火燒麥黃白稃無芒早白松蒲娜麥三種舊志所載今無清河縣物産有牟有麥皆芒穀玉麥無芒火麥色赤而早熟猶嶺南有火米也又有穬麥麥之似牟者亦早熟高郵州物産大麥有數種䵃麥晚麥淮麥短稈小麥有數種春麥蘆麥北麥短管赤穀白穀蕎麥有苦甜二種通州物産麥有大小並早晚二色元麥俗呼為􅢸三月熟者糯帶青炒食似新蠶又粳者曰舜麥色稍赤吳縣物産麥之屬大麥小麥􅢸麥蕎麥舜哥麥紫稈麥西畨麥形似稷而枝葉大結子纍纍如芡實常熟縣物産小麥有紫稗長萁舜哥火燒頭數種太倉州物産麥有三一曰大麥其早者皮厚有芒其晚收皮薄無芒者曰老脫鬚一曰小麥早者曰抄梅言抄在黃梅前也中有火燒頭晚收長穗白殼有芒者曰百腳麥一曰稞麥俗呼儡麥微分粳糯紅曰紅􅢸紫曰紫􅢸性軟宜食但磨粉較少青曰青􅢸白曰白􅢸性硬磨多粉又一種曰緑樹青大約大麥小麥遍處皆有􅢸麥惟吳中盛州地高比他邑獨墾然小麥總不及北地上海縣物産大麥小麥赤麥有早晚二種白麥亦有二種白􅢸麥俗名圓麥有赤白二種蕎麥立秋前後下種八九月收刈舜哥麥俗名火燒頭火燒麥無芒雀麥一名燕麥靖江縣食貨麥之屬大麥有早晚二色有四稜有六稜小麥亦早晚二色有舜哥紫稈梅前黃有盧咱頭火燒頭諸名圓麥俗呼為􅢸又粳者曰舜麥丹徒縣物産麥有大小大麥之種二曰春曰黃稈小麥之種三曰赤殼曰白殼曰宣州平湖縣物産麥有赤剝麥無芒穀天台縣物産小麥大麥矮赤長稈赤麥光頭皆小麥類稞麥穬麥皆大麥類上高縣物産米大麥穀大麥紫色麥白色麥新寧縣物産麵麥穀麥晚姑娘麥甜蕎麥苦蕎麥泉州府物産麥之屬大麥有一種名曰早黃大麥一種名烏肚麥米肚青色名青大麥鬱麥殼薄易脫故名五葉麥同安縣物産麥芒粒稀鬆早熟者曰早黃白者曰秫麥穗大顆稠密者曰松蕾麥初熟時人多炒而食之有火能生熱病畨麥狀如薏苡爾雅蘥雀麥注即燕麥也疏蘥一名雀麥一名燕麥本草云生故墟野林下苗似小麥而弱實似穬麥而細農政全書雀麥本草一名燕麥一名蘥生於荒野林下今處處有之苗似燕麥而細弱結穗像麥穗而極細小每穗又分作小義穗十數個子甚細小味甘性平無毒本草綱目雀麥一名杜姥草一名牛星草李時珍曰此野麥也燕雀所食故名日華本草謂此為瞿麥者非矣又寇宗奭曰苗與麥同但穗細長而疏唐劉夢得所謂兔葵燕麥動搖春風者也農政全書燕麥田野處處有之其苗似麥攛葶但細弱葉亦瘦細抪莖而生結細長穗其麥粒細小味甘農政全書蕎麥今處處有之苗髙二三尺許就地科義生其莖色紅葉似杏葉而軟微􅕏開小白花結實作二蒴味甘平性寒無毒羣芳譜蕎麥一名荍麥一名烏麥一名花蕎本草綱目李時珍曰蕎麥之莖弱而翹然易長易收磨麵如麥故曰蕎曰荍而與麥同名也俗亦呼為甜蕎以别苦蕎楊慎丹鉛録指烏麥為燕麥蓋未讀日用本草也又李時珍曰蕎麥南北皆有立秋前後下種八九月收刈性最畏霜苗髙一二尺赤莖緑葉如烏􅀈樹葉開小白花繁密粲粲然結實纍纍如羊蹄實有三稜老則烏黑色王禎農書云北方多種磨而為麵作煎餅配蒜食或作湯餅謂之河漏以供常食滑細如粉亞於麥麵南方一種但作粉餌食乃農家居冬穀也又蕎麥氣味甘平寒無毒孫思邈曰酸微寒食之難消久食動風令人頭眩欽定授時通考卷二十六
