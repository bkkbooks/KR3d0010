body:
  text: 榖種稻一御稻米稻聖祖御製幾暇格物編豐澤園中有水田數道布玉田榖種嵗至九月始刈穫登場一日循行阡陌時方六月下旬榖穗方頴忽見一科高出衆稻之上實已堅好因收藏其種待來年驗其成熟之早否明嵗六月時此種果先熟從此生生不已嵗取千百四十餘年以來內膳所進皆此米也其米色微紅而粒長氣香而味腴以其生自苑田故名御稻米一歲兩種亦能成兩熟口外種稻至白露以後數天不能成熟惟此種可以白露前收割故山莊稻田所收每嵗避暑用之尚有贏餘曽頒給其種與江浙督撫織造令民間種之聞兩省頗有此米惜未廣也南方氣暖其熟必早於北地當夏秋之交麥禾不接得此早稻利民非小若更一嵗兩種則畝有倍石之收將來蓋藏漸可充實矣昔宋仁宗聞占城有早熟稻遣使由福建而往以珍物易其禾種給江淮兩浙即今南方所謂黑榖米也粒細而性硬又結實甚稀故種者絶少今御稻不待逺求生於禁苑與古之雀銜天雨者無異朕每飯時嘗願與天下羣黎共此嘉榖也詩豳風十月穫稻朱子曰稻南方所食稻米水生而色白者也禮記曲禮稻曰嘉蔬注蔬與疏同立苗疏則茂盛嘉美也王制冬薦稻稻以鴈大全稻為西方之榖則隂類也故配以鴈鴈陽物故也月令季秋之月天子乃以犬嘗稻注稻始熟也周禮天官凡會膳食之宜牛宜稌訂義稌稻也澤中所生與土畜相宜地官稻人掌稼下地易祓曰稻宜於荆揚厥土塗泥乃沮洳下溼之地此稻人所以掌稼下地爾雅稌稻注今沛國呼稌疏别二名也案説文云沛國謂稻為糯粳稻屬也字林云糯黏稻也稻稻不黏者本草以粳米稻米為兩物粳與粳古今字然粳糯甚相類黏不黏為異耳依説文稌稻即糯也江東呼糯乃亂切素問黃帝問曰為五榖湯液及醪醴奈何岐伯對曰必以稻米炊之稻薪稻米者完稻薪者堅帝曰何以然岐伯曰此得天地之和高下之宜故能至完伐取得時故能至堅也春秋説題辭稻之為言藉也稻太隂精含水漸洳乃能化也江旁多稻故其宜也淮南子江水肥仁而宜稻古今注稻之黏者為秫禾之黏者為黍廣志有虎掌稻紫芒稻赤芒稻南方有蟬鳴稻有蓋下白稻續博物志粳粟米五榖中最硬得漿水易化倉粳米炊作乾飯食之止痢爾雅翼稻米粒如霜性尤宜水故五穀外别設稻人之官掌稼下地漢世亦置稻田使者以其均水利故也古者之於榖菽與苴以食農麥以接續至於食稻衣錦則以為生人之極樂以稻味尤美故也稻一名稌然有黏有不黏者今人以黏者為糯不黏者為粳然在古則通得稻稌之名説文曰稻稌也沛國謂稻曰糯粳稻屬或作粳是則直以糯為稻耳若鄭康成注周禮稌粳也則稻是粳然要之二者皆稻也故汜勝之云三月種粳稻四月種秫稻字林云糯黏稻也粳稻不黏者今人亦皆以二榖為稻若詩書之文自依所用而解之如論語食夫稻則稻是粳月令秫稻必齊則稻是糯周禮牛宜稌則稌是粳豐年多黍多稌為酒為醴則稌是糯又稻人之職掌稼下地至澤草所生則種之芒種是明稻有芒有不芒者今之粳則有芒至糯則無是通稱稌稻之明驗也又有一種曰秈比於粳小而尤不黏其種甚早今人號秈為早稻粳為晚稻又今江浙間有稻粒稍細耐水旱而成實早作飯差硬土人謂之占城稻云始自占城國有此種昔真宗聞其耐旱遺以珍寶求其種始植於後苑後在處播之按國朝會典大中祥符五年遣使福建取占城禾分給江淮兩浙漕并出種法令擇民田之高者分給種之則在前矣養生要集杭稻屬也稻亦粳之總名也道家方藥有用稻米粳米此則是兩物也稻米粒白如霜味苦主溫服之令人多瘦無肥膚粳米味甘主利臟長肌膚好顔色稻已割而復抽曰稻孫理生玉鏡六旬稻一名拖犁歸粒小色白四月種六月熟又有八十日稻百日赤毗陵亦有六十日秈八十日秈百日秈之品百日赤百日秈俱白稃而無芒七八月熟其味白淡而紅甘戒菴漫筆稻花白而瓣少者米賤多而色黃則貴俗云銀花賤金花貴也湧幢小品暹羅國稻其粒盈寸燕山叢録房山縣有石窩稻色白味香美以為飯雖盛暑經數旬不餲明一統志雷陽界稻十一月下種揚雪耕耘次年四月熟與他地迥異稻花午開暮合開合皆於日中香甚有至七開七合者農政全書黃省曽理生玉鏡曰稻之粒其白如霜其性如水説文謂之稌沛國謂之粳以黏者謂之糯亦謂之秫以不黏者謂之粳亦謂之粳故泛勝之云三月而種粳四月而種秫然皆謂之稻魯論之食夫稻粳也月令之秫稻糯也糯無芒粳有芒粳之小者謂之秈秈之熟也早故曰早稻粳之熟也晚故曰晚稻京口大稻謂之粳小稻謂之秈其粒細長而白味甘而香九月而熟是謂稻之上品曰箭子其粒大而芒紅皮赤五月而種九月而熟謂之紅蓮其粒尖色紅而性硬四月而種七月而熟曰金城稻是惟高仰之所種松江謂之赤米乃榖之下品其粒長而色斑五月而種九月而熟松江謂之勝紅蓮性硬而皮莖俱白謂之䆉種稻其粒大色白稈軟而有芒謂之雪裏揀其粒白無芒而稈矮五月而種九月而熟謂之師姑粳湖州録云言其無芒也四明謂之矮白其粒赤而稃芒白五月初而種八月而熟謂之早白稻松江謂之小白四明謂之細白九月而熟謂之晚白又謂蘆花白松江謂之大白其三月而種六月而熟謂之麥爭埸其再蒔而晚熟者謂之烏口稻在松江色黑而能水與寒又謂之冷水結是謂稻之下品其粒白而大四月而種八月而熟謂之中秋稻在松江八月望而熟者謂之早中秋又謂之間西風其粒白而榖紫五月而種九月而熟謂之紫芒稻其秀最易謂之下馬看又謂之三朝齊湖州録云言其齊熟也其在松江粒小而性柔有紅芒白芒之等七月而熟曰香粳其粒小色斑以三五十粒入他米數升炊之芬芳香美者謂之香子又謂之香􅢸其粒長而釀酒倍多者謂之金叉糯其色白而性軟五月而種十月而熟曰羊脂糯其芒長而榖多白斑五月而種九月而熟謂之胭脂糯太平謂之硃砂糯其白班五月而種十月而熟謂之虎皮糯太平又云厚稃紅黑斑而芒其粒最長白稃而有芒四月而種七月而熟謂之趕陳糯太平謂之趕不著亦謂之秈糯其粒大而色白四月而種九月而熟謂之矮糯其稃黃而米赤已熟而稈微青布宜良田四月而種九月而熟謂之青稈糯其粒大而色白芒長而熟最早其色易變而釀酒最佳謂之蘆黃糯湖州謂之泥裏變言其不待日之曬也其粒圓白而稃黃大暑可刈其色難變不宜於釀酒謂之秋風糯可以代粳而輪租又謂之瞞官糯松江謂之冷粒糯其不耐風水四月而種八月而熟謂之小娘糯譬閨女然也其在湖州色烏而香者謂之烏香糯其稈挺不仆者謂之鐡梗糯芒如馬鬃而色赤者謂之赤馬鬃糯其粒小而色白四月而種六月而熟謂之六十日稻又遲者謂之八十日稻又遲者謂之百日赤而毗陵小稻之種亦有六十日籼八十日籼百日籼之品而皆自占城來實賴水旱而成實作飯則差硬宋氏使占城珍寶易之以給於民者在太平六十日秈謂之拖犁歸有赤紅秈有百日秈其白稃而無芒或七月或八月而熟其味白淡而紅甘在閩無芒而粒細有六十日可穫者有百日可穫者皆曰占城稻其已刈而根復發苗再實者謂之再熟稻亦謂之再撩其在湖州一穗而三百餘粒者謂之三穗子農書治稻者蓄陂塘以瀦之置隄閘以止之又有作為畦埂耕杷既熟放水勻停擲種於內候苗生五六寸拔而秧之今江南皆有用此法苗高七八寸則耘之耘畢放水熇之欲秀復用水浸之苗既長茂復事薅拔以去稂莠農家收穫尤當及時江南上雨下水收稻必用喬扞笐架乃不遺失蓋刈早則米青而不堅刈晚則零落而損收又恐為風雨損壞此九月築場十月納稼工夫次第不可失也太抵稻榖之美種江淮以南直徹海外皆宜此稼今閩中有得占城種高仰處皆宜種之謂之旱占其米粒大而且甘為旱稻種甚佳北方水源頗少陸地沾溼處宜種此稻丘濬曰地土高下燥溼不同而同於生物生物之性雖同而所生之物有宜有不宜焉土性雖有宜不宜人力亦有至不至人力之至亦或可以回天况地乎宋太宗詔江南之民種諸榖江北之民種粳稻真宗取占城稻種散諸民間是亦大易裁成輔相以左右民之一事今世江南之民皆雜蒔諸榖江北民亦兼種粳稻昔之粳稻惟秋一收今又有旱禾焉二帝之功利及民逺矣後之有志於勤民者宜倣宋主此意通行南北俾民兼種諸穀有司考課書其勸相之數其地昔無而今有有成效者加以官賞農政全書徐獻忠曰居山中往往旱荒乞得旱稻種往時宋真宗因兩浙旱荒命於福建取占城稻三萬斛散之仍以種法下轉運司示民即今之旱稻也初止散於兩浙今北方高仰處類有之者因時宋有江翶者建安人為汝州魯山令邑多苦旱乃從建安取旱稻種耐旱而繁實且可久蓄高原種之嵗嵗足食種法大率如種麥治地畢豫浸一宿然後打潭下子用稻草灰和水澆之每鋤草一次澆糞水一次至於三即秀矣夲草綱目李時珍曰稻粳糯之通稱本草則専指糯為稻也稻從舀音函象人在臼上治稻之義性黏軟故謂之糯汪穎曰糯米緩筋令人多睡其性糯也陶𢎞景曰道家方藥有稻米粳米俱用者此則兩物也稻米白如霜江東無此故通粳為稻耳不知色類復云何也蘇恭曰稻者穬榖之通名爾雅云稌稻也粳者不黏之稱一曰秫泛勝之云三月種粳稻四月種秫稻即並稻也陶謂為二蓋不可解也馬志曰此稻米即糯米也其粒大小似粳米細粳白如雪今通呼粳糯二榖為稻所以惑之按李含光音義引字書解粳字云稻也粳字云稻屬也不黏粢字云稻餅也粢蓋糯也冦宗奭曰稻米今造酒糯稻也其惟溫故可為酒酒為陽故多熱西域天竺土溽熱稻嵗四熟亦可驗矣李時珍曰糯稻南方水田多種之其性粘可以釀酒可以為粢可以蒸糕可以熬錫可以炒食其類亦多其榖彀有紅白二色或有毛或無毛其米亦有赤白二色赤者酒多糟少一種粒白如霜長三四分者齊民要術糯有九格雉木大黃馬首虎皮火色等名是矣古人釀酒多用秫故諸説論糯稻往往費辨也秫乃糯粟見本條又稻米氣味苦溫無毒孫思邈曰味甘冦宗奭曰性溫蘇頌曰糯米性寒作酒則熱糟乃溫平亦如大豆與豉醬之性不同也孟詵曰涼發風動氣使人多睡不可多食陳藏器曰久食令人身軟緩人筋也小貓犬食之亦腳屈不能行馬食之足重妊婦雜肉食之令子不利蕭炳曰擁諸經絡氣使四肢不收發風昏昏陳士良曰久食發心悸及癰疽瘡癤中痛合酒食之醉難醒李時珍曰糯性粘滯難化小兒病人最宜忌之又李時珍曰粳乃榖稻之總名也有早中晚三收諸本草獨以晚稻為粳者非矣粳者硬也但入解熱藥以晚粳為良耳陶𢎞景曰粳米即今人常食之米但有白赤小大異族四五種猶同一類也可以廩米孟詵曰淮泗之間最多襄洛土粳米亦堅實而香南方多收火稻最補益人諸處雖多粳米但充飢耳李時珍曰粳有水旱二稻南方土下塗泥多宜水稻北方地平惟澤土宜旱稻西南夷亦有燒山地為畬田種旱稻者謂之火米古者惟下種成畦故祭祀謂稻為嘉蔬今人皆拔秧栽插矣其種近百各各不同俱隨土地所宜也其榖之光芒長短大細百不同也其米之赤白紫烏堅鬆香否不同也其性之溫涼寒熱亦因土産形色而異也真臘有水稻高丈許隨水而長南方有一嵗再熟之稻蘇頌曰香粳長白如玉可充御貢皆粳之稍異者也又粳米氣味甘苦平無毒孫思邈曰生者寒燔者熱李時珍曰北粳涼南粳溫赤粳熱白粳涼晚白更寒新粳熱陳粳涼凡人嗜生米久成米瘕治之以雞屎白汪頴曰新米乍食動風氣陳者下氣病人尤宜孟詵曰常食乾粳飯令人熱中唇口乾不可同馬肉食發痼疾不可和蒼耳食令人卒心痛急燒倉米灰和蜜漿服之不爾即死又李時珍曰秈亦粳屬之先熟而鮮明者故謂之秈種自占城國故謂之占俗作粘者非矣又曰秈仙粳而粒小始自閩人得種於占城國其熟最早六七月可收品類亦多有赤白二色與粳大同小異甘溫無毒閩書周禮揚州荆州其榖宜稻閩屬揚州當首稻矣左思三都賦國稅再熟之稻宋馬益詩兩熟潮田天下無蓋美閩稻也説文為稻為粳粳稌屬也糯亦名秫字林云糯稻黏而粳稻不黏今之食米皆粳稻釀酒則糯稻也閩中記云閩人以糯稻釀酒其餘蹂粉嵗時以為糰粽粿糕之屬福州曰粳曰秫春種夏熟曰早稻秋種冬熟曰晚稻嵗一熟者曰大冬山田冬種者曰早占霜降後熟者曰天降來曰薰提與早稻同熟者曰黃芒與晚稻同熟者曰占城曰稐又曰土稐嵗再熟者曰金洲曰白香秫又曰糯與早稻同熟者曰早秫與晚稻同熟者曰晚秫與大冬同熟者曰大冬秫湘山野録云福建八郡皆有占城稻泉州曰早稻曰早仔曰師姑早曰晚稻曰大冬曰寄種曰青晚曰占城稻曰畬稻曰白香稻曰近山香曰降來曰大尖曰小尖曰中灌曰親畬曰河南早曰河南秋種曰白栁曰烏芒曰林鳳曰藿香曰一秋紅曰紅芒曰天上落曰八月白曰蘇州白曰烏稻曰金城早曰栗殼曰尤溪早曰早秫曰晚秫曰大冬秫曰赤蒡秫曰牛頭秫曰好殼曰白秋秫曰白占秫曰花眉秫曰虎皮秫曰近山香秫曰龍牙曰斑占建寧曰十日早曰大糯曰小糯曰龍鳳早曰半冬白曰師姑早曰九里香曰大早曰小早曰天降早曰爛泥早曰七娘禾曰小白禾曰大白禾曰小烏禾曰大烏禾曰野豬愁曰無芒禾曰真珠纍曰麻子禾曰公婆禾曰銀珠秫曰早禾曰白禾子曰烏禾子曰厚芒禾曰下馬看曰白芒曰黃榖曰粳榖曰白秈早曰烏龍牙曰紅糟􅐕曰鋪城錦曰溫州早曰吳家傳曰大師姑曰小師姑曰青絲禾曰荔枝禾曰猴尾秫曰烏節秫曰重陽秫曰白芒秫曰烏牙秫延平曰秧歸曰早子曰金城早曰江西早曰天降曰赤芒曰白芒曰赤殼曰十溪曰廖元山曰早秫曰晚秫曰八月白曰長芒曰粟山中野人間種之汀州曰稻興化早早榖曰稴曰占榖曰粟曰青粱曰黃粱曰粱皆粟類漳州曰早稻曰晚稻曰大冬稻曰寄種曰占稻曰香稻曰白栁曰畬稻曰糯稻以上稻種不一又八郡方言不同有一種而異名者具依本志列之如石天工開物五榖獨遺稻者以著書聖賢起自西北也今天下育民人者稻居什七凡稻種最多不黏者禾曰粳米曰粳黏者禾曰稌米曰糯南方無黏黍酒皆糯米所為質本粳而晚收帶黏俗名婺源光之類不可為酒只可為粥者又一種性也凡稻榖形有長芒短芒江南名長芒者曰劉陽早短芒者曰吉安早長粒尖粒圓頂扁靣不一其中米色有雪白牙黃大赤半紫雜黑不一溼種之期早早者春分以前名為社種最遲者後於清明凡播種先以稻麥􅢠包浸數日俟其生芽撒於田中生出寸許其名曰秧秧生三十日即拔起分栽若田畝逢旱乾水溢不可插秧秧過期老而長節即栽於畝中生榖數粒結果而已凡秧田一畝所生秧供栽二十五畝凡秧既分栽後早者七十日即收穫粳有救公飢喉下急糯有金包銀之類方語百千不可殫述最遲者歷夏及冬二百日方收穫其冬季播種仲夏即收者則廣南之稻地無霜故也凡稻旬日失水即愁旱乾夏種秋收之榖必山澗源水不絶之畝其榖種亦耐久其土􅎃亦寒不催苗也湖濵之田待夏潦已過六月方栽者其秧立夏播種撒藏高畝之上以待時也南方平原田多一嵗兩栽兩穫者其再栽秧俗名晚糯非粳類也六月刈初禾耕治老膏田插再生秧其秧清明時已偕早秧撒布早秧一日無水即死此秧歷四五兩月任從烈日暵乾無憂此一異也凡再植稻遇秋多晴則汲灌與稻相終始農家勤苦為春酒之需也凡稻旬日失水則死期至幻出旱稻一種粳而不黏者即高山可插又一異也香稻一種取其芳氣以供貴人收實甚少滋益全無不足尚也凡稻土脈焦枯則穗實蕭索勤農糞田多方以助之人蓄穢遺榨油楛餅楛者以去膏而得名胡麻萊蔔子為上蕓薹次之大眼桐又次之樟相棉花又次之草皮木葉以佐生機普天之所同也南方磨菉豆粉者取溲漿灌田肥甚豆賤之時撒黃豆於田一粒爛土方三寸得榖之息倍焉土性帶冷漿者宜骨灰蘸秧根凡禽獸骨石灰淹苗足向暘暖土不宜也土脈堅緊者宜耕隴疉塊壓薪而燒之埴墳鬆土不宜也凡早稻種秋初收藏當午晒時烈日火氣在內入倉廪中關閉太急則其榖黏帶暑氣勤農之家偏受此患明年田有糞肥土脈發燒東南風助暖則盡發炎火大壞苗穗此一災也若種榖晚涼入廪或冬至數九天收貯雪水氷水一甕交春即不驗清明溼種時每石以數碗激灑立解暑氣則任從東南風暖則此苗清秀異常矣􅑂在種內反怨鬼神凡稻撒種時或水浮數寸其榖未即沉下驟發狂風堆積一隅此二災也謹視風定而後撒則沉自成秧矣凡榖種生秧之後防雀鳥聚食此三災也立標飄揚鷹俑則雀可驅矣凡秧沉腳未定隂雨連綿則損折過半此四災也邀天晴霽三日則粒粒皆生矣凡苗既函之後畝土肥澤連發南風薰熱函內生蟲形似蠶繭此五災也邀天遇西風雨一陳則蟲化而榖生矣凡苗吐穡之後暮夜鬼火遊燒此六災也此火乃朽木腹中放出凡木母火子子藏母腹母身未壞子性千秋不滅每逢多雨之年孤野墳墓多被狐狸穿塌其中棺木為水浸朽爛之極所謂母質壞也火子無附脫母飛揚然隂火不見陽光直待日沒黃昏此火衝隙而出其力不能上騰飄遊不定數尺而止凡禾穡葉遇之立刻焦炎逐火之人見他處樹根放火以為鬼也奮梃擊之反有鬼變枯柴之説不知向來鬼火見燈光而化矣凡火未經人間燈傳者總屬隂火故見燈即滅凡苗自函活以至頴栗早者食水三斗晚者食水五斗失水即枯將刈之時少水一升雖數雖存米粒縮小入碾臼中亦多斷碎此七災也汲灌之智人巧已無餘矣凡稻成熟之時遇狂風吹粒殞落或隂雨竟旬榖粒沾溼自爛此八災也然風災不越三十里隂雨災不越三百里偏方厄難亦不廣被風落不可為若貧困之家苦於無霽將溼榖升於鍋內燃薪其下炸去粳膜收炒糗以充飢亦補助造化之一端矣田家五行雨水節燒乾鑊以糯稻爆之謂之孛婁花占稻色自早禾至晚稻皆爆一握各以器列比並分數斷高下以畨白多為勝欽定授時通考卷二十
