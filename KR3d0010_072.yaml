body:
  text: 蠶事彚考書經禹貢桑土既蠶傳桑土冝桑之土既蠶者可以蠶桑也詩經豳風蠶月條桑傳蠶月治蠶之月也禮記月令季春之月后妃齋戒親東鄉躬桑禁婦女毋觀省婦使以勸蠶事注后妃親採桑示帥先天下也東鄉者鄉時氣也是明其不常留養蠶也留養者所卜夫人與世婦婦謂世婦及諸臣之妻也女外內子女也毋觀去容飾也婦使縫線組紃之事周禮內宰中春詔后帥外內命婦始蠶於北郊以為祭服嵗終稽其功事佐后而受獻功者比其大小粗良注蠶於北郊婦人以純隂為尊郊必有公桑蠶室焉又地官凡庶民不蠶者不帛疏不蠶者不帛蠶者則得帛孟子云五十者可以衣帛以不蠶故身不得衣帛又夏官馬質掌質馬禁原蠶者注原再也天文辰為馬蠶書蠶為龍精與馬同氣物莫能兩大禁再蠶者為傷馬與史記天官書正月上甲風從東方宜蠶淮南子攝提格之嵗嵗早水晚旱蠶不登寅在甲曰閼逢單閼之嵗嵗和蠶昌卯在乙曰旃蒙執徐之嵗嵗早旱晚水蠶閉辰在丙曰柔兆大荒落之嵗嵗蠶小登已在丁曰強圉敦牂之嵗嵗大旱蠶登午在戊曰著雍協洽之嵗嵗蠶登未在已曰屠維涒灘之嵗嵗和蠶登申在庚曰上章作鄂之嵗嵗蠶不登酉在辛曰重光掩茂之嵗嵗蠶不登戌在壬曰玄黓大淵獻之嵗嵗蠶開困敦之嵗嵗蠶昌亥在癸曰昭陽赤奮若之嵗嵗早水蠶不出又蠶食而不飲二十二日而化又原蠶而一嵗可再登非不利也然王者法禁之為其殘桑也又蠶經云黃帝元妃西陵氏始蠶蓋黃帝制作衣裳因此始也東方朔占正月旦竟日不風清明宜蠶物類相感志蠶過小滿則無絲蠶書卧種之日升香以禱天駟先蠶也割雞設醴以禱婦人寓氏公主蓋蠶神也毋治堰毋誅草毋沃灰毋室入外人四者神實惡之烏程縣志清明日晚育蠶之家設祭以禳白虎門前用石灰畫灣弓之狀蓋祛蠶祟也東陽縣志三月草五赤豆棗栗之類和米煮之謂之蠶花粥云食之利養蠶茅亭客話蜀有蠶市每正月至三月州城及屬縣一十五處耆舊傳聞古蠶叢氏為蜀主民無定居隨蠶叢所在致市居此其遺風也宋蘇轍詩序眉之二月望日鬻蠶器於市因作樂從觀謂之蠶市方輿勝覽成都古蠶叢之國其民重蠶事故一嵗之中二月望日鬻花木蠶器號蠶市在大慈寺前順慶府志蜀有樂山在渠縣北每嵗人日邑人將鼓笛酒食登此娛樂以祈蠶事蠶經蠶有六德衣被天下生靈仁也食其食死其死以答主恩義也身不辭湯火之厄忠也必三眠三起而熟信也象物以成繭色必黃素智也繭而蛹蛹而蛾蛾而卵卵而蠶蠶而復繭神也齊民要術五行書曰欲知蠶善惡常以三月三日天隂如無日不見雨蠶大善田家五行清明午前晴早蠶熱午後晴晚蠶熟西吳枝乘吳興以四月為蠶月家家閉户官府勾攝征收及里閈往來慶弔皆罷不行謂之蠶禁農桑通訣繭館皇后親蠶之所古公桑蠶室也齋戒享先蠶以勸蠶事后躬桑始捋一條執筐受桑捋三條女尚書跪曰可止執筐者以桑授蠶毋以桑適金室前漢文帝紀詔皇后親桑以奉祀服景帝詔后親桑為天下先元帝王皇后為太后幸繭館率皇后及列夫人桑明帝時皇后諸侯夫人蠶魏文帝黃初中皇后蠶於北郊遵周典也晉武帝太康中立蠶宫皇后躬桑依漢魏故事宋孝武立蠶觀后親桑循晉禮也北齊置蠶宫皇后躬桑於所後周制皇后至蠶所桑隋制皇后親桑於位唐太宗貞觀元年皇后親蠶顯慶元年皇后武氏先天二年皇后王氏乾元二年皇后張氏並見親蠶禮玄宗開元中命宫中食蠶親自臨視宋開寶通禮郊祀録並有后親蠶祝詞此歷代后妃親蠶之事采之史編昭然可見茲特冠於篇首蠶論木各有所宜土惟桑無不宜桑無不宜故蠶無不可事豳風之詩曰女執懿筐遵彼微行爰求柔桑則豳可蠶將仲子之詩曰無折我樹桑則鄭可蠶車𥻘之詩曰阪有桑隰有楊則秦可蠶氓之詩曰桑之未落其葉沃若桑之落矣其黃而隕桑中之詩曰期我乎桑中則衛可蠶皇矣之詩曰攘之剔之其檿其柘桑柔之詩曰菀彼桑柔其下侯旬則周可蠶禹貢兖州桑土既蠶厥篚織文則魯可蠶青州厥篚檿絲管子亦曰五粟之土其檿其桑則齊可蠶荆州厥篚玄纁則楚可蠶孟子告梁惠王曰五畝之宅樹之以桑十畝之詩曰十畝之間桑者間間則梁可蠶蠶叢都蜀衣青衣教民蠶桑則蜀可蠶猶農夫之於五穀非龍堆狐塞極寒之區猶可耕且穫也制居禮記祭義天子諸侯必有公桑蠶室近川而為之築宫仞有三尺棘牆而外閉之疏公桑蠶室者設官家之桑於其處築養蠶之室又卜三宫之夫人世婦之吉者使入蠶於蠶室雜五行書二月上壬取土泥屋四角宜蠶吉齊民要術屋欲四面開窗紙糊厚為籬屋內四角著火又三月清明節令蠶妾治蠶室塗隙穴又蠶之性喜靜而惡喧故宜靜室喜暖而惡濕故宜版室室靜可以避人聲之喧閙室密可以避南風之襲吹室版可以避地氣之蒸鬱蠶書居蠶欲溫居繭欲涼務本新書蠶屋忌近臭穢夜間無令燈火光忽射蠶屋窗孔不得將煙火紙燃於蠶房內吹滅蠶初生忌屋內掃塵忌蠶房內哭泣呌喚忌穢語淫辭忌不潔淨人入蠶屋又凡養秋蠶初生時去三伏猶近暑氣仍存蠶室多生濕潤須四通八達風氣往來士農必用治火倉屋當中掘一坑濶挾深淺量屋大小謂如一二間四椽屋四方一面可濶四尺隨屋大小加減坑周圍磚坯接壘髙二尺長粘泥泥了通計深四尺細碎乾牛糞坑底上鋪攤一層厚三四指臘月所收捶碎者帶根節粗乾柴於糞上鋪一層五寸以上徑者凡桑榆槐等堅硬者皆可柴上又鋪糞一層於柴空隙處築得極實慎不可虛虛則火焰起傷屋又熟火不能長久糞柴相間摏坑滿上復用糞厚蓋約蠶生前七八日糞土上煨熟火黑黃煙五七日於蠶蛾生前日少開門出盡煙即閉其柴糞陷下已成熟火蠶小喜暖怕煙不可用生火又生火或驟而或歇不能均勻此火既熟絶無煙氣一兩月不減不動便如無火用柴枝剔撥使煙氣薰騰也上必壘髙二尺者欲使火氣上騰至室中散布均勻又防夤夜人行誤陷入也其屋乾透其壁皆暖諸蟲薰盡牛糞薰屋大宜蠶也蠶喜牛糞牛喜蠶沙糊窗時窗上故紙却用淨白紙替換莫捲草薦旋拉故紙糊新紙不使熱氣外出每一窗上嵌四大捲窗宜密農桑通訣民間蠶室必選置蠶宅負隂抱陽地位平爽正室為上南西為次東又次之若室舊則當淨掃塵埃預期泥補若逼近臨時牆壁濕潤非所利也夫締搆之制或草或瓦須內外泥飾材木以防火患復要間架寬厰可容槌箔窗户虛明易辨眠起仍上於行撁各置照窗每臨早暮以助髙明下就附地列置風竇令可啓閉以除濕鬱考之諸蠶書云蠶時先闢東間養蟻停眠前後撒去西窗宜遮西曬尤忌西南風起大傷蠶氣可外置牆壁四五步以禦所有蠶神室蠶神像宜於髙空處安置凡一切忌惡之事邪穢之氣辟除蠲潔夙夜齋敬不致褻慢如能依上法自然宜蠶不必泥於隂陽家拘忌巫覡等誘惑至使回換門户諂禱神祇虛費財用實無所益故表而出之以為業蠶者之戒又養蠶蟻時先辟東間一間四角挫壘空龕狀如三星以均火候謂屋小則易收火氣也農政全書士農必用曰蠶成蟻時宜極暖是時天氣尚寒大眠後宜涼是時天氣已暄又風雨隂晴之不則朝暮晝夜之不同一或失宜蠶病即生惟蠶屋得法則可以應蠶屋之制周置捲窗中伏熟火謂如蠶欲暖而天氣寒閉苫窗撥火則外寒不入和氣內生若遇大寒屢撥熟火不能勝其寒則外燒糞墼絶煙置屋中四隅和氣自然薰蒸寒退則去餘火蠶欲涼而天氣暄閉火而捲苫窗則火氣內息而涼氣外入若遇大熱盡捲苫窗不能解其熱則去其窗紙上捲照窗下開風眼窗外槌下灑潑新水涼氣自然透達熱退則糊補其窗閉塞風眼使其蠶自初及終不知有寒熱之苦病少繭成一室之功也然寒不可驟加暖熱當漸漸益火寒而驟熱則生黃軟等疾熱不可驟加風涼當漸漸開窗熱而驟風涼則變殭此又不可不知也火倉圖説火倉凡蠶生室內四壁挫壘室龕狀如三星務要玲瓏頓藏熟火以通暖氣四向勻停蠶家或用旋燒柴薪煙氣薰籠蠶藴熱毒多成黑蔫今制為擡爐先自外燒過薪糞舁入室內各籠約量頓火隨寒熱添減若寒熱不均後必眠起不齊擡爐圖説擡爐之制一如矮牀內嵌燒爐兩旁出柄二人舁之以送熟火浴種爾雅釋蟲蟓桑繭雔由樗繭棘繭欒繭蚢蕭繭疏此皆蠶類作繭者因所食葉而異名也食桑葉作繭者名蟓即今蠶也食樗葉棘葉欒葉者名雔由食蕭葉作繭者名蚢也尚書大傳大昕之朝夫人浴種于川注大昕季春朔日之朝也吳録南陽郡一嵗蠶八績廣志蠶有原蠶有冬蠶有野蠶永嘉郡記永嘉有八輩蠶一曰蚢珍蠶三月績二曰柘蠶四月初績三曰蚢蠶四月績四曰愛珍蠶五月績五曰愛蠶六月末績六曰寒珍蠶七月績七曰四出蠶九月初績八曰寒蠶十月績又凡蠶再熟者前輩皆謂之珍養蠶者少養之愛蠶者故蚢蠶種也蚢珍三月既績出蛾取卵七八月便剖卵蠶生多養之是為蚢蠶欲作愛者取蚢珍之卯藏內甕中隨器大小亦可拾紙蓋覆器口安硎泉冷水中使冷氣折其出勢得三七日然後剖生養之謂為愛珍亦呼愛子績成繭出蛾卵卵七日又剖成蠶多養之此則愛蠶也藏卵時勿令人見應用二七赤豆安器底臘月桑柴二七枝以麻卵紙當令水髙下與種相齊若外水髙則卵死不復出若外水下卵則冷氣少不能折其出勢不能折其出勢則不得三七日不得三七日雖出不成也不成者謂徒績成繭出蛾生卵七日不復剖生至明年方生耳欲得隂樹下亦有泥器三七日亦有成者雜五行書今世有三卧一生蠶四卧再生蠶白頭蠶頡石蠶楚蠶黑蠶有一生再生之異灰兒蠶秋母蠶秋中蠶老秋兒蠶秋末老蟹兒蠶錦兒蠶同繭蠶或二蠶三蠶共為一繭凡三卧四卧皆有絲綿之别海寧縣志清明夜育蠶之家各裹蠶子於綿衣中卧身下謂蠶得人氣始生又臘月十二日養蠶之家各以鹽滷茄灰薰揉蠶子藏之榖殼中至草四日則出之浴于川以待春至士農必用夏蠶别是一等俗謂三蠶春養出夏種夏養出秋種秋養出來春種不可間缺缺則絶其種又秋蠶一名原蠶採葉不無傷桑春蠶不幸遇天災不得已養之以補嵗計然不宜植宜稚也徐光啓曰今人不養秋蠶止以夏蠶作來春種亦生又云秋蠶以補嵗計此言甚妙秋時多晴更比春蠶為穩今人先言二蠶不食頭葉致昧秋蠶補歲計之理不知二蠶何故不食頭葉夏秋蠶俱要計算除蚊蠅又農桑要旨曰清明後種初變輕和肥滿再變尖圓其中如春初栁色再變蟻周旋其中如逺山色此必收之種也若頂平焦乾及蒼黃赤色便不可養此不收之種也又蠶為龍精月值大火則浴其種今人以鹽水沃其種謂之洗蠶蠶為上不浴者名火蠶蠶次之又桑蠶直説曰欲疾生者頻舒捲捲之須虛慢欲遲生者少舒捲捲之須緊實黃省曽曰臘月十二浸之于鹽滷中至二十四而出則利於繅絲或曰臘八日以桑柴灰或草灰淋汁以蠶連浸焉一日而出繼以雪水浸之懸乾或懸桑木之上以冒雨雪三宿而收之則耐養二月十二浴清明之曉則以綿紙裹之藏於厨內俟桑芽如茶匙大則綿絮裹之暮也覆以所服之暖衣晨也覆以所蓋之暖被既出也溫以火未出也禁以火焙其浸也用桑條之灰濕其連而後摻之摺而浸之于滷中即鹽化之水有分兩恐其浮也以磁器壓之其至二十四出也用河水滌去其灰或置之扁中而沃而後涼之挂之則至春生否者隂不至于費葉至二月十二浴以菜花野菜花韭花桃花白豆花揉之其中而浴之蛾之放子也一夜而止否則生蟻不齊又人多收蠶種于篋中經天時雨溫熱蒸寒燠不時即罨損浙人謂之蒸布言在卵布中已成其病其苗出必黃苗黃即不堪育矣譬之嬰兒在胎中受病出胎便病難以治也凡收蠶種之法以竹架疏疏垂之勿見風日又擘絲羃之勿使飛蝶綿蟲食之待臘日或臘月大雪即鋪蠶種于雪中令雪壓一日乃復攤之架上羃之如初至春候其欲生未生之間細研朱砂調溫水浴之水不可冷亦不可熱但如人體斯可矣以解其不祥也又蠶未出時稱種寫記輕重于紙背及已出齊慎勿掃多見人才見蠶出便以帚刷或以雞鵝翎掃之夫以微渺如絲髮之弱其能禁帚刷之傷哉必細切葉别布白紙上務令勻薄却以出苗紙和紙覆其上蠶喜葉香自然下矣却再稱元種紙見所下多少約計自有葉看養寧葉多而蠶少即優裕而無窘迫之患今人不先計料至缺葉則典質貿鬻無所不至苦于蠶受飢餒狼籍損壞枉損物命多矣又農桑輯要曰蠶子變色要在遲速由己勿致損傷自變桑葉已生自辰巳間將甕內取出舒卷提掇亦無度數但要第一日變三分第二日變七分却用紙密糊封了還甕內收藏至第三日午時又出連舒卷須要變至十分農桑通訣育蠶之法始于擇種收繭取簇之中向陽明淨厚實者蛾出第一日者名苗蛾末後出者名末蛾皆不可用次日以後出者取之鋪連于槌箔雄雌相配至暮拋去雄蛾將母蛾于連上勻布所生子環堆者皆不用生蠶數足更就連上令覆養三五日挂時須蠶子向外恐有風磨損其子又冬至日及臘月八日浴時無令水極深浸浴取出比及月望數連一卷桑皮索繫定庭前立竿髙挂以受臘天寒氣年節後甕內竪連須令玲瓏安十數日候日髙時一出每隂雨後即便曬曝此蠶連浴養之法務本新書清明將甕中所頓蠶連遷于避風溫室酌中處懸挂穀雨日將連取出通見風日那表為裏左捲者却右捲右捲者却左捲每日交換捲那捲罷依前收頓比及蠶生均避風日生發勻齊又農家下蟻多用桃枝翻連敲打蟻下之後却掃聚以紙包裹稱見分兩布在箔上已後節節病生多因此弊今後比及蟻生當勻鋪蓐草煻火內燒棗一二枚先將蠶紙稱見分兩次將細細摻在蓐上蟻要勻稀連必頻移生盡之後再稱空連便知蠶蟻分兩依此生蠶百無一損今時謂如下蟻二兩往往止布一席重疊密壓不無損傷今後下蟻三兩決合勻布一箔慎勿貪多如己力止合放蟻三兩因為貪多便放四兩以致桑葉房屋椽箔人力柴薪俱各不給因而兩失農政全書士農必用曰生蟻惟在涼暖知時開掯得法使之莫有先後其法變灰色已全以兩連相合鋪于一淨箔上緊捲兩頭繩束卓立于無煙淨涼房內第三日晚取出展箔蟻不出為上若有先出者掃去不用每三連虛捲為一卷放新暖蠶室內候東方白將連於院內一箔上單鋪如有露于涼房中或棚下少頃移連入蠶房就地一箔上單鋪少間黑蟻齊生并無一先一後和蟻稱連記寫分兩又下蟻惟在詳欵稀勻使不致驚傷而稠疊蟻生既齊取新葉用快利刀切極細用篩子篩于中薄蓐紙上務要勻薄將連合于葉上蟻自緣葉上或多時不下連及緣上連背翻過又不下者並連棄了此殘病蟻也又蠶事之本惟在謹於謀始使不為後日之患蠶眠起不齊由於變生之不一變生之不一由於收種之不得其法故曰惟在謹於謀始又秦觀蠶書曰臘之日聚蠶種沃以牛溲浴于川毋傷其藉蠶連圖説蠶連蠶種紙也舊用連二大紙蛾生卵後又用線長綴通作一連故因曰連匠者嘗别抄以鬻之務本新書云蠶連紙厚為上薄紙不禁浸浴如用小灰紙更妙連須以時浴之浴畢挂時令蠶子向外恐有風磨損冬至日及臘月八日浴時毋令水極深浸浴取出比及月望數連一卷桑皮索繫定蠶連不得用麻繩繫挂如或不忌後多乾死不生本草陳藏器云以苧麻近蠶種則不生當逺之欽定授時通考卷七十二
