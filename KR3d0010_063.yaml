body:
  text: 農餘果一梅杏桃李梨檖樝榅桲棠梨沙棠棣櫻桃白櫻桃山櫻桃楊梅枇杷奈林檎蘋果山樝枳椇葡萄梅梅一名䕩實似杏大者如小兒拳小者如彈熟則黃微甘酸可啖生純青酸甚多食泄津液生痰損筋蝕脾傷腎弱齒為脯含之口香造煎堪久子赤者材堅白者材脆種類不一白者有緑蕚梅實大五月熟重葉梅結實多雙消梅實甘青且可生啖雖酢甚鬆脆多液無滓花重者實小單者大不宜熟亦不堪煎造冠城梅實甚大五月熟時梅實大五六月熟早梅四月熟冬梅實小十月可用不能熟紅者有鶴頂梅實大而紅鴛鴦梅梅譜云即多葉紅梅也結實必雙凡雙果必雙蒂惟此一蒂而結雙梅尤異雙頭梅或結並蒂小實不堪啖杏梅實扁而斑味似杏異品有氷梅實吐自葉罅不花色如氷玉無核含之自融如氷佳品也范成大梅譜江梅子小而硬具區志洞庭諸山有吐花酸實小味酸方吐花即可啖脆梅一名時裏梅實圓而大可以蜜漬及蒸製禮記內則桃諸梅諸卵鹽疏桃諸梅諸卵鹽者言食桃諸梅諸之時以卵鹽和之王肅云諸菹也謂桃菹梅菹即今之藏桃也藏梅也欲藏之時必先稍乾之故周禮謂之乾䕩夏小正五月煮梅為豆實齊民要術梅實小而酸核有韲文杏實大而甜核無文采梅任調食及韲杏則不任此用世人或不辨言梅杏為一物失之逺矣杏杏一名甜梅樹大實多形如彈丸有大如梨者生酢熟甜性熱生痰及癰疽不宜多食小兒産婦尤忌種類不一有金杏圓而黃熟最早味最勝一名漢帝杏謂武帝上林苑遺種也大如梨黃如橘出濟南白杏熟時色青白或微黃味甘淡而不酢出滎陽沙杏甘而多汁即世所稱水杏也梅杏黃而帶酢奈杏青而帶黃出鄴中金剛拳赤大而扁肉厚味佳甚又名肉杏山杏肉薄不堪食但可收仁用巴旦杏一名八擔杏出回回地今關西諸處皆有葉差小實小而肉薄核如梅皮薄而仁清甘鮮者尢脆美稱果之佳者又有赤杏黃杏廣志云出鄴中蓬萊杏黃而𢃄酢格物叢話杏實味香於梅而酸不及核與肉自相離其仁可入藥羣芳譜種桃樹接杏結果紅而且大又耐久不枯文獻通考杏多實不蟲者來年秋禾善五木者五榖之先欲知五榖但視五木故五果分五行所以表五榖又按五果之義夏之果莫先於杏五時之首寢廟必有薦而此杏適丁夏之時故特取之杏之枝葉華果皆赤故古者鑽燧夏取棗杏之火也桃桃實甘子繁故字從木從兆性酸甘熱可食多食令人有熱能發丹石毒生桃尤不宜多食有損無益性早實三年便結子五年即老結子便細十年必死以皮緊也若四年後用刀自樹本竪劙其皮至生枝處使膠盡出則多活數年種類頗多有崑崙桃一名王母桃一名仙人桃一名冬桃出洛中味甘美扁桃出波斯國形扁肉澀不堪食核狀如盒高五六丈圍四五尺葉似桃而濶大三月開白花花落結實如桃彼地名波淡樹仁甘美番人珍之北户録云形如半月狀出占卑國新羅桃子可食性熱方桃形微方餅子桃狀如香餅味甘油桃小於衆桃有赤斑㸃光如塗油花多子少不堪噉惟取仁出汴中巨核桃金桃形長色黃如金肉黏核多蛀熟遲用柿接者味甘色黃銀桃形圓色青肉不黏核其皮光澤如李一名光桃十月桃形圓色青肉黏核味甘酸十月中成熟一名古冬桃又名雪桃按爾雅云旄冬桃疏云桃子冬熟者不旄當即此也毛桃即爾雅所謂褫桃小而多毛核黏味惡不堪食其仁充滿多脂可入藥水蜜桃獨上海有之而顧尚寶西園所出尤佳其味亞于生荔枝雷震紅張七澤云每雷雨過輒見一紅暈最為難得他如紅桃緗桃白桃烏桃皆以色名五月早桃秋桃霜桃皆以時名胭脂桃絡絲桃皆以形名王敬美有言桃種最多金桃蜜桃灰桃之類多植園中取果夀星桃樹矮而花能結大桃亦竒種可玩桃殊不堪食客燕雜記京師中佳果有紅桃白銀桃小桃蟠桃合桃酒紅桃霜下桃肅寧八月桃禮記內則桃曰膽之疏桃多毛拭治去毛令色青滑如膽也或曰膽謂苦桃有苦如膽者擇去周禮饋食之籩其實桃夏小正六月煮桃桃也者柂桃也柂桃也者山桃也煮以為豆實也埤雅諺曰白頭種桃又曰桃三李四梅子十二言桃生三歲便放花果早於梅李故首雖已白其花子之利可待也種樹書桃樹接李枝則紅而甘梅樹接桃則脆桃樹接杏則大桃熟時墻面暖處寬深為坑收濕牛糞納坑中收好桃核十數枚尖頭向上坑中糞土蓋厚一尺深春芽生和土移種之羣芳譜凡種桃淺則出深則不生故其根淺不耐旱而易枯近得老圃所傳云於初結實次年斫去其樹復生又斫又生但覺生虱即斫令復長則其根入地深而盤結固百年猶結實如初又桃實太繁則多墜以刀橫斫其幹數下乃止又社日春根下土持石壓樹枝則實不墜桃子蛀者以煮猪首汁冷澆之或以刀疏斫之則穰出而不蛀如生小蟲如蚊俗名蚜蟲雖桐油灑之不能盡除以多年竹燈檠掛懸梢間則蟲自落甚驗李李一名嘉慶子爾雅翼云李木之多子者故從子本草云木之多子者多矣何獨李稱多子耶按素問言李味酸屬肝東方果也則李於五果屬木故得專稱爾實有離核合核無核之異小時青熟則各色有紅有紫有黃有緑又有外青內白外青內紅者大者如杯如卵小者如彈如櫻其味有甘酸苦澀之殊性耐久樹可得三十年雖枝枯子亦不細種類頗多有麥李南居李季春李木李御黃李均亭李擘李糕李中植李趙李御李赤李冬李離合李皆李之特出者他如經李杏李黃扁李夏李名李縹青李建黃李青皮李赤陵李馬肝李牛心李紫粉李小青李水李扁縫李金李鼠精李合枝李奈李晚李之類未可悉數建寧者甚甘今之李乾皆從此出爾雅棗李曰疐之疏謂治棗李皆去其疐疐者柢也羣芳譜移栽春月取近根小條栽之離大樹逺者不用待長移之别地性喜開爽宜稀栽南北成行率兩步一株太密聫隂則子小而味不佳樹下勤去草而不可耕耕則樹肥而無實如嫁李正月一日或十五日以磚石著李樹岐中則實繁又臘月中以杖微打樹岐間正月晦日復打可令足子又法以煮寒食醴酪火㮇著樹間亦良或曰桃樹接李則生子甘紅梨梨一名果宗一名快果一名玉乳一名蜜父北地處處有之南方惟宣城為勝二月開花上已日無風則結梨必佳有二種瓣圓而舒者果甘缺而皺者味酸果圓如榴頂微凹無尖瓣性甘寒無毒潤肺凉心消痰降火解瘡毒酒毒乳梨本草云又名雪梨出宣城皮厚肉實味長鵝梨本草云又名錦梨出河之南北皮薄漿多味頗短香則過之二梨皆入藥其餘水梨赤梨茅梨禦兒梨紫縻陽城夏梨秋梨種類非一他如紫香水梨本草云又名消梨出北地最為上品張公夏梨廣志云出洛陽北邙海內惟有一株廣都梨巨鹿豪梨廣志云重六斤數人分食之巨野梨新豐箭谷梨關西谷中梨廣志云關以西京兆右扶風界諸谷中梨率多供御味色香種種竒絶未可悉數本草紫花梨療心熱耳目記武宗時青城山邢道士以青丹兩粒取梨汁進之曰太白南溪紫花梨也夀春公主于真定得一株及秋實手選而進之含消梨三輔黃圖漢武帝御宿園出大梨如五升瓶落地則破其取梨先以布囊承之號曰含消真定御梨魏文帝詔真定郡梨大若拳甘若蜜脆若菱可以解煩釋悁禮記內則柤梨曰攢之疏攢之者鑽治其螙處也爾雅梨山樆疏此果在山之名則曰樆人植之曰梨種樹書桑上接梨則脆而甘美羣芳譜種梨梨熟時埋之經年至春生芽次年分栽溉以肥水至冬葉落附地刈之以炭花燒頭二年即結子若穭生及種而不栽則結子遲每梨百十餘子惟二子生梨餘皆生杜又栽梨春分前十日取旺梨笋如拐樣截其兩頭火燒鐵器烙定津脈臥栽於地即活又接梨取棠杜臂以上者大者接五枝小者二三枝梨葉微動為上時欲開莩為下時先作麻紉纒十數匝以小利鋸截杜令離地五六寸將原幹用利刃貼皮劙開尖竹籖刺入皮木之際令深一尺許預取結梨旺嫩枝向陽者長五六寸削如馬耳名曰梨貼用口含少時以借其氣插入杜樹孔中大小長短削與所刺等拔去竹籖即插梨貼至所探處緊縛勿動搖以綿裹杜樹頂封熟泥于上以土培覆令梨僅出頭仍以土壅四畔當梨上沃水水盡以土覆之務令堅密梨枝甚脆培土時須謹慎若著掌則芽折梨貼須去黑皮勿傷青皮傷青皮則不活梨既生杜旁有葉即去之勿分其力月餘自發長即生梨梨生用箬包裹勿為象鼻蟲所傷又云凡接梨園中用旁枝葉得四散庭前用中心取其枝幹直上用根邊小枝樹形可喜五年方結子用鳩根老枝三年即結子但樹醜若逺道取貼根下燒三四寸可行數百里猶生又藏梨初霜即收多經霜不能至夏於屈下掘深窨坑底無令潤濕收梨在中不須覆蓋便可經夏摘時須好接勿令損傷物類相感志梨與蘿蔔相間收或削梨蒂種于蘿蔔內藏之皆可經年不爛本草就樹上以囊包裹過冬乃摘亦妙檖附爾雅檖蘿注今陽檖也實似梨而小酢可食陸璣詩疏檖一名赤蘿一名山梨也今人謂之陽檖實似梨但小耳一名鹿梨一名鼠梨本草李時珍曰山梨野梨也處處有之梨大如杏可食其木文細密赤者文急白者文緩樝附樝一名和圓子一名木桃處處有之孟州特多小於木瓜更酢澀色微黃蒂核皆粗核中之子小而圓味劣於梨與木瓜而入蜜煎湯則香美過之去惡心咽酸止酒痰黃水功與木瓜相近禮記內則柤梨薑桂注柤梨之不臧者風土記柤梨屬內堅而香榅桲附榅桲似樝子而小氣香辟衣魚樹如林檎花白緑色味甘食之宜淨洗去毛恐損肺不宜多食同車螯食發疝氣述異記江淮南人至北見榅桲以為樝子羣芳譜榅桲出關陜沙苑者更佳棠梨棠梨實如小楝子霜後可食其樹接梨甚佳處處有之有甘酢赤白二種爾雅杜甘棠注今之杜梨又杜赤棠白者棠疏赤者為杜白者為棠鄭康成毛詩箋北人謂之杜梨南人謂之棠梨通志甘棠謂之棠梨又海棠子名海紅爾雅赤棠也狀如木瓜而小二月開花八月熟陸璣詩疏甘棠與赤棠同耳但子有赤白美惡白棠甘棠也子多酸美而滑赤棠子澀而酢木理亦赤可弓材本草牝曰杜牡曰棠或云澀者杜甘者棠杜者澀也棠者糖也齊民要術棠熟時收種之否則春月移栽八月初天晴時摘葉薄布曬令乾可以染綘必候天晴時少摘葉乾之復晴則摘慎勿頓收若遇隂雨則浥浥不堪染綘也成樹之後歲收絹一百匹亦可多種利乃勝桑也沙棠附山海經崑崙之丘有木焉其狀如棠黃華赤實其味如李而無核名曰沙棠可以禦水食之使人不溺本草今嶺外寧鄉瀧水羅浮山中皆有之棣附棣一名郁李一名鬱李一名爵李一名車下李一名鬱梅一名爵梅山野處處有之花及子並似木李惟子小如櫻桃熟赤色五月熟可食又可入藥陸璣詩疏許慎曰鬱白棣樹也如李而小正白又有赤棣樹亦似白棣葉如刺榆而嫩圓子正赤羣芳譜性潔喜暖日和風澆宜清水忌肥核仁氣味甘苦酸平而潤無毒治大腹水腫面目四肢浮腫利小便通水道消宿食下結氣宣大腸氣澀滯燥澀不通櫻桃櫻桃本草衍義云以其形肖桃故曰櫻桃綱目云其顆如瓔珠故謂之櫻一名楔一名荆桃爾雅云楔荆桃注云今櫻桃最大而甘者謂之崖蜜一名牛桃一名英桃見博物志一名鶯桃一名含桃說文云鶯桃鶯鳥所食故又曰含桃一名朱櫻陶𢎞景本草經注云櫻桃即今朱櫻埤雅云其顆大者如彈丸小者如珠璣生時青及熟色鮮瑩深紅者為朱櫻紫色皮內有細㸃者為紫櫻味最珍重又有正黃明者謂之蠟櫻小而紅者謂之櫻珠味皆不及極大者有若彈丸核細而肉厚尤難得膳夫録云大而殷者曰吳櫻桃黃而白者曰櫻桃小而赤者曰水櫻桃味甘無毒調中益氣美志止泄精水榖痢令人好顔色多食令人吐有暗風及喘嗽濕熱病人忌食小兒尤忌禮記月令羞以含桃先薦寢廟疏案月令諸月無薦果之文此獨羞含桃者以此果先成異於餘物故特記之山家清供結實時須張網以驚鳥雀置葦箔以護風雨若經雨則蟲自內生人莫之見用水浸良久則蟲皆出乃可食羣芳譜種植二三月間分有根枝栽土中糞澆即活仍記隂陽否則不生即生亦不結實白櫻桃附因樹屋書影白櫻桃生京師西山中微酸不及朱櫻之甘碩也山櫻桃附本草山櫻桃一名朱桃一名麥櫻一名英豆一名李桃樹如朱櫻但葉尖長不團子小而尖生青熟黃赤亦不光澤而味惡不堪食味辛平無毒楊梅楊梅一名朹子生江南嶺南山谷間㑹稽産者為天下冠吳中楊梅種類甚多名大葉者最早熟味甚佳本出苕溪移植光福山中尤勝又次為青蒂白蒂及大小松子此外味皆不及樹若荔枝葉細青如龍眼及紫瑞香本草云楊梅樹葉冬月不凋二月開花結實形如楮實子肉在核上無皮殼五月熟生白熟則有白紅紫三色紅勝於白紫勝於紅凡楊梅顆大核細為上鹽藏蜜漬糖置火酒浸皆佳可致逺多食令人傷熱食核中仁可解味酸甘微熱滌腸胃除煩憒惡氣久食損齒及筋發瘡致痰羣芳譜種植性宜山地核投糞池中浸六月取出收潤土中三月鋤地種之待長尺許次年移栽三四年後以生子枝接之次年仍移栽山地多留宿土臘月內離根四五尺於高處開溝灰糞壅之不宜著根每遇雨肥水滲下則結子大而肥物類相感志桑樹接楊梅則不酸樹上生癩以甘草釘之則去枇杷枇杷樹高丈餘易種肥枝長葉微似栗大如驢耳背有黃毛形如枇杷故名隂密婆娑可愛四時不凋冬開白花三四月成實簇結有毛大者如雞子小者如龍眼味甘而酢白者為上黃者次之皮肉薄核大如茅栗相傳枇杷秋萌冬花春實夏熟備四時之氣他物無與類者襄漢吳蜀淮揚閩嶺江西湖南北皆有廣志云無核者名焦子出廣州味甘酸平無毒止渴下氣利肺氣止吐逆潤五藏主上焦熱可克果食多食發痰傷脾同炙肉及熱麵食患熱黃疾花治頭風鼻流清涕木白皮止吐逆不下食葉治肺胃病取其下氣氣下則火降痰順而逆嘔咳渴皆愈學圃餘疏枇杷出東洞庭者大自種者小然却有風味獨核者佳蓋他果須接乃生獨此果直種之亦能生也物類相感志枇杷不宜糞奈奈一名頻婆與林檎一類而二種江南雖有西土最豐樹與葉皆似林檎而實稍大味酸微帶澀可栽可壓白者為素奈赤者為丹奈亦曰朱奈青者為緑奈皆夏熟本草凉州有冬奈冬熟子帶碧色性寒多食令人肺家膨脹病人尤甚廣志西方多奈家家收切曝乾作脯十百斛以為蓄積謂之頻婆糧林檎林檎一名來禽一名蜜果一名文林郎果一名冷金丹元氏長慶集林檎花一名月臨花生渤海間以奈樹搏接二月開粉紅花子如奈小而差圓六七月熟色淡紅可愛有甜酸二種有金紅水蜜黑五色甜者早熟而味脆美酸者熟差晚須爛方可食黑者色如紫奈有冬月再實者性甘溫下氣消渴多食脹滿或云食多覺膨脹並嚼其核即消一云食其子令人心煩生者食多生瘡癤學圃餘疏花紅即古林檎王羲之帖青李來禽子皆囊盛為佳函封多不生物類相感志林檎樹生毛蟲埋蠶蛾於下或以洗魚水澆之即止蘋果蘋果按本草不載蘋果而釋奈云一名頻婆據採蘭雜志學圃餘疏頻婆又當屬此名蓋與奈一類二種也出北地燕趙者尤佳接用林檎體樹身聳直葉青似林檎而大果如梨而圓滑生青熟則半紅半白或全紅光潔可愛玩香聞數步味甘鬆未熟者食如棉絮過熟又沙爛不堪食惟八九分熟者最美採蘭雜記燕地有頻婆味雖平淡夜置枕邊微有香氣即佛書所謂頻婆華言相思也學圃餘疏北土之頻婆即花紅一種之變也吳地素無近亦有移植之者山樝山樝一作查其味似楂故名一名棠梂子一名羊梂朹字之誤一名山裏果一名茅樝一名猴樝一名鼠樝本草云生於川原茅林中猴鼠喜食之故有諸名一名朹子一名槧梅爾雅云朹槧梅一名赤瓜子本草云當作赤棗樝狀似赤棗虞衡志有赤棗王璆百一方云山裏紅果俗名酸棗正合此義其類有二種皆生山中一種小者樹高數尺多枝柯葉有五尖色青背白丫間有刺三月開小白花五出實有赤黃二色九月熟其核狀如牽牛子色微白映紅甚堅一種大者樹高丈餘花葉皆同但實稍大而色黃緑皮澀肉虛初甚酸澀經霜乃紅可食出滁州青州者佳為消滯要藥語云山樝有爛肉之功小者為棠朹子茅樝猴楂堪入藥肥大者為羊朹子可作果食入藥者切四瓣去核曬乾收用枳椇枳椇一名蜜􅀢㯳音止矩一名蜜屈律皆屈曲不伸之義此樹多枝而曲其子亦拳曲故名一名木蜜一名木珊瑚一名雞距子一名雞爪子一名樹蜜一名木餳味美如餳蜜一名白石一名白實一名木石一名木實木高三四丈葉圓大如桑柘夏月開花枝頭結實如雞爪形長寸許紐曲開作兩三岐儼若雞之足距嫩時青色經霜乃黃嚼之味甘如蜜每開岐盡處結一二小子狀如蔓荆子內有扁核赤色如酸棗仁形禮記曲禮婦人之贄椇榛脯修棗栗爾雅翼古者人君燕食所加庶羞凡三十一物椇其一也又為婦人之贄荆楚之俗亦鹽藏荷裹以為冬儲今不以為重賤者食之而已羣芳譜今山西甚多俗名拐棗葡萄葡萄古作蒲桃又作蒲陶苗作藤蔓而極長大盛者一二本綿被山谷間三月間開小花成穗黃白色旋著實七八月熟可生食可釀酒最難乾不乾不可食今太原平陽皆製乾貨之四方西北人食之無恙東南食之多病熱其根莖中空相通暮溉其根至朝而水浸其中故俗呼其苗為木通澆以米泔水最良以麝入其皮則葡萄盡作香氣以甘草作針針其根則立死種樹書葡萄欲其肉實當栽於棗樹之旁於春鑽棗樹上作竅子引葡萄枝入竅中透出至二三年其枝既長大塞滿樹竅便可斫去葡萄根托棗根以生便得肉實如棗北地皆如此法種羣芳譜水晶葡萄暈色帶白如著粉形大而長味甚甘西畨者更佳馬乳葡萄形大而長味甘紫葡萄黑色有大小二種酸甜二味緑葡萄出蜀中熟時色緑出西番者名兔睛勝糖蜜無核尤異品也瑣瑣葡萄出西番實小如胡椒今中國亦有種者雲南出者大如棗味尤長唐史波斯國所出大如雞卵也又種植取肥枝如拇指大者從有孔盆底穿過盤一尺於盆內實以土放原架下時澆之候秋間生根從盆底外截斷另成一架澆用冷肉汁或米泔水又收藏北方天寒初冬須以草裹埋地中尺餘俟春分後取出臥置地數日然後架起子生時去其繁葉使霑風露則結子肥大廣羣芳譜今塞外有十種葡萄曰伏地公領孫哈蜜公領孫哈蜜紅葡萄哈蜜緑葡萄哈蜜白葡萄哈蜜黑葡萄哈蜜瑣瑣葡萄馬乳葡萄伏地黑葡萄伏地瑪瑙葡萄欽定授時通考卷六十三
