  text: 欽定四庫全書欽定授時通考卷三十六
  hash: sha256:f086cff50402d4ab95b821fc021e274d72e4d515251bfa88d204e9e4381275e9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3d0010_WYG_036-1a, image: WYG0732/WYG0732-0454c.png}
body:
  text: 功作耘耔詩小雅或耘或耔黍稷薿薿傳耘除草也耔附根也疏食貨志云苗葉以上稍耨壠草因壝其土以附苗根比成壠盡而根深能風與旱故薿薿而盛也左傳農夫之務去草芟夷藴崇之絶其本根勿使能殖則善者伸矣又是穮是蓘必有豐年管子為國者使民寒耕而熱耘荀子耘耨失薉呂氏春秋莖生於地者五分之以地莖生有行故遫長弱不相害故遫大衡行必得縱行必術正其行通其風夬心中央帥為冷風苗其弱也欲孤長也欲相與居其熟也欲相扶是故三以為族乃多粟又凡禾之患不俱生而俱死是故先生者美米後生者為粃是故其耨也長其兄而去其弟樹肥無使扶疏樹墝不欲專生而族居肥而扶疏則多粃根扇迫也墝而專居則多死不能自蔭潤其根故多枯死不知稼者其耨也去其兄而養其弟不收其粟而收其粃上下不安則禾多死漢書高五王傳劉章曰深耕穊種立苗欲疏非其種者鋤而去之鹽鐵論農夫不畜無用之苗無用之苗苗之害也鋤一害而衆苗成齊民要術鋤耨以時諺云鋤頭三寸澤古人云耕鋤不以水旱息功必獲豐年之收又凡五穀惟小鋤為良小鋤者非直省功穀亦倍勝大鋤者草根繁茂用功多而收益少良田率一尺留一科諺云回車倒馬擲衣不下皆十石收言大稀大穊之收皆均平也薄地尋壠囁之不耕故苗出隴則深鋤鋤不厭數周而復始勿以無草而暫停鋤者非止除草乃地熟而穀多糠薄米息鋤得十遍便得八米也春鋤起地夏為鋤草故春鋤不用觸溼六月已後雖溼亦無嫌春苗既淺陰未覆地濕鋤則地堅夏苗陰厚地不見日故雖濕亦無害也陳敷農書耘除之草和泥渥漉深埋禾苗根下漚罨既久則草腐爛而泥土肥美嘉穀蕃茂矣纂文養苗之道鋤不如耨耨不如鏟農桑通訣稂莠不除則禾稼不茂種苗者不可無鋤藝之功也說文云鋤助也以助苗也凡穀須鋤乃可滋茂第一次撮苗曰鏃第二次平壠曰布第三次培根曰擁第四次添功曰復一次不至則稂莠之害秕稗之雜入之矣諺云穀鋤八遍餓殺狗為無糠也其穀畝得十石斗得八米此鋤多之效也其所用之器自撮苗後可用以代耰者名曰耬鋤其功過鋤功數倍所辦之田日不啻二十畝或用劐子其制頗同如耬鋤過苗間有小豁眼不到處及隴間草薉未除者亦須用鋤理撥一遍為佳别有一器曰鏟營州以東用之又異於此又凡耘苗之法亦有可鋤不可鋤者旱耕塊撥苗薉同孔出不可鋤治此耕者之失難責鋤也又大抵耘治水田須用藝瓜荆揚厥土塗泥農家皆用此法又有足耘為木杖如拐子兩手倚之以用力以趾塌撥泥上草薉擁之苗根之下則泥沃而苗興其功與藝瓜大類亦各從其便也徐光啓曰不如手藝之細今創有一器曰藝蕩以代手足工過數倍宜普效之徐光啓曰藝蕩是二事俱不可已又鋤後復有薅拔之法稂莠荑稗雜其稼出鋤後莖葉漸長便可分别非薅不可徐光啓曰薅即藝也故有薅鼓薅馬之說北方村落之間多結為鋤社十家為率先鋤一家之田本家供其飲食其餘次之旬日之間各家田皆鋤治自相率領樂事趨功無有偷惰間有患病之家共力助之故田無荒穢嵗皆豐熟秋成之後豚蹄盂酒遞相犒勞名為鋤社甚可效也今採托南北耘耨之法備載於篇庶善稼者相其土宜擇而用之以盡鋤治之功也各種耘耔法稻淮南子蘺先稻熟而農夫薅之者不以小利害大穫也注蘺水稗齊民要術水稻苗長七八寸陳草復起以鐮浸水芟之草悉膿死稻苗漸長復須薅又旱稻苗長三寸耙勞而鋤之鋤惟欲速稻苗性弱不能扇草故宜速鋤之苗高尺許則鋒大雨無所作宜冒雨薅之陳敷農書耘田之法必先審度形勢自下及上旋乾旋耘先於最上處收滀水勿令水走然後自下旋放令乾而旋耘不問草之有無必先以手排摝務令稻根之傍液液然而後已次第從下放上耘之即無鹵莾滅裂之病草死土肥水不走失今見農者不先自上滀水頓然放令乾了及工夫不逮泥乾堅難耘摝則必率略水已走失不幸無雨遂致旱枯無所措手如是失者十常八九農桑通訣苗高七八寸則耘之苗既長茂復事薅拔以去稂莠羣芳譜稻初發時用摥耙於稞行中摥去稗草易耘搜鬆稻根則易旺摥後用水耘去草盡淨黍齊民要術凡黍穄田鋤三遍乃止鋒而不耩苗晚耩即多折也又候黍粟苗未與隴齊即鋤一遍黍經五日更報鋤第二遍候未蠶老畢報鋤第三遍如無力則止如有餘力秀後更鋤第四遍稷齊民要術苗生如馬耳則鏇鋤諺曰欲得粟馬耳鏇稀豁之處鋤而補之苗高一尺鋒之耩者非不壅本苗深穀草益實然令地堅硬乏澤鋤得五遍不須耩又穀第一遍科定每科只留兩莖更不得留多每科相去一尺兩隴頭空務欲深細第一遍鋤未可全深第二遍惟深是求第三遍較淺於第二遍第四遍較淺穀科大則根浮故也農桑通訣耘苗之法第一次曰撮苗第二次曰布第三次曰擁第四次曰復俗曰添功一功不至則稂莠之害秕糠之雜入之矣撮苗後用一驢帶籠觜挽耬鋤初一人牽之慣熟不用止一人輕扶入土二三寸其深痛過鋤力三倍所辦之田日不啻二十畝今燕趙用之名劐子麥汜勝之書麥生黃色傷於太稠稠者鋤而稀之秋鋤以棘柴耬之以壅麥根故諺曰子欲富黃金覆謂秋鋤麥曵柴壅麥根也至春凍解棘柴曵之突絶其乾黃須麥生復鋤之到榆莢時注雨止候土白背復鋤如此則收必倍齊民要術種麥正月二月勞而鋤之三月四月鋒而更鋤鋤麥倍收皮薄麵多而鋒勞各得再遍為良也農桑通訣麥苗既秀不須再鋤農桑撮要防霧傷麥但有沙霧將檾麻散拴長繩上侵晨令兩人對持其繩於麥上牽拽抹去沙霧則不傷麥天工開物凡麥耕種之後勤議耨鋤凡耨草用濶面大鎛麥苗生後耨不厭勤有三遍四遍者餘草生機盡誅鋤下則竟畝菁華盡聚嘉實矣功勤易耨南與北同也豆汜勝之書大豆生五六葉鋤之小豆生布葉鋤之生五六葉又鋤之大豆小豆不可盡治也古所不盡治者豆生布葉豆有膏盡治之則傷膏傷則不成而民盡治故其收耗折也齊民要術大豆鋒耩各一鋤不過再小豆鋒而不耩鋤不過再陳敷農書種豆耘鋤如麻農桑通訣大豆當及時鋤治上土使之葉蔽其根庶不畏草羣芳譜豆才出便鋤草淨為佳種樹書種諸豆不及時去草必為草所蠧耗結實不多諺云豆耘花豆雖開花亦可耘也脂麻汜勝之書胡麻生布葉鋤之齊民要術油麻鋤兩遍止亦不厭旱鋤又胡麻鋤不過三遍陳敷農書油麻才甲拆即耘鋤令苗稀疏一月凡三耘鋤則茂勝天工開物種胡麻或治畦圃或壟田畝耨草之功惟鋤是視種樹書種麻若不及時去草必為草所蠧耗雖結實亦不多諺云麻耘地言麻須初生時耘也耘耔具各圖說錢鎛耨耰鉏鏟耬鋤劐鐙鋤耘爪耘杷耘蕩薅馬蓑笠臂篝覆殼屝薅鼓錢鎛圖說錢詩注銚也唐韻作􅯘器也非鍬屬也兹度其制似鍬非鍬殆與鏟同鏟柄長二尺刃廣二寸以剗地除草體用即與錢同鎛耨别名也詩曰其鎛斯趙爾雅疏云鎛耨一器或云鉏或云鋤屬考工記粵獨無鎛何也粵之無鎛非無鎛也夫人而能為鎛也耨圖說耨除草器呂氏春秋曰耨柄尺其耨六寸高誘注云耨藝苗也六寸所以入苗間廣雅又云定謂之耨古農法云苗生葉以上稍耨壟草因隤其土以附苗根此耨之功也耰鉏圖說耰鉏耰為鉏柄也說文鋤立薅也其刃如半月比禾壟稍狹上有短銎以受鋤鉤鉤如鵝項下帶深袴以受木柄鉤長二尺五寸柄亦如之北方陸田舉皆用此江淮間雖有陸田習俗水種但用直項鋤頭刃雖鋤也其用如斸是名钁鋤故陸田多不豐收今表此耰鋤之效并其制度庶南北通用鏟圖說鏟廣雅曰䕙鏟柄長二尺刃廣二寸以剗地除草此古之鏟也今鏟與古制不同柄長數尺首廣四寸計兩手持之但用前進攛之剗去籠草就覆其根特號敏捷今營州之東燕冀以北農家種溝田者皆用之耬鋤圖說耬鋤種蒔直說云此器出自海壖號曰耬鋤耬制頗同獨無耬斗但用耬鋤鐵柄中穿耬之橫桄下仰鋤刃形如杏葉撮苗後用一驢挽之過鋤力三倍燕趙名曰劐子制又小異劐子第一遍即成溝子穀根未成不耐旱耬鋤刃在土中故不成溝子第二遍加劈土木雁翅方成溝子其分土壅穀根劈土用木厚三寸濶三寸長八寸取成三角樣前為尖中作一竅長一寸濶半寸穿於鐵鋤柄壓鋤刃上耬鋤有不到處用鋤理撥一遍即為全功也劐圖說劐燕趙之間用之如鑱而小中有高脊長四寸許濶三寸插於耬足背上兩竅以繩控於耬之下桄其金入地三寸許鐙鋤圖說鐙鋤剗草具也形如馬鐙其踏鐵兩旁作刃甚利上有圓銎以受直柄用之剗草故名鐙鋤柄長四尺比常鉏無刃角不致動傷苗稼根莖或遇少旱或熇苗之後壠土稍乾荒薉復生非耘耙耘爪所能去者故用此剗除特為健利此創物者隨地所宜偶假其形而取便於用也嘗見江東農家用之耘爪圖說耘爪耘水田器也用竹管隨手指大小截之長可逾寸削去一邊狀如爪甲或好堅利者以鐵為之穿於指上用耘田以代指甲猶鳥之用爪也陸龜䝉云耘者去莠舉手務疾而畏晚鳥之啄食務疾而畏奪法其疾畏故曰鳥耘嘗觀農人在田傴僂伸縮以手爪耘其草泥無異鳥足之爬抉豈非鳥耘者耶耘杷圖說耘杷以木為柄以鐵為齒用耘稻禾王褎詩所謂鐵作渠疏代爪耘者也耘蕩圖說耘蕩江浙之間新制之形如木屐而實長尺餘闊約三寸底列短釘二十餘枚簨其上以貫竹柄柄長五尺餘耘田之際農人執之推蕩禾壟間草泥使之溷溺則田可精熟既勝耙鋤又代手足水田有手耘足耘所耘田數日復兼倍薅馬圖說薅馬薅禾所乘竹馬也似籃而長如鞍而狹兩端攀以竹系農人薅禾之際置於跨間斂裳於內而上控於腰畔乘之兩股既寬義行隴上不礙苗行故得專意摘剔稂莠速勝鋤耨蓑笠圖說蓑雨衣無羊詩云何蓑何笠毛注曰蓑所以備雨笠所以禦暑唐韻云蓑草名可為雨衣又名襏襫說文云秦謂之􅒝爾雅曰薃侯莎蓑衣以沙草為之故音同莎又名薛六韜農器篇曰蓑薛簦笠今總謂之蓑雨具中最為輕便笠戴具也古以臺皮為笠詩所謂臺笠緇撮今之為笠編竹作殼裹以籜箬或大或小皆頂隆而口圓可庇雨蔽日以為蓑之配也臂篝圖說臂篝狀如魚笱篾竹編之又呼臂籠江淮之間農夫耘苗或刈禾穿臂於內以帣衣袖猶北俗芟刈草禾以皮為袖套皆農家所必用者覆殼圖說覆殼一名鶴翅一名背篷篾竹編如龜殼加以籜箬覆於人背繩繫肩下耘耨之際以禦畏日兼作雨具下有卷口可通風氣又分雨溜適當盛暑田夫得此以免曝烈之苦亦一壺千金之比也屝圖說屝草履也左傳曰共其資糧屝屨說文曰屝草履也孔疏云屝屨俱是在足之物善惡異名耳喪服傳曰疏屨者粗薊之屝也是屝用草為之薅鼓圖說薅鼓曾氏農書序云薅田有鼓自入蜀見之始則集其來既來則節其作既作則防其所以笑語而妨務也其聲促烈清壯有緩急抑揚而無律呂朝暮曾不絶響欽定授時通考卷三十六
