body:
  text: 桑政彚考詩經鄘風降觀于桑注桑木名葉可飼蠶者觀之以察其土宜也孟子五畝之宅樹之以桑史記貨殖傳齊帶山海膏壤千里宜桑麻又鄒魯濱洙泗頗有桑麻之業漢書食貨志還廬樹桑三國志諸葛亮傅成都有桑八百株子孫衣食自有餘饒晋書王宏傳宏為汲郡太守撫百姓如家耕桑樹藝屋宇阡陌莫不躬自教示梁書沈瑀傳瑀為建徳令教民一丁種十五株桑魏書食貨志一人給田二十畝種桑五十隨書食貨志每丁給永業二十畝為桑田其中種桑五十株北史蘇綽傅三農之隙及隂雨之暇當敎人種桑舊唐書憲宗本紀勅天下州府民户毎田一畝種桑二樹又武宗本紀勅勸課種桑宋史太祖本紀禁伐桑棗又食貨志諭民有能廣植桑棗墾開荒田者止輸舊租又中書議勸民栽桑又都省言淮民復業宜先勸課農桑令丞植桑三萬株至六萬株守倅部内植二萬株以上並論賞有差元史食貨志仁宗以苖好謙所至植桑皆有成效於是風示諸道命以為式是年十一月命各社出地共蒔桑苖以社長領之又姜彧傳彧知濱州時課民種桑歲餘新桑徧野人名爲太守桑尚書緯桑者箕星之精木蟲食葉為文章種類書經厥篚檿絲傳檿桑蠶絲中琴瑟絃爾雅釋木桑㸤音片有葚梔疏說文云葚桑實也郭云㸤半也舎人曰桑樹一半有葚半無葚為梔又女桑桋桑注今俗呼桑樹小而條長者為女桑疏女桑一名桋桑又檿桑山桑郭槖駝種樹書雞脚桑葉花而薄得繭薄而絲少又白桑葉大如掌而厚得繭厚而堅絲每倍常桑葉生黄衣而皴者號曰金桑非特蠶不食而木亦將槁腐矣又先葚而後葉者葉必少齊民要術種取黒魯葚黄魯葚不耐乆諺曰魯桑百豐絲帛言其桑好功省用多農桑要㫖平原淤壌土肥地虛荆葉魯桑種之俱可若地連山陵土脉赤硬止宜荆桑農桑通訣桑種甚多不可徧舉世所名者荆與魯也荆桑多葚魯桑少葚葉薄而尖其邉有瓣者荆桑也凡枝榦條葉堅勁者皆荆桑類也葉圓厚而多津者魯桑也凡枝榦條葉豐腴者皆魯之類也荆之類根固而心實能乆逺宜為樹魯之類根不固心不實不能乆逺宜為地桑然荆之條葉不如魯葉之茂盛當以魯葉條接之則能乆逺而又盛茂也魯為地桑而有壓桑之法傳轉無窮是亦可以乆逺也荆桑所飼蠶其絲堅韌中紗羅用禹貢稱厥篚檿絲注曰檿山桑也此荆之美而尤者也魯桑之類宜飼大蠶荆桑宜飼小蠶又齊民要術載収葚之黒者剪去兩頭惟取中間一截蓋兩頭者其子差細種則成雞桑花桑中間一截其子堅栗則枝榦堅强而葉肥厚農政全書韓氏直説曰地桑須於近井園内栽之有草則鋤無雨則澆比及蠶生可澆三次其葉自然早生桑種自有早生者遲生者須擇其早生為地桑則可又鍾化民曰桑有二種一種有桑葚即以桑葚植地一二月即出一種將桑樹柔條攀至於地以泥壓於其上每以桑眼卽發一枝待至二三尺長其桑有根用剪剪下移種于地上即成桑樹又黄省曾藝桑總論曰有地桑出於南潯有條桑出於杭之臨平其鬻之時以正月之中上旬其鬻之地以北新闗内之江漲橋旭旦時擔而至陳於梁之左右午而散大者株以二釐其長八尺又凡擇桑之本也皺皮者其葉必小而薄白皮而節疎芽大者為柿葉之桑其葉必大而厚是堅繭而多絲又髙而白者宜山岡之地或墻隅而籬畔又短而青者宜水鄉之地又其青桑無子而葉不甚厚者是宜初蠶又望海之桑種之術與白桑同又紫藤之桑其種髙大又博聞錄曰白桑少子壓枝種之若有子可便種須用地隂處則其葉厚大得繭重實絲每倍常栽植汜勝之書種桑法五月取椹著水中即以手漬之以水灌洗取子隂乾治肥田十畆荒田乆不耕者尤善好耕治之每畝以黍椹子各三升合種之黍桑當俱生鋤之桑令稀疏調適黍熟獲之桑生正與黍髙平因以利䥥摩地刈之曝令燥後有風調放火燒之常逆風起火桑至春生一畝食三箔蠶齊民要術桑柘熟時収黒魯葚即日以水淘取子曬燥仍畦種治畦下水一如葵法常薅令淨明年正月移而栽之仲春季春亦得率五尺一根不用耕故凡栽桑不得者無他故正悉犂撥耳是以須穊犂者心雖慎率多死矣且穊則長疾大都種葚長遲不如墨枝之速無栽者乃種葚也其下常劚掘種菉豆小豆二豆良美潤澤栽後二年慎勿采沐小采者長倍遲大如臂許正月中移之亦不須髠率十歩一樹隂相接者則妨禾豆行欲小掎角不用正相當相當者則妨犂須取栽者正月二月中以鈎弋壓下枝令著地條葉生髙數寸仍以燥土壅之土濕則爛明年正月中截取而種之住宅上及園畔固宜即定其田中種者亦如種葚法先穊種一二年然後更移之又凡耕桑田不用近樹傷桑破犂所謂兩失其犂不著處劚㫁令起砍去浮根以蠶矢糞之去浮根不妨耬犂又種椹而後移栽移栽而後布行又剝桑十二月為上時正月次之二月為下大抵桑多者宜苦斫少者宜省剝郭槖駝種樹書種桑取葚子水淘淨暴乾熟耕地畦種又撒子種桑不若壓條而分根莖又浙間植桑斬其葉而植之謂之稼桑却以螺殻覆其頂恐梅雨侵損其皮故也二年卽盛又午日不得鋤桑園農桑通訣齊民要術載収葚之黒者將種之時先以柴灰淹糅次日水淘去輕浮不實者曬令水脉才乾種乃易生士農必用種子宜新不宜陳新葚種之為上隔年春種多不生䕃畦撘棚為上􅐨麻次之黍苖又次之桑芽出間令相去五七寸營造尺寸也他倣此頻澆過伏可長至三尺割去􅐨麻至十月内附地割了撒亂草走火燒過火不可大恐損根糞草蓋至來春把耬去糞草澆每一科自出芽三數箇留旺者一條已成根則不須䕃可頻澆至秋魯桑可長五七尺荆桑可長三四尺魯桑可移為地桑荆桑可入園飬之又地桑之功惟在治之如法不致荒燥無樹桑之家純用地桑則人力倍省有樹桑兼地桑之家樹桑既成地桑可止而勿用加澆鋤之功使之滋長至其蠶大眠之後或樹桑不能時至則可槩取地桑使晚蠶至終者不至缺食又布地桑法墻圍成園將園内地或牛犁或钁劚熟方五尺内掘一坑毎地一畝合栽二百四十科方深各二尺坑内下熟糞三升生糞不中壯地少用和土匀下水一桶調成稀泥將畦内種成魯桑連根掘出一科自根上留身六七寸其餘截去截斷處火鏊上烙過每一坑栽一根將根坐於泥中欲疾見功者栽二根按至坑底提三五次欲令根須皆順按桑身頂與地平擁周圍熟土令坑滿次日築實匝坑四邊築下土至半坑根下土自實不實則根土不相著多懸死上半坑擁熟土輕築令平滿附身土不宜築實實則芽難生用虛土封堆如大鏊子様可厚五七寸周圍自成環池水澆於内芽出於土四五指毎一根止留一二條澆鋤如法當年可長五尺餘次年附根割條葉飼蠶須用厚背剛䥥一割要㫁鈍䥥一割不能斷則條楂不齊雨浸傷根地桑不要放出身只要條從土中長出身出土名為脚髙身上所長條不旺又多被風雨擺折割過處每一根盤周圍數芽出每一科可許留四五條餘者間去年年附地割之根漸旺留條漸多野魯桑根科栽之亦可全如前法也桑三年後正長旺五年後根相交根交則不旺春時將相交根砍㫁掘去添上糞土或澆過或得雨即復長旺次後斟酌其根欲大將壓成栽子圍别園如前法栽之三年後新桑茂盛養蠶斫桑時將舊桑根上只留一條隔年自成一根分出栽為行桑如此傳轉無有盡期然魯桑斫飼蠶其絲少堅軔可斟酌栽荆桑樹於大眠後以葉間飼之又種藝之宜惟在審其時月又合地方之宜使之不失其中春分前後十日十月内並為上時春分前後以及發生也十月號陽月又曰小春木氣生長之月故宜栽培以養元氣此洛陽方左千里之所宜其他地方隨時取中可也又曰桑者易生之物除十一月不生活餘月皆可仍須於園内稀種􅐨或蔴黍為䕃毎嵗三月三日晴雨卜桑之貴賤又養桑法墻圍成園大小隨人所欲將園内地耕劚熟方三尺許掘一坑坑之方澤下糞水與栽地桑法同將畦内種出荆桑全條連根掘出栽培亦如前法但所築實土與地平上復用土封身一二尺周圍自成環池無雨則澆待桑身長至一大人髙割去梢子則横條自長任令滋長休科去新條當春不宜科科了數年不旺十二月内或次年正月科則不妨如澆治有功至秋可長大如壯椽十月内或次年春可移為行桑若不如此於園内養成從小便栽為行桑者多被風雨孳畜損傷野荆桑不成身者移根於園内養之亦同栽培如地桑法芽出留旺者一條長至如大人髙其科養法如前又春氣初透時將地桑邊旁一條梢頭折了三五寸屈倒於地空處多用栽子多屈幾條随人所欲地上先兠一渠可深五指餘卧條於内用鈎橛子即釘住條短則二個長則三個懸空不令著土其後芽條向上生如細把齒狀横條上約五寸留一芽其餘剥去可飼小蠶至四五月内晴天已午時間横條兩邊取熟溏土壅横條上成壟横條即為卧根至晚澆其根科當夜卧根生鬚至秋其芽茁為條身至十月或次年春分前後際卧根二頭截斷取出土随間空處斫斷一根拐子様毎一根為一栽此法出引栽子無窮又揷條法墻圍成園掘坑如地桑法大葉魯桑條上青眼動時科條長一尺之上截斷兩頭烙過每一坑内微斜插三二條待芽出封堆虛土三五寸毎一根科止留一條至秋可長數尺次年割條葉飼蠶止怕當年三伏日澆䕃不缺無不活者畦内插亦可如當處無可采之條預於他處摘下大葉魯桑臘月割條藏於土穴如藏花果法接頭透風則乾了候至桑樹條上青眼動時開穴藏條上眼亦動截烙截培用度如前又園内養成荆魯桑小樹如轉盤時於臘月内可去不便枝梢小樹近上留三五條碗口以上樹留十餘條長一尺以上餘者皆科去至來春桑眼動時連根掘來於漫地内濶八步一行行内相去四步一樹相對栽之栽培灌澆如前法桑行内種在闊八歩牛耕一繳地也行内相去四步一樹破地四歩已耎可成大樹相對則可以横耕故田不廢墾桑不致荒荆棘圍䕶當年横枝上所長條至臘月科令稀匀得所至來年春便可養蠶又科斫樹桑惟在稀科時斫依時斫也使其條葉豐腴而早發不致蠶之穉也稀則條自豐葉自肥今年科不過時則長條豐美明年之葉自然早發而又腴潤也又科斫之利惟在不留中心之枝客立人於其内轉身運斧條葉偃落於外比之擔負髙几遶樹上下科有心之樹者一人可敵數人之功條不可冗冗則費芟科之功葉薄而無味是故科斫為蠶事之先務時人不知預治於農隙之時而徒費功力於蠶忙之日人則倍勞蠶則失所如得其法使樹頭易得其條條上易得其葉蠶不待食葉以時至又其葉潤厚農語云鋤頭自有三寸澤斧頭自有一倍桑秦中之法名曰剝桑臘月中悉去其冗所存之條甚疎又於所存條根之上僅留四眼餘皆去之其所留者明年則為柯其眼中所發青條可長三數尺其葉倍常光潤如沃蠶通老而手採之獨留一向外之條滋養及秋其長以至㝷丈臘月復科之如前嵗久則所留之科重煩復又從下斫去既周而復始洛陽河東亦同山東河朔則異於是必留萌條疑風土所宜然欲一試此剥桑之法而未果也又斫樹法自移栽時長五七尺髙便割去梢既不留中心其條自向外長樹長大中心可容立一人如長成樹者當中有身及枝者亦可斫去也科條法凡可科者有四等一瀝水條向下埀者一刺身條向裏坐者一駢指條相併生者選去其一一冗脞條雖順生却稠冗臘月為上正月次之臘月津液未上又農隙人家春科只圖容易剝皮却損了津液也欲用桑皮將臘月正月科下條向陽土内培了至二月中取之自可剝務本新書四月種葚東西掘畦熟糞和土耦平下水水宜濕透然後布子或和黍子同種葚藉水力易為生發又遮日色或預於畦南畦西種􅐨後藉􅐨䕃遮映夏日長至二三寸旱則澆之若不雜黍種須旋撘矮棚於上以箔覆蓋晝舒夜捲處暑之後不須遮蓋至十月之後桑與黍稭同時刈倒順風燒之仍摻糞土蔽灰春煖榮茂次年移栽又一法熟地先耩黍一隴另捲草索截約一托以水浸輭麵飯湯更妙索两頭各歇三四寸中間匀抹濕葚子十餘粒將索卧於黍隴内索兩頭以厚土壓中間摻土薄覆隔一歩或兩步依上臥一索四面取齊成行乆旱宜澆十月刈燒加糞如前冬春擁雪蓋糞清明前後掃去霖雨時覷稀稠移補比之畦種旋移特省力決活早二年得力如舊有葚春種更妙後宜築圍墻固䕶或慮索煩碎以黍葚相和於葫蘆内㸃種過處用箒掃匀或慮天旱宜就黍隴内撥土平均順隴作區下水種之又又法春月先於熟地内東西成行匀稀種􅐨次將桑葚與蠶沙相和或炒黍穀亦可趁逐雨後於􅐨北單耩或㸃種比之撘矮棚與黍同種緣􅐨隂高密又透風露雖種十餘畝亦不甚委曲費力又夫地桑本出魯桑湏以魯桑萌條如法栽培揀肥旺者約留四五條鋤治添糞條有定數葉不煩多衆葉脂膏聚於一葉其葉自大即是地桑栽地桑法秋時於熟白地内深耕一圍如壟加糞撥土為區如無牛摳區亦可春分前後取臘月所埋桑條揀有萌芽處各盤七八寸或一尺鏉區下水歐條栽之覆土約厚三四指深厚則難生以手按匀區東南西種􅐨五七粒五月之後芽葉漸高旋添糞土已後條高便作地桑或㨂魯桑箄兒秋間埋頭深栽更疾得力又桑生一二年脂脉根株亦必微嫩春分之後掘區移栽區北直上下栽成土壁壁㡳旁鏉其土下水三四升將桑箄兒靠壁栽立根科湏得匀舒以土堅覆土壁地區地約高三二寸大抵一切草木根科新栽之後皆惡揺擺故用土壁遮禦北風迎合日色也今時移栽小桑微帶根鬚上無寸土但經路逺風日耗竭脂脉栽後難活縱活亦不榮旺却稱地法不宜此係拙謬今後應栽小樹若路逺移多約十餘樹通為一束於根鬚上蘸沃稀泥泥上摻土上以草包或蓆蒲包包内另用淳泥固塞仍擘夾車箱兩頭不透風日中間順臥樹身上以蓆草覆蓋預於栽所掘區下糞樹到之時即便下水依法栽培秋栽法平昔栽桑多於春月全樹移栽春多大風吹擺加之春雨艱得又天氣漸熱芽葉難禁故多不活活亦遲得力若是斫去原榦再長樹身桑聞鐵腥愈旺地桑是其驗也迤南地分十月埋栽河朔地氣頗寒故宜秋栽霖雨内為上時區深一尺之上平地約留樹身一二指餘者斫去栽罷地湏堅築以土封瘢比及地凍於上約量添糞春暖之後就糞撥為土盆雨則可聚旱則可澆樹南春先種􅐨比及霖雨以來芽條叢荗就作地桑或削去細條存留旺者一二枝次年便可成樹或是就壓傍條一樹又引十餘比之全樹栽者樹樹必活桑亦榮茂也十月木迷宜栽埋頭桑截去桑身栽如秋栽冬月根脉下行乘春併發一年之間長過原樹栽二年之上桑穀雨其間但有芽葉不旺者以硬木貼樹身去地半指一斧截斷快錛更妙糝土封其樹瘢樹南種黍五七粒十餘日始出芽條旱則頻澆立夏之後不宜此法大暑則不能一歳之中除大寒時分不能移栽其餘月分皆可又壓條法寒食之後將二年之上桑全樹用兠橛壓定掘地成渠條上已成小枝者出露土上其餘條樹以土全覆樹根週圍撥作土盆旱宜頻澆如無元樹止就桑下脚窠依上掘渠埋壓六月不宜全壓又栽條桑法秋暮農隙時分預掘下區藉地氣經冬藏濕又分減栽時併忙區方深各二尺以上熟糞一二升與土相和納於區内土宜北髙南下以留冬春雨雪餘區准此臘月内㨂肥長魯桑條三二枝通連為一窠快斧斫下即將楂頭於火内㣲㣲燒過每四十五條與稈草相間作一束卧於向陽坑内坑深長三四尺當預掘下防冬深地凍難掘以土厚覆春分已後取出却將原區刨開下水三四升布粟二三十粒將條盤曲以草索繫定卧栽區内覆土約厚三四指如或出露條尖三二寸覆土宜厚尺餘俱當堅築仍以虛土另封條尖已後芽生虚土自脱先於區南種􅐨地宜隂濕時時澆之若全卧栽者已後逐旋添土芽條長髙斫去傍枝三年可以成樹或就作地桑栽桑梢遽埋頭栽桑斫下桑梢相連二三枝為一窠栽如前法或於蘿蔔内穿過一枝假借氣力更妙掘區堅埋依前法壠種桑條秋耕熟地二月再擺匀東西起畼約量逺近撥土為區將臘月元埋桑條栽依前法或是單根肥長桑條依上栽之亦可栽種桑條者若舊桑多處可以多斫萌條若是少處又慮斫伐太過次年悞蠶故具種桑葚壓條栽條之法三者擇而行之又假有一村兩家相合低築圍墻四面各一百步若户多地寛更甚省力一家皆築二百步墻内空地計一萬步每一步一桑計一萬株一家計分五千株若一家孤另一轉築墻二百步内空地止二千五百步依上一步一桑法止得二千五百株其功之不侔如此恐起爭端當於園心以籬界斷比之獨力築墻不止桑多一倍亦逓相藉力容易勾當農政全書四時類要曰種桑土不得厚厚即不生待髙一尺又上糞土一遍又鍾化民曰種桑在正二月至八月亦可種根要理直泥要挨𦂳當以水糞澆灌方有生意徐光啓曰初種不用糞又黄省曽藝桑總論其種也耨地而糞之截其枚謂之嫁留近本之枝尺餘許深埋之出土也寸焉培而髙之以泄水墨其瘢或覆以螺殻或塗以蠟而瀝青煎油封之是防梅雨之所侵糞其周圍使其根四達若直灌其本則聾而死未活也不可灌水灌以和水之糞二年而盛其在土也月一鋤焉或二起翻一二尺許灌以純糞遍沃於桑之地使及其根之引蔓至摘葉也三年則其發茂禁損其枝之奮者桑之下草木不留則茂蠶之時其摘也必潔淨遂剪焉必於交湊之處空其榦焉則來年條滋而葉厚歳歳剪條則盛禁原蠶之飼飼則來年枝纎而葉薄桑之壅也以糞以蠶沙以稻草之灰以溝地之泥以肥地其初藝之壅也以水藻以棉花之子壅其本則煖而易發徐光啓曰以豆餅以棉餅以麻餅以猪羊牛馬之糞初春而脩也去其枝之枯者樹之低小者啓其根而糞泥壅之不然則葉遲而薄又其壓也濕土則條爛焦土則根生撒子而種不若條而壓其為桑之害也有桑牛㝷其穴桐油抹之則死或以蒲毋草草之狀也如竹葉其桑葉之癩也以草煮汁而沃之桑之下可以藝蔬其藝桑之園不可以藝楊藝之多楊甲之蟲是食桑皮而子化其中焉徐光啓曰楊不可絕宜勤捕之又望海之桑種之術與白桑同是皆臘月開塘而加糞即壅之以土泥或二或三六七月之間乃去其壅開塘加糞壅土宜遲紫藤之桑其種髙大是不用剪其葉厚大尤早種之也宜邇於竈屋不必開塘而糞壅惟幼穉之時待冬而糞或二或三以臘月為佳又農桑要㫖曰凡新栽桑斫科采葉須得宜初栽後成科時中心長條上葉勿采其餘在傍脚科止捋其葉且勿剸斫蓋令枝條煩密就為籓蔽以防牛畜㖥咬掣擺拖挽之患後中心枝既麤即可剸斫在旁科條本根既盛脂脈盡歸中心枝便可長成大樹堅乆茂盛不生糖心接博郭槖駝種樹書穀樹上接桑其葉肥大士農必用接换之妙荆桑根株接魯桑條也惟在時之和融手之審密封繫之固擁包之厚使不疎淺而寒凝也春分前十日為上時前後五日為中時然取其條眼襯青為時尤妙此不以地方逺近皆可凖也然必待晴暖之日以藉其陽和也接不密則氣液難通擁包不固厚則風寒入而害之也果之一生者質小而味惡既一接之則質碩大而味美桑亦如是故接换之接時取逺處有者預先取下可節氣内割取其條其採取培養之法全如採條桑内所説如取接萌處過逺者可與未曽盛油新柿簍中與蒲包穰一處裝了外密封不透雖行千里不致凍損果木宜三年條其藏及接法亦同徐光啓曰莫如當年條為妙三年之説不然也且接時必待月暗自下弦至上弦皆可晦尤妙自上弦至下弦皆忌望尤險劈接法先附地平鋸去身榦於砧盤旁向下一寸半皮肉上用快刀子尖向上左右斜批豁兩道至平面其下尖比上闊一指中間批豁斷者剔去其批豁了處如一鴉嘴様渠子也兩壁有斜面無平底其尖淺向上漸深至平面可深至半指許接頭可長五寸其麤細如一指許者於根頭一寸半内量留一半將其外一半左右削兩刀子成蕎麥楞様令尖頭口内含養温煖嵌於砧盤旁所批渠子内極要𦂳密須使老樹肌肉與接頭肌肉相對著於一砧盤上如此接至數箇斟酌砧盤大小用新牛糞和土成泥封泥其接頭周遭又用新桑皮纒繳牢固又用牛糞土泥封泥了所繳桑皮然後用濕土封堆接頭上可厚五寸大小斟酌其樹盤周圍棘刺遮䕶接頭生條芽出土長髙一二尺約量留三二條用依柱如前徐光啓曰渠子淺深量樹大小及接頭麤細其𦂳要處只在皮對皮骨對骨耳更𦂳要處在縫對縫又接大桑宜劈接插接小桑宜搭接壓接附地接者封泥擁培如前半身截成砧盤接者但其縫罅上用紙封又用破蓆片包繫如仰盆子様内盛潤土培養其接頭勿令透風用無底瓦礶盆子代蓆片亦可土乾則灑水所包土上條芽長出其所包土亦休取去至秋條長成接頭長定所包土不用也如接頭都活則酌量横枝多少樹之氣力留之靨接者可就於横枝上截了留一尺許然尺寸不可定惟取樹勢圓也於接頭上眼前方半寸刀尖割斷皮肉至骨欵接下帶眼皮肉一方片其眼底骨上一小心子如米粒此是一芽生氣之根掲時用指甲尖剗起令其小心子帶於皮肉之上口含少時取出印濕痕於横枝上復含養之用刀尖依濕痕四圍刻斷皮肉掲去露骨將接頭上靨皮嵌貼上其眼向上勿令顛倒上下兩頭用新細薄桑皮繫了斟酌其𦂳慢太𦂳則生氣不通太慢則不相附著俱難活也用牛糞和泥眼四邊泥了其所貼之靨多少可量其樹之大小又接小芽條可用搭接法就畦内將已種出荆桑隔年芽條去地二寸許向上削成馬耳狀將一般麤細魯桑接頭亦削成馬耳狀兩馬耳相搭細桑皮繫了牛糞泥封濕土擁培其芽條出土可留一二芽至秋長如大人髙明年可移入園中養之其法如前全要大小一般令其縫對縫取藏接頭側近有接頭者土中種之其髙原山田土厚水深之處多掘深坑中種桑柘者隨坑深淺或一丈丈五直上出坑乃扶疎四散此樹條直異於常樹十年之後無所不任務本新書凡桑果以接博為妙凡接枝條必擇其美宜用宿條向陽者庶氣壯而茂嫩條隂弱而難成根株各從其類然荆桑亦可接魯桑梅可接杏桃可接李接博其法有六一曰身接二曰根接三曰皮接四曰枝接五曰靨接六曰搭接詳見農餘門藝桑總論二月而接也有插接有劈接有壓接有搭接有換接榖而接桑也其葉肥大桑而接梨也則脆美桑而接楊梅也則不酸欽定授時通考卷七十六
