body:
  text: 農餘果二棗酸棗柿椑柿軟柿木𤓰榠樝安石榴栗石粟榧榛松子核桃銀杏棗棗一名木蜜皮麤葉小面深綠色背微白發芽遲五月開小花淡黄色花落即結實生青不堪食漸大漸白至微見紅絲即堪生啖熟則純紅味甚甘甜王禎農書云南北皆有然南棗堅燥不如北棗肥美生於青齊晋絳者尤佳能開胃健脾可乆留生熟皆可食多食生熱令人齒黄病齲齒詩豳風八月剝棗禮記内則棗曰新之疏棗易有塵埃恒治拭之使新左傳女贄不過榛栗棗脩以告䖍也疏取其早起者也齊民要術旱澇之地不任稼穡者種棗則任矣羣芳譜種類甚多有壺棗爾雅云棗壺棗註云今江東呼為棗大而鋭上者為壺壺猶瓠也鹿盧棗爾雅云邊要棗註云子細腰今謂之鹿盧棗白棗爾雅云擠白棗註云即今棗子白乃熟揚徹齊棗見爾雅註云未詳羊棗爾雅云遵羊棗註云實小而圓紫黒色今俗呼之為羊矢棗大棗爾雅云洗大棗註云今河東猗氏縣出大棗子如雞卵蹶洩棗爾雅云蹶洩苦棗註云子味苦無實棗爾雅云晳無實棗註云不著子者還味棗爾雅云還味棯棗註云還味短味蹙咨棗一名大白核小肌肥榖城紫棗長二寸西王母棗大如李核三月熟在衆果之先夏白棗出洛陽墟棗出汲郡一名安益棗信都大棗梁國夫人棗三星棗駢白棗灌棗狗牙棗雞心棗牛頭棗獮猴棗夕棗﨑亷棗以上十六名並出廣志棠棗玉門棗並出西京襍記樂氏棗齊民要術云出青州豐肌細核多膏肥美為天下第一相傳樂毅破齊時從燕來齊所種也羊角棗詳見後鄴中記御棗味最美出安邑窑坊棗味佳出應天府窑坊門内無核棗實小核僅有形食之不覺出青城縣氐棗木棗丹棗鶴珠棗出天台閒閒真人以致元帝又分栽選味佳者留作栽候葉始生取大棗傍條二三尺高者移種棗性硬其生晚芽未出移恐難出三歩一行行欲相當如本年芽未出弗遽刪除諺云棗樹三年不算死亦有久而後生者又修樹每元旦日未出時反斧斑駁椎之謂之嫁棗不椎則花而不實斫之則子萎而落候大蠶入簇以杖擊其枝間振去狂花則結實多又收棗棗全赤即收撼而落之為上半赤而收者肉未充滿乾則色黄而皮皺將赤味亦不佳全赤久不收則皮硬復有鳥雀之患一法將纔熟棗乘清晨連上枝葉摘下弗損傷通風處晾去露氣簡新缸無油酒氣者清水刷淨火烘乾待冷取淨稈草曬乾候冷一層草一層棗入缸中封固可至來歲猶鮮又曬棗先治地令淨有草則令棗臭駕箔椽上以無齒木扒聚而散之日二十度乃佳夜不必聚得霜露氣速成如有雨則聚而苫之五六日選其紅軟者上高厨暴之䏺爛者去之否則恐壊餘棗其未乾者曝曬如法又作乾棗新菰蒋露於庭以草鋪上厚三寸覆以新蒋凡三日撤覆露之畢日曝取乾納房中每一石以酒一升潄著器中密泥之可以經數年不壊酸棗附羣芳譜酸棗一名樲小而圓如芡無大樹實生青熟紅皮薄核大仁堪入藥生用令人不眠雙仁者勿用取紅軟者箔上曬乾納釡中水僅掩棗煮一沸即漉出入盆研布絞取濃汁塗器上日曝使乾取為末一碗投方寸匕逺行用以和米炒其味酸甘解飢渴最妙柿柿赤實果也樹高大枝繁葉大圓而光澤四月開小花黄白色結實青緑色八九月乃熟紅柿皮深紅而多核所在皆有黄柿生汴洛諸州朱柿出華山似紅柿而圓小皮薄可愛味更甘珍著蓋柿蒂下别有一層牛心柿状如牛心蒸餅柿状如市賣炊餅八稜柿大而稍扁劍南尤溪柿處州松陽柿尤為竒品塔柿大於諸柿去皮挂木上風乾之佳種樹書柿樹接桃枝則為金桃柿子接及三次則全無核羣芳譜種類甚多大者如楪其次如拳小者如鹿心鴨子雞子生者澀不堪食其核形扁状如木鱉子而堅根甚固謂之柿盤世傳柿有七絶一多夀二多隂三無鳥巢四無蟲蠧五霜葉可玩六佳實可啖七落葉肥大可以臨書多食引痰日乾者多食動風同蟹食腹痛作瀉食柿飲熱酒令人易醉或心痛欲絶椑柿附椑柿一名漆柿一名綠柿一名青椑一名烏椑一名花椑一名赤棠柿乃柿之小而卑者生江淮宣歙荆襄閩廣諸州雖熟亦深緑色大如杏味甘可生啖搗碎浸汁謂之柿漆可染罾扇諸物軟柿附軟柿本草云生海南樹高丈餘子中有汁如乳汁甜美其本類柿而葉長但結實小而長乾熟則紫黑色一種小圓如指頭大者味尤美其樹接柿甚佳木𤓰木𤓰一名楙爾雅云楙木𤓰註云木實如小𤓰酢而可食本草云木𤓰之名取此義也一名鐵脚梨清異録云木𤓰性益下部若脚膝筋骨有疾者必用焉故方家號為鐵脚梨樹如柰叢生枝葉花俱如鐵脚海棠可種可接可以條分葉光而厚春末開花紅色微帶白作房實如小𤓰或似梨稍長皮光色黄上微白如著粉津潤不木者為木𤓰香而甘酸不澀食之益人醋浸一日方可食生不堪噉處處有之山隂蘭亭尤多而宣城者為佳本州以充土貢故有宣州花木𤓰之稱西洛木瓜味和美至熟青白色入藥絶有功勝宣州者味淡性酸温無毒去濕和胃强筋骨治脚氣霍亂大吐下轉筋不止枝葉根皮煮汁飲並止霍亂吐下轉筋療脚氣枝作杖利筋脈核治霍亂煩燥氣急花治面黑粉滓羣芳譜種法秋社前後分其條移栽次年便結子勝春栽者榠樝附羣芳譜榠樝一名瘙樝一名木李一名木梨木葉花酷類木𤓰但比木𤓰大而色黄李時珍曰乃木𤓰之無重蒂者也安石榴安石榴種出安石國故名一名若榴廣雅云若榴石榴也丹實垂垂若贅瘤也一名金罌筆衡云呉越王錢鏐改榴為金罌有甜酸苦三種單葉者旋開花旋結實花托即榴不結者托尖小干葉者不結實甜者甘温澀無毒可食潤燥制三尸蟲理乳石毒但性滯戀膈多食生痰損肺黑齒服食家忌之酸者性温澀無毒兼收歛之氣只堪入藥陳久更良榴實圓如毬頂有尖瓣大者如杯皮赤色有黑斑㸃皮中如蜂窠有黄膜隔之子如人齒白者似雪淡紅者似水紅寳石紅者如硃砂淡紅潔白者味甘紅者味酸秋後經霜則實自裂有富陽榴實大者如碗海榴樹僅二尺栽盆中結實亦大直垂至盆堪作美觀黄榴結實甚多最易傳種河隂榴𤨏碎録云河隂出榴名三十八中間止有三十八子也酉陽雜俎南詔石榴皮薄如藤紙味絶於洛中本草水晶榴子白瑩徹如水晶味亦甘苦石榴抱朴子云生積石山或云即山石榴也山石榴形類榴而小不作房生青齊間蜜漬以當菓甚美廣羣芳譜石榴不結子者以石塊或枯骨安樹叉間或根下則結子不落栗栗木高三丈極類櫟四月開花青黄色長條似胡桃花實有房彚大者若拳小者若桃李苞生外殻刺如蝟毛其中著實或單或雙或三四少者實大多者實小實有殻紫黑色殻内膜甚薄色微紅黑外毛内光膜内肉外黄内白八九月熟則苞自裂而實墜宣州及北地所産小者為勝陸璣詩疏曰栗五方皆有周秦呉揚特饒惟漁陽及范陽生者甜美味長他方不及本草圖經云兖州宣州最勝燕山栗小而味最甘蜀本圖經云板栗錐栗芧栗似板栗而細如橡子其樹雖小葉亦不殊但春生夏花秋實冬枯為異綱目云即爾雅所謂栭栗也一名栵栗可炒食之衍義云湖北有一種旋栗頂圓末尖即榛栗象榛子形也詩鄘風樹之榛栗禮記内則栗曰撰之疏栗蟲好食數數布陳撰省視之夏小正八月栗零傳零也者降也降而後取之也齊民要術栗種而不栽栽雖活㝷死栗初熟離苞即於屋内理濕土中埋須深勿令凍路逺者以革囊盛之停三日以上及見風日則不可作種至二月芽生出而種之芽向上乃生根既生數年不用掌近三年内每到十月常須草裹至二月漸解不裹則易至凍死仍用籬圍之其實方而匾者他日結子豐滿樹高四五尺取生子樹枝接之種樹書採栗時要得披殘明年其枝葉益茂石栗附客燕雜記京師佳果栗三霜前栗盤古栗鷹爪栗種類頗多總之味鹹氣温無毒主益氣厚腸胃補腎氣治腰脚無力破痃癖理血當中一子名栗楔治血更效生則動氣熟則滯氣唯曝乾或火煨汗出食之良百菓中最有益者小兒不宜多食難尅化患風水病者忌以味鹹也南方草木状石栗樹與栗同但生於山石罅間花開三年方結實其殻厚而肉少其味似胡桃仁榧榧一名柀子一名赤果一名玉榧一名玉山果生永昌以信州玉山者為佳本地人呼為野杉木大者連抱高數仞其木有雄雌雄者花而雌者實其木形如栢木理似松細軟堪為器用葉似杉冬月開黄圓花結實如棗核大如橄欖無稜而殻薄黄白色其仁肉白外有一層黑麤衣小而心實者尤佳一樹可下數十斛味甘平澀無毒治五痔去三蟲輕身明目煮素羮味更甜美同甘蔗食其滓自軟猪脂炒榧黑皮自脱性熱同鵞肉食令人上壅生斷節風同緑豆食殺人忌火氣爾雅翼柀實去皮殻可生食亦􅀢而收之可以經乆本草㑹編一種麤榧其木與榧相似但理麤色赤其子稍肥大頂圓不尖羣芳譜收藏以盛茶舊磁甕收之經乆不壊欲種以二月下子榛榛古作本草云從辛從木俗作莘者誤生遼東山谷樹高丈餘子如小栗李時珍曰榛樹低小如荆叢生冬末開花如櫟花成條下垂長二三寸二月生葉如初生櫻桃葉多皺文而有細齒及尖其實作苞三五相黏一苞一實實如櫟實上壯下鋭生青熟褐殻厚而堅仁白而圓大如杏仁亦有皮尖然多空者諺曰十榛九空陸璣詩疏云榛有兩種一種大小枝葉皮樹皆如栗而子小形如橡子味亦如栗枝莖可以為燭詩所謂樹之榛栗者也一種高丈餘枝葉如水蓼子作胡桃味遼代上黨甚多乆留亦易油壊種法與栗同味甘平無毒益氣力實腸胃調中不饑健行甚驗遼東榛軍行食之當糧榛之為利亦大矣禮記曲禮婦人之䞇椇榛脯脩棗栗註榛實似栗而小闗中鄜坊甚多松子松子本草云松實状如豬心疊成鱗砌秋老則子長鱗裂惟遼海及雲南者謂之海松子馬志曰海松子状如小栗三角其中仁香美當果食之亦代麻腐食之與中國松子不同蘇頌曰松歲久則實繁中原雖有小而不及塞上者佳好也呉瑞曰松子有南松北松華隂松形小殻薄有香新羅者肉甚香美李時珍曰海松子其樹與中國松樹同惟五葉一叢者毬内結子大如巴豆而有三稜一頭尖爾馬志謂似小栗殊失本體東坡雜記十月以後冬至以前松實結熟而未落折取并蕚收之竹器中懸之風道未熟則不生過熟則隨風飛去至春初敲取其實以大鐵鎚入荒茅地中數寸置數粒其中得春雨自生自採實至種皆以不犯手氣為佳松性至堅悍然始生至脆弱多畏日與牛羊故須荒茅地以茅隂障日若白地當雜大麥數十粒種之賴麥隂乃活須護以棘日使人行視三五年乃成五年之後乃可洗其下枝使高七年之後乃可去其細密者使大大略如此核桃核桃一名胡桃一名羌桃樹高丈許春初生葉長三寸兩兩相對三月開花如栗花穗蒼黄色結實如青桃九月熟時漚爛皮肉取核内仁為果北方多種之以殻薄仁肥者為佳廣志云陳倉胡桃薄皮多肌隂平胡桃大而皮脆急促則碎味甘氣熱皮濇仁潤治痰氣喘𠻳醋心及厲風諸病今往往以之下酒則昔人所云食多動風動痰令人惡心脱鬚眉及同酒多食咯血者妄也或素有痰火積熱者不宜多食耳大抵留皮則消滯去皮則養血潤血微和鹽食更佳能通命門利三焦益氣養血與破故紙為補下焦腎命之要藥羣芳譜種植選平日實佳者留樹上勿摘俟其自落青皮自裂又揀殻光紋淺體重者作種掘地二三寸入糞一碗鋪片瓦種一枚覆土踏實水澆之冬月凍裂殻來春自生下用瓦者使無入地直根異日好移栽也便民圖要以粗布袋盛挂風面處則不膩收松子亦用此法銀杏銀杏一名白果一名鴨脚子本草云葉似鴨脚故名宋初入貢改呼銀杏因其形似杏而核色白也處處皆有以宣城為盛樹高二三丈或至連抱可作棟梁葉薄縱理儼如鴨掌面綠背淡二月開花成簇青白色二更開旋即卸落人罕見之一枝結子百十狀如小杏經霜乃熟色黄而氣臭爛去肉取核為果其核兩頭尖中圓大而扁三稜為雄二稜為雌其仁嫩時緑色乆則黄其樹耐久肌理白膩術家取刻符印云能召使鬼神氣味甘微苦平澀無毒生食解酒降痰消毒殺蟲熟食温肺益氣定喘𠻳搗汁浣衣去油膩食多壅氣臚脹昏頓三元延夀書言白果食滿千顆殺人昔有歲飢以白果代飯食飽次日皆死小兒食多昏霍發驚引疳同鰻鱺食患軟風墨客揮犀銀杏葉如鴨脚獨窠者不實偶生及叢生者乃實羣芳譜種植須雌雄同種其樹相望乃結實或雌樹臨水照影亦可或於雌樹鑿一孔納雄樹木一塊以泥之亦結子又移栽春分前後先掘深坑水攪成稀泥然後下栽子掘時連土繩縛牢不令散碎則易活又熟時以竹篾篐樹本撃篾則銀杏自落欽定授時通考卷六十四
