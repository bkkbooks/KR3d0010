body:
  text: 天時春易說卦萬物出乎震震東方也疏震是東方之卦斗柄指東為春春時萬物出生也書堯典分命羲仲宅嵎夷曰暘谷寅賔出日平秩東作傳宅居也東表之地稱嵎夷日出於谷而天下明故稱暘谷寅敬賔導秩序也歲起於東而始就耕謂之東作東方之官敬導出日平均次序東作之事以務農也日中星鳥以殷仲春厥民析鳥獸孶尾傳日中謂春分之日鳥南方朱鳥七宿殷正也春分之昏鳥星畢見以正仲春之氣節冬寒無事並入室處春事既起丁壯就功國語先時五日瞽告有協風至注協和也風氣和時候至也立春曰融風又農祥晨正日月底於天廟土乃脈發注農祥房星也晨正謂立春之日晨中於午也農事之候故曰農祥管子發五正赦薄罪出拘民解仇讐所以建時功施生榖也注謂及時立農功施力為生榖凡此皆春令又日至六十日而陽凍釋七十日而隂凍釋隂凍釋而藝稷百日不藝稷故春事二十五日之內耳淮南子明庶風至則正封疆修田疇注春分播榖又春分至則甘雨降生育萬物漢書律歷志少陽者東方東動也陽氣動物於時為春春蠢也物蠢生乃動運後漢書郎顗傳雷者所以開萌芽辟隂除害萬物須雷而解資雨而潤王者崇寬大順春令則雷應節古三墳物象春春主發生物之象也說文辰者農之時也故農字從辰田候也談撰卉木皆感於春氣而後發生者以木旺寅卯然也師曠占春雷初起其音格格霹靂者所謂雄雷旱氣也其鳴依依音不大霹靂者謂之雌雷水氣也農桑通訣孟春立春節氣首五日東風解凍次五日蟄蟲始振後五日魚上氷次雨水中氣初五日獺祭魚次五日候雁北後五日草木萌動次仲春驚蟄節氣初五日桃始華次五日倉庚鳴後五日鷹化為鳩次春分中氣初五日𤣥鳥至次五日雷乃發聲後五日始電次季春清明節氣初五日桐始華次五日田鼠化為鴽後五日虹始見次榖雨中氣初五日萍始生次五日鳴鳩拂其羽後五日戴勝降於桑凡此六氣一十八候皆春氣正發生之令說苑主春者張昏而中可以種榖農政全書東作既興早起夜眠春間最為緊要古語云一年之計在春一日之計在寅占驗田家五行凡春宜和而反寒必多雨諺云春寒多雨水又諺云春風踏腳報言易轉方如人傳報不停腳也一云既吹一日南風必還一日北風報答也二說俱應師曠占春辰巳日雨蝗蟲食禾稼田家雜占春甲子日雨主夏旱六十日春甲申日雨主米暴貴又茆蕩內春初雨菌生俗呼為雷菌多則主旱無則主水風角書春甲寅日風高去地三四丈鳴條以上常從申上來為大赦期六十日應正月立春雨水禮記月令孟春之月日在營室昏參中旦尾中注日月之行一歲十二會聖王因其會而分之以為大數焉觀斗所建命其四時此云孟春者日月會於娵訾而斗建寅之辰也其日甲乙其帝太皥其神勾芒注乙軋也日之行春東從青道發生萬物月為之佐時萬物皆解孚甲自抽軋而出太皡宓羲氏也勾芒少皡氏之子曰重為木官又東風解凍蟄蟲始振魚上氷獺祭魚鴻雁來陳澔曰此記寅月之候振動也來自南而北也又是月也以立春先立春三日太史謁之天子曰某日立春盛德在木天子乃齊立春之日天子親帥三公九卿諸侯大夫以迎春於東郊又天子乃以元日祈榖於上帝集說元日辛日也郊祭天而配以后稷為祈榖也又天氣下降地氣上騰天地和同草木萌動注此陽氣蒸達可耕之候農書曰土長冒橛陳根可拔耕者急發又王命布農事命田舍東郊皆修封疆審端經術善相丘陵阪險原隰土地所宜五榖所植以教道民必躬親之田事既飭先定準直農乃不惑管子正月之朝榖始也又正月令農始作服於公田呂氏春秋冬至後五旬七日菖始生菖者百草之先生者也於是始耕後漢書祭祀志立春之日皆青幡幘迎春於東郭外唐六典正月上辛祈榖於圜丘以高祖配唐書王仲丘傳開元中王仲丘上言貞觀禮正月上辛祀感帝於南郊顯慶禮祀昊天上帝於圜丘以祈榖宋史禮志景德三年十二月陳彭年言來年正月三日上辛祈榖至十日始立春按月令春秋傳當在建寅之月迎春之後後齊永明元年立春前郊議者欲遷日王儉啓云宋景平元年元嘉六年並立春前郊遂不遷日然則左氏所記啓蟄而郊乃三代彝章王儉所啓郊在春前乃後世變禮望常以正月立春之後行上辛祈榖之禮從之四民月令正月可種瓜瓠葵芥大小葱蒜苜蓿及雜蒜亦種齊民要術元日五更雞鳴時㸃火把照桑棗果木等樹則無蟲以刀斧班駁敲打樹身則結實此之謂稼樹是日用尖刀刮破桃樹皮是月命女工趨織布典饋釀春酒是月教牛修農具築墻園開溝渠修蠶室整屋漏織蠶箔此月栽樹為上時上半月栽者多結子南風不可栽下子茄瓜薏苡諸般花子葫蘆匏扦插楊柳石榴梔子栽種松桑榆柳棗䓗葵韭麻胡桃榛子松子杏子椒牛蒡子菠菜竹宜初二日雜樹木宜上日木棉花苦蕒山藥冬瓜宜十日黃瓜萵苣生菜四月芥種菌種芋接換梨子林擒棗柿栗桃梅李杏以上並雨後澆培石榴梨子海棠棗柿梅桃杏林擒胡桃以上並下旬收藏無灰臘糟蒸臘酒合小豆醬雜事接諸般花木果樹移諸般花木果樹壠瓜地修諸色果木修接桑樹騸諸色樹木騸與嫁同占驗禮記月令孟春行夏令則雨水不時草木早落國時有恐行秋令則其民大疫猋風暴雨總至藜莠蓬蒿並興行冬令則水潦為敗雪霜大摯首種不入史記天官書正月旦决八風風從南方來大旱西南小旱西方有兵西北戎菽為小雨趣兵北方為中歲東北為上歲東方大水東南民有疾疫歲惡注戎菽胡豆也為成也又故八風各與其衝對課多者為勝多勝少久勝亟疾勝徐旦至食為麥食至日昳為稷昳至餔為黍餔至下餔為菽下餔至日入為麻欲終日有雨有雲有風有日日當其時者深而多實無雲有風日當其時淺而多實有雲風無日當其時深而少實有日無雲不風當其時者稼有敗如食頃小敗熟五斗米頃大敗則風復起有雲其稼復起各以其時用雲色占種其所宜其雨雪若寒歲惡正義正月旦欲其終一日有風有日則一歲之中五榖豐熟無災害也又從正月旦數雨率日食一升至七升而極過之不占數至十二日日直其月占水旱為其環城千里內占則其為天下候竟正月注月一日雨民有一升之食二日雨民有二升之食如此至七日月一日雨正月水月三十日周天歷二十八宿然後可占天下又月所離列宿日風雲占其國然必察太歲所在金穰水毁木饑火旱正月上甲風從東方宜蠶風從西方若旦黃雲惡易說立春氣當至不至則多疾瘧古史考元日太史占氣候以知水旱吉凶隨分野書之陶朱公書元日有雷禾麥皆吉有雪夏秋大旱日出時有紅霞主絲貴天晴為上西北風主米貴每月如之諺云歲朝東北五禾大熟壬癸亥子之方謂之水門其方風來主水諺云歲朝西北風大雨定妨農西南風主米貴東南及南風皆主旱又占桑葉貴賤只看正月上旬木在一日則為蠶食一葉為甚貴木在九日則為蠶食九葉為甚賤上元日晴春水少括云上元無雨多春旱清明無雨少黃梅夏至無雲三伏熱重陽無雨一冬晴元宵前後必有料峭之風謂之元宵風黃帝占正月二十日為秋收日時主秋成百榖蕃茂師曠占立春雨傷五禾又正月甲戍日大風東來折樹者榖熟甲寅日大風西北來者貴庚寅日風從西來者皆貴齊民要術欲識歲所宜以布囊盛粟等諸物種平量之埋隂地冬至後五十日發取量之息最多者歲所宜也玉海祥符四年正月己丑司天言農丈人星見主歲豐物理論正月朔旦四面有黃氣其歲大豐此黃帝用事土氣黃均四方並熟有青氣雜黃有螟蟲赤氣大旱黑氣大水正朔占歲星上有青氣宜桑赤氣宜豆黃氣宜稻又正月望夜占隂陽陽長即旱隂長即水立表以測其長短審其水旱表長二尺月影長二尺以內大旱二尺五寸至三尺小旱三尺五寸至四尺調適高下皆熟四尺五寸至五尺小水五尺五寸至六尺大水月影所極則正面也立表中正乃得其定羣芳譜元日值甲榖賤乙榖貴丙四月旱丁絲綿貴戊米麥魚鹽貴己米貴蠶傷多風雨庚田熟辛米平麥麻貴壬絹布豆貴米麥平癸主禾傷多風雨一說元日值戊主春旱四十五日又三日得甲為上歲四日中歲五日下歲月內有甲寅米賤占書一日得辛旱二日小收三四日主水麥半收五六日小旱七分收八日歲稔一云春旱不收通書月內有三卯宜豆無則早種禾一云一日得卯十分收二日低田半收三四日大水五日六日半收七日八日春潦全收周益公日記正月內有三子葉少蠶多無三子則葉多蠶少有三卯則早豆收無則少收有三亥主大水一云正月得三亥湖田變成海在正月節氣方準便民書元日晴和無日色主有年日有暈主小熟有雷主一方不寧有電人殃霞氣主蟲蝗蠶少婦人災果蔬盛有霜主七月旱禾苖吉有霧主桑貴而民疾有雪主夏旱秋水如未過立春而元日雪主大有年通考歲旦天氣晴朗氣溫和主民安國泰五榖豐登人少病犧牲旺寇盜息類占正朔之日天氣和潤風不鳴條兼有雲迎送出入者歲美無疾朔日晚至連三日內無風雨而隂和不見日色者主一歲大美探春歷記甲子日立春高鄉豐稔水過岸一尺春雨如錢夏雨調勻秋雨連綿冬雨高懸紀歷撮要八日榖夜見星辰五榖豐登研北雜志世謂正月三日為田本命浙西人謂之夏正三言夏正之三日俗以是日稱水以重為上有年極驗朝野僉載正月三白田公笑赫赫西北人諺曰要宜麥見三白􅋯仙神隱立春天隂無風民安蠶麥十倍東風吉人民安果榖盛田家五行正月十六日喜西南風為入門風主低田大熟又春牛占歲事頭黃主熟又專主菜麥大熟青主春多瘟赤主春旱黑主春水白主春多風身色主上鄉腳色主下鄉農政全書上八日宜晴此夜若雨元宵如之諺云上八夜弗見參星月半夜弗見紅燈又雨水後隂多主少水高下大熟諺云正月罌坑好種田二月驚蟄春分詩豳風四之日舉趾傳四之日周四月也民無不舉足而耕矣禮記月令仲春之月日在奎昏弧中旦建星中注仲春日月會於降婁斗建卯之辰孔頴達曰餘月昏旦中星皆舉二十八宿此云弧與建星者以弧星近井建星近斗井斗度多星體廣不可的指故舉弧建以定昏旦之中又始雨水桃始華倉庚鳴鷹化為鳩陳澔曰此記卯月之候倉庚黃鸝也鳩布谷也鷹化為鳩以生育氣盛故鷙鳥感之而變又擇元日命民社注社后土也使民祀焉神其農業也祀社日用甲又是月也日夜分陳澔曰晝夜五十刻雷乃發聲始電蟄蟲咸動啓戶始出疏雷是陽氣之聲將上與隂相衝電是陽光陽微則光不見此月陽氣漸盛以擊於隂故云始電戶穴也謂發所蟄之穴國語自今至於初吉陽氣俱蒸土膏其動注初吉二月朔日也又土發而社助時也注土發春分也社者助時求福為農始也呂氏春秋開春始雷則蟄蟲動矣時雨降則草木育矣又太簇之月陽氣始生草木繁動令農發土無或失時洪範五行傳雷以二月出震其卦曰豫言萬物隨雷出地皆逸豫也淮南子二月官倉注二月播種故官倉也白虎通仲春穫禾報社祭稷以三牲何重功故也說文膢楚俗以二月祭飲食也一曰祈榖食新曰離膢又春分而禾生夏小正祈麥實傳麥者五榖之先見者故急祈而記之也又二月往耰黍禪傳禪單也論衡二月之時龍星始出見出雩祈榖雨唐書李泌傳二月朔里閭釀宜春酒以祭勾芒神祈豐年荆楚歲時記春分日民竝種戒火草於屋上有鳥如烏先雞而鳴架架格格民聞此鳥則入田以為候四民月令二月隂凍畢澤可葘美田緩土及河渚水處泛勝之書種麻子二月下旬傍雨種之麻生布葉鋤之以蠶矢糞之天旱以流水澆之無流水曝井水殺其寒氣以澆之如此美田則畝五十石及百石薄田尚三十石齊民要術二月昏參夕杏花盛桑椹赤可種大豆謂之上時家政法曰二月可種瓜瓠又二月順陽習射以備不虞春分中雷乃發聲先後各五日寢别內外蠶事未起命縫人浣冬衣徹復為夾其有嬴帛遂供秋服凡浣故帛用灰汁則色黃而且肥搗小豆細末下絹篩投湯水以洗之潔白而柔韌勝皂莢矣可糶粟黍大小豆麻麥子等收薪炭炭聚之下碎末勿令棄之搗篩煮淅米泔溲之更搗令熟丸如雞子曝乾以供籠爐種火之用輒得達曙堅實耐久逾炭十倍初二日東作興俗謂上工日田家雇傭工之人俱此日執役之始故名上工泥蠶室舂百果木根則子牢此月雨水中埋諸花樹條則活中旬種稻為上時下子麻子紅花山藥白扁豆桑椹扦插蒲桃石榴栽種槐榖楮粟松銀杏棗皂莢菊茶木瓜薤桐樹决明百合胡麻黃精木槿茨菰甘蔗雜菜藕芋宜雨多竹茄瓜莧枸把萱草蒼术芭蕉萵苣紫蘇烏豆豌豆茱萸韭夏蘿蔔苕帚大葫蘆菘菜大豍豆壓條桑條接換柑橘柿棗橙柚杏栗桃梅梨李胡桃銀杏楊梅枇杷沙柑石榴紫丁香以上春分前後皆可澆培柑橘橙柚蒲蔔收藏百合曲槐芽皂角新茶雜事移諸般花木並忌南風火日理蠶事春耕宜遲恐陽氣未透插諸色樹木解樹上裹縛二月二日取枸把煮湯沐浴令人光澤不老不病續文獻通考元武宗至大三年命祀先農樂用登歌日用仲春上丁或用上辛或甲日占驗禮記月令仲春行秋令則其國大水寒氣總至冦戎來征行冬令則陽氣不勝麥乃不熟民多相掠行夏令則國乃大旱暖氣早來蟲螟為害陶朱公書二月朔日值驚蟄主蝗蟲值春分主歲歉風雨主米貴又二月初八日東南風謂之上山旗主水西北風謂之下山旗主旱又十五日為勸農日晴和主年豐風雨主歲歉又二月虹見在東主秋米貴在西主蠶貴驚蟄前後有雷謂之發蟄雷聲初起從乾方來主人民災坎方來主水艮方來主米賤震方來主歲稔巽方來主蝗蟲離方來主旱兌方來主五金長價詩曰初二天晴東作興初七八日看年成花朝此夜晴明好何處連綿夜雨傾師曠占二月甲戍日風從南來者稻熟二月乙卯日不雨晴明稻上場不熟通考二月甲子日發雷大熱一云大熟又十六日乃黃姑浸種日西南風主大旱高鄉人見此風即懸百文錢於簷下風力能動則舉家失聲相告風愈急愈旱又主桑葉貴經世民事録二月內有三卯則宜豆無則旱種禾談薈二月二十日謂之小分龍日晴分懶龍主旱雨分健龍主水農政全書二月十二日夜宜晴可折十二夜夜雨二月最怕夜雨若此夜晴雖雨多亦無所妨越人陳元義云二月內得十二個夜晴則一年雨晴調勻更十二夜中又雨為水潦年歲矣十夜以上雨水鄉人盡呌苦初四有水謂之春水初八日前後必有風雨諺云清明斷雪榖雨斷霜言天氣之常四時占候二月朔日雨稻惡糴貴晦日雨人多疾萬寶全書春分日西風麥貴南風先水後旱北風米貴三月淸明榖雨禮記月令季春之月日在胃昏七星中旦牽牛中注季春日月會於大梁斗建辰之辰陳澔曰七星二十八宿之星宿也又桐始華田鼠化為鴽虹始見萍始生陳澔曰此記辰月之候鴽鶉䳺之屬又薦鮪於寢廟乃為麥祈實是月也生氣方盛陽氣發泄句者畢出萌者盡達注於含秀求其成也句屈生者芒而直曰萌又是月也命司空曰時雨將降下水上騰循行國邑周視原野修利隄防道達溝瀆開通道路毋有障塞淮南子清明加十五日斗指辰則榖雨音比姑洗孝經緯斗指辰為榖雨言雨生百榖也說文辰震也三月陽氣動雷電振民農時也物皆生嘉定縣志三月十一日為麥生日喜晴祛疑說農家以霜降前一日見霜則清明前一日霜止霜降後一日見霜則清明後一日霜止五日十日而往前後同占欲出秧苖必待霜止每歲推驗若合符節泛勝之書三月榆莢時有雨高田可種大豆土和無塊畝五升土不和則益之又種禾無期因地為時三月榆莢時雨膏地强可種禾齊民要術榖雨三月上旬及清明節桃始華為中時又三月可種粳稻又是月也蠶農尚閒可利溝瀆葺治墻屋修門戶警設守備以禦春饑草竊之寇是月盡夏至暖氣將盛日烈映燥利用漆油作諸日煎藥可糶黍買布四月繭既入簇趨繅剖線具機杼敬經絡草茂可燒灰是月也可作棄蛹以禦賔客可糴麵及大麥弊絮下子茨菰宜榖雨日麻子栽種菉豆茶宜隂地粟榖秫稌石榴大豆宜上旬松百合山藥黃瓜紫草紅花甘蔗菱早芝麻雞頭薑葵菜絲瓜兒宜社日香菜早稻宜上旬地黃梔子藍紫蘇芋綿花杏瓠子葫蘆茭白菠菜宜月末桑椹紵麻收藏芥菜桐花毛羽衣物清明醋次茶書畫入焙中又可栽茶宜隂地諸般瓜宜初三日或辰戌時葫蘆宜清明日移植椒茄秧枸把苖蒲百合柚橘橙柑接換楊梅橙柑棗栗柿枇杷雜事犂秧田梅上接杏杏上接梅埋楮樹收菌開溝修墻防雨浸榖種修蜜占驗禮記月令季春行冬令則寒氣時發草木皆肅國有大恐行夏令則民多疾疫時雨不降山陵不收行秋令則天多沉隂淫雨早降兵革並起陶朱公書朔日值清明主草木榮茂值榖雨主年豐風雨主人災百蟲生有雷主五榖熟種樹書常以三月三日雨卜桑葉之貴賤諺云雨打石頭遍桑葉三錢片或曰四日尤甚杭人曰三日尚可四日殺我言四日雨尤貴田家五行清明午前晴早蠶熟午後晴晚蠶熟又三月初三晴桑葉掛銀瓶雨打石頭斑桑葉錢上􅀢雨打石頭流桑葉好餧牛又三月無三卯田家米不飽又榖雨日辰值甲辰蠶麥相登大喜欣榖雨日辰值甲午每箔絲綿得三斤清明無雨少黃梅又雨打紙錢頭麻麥不見收雨打墓頭錢今年好種田門前插栁青農人休望晴門前插柳焦農人好作嬌嘉定縣志三月三上巳日聽蛙聲占水旱諺云田雞呌得啞低田好稻把田雞呌得響低田好牽槳唐詩田家無五行水旱聽蛙聲是也農政全書若清明寒食前後有水而渾主高低田禾大熟四時雨水調榖雨日雨主魚生諺云一㸃雨一個魚榖雨前一兩朝霜主大旱是日雨則魚生必主多雨二麥紅腐不可食用月內有暴水謂之桃花水則多梅雨無潦亦無乾雪不消則九月霜不降雷多歲稔虹見九月米貴欽定授時通考卷三
