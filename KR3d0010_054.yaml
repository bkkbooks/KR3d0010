body:
  text: 蓄聚彚考詩小雅我倉旣盈我庾維億傳露積曰庾十萬曰億箋萬物成則倉庾充滿矣倉言盈庾言億亦互辭喻多也又我取其陳食我農人自古有年箋倉廪有餘民得賖貰取食之所以紓官之蓄滯亦使民愛存新穀自古者豐年之法如此䟽官有蓄積恐其乆而腐敗所以紓出官粟之蓄積乆滯者待秋収然後取民新榖以納官也地官旅師云凡用粟春頒而秋歛之註云困時施之饒時歛之此卽我取其陳也王制云三年耕必有一年之食則太平豐年當家自有積而得有貸官粟者作制者美古之辭據多以言不能使皆有蓄積猶今之豐年而民有貧而無食者稅歛有義用之以道以倉粟則陳陳相因民貧則貸取以食所以上下交濟海内乂安豈言皆無蓄積人盡取之也又曾孫之庾如坻如京箋庾露積榖也坻水中之高地也又乃求千斯倉乃求萬斯箱箋成王見禾榖之稼委積之多於是求千倉以處之萬車以載之言年豐収入踰前也又大雅廼積廼倉傳言民樂時和國有積倉也䟽乃有委積乃有囷倉言其有榖食之資又周頌豐年多黍多稌亦有高廪萬億及秭傳廪所以藏齍盛之穗也數萬至萬曰億數億至億曰秭箋萬億及秭以言榖數多䟽器實曰齍在器曰盛謂飯食也以米粟爲之逺本其初出於禾穗故謂廪之所藏爲齍盛之穗也禹貢百里賦納總卽禾稼也銍卽穗也禾稼當積而貯之不在倉廪其穗當在廪藏之自穗以徃秸及粟米皆在倉廪矣廪之高大於藏穗爲宜地官廪人註云藏米曰廪者對則藏米曰廪藏粟曰倉其散卽通也廪之所容兼米兼粟也禮記王制冡宰制國用必於嵗之杪五榖皆入然後制國用用地小大視年之豐耗以三十年之通制國用量入以爲出註通三十年之率當有九年之蓄䟽通三十年之率者每年之率入均分爲四分一分擬爲儲積三分爲當年所用二年又畱一分三年又畱一分是三年總得三分爲一年之蓄王肅以爲二十七年有九年之蓄而言三十舉全數又三年耕必有一年之食九年耕必有三年之食以三十年之通雖有凶旱水溢民無菜色又月令仲秋之月穿竇窖修囷倉註爲物當藏也穿竇窖者入地隋曰竇方曰窖又乃命有司趣民収歛務畜菜多積聚註始爲禦冬之備又孟冬之月命百官謹蓋藏註謂府庫囷倉有財物又命司徒循行積聚無有不斂註謂芻禾薪蒸之屬周禮遺人掌邦之委積以待施惠鄉里之委積以恤民之囏阨門關之委積以養老孤郊里之委積以待賔客野鄙之委積以待羇旅縣鄙之委積以待凶荒註委積者廪人倉人計九榖之數足國用以其餘共之所謂餘法用也少曰委多曰積又廪人掌九榖之數以待國之匪頒賙賜稍食註匪讀爲分分頒謂委人之職諸委積也賙賜謂王所賜予給好用之式也稍食祿廪䟽廪灋有數名天子有御廪單云廪則平常藏米之廪明堂位魯有米廪有虞氏之學以有虞氏尚孝合藏粢盛之委故名學爲米廪非廪稱也詩云亦有高廪註云廪所以藏粢盛之穗以其萬億及秭數多非藏米之數故以藏穗言之與常廪御廪又異又以嵗之上下數邦用以知足否以詔榖用以治年之凶豐註數猶計也䟽上下卽豐凶廪人之官以嵗之豐凶得稅物多少之帳計國之用以知足否若嵗凶稅物少而用多則不足廪人旣知多少足否乃詔告在上用榖之灋以治年之凶豐此卽王制云制國用必於嵗之杪者是也又凡萬民之食食者人四鬴上也人三鬴中也人二鬴下也註此皆謂一月食米也六斗四升曰鬴䟽此謂給萬民糧食之灋食者謂民食國家糧上謂大豐年中謂中豐年下謂少儉年此雖列三等之年以中年是其常法鬴當今六斗四升則今給請亦然又倉人掌粟入之藏辨九榖之物以待邦用有餘則藏之以待凶而頒之註九榖盡藏焉以粟爲主管子凡有地牧民者務在四時守在倉廪倉廪實則知禮節衣食足則知榮辱又積於不涸之倉者務五榖也又凡牧民者以其所積者食之不可不審也其積多者其食多其積寡者其食寡無積者不食又國之寡狹壤之肥墝有數終嵗食餘有數彼守國者守榖而已矣又嵗有凶穰故榖有貴賤令有緩急故物有輕重人君不理則畜賈游於市乘民之不給百倍其本矣凡輕重歛散之以時卽凖平守凖平使萬室之邑必有萬鍾之藏藏鏹千萬千室之邑必有千鍾之藏藏鏹百萬春以奉耕夏以奉耘耒耜器械種穰糧食必取贍焉故大賈畜家不得豪奪吾民矣又桓公曰糶賤寡人恐五榖之歸於諸侯欲爲百姓萬民藏之爲此有道乎管子曰今者夷吾過市有新成囷京者二家君請式璧而聘之桓公曰諾行令半嵗萬民聞之舍其作業而爲囷京以藏菽粟五榖者過半又武王有巨橋之粟註巨橋倉在今廣平郡曲周縣越絶書吳兩倉春申君所造一名均輸吕氏春秋南吕之月蟄蟲入穴趣農収聚無敢懈怠以多爲務淮南子夫天地之大計三年耕而餘一年之食率九年而有三年之畜十八年而有六年之積二十七年而有九年之儲雖涔旱灾害之殃民莫困窮流亡也故國無九年之畜謂之不足無六年之積謂之憫急無三年之畜謂之窮乏韓詩外傳王者藏於天下諸侯藏於百姓農夫藏於囷庾商賈藏於篋笥大戴禮方冬三月草木落庻虞藏五榖必入於倉史記天官書胃爲天倉正義曰胃主倉廪五榖之府也占明則天下和平五榖豐稔又其南衆星曰廥積正義曰芻藁六星在天苑西主積藁草者漢書高帝紀二年築甬道屬河以取敖倉粟註孟康曰敖地名在滎陽西北山上臨河有大倉又七年蕭何治未央宫立太倉三輔黄圖太倉蕭何造在長安城外東南有百二十楹又長安西渭北石徼西有細桞倉東有嘉倉初建一百二十楹漢書地理志河東郡有根倉滋倉又食貨志民三年耕則餘一年之畜三考黜陟餘三年食進業曰登再登曰平餘六年食三登曰泰平二十七嵗遺九年食然後德化流洽禮樂成焉又文帝卽位躬修節儉思安百姓賈誼說上曰古之人曰一夫不耕或受之飢一女不織或受之寒生之有時而用之無度則物力必屈古之治天下至纎至悉也故其畜積足恃夫積貯者天下之大命也茍粟多而財有餘何爲而不成今毆民而歸之農皆著於本使天下各食其力末技游食之民轉而緣南畝則畜積足而人樂其所矣又武帝之初國家無事民人給家足都鄙廪庾盡滿而府庫餘財太倉之粟陳陳相因充溢露積於外又晁錯曰聖王在上而民不凍餒者非能耕而食之織而衣之也爲開其資財之道也故堯禹有九年之水湯有七年之旱而國亡捐瘠者以畜積多而備先具也今海内爲一土地人民之衆不辟湯武加以亡天灾數年之水旱而畜積未及者何也地有遺利民有餘力生榖之土未盡墾山澤之利未盡出也游食之民未盡歸農也夫寒之於衣不待輕煖飢之於食不待甘㫖飢寒至身不顧亷耻人情一日不再食則飢終嵗不製衣則寒夫腹饑不得食膚寒不得衣雖慈母不能保其子君安能以有其民哉明主知其然也故務民於農桑薄賦歛廣畜積以實倉廪備水旱故可得而有也通典永平五年作常滿倉吳書注建康宫城卽吳苑城城内有倉名曰苑倉故開北瀆通轉運於倉所時人亦呼為倉城晋咸和中修苑城為宫惟倉不毁故名太倉在西華門内道北益州記成都縣東有古白帝倉水經注汾陽故城積粟所在名之曰羊腸倉在晋門閭陽北石磴縈委若羊腸故以為名卽今羊腸坂是也隋書食貨志江左京都有龍首倉卽石頭津倉也臺城内倉南塘倉常平倉東西太倉東宫倉所貯總不過五十餘萬在外有豫章倉釣磯倉錢塘倉並是大貯備之處自餘諸州郡臺傳亦各有倉又魏天平元年常調之外逐豐稔之處折絹糴粟以充國儲於諸州緣河津濟皆官倉貯積以擬漕運自是之後倉廪充實雖有水旱凶饑之處皆仰開倉以賑之元象興和之中頻嵗大穣榖斛至九錢又齊河清三年令諸州郡皆别置富人倉又開皇三年詔衛州置黎陽倉洛州置河陽倉陜州置常平倉六典以此通轉運非糶糴華州置廣通倉轉相灌注玉海大業二年十月置洛口倉於鞏城周二十里穿三千窖置回洛倉於洛陽北城周十里穿三百窖窖容八百石唐六典司農寺有太倉令掌九榖廪藏之事注東都則曰含嘉倉倉部郎中掌倉庾凡都之東租納於都之含嘉倉自含嘉倉轉運以實京之太倉唐書食貨志開元二十一年京兆尹裴耀卿請罷陜陸運而置倉河口使江南漕舟至河口者輸粟於倉而去縣官雇舟以分入河洛置倉三門東西漕舟輸其東倉而陸運以輸西倉復以舟漕以避三門之水險乃於河隂置河隂倉河西置柏崖倉三門東置集津倉西置鹽倉鑿山十八里以陸運自江淮漕者皆輸河隂倉自河隂西至太原倉謂之北運自太原倉浮渭以實關中又地理志華州華隂有永豐倉臨渭倉河中府龍門有龍門倉唐會要咸亨三年關中饑監察御史王師順運晋絳之粟於河渭之間増置渭橋倉自師順始也唐書李憲傳河中兵仰食於絳常數十萬石故敖保山為固民之輸者十牛不勝一車憲於瀕汾相城治新倉當費二百萬請留坦縣粟糶河南以錢還糴絳粟𣙜其贏以葺新倉絳人利頼唐陸䞇奏議君養人以成國人戴君以成生上下相成事如一體然則古稱九年六年之蓄者蓋率土臣庻通爲之計耳固非獨豐公庾不及編氓宗史食貨志常平義倉漢隋利民之良法常平以平榖價義倉以備凶灾周顯德中又置惠民倉以雜配錢分數折粟貯之嵗歉減價出以惠民宋兼存其法焉文獻通考宋太宗端拱二年置折中倉許商人輸粟優其價令執劵抵江淮給茶鹽每一百萬石爲一界祿仕之家及形勢户不得輙入粟又淳化五年令諸州置惠民倉如榖稍貴卽減價糶與貧民不得過一斛宋史食貨志咸平中庫部員外郎成肅請福建増置惠民倉因詔諸路申淳化咸平惠民之制又嘉祐二年詔天下置廣惠倉初天下没入户絶田官自鬻之樞宻使韓琦請留勿鬻募人耕収其租别爲倉貯之以給州縣郭内之老㓜貧疾不能自存者領以提㸃刑獄嵗終具出納之數上之三司户不滿萬留田租千石萬户倍之户二萬留三千石三萬留四千石四萬留五千石五萬留六千石七萬留八千石十萬留萬石田有餘則鬻如舊四年詔改𨽻司農寺州選官二人主出納嵗十月遣官騐視應受米者書名於籍自十一月始三日一給人米一升㓜者半之次年二月止有餘乃及諸縣量大小均給之其大畧如此宋㑹要京諸倉總二十三所凡受四河運至京師者謂之轉般倉永豐通濟萬盈廣延延豐順成濟逺富國受江淮所運永濟永富二倉受懐孟二州所運廣濟第一倉受頴夀二州所運廣積廣儲二倉受曹濮諸州所運其受京畿之租者曰稅倉京東界則廣濟第二倉受之京北界則廣積苐一倉騏驥院天駟監倉受之京西界則左天廏坊倉受之京南界則大盈右天廐倉受之宋史夏竦傳竦子安期知渭州籍塞下閒田募人耕種嵗得榖數萬斛以備賑發名曰貸倉玉海紹興二十六年始置豐儲倉以百萬石爲額續文獻通考宋孝宗淳熈十五年司農等言豐儲倉初額一百五十萬石不爲不多積之旣久寧免朽腐異時緩急必致失措擬以每嵗諸州合觧納行在米數及諸處坐倉収糴若干預行㑹計以俟對兌不盡之數如常平法許其於陳新未接之時擇其積久者盡數出糶俟秋成補糴則足五十萬石之額永無銷耗此亦廣儲蓄之䇿也從之又嘉泰時葉筠知南劍州州貧生子多不舉筠請立舉子倉賑給之又理宗紹定六年資政殿學士知潭州曾從龍奏州縣賑民之法有三曰濟曰貸曰糶濟不可常惟貸與糶為利可久今撥緡錢一千萬有竒分下潭州十縣委令佐糴米置惠民倉乞比附常平法從之又紹定中曾用虎知興化軍事立平糴倉捐楮幣萬六千緡爲糴本益以廢寺之榖嵗歉價高則發倉以糶之歳豐價平則散諸寺易新榖藏焉又初閩人生子貧者多不舉紹興中朱文公請立舉子倉淳祐中趙汝愚帥閩推廣其意括絶没之田産召佃輸租仍發糴本建倉収儲遇受孕五月以上者則書於籍逮免乳日人給米一石三斗至是詔賜常平錢米賑給之宋史儒林傳眞德秀知潭州除斛靣米申免和糴以甦其民民艱食旣竭力賑贍之復立惠民倉五萬石使嵗出糶又立慈㓜倉宋吕祖謙曰大抵荒政統而論之先王有預備之政上也修李悝平糶之政次也所在蓄積有可均處使之流通移民移粟又次也咸無焉設糜粥最下也金史食貨志世宗大定十年上責户部曰隨處時有賑濟往往近地無糧取於他處往返旣逺人愈難之何爲不隨處起倉年豐多糴以備賑濟設有緩急豈不亦易辦乎農桑通訣蓄積篇蓄積者有國之先務皆爲民計非徒曰藏富於國也先王預備憂民之意大抵無事而爲有事之備豐嵗而為歉嵗之憂是故國有國之蓄積民有民之蓄積當粒米狼戾之年計一嵗一家之用餘多者倉箱之富餘少者儋石之儲莫不各節其用以濟凶乏此固知堯湯之時國無捐瘠所謂蓄積多而備先具者豈皆藏於國哉蓋必有藏於民者矣今之爲農者見小近而不慮久逺一年豐稔沛然自足侈費妄用以快一時之適所収榖粟耗竭無餘一遇小歉則舉貸出息於兼并之家秋成倍稱而償之嵗以爲常不能振拔其間有収刈甫畢無以餬口者其能給終嵗之用乎嘗聞山西汾晉之俗居常積榖儉以足用雖間有飢歉之嵗庻免夫流離之患也傳曰収歛蓄藏節用御欲則天不能使之貧信斯言也近世利民之法如漢之常平倉榖賤則增價糴之不至於傷農榖貴則減價而糶之不使之傷民唐之義倉計墾田頃畝多寡豐年納榖而藏之凶年出榖以賙貧乏官爲主之務使均之是皆歛其餘以濟不足雖遇儉嵗而不憂飢殍也然嘗考之漢史賈生言于文帝曰漢之爲漢幾四十年公私之積猶可哀痛彼一時也自文帝躬行節儉以化天下至景帝末年太倉之粟陳陳相因而民亦富庻人徒見古之蓄積常有餘後之蓄積常不足豈天之生物不如古之多人之謀事不如古之智蓋古之費給有限而後之費給無窮無怪乎有餘不足之不同也明史食貨志明初京衛有軍儲倉洪武三年增置至二十所各行省有倉官吏俸取給焉邊境有倉収屯田所入以給軍二十八年增京師諸衛倉凡四十一永樂中設北京三十七衛倉益令天下府縣多設倉儲正統中增置京衛倉凡七又凡京倉五十有六通倉十有六直省府州縣藩府邊隘堡站衛所屯戌皆有倉少者一二多者二三十云續文獻通考明正統四年大學士楊士竒言太祖篤意養民天下郡縣悉出官鈔糴榖貯倉以備水旱嵗乆滋弊榖盡食毁請擇遣京官亷幹者往督有司凡豐稔州縣各出庫銀平糴以備荒郡縣官以舉廢爲殿最仁政無切於此上命户部急行之明楊漙奏䟽凡古聖賢立國必修預備之政太祖洪武年間每縣於四境設立倉塲出官鈔糴榖儲貯其中又於近倉之處僉㸃大户看守以備荒年賑貸官籍其數歛散皆有定規又於縣之各鄉相地所宜開濬陂塘及修築濵江近河損壞堤岸以備水旱耕農甚便皆萬世之利自洪武以後有司亦皆視爲文具是以一遇水旱饑荒民無所賴官無所措公私交窘只如去冬今春畿内郡縣艱難可見况聞今南方官倉儲榖十處九空甚者榖旣全無倉亦無存矣大抵親民之官得人則百廢舉不得其人則百弊興此固守令之責若飬民之務風憲之臣皆所當問年來因循亦不之及此事雖若可緩其實關係甚切明史周忱列傳宣德五年忱遷工部右侍郎廵撫江南諸府七年江南大稔詔令諸府縣以官鈔平糴備賑貸蘇州遂得米二十九萬石故時公侯祿米軍官月俸皆支於南户部蘇松民轉輸南京者石加費六斗忱奏令就各府支給與船價米一斗所餘五斗通計米四十萬石有竒并官鈔所糴共得米七十萬餘石遂置倉貯之名曰濟農又正統初淮揚鹽課虧勅忱廵視忱爲節竈户運耗得米三萬二千餘石亦倣濟農倉法置贍鹽倉益補逃亡缺額由是鹽課大殖大清㑹典順治十三年議凖積榖賑給令修葺倉厫印烙倉斛選擇倉書糴糶平價不許别項動支又康熈二十九年諭朕撫育黎元勤思治理足民之道宜裕蓋藏從來水旱靡常必豐年恒有積儲庻歉嵗不憂饑饉如康熙二十七年頗稱嵗稔誠使民間經營撙節早爲儲偫何至二十八年偶遇旱祲室皆懸磬總因先時無備遂至餬口維艱比蠲除正賦特發帑金分行賑濟所在官司悉仰體朕懐竭力從事被灾之衆始獲安全倘非拯救多方則焭黎必流移失所今霖雨時降黍苗被野刈穫在即可望有秋惟恐愚民不知愛惜物力狼籍耗費祗爲目前之計㒺圖來嵗之需縱令年復履豐亦難漸臻殷阜應行直省各督撫嚴飭地方官吏家諭户曉務使及時積貯度終嵗所食常有餘儲用副朕軫念民依綢繆區畫至意又康熙三十年覆凖直屬所捐米石大縣存五千石中縣存四千石小縣存三千石倘遇荒嵗卽以此項給散其留倉餘剩者俱于每年三四月照市價平糶五月初旬盡數觧交守道貯庫九月初司各州縣仍領出買新榖還倉又康熙三十四年諭積貯米榖最爲要務倘能實有蓋藏則雖遘凶荒必不至於饑餒但小民不知儲蓄每于豐稔之年恣意糜費一遇歉嵗即坐困不支今正值麥石収穫之時應行各該地方官勸諭百姓令各户量力捐輸積貯該州縣官将輸納之人姓名數目詳記冊籍其秋禾収穫以後亦依此例舉行如春月轉貸于乏榖之民俟秋月即照此數償還備用每嵗當収穫時遵行此捐輸之法不數年間米穀充裕縱使嵗偶不登何至閭閻艱於粒食大學士等與九卿詹事科道㑹議具奏遵㫖議定令直省各督撫飭各州縣衛所官員勸諭鄉紳士民人等每嵗収穫時令各户量力所能不論幾石幾斗捐輸積貯若將米麥貸於乏穀之人俟収穫時即照原領米麥之數交納如有不肖官員抑勒多収情弊事發即照私派錢糧例處分每嵗収穫時俱照此遵行又康熙四十三年覆准山西之民别無他業惟資田畝恐積貯穀少一時需用購買維艱每大州縣存榖二萬石中州縣一萬六千石小州縣一萬二千石又康熙四十四年議准河南省河南府居數省之中積榖以備賑濟山陜之需令將四十三年漕米每米一石易榖二石共榖四十六萬五千六百石零於河南府収貯榖二十三萬五千六百八十一石造倉厫二百九十三間其餘二十三萬於近汴近洛之祥符縣貯榖三萬石中牟縣貯榖二萬五千石氾水縣貯榖二萬石鞏縣貯榖二萬五千石偃師縣貯榖二萬八千石陜州貯榖二萬七千石靈寳縣貯榖二萬八千石閿鄉縣貯榖二萬七千石共造倉厫三百六十四間嚴勅加謹収貯每年於青黄不接之時出陳易新照依三分之一借給民人秋後還倉又雍正三年諭古者視土之上中爲儲蓄之節蓋爲民經畫久逺不爲一時茍且之計積之於豐年用之於歉嵗所謂有備無患法良而意美也朕自臨御以來宵旰勤求無刻不以民爲念乃重農積粟之詔屢下而閭閻率少蓋藏官倉亦多虧缺卽如直𨽻保定等府去嵗頗稱有秋今春二麥亦熟乃以夏秋雨水過多田禾被澇而民間遂有饑色幾至流離若非多方賑䘏窮民必致失所此皆草野無知食不以時用不以禮但快目前之有餘㒺計異日之不足一遭旱澇追悔無從至於常平等倉原爲備荒而設乃有司奉行不力多至缺額罪何可逭兹據江南浙江江西湖廣福建河南山西陜西廣東廣西雲南貴州等省督撫報稱今嵗秋成八九十分不等朕覧不勝慰悦又重爲吾民計及久長宜及此時講求儲蓄之道以備將來該督撫等可轉飭有司徧行曉諭務須撙節愛惜各留有餘預爲他時緩急之需社倉之法亦宜乘此豐年努力爲之勿但視爲虚文故事朕爲吾民籌畫養贍之道惓惓於懐無時或釋而吾民自謀其身家若但茍且因循不復長顧逺慮則重負朕軫念元元之意矣至於州縣倉儲向有虧缺者若不乘此豐収之時速行買補將來發覺斷不姑貸慎之愼之又雍正三年諭積貯倉糧特爲備荒賑濟之用但南省地方甚屬潮濕米在倉一二年便致霉爛實難収貯改貯稻榖似可長久應否改貯稻榖収貯之處著詳議具奏遵㫖議定江安閩浙湖廣江西四川廣東廣西雲南貴州十省内除安徽但有稻榖原無存貯米石及浙江福建倉米有限無容改易其湖南湖北四川江西四省存貯米石皆在五萬石内外令於一年内改換稻榖江淮截漕米廣東存倉米皆八萬餘石廣西存倉米十萬餘石零分作二年改換稻穀雲南米五十七萬餘石貴州米四十萬餘石一二年内不能盡行改易每年雲南應給兵糧十四萬九千六百餘石貴州兵糧九萬五千六百餘石即將二省存倉之米支給至秋成時於額徴内徴収稻榖補項雲南存倉米石四年内盡可改換貴州三年内盡可改換令各地方官添造倉厫以備収貯欽定授時通考卷五十四
