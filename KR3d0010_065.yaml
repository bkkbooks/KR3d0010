body:
  text: 農餘果三荔支錦荔支龍眼山龍眼龍荔橘柑佛手柑橙香櫞金橘金豆柚枳枸橘橄欖木威餘甘子椰子無花果文官果荔支荔支一名丹荔一名離支樹高數丈自徑尺至於合抱形團圞如帷盖葉如冬青緑色蓬蓬四時常茂花青白開於二三月状如橘又若冠之㽔緌五六月結實喜雙状如初生松毬核如熟蓮子殻有皺紋如羅生青熟紅肉淡白如肪玉味甘多汁夏至將中翕然俱赤大樹每下子百斛五六月盛熟時彼地皆燕㑹其下雖多食亦不傷人覺熱以蜜漿解之或以殻浸水飲亦佳初出嶺南及巴中今閩之泉福漳興蜀之嘉蜀渝涪及二廣州郡皆有之以閩中為第一蜀次之嶺南為下其類有陳紫出著作郎陳琦家品為第一譜云其樹晚熟其實廣上而圓下大可徑寸有五分香氣清逺色澤鮮紫殻薄而平瓤厚而瑩膜如桃花紅核如丁香母剝之凝如水精食之消如絳雪其味之至不可得而名状也荔支以甘為味雖百千樹莫有同者過甘與淡失味之中惟陳紫之於色味香自拔其類此所以為天下第一凡荔支皮膜形色一有類陳紫則已為中品若夫皮厚尖刺肌理黄色附核而赤食之有查食已而澀雖無酢味自亦下等矣大紫種似陳紫實大過之小陳紫實比陳紫差小又時有􅧎核者因而得名方紅徑可二寸色味俱美歲生一二百顆而已出興化屯田郎中方臻家宋公荔支實如陳紫而小甘美亦如之周家紅初為第一及陳紫方紅出而此為次龍牙長可三四寸彎曲如爪牙無核然不常有游家紫種出陳紫實大過之水荔支漿多而淡以上俱出興化軍藍家紅泉州第一出都官員外藍承家法石白出法石院色白其大次於藍紅江綠類陳紫差大獨香薄而味少酸以上出泉州一品紅於荔支為極品生在福州堂前大丁香殻厚色紫味微澀出天慶觀緑核頗類江緑色丹而小荔支核紫而此核獨緑将軍荔支五代時有此官種之因以得名朱柿色朱如柿而大虎皮色紅絶大繞腹有青紋類虎皮牛心以状名之長二寸餘皮厚肉澀玳瑁紅色紅有黑㸃類玳瑁出城東硫黄以色類硫黄故名以上出福州何家紅出漳州何氏圓丁香丁香荔支皆旁蔕大而尖脫此獨圓而香味尤勝十八娘色深紅而細長閩王有女行十八好食此因得名或云物之美少者為十八娘蕙團每朶數十並蔕雙埀釵頭顆顆紅而小可施頭髻珍珠荔支團白如珠無核荔支之最小者粉紅荔支荔支深紅此以色淺為異丁香荔支核小如丁香亦謂之􅧎核蜜荔支以甘為名然過於甘火山荔支本出南越四月熟味甘酸肉薄閩中近年僅有秋元紅實時最晚因以得名蚶殻殻為深渠如瓦屋焉以状得名蒲桃荔支一穟至二三百顆以上見蔡襄荔支譜又有綠色蠟色皆品之竒者自蔡襄以後鄭熊徐􅎾鄧慶寀諸人各為之譜競立新名標竒炫異或言姓氏或言州郡皆識其所出王敬美曰荔支以狀元香為最然不如長樂勝畫肉厚而味甘當為種中第一苐乾之不能如状元香風味楓亭驛荔支甲天下無論丹實纍纍而樹亦婆娑可愛在漳泉者四五月熟然肉薄味酸能損齒又云荔支以興化之楓亭驛為最長樂次之性甘微熱止渴益智健氣病齒及火病人最忌夢溪筆談閩中荔支核有小如丁香者多肉而甘土人亦能為之取荔支木去其宗根仍火燔令焦復種之以大石抵其根但令旁根得生其核乃小種之不復芽徐􅎾荔支譜荔核入土種者氣薄不蕃雖蕃不結子間有成樹者經十餘歲稍稍結果肉酸澀無味鄉人於清明前後十日内將枝梢刮去外皮一節上加膩土用棕裹之至秋露枝上生根以細齒鋸從根處截下植之他所勿令動搖三歲結子纍然矣如接枝之法取種不佳者截去元樹枝莖以利刃微啟小隙將别枝削鍼插固隙中皮肉相向用樹皮封繫寛𦂳得所斟酌裹之凡接枝必待時暄盖欲藉陽和之氣一經接搏二氣交通則轉惡為美矣若近海魚鹽之處斥滷土醎其味微酸不佳縱奪接之終不能以彼易此也又荔性宜熱最畏高寒古樹歴數百年者枝柯詰屈根幹盤旋其隂可蔽數畝歲久根深縱霜霰侵壓不過葉悴可無損於樹當春仍發新葉開花結實至於新種不歴十數年者樹穉根淺一遇霜霰隨即枯萎明年不復花實鄉人有愛其樹者當極寒時樹下以稻草煨火温之寒氣不侵葉無凋損秋冬之際壅壓其根仍伐去枯根不令礙樹逢春尤易發生鄧慶宷荔支譜荔子原無用核種者皆用好枝刮去外皮以土包裹待生白根如毛再用土覆一過以臘月鋸下至春隨生新葉他木栽時皆去枝葉獨荔樹要留宿葉承露若葉去露槁則無生機余嘗六七月鋸荔支蘆新根方生無不存活最怕日曬必求稍隂涼處時時灌水方易生葉羣芳譜荔支有間歲生者謂之歇枝有仍歳生者半生半歇也春花之際傍生新葉其色紅白六七月時色已變緑此明年開花者也今年實者明年歇枝也最忌麝香或遇之花實盡落其熟未更採摘蟲鳥皆不敢近或已取之蝙蝠蜂蟻爭來蠧食園家破竹五七尺搖之荅荅然以逐蝙蝠之屬錦荔支附錦荔支一名癩葡萄元時名紅姑娘即詩所云苦𤓰也出南蕃今閩廣江南皆有之蔓生葉如葡萄有微刺蔓上有鬚莖葉皆柔七八月開小黄花五瓣如椀形結瓜有長短二種色青緑熟則紅黄皮上磥砢架作屏斑斑如錦紅錄陸離最為可玩𤓰味微苦小熟之調以薑醋可為蔬清痰火和肉煮食亦佳其中肉赤如血味甘美春時種秋結實其子形扁如瓜子亦有痱㿔可入藥龍眼龍眼一名益智廣雅云益智龍眼也一名比目一名圓眼一名蜜脾一名燕卵一名繡水團一名海珠叢一名川彈子一名亞荔支一名荔支奴閩廣蜀道出荔支處皆有之樹似荔支高一二丈枝葉微小葉似林檎凌冬不凋春末夏初開細白花七月實熟大如彈丸肉薄於荔支白而有漿甘如蜜質味殊絶純甜無酸實極繁作穗如葡萄每穗五六十顆殻青黄色性畏寒白露後方可採摘性甘平無毒安志健脾補虚開胃除蠧毒去三蟲久服輕身不老禆益聰明故又名益智非今醫家所用之益智子食品以荔支為貴而資益則龍眼為良盖荔支性熱而龍眼平和也農政全書白露後採用海滷浸一宿取出曬乾用火焙之以核乾硬為度如荔支法收藏之成朶乾者名龍眼錦山龍眼附山龍眼出廣中夏月熟色青肉如龍眼亦龍眼之野生者也龍荔附龍荔状如小荔支而肉味似龍眼木之身葉亦似二果故名三月開小白花與荔支同熟但可蒸食不可生噉令人發癎見鬼物出嶺南橘橘一名木奴樹高丈許枝多刺生莖間葉兩頭尖綠色光面濶寸餘長二寸許四月生小白花清香可人結實如柚而小至冬黄熟大者如杯包中有瓣瓣中有核實小如柑味甘微酸種類不一有蜜橘其味最甘黄橘扁小多香霧橘之上品綠橘紺碧可愛不待霜後色味已佳隆冬采之生意如新朱橘實小色赤如火塌橘状大而扁外緑心紅巨瓣多液經春熟乃甘美包橘外薄内盈其􅍺瓣隔皮可數綿橘微小極輭美可愛而不多結沙橘細小甘美凍橘八月開花冬結春采早黄橘秋半已丹穿心橘實大皮光心虚可穿荔支橘膚理皺密儼如荔攴出衡陽乳橘状似乳柑皮堅瓤多味絶酸芳油橘皮似油飾中堅外黑橘之下品自然橘他橘與柑必以枝接之惟此則以橘子下種故名自然味甚美出蘇州台州西出荆州南出閩廣撫州皆不如温州者為上也王敬美曰閩中柑橘以漳州為最福州次之樹多接成惟種成者氣味尤勝橘肉生痰聚飲不益人若煎以蜜充果食甚佳或蜜或薰作餅尤妙亦可醤淹作葅花以之蒸茶向為龍虎山進御絶品園中宜多種多收核葉皆苦平無毒可入藥書禹貢厥包橘柚錫貢傳小曰橘大曰柚疏橘柚二果其種本别以實相比則柚大橘小文昌雜録南方柑橘雖多然亦畏霜每霜時亦不甚收惟洞庭霜雖多仍無所損詢彼人云洞庭四面皆水也水氣上騰尤能辟霜所以洞庭柑橘最佳歲收不耗正為此爾羣芳譜種植種子及栽皆可以枳樹截接或貼接尤易成宜肥地至冬須以大糞壅培則來年花實俱茂遇旱以米泔灌溉則實不損落根下埋死鼠則結實加倍物類相感志云橘見尸而實繁湼槃經云如橘見䑕其果實多避暑録話凡橘一畝比田一畝利數倍而培治之功亦數倍於田橘下之土幾於用篩未嘗少以瓦甓雜之田自種至刈不過一二耘而橘終歲耘無時不使見纎草地必面南為屬級次第使受日每歲大寒則於上風焚糞壤以温之多能鄙事茅灰及羊矢壅之多生實十一月内將橘樹根寛作盤澆大糞三次至春用水澆一次花實必茂便民圖纂十月後將金橘安錫器内或芝蔴雜之經久不壊若橙橘之類藏菉豆中極妙弗近米邊見米即爛柑柑古作甘開寶本草云柑未經霜時猶酸霜後甚甜故名柑子梅溪詩注云他果非無甘者惟柑從甘言最甘也生江南及嶺南閩廣温台蘓撫荆為盛川蜀次之樹似橘少刺實亦似橘而圓大霜後始熟味甘甜皮色生青熟黄比橘差厚理稍粗而味不苦惟乳柑山柑皮可入藥橘實可以久留柑實易腐敗柑樹畏冰雪橘樹畧可耐此柑橘之異也乳柑出温州泥山為最其味似乳酪故名其木婆娑其葉纎長其花香韻其實圓正其膚理如澤蠟其大六七寸其皮薄而味珍脉不黏瓣食不留滓一顆僅一二核亦有全無者擘之香霧噀人為柑中絶品海紅柑樹小而實極大有圍及尺者皮厚色紅可乆藏今獅頭柑亦其類洞庭柑出洞庭山皮細味美其色如丹其熟最早甜柑類洞庭而大毎顆八瓣未霜先黄比他柑加甜饅頭柑近蔕如饅頭尖味香美生枝柑色青膚麤味似石榴微酸可耐乆霜時留之枝間俟味變甘帶葉而折新美可愛平蔕柑出成都大如升色蒼黄朱柑類洞庭而大色嫣紅味多酸以刀破之漬以鹽始可食木柑膚理堅頑瓣大而乏膏外彊中乾故名以木又有白柑沙柑之類性大寒治腸胃熱毒解丹石止異渴多食令人脾冷生痰發痼癖皮調中下氣廣羣芳譜橘録歲當重陽色未黄採之名曰摘青及經霜之二三夕遇天氣晴霽羣以小翦就枝間平蔕斷之輕置筐筥䕶之必謹懼其香霧之裂則易壊尤不便酒香凡採者竟日不敢飲柑橘宜斥鹵之地種時高者畦壟溝以泄水每株相去七八尺歲四鋤冬月以泥壅根夏時以糞溉之物類相感志藏柑子以盆盛用乾潮沙蓋之佛手柑附佛手柑木似朱欒而葉尖長枝間有刺植之近水乃生其實状如人手有指有尺餘者皮如橙柚而厚皺而光澤其色如瓜生緑熟黄其核細味不甚佳而清香襲人置衣笥中雖形乾而香不歇本草南人雕鏤花鳥作蜜煎食橙橙樹似橘有刺實似柚而香晚熟耐久大者如盌經霜始熟葉大有兩刻缺如兩段皮厚蹙衂如沸香氣馥郁可薫衣可芼鮮可和葅醢可為醤虀可蜜煎可糖製為橙丁可蜜製為橙膏可和湯待賔客可解宿酒速醒唐鄧間皆有江南尤多栽植與橘同多食傷肝氣發虛熱同獱肉食發頭旋惡心洗去瓤中酸汁和鹽蜜煎成貯食止惡心能去胃中浮氣惡氣皮消食下氣去胃中浮氣和鹽貯食止惡心香櫞香櫞一名枸櫞柑橘之屬嶺南閩廣江西皆有之實大如小𤓰皮若橙而光澤可愛肉甚厚白如蘿蔔而鬆虛雖味短而香芬大勝置衣笥中經旬猶香古作五和糁用之金橘金橘一名金柑橘録云金柑在他柑時小大者如錢小者如龍目色似金一名盧橘本草云此橘生時青盧色黄熟則如金故有金橘盧橘之名盧黒色也一名夏橘本草云此橘冬夏相繼廣州志謂之夏橘一名山橘嶺表録云山橘子大如土𤓰次如彈丸金色薄皮而味酸一名給客橙本草云香芬如橙可供給客也魏王花木志云蜀有給客橙似橘而非若柚而香亦名盧橘一名小木奴見元稹詩生呉越江浙川廣間出營道者為冠江浙者皮甘肉酸次之樹似橘不甚高大五月開白花結實秋冬黄熟大者徑寸小者如指頭形長而皮堅肌理細潤生則深綠熟乃黄如金味酸甘而芳香可愛糖造蜜煎皆佳廣人連枝藏之入膾醋尤香美便民纂要金橘將枳棘接之八月移栽肥地灌以糞水金豆附金豆一名山金柑一名山金橘橘録云生山徑間比金柑更小形色頗類結實繁多肉瓣不可分止一核羣芳譜木高尺許實如櫻桃生青熟黄形圓而光溜皮甜可食味清而香美可蜜漬柚柚與櫾同古作櫾博雅又謂之七候反一名條爾雅云條柚注云似橙實酢一名壺甘本草云状如􅒾故名壺象形也古今注云甘實形如石榴者謂之壺甘一名臭橙桂海虞衡志又謂之臭柑爾雅謂之櫠又曰椵爾雅云櫠椵注云柚屬也大如盂廣雅謂之鐳柚本草云鐳亦壺也廣州記云鐳柚實大如斗柚實大而粗三月開花竒大香甚馥郁實亦如橘有甘有酸皮厚而臭樹葉皆類橙實有大小二種小者如柑如橙俗呼為蜜筩大者如升如𤓰俗呼為朱欒有圍及尺餘者俗呼為香欒閩中嶺外江南皆有之南人種其核云長成以接柑橘甚良又有名文蛋名仁崽者亦柚類也橘録朱欒作花比柑橘絶大而香就樹採之用箋香細作片以錫為甑入花一重則實香一重使花多於香仍竅甑旁以溜汗液用器盛之炊畢去花以液浸香再蒸凡三換花始暴乾入甆器密盛之他時焚之如在柑林中凡柑橘並金柑皆可切瓣壓去核漬之以蜜金柑著蜜尤勝他品取朱欒核洗凈下土中一年而長名曰柑明年移而疏之又一年木大如小兒拳遇春月乃接取諸柑之佳與橘之美者經年向陽之枝以為貼去地尺餘細鋸截之剔其皮兩枝對接掬土實其中以防水蒻䕶其外麻束之過時而不接則花實復為朱欒矣枳附枳木如橘而小高五七尺葉如橙多刺春生白花至秋成實七八月採為實九月十月採者為殻今醫家以皮厚而小者為枳實完大者為枳殻周禮考工記橘踰淮而北為枳枸橘附枸橘處處有之樹葉並與橘同但幹多刺三月開白花青蘂不香結實大如彈丸形如枳實而殻薄不香橄欖橄欖一名青果一名諫果一名忠果宋王禹偁橄欖詩我今何所喻喻彼忠臣辭齊東野語黄涪翁云餘甘橄欖二物可名之為諌果也南人謂之格覽見元郝經陵川詩注生嶺南閩廣諸郡及沿海浦嶼間皆有之樹似木槵而高大數圍端直可愛枝皆高聳葉似櫸栁二月開花八月結子状如長棗色青兩頭皆尖先生者居下後生者漸高深秋方熟核亦兩頭尖而有稜核内有三竅竅内中有仁可食其類有綠欖色青綠核内無仁有亦乾小烏欖色青黒肉爛而甘取肉搥碎乾自有霜如白鹽謂之欖醤仁最肥大有紋層叠如海螵蛸色白外有黒皮最甘嫩又有一種波斯橄欖出邕州色類相似但核作兩瓣一種方欖出廣西兩江峒中似橄欖而有三角或四角即波斯橄欖之類也野生者樹峻而子繁蜜漬鹽醃皆可藏久用之致逺作佳果生嚼味苦澀微酸良乆乃甘美生食煮汁飲並生津止渴開胃下氣治喉痛消酒毒住泄瀉解一切魚鱉毒及骨鯁閩中尤重其味云咀之口香勝雞舌香嶺表録異橄欖樹有野生者樹峻不可梯縁但刻其根下方寸許内鹽於其中一夕子皆自落種樹書橄欖將熟以竹釘釘之其實盡落鄰幾雜志橄欖木并花如樗將採其實剝其皮以薑汁塗之則盡落木威附本草拾遺木威生嶺南山谷樹高丈餘葉似棟子如橄欖而堅亦似棗削去皮可為粽食餘甘子附餘甘子兩廣諸郡閩之泉州及西川戎瀘蠻界山谷皆有之南方草木状花黄實似李青黄色核圓作六七稜食之先苦後甘異物志其樹葉如槐葉其枝如柘其子圓大如彈丸有文理如定陶𤓰本草木高一二丈枝條甚軟葉青細密朝開暮歛如夜合而微小春生冬彫三月有花著條而生如粟粒隨即結實作莛每條三兩子至冬而熟連核作五六瓣乾即並核皆裂俗作果子噉之泉州山中亦有状如川楝子形圓味類橄欖亦可蜜漬鹽藏其木可製器物椰子椰子一名胥餘嶺南州郡皆有之樹葉如栟櫚高六七丈無枝條其實大如寒𤓰外有粗皮皮次有殻圓而且堅剖之有白膚厚半寸味似胡桃而極肥美有漿飲之得醉寰宇記椰子樹似㯽榔而高大葉長一尺無隂結實一房生三十餘子如瓜其殻中有白如熊白内有漿一升清如水甜如蜜飲之愈渴疾殻堪為酒壺皮堪縳船土人多種之宼宗奭曰椰子開之有汁白色如乳如酒極香别是一種氣味强名為酒中有白瓠形圓如栝樓上起細壟亦白色而微虛其紋若婦人裙褶味亦如汁與着殻一重白肉皆可糖煎為果其殻可為酒器如酒中有毒則酒沸起或裂破今人漆其裏即失用椰子意農政全書椰用甚多南中人樹之者資生之類大率在焉海槎餘録椰子樹初栽時用鹽一二斗先置根下則易發無花果無花果一名映日果一名優曇鉢一名阿駔一名蜜果最易生插條即活在處有之三月發葉樹如胡桃葉如楮子生葉間五月内不花而實狀如木饅生青熟紫味如柿而無核人家宅園隨地種數百本收實可備荒其利有七實甘可食多食不傷人且有益尤宜老人小兒一也乾之與乾柿無異可供籩實二也六月盡取次成熟至霜降有三月常供佳實不比他果一時採擷都盡三也種樹十年取效桑桃最速亦四五年此果截取大枝榦插本年結實次年成樹四也葉為醫痔勝藥五也霜降後未成熟者採之可作糖蜜煎果六也得土即活隨地可種廣植之或鮮或乾皆可濟饑以備歉歲七也倦游録木饅頭京師亦有之謂之無花果状類小棃中空既熟色微紅味頗甘酸嶺南尤多羣芳譜榦插春分前取條長二三尺者插土中上下相半常用糞水澆葉生後純用水忌糞恐枝葉太盛易摧折結實後不宜缺水當置瓶其側出以細霤日夜不絶果大如甌文官果文官果樹高丈餘皮粗多礧砢木理甚細堪作器物葉似榆而尖長周圍鉅齒紋深春開小白花成穗花五瓣每瓣當中微凹有紅筋貫之蔕下有小青托花落結實大者如拳一實中數隔間以白膜仁如馬㯽榔無二裹以白軟皮大如指頂去白皮食其仁甚美多雨及勤澆則實成者多若遇旱則實粃小而不成其果一包中多藏子子多白色紋旋轉如卷蕉味甘香如嫩蓮菂欽定授時通考卷六十五
