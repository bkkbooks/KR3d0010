body:
  text: 農餘雜植竹茶紅花大藍紫草地黄蒲黄蓆草燈心草竹竹植物也非草非木說文云竹冬生草也竹譜云竹是一族之總名一形之偏稱也植物之中有草木竹猶動品之中有鳥魚獸也耐濕耐寒貫四時而不改柯易葉其操與松柏等第雖喜濕惡燥亦不宜水淹其根根之發生喜向上行本草云其根鞭喜行東南其性又與菊等宜添河泥覆之每至冬月須厚加土為佳每長至四年者即伐去庶不礙新笋而林亦茂盛其類至多戴凱之有竹譜劉美之續竹譜僧贊寧又有筍譜各數十種羣芳譜所載更三十餘種爾雅簜竹注竹别名疏李巡曰竹節相去一丈曰簜孫炎曰竹濶節者曰簜郭氏曰竹别名無大小之異也又莽數節桃枝四寸有節粼堅中簢筡中仲無笐䈚箭萌篠箭疏此辨竹節希數及中空實萌篠之異名也凡竹節閒促數者名莽相去四寸有節者名桃枝竹其中堅實者名粼其中空者名簢筡空中仲無笐注未詳䈚一名箭萌即筍也篠一名箭格物總論竹中虛白膜外皮青綠色或黄或紫或斑駁文或小或大或長或短種族最多大抵皆自根而莖莖皆有節莖間節處生枝枝毎兩之枝亦有節枝間節處生葉葉毎三之初出地為笋笋節有籜包之及成莖抽之而籜遂漸次脫落脫落處有粉歳久而茂茂則成林羣芳譜八月為竹小春竹之萌曰筍竹之節曰箹竹之叢曰筤竹之實曰􅘽竹之得風而體夭屈曰笑竹死曰䈙齊民要術宜高平之地近山阜尤是所宜下田得水則死黄土軟土為良正月二月中斸取西南引根并莖芟去葉於園内東北角種之令坑深二尺許覆土厚五寸竹性愛向西南引故園東北角種之數嵗之後自當滿園諺云東家種竹西家治地為滋蔓而來生也其居東北角者老竹種不生亦不能滋茂故須取西南引少根也稻麥糠糞之二糠各自堪糞不令和雜不用水澆澆則淹死勿令六畜入園二月食淡竹筍四月五月食苦竹筍蒸煮包酢在人所好其欲作器者經年乃堪殺未經年者軟未成也農桑通訣種竹宜去稍葉作稀泥於坑中下竹栽以土覆之杵築定勿令脚踏水厚五寸竹忌手把及洗手面脂水澆著即枯死月庵種竹法深濶掘溝以乾馬糞和細泥填高一尺無馬糞礲糠亦得夏月稀冬月稠然後種竹須三四莖作一叢亦須土鬆淺種不可增土於株上泥若用钁打實則笋不生種時斬去稍仍為架扶之使根不揺易活又法三兩竿作一本移其根自相持則尤易活也或云不須斬稍只作兩重架尤妙夢溪云種竹但林外取向陽者向北而栽蓋根無不向南必用雨下遇有西風則不可花木亦然諺云栽竹無時雨下便移多留宿土記取南枝志林云竹有雌雄雌者多筍故種竹常擇雌者凡欲識雌雄當自根上第一枝觀之有雙枝者乃為雌竹獨枝者乃為雄竹種樹書種竹處當積土令稍高於傍地二三尺則雨潦不浸損錢唐人謂之竹脚移時須是根垜大維以草繩仍向背不失其舊為佳種竹須將竹母斬去只留四五尺仍斜植之用礲糠和泥抱根然後用淨土傅其上或鋪少大麥於其中令竹根着麥上以土蓋之其根易行一法擇大竹就根上去三四寸許截斷之去其上不用只以竹根截處打通節實以硫黄末顛倒種之第一年生小竹隨即取之次年亦去之至第三年生竹其大如所種者種時以舊茅茨夾土則竹根㝷地脉而生禁中種竹一二年間無不茂盛園子云初無他術只有八字疎種密種淺種深種疎種謂三四歩種一棵欲其地虛行鞭密種謂種雖疎每窠却種四五竿欲其根密淺種謂其種時不甚深深種謂種時雖淺却用河泥壅之竹林中有樹切勿去之蓋竹為樹枝所礙雖風雪不復欹斜筀竹根多穿害堦砌惟叙皂莢刺埋土中障之根則不過或用鐵屑栽油麻萁尤妙元扈先生曰筀竹根强能害他竹不宜雜種必須障之其法莫如深溝耳或云以炭屑實之太費或云以煤炭實之移竹惟五月十三日謂之竹醉日又謂竹迷日又謂龍生日栽竹則茂盛元扈先生曰五月實竹笋已出生氣内欵故可移栽竹以六月為臘也龍生竹醉無理可通或曰不必五月但每月二十日皆可又一云正月一日二月二日三月三日皆可種無不活者每月倣此如要不間年出笋用正月一日二月二日又云用辰日山谷所謂根雖辰日斸笋看上番成又曰宜用臘日杜少陵詩東林竹影薄臘月更宜栽然臘月之説大謬少陵所謂臘正指夏月少陵通逹非業所及也麥以五月為秋竹以六月為臘冬伐竹不蛀夏伐必蛀正謂潤澤在焉故也此論大謬矣竹之滋澤春發於枝葉夏藏於榦冬歸於根如冬伐竹經日一裂自首至尾不得全盛夏伐之最佳但於林有損夏伐竹則根色而鞭皆爛然要好竹非盛夏伐之不可七八月尚可自此滋澤歸根而不中用矣如要竹不蛀取五月以前但此月以前竹不生皆根爛竹與菊根皆長向上添泥覆之為佳農政全書移竹泥垜須厚所云多留宿土是也平地止掘深尺許將泥垜移置其上四週以鬆泥蓋之不用脚踏搥打日日以水澆之度其實乃已又須搭架以防風揺又法移竹種離生枝節上四五節斫斷即不帆風不須用架瑣碎錄云引竹法隔籬埋貍或猫於墻下明年筍自迸出竹以三伏內及臘月中斫者不蛀竹有六七年便生花所謂留三去四蓋三年者留四年者伐去諺曰一人種竹十年盛十人種竹一年盛言須大科移植方不傷其根也若只二三榦作一科四面根皆斸斷安得有生氣耶又浙中人代園種竹甚有理所謂祖孫不相見也余别有圖説此法甚得利而工人用竹者則以平園為勝謂山間代園之竹嫩而不堅不如平地園林者竹老而堅靭也蓋事不能兩利如此又晉起居注曰惠帝二年巴西郡竹生紫色花結實如麥皮青中米白味甜此亦恒有但竹生花生實輒滿林楛死花結實如稗謂之竹米一竿如此乆之則舉林皆然其活之之法於初米時擇一竿稍大者截去近根三尺許通其節以糞入之則止此有二病其一私者竹園既乆根多蟠結故也治之之法將園地分段掘起宿根間一段起一段使其根舒展次年還復盛矣其一公者遍地皆然此必水澇之年或水災之後也此則無法可治但不可因其枯瘁遽起竹根只須留以待之一二年後自然復發依然故林倘是老園亦宜用間段掘根彼拙者不知此理逕自掘盡謂復栽之無論因循不栽即復栽豈能一二年遽盛耶又篥竹為藩可禦大寇今南土苗亂或至村落無居人而不知作此何哉此竹亦可移至北土余曾為廣西大叅張叔翹言之後安南之寇來侵土司沿江有篥皆不能渡當益信余言不誣耳篥竹實中勁强有毒銳似刺虎中之則死筍附筍爾雅曰筍竹萌也說文曰笋竹胎也孫炎曰初生竹謂之筍詩義疏云筍皆四月生唯巴竹笋八月生盡九月成都有之篃冬夏生始數寸可煮以苦酒漫之可下酒及食又可米藏及乾以待冬月也陸佃云字從旬從日包之日為筍解之日為竹又曰字從竹從旬旬內為筍旬外為竹也農桑通訣採筍之法視其叢中斜密者芟取之竹鞭方行處不宜採採則竹不繁採時可避露日出後掘深土取之半折取鞭根旋得投密器中以油單覆之勿令見風風吹則堅筍味甘美有毒惟香與薑能殺其毒煮宜久熟生則損人然食品之中最為珍貴故禮云加豆之實筍爼魚醢詩云其􅉡伊何維筍及蒲蓋貴之也永嘉記含􅢭竹笋六月生迄九月味與箭竹笋相似凡諸竹笋十一月掘土取皆得長八九寸長澤民家盡養黄苦竹永寜南漢更年上笋大者一圍五六寸明年應上今年十一月笋土中已生但未出須掘土取可至明年正月出土訖五月方過六月便有含􅢭筍含􅢭筍迄七月八月九月已有箭竹筍迄後年四月竟年常有筍不絶也種樹書曰隂雨土虚則鞭行明年筍莖交出也竹譜棘竹筍味淡落人鬚髪䇺節出笋無味雞頭竹筍肥美篃竹筍冬生者也食經淡竹筍法取筍肉五六寸者按鹽中一宿出鹽令盡煮糜一斗分五升與一升鹽相和糜熟須令冷內竹筍醎糜中一日拭之內淡糜中五日可食也茶茶鶴山集云茶之始其字為茶玉篇云茶除加切一名檟一名茗一名荈一名蔎方言云蜀西南人謂茶曰蔎樹如𤓰蘆葉如梔子花如白薔薇而黄心清香隱然實如栟櫚蔕如丁香根如胡桃有高一尺者有二尺者有數丈者有兩人合抱者出巴山峽川有建州大小龍團始於丁謂成於蔡君謨熙寜末有㫖下建州製蜜雲龍一品尤為竒絶蜀州雀舌鳥嘴麥顆蓋嫩牙所造似之又有片甲者早春黄芽葉相抱如片甲也蟬翼葉輭薄如蟬翼也洪州鶴嶺茶其味極妙蜀之雅州蒙山頂有露芽榖芽皆云火前者言採造於禁火之前也火後者次之一云雅州蒙頂茶其生最晚在春夏之交常有雲霧覆其上若有神物䕶持之又有五花茶者其片作五出花雲脚出袁州界橋其名甚著不若湖州之研膏紫筍烹之有綠脚垂下又紫筍者其色紫而似筍又有綠花紫英之號草茶盛於兩浙日注第一自景祐以來洪州雙井白芽製作尤精遠在日注之上遂為草茶第一宜興㴩湖出含膏宣城縣有了山形如小方餅横鋪茗芽産其上其山東為朝日所燭號曰陽坡其茶最勝曰了山陽坡横文茶一名瑞草魁又有建州北苑先春洪州西山白露安吉州顧渚紫筍常州宜興紫筍陽羡春池陽鳯嶺睦州鳩坑劍南石花露鋑芽籛芽南康雲居峽州小江園碧澗􅀢明月芳蘂􅀢茱萸􅀢東川神泉小團昌明獸目福州方山露芽夔州香山江陵楠木湖南衡蘄州蘄門團黄壽州霍山黄芽六安州小峴春皆茶之極品玉壘關外寶唐山有茶樹産懸崖筍長三寸五寸方有一葉兩葉太和山騫林茶初泡極苦澀至三四泡清香特異人以為茶寶涪州出三般茶最上賔化製於早春其次白馬最下涪陵收茶在四月嫩則益人粗則損人真者用箬烟燻過氣味尤佳文獻通考凡茶有二類曰片曰散片茶蒸造實捲模中串之惟建劍則既蒸而研編為格置焙室中最為精潔其名有龍鳯石乳白乳頭金蠟面頭骨次骨末骨麤骨山挺十二等龍鳯皆團片石乳頭乳皆狹片名曰京的乳亦有濶片者乳以下皆濶片餘州片茶有進寶雙勝寶山兩府出興國軍仙芝嫩蘂福合祿合運合慶合指合出饒池州泥片出䖍州綠英金片出袁州玉津出臨江軍靈州福州先春早春華英來泉勝金出歙州獨行靈草綠芽片金金茗出潭州大拓枕出江陵大小巴陵開勝開捲小捲生黄翎毛出岳州雙上綠芽大小方出岳辰澧州東首淺山薄側出光州總二十六名散茶有太湖龍溪次號末號出淮南岳麓草子楊樹雨前雨後出荆湖清口出歸州茗子出江南總十一名茶箋天池青翠芳馨可稱仙品陽羡俗名羅岕浙之長興者佳荆溪稍下細者其價兩倍天池六安品亦精入藥最效龍井不過十數畝外此有茶皆不及天目為天池龍井之次地志云山中寒氣早嚴茶之萌芽較晚七修彚藁洪武二十四年詔天下産茶之地嵗有定額以建寜為上茶名有四探春先春次春紫筍不得碾揉為大小龍團四時類要熟時收取子和濕沙土拌筐籠盛之穰草蓋不爾即凍不生至二月中出種之於樹下或背隂之地開坎圓三尺深一尺熟斸著糞和土每阬中種六七十顆子蓋土厚一寸强任生草不得耘相去二尺種一方旱時以米泔澆此物畏日桑下竹隂地種之皆可二年外方可耘治以小便稀糞蠶沙澆擁之又不可太多恐根嫩故也大槩宜山中帶坡峻若於平地即於兩畔深開溝壠洩水水浸根必死三年後收茶大觀茶論植産之地崖必陽圃必隂蓋石之性寒其葉抑以瘠其味疎以薄必資陽和以發之土之性敷其葉疎以暴其味强以肆必資隂䕃以節之隂陽相濟則茶之滋長得其宜又擷茶以黎明見日則止用爪斷芽不以指揉慮氣汙薰漬茶不鮮潔故茶工多以新汲水自隨得芽則投諸水凡芽如雀舌榖粒者為鬭品一鎗一旗為揀芽二鎗二旗為次之餘斯為下茶之始芽萌則有白合既擷則有烏帶白合不去害茶味烏帶不去害茶色茶解茶地南向為佳向隂者遂劣故一山之中美惡大相懸也而茶園不宜加以惡木惟桂梅辛夷玉蘭玫瑰蒼松翠竹與之間植足以蔽覆霜雪掩映秋陽其下可植芳蘭幽菊清芬之物最忌菜畦相逼不免滲漉滓厥清真茶疏清明榖雨摘茶之候也清明太早立夏太遲榖雨前後其時適中若肯再遲一二日期待其氣力完足香烈尤倍易於收藏雖稍長大故是嫩枝柔葉也又生茶初摘香氣未透必借火力以發其香然性不耐勞炒不宜乆多取入鐺則手不匀乆於鐺中過熟而香散矣甚且焦枯何堪烹㸃炒茶之器最忌新鐵鐵腥一入不復有香尤忌脂膩害甚於鐵須豫取一鐺耑用炊飲無得别作他用炒茶之薪僅可樹枝不可幹葉幹則火力猛熾葉則易燄易滅鐺必磨瑩旋摘旋炒一鐺之內僅容四兩先用文火次用武火催之手加木指急急鈔轉以半熟為度微俟香發是其候矣如􅔩茶不炒甑中蒸熟然後烘焙緣其摘遲枝葉微老炒亦不能使軟徒枯碎耳亦有一種極細炒􅔩乃采之他山炒焙以欺好竒者彼中甚愛惜茶决不忍乘嫩摘採以傷樹本聞龍茶箋茶初摘時須揀去枝梗老葉惟取嫩葉又須去尖與柄恐其易焦此松蘿法也炒時須一人從傍扇之以祛熱氣否則黄色香味俱減炒起出鐺時置大磁盤中仍須急扇令熱氣稍退以手重揉之再散入鐺文火炒乾入焙蓋揉則其津上浮㸃時香味易出田子藝以生晒不炒不揉者為佳亦未之試耳煮茶小品茶之團者片者皆出於碾磑之末既損真味復加油垢即非佳品總不若今之芽茶也蓋天然者自勝耳農政全書茶之為法釋滯去垢破睡除煩功則著矣其或採造藏貯之無法碾焙煎試之失宜則雖建芽浙茗祗為常品故採之宜早率以清明榖雨前者為佳過此不及然茶之美者質良而植茂新芽一發便長寸餘其細如針斯為上品如雀舌麥顆特次材耳採訖以甑微蒸生熟得所生則味硬熟則味減蒸已用筐箔簿攤乘濕畧揉之培匀佈火烘令乾勿使焦編竹為焙裹篛覆之以收火氣茶性畏濕故宜篛收藏者必以篛籠剪篛雜貯之則乆而不浥宜置頓高處令常近火為佳凡煎試須用活水活火烹之故東坡云活水仍將活火烹者是也活水謂山泉水為上江水次之井水為下活火謂炭火之有焰者常使湯無妄沸始則蟹眼中則魚目纍然如珠終則泉湧鼓浪此候湯之法非活火不能爾東坡云蟹眼已過魚眼生颼颼欲作松風聲盡之矣茶之用有三曰茗茶曰末茶曰蠟茶凡茗煎者擇嫩芽先以湯泡去熏氣以湯煎飲之今南方多效此然末子茶尤妙先焙芽令燥入磨細碾以供㸃試凡㸃湯多茶少則雲脚散湯少茶多則粥面聚鈔茶一錢匕先注湯調極匀又添注入迴環擊拂視其色鮮白着無水痕為度其茶既甘而滑南方雖産茶而識此法者甚少蠟茶最貴而製作亦不凡擇上等嫩芽細碾入羅雜腦子諸香膏油調齊如法印作餅子製様任巧候乾仍以香膏油潤飾之其製有大小龍團帶胯之異此品惟充貢獻民間罕見之間有他造者色香味俱不及蠟茶珍藏既乆㸃時先用溫水微漬去膏油以紙裹槌碎用茶鈐微炙旋入碾羅旋碾則色白經宿則色昏新者不用漬茶鈐屈金鐵為之砧用石椎用木碾餘石皆可茶之用芼胡桃松實脂麻杏栗任用雖失正味亦供咀嚼然茶性冷多飲則能消陽山谷益以薑鹽煎飲其亦以是歟因併及之紅花紅花一名紅藍一名黄藍以其花似藍也博物志云張騫得種於西域今處處有之色紅黄葉綠似藍有刺夏開花花下有捄多刺花出捄上捄中結實如小豆大其花可染真紅及作臙脂苗生嫩時可食其子搗碎煎汁入醋拌蔬食極肥美又可為車脂及燭番紅花一名洎夫藍一名撒法即出西番回回地及天方國齊民要術花地欲得良熟二三月間俟雨後速下或漫散種或耬下一如種麻法亦有鋤掊而掩種者子科大而易料理花出欲日日乘凉摘取不摘則乾摘必須盡餘留即合五月子熟收曝令乾打取之子亦不用鬱浥五月種晚花春初即留子入五月便種若待新花熟後取子則太晚矣七月中摘深色鮮明耐久不黦勝春種者負郭良田種頃者嵗收絹三百疋一頃收子二百斛與麻子同價既任車脂亦堪為燭即是直頭成米二百石米已當穀田三百疋絹端然在外一頃收花日須百人摘以一家手力十不充一但駕車地頭每旦當有小兒僮女百十餘羣自來分摘正須平量中半分取是以單夫隻妻亦得多種又殺花法摘取即碓持使熟以水淘布袋絞去黄汁更擣以粟飯漿清而醋者淘之又以布袋絞汁即收取染紅勿棄也絞訖著甕器中以布蓋上雞鳴更擣以栗令均於蓆上攤而曝乾勝作餅作餅者不得乾令花浥鬱也又作胭脂法預燒落藜藜藋及蒿作灰無者即草灰亦得以湯淋取清汁初汁純厚大釅即放花不中用惟可洗衣取第三度湯者以用菜花和使好色也揉花十許變勢盡乃生布袋絞取純汁著甕椀中取醋石榴兩三個劈取子擣破少著粟飯漿水極酸者和之布絞取瀋以和花汁若無石榴者以好醋和飯漿亦得若復無醋者清飯漿極酸者亦得空用之下白米粉大如酸棗粉多則白以淨竹箸不膩者良乆痛攪蓋冐至夜㵼去上清汁至淳處止傾著白練角袋子中懸之明日乾浥浥時捻作小瓣如半麻子隂乾之則成矣又合香澤法如清酒以浸香夏用冷酒春秋温酒令煖冬則小熱雞舌香俗人以其似丁子則為丁子香也藿香首蓿蘭香凡四種以新緜裹而浸之夏一宿春秋再宿冬三宿用胡麻油兩分猪腹腹宜作􅀈或胰一分內銅鐺中即以浸香酒和之煎數沸後便緩火微煎然後下所浸香煎緩火至暮水盡沸定乃熟以火頭内澤中作聲者水未盡有煙出無聲者水盡也澤欲熟時下少許青蒿以發色綿羃鐺觜瓶口㵼又合面脂法牛髓牛髓少者用牛脂和之若無髓空用脂亦得温酒浸丁香藿香二種浸法如煎澤法煎法一同合澤亦著青蒿以發色綿濾著瓷漆盞中令凝若作脣脂者以熟朱和之青油裹之其冐霜雪遠行者常齧蒜令破以揩脣既不劈裂又令辟惡賊面患皴者夜燒梨令熱以糠湯洗面訖以煖梨汁塗之令不皴赤連染布嚼以塗面亦不皴也又合手藥法取猪􅀈一具摘去其脂合蒿葉於好酒中痛挼使汁甚滑白桃仁二七枚去黄皮研碎酒解取其汁以緜裹丁香藿香甘松香橘核十顆打碎著􅀈汁中仍浸置勿出瓷貯之夜煮細糠湯淨洗面拭乾以藥塗之令手軟滑冬不皴又作紫粉法用白米英粉三分胡粉一分不著胡粉不著人面和合匀調取葵子熟蒸生布絞汁和粉日曝令乾若色淺者更蒸取汁重染如前法又作米粉法染米第一粟米第二如用一色純第米勿使有雜白使甚細簡去碎者各自純作莫雜餘種其雜米糯米小麥黍米榛米作者不得好也於槽中下水脚踏十徧淨淘水清乃止大甕中多著冷水以浸米春秋則一月夏則二十日冬則六十日唯多日佳不須易水臭爛乃佳日若淺者粉不潤美日滿更汲新水就甕中沃之以手把攪淘去醋氣多與徧數氣盡乃止稍出著一砂盆中熟研以水沃攪之接取白汁絹袋濾著别甕中麄沉者更研之水沃接取如初研盡以杷子就甕中良乆痛抨然後澄之接去清水貯出淳汁著大盆中以板一向攪勿左右迴轉三百餘匝停置蓋甕勿令塵汚良乆清澄以杓徐徐去清以三重布帖粉上以粟糠著布上糠上安灰灰濕更以乾者易之灰不復濕乃止然後削去四畔麄白無光潤者别收之以供麄用麄粉米皮所成故無光潤其中心圓如鉢形酷似鴨子白光潤者名曰粉英英粉米心所成是以光潤也無風塵好日時書布於牀上刁削粉英如曝之乃至粉乾足將住反手痛挼勿住痛挼則滑美不挼則澀惡擬人客作餅及作香粉以供粧摩身體又作香粉法唯多著丁香於粉合中自然分馥亦有愛香木絹和粉者亦有水没香以汁溲粉者皆損色又賣香不如全著合中也便民圖纂八月中鋤成行壠舂穴下種或灰或雞糞蓋之澆灌不宜濃糞次年花開侵晨採摘微搗去黄汁用青高蓋一宿捻成薄餅晒乾收用勿近濕墻壁去處又臙脂有四種李時珍曰一種以紅藍花汁染胡粉而成乃蘓鶚演義所謂臙脂葉似薊花似蒲出西方中國謂之紅藍以染粉為婦人面色者是也一種以山臙脂花汁染粉而成乃段公路北户録所謂端州山間有花叢生葉類藍正月開花似蓼土人采含苞者為臙脂粉亦可染帛如紅藍者也一種以山榴花汁作成者鄭䖍胡本草中載之一種以紫鉚染棉而成者謂之胡臙脂李珣南海藥譜載之今南人多用葉鉚臙脂俗呼紫梗是也齊民要術所載正與蘇鶚演義相合雖非今時所行農政全書以其有益民用備載其法今仍之藍藍說文染青草也凡數種蓼藍葉如蓼五六月開花成穗淺紅色子亦如蓼嵗可三刈菘藍葉如白菘馬藍葉如苦蕒即郭璞所謂大葉冬藍俗所謂板藍者二藍花子並如蓼藍吳藍長莖如蒿而花白吳人種之水藍長莖如決明高者三四尺七月開淡紅花結角長寸許如小豆角其子亦如馬蹄決明子而微小迥與諸藍不同而作澱則一也别有甘藍一種可食又大藍葉如萵苣而肥厚微白似擘藍色小藍莖赤葉綠而小槐藍葉如槐葉皆可作靛至於秋月煮熟染衣止用小藍禮記月令仲夏之月令民毋艾藍以染注為傷長氣也是月藍始可别夏小正五月啓灌藍蓼疏此月藍既長大始可分移布散熊氏云灌謂叢生也言開闢此叢生藍蓼分移使之稀散爾雅葴馬藍注今大葉冬藍也疏四民月令榆莢落時可種藍五月可刈藍六月種冬藍冬藍木藍也齊民要術藍地欲得良三徧細耕三月中浸子令芽生乃畦種之治畦下水一同葵法藍三葉澆之晨夜再澆之薅治令淨五月中新雨後即接濕耬耩拔栽夏小正日五月洛藋藍蓼元扈先生曰栽時宜併功急手無令地燥也三莖作一科相去八寸栽時既濕白背不急鋤堅確也五徧為良七月中作坑令受百許束作麥稈泥泥之令深五寸以苫蔽四壁刈藍倒竪於坑中下水以木石鎮壓令没熱時一宿冷時再宿漉去荄内汁於甕中率十石甕著石灰一斗五升急抨普彭反之一食頃止澄清㵼去水别作小坑貯藍澱著坑中候如强粥還出甕中盛之藍澱成矣種藍十畝敵穀田一頃能自染青者其利又倍矣農桑通訣木藍松藍可以為澱者蓼藍但可染碧不堪作澱藍一本而有數色刮行青綠雲碧青藍黄豈有青出于藍而青於藍者乎藍非獨可染青絞其汁飲之最能解釋蟲豸諸藥等毒不可闕也便民圖纂正月中以布袋盛子浸之芽出撒地上用糞灰覆蓋待放葉澆水糞長二寸許分栽成行仍用水糞澆活至五六月烈日内將糞水潑葉上約五六次俟葉厚方割離土二寸許將梗葉浸水缸内晝夜濾淨每缸內用礦灰色清者灰八兩濃者九兩以木朳打轉澄清去水是謂頭靛其在地舊根旁須去草淨澆灌一如前法待葉盛亦如前法收割浸打謂之二靛又俟長亦如前澆灌斫則齊根浸打法亦同前謂之三靛其濾出柤壅田亦可紫草紫草一名紫丹一名紫芺一名茈䓞一名藐爾雅曰藐紫草一名地血一名鴉銜草生碭山山谷南陽新野及楚地苗似蘭香莖赤節青二月開花紫白色結實亦白色秋月根色紫可以染紫味甘氣寒無毒博物志平氏山之陽紫草特好廣志隴西紫草紫之上者齊民要術黄白軟良之地青沙地亦善開荒黍穄下大佳性不耐水必須高田秋耕地至春又轉耕之三月種之耬耩地逐壟手下子良田一畝用子二升薄田用子三升下訖勞之鋤如殺法唯淨為佳其壟底草則拔之壠底用鋤則傷紫草九月中子熟刈之候稃芳蒲反燥載聚打取子濕載子則鬱浥即深細耕不細不深則失草矣㝷壟以耙耬取整理收草宜併手力速竟為良遭雨則損草也一扼隨以茅結之擘葛彌善四扼為一頭當日則斬齊顛倒十重許為長行置堅平之地以板石鎮之令扁濕鎮直而長燥鎮則碎折不鎮賣難售也兩三宿竪頭著日中曝之令浥浥然不曝則鬱黒大燥則碎折五十頭作一洪洪十字大頭向外以葛纒絡著敞屋下隂凉處棚棧上其棚下勿使驢馬糞及人溺又忌煙皆令草失色其利勝藍若欲乆停者入五月內著屋中閉户塞向密泥勿使風入漏氣過立秋然後開草出色不異若經夏在棚棧上草便變黑不復任用務本新書種訖拖瓶擺之或以輕鈍碾過秋深子熟旁去其土連根取出就地鋪穧頗乾輕振其土以茅策束切去虛稍以之染紫其色殊美地黄地黄一名地髓一名芐一名芑一名牛奶子一名婆婆奶見本草處處有之河南懷慶者佳二月生莖有細短白毛布地深青色似小芥葉而厚不义了上有皺文毛濇不毛高者尺餘低者三四寸摘其傍葉作菜甚益人開小筒子花似油麻花但有斑㸃紅紫色亦有黄者實作房如連翹子如小麥褐色根黄如胡蘿蔔粗細長短不一根入土即生宜肥地虛則根大而多汁正九月採根生地曝乾熟地蒸晒忌銅鐵器爾雅芐地黄注江東呼為芐齊民要術種須黑良田五徧細耕三月以上旬為上時中旬為中時下旬為下時一畝下種五石其種還用三月中掘取者逐犁後如禾麥法下之至四月末五月初生苗訖至八月盡九月初根成中染若須留為種者即在地中勿掘之待來年三月取之為種計一畝可收根三十石有草鋤不限徧數鋤時别作小刄鋤勿使細土覆心今秋收訖至來年更不須種自旅生也唯鋤之如此得四年不要種之皆餘根自出矣羣芳譜種宜沙軟地先於十二月耕熟至正月細耙三四遍然後作溝濶二尺兩溝作一畦濶四尺其畦微高而平硬使不受水三月初種苗未生時得水即溝畦中又撥作溝深三寸許每一畝用根五十斤蓋土訖即取經冬爛草覆之候芽稍出以火燒其草令燒去其苗再生葉肥茂根益壯自春至秋凡五六耘不得鋤一年後滿畦宿根採訖還生八月堪采根若不採其根太盛春二月宜出之若秋採訖至春不復更種其生者猶得三四年但採訖比至明年耨耘而已欲食其葉但露散後摘取傍葉勿損中心正葉秋收其花可充冬用蒲蒲叢生於下隰地莖長者可六七尺三脊其葉如薤二三月生苗八九月收可為蓆軟滑而温爾雅莞苻蘺其上蒚注今西方人呼蒲為莞蒲蒚謂其頭臺首也今江東謂之苻蘺西方亦名蒲中莖為蒚用之為蓆農桑通訣四月揀綿蒲肥旺者廣帶根泥移出於水地內栽之次年即堪用其水深者白長水淺者白短農政全書春初生嫩葉出水時取其中心入地白蒻大如匕柄者生啖之甘脆以醋浸食如食笋法亦美周禮所謂蒲爼也亦可煠食蒸食及晒乾磨粉作餅食詩曰惟笋及蒲是矣八九月收葉可作扇又可包裹蓆草附農政全書小暑後斫起以備織蓆留老根在田壅培發苗至九月間鋤起擘去老根將苗去稍分栽如插稻法用河泥與糞培壅清明榖雨時復用糞或豆餅壅之即耘草立梅後不可壅若灰壅之則生蟲退色燈心草附燈心草一名虎鬚草一名碧玊草馬志曰生江南澤地叢生莖圓細而長直人將為席寇宗奭曰陜西亦有之蒸熟待乾折取中心白穰燃燈者是為熟草又有不蒸熟者但生乾剝取為生草李時珍曰吳人栽蒔之取穰為燈炷以草織蓆及蓑農政全書種法與蓆草同最宜肥田瘦則草細五月斫起晒乾以尖刀釘板櫈上劃開其心可㸃燈及為燭心其皮可製雨蓑欽定授時通考卷六十九
