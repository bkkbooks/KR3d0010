  text: 欽定四庫全書欽定授時通考卷七
  hash: sha256:a9595310bd65689632fac35d4780f7fb7b3ed07c8b9e802b52747c7050734e49
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3d0010_WYG_007-1a, image: WYG0732/WYG0732-0081a.png}
body:
  text: 土宜彚考易泰卦輔相天地之宜以左右民疏天地之宜者謂天地所生之物各有其宜若大司徒云其動物植物及職方云揚州其貢宜稻麥雍州其貢宜黍稷人君輔助天地所宜之物使各安其性得其宜也宜者據物言之程傳天地通泰則萬物茂遂人君體之而為法制使民用天時因地利輔助化育之功成其豐美之利也折中蔡氏淵曰春生秋殺此時運之自然髙黍下稻亦地勢之所宜聖人則輔相之使當春而耕當秋而斂髙者種黍下者種稻此輔相天地之宜也又繫辭觀鳥獸之文與地之宜疏地之宜者若周禮五土動物植物各有所宜是也春秋左傳先王疆理天下物土之宜而布其利集解疆界也理正也物土之宜播殖之物各從土宜禮記王制自恆山至於南河千里而近冀州域自南河至於江千里而近豫州域自江至於衡山千里而遙荆州域自東河至於東海千里而遙徐州域自東河至於西河千里而近亦冀州域自西河至於流沙千里而遙雍州域西不盡流沙南不盡衡山東不盡東海北不盡恆山凡四海之內斷長補短方三千里為田八十萬億一萬億畝方百里者為田九十億畝山陵林麓川澤溝瀆城郭宫室塗巷三分去一其餘六十億畝又月令善相丘陵阪險原隰土地所宜五榖所殖集説土地有髙下五種有宜否又禮運聖王所以順山者不使居川不使渚者居中原而弗敝也注鄭氏曰山者利其禽獸渚者利其魚鹽中原利其五榖使各安其居不易其利周禮地官大司徒以天下土地之圖周知九州之地域廣輪之數辨其山林川澤丘陵墳衍原隰之名物注周猶遍也九州揚荆豫青兖雍幽冀並也輪從也積石曰山竹木曰林注瀆曰川水鍾曰澤土髙曰丘大阜曰陵水崖曰墳下平曰衍髙平曰原下濕曰隰名物者十等之名與所生之物疏釋曰馬融云東西為廣南北為輪案王制南北兩近一遙東西兩遙一近是南北長東西短謂知此數也又辨其山林川澤以下十等形狀名號及所出之物也九州揚荆以下據職方周之九州而言故有幽並無徐梁禹貢據夏以前九州故有徐梁無幽並也積石曰山者案詩云節彼南山維石巖巖巖巖積石貌鄭據此而言按爾雅山丘别釋則丘是純土其山皆石亦有兼土者故曰石戴土謂之崔嵬又周語云夫山土之聚是其山有土也竹木曰林者謂生平地注瀆曰川者按釋水云注川曰溪注溪曰谷注谷曰溝注溝曰澮注澮曰瀆彼注云皆以小注大此云注瀆曰川者爾雅無此言鄭以義增之耳此瀆與四瀆義異四瀆則亦川故職方云其川三江其川江漢也水鍾曰澤者周語虞太子晉之言也土髙曰丘者爾雅山丘别釋則丘無石者也大阜曰陵者按爾雅釋地云髙平曰陸大陸曰阜大阜曰陵大陵曰阿可食者曰原是陵與丘髙下異稱皆無石者也其有石者亦曰陵故左氏僖三十二年云殽有二陵是有石者也水崖曰墳者按爾雅云重崖岸墳大防是墳為崖岸之峻者故詩云遵彼汝墳是汝水之大防亦是水崖曰墳也下平曰衍者墳既水崖而髙明衍為下平此下平又與下濕曰隰者别也髙平曰原者按爾雅云髙平曰原廣平曰陸此對下濕曰隰而言其實髙平即廣平者也下濕曰隰者爾雅釋地文又以土宜之法辨十有二土之名物以相民宅而知其利害以阜人民以育草木以任土事辨十有二壤之物而知其種以教稼穡樹藝注十二土分野十二邦上繫十二次各有所宜也相占視也阜猶盛也育生也任謂就地所生因民所能壤亦土也以萬物自生焉則言土以人所耕而樹藝焉則言壤壤和緩之貌藝猶蒔也疏辨十二壤之物者分别物之所生而知其所殖之種遂即以教民春稼秋穡以樹其木以藝其黍稷也王氏曰名所以命其土則丘陵墳衍原隰之屬物所以色其土則青黎赤埴黑墳之屬鄭鍔曰壤所以種藝然榖之種於此壤則有宜有不宜如冀之白壤兖之黑墳青之白墳徐之赤埴揚荆之塗泥豫之墳壚梁之青黎雍之黃壤則有宜稻者宜麥者宜五種者宜三種者不知其所宜何以教民稼穡周官辨之以土宜之法既别其名又别其物所以有土壤之殊也又地官土訓掌道地圖以詔地事道地慝以辨地物而原其生以詔地求注道説也説地圖九州形勢山川所宜若云荆揚地宜稻幽並地宜麻地慝若瘴蠱然也辨其物者别其所有所無原其生生有時也孝經分地之利朱子孝經刊誤本分改作因注分别五土視其髙下各盡所宜此分地利也疏五土周禮大司徒山陵川澤丘陵墳衍原隰也謂庶人須能分别視此五土之髙下隨所宜而播種之職方氏所謂青州其榖宜稻梁雍州其榖宜黍稷之類是也劉炫云黍稷生於陸苽稻生於水又小學注陳氏選曰髙卑燥濕生植農桑者地之利也辨地之宜而稌黍菽麥各遂其性則所入有餘矣管子地者政之本也地之不可食者百而當一命之曰地均注政從地生土地就中論不可食者而除之紀其可食之實又辨於地利而民可富吳越春秋稷為兒時好種樹禾黍桑麻五榖相五土之宜青赤黃黑陵陸地也水髙下􅀢稷黍禾蕖麥豆稻各得其理淮南子后稷墾草發災糞土樹榖使五種各得其宜因地之勢也通鑑外紀黃帝畫野分州以分星次經地設井以塞爭端立步制畝以防不足大學衍義補丘氏濬曰臣按人君之治莫先于養民而民之所以得其養者在稼穡樹藝而已稼穡樹藝地土各有所宜故禹平水土别九州必辨其土之資與色以定其田之等第因其宜以興地利制其等以定賦法不責有於無不取多於少無非以為民而已又臣按地土髙下燥濕不同而同於生物生物之性雖同而所生之物則有宜不宜焉土性雖有宜不宜人力亦有至不至人力之至亦或可以勝天况地乎宋太宗詔江南之民種諸榖江北之民種粳稻真宗取占城稻種散諸民間是亦裁成輔相以左右民之一事今世江南之民皆雜蒔諸榖江北民亦皆種粳稻昔之粳稻惟秋一收今又有早禾焉二帝之功及民逺矣後之有志於勤民者宜倣宋主此意通行南北俾民兼種諸榖有司以其勸相之數為考課焉農桑通訣封畛之别地勢遼絶其間物産所宜者往往而異蓋風行地上各有方位土性所宜因隨氣化所以逺近彼此之間風土各有别也孟子謂后稷教民稼穡樹藝五榖謂之教民意者不止教以耕耘播種而已其亦因九州之别土性之異視其土宜而教之歟今按禹貢所載九州田土土各有差田各有等山川阻隔風氣不同凡物之種各有所宜故宜於冀兖者不可以青徐論宜於荆揚者不可以雍豫擬此聖人所謂分地之利者也周禮保章氏掌天星以星土辨九州之地淮南子分别五方星野其土産名物各有證驗此天地覆載一定古今不可易者蓋其土地之廣不外乎是但所屬邊裔不無遼絶若能自內而外求由近而及逺則土産之物皆可推而知之矣大抵風土之説總而言之則方域之多大有不同詳而言之雖一州之域一縣一里之間亦有幾種之分似無多異周禮大司徒以土會之法辨五地之物生辨十有二壤之物而知其種以教稼穡樹藝草人掌土化之物以物土相其宜以為之種若今之善農者審方域田壤之異以分其類參土化土會之法以辨其種如此可不失種土之宜而能盡稼穡之利矣農政全書五地十二壤周官舊法此可通變用之者也若謂土地所宜一定不易此則必無之理立論若斯固後世惰窳之吏遊間之民偷不事事者之口實耳古來蔬果如頗稜安石榴海棠蒜之屬自外國來者多矣今薑荸薺之類移裁北方其種特盛亦向時所謂土地不宜者也凡地方所無或是昔無此種或有之而偶絶果若盡力樹藝殆無不可宜者就令不宜或是天時未合人力未至耳試為之無事空言抵捍也第其中亦有不宜者則是寒暖相違天氣所絶無關於地若荔枝龍眼不能踰嶺橘柚橙柑不能過淮他若蘭茉莉之類亦千百中之一二吾意欲于農書中載南北緯度如云某地北極出地若干度令知寒暖之宜以辨土物以興樹藝庶為得之欽定授時通考卷七
