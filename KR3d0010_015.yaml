body:
  text: 土宜水利一書益稷決九川距四海濬畎澮距川傳距至也決九州名川通之至海一畝之間廣尺深尺曰畎方百里之間廣二㝷深二仞曰澮畎澮深之至川亦入海又禹貢九川滌源九澤既陂傳九州之川已滌除泉源無壅塞矣九州之澤已陂障無決溢矣詩小雅泉流既清傳水治曰清箋召伯營謝邑通其水泉之利又滮池北流浸彼稻田傳滮流貌箋池水之澤浸潤稻田使之生殖豐鎬之間水北流疏此詩周人所作則此池是周地之水文王有聲箋云豐在豐水西鎬在豐水東則豐鎬之間惟豐水耳此池在豐水之左右其地汙下引豐以漑灌故言浸彼稻田也池水當得停而亦言北流者以池上引豐水亦北流浸灌既訖又決而入豐亦為北流大雅觀其流泉正義流泉所以灌溉觀其浸潤所及欲民擇所宜而種之遂浸潤而耕之所以利民富國故公劉殷勤審之也周禮夏官職方氏東南曰揚州其澤藪曰具區其川三江其浸五湖注大澤曰藪具區五湖在吳南浸可以為陂灌溉者疏謂灌溉稻田者也三江者江東行至揚州入彭蠡復分為三道入海故得有三江也又正南曰荆州其澤藪曰雲夢其川江漢其浸潁湛注雲夢在華容潁出陽城宜屬豫州湛或為淮疏禹貢荆州雲土夢作又又得為澤者彼注云中有平土丘水去土可為作畎畝之治又河南曰豫州其澤藪曰圃田其川滎洛其浸波溠注圃田在中牟滎兖水也出東垣入於河泆為滎滎在滎陽波讀為播禹貢曰滎波既豬春秋傳曰楚子除道梁溠營軍臨隨則溠宜屬荆州又正東曰青州其澤藪曰望諸其川淮泗其浸沂沭注沂山沂水所出在葢望諸明都也在雎陽沐出東莞淮或為睢沭或為洙疏春秋宋澤有孟諸明都即宋之孟諸又河東曰兖州其澤藪曰大野其川河泲其浸廬維注大野在鉅野廬維當作雷雍禹貢曰雷夏既澤灉沮㑹同雷夏在陽城又正西曰雍州其澤藪曰弦蒲其川涇汭其浸渭洛注弦蒲在汧涇出涇陽汭在豳地洛出懷德弦或為汧蒲或為浦又東北曰幽州其澤藪曰貕養其川河泲其浸菑時注貕養在長廣菑出萊蕪時出般陽又河内曰冀州其澤藪曰楊紆其川漳其浸汾潞注楊紆未聞漳出長子汾出汾陽潞出歸德又正北曰并州其澤藪曰昭餘祁其川虖池嘔夷其浸淶易注昭餘祁在鄔虖池出鹵城嘔夷出平舒淶出廣昌易出故安左傳襄公三十年田有封洫注封疆也洫溝也公羊傳莊公九年冬浚洙洙者何水也浚之者何深之也注以言浚也本非人工所為疏畎澮之屬是人功為之也又僖公三年桓公曰無障谷注無障斷川谷専水利也水注川曰谿注谿曰谷疏水出於山入於川為谿水朝屬曰谷管子水有大小又有遠近水之出於山而流入於海者命曰經水水别於他水入於大水及海者命曰枝水山之溝一有水一毋水者命曰谷水水之出於他水溝流於大水及海者命曰川水出地而不流者命曰淵水此五水者因其利而往之可也因而扼之可也又令甲士作隄大水之傍大其下小其上隨水而行地有不生草者必為之囊大者為之隄小者為之防夾水四道禾稼不傷歲埤增之樹以荆棘以固其地雜之以栢楊以備決水民得其饒是謂流膏史記滑稽傳魏文侯時西門豹為鄴令發民鑿十二渠引河水灌田田皆溉當其時民煩苦不欲豹曰民可與樂成難以慮始期令父老子孫思我至今皆得水利民以給足漢書溝洫志蜀守李氷鑿離􅕞避沬水之害穿二江成都中皆可行舟有餘則用溉百姓饗其利又史起為鄴令引漳水溉鄴以富魏之河内民歌之曰鄴有賢令兮為史公決漳兮灌鄴旁終古舄鹵兮生稻粱又鄭國鑿涇水自中山西邸瓠口為渠竝北山東注洛三百餘里渠成而用溉注塡閼之水溉斥鹵之地四萬餘頃收皆畝一鍾於是關中為沃野無凶年秦以富强因名曰鄭國渠又鄭當時言引渭穿渠起長安旁南山下至河三百餘里徑易度漕渠下民田萬餘頃可得以溉穿渠三歲而通漕大便利民頗得溉又嚴熊言臨晉民願穿洛以溉重泉以東萬餘頃可令畝十石於是穿渠自徵引洛水至商顏下乃鑿井深者四十餘丈井下相通行水以絶商顏東至山領十餘里間井渠之生自此始穿得龍骨故名曰龍首渠又倪寛為左内史奏請穿鑿六輔渠以益溉鄭國旁高卬田又趙大夫白公復奏穿渠引涇水首起谷口尾入櫟陽注渭中袤二百里溉田四千五百餘頃因名曰白渠民得其饒歌之曰田於何所池陽谷口鄭國在前白渠起後舉臿為雲決渠為雨涇水一石其泥數斗且溉且糞長我禾黍衣食京師億萬之口通典漢文帝以文翁為蜀郡太守穿煎溲口溉灌田千七百頃人獲其饒漢書循吏傳召信臣為南陽太守行視郡中泉水開通溝瀆起水門提閼凡數十處以廣溉灌歲歲增加多至三萬頃民得其利畜積有餘信臣為民作均水約束刻石立於田畔以防分爭吏民親愛信臣號之曰召父後漢書杜詩傳詩遷南陽太守修治陂池廣拓土田郡内比室殷足時人方於召信臣故南陽為之謡曰前有召父後有杜母又鄧晨傳晨為汝南太守興鴻郤陂數千頃田汝土以殷又循吏傳王景為廬江太守郡界有楚相孫叔敖所起芍陂稻田景乃驅率吏民修起荒蕪墾闢倍多境内豐給又何敞傳敞遷汝南太守修理鮦陽舊渠百姓賴其利墾田增三萬餘頃吏人共刻石頌敞功德通典馬臻為會稽太守始立鏡湖築塘周迴三百十里灌田九千餘頃人獲其利三國魏志鄭渾傳渾遷陽平沛郡二太守郡界下濕患水澇渾於蕭相二縣界興陂遏開稻田郡人皆以為不便渾曰地勢洿下宜溉灌終有魚稻經久之利此豐民之本也遂躬率吏民興立功夫一冬間皆成比年大收頃畝歲增租入倍常民賴其利刻石頌之號曰鄭陂又劉馥傳太祖表馥揚州刺史移治合肥興治芍陂及茹陂七門吴塘諸堨以溉稻田官民有蓄子靖都督河北諸軍事修廣戾渠陵大堨水溉灌薊南北三更種稻邊民便之又王基傳基言江陵有沮漳二水溉灌膏腴之田以千數安陸左右陂池沃衍宜水陸竝農以實軍資又徐邈傳邈為涼州刺史廣開水田募貧民佃之晉書食貨志魏皇甫隆為敦煌太守敦煌俗不使耬犁及不知用水人牛功力既費而收穀更少隆到乃教作耬犁及溉灌歲終率計所省庸力過半得穀加五西方以豐又杜預言諸欲修水利者皆以火耕水耨為便非不爾也然此事施於青田草萊與百姓居相絶遠者耳往者東南草創人稀故得火田之利自頃户口日增而陂堨歲決良田變生蒲葦人居沮澤之際水陡失宜放牧絶種樹木立枯皆陂之害也陂多則土薄水淺􅕙不下潤宜發明詔敇刺史二千石其漢氏舊陂舊堨及山谷私家小陂皆當修繕以積水其諸魏氏以來所造立及諸因雨決溢蒲葦馬腸陂之類皆決􅅹之長吏二千石躬親勸功諸食力之人竝一時附功令比及水凍得粗枯涸其所修功實之人皆以俾之又夏侯和上修新渠富壽遊陂三渠凡溉田千五百頃又杜預傳預拜鎮南大將軍都督荆州諸軍事至鎮修邵信臣遺跡激用滍淯諸水以浸原田萬餘頃分疆刻石使有定分公私同利衆庶賴之又張闓傳元帝踐阼補晉陵内史時所部四縣竝以旱失田闓乃立曲阿新豐塘溉田八百餘頃每歲豐稔葛洪為頌又苻堅載記堅以關中水旱不時議依鄭白故事發王侯以下及豪望富室僮𨽻三萬人開涇水上源鑿山起隄通渠引瀆以漑岡鹵之田及春而成民賴其利宋書劉義欣傳義欣為荆河刺史鎮夀陽時土境荒毁義欣隨宜經理芍陂良田萬餘頃隄堰久壞夏秋常苦旱遣諮議參軍殷肅循行修理有舊溝引渒水入陂伐木開榛水得通涇由是遂豐稔梁書夏侯䕫傳夔為豫州刺史帥軍人於蒼陵立堰溉田千餘頃歲收穀百餘萬石以充儲備兼贍貧民魏書裴延儁傳延儁除廷尉卿轉平北將軍幽州刺史范陽郡有督亢渠經五十里漁陽燕郡有故戾陵諸堰廣袤三十里皆廢毁多時莫能修復時水旱不調民多飢餒延儁謂疏通舊跡勢必可成乃表求營造遂躬自履行相度水形隨力分督未幾而就溉田百萬餘畝為利十倍百姓賴之北齊書斛律金傳子羨為幽州刺史導高梁水北合易京東㑹於潞因以灌田邊儲歲積轉漕用省公私獲利焉唐書李襲志傳襲志弟襲譽擢揚州大都督府長史為引雷陂水築句城塘溉田八百頃以盡地利又姜師度傳師度徙同州刺史𣲖洛灌朝邑河西二縣閼河以灌通靈陂收棄地二千頃為上田文獻通考唐肅宗上元中於楚州古射陽湖置洪澤屯壽州置芍陂屯厥田沃大獲其利唐書于頔傳頔為湖州刺史部有湖陂異時溉田三千頃久廞廢頔行縣命修復隄閼歲獲秔稻蒲魚無慮萬計又李景略傳景略拜豐州刺史天德軍西受降城都防禦使窮塞苦寒地塉鹵邊户勞悴景略至鑿咸應永清二渠溉田數百頃又李承傳承累遷吏部郎中淮南西道黜陟使奏置常豐堰於楚州以禦海潮溉田塉鹵收常十倍又杜佑傳佑為淮南節度使決雷陂以廣灌溉斥海瀕棄地為田積米至五十萬斛又韋挺傳挺曾孫武為絳州刺史鑿汶水灌田萬三千餘頃璽書勞勉又李栖筠傳栖筠子吉甫為淮南節度使築富人固本二塘溉田且萬頃又孟簡傳簡為常州刺史州有孟瀆久淤閼簡治導溉田凡四千頃賜金紫又白居易傳居易為杭州刺史始築隄捍錢塘湖鍾洩其水溉田千頃又崔𢎞禮傳𢎞禮為河陽節度使治河内秦渠溉田千頃歲收八萬斛又温大雅傳温造為朗州刺史開復鄉渠百里溉田二千頃民獲其利號右史渠太和中節度河陽奏復懷州古秦渠枋口堰以溉濟源河内温武陟田五千頃又循吏傳韋丹為江南西道觀察使築堤捍江長十二里竇以疏漲為陂塘五百九十八所灌田萬二千頃宋史食貨志咸平中大理寺丞王宗旦請募民耕潁州陂塘荒地凡千五百頃部民應募者三百餘户詔令未出租税免其徭役然無助於功利而汝州舊有洛陽務内園兵人種稻雍熙二年罷賦予民至是復置命京朝官専掌募民户二百餘自備耕牛立團長墾地六百頃導汝水灌溉歲收二萬三千石襄陽縣淳河舊作隄截水入官渠溉民田三千頃宜城縣蠻河溉田七百頃又有屯地三百餘頃知襄州耿望請於舊地兼括荒田置營田上中下三務調夫五百築堤堰仍集鄰州兵每務二百人荆湖市牛七百分給之是歲種稻三百餘頃又嘉祐中唐守趙尚寛修復漢邵信臣故陂渠遺跡溉田數萬頃又何承矩知雄州言宜因積􅕙蓄為陂塘大作稻田以足食閩人黄懋亦上書言河北州軍多陂塘引水溉田省功易就三五年間公私必大獲利詔承矩按視還奏如懋言遂於雄莫霸州平戎順安等軍興堰六百里置斗門引淀水灌溉初年種稻值霜不成懋以江東早稻七月即熟取其種課令種之是歲八月稻熟初承矩建議阻之者頗衆至是承矩載稻穗數車遣使送闕下議者乃息而莞蒲蜃蛤之饒民賴其利又鄭戩傳戩以資政殿學士知杭州錢塘湖溉民田數十頃錢氏置􅕙清軍以疏淤塡水患既納國後不復治葑土堙塞為豪族僧坊所占冒湖水益狹戩發屬縣丁夫數萬闢之民賴其利事聞詔本郡歲治如戩法又謝絳傳絳知鄧州距州百二十里有美陽堰引湍水溉公田水來遠利不及民濱堰築新土為防俗謂之墩者大小又十數歲數壞輙調民增築奸人蓄薪茭以時其急往往盜決堰墩百姓苦之絳按邵信臣六門堰故跡距城三里壅水注鉗廬陂溉田至三萬頃請修復之可罷州人歲役以水與民續文獻通考元祐中長樂縣令袁正規以十七都之田窪下歲被渰没遂開卓道後山為港以洩其水注之海又鑿林㞯莊前之山為渠注之江民德之因請名曰袁公港正規辭曰此天子之功也遂名之曰元祐港又郎簡築名塘陂竝江為之蓄河頭水溉田種五百餘石又修天寶陂溉田種千餘石又范洪知鄞縣葺堰埭百餘決導瀦積在常熟疏金涇鶴瀆二浦溉田千頃又李禹卿通判蘇州堤太湖八十里為渠漕運蓄水溉田千餘頃又徐䀌通判時東南大水衋周視盡得水利舊跡築石塘九十里建橋十八所復良田數十萬畝又陳偁為羅源令鑿渠以溉民田民蒙其惠因號曰永利渠又曾有開知確山縣興修廢陂溉田數千頃又朱定權閩縣時開濬負城河浦百七十六計二萬一千九百七十四丈均用民力凡八萬九千溉田三千六百餘頃又趙抃以崇安多水疊石為堤以遏其衝又開除灣陂分西來之流由石雄以入於縣又從縣西鑿陂於星陽溉田甚廣人懷其惠久而不忘因取其諡名清獻陂又劉諤知興化軍創立太平陂引荻蘆溪水溉田七百頃又韓正彥知崑山創石隄疏斗門作塘七十里以達於郡得膏腴數百頃范文正公集上吕相公竝呈中丞咨目姑蘇四郊略平窊而為湖者十之二三西南之澤尤大謂之太湖納數郡之水湖東一𣲖濬入於海謂之松江積雨之時湖溢而江壅横没諸邑雖北壓揚子江而東抵巨浸河渠至多堙塞已久莫能分其勢矣惟松江退落漫流始下或一歲之水久而未耗來年暑雨復為沴焉人必薦飢可不經畫今疏導者不惟使東南入於松江又使西北入於揚子江之於海也其利在此或曰江水已高不納此流某謂不然江海所以為百谷王者以其下之豈獨不下於此耶江流或高則必滔滔旁來豈復姑蘇之有乎矧今開畝之處下流不息亦明騐矣或曰日有潮來水安得下某謂不然大江長淮無不潮也來之時刻少退之時刻多故大江長淮㑹天下之水畢能歸於海也或曰沙因潮至數年復塞豈人力之可支某謂不然新導之河必設諸閘常時扄之禦其潮來沙不能塞也毎春理其閘外工減數倍矣旱歲亦扄之駐水灌田可救熯涸之災􅕙歲則啟之疏積水之患或謂開畝之役重勞民力某謂不然東南之田所植惟稻大水一至秋無他望災沴之後必有疾疫乘其羸敗十不救一謂之天災實由飢耳或謂力役之際大費軍食某謂不然姑蘇歲納苖米三十四萬斛官司之糴又不下數十百萬斛去秋蠲放者三十萬官司之糴無復有焉如豐穰之歲春役萬人人食三升一月而罷用米九千石耳荒歉之歲日食五升召民為役而賑濟一月而罷用米萬五千石耳量此之出較彼之入孰為費軍食哉或謂陂澤之田動成𣺌瀰導川而無益也某謂不然吳中之田非水不植減之使淺則可播種非決而涸之然後為功也昨開五河洩去積水今歲和平秋望七八積而未去猶有二三未能播種復請增理數道以分其流使不停壅縱遇大水其去必速而無來歲之患矣又松江一曲號曰盤龍父老傳云出水尤利如總數道而開之災必大減蘇秀間有秋之半利已大矣畎澮之事職在郡縣不時開導刺史縣令之職也然今之所興作横議先至非朝廷主之則無功有毁也守土之人恐無建事之意矣蘇常湖秀膏腴千里國之倉庾也浙漕之任及數郡之守宜擇精心盡力之吏不可以㝷常資格而授之恐功力不至重為朝廷之憂且失東南之利也宋史苗時中傳時中主寧陵簿邑有古河久湮請開導以灌田為利甚溥人謂之苖公河又孫覺傳覺知廣德軍徙湖州松江隄没水為民患覺易以石高丈餘長百里隄下化為田又楊伋傳伋主管開封府界常平權都水丞與侯叔獻行汴水淤田法遂釃汴流漲􅕙以溉西部瘠土皆為良田續文獻通考長樂濱海山淺而泉微故瀦防獨多大者為湖次為坡為圳垾海而成者為塘次為堰毋慮百五十餘所每歲蓄溪澗雖不洩涓滴亦不足用必時雨滂㴻乃或沾洽及農事畢則皆為無用之地以是狡民或侵或請民失其利建炎初縣令陳可大修塘捍陂湖至九年縣令徐謩復延耆老講究水利為斗門及湖塘陂堰百四所溉田凡二千八十三頃又築大塘基方廣二十餘丈兩旁抵海長一千五十丈溝港共長三千七百丈瀦福清界水溉田種千石宋史食貨志紹興五年江東帥臣李光言明越之境皆有陂湖大抵湖高於田田又高於江海旱則放湖水溉田澇則決田水入海故無水旱之災本朝慶厯嘉祐間始有盜湖為田者其禁甚嚴政和以來創為應奉始廢湖為田自是兩州之民歲被水旱之患餘姚上虞每縣收租不過數千斛而所失民田常賦動以萬計莫若先罷兩邑湖田其會稽之鑑湖鄞之廣德湖蕭山之湘湖等處尚多望詔漕臣盡廢之其江東西圩田蘇秀圍田令監司守令條上於是詔諸路漕臣議之其後議者雖稱合廢竟仍其舊又紹興十六年知袁州張成已言江西良田多占山岡望委守令講陂塘灌溉之利其後比部員外郎李詠言淮西高原處舊有陂塘請給銀米以時修濬知江陰軍蔣及祖亦請濬治本軍五卸溝以洩水修復横河支渠以溉旱乃竝詔諸路常平司行之每季以施行聞又紹興二十三年諫議大夫史才言浙西民田最廣而平時無甚害者太湖之利也近年瀕湖之地多為兵卒侵據累土增高長堤彌望名曰壩田旱則據之以溉而民田不沾其利澇則遠近泛濫不得入湖而民田盡没望盡復太湖舊迹使軍民各安田疇均利又紹興二十四年大理寺丞周環言臨安平江湖秀四州下田多為積水所浸緣溪山諸水併歸太湖自太湖分二𣲖東南一𣲖由松江入於海東北一𣲖由諸浦注之江其松江泄水惟白茅一浦最大今泥沙淤塞宜決浦故道俾水勢分𣲖流暢實四州無窮之利又紹興二十八年兩浙轉運副使趙子潚知平江府蔣燦言太湖者數川之巨浸而獨洩以松江之一川宜其勢有所不逮是以昔人以常熟之北開二十四浦疏而導之江又於崑山之東開一十二浦分而納之海三十六浦後為潮汐沙積而開江之卒亦廢於是民田有淹没之患天聖間漕臣張綸嘗於常熟崑山各開衆浦景祐間郡守范仲淹亦親至海浦濬開五河政和間提舉官趙霖復嘗開濬今諸浦湮塞又非前比計用工三百三十餘萬錢三十三萬餘緡米十萬餘斛於是詔監察御史任古復視之既而古至平江言常熟五浦通江誠便若依所請以五千功月餘可畢詔以激賞庫錢平江府上供米如數給之續文獻通考紹興中王信知紹興府山陰境有􅀈獠湖四環皆田歲苦淫􅕙信創斗門導停瀦注之海築十一壩化滙浸為上腴民繪像祀之更其名曰王公湖宋史印崈傳崈知秀州華亭縣捍海堰廢且百年鹹潮歲大入壞竝海田蘇州皆被其害崈至海口訪遺址已淪没乃奏創築三月堰成三州潟鹵復為良田文獻通考乾道七年四川宣撫使王炎奏興元府山河堰溉南鄭褒城田九十三萬三千畝有奇詔奬諭又淳熙二年淮東總領錢良臣奏修復鎮江府練湖凡七十二源灌田百餘萬畝從之續文獻通考淳熙中趙汝愚知福州州舊有湖溉民田數萬畝後豪滑湮塞為田遇旱則西北一帶高田無從得水遇澇則東南一帶淪為巨浸汝愚因請開濬悉復其舊又嘉定間漳州倅鄭煥浚渠溉田郡人立石刻曰鄭公渠又趙師縉為漳浦令鑿西湖築岸創立水門時其蓄洩以溉民田週圍五百一十五丈又趙善嵩知連江縣詢知南墥水利可以溉田遂伐石為斗門民歌之又制師顏頤仲浚定海西市抵鄞桃花渡邊六十里故河盡復廣五丈深一丈二尺灌溉田疇民蒙其利又嘉定十七年衞涇奏言國家承平之時京師漕粟多出東南而江浙居其大半中興以來浙西遂為畿甸尤所仰給歲獲豐穰霑及旁路葢平疇沃壤綿亘阡陌有江湖瀦泄之利焉大抵二浙地勢高下相類湖高於田田又高於江海水少則汲湖水以溉田水多則泄田水由江而入海惟瀦泄兩得其便故無水旱之憂而皆膏腴之地自紹興末年因軍中侵奪瀕湖水蕩工力易辦創置堤埂號為壩田民田已被其害而猶未至甚者瀦水之地尚多也隆興乾道之後豪宗大姓相繼迭出廣包强占無歲無之陂湖之利日朘月削已亡㡬何而所在圍田則徧滿矣以臣耳目所接三十年間昔之曰江曰湖曰草蕩者今皆田也夫陂湖之水自常情觀之似若無用由農事言之則為甚急陂湖廣衍則瀦蓄必多遇旱可以灌溉江流深浚則通泄必快遇水不至泛溢儻瀦水之地或至狹隘則容受必少旱即易涸立見焦枯水源既壅而江流填淤則疏泄甚難水即易盈蕩為巨浸事之利害豈不較然易知州縣監司所當禁戢然圍田者無非形勢之家其語言氣力足以淩駕官府而在位者毎重舉事而樂因循故上下相蒙恬不知怪而圍田之害深矣議者又曰圍田既廣則增租亦多其於邦計不為無補殊不思緣江竝湖民間良田何啻數千百頃皆異時之無水旱者圍田一興修築塍岸水所由出入之路頓至隔絶稍覺旱乾則占據上流獨擅灌溉之利民田坐視無從取水逮至水溢則順流疏決復以民田為壑設若圍田僥倖一稔增租所入有㡬而當歲倍收之田小有水旱反為荒土常賦所損可勝計哉所謂增租既不繫省額州縣得以移用徒資貪黷之吏耳此其輕重得失又不待智者而後辨也金史食貨志泰和八年七月詔諸路按察司規畫水田部官謂水田之利甚大沿河通作渠如平陽掘井種田俱可灌溉比年邳沂近河布種豆麥無水則鑿井灌之計六百餘頃比之陸田所收數倍以此較之他境無不可行者遂令轉運司因出計㸃就令審察若諸路按察司因勸農可按問開河或掘井如何為便規畫具申以俟興作又興定五年南陽令李國瑞創開水田四百餘頃詔陞職二等仍錄其最狀徧諭諸道元史成宗本紀大德八年五月壬申中書省臣言吴江松江實海口故道潮水久淤凡湮塞良田百有餘里況海運亦由是而出宜於租户役萬五千人濬治歲免租八十五石仍設行都水監以董其成從之又脱脱言京畿近水地召募江南人耕種歲可收粟麥百萬餘石不煩海運京師足食從之於是西至西山南至保定河間北抵檀順東至遷民鎮凡係官地及原管各處屯田悉從分司農司立法佃種合用工價牛具農器穀種給鈔五百萬錠命悟良哈台烏古孫良禎竝為大司農卿又於江南召募能種水田及修築圍堰之人各一千名為農師降空名添設職事敇牒十二道募農民一百名者授正九品二百名正八品三百名從七品就令管領所募之人所募農夫每名給鈔十錠由是歲乃大稔又良吏傳譚澄為交城令有文谷水分溉交城田有帥専其利而堰之澄令決水均其利於民擢懷孟路總管歲旱令民鑿唐溫渠引沁水以溉田又張文謙傳文謙以中書左丞行省西夏中興等路浚唐來漢延二渠溉田十數萬頃民䝉其利續文獻通考元至大初江浙行省督治圍田合修陂塘圍岸溝渠曉諭農家須要依法修置遇旱車水澆救遇澇洩水通流㑹集行都水監官李都水講究得修浚之際田主出糧佃户出力係官圍田若無總佃貧窮無力不能修浚者量其所須官為借貸收成日抵數還官事有成效勸農官擬陞賞奏聞失悞者治罪其抛荒積水田土多因租額太重無人承佃勸諭當鄉富上人户自備工本修築塍圍聴本户佃種為主抛荒官田止納原租初年免徵次惟半而三甫全積荒則三年後第依民田輸税諸人不得爭奪及照到前庸田司五等圍岸體式以水為平平者為第一等高七尺五寸底濶一丈面濶五尺田高一尺為第二等高六尺五寸底濶九尺面濶四尺五寸田高二尺為第三等高五尺五寸底濶八尺面濶四尺田高三尺為第四等高四尺五寸底濶七尺面濶五尺五寸田高四尺為第五等止添備水高三尺底濶六尺面濶三尺若山水原落圍岸迫近諸湖去處自願增者聴元史郭守敬傳中統三年張文謙薦守敬習水利巧思絶人世祖召見陳水利六事其一中都舊漕河東至通州引玉泉水以通舟歲可省僱車錢六萬緡通州以南於藺榆河口徑直開引由蒙村跳梁務至楊村還河以避浮雞洶盤淺風浪遠轉之患其二順德達泉引入城中分為三渠灌城東地其三順德澧河東至古任城失其故道没民田千三百餘頃此水開修成河其田即可耕種自小王村徑滹沱合入御河通行舟栰其四磁州東北滏漳二水合流處引水由滏陽邯鄲洺州永平下經雞澤合入澧河可灌田三千餘頃其五懷孟沁河雖澆灌猶有漏堰餘水東與丹河餘水相合引東流至武陟縣北合入御河可灌田二千餘頃其六黄河自孟州西開引少分一渠經由新舊孟州中間順河古岸下至溫縣南復入大河其間亦可灌田二千餘頃授提舉諸路河渠加授銀符副河渠使先是古渠在中興者一名唐來其長四百里一名漢延長二百五十里他州正渠十皆長二百里支渠大小六十八灌田九萬餘頃廢壞淤淺守敬更立牐堰皆復其舊授都水少監守敬言舟自中興沿河四晝夜至東勝可通漕運及見查洎兀郎海古渠甚多宜加修理又言金時自燕京之西麻峪村分引蘆溝一支東流穿西山而出是謂金口其水自金口以東燕京以北灌田若干頃其利不可勝計兵興以來典守者懼有所失因以大石塞之今若按視故蹟使水得東流上可以致西山之利下可以廣京畿之漕又言當於金口西預開減水口西南還大河令其深廣以防漲水突入之患伯顏南征議立水站命守敬行視河北山東可通舟者自陵州至大名又自濟州至沛縣又南至吕梁又自東平至綱城又自東平清河逾黄河古道至與御河相接又自衞州御河至東平又自東平西南水泊至御河乃得濟州大名東平泗汶與御河相通形勢為圖奏之有言灤河自永平挽舟踰山而上可至開平有言瀘溝自麻峪可至㝷麻林朝廷遣守敬相視灤河不可行瀘溝舟亦不通守敬因陳水利十有一事其大都運糧河不用一畝泉舊原别引北山白浮泉水西折而南經甕山泊自西水門入城環滙於積水潭復東折而南出南水門合入舊運糧河每十里置一牐比至通州凡為牐七距牐里許上重置斗門互為提閼以通舟止水帝覽奏喜復置都水監俾守敬領之命丞相以下皆親操畚牐倡工待守敬指授而後行事置牐之處往往於地中偶值舊時甎木時人為之感服船既通行公私省便名曰通惠河守敬又言於澄清牐稍東引與北壩河接且立牐麗正門西令舟楫得環城往來志不就而罷大德二年召守敬至上都議開鐵幡竿渠守敬奏山水頻年暴下非大為渠堰廣五十七步不可執政吝於工費以其言為過縮其廣三之一明年大雨山水注下渠不能容漂没人畜成宗謂宰臣曰郭太史神人也守敬在西夏常挽舟遡流而上究所謂河源者又嘗自孟門以東循黄河故道縱廣數百里間各為測量地平或可以分殺河勢或可以灌溉田土具有圖誌又嘗以海面較京師至汴梁地形高下之差謂汴梁之水去海甚遠其流峻急而京師之水去海至近其流且緩其言信而有徵此水利之學其不可及者也又虞集傳泰定中集為翰林直學士進言曰京師之東瀕海數千里北極遼海南濱青齊萑葦之場也海潮日至淤為沃壤用浙人之法築堤捍水為田聴富民欲得官者合其衆分受以地官定其畔以為限能以萬夫耕者授以萬夫之田為萬夫之長千夫百夫亦如之察其惰者而易之三年後視其成以地之高下定額以次漸征之五年有積蓄命以官就所儲給以祿十年不廢得以世襲如軍官之法任仁發水利集議者曰古者吴淞江狹處尚二里餘猶不能吞受太湖之水於是添浚三十六浦以佐之且後時有渰没田疇之患今所開江二十五丈置閘十座其能去水㡬何其利則未知也答曰所開江身二十五丈置閘十座每閘闊二丈五尺可以泄水二十五丈吴淞江緣潮水往來之故也古人論泄水之法極詳范文正公曰三分其時損居二焉謂如一日十二時晝夜兩潮四時辰潮漲八時辰潮落所設之閘晝夜皆去水之時也所以終江面二里之寛不如十閘之功也況今東南有上海浦泄放澱山湖三泖之水東則劉家港耿涇疏通昆承等湖之水吴淞江置閘十座以居其中潮平則閉閘而拒之潮退則開閘以放之滔滔不絶勢若建瓴直趨於海實疏通瀦水之上策也與古三江其勢相埒若夫時水雖太湖汪洋瀰漫其涸亦可待矣旱則閉閘瀦水以灌溉乃一舉兩得其利也議者曰吴淞江自古無閘今置之非也何不開濶疏通使江復故道一任潮水往來豈不便易答曰治水之法先度地形之高下次審水勢之往來并追源泝流各順其性古人謂水歸深源又曰沙泥隨潮而來清水蕩滌而去今所往上海劉家港等處水深數丈今所開之河止二丈五尺若不置閘以限潮沙則渾潮捲沙而來清水歸深源而去新開江道水性不順兼以河沙約住河泥不數月間必復淺塞前工俱廢故閘不可不置也范文正公曰新導之河必設諸閘正此謂也若欲再復吳淞江之故道須候諸閘啟閉流深衆水歸源其洶湧之勢孰得而制禁當於此諸閘都閉挑開一處堰壩任潮水往來借清水力東衝而洪自復成江矣考工記曰善溝水者水齧之之謂也議者曰吴淞江前時流通今日何為而塞豈非海變桑田之説黄河日走千里非人力所可為者歟答曰東坡有言若要吳淞江不塞吴江一縣人民可盡徙於他處庶使上流寛瀉清水力盛沙泥自不能積何致有堙塞之患哉歸附之後將太湖東岸水出去處或釘木為柵或用土草為堰或築狹河身為橋置為驛路及有湖泖港㲼又慮私鹽船往來多行塞斷所以水脉不通清水日弱渾潮日盛沙泥日積而吴淞江日就淤塞今日江勢正與東坡所見合如曰海變桑田黄河奔􅊳一時之謂則聖人手足胼胝盡力溝洫皆虚言也聖人豈欺吾哉所當盡人力而為可見也議者曰錢氏有國一百有餘年止長盈年間一次水災亡宋南渡一百五十餘年止景定間一二次水災今則一二年或三四年水災頻仍其故何也答曰錢氏有國亡宋南渡全藉蘇湖常秀數郡所產之米以為軍國之計當時盡心經理使高田低田各有制水之法其間水利當興水害當除合役居民不以繁難合用錢糧不吝浩大又使名卿重臣専董其事富豪上户美言不能亂其法財貨不能動其心凡利害之端可以興除者莫不備舉又復七里為一縱浦十里為一横塘田連阡陌位位相承悉為膏腴之產設有水患人力未嘗不盡遂使二三百年之間水患罕見國朝四海一統人才畢集擢居重任者或未知風土之所宜也以為浙西地土水利與諸處同一例任地之高下任天之水旱所以一二年間水災頻仍皆不諳風土之同異故也議者曰蘇州地勢低與江水平故曰平江故稱澤國其地不可作田必然之理也今欲圍築硬岸亦逆土之性耳答曰晉宋以降倉廩所積悉仰給於浙西水田之利故曰蘇湖熟天下足若謂地勢高下不可作田以為必然之理此誠無用之論也浙西之地低於天下而蘇湖又低於浙西澱山湖又低於蘇州此低之又低者也彼中富户數千家於中每歲種植菱蘆埋釘樁笆委埋封土圍築硬岸豈非逆土之性何為今日盡成膏腴之田此明效之騐不可掩也既是澱山最低之湖經理尚可以作田却説已成之田不可作田天下寧有是理也議者曰水旱天時非人力所可勝自來討究浙西治水之法終無寸成答曰浙西水利明白易曉特行之不得其要何謂無成大抵治水之法其事有三浚河港必深瀉築圍㟁必高厚置閘竇必多廣設遇水旱有河洩瀉隄防而乘除之自然不能為害河港洩瀉圍㟁隄防閘竇乘除倘有人力不至而一切委數於天天下寧有豐年也東坡有言浙西水旱此謂人事不修之積非時之數今之謂也昔范文正公親開海浦時議者阻之公鋭意完具排浮議疏浚横􅕙數年大稔乃謂終無寸利為是説者皆聴受富家驅使而妄為無稽之言也議者曰吴淞江開之後自合浙西永無水害何為大德十年自濟以南直至浙西有水害甚深答曰且體比年浙西所收子粒分數比之淮北數幾十倍皆吴淞江三閘并諸壩口出放澇水之力以未開吴淞江之前大德七年亦遭水害所收子粒分數比大德十年不及三分之一以此論之則水監豈為無功天災流行水淹為害人力之所致不見備禦隄防之若除一分之害則享一分之利謂當永無水害乃不近人情之論為執政者不當便聴其言不察是否乃直謂無功而輙罷之正如咽喉噎而廢食也況自歸附以來二三十年所積之病豈半年工役之所能盡哉議者曰行都水監既是有益衙門何謂衆口一辭皆謂無益而明議罷之答曰民可使由之不可使知之事之利害久而復明非高識遠見熟於世務通於水利者安知有久遠無窮之利彼愚民無知但見一時工夫之繁豪民肆奸有吝供輸募夫之費所以百般阻撓但為無益以敗事殊不知浙西有數等之水拯治方畧皆不相同非専司不能盡力責其成功使水監衙門眞如無事古之有國者亦廢而不舉久矣何為周漢唐宋之世未嘗一日不用心盡力經營水利之事列之史傳代不乏人故諺曰水利通民力鬆斯言信矣并浙西水利低下之地不須水監拯治即今中原高阜之鄉安用水監河道司為哉然則高阜之處水監既不可缺而低下之處乃謂不必置立何不思之甚也議者曰水利不可不修今隴西唐宋二渠止是責於有司疏浚田禾有收民便不擾浙西水利與隴西一體責之有司兼管豈不便哉答曰隴西唐宋二渠長湖水也浚成深渠水自下流何難拯治浙西地面有江海河浦湖泖蕩漾谿澗溝渠汊涇浜漕漊等名水有長流活水瀦定死水往來潮水泉石迸水霖淫雨水風決漲水潮泥渾水南來交水風潮賊水海嘯淫水等名水名既異則拯治方畧亦殊豈可以唐宋二渠長流水例之哉畧舉浙西治水䃮堰壩水函石倉石囤蘧除土帚刺子水管銅輪鐵筢木杴木井木􅀢水匝水車風車手戽桔橰等器插竇碶斗門隴西未必有也今設為此策乃不知地理之人如醯雞井蛙豈足與議遠大之事宋賢如范文正公蘇文忠公朱文公王荆公皆命世大儒經綸天下之大材尚各各建策設官置兵盡力經營水利之事不令有司兼管必有所見而為之當時有司兼管何往而不敗事為是説者未必長於蘇范諸公之議也況浙西地形高下水旱不均古人有言東州之官莫問西州之利或利於此必害於彼便有彼疆我界之分若無水監通行管領一體整治何能用心協力於均水利也哉元史鄭鼎傳鼎為平陽路總管導汾水溉民田千餘頃續文獻通考趙志除長葛縣邑地卑濕累歲不登志相其宜使為水田旱則決潩水灌之民獲其利元史耶律伯堅傳伯堅為清苑尹縣西有塘水溉民田甚廣勢家據以為磑民以失利為訴伯堅命毁磑決其水而注之田許以溉田之餘月乃得堰水置磑仍以其事聞於省部著為定例又張立道傳立道領大司農事中書以立道熟於雲南奏授大理等處巡行勸農使佩金符其地有昆明池介碧雞金馬之間環五百餘里夏􅕙暴至必冒城郭立道求泉源所自出役丁夫二千人治之洩其水得壤地萬餘頃皆為良田又廉希憲傳右丞阿里海牙下江陵圖地形上於朝帝使希憲行省江南先是江陵城外蓄水扞禦希憲命決之得良田數萬畝以為貧民之業續文獻通考王昌齡守衞輝路清水出輝縣山陽鎮以入衞河昌齡因度原隰創濬溝澮溉田數百頃元史烏古孫澤傳澤為廣西兩江道宣慰副使巡行檄外募民四千六百餘户置雷留那抉十屯陂水墾田築八堨以節瀦洩得稻田若干畝雷州地近海潮汐齧其東南陂塘鹻農病焉而西北廣衍平袤宜為陂塘澤行視城陰教民浚故湖築大堤堨三谿瀦之為斗門七堤堨六以制其贏耗釃為渠二十有四以達其注輸渠皆支别為牐設守視者時其啟閉計得良田數千頃濱海廣瀉竝為膏土民歌之續文獻通考溫州判皮元重建陰均斗門初金舟東西四鄉之水赴於陰均樂清邑令汪季良建斗門制之後圯壞河流有洩無蓄海潮衝突入河皆為田害至是皮元囑僧募物料先築上下堰決水更板閘二十四層而以上三十六源皆得蓄洩之宜溉田四十餘萬畝民為碑頌之欽定授時通考卷十五
