body:
  text: 勸課章奏國語周宣王不籍千畝虢文公諫曰夫民之大事在農上帝之粢盛於是乎出民之蕃庶於是乎生事之共給於是乎在和協輯睦於是乎興財用蕃殖於是乎始敦龎純固於是乎成是故稷為大官古者大史順時瓜見土陽疸憤盈土氣震發農祥晨正日月底於天廟土乃脈發先時九日太史告稷曰自今至於初吉陽氣俱蒸土膏其動勿震勿渝脈其滿眚榖乃不殖稷以告王曰史帥陽官以命我司事曰距今九日土其俱動王其祗祓監農不易王乃使司徒咸戒公卿百吏庶民司空除壇于籍命農大夫咸戒農用先時五日瞽告有協風至王即齊宫百官御事各即其齊三日王乃淳濯饗醴及期鬱人薦鬯犧人薦醴王祼鬯饗醴乃行百吏庶民畢從及籍后稷監之膳夫農正陳籍禮大史贊王王敬從之王耕一墢班三之庶人終於千畝其后稷省功大史監之司徒省民大師監之畢宰夫陳饗膳宰監之膳夫贊王王歆大牢班嘗之庶人終食是日也瞽率音官以省風土廪於籍東南鍾而藏之而時布之於農稷則遍戒百姓紀農協功曰隂陽分布震雷出滯土不備墾辟在司寇乃命其旅曰徇農師一之農正再之后稷三之司空四之司徒五之大保六之太師七之大史八之宗伯九之王則大徇耨穫亦如之民用莫不震動恪恭於農修其疆畔日服其鎛不解於時財用不乏民用和同是時也王事唯農是務無有求利於其官以干農功若是乃能媚於神而和於民矣前漢書食貨志賈誼説上曰管子曰倉廩實而知禮節民不足而可治者自古及今未之嘗聞古之人曰一夫不耕或受之飢一婦不織或受之寒生之有時而用之無度則物力必屈古之治天下至孅至悉也故其蓄積足恃漢之為漢幾四十歲矣公私之積猶可哀痛失時不雨民且狼顧歲惡不入請賣爵子既聞耳矣安有為天下阽危者若是而上不驚者世之有飢穰天之行也禹湯被之矣即不幸有方二三千里之旱國胡以相恤今驅民而歸之農皆著於本使天下各食其力末技遊食之民轉而緣南畝則蓄積足而人樂其所矣可以為富安天下而直為此廪廪也竊為陛下惜之又朝錯説上曰聖王在上而民不凍飢者非能耕而食之織而衣之也為開其資財之道也故堯禹有九年之水湯有七年之旱而國無捐瘠者以蓄積多而備先具也民貧生於不足不足生於不農不農則不地著不地著則離鄉輕家民如鳥獸雖有高城深池嚴法重刑猶不能禁也夫寒之於衣不待輕暖飢之於食不待甘旨飢寒至身不顧廉恥人情一日不再食則飢終嵗不制衣則寒夫腹餒不得食膚寒不得衣雖慈母不能保其子君安能以有其民哉明主知其然也故務民於農桑薄賦斂廣蓄積以實倉廩備水旱故民可得而有也粟米布帛生於地長於時聚於力非可一日成也數石之重中人弗勝不為姦邪所利一日弗得而飢寒至是故明君貴五穀而賤金玊今農夫五口之家其服役者不下二人其能耕者不過百畝百畝之收不過百石春耕夏耘秋穫冬藏伐薪樵治官府給繇役春不得避風塵夏不得避暑熱秋不得避隂雨冬不得避寒凍四時之間無日休息又私自送往迎來弔死問疾養孤長幼在其中勤苦如此尚復被水旱之災急政暴虐賦斂不時朝令而暮改當其有者半賈而賣亡者取倍稱之息於是有賣田宅鬻子孫以償債者矣方今之務莫若使民務農欲民務農在於貴粟貴粟之道在於以粟為賞罰粟有所泄可時赦勿收農民租如此德澤加於萬民民愈勤農又董仲舒説上曰春秋他穀不書至於麥禾不成則書之以此見聖人於五榖最重麥與禾也今關中俗不好種麥是歲失春秋之所重而損生民之具也願陛下幸詔大司農使關中民益種宿麥令毋後時後漢書魯恭傳永初元年盛夏斷獄恭上疏諫曰永元十五年來刺史太守以盛夏徴召農人拘對考驗連滯無已司𨽻典司京師四方是則而近於春月分行諸部託言勞來貧人而無隱惻之實煩擾郡縣廉考非急逮捕一人罪延十數上逆時氣下傷農業比年水旱傷稼人飢流冗今始夏百穀權輿陽氣胎養之時自三月以來隂寒不暖物當化變而不被和氣月令孟夏斷薄刑出輕繫行秋令則草木零落人傷於疫夫斷薄刑者謂其輕罪已正不欲令久繫故時斷之也臣愚以為今孟夏之制可從此令其決獄案考皆以立秋為斷以順時節育成萬物又東平憲王蒼傳永平四年春車駕校獵河內蒼上書曰臣聞時令盛春農事不聚衆興功臣知車駕今出事從約省所過吏人諷誦甘棠之德惟陛下因行田野循視稼穡消搖仿佯弭節而旋又黃瓊傳瓊上疏曰自古聖帝哲王莫不敬恭明祀增致福祥故必躬郊廟之禮親籍田之勤以先羣萌率勸農功今廟祀適闋而祈穀潔齋之事近在明日臣恐左右之心不欲屢動聖躬以為親耕之禮可得而廢臣聞先王制典籍田有日司徒咸戒司空除壇先時五日有協風之應王即齋宫饗禮載耒誠重之也自癸巳以來仍西北風甘澤不集寒涼尚結迎春東郊既不躬親先農之禮所宜自勉以逆和氣以致時風易曰君子自強不息斯其道也三國吳志華核傳孫皓時倉廩無儲華核上疏曰先王治國惟農是務軍興以來已向百載農人廢南畝之務女工停機杼之業推此揆之則蔬食而長飢薄衣而履冰者固不少矣且飢者不待美饌寒者不俟狐貉今事多而役繁民貧而俗奢百工作無用之器婦人為綺靡之飾不勤麻枲並繡文黼黻轉相倣效恥獨無有兵民之家猶復逐俗內無擔石之儲而出有綾綺之服至於富賈商販之家重以金銀奢資尤甚夫天下未平百姓不贍宜一生民之原豐穀帛之業而乃棄功於浮華之巧妨日於侈靡之事上無尊卑等級之差下有耗財費力之損漢之文景承平繼統天下已定四方無虞猶以雕文之傷農事錦繡之害女工開富國之利杜飢寒之本况今六合分爭豺狼充路兵不離疆甲不解帶而可不廣生財之原充府藏之積哉晉書食貨志宣帝督諸軍伐吳鄧艾以為大兵征舉運兵過半功費巨億陳蔡之間土下田良令淮北二萬人淮南三萬人分休且佃且守水豐常收三倍於西計除衆費歲完五百萬斛以為軍資六七年間可積三千萬餘斛於淮北此則十萬之衆五年食也又杜預上疏曰臣輒思維今者水災東南特劇非但五稼不收居業並損下田所在停汚高地皆多磽塉此即百姓困窮方在來年雖詔書切告長吏二千石為之設計而不廓開大制定其趣舍之宜恐徒文具所益蓋薄水去之後填淤之田畝收數鍾至春大種五榖五榖必豐東南以水田為業人無牛犢可分種牛三萬五千頭以付二州將吏士庶使及春耕穀登之後頭責三百斛是為化無用之費得運水次成穀七百萬斛又晉元帝大興元年後軍將軍應詹表曰夫一人不耕天下必有受其飢者而軍興以來征戰運漕朝廷宗廟百官用度既已殷廣下及工商流寓僮僕不親農桑而逰食者以十萬計不思開立美利而望國足人給豈不難哉間者流民奔東吳東吳今儉皆以還反江西良田曠廢來久火耕水耨為功差易宜簡流民興復農官功勞報賞皆如魏氏故事一年中與百姓二年分稅三年計賦稅以使之公私兼濟則倉盈庾億可計日而待也又齊王攸傳臣聞先王之教莫不先正其本務農重本國之大綱當今方隅清穆武夫釋甲廣分休假以就農業然守相不能勤心恤公以盡地利昔漢宣嘆曰與朕理天下者惟良二千石乎勤加賞罰黜陟幽明於時翕然用多名守計今地有餘羡而不農者衆加附業之人復有虛假通天下之謀則飢者必不少矣今宜嚴敇州郡撿諸虛詐害農之事督實南畝上下同奉所務則天下之穀可復古政豈患於暫一水旱便憂飢餒哉又束晳傳晳上議曰農穰可致所由者三一曰天時不愆二曰地利無失三曰人力咸用若必春無霢霂之潤秋繁滂沱之患水旱失中雩禳有請雖使羲和平秩后稷親農理疆甽於原隰勤藨蓘於中田猶不足以致倉庾盈億之積也然地力可以計生人力可以課致詔書之旨亦將欲盡此理乎今天下千城民多遊食廢業占空無田課之實較計九州數過萬計可申嚴此防令監司精察一人失課負及郡縣此人力之可致也又州司十郡土狹人繁三魏尤甚而豬羊馬牧布其境內宜悉破廢以供無業業少之人雖頗割徙在者猶多或謂北土不宜蓄牧此誠不然案古今之語以為馬之所生實在冀北大賈牂羊取之清渤放豕之歌起於巨鹿是其效也可悉徙諸牧以充其地使馬牛豬羊齕草於空間之田遊食之民受業於賦給之賜此地利之可制者也又如汲郡之吳澤良田數千頃濘水停汙人不墾植聞其國人皆謂通泄之功不足為難瀉鹵成原其利甚重而豪強大族惜其魚捕之饒搆説官長終于不破此亦谷口之謡載在史篇謂宜復下郡縣以詳當今之計荆揚兗豫汙泥之土渠塢之宜必多此類最是不待天時而豐年可獲者也以其雲雨生於畚鍤多稌生於決泄不必望朝隮而黃潦臻禜山川而霖雨息是故兩周爭東西之流史起惜漳渠之浸明地利之重也宜詔四州刺史使謹按以聞又溫嶠傳時國用不足嶠因奏軍國要務其二曰一夫不耕必有受其飢者今不耕之夫動有萬計春廢勸課之制冬峻出租之令下未見施惟賦是聞賦不可以己當思令百姓有以殷實司徒置田曹掾州一人勸課農桑察吏能否今宜依舊置之必得清恪奉公足以宣示惠化者則所益實𢎞矣宋書袁湛傳時建議大田湛弟豹上議曰國因民以為本民資食以為天修其業則教興崇其本則末理實為治之要道致化之所階也夫設位以崇賢疏爵以命士上量能以審官不取人於浮譽則比道周息遊者言歸遊子既歸則南畝闢矣分職以任務置吏以周役職不以無任立吏必以非用省冗散者廢則萊荒墾矣器以應用商以通財𠞰靡麗之巧棄難得之貨則雕偽者賤榖稼重矣耕耨勤悴力殷收寡工商逸豫用淺利深增賈販之稅薄疇畝之賦則末技抑而田畯喜矣居位無儀從之徒在野靡兼並之黨給賜非可恩致力役不入私門則遊食者反本肆勤自勸遊食省而肆勤衆則東作繁矣密勿者甄異怠慢者顯罰明勸課之令峻糾違之官則懶惰無所容力田有所望力者欣而惰者懼則穡人勸矣凡此數事亦務田之端趣也蒞之以清心鎮之以無欲助之以無倦翼之以廉謹舍日計之小成期逺致於暮歲則澆薄自淳大化有漸矣又周朗傳宋孝建中周朗疏曰農桑者實民之命為國之本有不足則禮節不興若重之宜罷金錢以榖帛為賞罰凡自淮以北萬匹為市從江以南千斛為貨亦不患其難也今且聽市至千錢以還者用錢餘皆用絹布及米其不中度者坐之如此則墾田自廣民資必繁又田非膠水皆播麥菽地堪滋養悉藝麻苧蔭巷緣藩必樹桑柘列庭接宇惟植竹栗若此令既行而善其事者庶民則敘之以爵有司亦從而加賞今自江以南在所皆穰有食之處須官興役宜募逺近能食五十口一年者賞爵一級不過千家故近食十萬口矣使其受食者悉令就佃淮南多其長帥給其糧種凡公私遊手悉發佐農令堤湖盡修原陸並起仍量家立社計地設閭檢其出入督其遊惰須待大熟可移之復舊魏書高允傳允領著作郎時多禁封良田又京師遊食者衆允因言曰古人云方一里則為田三頃七十畝百里則三萬七千頃若勤之則畝益三升不勤則畝損三升方百里損益之率為粟二百二十萬斛况以天下之廣乎若公私有儲雖遇飢年復何憂哉又李安世傳疏曰今雖桑井難復宜各均量審其徑術令分藝有凖力業相稱細民獲資生之利豪右靡餘地之盈則無私之澤乃播均於兆庶如阜如山可有積於比户矣又所爭之田宜限年斷事久難明悉屬今主然後虛妄之民絶望於覬覦守分之士永免於凌奪矣又韓麒麟傳太和十一年京都大飢麒麟表陳時務曰古先哲王經國立治積蓄九稔謂之太平故躬藉千畝以勵百姓用能衣食滋茂禮教興行逮於中代亦崇斯業入粟者與斬敵同爵力田者與孝弟均賞實百王之常軌為治之所先今京師民庶不田者多遊食之口三分居二蓋一夫不耕或受之飢况於今者動以萬計故頃年山東遭水而民有餒終今秋京都遇旱榖價踴貴實由農人不勸素無儲積故也愚謂凡珍玩之物皆宜禁斷吉凶之禮備為格式令貴賤有别民歸朴素制天下男女計口受田宰司四時巡行臺使歲一按檢勤相勸課嚴加賞罰數年之中必有盈贍雖遇災凶免於流亡矣往年校比户貫租賦輕少臣所統齊州租粟才可給俸略無入倉雖於民為利而不可長久脫有戎役或遭天災恐供給之方無所取濟可減絹布增益榖租年豐多積歲儉出賑所謂私民之榖寄積於官官有宿積則民無荒年矣又蘇綽傳周文方欲革易時政務宏強國富民之道其三盡地力曰人生天地之間衣食為命食不足則飢衣不足則寒飢寒切體而欲使人興行禮讓者此猶逆坂走丸勢不可得也是以古之聖主知其若此先足其衣食然後教化隨之夫衣食所以足者由於地利盡地利所以盡者由於勸課有方主此教者在乎牧守令長而已民者冥也智不自周必待勸教然後得盡其力諸州郡縣每至嵗首必戒敇部人無問少長但能操持農器者皆令就田墾發以時勿失其所及布種既訖嘉苗須理麥秋在野蠶停於室若此之時皆宜少長悉力男女併功若揚湯救火寇盜之將至然後可使農夫不失其業蠶婦得就其功若遊手怠惰早歸晚出好逸惡勞不勤事業者則正長牒名郡縣守令隨事加罰罪一勸百此則明宰之教也夫百畝之田必春耕之夏種之秋收之然後冬食之此三時者農之要月也若失其一時則榖不可得而食故先王之戒曰一夫不耕天下必有受其飢者一婦不織天下必有受其寒者若此三時不務省事而令人廢農者是則絶人之命驅以就死然單劣之户及無牛之家勸令有無相通使得兼濟三農之隙及隂雨之暇又當教人種桑植果藝其蔬菜修其園圃蓄育雞豚以備生生之資以供養老之具夫為政不欲過碎碎則人煩勸課亦不容太簡簡則人怠善為政者必消息時宜而適煩簡之中故詩曰不剛不柔布政優優百祿是遒如不能爾則必陷於刑辟矣唐書食貨志德宗貞元四年宰相陸贄上疏其三條言廉使奏吏之能者一曰户口增加二曰田野墾闢夫貴户口加增詭情以誘姦浮苛法以析親族則有州縣破傷之病貴田野墾闢率民殖荒田限年免租新畝雖闢舊畬蕪矣人以免租年滿復為汚萊有稼穡不增之病此州若損客户彼郡必減居民增處邀賞而稅數加減處懼罪而稅數不降國家設考課之法非欲崇聚斂也宜命有司詳考課績州稅有定徭役有等如此不督課而人人樂耕矣又權德輿傳貞元八年關東淮南浙西大水權德輿建言江淮田一善熟則旁資數道故天下大計仰於東南今霪雨二時農田不闢宜擇羣臣明識通方者持節勞徠問人所疾苦蠲其租入與連帥守長講求所宜册府元龜唐天福三年六月金部郎中張鑄奏臣聞國家以務農是本勸課為先用廣田疇乃資倉廩竊見所在鄉村浮户方思墾闢正切耕耘種木未滿於十年樹穀未臻於三頃似成産業微有生涯便被縣司繫名定作鄉村色役懼其重斂畏以嚴刑遂舍所居却思他適觀兹阻隔何以舒蘇既乖撫恤之門徒有招擕之令伏乞明示州府應所在無主空間荒地一任百姓開種候及五頃以上三年外即許縣司量户科徭如未及五頃以上者不在騷擾之限荒榛漸少賦稅增多非惟下益蒸黎實亦上資邦國從之玉海周世宗顯德三年留心農穡思廣勸課之道命國工刻木為耕夫織婦蠶女之狀於禁中召近臣觀之學士承旨陶榖為贊以美其事其序曰耕於歷山重華之德也蠶於岐陽太姒之美也我后在宥之四載以為化民成俗者莫如身率乃命有司刻木為耦人耕耘之象又為織婦蠶女之類置於紫庭亦几杖盤盂座右之義也志在足食豈同流馬之運人皆有褐且殊昆明之石同穎八蠶可翹足而望豈比獲玉鈎於山陽空有採桑之號陳金根於鈎盾但為弄田之戲哉贊曰寒耕暑織上感皇情帝梧景轉遲遲欲行宫簾風度扎扎有聲疲俗是念侈心不萌宋史食貨志至道二年太常博士陳靖上言先王之欲厚民生莫先於積榖而務農鹽鐵𣙜酤斯為末矣按天下土田除江淮湖湘兩浙隴蜀河東諸路地里敻逺雖加勸督未遽獲利今京畿周環二十三州幅員數千里地之墾者十才二三稅之入者又十無五六復有匿里舍而稱逃亡棄耕農而事遊惰賦額歲減國用不充詔書纍下許民復業蠲其租調寬以歲時然鄉縣擾之每一户歸業則刺報所由朝耕尺寸之田暮入差徭之籍追胥責問繼踵而來雖蒙蠲其常租實無補於捐瘠况民之流徙始由貧困或避私債或逃公稅亦既亡遁則鄉里檢其資財至於室廬什器桑棗材木咸計其直或鄉官用以輸稅或債主取以償逋生計蕩然還無所詣以兹浮蕩絶意歸耕如授以間曠之田廣募遊惰誘之耕墾未計賦租許令别置版圖便宜從事酌民力之豐寡農畝肥磽均配督課令其不倦其逃民歸業丁口授田煩碎之事並取大司農裁決耕桑之外令益種雜木蔬果孶畜羊犬雞豚給授桑土潛擬井田營造室居使立保伍養生送死之具慶弔問遺之資並立條制候至三五年間生計成立即計户定徴量田輸稅若民力不足官借糴錢或以市餱糧或以營耕具凡此給授委於司農比及秋成乃令償值依時價折納以其成數關白户部又司馬光疏曰四民之中惟農最苦寒耕熱耘霑體塗足戴日而作戴星而息蠶婦治繭績麻紡緯縷縷而積之寸寸而成之其勤極矣而又水旱霜雹蝗􅈮間為之災幸而收成則公私之債交爭互奪榖未離場帛未下機已非己有所食者粳籺而不足所衣者綈褐而不完直以世服田畝不知捨此之外有何可生之路耳而况聚斂之臣於租稅之外巧取百端以邀功賞青苗則強散重斂給陳納新免役則刻剝窮民收養浮食保甲則勞於非業之作保馬則困於無益之費可不念哉今者濬發德音使畎畝之民得上封事雖其言辭鄙雜皆身受實患直貢其誠不可忽也又紹興二十六年通判安豐軍王時升言淮南土皆膏腴然地未盡闢民不加多者緣豪強虛占良田而無遍耕之力流民襁負而至而無開耕之地望凡荒間田許人剗佃又乾道四年知鄂州李椿奏州雖在江南荒田甚多請佃者開墾未幾便起毛稅度田追呼不任其擾旋即逃去今欲召人請佃免稅三年三年之後為世業三分為率輸苗一分更三年增一分又三年全輸歸業者别以荒田給之又七年知揚州朝公武言朝廷以沿淮荒殘未行租稅民復業與創户者雖阡陌相望然聞之官者十才二三咸懼後來稅重昔晚唐民務稼穡則增其租故播種少吳越民墾荒田而不加稅故無曠土望詔兩淮更不增賦庶民知勸又淳熙六年提舉浙西顔師魯奏設勸課之法欲重農桑廣種植也今鄉民間於己田連接間曠磽確之地墾成田園用力甚勤或以未陳起稅為人所訟即以盜耕罪之何以勸力田哉止宜實田起稅非特可戢告訐之風亦見盛世重農之意又九年著作郎袁樞振兩淮還奏民占田不知其數二稅既免止輸榖帛之課力不能墾則廢為荒地他人請佃則以疆界為詞官無稽考是以野不加闢户不加多而郡縣之計益窘望詔州縣畫疆立券占田多而輸課少者隨畝增之其餘間田給與佃人庶幾流民有可耕之地而田萊不至多荒又朱熹知漳州會臣僚請行閩中經界乃奏言經界最為民間莫大之利紹興已推行處公私兩利獨泉漳汀未行臣不敢先一身之勞逸而後一州之利病切獨任其必可行也然必推擇官吏委任責成度量步畝算計精確畫圖造帳費從官給隨産均稅特許過鄉過縣均紐庶幾百里之內輕重齊同今欲每畝隨九等高下定計産錢而合一州租稅錢米之數以産錢為母每文輸米幾何錢幾何止於一倉一庫受納既輸之後却視原額分𨽻為省計為職田為學糧為常平各撥入諸倉庫版圖一定則民業有經矣但此法之行貧民下户固所深喜然不能自逹其情豪家猾吏實所不樂皆善為説辭以惑羣聽賢士大夫之喜安靜厭紛擾者又或不深察而望風阻怯此則不能無慮古今治平略范祖禹以經筵進疏曰天下之人至勞苦而常困窮者農民是也周公作無逸戒王以先知稼穡之艱難又言商之逸王不知稼穡之艱難不聞小人之勞苦唯耽樂之從夫稼穡之艱與小人之勞人君不可以不知天生時而地生財自一粒一縷以上皆出於民力然後人得而用人臣之祿受之於君故不可不報君人君之奉取之於民故不可不愛民天子者合天下之力而共尊之凡宫室車馬服食器用無非取於天下皆百姓之膏血也其作之甚勞其成之也甚難安而享之不可不思其所從來思其所從來則愛之而有不忍費財之心憂之而有不忍勞民之意以此之心行此之政而天下不安者未之有也先王豈能人人而食之人人而衣之哉推其仁心修其仁政以及天下則所被者廣矣臣願陛下當食則思天下有飢而不得食者當衣則思天下有寒而不得衣者凡於每事莫不皆然唯推至誠以召和氣庶幾皇天報應降豐年之祥使百姓皆家給人足則太平矣昔漢昭帝耕鈎盾弄田其事至微史臣書之蓋以昭帝欲知稼穡之艱難與周公戒成王之意同也周世宗留心農事常刻木為耕夫蠶婦置之殿庭欲見之而不忘國朝祖宗以來尤重農穡太宗謂近臣曰耕耘之夫最可矜憫春蠶既登併功績紡而繒帛不及其身田禾大稔充其腹者不過疏糲若風雨乖候稼穡不登將如之何真宗於內殿植稻麥臨觀刈穫欲知田畝之勞至今遵之惟陛下深留意於農政而常以保惠小民為先則天下幸甚大學衍義周家以農事開國成王幼沖嗣位周公懼其未知稼穡之艱難也故作七月之詩使瞽矇歌之宫中庶幾成王知小民之依不敢荒寧蓋與無逸之作同一意也夫農者衣食之本一日無農則天地之所以養人者幾乎熄矣惟其關生人之大命是以服天下之至勞當是時農之所耕者自有之田也而上之人又從而崇奬勸厲之故斯人亦以為生之樂而勤敏和悅之氣浹於上下不見其有勞苦愁嘆之狀朋酒羔羊升堂稱夀君民相與獻酬忘其尊卑貴賤後世之農則異乎此矣已無田可耕而所耕者他人之田為有司者得無殃害之足矣豈復有崇奬勸厲之意故數米而炊併日而食者乃其常也田事既起丁夫之糧餉與牛之芻稿無所從給預指收斂之入以為稱貸之資糲飯藜羮猶不克飽敢望有鹽酪之嘉味乎夫農夫女紅之艱勤富室知之者寡矣况士大夫乎士大夫知之者寡矣况貴戚近屬乎貴戚近屬知之者寡矣况六宫嬪御乎近世張栻入侍經筵因講葛覃之詩言於孝祖以為周公之告成王見於詩有若七月見於書有若無逸欲其知稼穡之難小人之依帝王所傳心法之要端在於此夫治常生於敬畏而亂常起於驕肆使為國者每念乎農畝之勞則心不存焉者寡矣是心常存則驕肆何自而生豈非治之所由興也歟栻之論最為墾至臣愚不佞願詔儒臣以今農夫紅女耕蠶勞勩之狀作為歌詩退朝之暇使人日誦於前且繪畫成圖揭之宫掖布之戚里庶幾聖心惕然不忘小民之依而六宫嬪御外家近屬亦知衣食所自來勉為勤儉之趨而不狃汰侈之習戒諭守宰勤行勸相毋妄興徭役以奪其時毋橫加賦斂以困其力老農之不能自養者籍之有司大夏隆冬賦常平義廩之粟稍賑贍之歲凶賑恤先良農而後遊手以示聖朝重本之意則民將爭趨南畝衣食足而孝弟興矣元史食貨志至元七年司農司專掌農桑水利農桑之制縣邑所屬村疃凡五十家立一社擇高年曉農事者為長增至百家者别設長一員不及五十家者與近村合為一社地逺人稀不能相合各自為社者聽其合為社者仍擇數村之中立社長官司長以教督農桑為事凡種田者立牌橛於田側書某村某人於上社長以時點視勸戒不率教者籍其姓名以授提點官責之社中有喪病不能耕種者衆合力助之一社災病多者兩社助之農桑之術以備旱暵為先高者造水車貧不能造者官具材木給之田無水者鑿井井深不能得水者聽種區田種植之制每丁課種桑棗二十本土性不宜者種榆栁等皆以生成為數願多種者聽各社種苜蓿以防飢近水之家許鑿池養魚並鵝鴨蒔蓮藕菱芡蒲葦等以助衣食荒間之地悉以付民每年十月令州縣正官巡視有蝗蝻遺子之地設法除之又虞集傳泰定中集拜翰林直學士嘗因講罷進曰京師之東瀕海數千里北極遼海南濱青齊萑葦之場也海潮日至淤為沃壤用浙人之法築堤捍水為田聽富民欲得官者合其衆分授以地官定其畔以為限能以萬夫耕者授以萬夫之田為萬夫之長千夫百夫亦如之察其墮者而易之三年視其成以地之高下定額於朝廷以次漸征五年有積蓄命以官就所儲給以祿十年佩之符印得以傳子孫如軍官之法則東面民兵數萬可以近衛京師外禦島夷逺寬東南海運以舒疲民遂富民得官之志而獲其用江海遊食盜賊之類皆有所歸又關中大飢帝問集何以救對曰承平日久人情晏安志士急乎近效則怨讟生不幸大災之餘正作新之機也若遣一二有仁術知民事者稍寬其禁令隨郡縣擇可用之人定城郭修閭里治溝洫限畎畝薄征斂招其傷殘老弱漸以其力治之則逺去而來歸者漸至春耕秋斂皆有所助一二歲間勿征勿徭封域既正友望相濟四面而至者均齊方一截然有法則三代之民將見出於空虛之野矣明史李信圭傳宣德八年春言自江淮達京師沿河郡縣悉令軍民挽舟歲發二三千人晝夜以俟及致田土荒蕪民無蓄積稍遇歉歲輒老稚相持緣道乞食實可憫傷請自儀真抵通州盡免其雜徭俾得盡力農田大學衍義補臣按成周之後最重農者莫如漢文景二帝尤惓惓焉非徒有是虛文也而減租之詔歲下雖以武帝之窮奢好武下至舟車皆有算而於田租則未嘗有加焉茲則所謂誠於憫農之實惠也自是而後君非不耕籍田后非不親蠶非不下憫農之詔非不敇守令以勸相然皆尚虛文而已非實惠也是故農不必勸也能無擾之足矣善乎栁宗元之言曰長人者好煩其令若甚憐焉而卒以禍旦暮吏來而呼曰官命促爾耕朂爾植督爾穫蚤繅而緒蚤織而縷字而幼孩遂而雞豚鳴鼓而聚之擊木而召之小人輟饔飱以勞吏者且不得暇又何以蕃其生而安其性耶臣願仁聖在上思王業之所本念小人之所依禁遊惰則為之者衆省徭役則不奪其時減租賦則不罄所有是雖不下憫農之詔而人皆知其有憫念之心不設勸農之官人皆受其勸相之惠田里小民不勝多幸又臣按周禮周公致太平之書也周家自后稷以來以農為國故周公於書既作無逸以為其君告使其知小民之所依而不敢逸豫又於詩作豳頌以為其君誦使其知王業之所起而不敢荒寧及其作周官也或以巡稼穡或以簡稼器趨其耕耨辨其種類合耦以相助移用以相救無非以為農事而已噫周公之輔成王陳言以獻忠於上者惓惓以稼穡為言建官以分治於下者諄諄以農事為急其知本乎欽定授時通考卷四十四
