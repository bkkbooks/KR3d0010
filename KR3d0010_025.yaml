front:
  text: 欽定四庫全書欽定授時通考卷二十五
  hash: sha256:83f1a7671ca21dda5cdba07fa27487de61f51284bc2c812b92135c001907c36d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3d0010_WYG_025-1a, image: WYG0732/WYG0732-0330a.png}
body:
  text: 穀種粟白粟米秫尚書禹貢四百里粟集傳粟穀也去其穗而納穀周禮地官載師凡田不耕者出屋粟疏夫三為屋民有百畝之田不耕墾種作者罰以三夫之稅粟又旅師掌聚野之鋤粟屋粟閒粟注野謂遠郊之外也鋤粟民相助作一井之中所出九夫之稅粟也屋粟民有田不耕所罰三夫之稅粟閒粟閒民無職事者所出一夫之征粟訂義鄭諤曰鋤粟者合耦於鋤而不趨合耦之令者罰使出粟劉執中曰鋤粟為有五畝之宅不鋤而樹藝之乃出不毛之粟張氏曰屋粟不授田徙居之粟易氏曰閒粟即甸地閒田所出之粟曹氏曰此三等之粟在農民常賦之外旅師之所専掌又舍人掌米粟之出入辨其物疏太宰九職有九穀月令有五穀今止言粟即粢也爾雅釋草言粟粢稷也稷為五穀之長故特舉以配米也其實九穀皆有又倉人掌粟入之藏注九穀盡藏焉以粟為主疏案月令首種不入鄭注引舊記首種謂稷即種粟是五穀之長下辨九穀此云粟是以粟為主也訂義項氏曰倉人掌藏粟者李嘉㑹曰一歲所收粟則先熟兼中國之地率多種粟蓋粟耐乾雖歲之旱不至大失此九穀之物必以粟而總其名爾雅粢稷注今江東人呼粟為粢疏左傳云粢食不鑿粢者稷也曲禮云稷曰明粢是也郭云今江東人呼稷為粢然則粢也稷也粟也正是一物而本草稷米在下品别有粟米在中品又似二物故先儒甚疑焉春秋說題辭粟助陽扶性粟之為言續也粟五變一變而以陽生為苗二變而秀為禾三變而粲然謂之粟四變入臼米出甲五變而蒸飯可食陽以一立為法故粟積大一分穗長一尺文以七烈精以五六立故其字為粟西者金所立米者陽精故西字合米字而為粟春秋佐助期粟神名許給姓慶天說文粟嘉穀實也粟之為言續也續於穀也廣志粟有赤粟白莖有黑格雀粟有張公斑有含黃有蒼背稷有雪白粟亦名白粟又有白藍下竹頭青白逯麥擢石精狗蟠之各種云羣芳譜稈髙三四尺似蜀秫稈中空有節細而矮葉似蘆小而有毛穗似蒲有毛顆粒成簇性鹹淡養脾胃補虛損益丹田利小便解熱毒陳者尤良北人日用不可缺者本草綱目李時珍曰粟古文作㮚象穗在禾上之形春秋說題辭云粟乃金所立米為陽之精故西字合米為粟此鑿說也許慎云粟之為言續也續於穀也古者以粟為黍稷粱秫之總稱而今之粟在古但呼為粱後人乃専以粱之細者名粟故唐孟詵本草言人不識粟而近世皆不識粱也大抵黏者為秫不黏者為粟故呼此為秈粟以别秫而配秈北人謂之小米者即此粟也陶𢎞景曰粟江南西間所種皆是其粒細於粱熟舂令白亦當白粱呼為白粱粟或呼為粢米蘇恭曰粟類多種而並細於諸粱北土常食與粱有别粢有稷米陶注非矣孟詵曰粟顆粒小者是今人多不識之其粢米粒粗大隨色别之南方多畬田種之極易舂粒細香美少虛怯祇於灰中種之又不鋤治故也北田所種多鋤之即難舂不鋤即草翳死都由土地使然爾李時珍曰粟粱也穗大而毛長粒粗者為粱穗小而毛短粒細者為粟苗俱似茅種類凡數十有青赤黃白黑諸色或因姓氏地名或因形似時令隨義賦名故早則有趕麥黃百日糧之類中則有八月黃老軍頭之類晚則有雁頭青寒露粟之類按賈思協齊民要術云粟之成熟有早晚苗稈有高下收實有息耗質性有强弱米味有美惡山澤有異宜順天時量地利則用力少而成功多任性反道勞而無穫大抵早粟皮薄米實晚粟皮厚米少又粟氣味鹹微寒無毒李時珍曰鹹淡寇宗奭曰生者難化熟者滯氣隔食生蟲陶𢎞景曰陳粟乃三五年者尢解煩悶服食家亦將食之聖祖御製幾暇格物編粟米本草粟米即小米有黃白二種黃者有粘有不粘本性注云粟粘者為秫北人謂為黃米是也惟白粟則性皆不粘七年前烏喇地方樹孔中忽生白粟一科土人以其種播穫生生不已遂盈畝頃味既甘美性復柔和有以此粟來獻者朕命布植於山莊之內莖幹葉穗較他種倍大熟亦先時作為糕餌潔白如糯稻而細膩香滑殆過之想上古之各種嘉穀或先無而後有者槩如此可補農書所未有也直省志書遵化州物産粟早熟有趕麥黃中熟有四指紅晚熟有老米白土人總名曰穀柏鄉縣物産粟有黃穀黑穀白穀紅穀一薄蠶山藥穀一抱箭芝麻穀兒啼穀龍爪穀簍底簉邢臺縣物産粟種類頗多其佳者名十里香大黃穀小黃穀一把箭龍爪穀有一二十名鄒平縣物産粟黃白秈糯凡數十種淄川縣物産粟其種甚多或紫莖或青莖舂為米有黃白二色粟之類又有粱穀黍穀泰安縣物産粟百餘種曰九里香花裏黃其最佳者萊蕪縣物産粟有黃白二色白米者名曰粱穀並黍穀米皆可釀酒滋陽縣物産粟白赤二色鄒縣物産粟有紅白二種曹縣物産粟有黃黑紅白四色沂州物産粟有黃白赤三色高唐州物産粟其品三黃白紅觀城縣物産粟黃白赤三種黃縣物産粟其名數十種大約分黃白晚三種招遠縣物産粟其類凡數十大約分黃白烏晚四色萊陽縣物産粟黃白晚三種定襄縣物産粟黃白硬軟二種黑紅二色翼城縣物産粟有紅白二種鄢陵縣土産粟類最夥其色有青白紅黃其名有六月先七里香八百光鐡壩齒皆嘉他如雞腸兔蹄龍爪猴尾隨象立名動以百計焉延津縣物産粟有二種一種如狗尾南方謂之狗尾粟北方謂之小米一種五義如爪南方謂之狗爪粟渭南縣物産粟類頗多其佳者名狼尾又名紫羅帶又有金裹銀銀裹金者又有名疾穀者晚種早熟其穗堅硬如鐡故又名鐡軸西鄉縣土産飯粟酒粟椒粟草粟薄地襯狗尾粟桞眼青猫爪粟棕蓑粟宿松縣物産粟為青管為大黃為趕麥黃為麂腳紅為硃砂為蠟燭條為婆莫來有秈有糯歙縣物産粟有早粟寒粟毛粟皆晚成有赤稈白稈有望粳青有糯粟山中人以為酒有罌子粟細美異他粟有山粟皆古之粱也祁門縣土産山粟圓粟涇縣物産黴粟寒粟有紅白二種穄子粟稗子粟揚州府物産粟有粳粟糯粟金叉婆不來鐡落索狗尾上海縣物産粟高鄉所種有蘆粟似薏苡而高有二種粳者穗挺而疏糯者穗垂而密雞頭粟節間有赤鬚結實纍纍如珠一名珍珠粟又名天方粟又名玉麥又一種初秋即熟其莖較短四月種八月熟仁和縣物産粟有粳粟糯粟狗尾金纍山隂縣物産粳粟糯粟木粟稈尖幾徑寸苗如蘆高丈餘粒比粟殊大皮黑性黏乳粟粒大如雞豆色白味甘俗曰遇粟狗尾粟穄粟新建縣食貨粟之屬禾粟早粟奉新縣土産粟種類凡數十早則有趕麥黃百日糧之類中則有黃老軍頭之類晚則有雁頭青寒露粟之類靖安縣物産禾粟紅糯粟蘆粟黍子粟毛粟牛尾粟武寧縣土産禾粟牛繩粟毛粟紅糯粟青桿粟寒粟承州粟觀音粟狗尾粟寧州土産早粟紅粟鹿角粟馬口粟烏糯粟建昌縣物産粟種類甚繁早則有大紅毛馬口齊頭白之類遲則有北粟毛蟲窠廬山白頭之類早者夏熟遲者冬熟德化縣物産粟有早粟大粟草粟東鄉縣物産禾粟繩粟黏粟糯粟蘆粟宜鄉縣物産粟有占粟糯粟黍子粟草子粟等名萍鄉縣物産大粟鬚粟膏粱粟蒲圻縣物産早粟寒粟粘粟糯粟觀音粟咸寧縣物産鐡駝粟猴舂粟鹿角粟寒粟觀音粟羅田縣物産粟類早粟大寒粟小寒粟青管粟矮腳紅穀子粟有穀粟苧麻粟濫雜九五龍爪下馬看料田捶趕麥黃九月寒硃砂糯粟毛穀粟婆莫來銅鑼捶紅毛老軍頭白毛老軍頭寧鄉縣物産粟類三曰寒粟早粟糯粟邵陽縣食貨粳粟糯粟米粟木粟火粟永明縣物産白范粟赤毛粟羊粟藍米粟秈粟剷粟嘉定州物産粟有白沙黃沙黃者佳可以煮粥亦有酒粟其殼黑建寧縣物産金叉粟狗尾粟福寧州物産粟有牛毛粟鵝掌粟狗尾粟龍川縣物産粟有魚春牛尾老鴉膽大米珍珠小黃禮記月令仲冬之月乃命大酋秫稻必齊爾雅衆秫注謂黏黍也疏衆一名秫謂黏黍也說文云稷之黏者也與穀相似米黏北人用之釀酒其莖稈似禾而粗大者是也廣志有胡秫早熟及麥齊民要術按今世有黃粱穀秫桑根秫櫶天培秫也本草綱目李時珍曰秫字篆文象其禾體柔弱之形俗呼糯米是矣北人呼為黃糯亦曰黃米釀酒劣於糯也又蘇恭曰秫稻秫也今人呼粟糯為秫北土多以釀酒而汁少於黍米凡黍稷粟秫粳糯三穀皆有秈糯也掌禹錫曰秫米似黍米而粒小可作酒寇宗奭曰秫初搗出淡黃白色亦如糯不堪作飯最黏故宜作酒李時珍曰秫即粱米粟米之黏者有赤白黃三色皆可釀酒熬糖作餈糕食之蘇頌圖經謂秫為黍之黏者許慎說文謂秫為稷之黏者崔豹古今注謂秫為稻之黏者皆誤也惟蘇恭以粟秫分秈糯孫炎注爾雅謂秫為黏粟者得之欽定授時通考卷二十五
