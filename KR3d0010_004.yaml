body:
  text: 天時夏書堯典申命羲叔宅南交平秩南訛敬致傳申重也南交言夏與春交此居治南方之官訛化也掌夏之官平敘南方化育之事敬行其教以致其功日永星火以正仲夏厥民因鳥獸希革傳永長也謂夏至之日火蒼龍之中星舉中則七星見可知以正仲夏之氣節季孟亦可知因謂老弱因就在田之丁壯以助農也夏時鳥獸毛羽希少改易革改也農桑通訣孟夏立夏節氣初五日螻蟈鳴次五日蚯蚓出後五日王瓜生次小滿中氣初五日苦菜秀次五日靡草死後五日麥秋至次仲夏芒種節氣初五日螳螂生次五日鶪始鳴後五日反舌無聲次夏至中氣初五日鹿角解次五日蜩始鳴後五日半夏生次季夏小暑節氣初五日溫風至次五日蟋蟀居壁後五日鷹始鷙次大暑中氣初五日腐草為螢次五日土潤溽暑後五日大雨時行凡此六氣一十八候皆夏氣正長養之令埤雅江湘二浙四五月間梅欲黃落則水潤土溽柱礎皆汗蒸鬱成雨謂之梅雨也瑣碎録立夏後逢庚日為入梅芒種後逢辰日為出梅四民月令五月六月可災麥田四月立夏小滿禮記月令孟夏之月日在畢昏翼中旦婺女中注孟夏日月會於實沈斗建巳之辰其日丙丁其帝炎帝其神祝融注丙之言炳也日之行夏南從赤道長育萬物月為之佐時萬物皆炳然著見而強大炎帝大庭氏也祝融顓頊氏之子曰犁為火官陳澔曰大庭氏即神農也又螻蟈鳴蚯蚓出王瓜生苦菜秀陳澔曰此記巳月之候注螻蟈蛙也王瓜萆挈也今月令云王萯生夏小正云王萯秀朱氏曰王瓜色赤感火之色而生苦菜味苦感火之味而成又是月也以立夏先立夏三日太史謁之天子曰某日立夏盛德在火天子乃齊立夏之日天子親帥三公九卿大夫以迎夏於南郊又是月也天子始絺命野虞出行田原為天子勞農勸民毋或失時命司徒循行縣鄙命農勉作毋休於都是月也驅獸毋害五榖毋大田獵農乃登麥又是月也聚畜百藥靡草死麥秋至左傳龍見而雩注建巳之月蒼龍宿之體昏見東方萬物始盛待雨而大故祭天遠為百榖祈膏雨春秋考異郵三時惟有禱禮惟四月龍星見始有常雩呂氏春秋孟夏之昔三葉而穫大麥注昔終也三葉薺葶歷菥蓂也是月之季枯死大麥熟而可穫大麥旋麥也淮南子孟夏之月以熟榖禾雄鳩長鳴為帝候歲注雄鳩蓋布榖也又立夏加十五日斗指已則小滿音比太簇孝經緯斗指已為小滿小滿者言物於此小得滿盈也懶真子録小滿四月中謂麥之氣至此方小滿而未熟也荆楚歲時記四時有鳥名穫榖其名自呼農人候此鳥則犁杷上岸泛勝之書黍者暑也種必待暑先夏至三十日此時有雨疆土可種黍一畝三升黍心未生雨灌其心心傷無實黍心初生畏天露令兩人對持長索槩去其露日出乃止齊民要術是月收諸色菜子斫倒就地曬打收之用瓶罐盛貯標記名號是月收蜜蜂此月伐木不蛀下子芝麻扦插梔子栽種椒松大豆紫蘇麻宜夏至前十日晚黃瓜葵蓮菉豆白莧荷根宜立夏前三日梔子枇杷收藏絲綿大麥乾椹蒿芥鹽春菜蘿蔔子笋乾芋魁蠶豆甜菜乾晚菜乾雜事曬白菜移茄包梨鋤蔥芋斫竹占驗禮記月令孟夏行秋令則苦雨數來五榖不滋四鄙入保行冬令則草木早枯後乃大水敗其城郭行春令則蝗蟲為災暴風來格秀草不實羣芳譜諺云有榖無榖且看四月十六立一丈竿量月影月當中時影過竿雨水多沒田夏旱人飢長九尺主三時雨水八尺七尺主雨水六尺低田大熟高田半收五尺主夏旱四尺蝗三尺人飢嘉定縣志四月初四為稻生日喜晴談苑江南民於四月一日至四日卜一歲之豐凶云一日雨百泉枯言旱也二日雨傍山居言避水也三日雨騎木驢言踏車取水亦旱也四日雨餘有餘言大熟也農政全書四月以清和天氣為正必作寒數日謂之麥秀寒即月令麥秋至之候夏至日風色看交時最要緊屢驗月中看魚散子占水黃梅時水邊草上看散子高低以卜水增止立夏日看日暈有則主水諺云一番暈添一番湖塘是夜雨損麥諺云二麥不怕神共鬼只怕四月八夜雨大抵立夏後夜雨多便損麥蓋麥花夜吐雨多花損故麥粒浮秕也五月芒種夏至禮記月令仲夏之月日在東井昏亢中旦危中注仲夏日月會於鶉首斗建午之辰又小暑至螳螂生鵙始鳴反舌無聲陳澔曰此記午月之候螳螂一名蚚父一名天馬鵙博勞也反舌百舌鳥凡物皆稟隂陽之氣而成質其隂類者宜隂時陽類者宜陽時得時則興失時則廢又是月也農乃登麥又日長至孔頴達曰謂此月之時日長之至極又鹿角解蟬始鳴半夏生木堇榮鄭氏曰半夏藥草木堇王蒸也周禮春官女巫旱暵則舞雩疏此謂五月已後修雩故有旱暵之事旱而言暵者暵謂熱氣也管子以春日至始數九十二日謂之夏至而麥熟天子祀於太宗其盛以麥者榖之始也淮南子小滿加十五日斗指丙則芒種音比大呂三禮義宗五月芒種為節者言時可以種有芒之榖故以芒種為名懶真子録芒種五月節種該數類之種謂之有芒者麥也至是當熟矣周禮稻人澤草所生種之芒種注云澤草之所生其地可種芒種芒種稻麥也過五月節則稻不可種所謂芒種五月節者謂麥至是而始可收稻過是而不可種也齊民要術五月芒種節後陽氣始虧隂慝將萌暖氣始盛蠱蠧並興乃弛角弓弩解其徽絃張竹木弓弩弛其絃以灰藏旃裘毛毳之物及箭羽以竿挂油衣勿辟藏霖雨將降儲米榖薪炭以備道路陷滯不通是月也隂陽爭血氣散夏至先後各十五日薄滋味勿多食肥醲距立秋無食煮餅及水引餅夏月食水時此二餅得水即堅強難消惟酒引餅即化可糶大小豆胡麻糴穬大小麥收弊絮及布帛至後糶麩􅲄曝乾置罌中密封使不生蟲至冬可養馬十三是竹醉日可移竹下子夏松菜夏蘿蔔栽種插稻秧晚大豆晚紅花香菜收藏豆醬烏梅醎豆木綿菜子蠶種豌豆紅花白酒芝麻槐花小麥大蒜藍青椹子蘿蔔子雜事斫苧埋桃杏李梅核在牛糞內尖向上易出浸蠶種斫桑芒種後壬日入梅梅日種草無不活者五月五日萵苣成片放厨匱內辟蟲蛀衣帛等物收萵苣葉亦得東陽縣志夏至凡治田者不論多少必具酒肉祭土榖之神束草立標插諸田間就而祭之為祭田婆蓋麥秋既登稻禾方茂義兼祈報矣占驗禮記月令仲夏行冬令則雹凍傷榖道路不通暴兵來至行春令則五榖晚熟百螣時起其榖乃飢行秋令則草木零落果實早成民殃於疫月令占候圖朔日夏至并二日三日至六日夏至五榖熟二十二日二十四日夏至不熟二十五日三十日夏至時價平和晦日夏至五榖貴便民圖纂五月宜熱諺云黃梅寒井底乾又夜亦宜熱諺云晝暖夜寒東海也乾俱主旱五月暴熱之時看窠草忽自枯死主有水老農俚語上半月夏至前田內曬殺小魚主水口開水立至易過口閉反是田家五行朔日值芒種六畜災值夏至冬米大貴又夏至在月初主雨水調諺云夏至端午前坐了種田年又五月十三連夜雨來年早種白頭田嘉定縣志五月朔旦為早禾本命日尤忌雨又夏至日起時時分三節共十五日初雨為迎時末雨為送時諺云高田只怕迎時雨低田只怕送三時蓋初時雨則旱末時雨則潦也若中時而雷謂之腰報亦主多雨諺云中時腰報沒低田農政全書諺云初一雨落井泉浮初二雨落井泉枯初三雨落連太湖又云一日值雨人食百草又云一日晴一年豐一日雨一年歉立梅芒種日是也宜晴隂陽家云芒後逢壬立梅至後逢壬梅斷或云芒種逢壬是立黴按風土記云夏至前芒種後雨為黃梅雨田家初插秧謂之發黃梅逢壬為是芒後半月內西南風諺云梅裏西南時裏潭潭但此風連吹兩日雨立至畏雷諺云梅裏雷低田拆舍回言低田巨浸屋無用也甚驗或云聲多及震響反旱往往經試才有雷便有雨遍插秧之患大抵芒後半月謂之禁雷天又云梅裏一聲雷時中三日雨立梅日早雨謂之迎梅雨一云主旱諺云雨打梅頭無水飲牛雨打梅額河底開坼一云主水諺云迎梅一寸送梅一尺雜占云此日雨卒未晴試以二日比較近年才是無雨雖有黃梅亦不多不可不知也重五日只宜薄隂但欲晒得蓬􅂒步結切枯病也便好大晴主水雨主絲綿貴大風雨主田內無邊帶風水多也至後半月為三時頭時三日中時五日末時七日時雨中時主大水若末時縱雨亦善括云夏至未過水袋未破諺云時裏一日西南風準過黃梅兩日雨又云時雨西南老龍奔潭皆主旱全不應晚轉東南必晴諺云朝西暮東風正是旱天公末時得雷謂之送時主久晴諺云迎梅雨送時雷送去了便弗回諺云黃梅天日幾番顛冬青花占水旱諺云黃梅雨未過冬青花未破冬青花已開黃梅雨不來夏至端午前義手種年田夏至日雨落謂淋時雨主久雨其年必豐夏至有雲三伏熱如吹西南風急吹急沒慢吹慢沒端午日雨來年大熟分龍之日農家於是日早以米絺盛灰籍之紙至晚視之若有雨點迹則秋不熟榖價高人多閉糶五月二十日大分龍無雨而有雷謂之鎖雷門田家五行曰至正壬辰春末夏初水至既非桃花亦非黃梅去而復來進退不已余家所種低田數多正苦於插種過時田中積水車浚未有乾期此日尚且勉強督工喜晴固好然八風周旋正不知吉凶如何至申時忽東南陳起見挂帆雨隨有雷三四聲方且驚愕忽見一老農拱手仰天且連稱慚愧不已因問其故答云今日無雨而有雷謂之鎖龍門復拱手相賀喜躍或問此處無雨他處却雨如何老農云晴雨各以本境所致為占候也幼聞父老言前宋時平江府崑山縣作水災鄰縣常熟却稱旱上司謂接境一般高下之地豈有水旱如此相背之理不準申後其里人直赴於朝訴諸史丞相丞相怪問亦然衆人因泣下而告曰崑山日日雨常熟只聞雷丞相謂有此理悉聽所陳至今吳中相傳以為古諺又諺云夏雨隔田晴又云夏雨分牛脊又云龍行熟路正謂此也其年果熟晴多雨少自此日至立秋止雨兩番月內虹見麥貴有三卯宜種稻有應時雨諺云二十分龍草一雨破車閣在弄堂裏二十分龍草一鱟拔起黃秧便種豆六月小暑大暑易説卦坤也者地也萬物皆致養焉故曰致役乎坤函史土寄王於四時莫盛於季夏於易卦為坤坤也者土也致役致養也土乘其旺竭精華養萬物也禮記月令季夏之月日在柳昏火中旦奎中注季夏日月會於鶉火斗建未之辰又溫風始至蟋蟀居壁鷹乃學習腐草為螢陳澔曰此記未月之候疏蟋蟀生於土中至季夏羽翼未能遠飛但居其壁鷹感隂氣乃學習搏擊之事腐草得卑濕之氣故為螢又是月也土潤溽暑大雨時行燒剃行水利以殺草如以熱湯可以糞田疇可以美土疆中央土陳澔曰土寄旺於四時各十八日共七十二日除此則木火金水亦各七十二日矣土於四時無乎不在故無定位無專氣而寄旺於辰戌丑未之末未月在火金之間又居一歲之中故特揭中央土一令以成五行之序其日戊午其帝黃帝其神后土注戊之言茂也日之行四時之間從黃道月為之佐至此萬物皆枝葉茂盛其含秀者屈抑而起黃帝軒轅氏也后土亦顓頊氏之子曰犁兼為土官內經中央生濕濕生土土生甘甘在天為濕在地為土注六月四陽二隂合蒸以生濕氣蒸腐萬物成土也霧露雲雨濕之用也安靜稼穡土之德也管子中央曰土土德實輔四時淮南子六月官少內注六月植稼成熟故官少內也春秋繁露土者夏中成熟百種君之官吳志華核傳是時盛夏興工核上疏曰六月戊巳土行正旺既不可犯加又農月時不可失昔魯隱公夏城中丘春秋書之垂為後戒齊民要術鋤地六月以後雖濕亦無嫌注濕鋤則地堅夏苖隂厚地不見日故雖濕亦無害矣六月命女工織縑練絹及紗縠之屬可燒灰染青紺雜色七此月斫竹不蛀扦插楊柳栽種小蒜冬蔥油麻宜上日白莖秋葵葵菜淋􅀈蘿蔔菉豆胡蘿蔔晚瓜蔓菁收藏米麥醋三黃醋豆豉醬瓜瓜乾割麻紫草綿絲蘿蔔楮實白术雨衣麻皮麯宜伏中七寶瓜酒藥鮝魚槐花二麥椒雜事洗甘蔗鋤竹園地染水藍培灌橙橘斫柴做氷梅打炭墼打糞墼耕麥地耘稻鋤芋是月飯不餿法用生莧菜薄鋪在上蓋之過夜則不致餿壞又種瞿麥法以伏為時畝收十石渾蒸曝乾舂去皮米全不碎炊作飱甚滑細磨下絹篩作餅亦滑美食物本草種小豆以初伏為上中伏次之後則難為種子占驗禮記月令季夏行春令則榖實鮮落國多風咳民乃遷徙行秋令則丘隰水潦禾稼不熟乃多女災行冬令則風寒不時鷹隼蚤鷙四鄙入保陶朱公書伏裏西北風主冬氷堅諺云伏裏西北風臘裏船弗通虹見主麥貴日蝕主旱有霧亦主旱諺云六月裏迷霧要雨到白露西南風主蟲損稻朔日值大暑人多疾遇甲歲多飢風雨主米貴西北風主七八月內水橫流六月初八西北風驚動海中龍通考初六日晴主收乾稻雨謂之湛􅀈耳主有秋水諺云六月無蠅新舊相登米價平四時占候六月雷不鳴蝗蟲生冬民不安望氣經六月三日有霧則歲大熟田家五行月內有西南風主生蟲損稻秋前損根可再抽苖秋後損者不復抽矣諺云秋前生蟲損一莖發一莖秋後生蟲損了一莖無了一莖農政全書六月初頭一劑雨夜夜風潮到立秋六月蓋夾被田裏不生米六月西風吹遍草八月無風秕子稻三伏中天熱冬必多雨雪螂蟟蟬呌稻生芒六月有水謂之賊水言不當有也小暑日晴雨亦要看交時最緊六月初三日略得雨主秋旱收乾稻蘇秀人云此日略得雨則西山及南海不斫簥竿初三日雨難稿稻諺云六月初三晴山篠盡枯零小暑日雨名黃梅顛倒轉主水東南風及成塊白雲起至半月舶趠風主水退兼旱無南風則無舶趠風水卒不能退諺云舶趠風雲起旱魃精空歡喜仰面看青天頭巾落在麻坼裏東坡詩云三時已斷黃梅雨萬里初來舶趠風正此日也諺云六月不熱五榖不結老農云三伏中稿稻天氣又當下壅時最要晴晴則熱故也欽定授時通考卷四
