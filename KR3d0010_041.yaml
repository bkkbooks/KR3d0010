  text: 欽定四庫全書欽定授時通考卷四十一
  hash: sha256:6baea295838d1b114d602464c2918d8195e922751c2180fd0cfa9c8d0041dc7d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3d0010_WYG_041-1a, image: WYG0732/WYG0732-0556c.png}
body:
  text: 功作牧事詩小雅誰謂爾無牛九十其犉又爾牛來思其耳濕濕集注牛病則耳燥濕濕潤澤也安則潤澤爾雅犘牛犦牛犤牛犩牛犣牛犝牛􅀈牛角一俯一仰觭皆􅀈觢黑脣犉黑眥抽黑耳犚黑腹牧黑腳犈其子犢體長牬絶有力欣犌漢書龔遂傳遂為渤海太守見民有帶持刀劍者使賣劍買牛賣刀買犢曰何為帶牛佩犢後漢書王景傳景遷廬江太守先是百姓不知牛耕致地力有餘而食常不足景乃驅率吏民教用犁耕由是墾闢倍多境內豐給鄭樵牛耕耦耕辨古之耕也以耦耦則二人併力以發一耜今之耕也以牛牛則用力少而耕倍求之六經古牛惟以服車不用以耕書曰肇牽車牛逺服賈又曰放牛於桃林之野易曰服牛乘馬詩曰睆彼牽牛不以服箱皆以服車為言否則用以祭祀而已又否則如田單之縱火齊王之釁鐘而已以牛為耕秦漢以上未之前聞也禹式耦耕月令季冬令民計耦耕事語曰長沮桀溺耦而耕皆兩人併力以發一耜此三代井田之制不用牛耕明矣史稱趙過始教民牛耕牛耕之利自趙過代田始前乎此者鼂錯募民耕實塞下廬舍蒺藜之具無不備後乎此者充國上屯田簿器用橋亭之物無不詳獨不以牛為急者蓋牛耕之利未開也三代井田之制行而天下有惰農後世阡陌之法行而天下無惰農其教牛耕之力與不可以不辨農政全書山海經曰后稷之孫叔均始作牛耕世以為起於三代愚謂不然牛若常在畎畝武王平定天下胡不歸之三農而放之桃林之野乎故周禮祭牛之外以享賓駕車犒師而已未及耕也不然牽以蹊田正使藉稻何足為異乃設奪而罪之之喻即在詩有云載芟載柞其耕澤澤又曰有略其耜俶載南畝以明竭作於春皆人力也至於穫之積之如墉如櫛然後殺時犉牡有救其角以為社稷之報若果使之耕曾不如迎貓迎虎列於蠟祭乎蓋牛之耕起於春秋之間故孔子有犁牛之言而弟子冉耕字伯牛禮記吕氏月令季冬出土牛示農耕早晚前漢趙過增其制度三犁一牛後世因之生民粒食皆其力也然知資其力而不知養其力力既竭矣曾不知審寒暑之異宜疫癘之救藥有冬鬻春租冀免芻豆之費壯鞭老殺猶圖皮肉之資今勸農有官牛為農本而不加勸以致生不滋盛價失廉平田野小民嵗多租賃以揭目前計其所輸已過半直是以貧者愈貧由不恤農之本故也若為民牧者當先知愛重祈報使不敢慢易絶其妄殺憫其羸瘠豐其萊牧潔其欄牢則無不字育蕃息札瘥不作耕種不失足致豐盈此誠善政務本之意也又居近湖草廣之處買小牛三十頭大牸牛三五頭搆草屋數十間使二人掌管牧養二人仍各授一便業以為日用飲食之資久而羣聚增人牧守湖中自可任以休息養之得法必至繁息且得多糞可以壅田齊民要術服牛乘馬量其力能寒溫飲飼適其天性如不肥充繁息者未之有也又一埧牛總營得小畝三頃經冬須加料餧陳敷農書夫善牧養者必先知愛重之心以革慢易之意然何術而能俾民如此哉必也在上之人貴之重之使民不敢輕愛之養之使民不敢殺然後慢易之意不生矣視牛之飢渴猶已之飢渴視牛之困苦羸瘠猶已之困苦羸瘠視牛之疫癘若已之有疾也視牛之字育若已之有子也茍能如此則牛必蕃盛滋多奚患田疇之荒蕪而衣食之不繼乎且四時有溫暑涼寒之異必順時調適之可也於春之初必盡去牢欄中積滯蓐糞亦不必春也但旬日一除免穢氣蒸鬱以成疫癘且浸漬蹄甲易以生病又當祓除不祥以淨爽其處乃善方舊草朽腐新草未生之初取潔淨藁草細銼之和以麥麩穀粳或豆使之微濕槽盛而飽飼之豆仍破之可也藁草須以時暴乾勿使朽腐天氣凝凜即處之燠暖之地煮糜粥以啖之即壯盛矣亦宜預收豆楮之葉與黃落之桑舂碎而貯積之天寒即以米泔和銼草粳麩以飼之春夏草茂放牧必恣其飽每放必先飲水然後與草則不腹脹又刈新芻雜舊藁銼細和勻夜餧之至五更初乘日未出天氣涼而用之即力倍於常半日可勝一日之功日高熱喘便令休息勿竭其力以致困乏時其飢渴以適其性則血氣常壯皮毛潤澤力有餘而老不衰矣其血氣與人均也勿犯寒暑情性與人均也勿使太勞此要法也當盛寒之時宜待日出晏溫乃可用至晚天隂氣寒即早息之太熱之時須夙餧令飽健至臨用時不可極飽飽即役力傷損也如此愛護調養尚何困苦羸瘠之有所以困苦羸瘠者以茍目前之急而不顧恤之也古人卧牛衣而待旦則牛之寒蓋有衣矣飯牛而牛肥則牛之瘠餒蓋啖以菽粟矣衣以褐薦飯以菽粟古人豈重畜如此哉以此為衣食之根本故也彼藁秸不足以充其飢水漿不足以禦其渴天寒嚴凝而凍栗之天時酷暑而曬暴之困瘠羸劣疫癘結瘴以致斃踣則田畝不治無足怪者且古者分田之制必有萊牧之地稱田而為等差故養牧得宜博碩肥腯不疾瘯蠡也觀宣王考牧之詩可知矣其詩曰誰謂爾無牛九十其犉爾牛來思其耳濕濕以見其牧養得宜故字育蕃息也或降於阿或飲於池或寢或訛以見其水草調適而遂性也爾牛來思矜矜兢兢揮之以肱畢來既升以見其愛之重之不驚擾之也後世無萊牧之地動失其宜又牧人類皆頑童茍貪嬉戲往往慮其奔逸繫之隱蔽之地其肯求牧於豐芻清澗俾無飢渴之患耶飢渴莫之顧恤及其瘦瘠從而役使困苦之鞭撻趁逐以徇一時之急日云莫矣氣喘汗流其力竭矣耕者急於就食往往逐之水中或放之山上牛困得水動輒移時毛竅空疏因而乏食則瘦瘠而病矣放之高山筋骨疲乏遂有顚跌僵仆之患愚民無知乃始祈禱巫祝以幸其生而不知所以然者人事不修以致此也又周禮獸醫掌療獸病凡療獸病灌而行之以發其惡然後藥之養之其來尚矣然牛之病不一或病草脹或食雜蟲以致其毒或為結脹以閉其便溺冷熱之異須識其端其用藥與人相似也但大為之劑以灌之即無不愈者其便溺有血是傷於熱也以便血溺血之藥大其劑灌之冷結即鼻乾而不喘以發散藥投之熱結即鼻汗而喘以解利藥投之脹即疏通毒即解利若每能審理以節適何病之足患哉今農家不知此説謂之疫癘方其病也薰蒸相染盡而後已俗謂之天行唯以巫祝禱祈為先至其無驗則置之於無可奈何又已死之肉經過村里其氣尚能相染也欲病不相染勿令與不病者相近能適時養治如前所説則無病矣雲陽雜記青齊間遇春耕則飼牛以天麻飯仍用錦縷繫於角上農桑通訣北方旱田陸地一犁必用兩牛三牛或四牛以一人執之量牛強弱耕地多少其耕皆有定法南方水田泥耕其田高下濶狹不等以一犁用一牛挽之作止回旋惟人所便又有一等水田泥淖極深能陷牛畜則以禾扛橫亘田中人立其上而鋤之南方人畜耐暑其耕四時皆以中晝又餵養牛法農隙時入暖屋用場上諸粳穰鋪牛腳下謂之牛鋪牛糞其上次日又覆粳穰每日一覆十日除一次牛一具三隻每日前後餉約飼草三束豆料八升或用蠶沙乾桑葉水三桶浸之牛下餉噍透刷飽飯畢辰已時間上槽一頓可分三和皆水拌第一和草多料少第二比前草減半少加料第三草比第二又減半所有料全繳拌食盡即往使耕噍了牛無力夜餵牛各帶一鈴草盡牛不食則鈴無聲即拌之飽即使耕俗諺云三和一繳須管要飽不要噍了使去最好水牛飲飼與黃牛同夏須得水池冬須得暖厰牛衣牧牛具各圖説耕索䥷料桶草籃牛衣牛室呼鞭牧笛耕索圖説耕索牛所挽繩也古名綯牛索也爾雅曰綯絞也謂糾絞繩索也詩云宵而索綯郭注云綯繩之别名農家細麻合之以挽耕犁按舊説遼東耕犂轅長可四尺回轉相妨今秦晉之地亦用長轅犂其轅端橫木如古之制以駕二牛然平田則可至於山隈水曲轉折費力如山東及淮漢等處用三牛四牛大小不等高下不齊既難並駕動作之間終不若用索之便也鐁圖説䥷切草也又作䥷凡造䥷先鍛鐵為背厚可指許內嵌䥷刃如半月而長下帶鐵桍以插木為柄截木作砧長可三尺有餘廣可四五寸砧首置木簨高可三五寸穿其中以受䥷首銼草飼牛用之料桶圖説料桶以木為之用盛料以飼牛也説文云桶木方器博雅方斛謂之桶今桶之制多圓亦不觚之觚也歟草籃圖説草籃以竹為之所以盛草也或疏或密制有不同携之負之惟其所便牛衣圖説牛衣顏師古曰編亂麻為之即今呼為龓具者漢王章嘗卧牛衣中晉劉實好學少貧苦口誦手繩賣牛衣以自給牛之有衣舊矣以此見古人重畜不忘農之本故也今牧養中唯牛毛疏最不耐寒每近冬月皆宜以冗麻續作䋔緊編織毯段衣之如短褐然以禦寒洌農家不可不預為儲備牛室圖説牛室門朝陽者宜之嵗逼冬風霜凄凜獸既氄毛率多穴處獨牛依人宜入養密室聞之老農云牛室內外必事塗塈以備火災最為切要呼鞭圖説呼鞭驅牛具也字從革從便曰策曰鞓曰鞘備則成之春秋傳云鞭長不及馬腹此御車鞭也今牛鞭犂後用亦如之農家細麻合鞭鞭有鳴鞘人則以聲相之用警牛行不專於撻故曰呼鞭牧笛圖説牧笛牧牛者所吹早暮招來羣牧猶牧馬者鳴笳也嘗於村野間聞之則知時和嵗豐寓於聲也每見模為圖畫詠為歌詩實古今太平之風物也欽定授時通考卷四十一
