  text: 欽定四庫全書欽定授時通考卷五
  hash: sha256:d789a5d4b42a9a2daebc6fc93aaf9b045d2ee7e4bd01b99068b5fd05002ebb98
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3d0010_WYG_005-1a, image: WYG0732/WYG0732-0062a.png}
body:
  text: 天時秋書堯典分命和仲宅西曰昧谷寅餞納日平秩西成傳昧冥也日入於谷而天下冥故曰昧谷此居治西方之官掌秋天之政也餞送也日出言導日入言送因事之宜秋西方萬物成平序其政助成物宵中星虛以殷仲秋厥民夷鳥獸毛毨傳宵夜也春言日秋言夜互相備虛𤣥武之中星亦言七星皆以秋分日見以正三秋夷平也老壯在田與夏平也毨理也毛更生整理春秋襄公五年秋大雩左傳秋大雩旱也注雩夏祭所以祈甘雨若旱則又修其禮故雖秋雩非書過也大戴禮方秋三月收斂以時於時有事嘗新於皇祖皇考食農夫九人以成秋事書傳主秋者虛昏中可以種麥莊子正得秋而萬寶成農桑通訣立秋之節初五日凉風至次五日白露方降後五日寒蟬鳴次處暑氣初五日鷹乃祭鳥次五日天地始肅後五日禾乃登次仲秋白露之節初五日鴻雁來次五日𤣥鳥歸後五日羣鳥養羞次秋分氣初五日雷乃收聲次五日蟄蟲壞戶後五日水始涸次季秋寒露之節初五日鴻雁來賔次五日雀入大水為蛤後五日菊有黃花次霜降氣初五日豺乃祭獸次五日草木黃落後五日蟄蟲咸俯凡此六氣一十八候皆秋氣正收斂之令占驗史記天官書辰星之色秋青白而歲熟春秋繁露王者心不能容則稼穡不成而秋多雷雷者土氣也其音宮也故應之以雷戎事類占秋甲子雷歲凶秋月暴雷謂之天收百榖虛耗不成田家五行秋天雲隂若無風則無雨七月立秋處暑詩豳風七月流火箋大火者寒暑之候也火星中而寒暑退故言寒先著火所在疏服䖍云火大火心也季冬十二月平旦正中在南方大寒退季夏六月黃昏火星中大暑退是火為寒暑之候事也又七月烹葵及菽疏葵菽當烹煮乃食禮記月令孟秋之月日在翼昏建星中旦畢中注孟秋日月會於鶉尾斗建申之辰其日庚辛其帝少皡其神蓐收注庚之言更也辛之言新也日之行秋西從白道成熟萬物月為之佐萬物皆肅然改更秀實新成少皡金天氏也蓐收少皡氏之子曰該為金官又凉風至白露降寒蟬鳴鷹乃祭鳥陳澔曰此記申月之候又是月也以立秋先立秋三日太史謁之天子曰某日立秋盛德在金天子乃齊立秋之日天子親帥三公九卿諸侯大夫以迎秋於西郊又是月也農乃登榖天子嘗新先薦寢廟又命百官始收斂完隄防謹壅塞以備水潦陳澔曰所以為水潦之備者酉中有畢星好雨也春秋繁露嘗者七月嘗黍稷也陶朱公書稻田立秋後不添水晒十餘日謂之擱稻東京夢華録中元前一日即賣楝葉享祀時鋪襯桌面又賣麻榖窠鬼亦是繫在桌子腳上乃告祖先秋成之意十五日供養祖先素食才明即賣穄米飯巡門呌賣亦告成意也齊民要術七月四日命置麯室具箔槌取淨艾六日饌治五榖磨具七日遂作麴及曝經書與衣作乾糗採葸耳處暑中向秋節浣故製新作捨薄以備始凉糶大小麥豆收縑練栽種蕎麥蒿菜葱苜蓿蘿蔔菠菜宜月末日赤豆薑菜蔓青早菜冬葵芥菜立秋前雜事斫伐竹木分薤剝棗刈草作澱耕菜地秋耕宜早恐霜後掩入隂氣收黃葵花治湯火傷七月七日晒曝革裘無蟲收藏採松子割藍米醋醎豉茄乾瓜乾瓜種瓜蒂紫蘇地黃角蒿可辟蛀花椒荆芥松柏子糟茄糟瓜醬瓜荷葉楮子芙蓉葉治腫占驗禮記月令孟秋行冬令則隂氣大勝介蟲敗榖戎兵乃來行春令則其國乃旱陽氣復還五榖無實行夏令則國多火災寒熱不節民多瘧疾易通卦驗離氣見立秋分則歲大熟月令占候圖立秋坤卦用事晡時申西南凉風至黃雲如羣羊宜粟榖望西南坤上有黃雲氣是正氣立秋應節萬物皆榮豆榖熟又立秋日午時豎竿影得四尺五寸二分半五榖熟望氣經七月三日有霧歲熟紀歷撮要立秋日天氣晴明萬物多不成熟又立秋日要西南風主稻禾倍收三日三石四日四石立秋日雷名躃踣損晚禾亦名秋霹靂主晚稻秕又七夕天河去探米價回快米賤回遲米貴又朝立秋暮颼颼夜立秋熱到頭又處暑雨不通白露枉相逢家孰事親七月雷大吼有急令又虹以立秋四十六日內出正西貫兌中秋則有水有旱田家五行七月朔日虹見主年內米貴嘉定縣志處暑有雨則物成熟諺云處暑若還天不雨總然結實也難收萬寶全書立秋日申時西南方有赤雲宜粟農政全書七月秋蒔到秋六月秋便罷休又立秋日小雨吉大雨主傷禾又七月有雨名洗車雨主八月有蓼花諺云七月七無洗車八月八無蓼花八月白露秋分詩豳風八月萑葦傳薍為萑葭為葦豫蓄萑葦可以為曲薄也又八月其穫疏八月其禾可刈穫也又八月剝棗疏棗須就樹擊之八月斷壺傳壺瓠也疏甘瓠可食就蔓斷取而食之禮記月令仲秋之月日在角昏牽牛中旦觜觽中注仲秋日月會於壽星斗建酉之辰又盲風至鴻雁來𤣥鳥歸羣鳥養羞陳澔曰此記酉月之候來自北而來也羞者所美之食藏之以備冬月之養也又乃命有司趨民收斂務畜菜多積聚乃勸種麥毋或失時其有失時行罪無疑又是月也日夜分雷始收聲蟄蟲壞戶水始涸注壞益也蟄蟲益戶謂稍小之也國語辰角見而雨畢又五間南呂贊陽秀物也注南任也隂任陽事助成萬物也夏小正八月剝瓜傳蓄瓜之時也漢書五行志于易雷以八月入其卦曰歸妹言雷復歸入地則孕育根核保藏蟄蟲避盛陽之害舊唐書神龍元年改秋社用仲秋唐書歷志秋分後五日日在氐十三度龍角盡見時雨可以畢矣六典旱甚則修雩秋分以後雖旱不雩宋書禮志祠大社帝太稷常以歲八月秋社日祠之金史食貨志金宣宗元光元年京南司農卿李蹊言按齊民要術麥晚種則粒小而不實故必八月種之今南方輸秋稅皆以八月為終限若輸逺倉及泥淖往返不下二十日使民不暇趨時乞寬徴斂之限使先盡力於二麥不從管子以夏日至始數九十二日謂之秋至秋至而禾熟淮南子秋分篻定篻定而禾熟注篻禾穗粟孚甲之芒定者成也東京夢華録八月秋社各以社糕社酒相齎送貴戚宮院以猪羊肉腰子妳房肚肺鴨餅瓜薑之屬切作碁子片樣滋味調和鋪于飯上謂之社飯孝經援神契仲秋穰禾拜祭社稷內經寒風曉暮蒸熱相薄草木凝烟濕化不流則白露隂布以成秋令又金鬱之發夜零白露林莽聲悽注夜濡白露曉聼風悽乃秋金發徴也說文酉為秋門萬物已入易通卦驗秋分日入酉白氣直出兌此正氣也又白露黃隂雲出秋分白隂雲出白虎通律中南呂南者任也言陽氣尚有任生薺麥也故隂拒之也齊民要術崔實曰凡種大小麥得白露節可種薄田秋分種中田後十日種美田又八月暑退凉風戒寒趨練縑帛染綵色擘絲治絮製新浣故及韋履賤好預買以備冬寒刈萑葦芻茭凉燥可上弓弩繕理檠鋤正縛鎧弦遂以習射弛竹木弓弧糶種麥糴黍栽種大蒜罌粟寒豆苦蕒苧麻蔓菁諸般菜葱子大麥牡丹芍藥分薤根芥子麗春小麥􅀢淤芋根木瓜花椒收藏醋薑茄醬茄乾糟茄棗子淹韭晚黃瓜地黃酒芝麻栗子柿子韭花柿漆斫竹移植早梅橙橘枇杷牡丹雜事蹈麵鋤竹園地是月防霧傷棗棗熟著霧則多損檾麻散絟於樹枝上則可辟霧氣或用秸稈於樹上四散絟縛亦得田家五行八月中旬作熱謂之潮熱又名八月小春田家雜占八月中氣前後起西北風謂之霜信未風先雨謂之料信雨農桑通訣八月社前即可種麥麥經兩社即倍收而堅好農政全書種麥八月白露節後逢上戊為上時中戊為中時下戊為下時又八月早禾怕北風晚禾怕南風朔日晴主冬宜薑略得雨宜麥一云風雨宜麥又云凡朔要晴唯此月要雨好種麥白露雨為苦雨稻禾霑之則白颯蔬菜霑之則味苦諺云白露日個雨來一路苦一路又云白露前是雨白露後是鬼其時之雨片雲來便雨稻花見日吐出隂雨則收正吐之時暴雨忽來卒不能收遂致白颯之患若連朝雨反不為災不免擔閣吐秀有皮殼厚之病占驗禮記月令仲秋行春令則秋雨不降草木生榮國乃有恐行夏令則其國乃旱蟄蟲不藏五榖復生行冬令則風災數起收雷先行草木早死京房易候虹八月出西方粟貴通考朔日值白露果榖不實值秋分主物價貴又秋分諺云分社同一日低田盡呌屈秋分在社前斗米換斗錢秋分在社後斗米換斗豆楊升菴集蜀西南多雨名曰漏天杜子美詩鼓角漏天東是也自秋分後遇壬謂之入霑吳下曰入液談叢中秋無月則兔不孕蚌不胎蕎麥不實兔望月而孕蚌望月而胎蕎麥得月而秀又八月一日雨則角田下熟角田豆也經鉏堂雜志八月一日雁門開懶婦催將刀尺裁嘉定縣志秋分在社日前則田有收而榖賤後則無收而榖貴諺云分後社白米遍天下社後分白米如錦墩又八月二十四日為稻藳生日雨則雖得榖藳必腐農政全書秋分要微雨或天隂最妙主來年高低田大熟喜雨諺云麥秀風搖稻秀雨澆此言將秀得雨則堂肚大榖穗長秀實之後雨則米粒圓見收數畏旱諺云田怕秋乾人怕老窮秋熱損稻旱則必熱怕秋水潦稻諺云雨水淹沒産全收不見半八月又作新凉諺云處暑後十八盆湯又云立秋後四十五日浴堂乾十八日潮生日前後有水謂之橫港水九月寒露霜降詩唐風蟋蟀在堂歲聿其暮傳蟋蟀蛬也箋蛬在堂歲時之候是時農功已畢又蟋蟀在堂役車其休箋庶人乘役車役車休農功畢無事也疏春官巾車注云役車方箱可載任器以供役收納禾稼亦用此車故役車休息是農功畢無事也豳風九月授衣箋九月霜降始寒蠶績之功成可以授衣矣又九月叔苴疏叔拾也苴麻之有實者也以麻九月初熟拾取以供羮菜其在田收穫者猶納倉以供常食也又九月築場圃箋場圃同地自物生之時耕治之以種菜茹至物盡成熟築堅以為場又九月肅霜傳肅縮也霜降而收縮萬物禮記月令季秋之月日在房昏虛中旦桞中注季秋日月會於大火斗建戌之辰又鴻雁來賔爵入大水為蛤鞠有黃花豺乃祭獸戮禽陳澔曰此記戌月之候雁以仲秋先至者為主季秋後至者為賔爵為蛤飛物化為潛物也鞠色不一而專言黃者秋令在金鞠色以黃為正也祭獸者祭之于天戮禽者殺之以食也又是月也霜始降又草木黃落乃伐薪為炭蟄蟲咸俯在內皆墐其戶疏俯垂頭向下以隨陽氣也墐塗也塗塞其戶穴以避地上隂氣也天子乃以犬嘗稻先薦寢廟國語天根見而水涸注天根亢氐之間也涸竭也謂寒露雨畢之後五日天根朝見水潦盡竭也本見而草木節解注本氐也謂寒露之後十日陽氣盡草木之枝節皆理解也夏小正樹麥傳鞠榮而樹麥時之急也春秋繁露季秋九月隂乃始多于陽天乃于是時出溧下霜說文戌滅也九月陽氣微萬物畢成陽下入地也易通卦驗寒露正隂雲出如冠纓霜降太陽雲出上如羊下如磻石三禮義宗寒露者九月之時露氣轉寒也又九月霜降為中露變為霜故以為霜降節齊民要術大豆九月中候近地葉有黃落者速刈之注葉少不黃必浥鬱刈不速逢風則葉落盡遇雨澤爛不成又茄子九月熟時摘取擘破水淘子取沉者速曝乾裹置至二月畦種又九月治場圃塗囷倉修竇窖繕五兵習戰射以備寒凍窮厄之冦存問九族孤寡老病不能自存者分厚撤重以救其寒栽種椒菊茱萸地黃蠶豆牡丹水仙宜月初柿蒜萱草芥菜苡麥芍藥罌粟九日諸般冬菜分栽櫻桃桃楊移植枇杷橙雜果木收藏栗諸色豆稈五榖種油麻甘蔗梔子紫蘇木瓜韭子牛蒡子冬瓜子菉豆茄種栗子枸把棐子皂角黃菊槐子蟹殼治産後兒枕疼茶子紫草子雜事掘薑出土草包石榴橘栗蒲桃米菊築墻圃斫竹木斫苧收雞種續本事詩北方白雁似雁而小色白秋深乃來白雁至則霜降河北人謂之霜信杜甫詩云故國霜前白雁來謂此嘉興縣志九月藝麥豆栽桑築場亦謂之忙月占驗禮記月令季秋行夏令則其國大水冬藏殃敗民多􅍠嚏行冬令則國多盜賊邊境不寧地土分裂行春令則暖風來至民氣解惰師興不居師曠占粟米常以九月為本若貴賤不時以最賤之日為本粟以秋得本貴在來夏以冬得本貴在來秋此收榖遠近之期也戎事類占自一日至九日以日占月遇此日風則此月榖貴九月雷主榖貴又霜不下則來年三月多隂寒多雨主米貴文林廣記九月庚辰辛卯日雨主冬榖貴一倍又虹以九月出西方大小豆貴又朔日虹見麻貴油貴雜占朔日值寒露主冬寒嚴凝值霜降主歲歉又朔日風雨主春旱夏雨芝麻貴又朔日東風半日不止主米麥貴又九月上卯日北風來年三七月米大貴東風亦然西北平平又十三日晴則冬晴柴賤田家五行重九日晴則冬至元日上元清明四日皆晴雨則皆雨諺云重陽無雨一冬晴又諺云九日雨米成脯又云重陽濕漉漉穰草錢千束四時占候九月雨大宜收禾又云九月九日是雨歸路日有雨來年熟嘉定縣志九月十三為稻蘿生日宜晴又云十三晴不如十四靈十四晴釘靴掛斷鼻頭繩農政全書九月初有雨多謂之秋水中氣前後起西北風謂之霜降信有雨謂之濕信未風先雨謂之料信雨霜降前來信易過善後來信必嚴毒此信乾濕後信必如之諺云霜降了布衲著得言已有暴寒之色欽定授時通考卷五
