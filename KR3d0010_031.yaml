body:
  text: 功作彙考詩周頌載芟載柞其耕澤澤傳除草曰芟除木曰柞箋先芟柞其草木土氣蒸達而和耕之則澤澤然解散集解劉氏瑾曰第一節言墾土也千耦其耘徂隰徂畛箋隰新發田也畛舊田有徑路者集解曹氏粹中曰反土之後草木根株有芟柞不盡則復耘之也劉氏瑾曰第二節言治田也侯主侯伯侯亞侯旅侯強侯以有嗿其饁思媚其婦有依其士有略其耜俶載南畝傳主家長也伯長子也亞仲叔也旅子弟也箋強有餘力者以謂間民父子餘夫皆行強有力者相助又取傭賃務疾畢已當種也集傳嗿衆飲食聲也媚順依愛也言餉婦與耕夫相慰勞也略利俶始載事也集解劉氏瑾曰第三節言男女長幼齊力於始耕也播厥百穀實函斯活箋播猶種也實種子也函含也活生也其種皆成好含生氣集解曹氏粹中曰百穀之性各有所宜而水旱豐凶不可預定故悉種之所以為備也劉氏瑾曰第四節言苗生也驛驛其達有厭其傑集傳驛驛苗生貌達出土也厭受氣足也傑先長者也集解劉氏瑾曰第五節言苗生之盛也厭厭其苗綿綿其麃箋厭厭其苗衆齊等也集傳綿綿詳密也麃耘也集解王氏安石曰既苗而耘以綿綿為善恐傷苗也劉氏瑾曰第六節言耘苗也載穫濟濟有實其積萬億及秭為酒為醴蒸畀祖妣以洽百禮箋濟濟穗衆難進也集傳積露積也集解何氏楷曰穫言在野積言在場萬億及秭言在廩劉氏瑾曰第七節言收入之多以供祭祀也又畟畟良耜俶載南畝疏畟畟刃利之狀集解劉氏瑾曰第一節言始耕也播厥百穀實函斯活集解劉氏瑾曰第二節言苗生也或來瞻女載筐及筥其餉伊黍集解劉氏瑾曰第三節言餉田也其笠伊糾其鎛斯趙以薅荼蓼傳笠所以禦暑雨也趙刺也説文薅拔去田草也疏荼陸穢蓼水草田有原有隰故並舉集解劉氏瑾曰第四節言耘苗也荼蓼朽止黍稷茂止集解陸氏佃曰因暑雨化之則草不復生而地美劉氏瑾曰第五節言苗盛也穫之挃挃積之栗栗其崇如墉其比如櫛以開百室傳挃挃穫聲也栗栗衆多也箋如墉如櫛積之高大相比迫也集解劉氏瑾曰第六節言收穫之多而齊也百室盈止婦子寧止集解劉氏瑾曰第七節言其樂豐稔也書梓材若稽田既勤敷災惟其陳修為厥疆畎傳言農夫之考田已勞力布發之惟其陳列修治為其疆畔畎壟然後功成周禮地官遂大夫正歲簡稼器修稼政注簡猶閲也稼器耒耜鎡基之屬稼政孟春月令所云汲冡周書若農之服田務耕而不耨維草其宅之既秋而不穫惟禽其饗之人而獲飢去誰哀之管子今夫農羣萃而州處審其四時權節具備其械器用比耒耜穀芨及寒擊稿除田以待時乃耕深耕均種疾耰先雨藝耨以待時雨時雨既至挾其搶刈耨鎛以旦暮從事於田壄稅衣就功别苗莠列疏遫首戴苧蒲身服襏襫沾體塗足暴其髮膚盡其四支之力以疾從事於田野少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能是故農之子常為農莊子長梧封人曰昔豫為禾稼而鹵莽種之其實亦鹵莽而報豫藝而滅裂之其實亦滅裂而報豫來年深其耕而熟耨之其禾繁以滋淮南子禾稼春生人必加功焉故五穀得遂長楊泉物理論種作曰稼稼猶種也收斂曰穡穡猶收也古今之言云爾稼農之本穡農之末稼欲熟穡欲速此良農之務也漢書食貨志種穀必雜五種以備災害田中不得有樹用妨五穀力耕數耘收穫如寇盜之至注顏師古曰謂促遽之甚恐為風雨所損齊民要術傳曰人生在勤勤則不匱語曰力能勝貧四體不勤思慮不用而能事治求贍者未之前聞也仲長子曰天為之時而我不農穀亦不可得而取之青春至焉時雨降焉始之耕田終之簠簋惰者釜之勤者鍾之矧夫不為而尚乎食也哉又凡人營田須量己力寧可少好不可多惡每年一易必須頻種其雜田地即是來年穀資欲善其事先利其器悅以使人人忘其勞且須調習器械務令快利秣飼牛畜常須肥健撫恤其人常遣歡悅觀其地勢乾濕得所大學衍義真德秀曰農者衣食之本惟其關生人之大命是以服天下之至勞以七月一詩考之日月星辰之運行昆蟲草木之變化凡感乎耳目者皆有以觸其興作之思是其心無一念不在乎農也自于耜而舉趾自播穀而滌場所治非一器所業非一端私事方畢而公宮之役毋敢稽歲功方成而嗣歲之圖不敢後是一歲之間無一日不專於農也惟夫與婦惟婦與子各共乃事各任乃役是一家之內無一人不力於農也田事既起曉霜未釋忍飢扶犂凍皴不可忍則燎草火以自溫此始耕之苦也燠氣將炎晨興以出傴僂如啄至夕乃休泥塗被體熱爍濕蒸百畝告青而形容不可復識此立苗之苦也暑日流金水田若沸耘耔是力稂莠是除爬沙而指為之戾傴僂而腰為之折此耘苗之苦也逮垂穎而堅栗懼人畜之傷殘縛草田中以為守舍數尺容膝僅足蔽雨寒夜無眠風霜砭骨此守禾之苦也刈穫而歸婦子咸喜舂揄簸蹂競敏厥事其勞苦不重可哀憐也哉陳敷農書凡從事於農務者皆當量力而為之不可茍且貪多務得以致終無成遂也傳曰少則得多則惑况稼穡在艱難之尤者詎可不先度其財足以贍力足以給優遊不迫可以取必效然後為之儻或財不贍力不給而貪多務得未免茍簡滅裂之患十不得一二幸其成功已不可必矣若深思熟計既善其始又善其中終必有成遂之常矣豈徒徼一時之幸哉古者分田之制有不易一易再易之别非獨以土敝而草木不長氣衰而生物不遂也抑欲其財力優裕歲歲常稔不致務廣而俱失故皆以深耕易耨而百穀用成諺有之多虛不如少實廣種不如狹收豈不信然大學衍義補丘濬曰成周盛時其播時百穀之事具有成法故命農官獨有詩曰嗟嗟臣工敬爾在公王釐爾成來咨來茹俾其詳考先王之成法以為三農之勸相既不可失其時又不可失其度自耕種以至於收穫無一不循其序凡舊田與夫新田無一不得其宜官則盡其勸相之功民則致其耕治之力一皆如先王之成法可也成王既置田官而戒命之後王復遵其法而重戒之噫嘻之詩曰率時農夫農官之職也播厥百穀農夫之事也終三十里欲其地之無遺利也十千維耦欲其人之無遺力也古之致力於農事也如此馬一龍農説農為治本食乃民天天畀所生人食其力故知時為上知土次之知其所宜用其不可棄知其所宜避其不可為力足以勝天矣此總言用力體要時言天時土言地脈所宜主稼穡力之所施視以為用衆知膏瘠不如原隰衆知蕪平不如淺深肥饒為膏砂瘦為瘠高者為原下者為隰蕪荒而不治者也平成熟也農家栽禾啓土九寸為深三寸為淺膏瘠熟荒此皆易知至如地之高下有氣脈所行而生氣鍾其下者有氣脈所不鍾而假天陽以為生氣者故原之下多土骨而隰之下皆積泥啓原宜深啓隰宜淺深以接其生氣淺以就其天陽常治者氣必衰再易者功必倍患因無備命在有滋將衰而沃之助其力也欲倍而壯焉收其全矣沃莫妙於滋源壯須求其固本此因土材而以人力輔相之衰者土力衰也倍者所穫倍也患言水暵蟲傷之類溝堰陂洫桔橰蓑笠潤燥以時濟及浚築制造為之預者則有備而無患矣命言生發收藏之元所滋之事有二以人力者灌溉鋤耘塗蕩也以物力者泥糞灰籸稿卉也沃助其衰壯求其倍勢也猶有不待其衰未禾而先沃之白塊之間者此素問所謂滋化源之意耳滋其衰者過或至於不能勝而病滋源則無是也固本者要令其根深入土中法在禾苗初旺之時斷去浮面絲根略燥根下土皮俾頂根直生向下則根深而氣壯可以任其土力之發生實穎實栗矣亢而過泄者水奪此謂獨陽不長者濟之以隂也何謂亢如既穫之後犂土在田冬春二時皆無雨雪太陽燥裂破塊之間盡為枯體陰不外周陽不內蓄氣過泄矣以水奪之藉其潤澤之液奪其過泄之陽包含融結以成發生之功斂而固結者火攻此謂獨隂不生者濟之以陽也何為斂失於鋤墾蕪翳蔽其天陽汚濁淫於膚理隂沍久而不開生意塞而不達氣固結矣以火攻之假其焚燎之力攻其固結之隂疏道蒸騰以宣發育之氣水云奪者必久浸而後可奪火云攻者必猛烈而後可攻奪之欲其過泄於外者返攻之欲其固結於內者去也鎡䥓寸隙不立一毛鬱蒸所至並鍾五賊此又揭工力時氣所害為甚者言也鎡䥓寸隙墾之不遍也雖有餘徑寸他日禾根適當之則詰屈不入葉雖叢生亦必以漸消盡俗云縮科是已故犂鋤者必使翻抄數過田無不毛之土則土無不毛之病五賊食禾之蟲也熱氣積於土塊之間暴得雨水醖釀蒸濕未經信宿則其氣不去禾根受之遂生蟊烈日之下忽生細雨灌入葉底留注節幹或當晝汲太陽之氣得水激射熱與濕相蒸遂生蠈朝露浥日濛雨日中點綴葉間單則化氣合則化形遂生螣熱踵根下濕行於稿夾日與雨外薄其膚遂生螟歲交熱化不雨不㿩晝晦夜暍而風氣不行遂生􅀢五賊不去則嘉禾不興故灌田者先須以水遍過收其熱氣旋即去之易以新水栽禾無害不過一遍易去者雖久浸不免日中雨露或以長牽或以疏齒披拂勿令凝著則蟲不生故祖氣不足母胎有虧其踵不踵胎氣不完其胎不胎雖成必敗蓋親下之本既久去地而傷母之體豈能全天哉祖氣主穀子之在秸者言也母胎主穀子之脫秸者言也祖氣不足謂未及冬至而先刈者其一成之氣既未充足以之為種母胎有虧矣草木之生其命在土生成變化不離土氣踵踵相接生生無已焉若脫土久氣不相屬生之雖具於胎成之則不全其數或半途而剝或成穗而秕故收種者當於冬至之後熟治高土散布其上覆以疏草障蔽鳥雀壅以酓灰滋潤燥枯至清明時沃之使芽除草濩糞頻助其長此第一義也其次草裹美種縣之風簷季春之始置諸深汪勿令近泥半月氣足布地而芽此雖不傷已落第二義矣但世俗浸種晝沉夜朗酓釀鬱蒸逼之使速胎中受病拔不可去長芽嫩脆拋撒下田跌蹼折損種種不免迷而不悟不知何見耳夫善本者斯圖末慮終者貴謀始推陳而致新氣以交併積盛脫胎而洗髓精以剝換化生此下言治禾也種得水始芽芽得土始苗移苗置之别土二土之氣交併於一苗生氣積盛矣然其胎不脫則陳腐之體猶存髓不洗則濁淫之氣終在欲其稚而壯壯而盛盛而不衰也得乎故天地之間氣之積盛者力在交併精之化生者功在剝換達順則豐覆逆乃稿縱橫成列紀律不違密􅂒為儔尺寸如范栽苗者當如是也先以一指搪泥然後以二指嵌苗置其中則苗根順而不逆縱橫之列整則易於耘蕩疏密各因其地之肥瘠為儔疏者每畝約七千二百科密則數踰於萬但害生於稂莠法謹於芟耘與其滋蔓而難圖孰若先務於決去故上農者治未萌其次治已萌矣已萌不治其謂農何稂莠惡草之害苗者芟耘皆去草之事蔓草之延生也上農深於農理勤於農事者也未萌根株在土也夫剃草之法數與草齊南粳北黍種之良也物之良者必貴貴非賤等良畏惡朋剃治也惡草害苗者不可勝數治法不多則不可去天生五穀所以養人可貴之物也貴者難成而易傷賤者易起而難制於此辨之不早俟其潛滋暗長而後治之則其根株深固枝葉暢茂盤結而輔翼者勢盛於苗矣故農家者流思其力不足以盡圖之備假諸物其始也直木而耒其次也橫木而耜又其次編木而齒曲木末而鏟鑿木首而鋤繼之以掇終之以塗無不加以鐵焉以木直而鐵堅也攻之無遺類矣如是而猶存者可不畏夫草之滋生無窮而人之用力有限不能不假於物以為力勝之具耳今之耒而耕者有大耕小耕開挄罨掄大抵勤與惰之殊也翻抄遍過之説已見於前其耙者亦多不求細熟平整粗塊臃泥凸則暴日先燥窪則注水過深是以一塸之間禾之豐悴頓異且又妙在旋抄旋耙旋耙旋蒔則燥濕和均渾水澄泥聚於根坎有壅培之力也移苗新土黃色轉青乃用㨶蕩㨶蕩雖以去草實以固苗蓋田之浮泥易行橫根而下之實土難入頂本頂本入土不深橫根布於泥面則得土之生氣不厚枝葉雖繁抽心不茂矣㨶欲斷其泥面橫根使其頂根入土深受積厚多生之氣其後抽心始髙而結穗長碩也鏟鋤皆削草器掇以手拾去餘草塗以泥壅蔽田皮既掇則泄去多水留少水在田夾泥為塗塗時以手捻去禾心宿水候田有燥裂即上水灌之禾心宿水既去燥時免其濕釀漬入新水又助潤滋清氣矣養苗至此除草已盡物不能再假力不可再加然意外之虞尚不保其無也衛生固難成功亦不易華而欲實風雨不作時將穫矣燥則多損浸以成腐此言養之係於人而成之係於天也稻花必在日色中始放雨久則閉其竅而不花風烈則損其花而不實二者皆秕穀之患也及其成穀將穫土太燥則米粒乾損水多而過浸則斑黑成腐二者又皆毁成之病也故可貴之物不産非時不安非類欲其至足以遂斯民之天而農也如之何不力農器彚考附易繫辭斫木為耜揉木為耒耒耨之利以教天下又斷木為杵掘地為臼臼杵之利萬民以濟禮記月令季冬之月命農修耒耜具田器周禮考工記車人為耒庛長尺有一寸中直者三尺有三寸上句者二尺有二寸注庛讀為棘刺之刺耒下前曲接耜疏庛者耒之面中直謂庛上句下句謂人手執之處自其庛緣其外以至於首以弦其內六尺有六寸與步相中也注緣外六尺有六寸內弦六尺應一步之尺數耕者以田器為度宜疏緣其外者逐曲量之弦其內者望直量之外有六尺六寸內應一步之尺數人步或大或小恐其不平故以六尺之耒代步量地也爾雅釋器斪斸謂之定注鋤屬斫謂之鐯注钁也謂之疀注皆古鍬插字管子一農之事必有一耜一銚一鎌一耨一椎一銍然後成為農淮南子古者剡耜而耕摩蜃而耨木鉤而樵抱甀而汲民勞而利薄後世為之耒耜耰鋤斧柯而樵桔臯而汲民逸而利多方言臿燕之東北朝鮮洌水之間謂之􅝁宋魏之間謂之鏵或謂之鍏江淮南楚之間謂之臿沅湘之間謂之畚趙魏之間謂之噪字亦作鍬東齊謂之梩江東又呼鍬刃為鐅杷無齒曰杷宋魏之間謂之渠拏今江東亦然或謂之渠疏僉今連架所以打穀者宋魏之間謂之攝殳或謂之度自關而西謂之棓或謂之柫齊楚江淮之間謂之柍或謂之桲刈鈎江淮陳楚之間謂之鉊或謂之鐹自關而西或謂之鈎或謂之鎌或謂之鍥籮所以注斛盛米穀寫斛中者也陳魏宋楚之間謂之䈪今江東亦然自關而西謂之注箕炊䉛謂之縮漉米䉛也或謂之􅀢或謂之匴江東呼淅籤碓機陳魏宋楚自關而東謂之梴磑或謂之䃀即磨也釋名斧甫也甫始也凡將制器始用斧伐木已乃制之也鎌廉也體廉薄也其所刈稍稍取之又似廉者也椎推也耒亦椎也鑿有所穿鑿也耜似也似齒之斷物也犁利也利則發土絶草根也檀坦也摩之使坦然平也鋤助也去穢助苗長也齊人謂其柄曰橿橿然正直也頭曰鶴似鶴頭也枷加也加杖於柄頭以撾穗而出其穀也或曰羅枷三杖而用之也或曰丫丫杖轉於頭故以名之也鍤插也插地起土也或曰銷銷削也能有所穿削也或曰鏵鏵刳地為坎也其板曰葉象木葉也杷播也所以播除物也柫撥也撥使聚也耨以鋤耨禾也鑮亦鋤類也鑮迫也􅟈溝也既割去壟上草又辟其土以壅苗根使壟下為溝受水潦也鉪殺也言殺草也銍穫黍鐵也銍銍斷穗聲也钃誅也以誅除物根株也耒耜經陸龜蒙曰耒耜農書之言也民之習通謂之犁冶金而為之者曰犁鑱曰犂壁斫木而為之者曰犂底曰壓鑱曰䇿額曰犂箭曰犂轅曰犂梢曰犂評曰犂建曰犂槃木與金凡十有一事耕之土曰墢墢猶塊也起其墢者鑱也覆其墢者壁也草之生必布於墢不覆之則無以絶其本根故鑱引而居下壁偃而居上鑱表上利壁形下圓負鑱者曰底底初實於鑱中工謂之鱉肉底之次曰壓鑱背有二孔係於壓鑱之兩旁鑱之次曰䇿額言其可以扞其壁也皆貤然相戴自䇿額達於犂底縱而貫之曰箭前如桯而樛者曰轅後如枘而喬者曰梢轅有越加箭可弛張焉轅之上又有如槽形亦如箭焉刻為級前高而後卑所以進退曰評進之則箭下入土也深退之則箭上入土也淺以其上下類激射故曰箭以其淺深類可否故曰評評之上曲而衡之者曰建建犍也所以柅其轅與評無是則二物躍而出箭不能止橫於轅之前末曰槃言可轉也左右繫以樫乎軛也轅之後末曰梢中在手所以執耕者也轅取車之胸梢取舟之尾止乎此乎鑱長一尺四寸廣六寸壁廣長皆尺微橢底長四尺廣四寸評底過壓鑱二尺策額減壓鑱四寸廣狹與底同箭高三尺評尺有三寸槃增評尺七焉建惟稱轅修九尺梢得其半轅至梢中間掩四尺犂之終始丈有二耕而後有爬渠疏之義也散撥去芟者也爬而後有礰礋焉有碌碡焉自爬至礰礋皆有齒碌碡觚稜而已咸以木為之堅而重者良江東之田器盡於是欽定授時通考卷三十一
