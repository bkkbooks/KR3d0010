  text: 欽定四庫全書欽定授時通考卷二
  hash: sha256:76e8cc8b944a78acbbce03a418cde036bb61578c5c377209a08feaeca3926f6b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3d0010_WYG_002-1a, image: WYG0732/WYG0732-0027a.png}
body:
  text: 天時總論下馬一龍農說農為治本知時為上時謂天時畜陽不極發生乃微陽主發生陰主斂息物之生息隨氣升降故冬至之後一陽起于下則羣陰推而漸出寒凝固結于上所以遏其泄耳及陽氣出地物生呈露流衍布濩而不窮畜之盛大致然是以桃李冬花無氷不殺草春秋紀之以病愆陽農家者有云冬耕宜早春耕宜遲云早其在冬至之前云遲其在春分之後冬至前者地中陽氣未生也春分後者陽氣半於土之上下也其意皆在陽榮陰衛欲使微陽之氣不泄求其壯盛而已於此不知所避一則初升而踣其踵一則方啓而裂其膚豈非童而牿未壯盛而先亢者乎亢則害牿則亡傷氣殆盡其生安得不微乎畜陽之意不止於冬凡日為陽雨為陰和暢為陽沍結為陰展伸為陽斂詘為陰動為陽靜為陰淺為陽深為陰晝為陽夜為陰繁殖之道惟欲陽含土中運而不息陰乘其外謹毖不出若陽泄於外而陰入其中生機轉為殺機矣凝陰在土其氣固嗇嵗久不耕之地純陰固結非假太陽之力追攝何以得散又冬春二時不見天陽亦猶是耳今夫圖埴之上未嘗生物正以內不含陽陰不外固而火煆之地藏冰不融者絶其地脈而中無陽氣來至也竊窺神化之妙陽根陰物之所以生也陰根陽物之所以成也生者謂之化成者謂之變陽自下起發其內之一本以出於外諸陰皆死者陰自下起斂其外之散齊以入於內諸陽皆生者此蓋言二氣始終之定理也諸陽謂自復以至夬也復十一月之卦也夬三月之卦也十二月為臨正月為泰二月為大壯復自坤中來一陽始生成位於冬至至泰而開開而壯壯而夬四月復全乎乾矣諸陰謂自姤以至剝也姤五月之卦也剝九月之卦也六月為遁七月為否八月為觀姤自乾中來一陰始生成位於夏至至否而塞塞而觀觀而剝十月復全乎坤矣上下者乾坤分列之位升降者陰陽往來之氣內外者神化闔闢之竗斂發者萬物生成之機出入者循環無窮之端一本散除相禪以為始終者也大抵二氣陰陽之至當主日月為義春秋二分晝夜相半氣之平也春分後晝漸永日在地下之刻少秋分後夜漸永日在地下之刻多陰陽消長係於是矣陽上而不抑遂以精泆陰下而不濟亦難以形堅損有餘補不足則精不泆而形可堅矣天地之間陽常有餘陰常不足然扶陽抑陰古聖至言易曰亢龍有悔又曰下濟而光以是見陽之精泆由於不抑陰之形脆者由於無所濟也今有上農土地饒糞多而力勤其苗勃然興之矣其後徒有美頴而無實粟俗名肥􅠽此正不知抑損其過而精泆者耳其法何以斷其浮根翦其附葉去田中積汚以燥裂其膚理則抑矣及其總秸俱成農功已畢或土力既衰潤滋不繼淫濁未去清氣有傷此正不知補助故粒米有空頭枯幹粉黛諸病也是故含生者陽以陰化達生者陰以陽變察陰陽之故參變化之機其知生物之功乎生則化成則變然必成而後有生陽根陰也生而後有成陰根陽也成者謂之變脫其本根易其故體生者謂之化融液所畜暢茂其緒故冬至之後生意皆含夏至之後生色皆達含者化之機達者變之漸陰陽互為其根求其所以然微妙而難悉也一化一變理不盡顯物自相形機緘所存非審察參詳則天地生物之功莫之有知矣夫含生者先天也以後天為之體達生者後天也以先天為之神養生家欲求先天之氣當思化理一變非化不能變非變則化者終於化矣推之事理亦然凡事之立其始甚幾微充廣必盛大盛必衰衰必敝敝則變不變則毁毁則熄此知道者之所深憂乎圖善變而不毁者其諸取法於農故聖人推日星定四時分節候而示民以則陰陽列於四時早晚見於節候嵗氣係於日星期三百有六旬有六日也日窮於次月離於紀星回於天此一嵗之終也日行速而月遲故有餘日而以閏月收之天行健而日月不能及故有嵗差而以六十年約之一嵗之中春而夏夏而秋秋而冬四時順布也四時有八節立春春分立夏夏至立秋秋分立冬冬至也冬至以後陽漸長立春陽之出也春分陽氣之中也立夏得陽三之二至夏至而極矣夏至以後陰漸長立秋陰之出也秋分陰氣之中也立冬得陰三之二至冬至而極矣堯命羲和日中星鳥以殷仲春日永星火以正仲夏宵中星虛以殷仲秋日短星昴以正仲冬不詳其餘者以一中一極前後測之耳冬至一陽生主生主長夏至一陰生主殺主成故曰生者陽也成者陰也含雖未見其生達雖未見其殺而幾已在矣夫發其生者與其晚也寧早收其成者與其早也寧晚此陽進而前陰退而後之道也四民月令正月地氣上騰土長冒橛陳根可拔急災強土黑壚之田二月陰凍畢澤可災美田緩土及河渚水處三月杏花勝可災沙白輕土之田五月六月可菑麥田齊民要術凡愛田常以五月耕六月再耕七月勿耕謹摩平以待種又二月三月種者為植禾四月五月種者為稚禾二月上旬及麻菩楊生種者為上時三月上旬及清明節桃始花為中時四月上旬及棗葉生桑花落為下時嵗道宜晚者五月六月初亦得春種欲深宜曵重撻夏種欲淺直置自生又大小麥皆須五月六月暵地穬麥非良地則不須種八月中戊社前種者為上時下戊前為中時八月末九月初為下時小麥宜下種八月上戊社前為上時中戊前為中時下戊前為下時正月二月勞而鋤之三月四月鋒而更鋤又五榖大判上旬種者全收中旬中收下旬下收農桑通訣農書云種蒔之事各有攸序正月種麻枲二月種粟脂麻三月種旱麻四月種豆五月中旬種晚麻七夕以後種菜蔔菘芥八月社前即可種麥如此則種有次第所謂順天之時也占驗總附董仲舒雨雹對太平之世風不鳴條開甲散萌而已雨不破塊潤葉津莖而已京房易候太平之時十日一雨凡嵗三十六雨此休徵時若之應春秋說題辭一嵗三十六雨天地之氣宣十日小雨應天文十五日大雨以斗運也論衡太平瑞應五日一風十日一雨田家雜占天下太平夜雨日晴言不妨農也以上總論風雨農政全書日暈則雨諺云月暈主風日暈主雨日腳占晴雨諺云朝又天暮又地主晴反此則雨日沒後起清白光數道下狹上闊直起亘天此特夏秋間有之俗呼清白路主來日酷熱日生耳主晴雨諺云南耳晴北耳雨日生雙耳斷風截雨若是長而下垂通地則又名白日幢主久晴日出早主雨出晏主晴老農云此特言久陰之餘夜雨連旦正當天明之際雲忽一掃而捲即光日出所以言早少刻必雨立驗言晏者日出之後雲晏開也必晴亦甚準蓋日之出入自有定刻實無早晏也愚謂但當云晴得早主雨晏開主晴不當言日出早晏也日外有雲障中起主晴諺云日頭􅀢雲障曬殺老和尚日沒反照主晴俗名為日返塢一云日沒胭脂紅無雨也有風徐光啓曰日返塢明朝水沒路日打洞明朝曬背痛或問二候相似而所主不同何也老農云返照在日沒之前胭脂紅在日沒之後諺云烏雲接日明朝不如今日又云日落雲沒不雨定寒又云日落雲裏走雨在半夜後此言一朵烏雲漸起而日正落其中者諺云日落烏雲半夜枵明朝曬得背皮焦此言半天元有黑雲日落雲外其雲夜必開散明必甚晴也又云今夜日沒烏雲洞明朝曬得背皮痛此言半天上雖有雲及日沒下去都無雲而見日狀如巖洞者也古今諺日出早雨淋腦日出晏曬殺鴈吳下田家志壬子日雨主久陰田家雜占諺云久晴逢戊雨久雨望庚晴又云久雨不晴且看丙丁浩然齊抄俗諺云逢庚雙變遇甲即晴蓋遇庚於雙日則變遇甲於雙日則晴多驗已上論日詩小雅月離于畢俾滂沱矣傳畢躅也月離陰星則雨疏以畢為月所離而雨是陰雨之星故謂之陰星玉厯璇璣凡孟月七日仲月八日季月九日之夜皆當月暈暈而不已其下三日內有暴風甚雨月初生色黑有水月滿色赤為旱又月初生而偃有水月始生有黑雲貫月名曰繳雲不出三日暴雨雜占每月朔一日管上旬二日管中旬三日管下旬月色青黑潤明是旬有雨若黃赤乾枯則旬中無雨師曠占候月知雨多少八月一日二日三日月色赤黃者其月少雨月色青者其月多雨農政全書月暈主風何方有闕即此方風來新月下有黑雲橫截主來日雨諺云初三月下有橫雲初四日裏雨傾盆月盡無雨則來月初必有風雨諺云草五草六若無雨初三初四莫行船草五日謂之月交日有雨主久陰草七草八交月雨初二初三勿肯晴已上論月後漢書郎顗傳石氏經曰嵗星出左有年出右無年孝經援神契嵗星守心年榖豐宋史天文志嵗星色光明潤君壽民富又主福主大司農主五榖農家諺乾星照濕土明日依舊雨農政全書諺云一個星保夜晴此言雨後天陰但見一兩星此夜必晴星光閃爍不定主有風夏夜見星密主熱諺云明星照爛地來朝依舊雨言久雨正當黃昏卒然雨住雲開便見滿天星斗豈但明日有雨當夜亦未必晴黃昏上雲半夜消黃昏消雲半夜澆若半夜後雨止雲開星月朗然則必晴無疑已上論星又夏秋之間大風及有海沙雲起俗呼謂之風潮古人名之曰颶風言其具四方之風故名颶風有此風必有霖淫大雨同作甚則拔木偃禾壞屋室决堤堰其先必有如斷虹之狀者見名曰颶母航海之人見此則又名破帆風凡風單日起單日止雙日起雙日止諺云西南轉西北搓繩來絆屋又云半夜五更西天明拔樹枝又云日晚風和明朝再多又云惡風盡日沒又云日出三竿不急便寬大凡風日出之時必略靜謂之風讓日大抵風自日內起者必善夜起者必毒日內息者必和夜半息者必大凍諺云風急雨落人急客作又云東風急被蓑笠風急雲起愈急必雨諺云東北風雨太公言艮方風雨卒難得晴俗名曰牛筋風雨指丑位故也諺云行得春風有夏雨言有夏雨應時可種田也非謂水必大也經驗諺云西南早到晏弗動草言早有此風向晚必晴諺云南風尾北風頭言南風愈吹愈急北風初起便大春南夏北有風必雨冬天南風三兩日必有雪天氣濕熱鬱蒸主有風古語云熱極則生風語云東南風跳擲三日退一尺陶朱公書青龍風急大雨將來朱雀風回烈日晴燥白虎風生必有雨霧𤣥武風急雨水相隨寅卯時為青龍己午時為朱雀申酉時為白虎亥子時為𤣥武隨方起風應乎雨晴田家五行風自月建方來為得其正萬物各得其所晴雨各得其宜又風吹月建方位主米貴師曠占常以十月朔日占春糶貴賤風從東來春賤逆此者貴以四月朔占秋糶風從南來西來者秋皆賤逆此者貴以正月朔占夏糶風從南來東來者皆賤逆此者貴已上論風朝野僉載春雨甲子赤地千里夏雨甲子乘船入市秋雨甲子禾頭生耳冬雨甲子牛羊凍死吳下田家志戊午原同甲子期始終七日最稀竒七日多晴兩月燥七日多雨兩月泥甲申主米暴貴春主五榖不收夏主傷田禾秋主六畜死冬主人多病諺云甲申猶且可乙酉怕殺我又上旬交月雨謂朔月之雨也主月內多雨田家雜占壬子日春雨人無食夏雨牛無食秋雨魚無食冬雨鳥無食又自正月至五月五朔皆有大雨主人饑蝗起易飛候凡候雨以晦朔弦望雲漢四塞者皆當雨如斗牛彘當暴雨有異雲如水牛不三日大雨黑雲如羣羊奔如飛鳥五日必雨雲如浮船皆雨北斗獨有雲不五日大雨四望青白雲名曰天寒之雲雨徵倉黑雲細如杼軸蔽日月五日必雨雲如兩人提鼓持桴者皆為暴雨金樓子旦雨謂之月額雜占江淮俗驗每月初二十六日雨則月內多雨田家五行二十七日最宜晴諺云交月無過草七晴月盡無雨則來月初必有風雨農政全書諺云雨打五更日曬水坑言五更忽然雨日中必晴甚驗晏雨不晴雨著水面上有浮泡主卒未晴諺云一㸃雨似一個釘落到明朝也不晴一㸃雨似一個泡落到明朝未得了諺云上牽晝下牽齊下晝雨嚌嚌諺云雨落怕天亮言天明時忽雨此日可晴若久雨正當昏黑忽自明亮反是雨候也雨夾雪難得晴諺云夾雨夾雪無休無歇諺云快雨快晴道德經云飄風不終朝驟雨不終日凡久雨至午少止謂之遣晝在正午遣或可晴午前遣則午後雨不可勝竈灰帶溫作塊天將變作雨兆齊前風晝後雨並言難止已上論雨陶朱公書朝看東南有雲氣隨太陽上下不逺者此雲在日初出應己午時己午時隨太陽則應未申時未申時隨太陽則應酉戌時有雷雨又太陽未出將晨之先看東南黑雲如雞頭如旗幟如山峯如陳鳥如龍頭如魚如蛇如靈芝如牡丹應當日未申時有雨或紫黑雲貫穿或在日上下者並應當日雨農政全書雲行占晴雨諺云雲行東雨無蹤車馬通雲行西馬濺泥水沒犂雲行南雨潺潺水漲潭雲行北雨便足好曬榖上風雖開下風不散主雨諺云上風皇下風隘無蓑衣莫出外雲若炮車形起主大風雲起下散四野滿日如烟如霧名曰風花主風起諺云西南陳單過也落三寸言雲陳起自西南來者雨必多尋常陰天西南障上亦雨諺云太婆年八十八弗曾見東南陳頭發又云千嵗老人不曾見東南陳頭雨沒子田言雲起自東南來者絶無雨凡雨陳自西北起者必雲黑如潑墨又必起作眉梁陳主先大風而後雨終易晴天河中有黑雲生謂之河作堰又謂之黑豬渡河墨雲對起一路相接亘天謂之雨作橋雨下闊則又謂之合羅陳皆主大雨立至少頃必作滿天陳名通界雨言廣闊普遍也若是天陰之際或作或止忽有雨作橋則必有掛帆兩腳又是雨腳將斷之兆也不可一例而取諺云旱年只怕㳂江跳水年只怕北江紅一云太湖晴上文言亢旱之年望雨如望恩才見四方逺處雲生陳起或自東引而西自西而東所謂沿江跳也則此雨非但今日不至必每日如之即是久旱之兆也潦年每至晚時雨忽至雲稍浮北似霞非霞紅光曜日雨必隨作當主夜夜如此直至大暑而後已謂之北江紅此吳語也故指北江為太湖若是晚霽必兼西天但晴無雨諺云西北赤好曬麥陰天卜晴諺云朝要天頂穿暮要四腳懸又云朝看東南暮看西北諺云魚鱗天不雨也風顛此言細細如雨鱗斑者一云老鯉斑雲障曬殺老和尚此言滿天雲大片如鱗故云老鯉往往試驗各有準秋天雲隂若無風則無雨冬天近晚忽有老鯉斑雲起漸合成濃陰者必無雨名曰護霜天諺云識每護霜天不識每著子一夜眠京房風角要訣候雨法有黑雲如一匹布于日中即日大雨二匹為二日雨三匹為三日雨京房占六甲日雲四合皆當日雨雲多雨多雲少雨少又六甲無雲一旬少雨師曠占常以五卯日候西北有雲如羣羊者即有雨至陶朱公書拂曉看南方黑雲最髙謂之雷信明日己午時至中天而止應未申時孔氏談苑大理少卿杜純之京東人言朝霞不出門暮霞行千里言雨後朝晴尚有雨須得晚晴乃真晴田家五行諺云朝霞暮霞無水煎茶主旱此言久晴之霞也朝霞不出市暮霞行千里此皆言雨後乍晴之霞暮霞若有火焰形而乾紅者非但主晴必主久旱之兆朝霞雨後乍有定雨無疑或是晴天隔夜雖無今朝忽有則要看顔色斷之乾紅主晴間有褐色主雨滿天謂之霞得過主晴霞不過主雨若西方有浮雲稍厚雨當立止雜占早看東南暮看西北空則無雨雖有雲而片色分明亦晴夜觀北斗魁罡之間有黑潤雲在畔則當夜有雨如北斗前有黃氣者明日當風若潤則當夜或明日必大雨古今諺早霞紅丢丢向午雨瀏瀏晚來紅丢丢早辰大日頭已上論雲霞農政全書莊子云騰水上溢為霧爾雅云地氣上天不應曰霧凡重霧三日主有風諺云三朝霧露起西風若無風必主雨又云霧露不收即是雨已上論霧又諺云東鱟晴西鱟雨諺云對日鱟不到晝主雨言西鱟也若鱟下便雨還主晴虹俗呼曰鱟已上論虹又諺云未雨先雷船去步來主無雨諺云當頭雷無雨卯前雷有雨凡雷聲響烈者雨陳雖大而易過雷聲殷殷然響者卒不晴雷初發聲微和者嵗內吉猛烈者凶雪中有雷主陰雨百日方晴東州人云一夜起雷三日雨言雷自夜起必連陰已上論雷又夏秋之間夜晴而見逺電俗謂之熱閃在南主久晴在北主便雨諺云南閃半年北閃眼前北閃俗謂之北辰閃主雨立至諺云北閃三夜無雨大怪言必有大風雨也已上論電又冰後水長名長水冰主來年水冰後水退名退水冰主旱若冰堅可履亦主水已上論冰又每年初下只一朝謂之孤霜主來年歉連得兩朝以上主熱上有鎗芒者吉平者凶春多主旱毛頭霜主明日風雨雪霽不消名曰等伴主再有雪久經日照而不消亦是來年多水之兆也已上論霜雪又夏初水中生苔主有暴水諺云水底起青苔卒逢大水來水際生靛青主有風雨諺云水面生青靛天公又作變諺云大水無過一周時言天道久雨山澤發洪大水橫流江河陡漲之易也諺云大旱不過周時雨大水無非百日晴言天道須是久晴則水方能退也故論潮者云晴乾無大汛合而言之可見水漲之易退之難也如此凡東南風退水西北反爾此理蓋只是吳中太湖東南之常事初冬大西北風湖水泛起吳江人家皆浸水中風息復平謂之翻湖水才是南風連吹半月十日便可退水三二尺又不還漲水邊經行聞得水有香氣主雨水驟至極驗或聞水腥氣亦然河內浸成包稻種既沒復浮主有水已上論水又草得氣之先者皆有所驗薺菜先生嵗欲甘葶藶先生嵗欲苦藕先生嵗欲雨蒺藜先生嵗欲旱蓬先生嵗欲流水藻先生嵗欲惡艾先生嵗欲病孟月占之五榖草占稻色草有五穗近本莖為早色腰末為晚禾隨其穗之美惡以斷豐歉未必極驗但其草每年根根相似草屋久雨菌生其上朝出晴暮出雨諺云朝出曬殺暮出濯殺看窠草一名干戈謂其有刺故也蘆葦之屬叢生於地夏月暴熱之時忽自枯死主有水諺云頭苧生子沒殺二苧二苧生子旱殺二苧茭草水草也村人嘗剝其小白嘗之以卜水旱味甘甜主水已來亦未止味餿氣主旱未來亦已定梧桐花初生時赤色主旱白色主水扁豆五月開花主水把夏月開結主水藕花謂之水花魁開在夏至前主水野薔薇開在立夏前主水麥花晝放主水扁豆鳯仙花開在五月主水槐花開一遍糯米長一遍價雜陰陽書禾生于棗或楊大麥生于杏小麥生于桃稻生于柳或楊黍生于榆大豆生于槐小豆生于李麻生于楊或荆師曠占術杏多實不蟲者來年秋禾善五木者五榖之先欲知五榖但視五木擇其木盛者來年多種之萬不失一也已上論草木農政全書諺云鴉浴風鵲浴雨八哥兒洗浴斷風雨鳩鳴有還聲者謂之呼婦主晴無還聲者謂之逐婦主雨鵲巢低主水髙主旱俗傳鵲意既預知水則云終不使我沒殺故意愈低既預知旱則云終不使曬殺故意愈髙海燕忽成羣而來主風雨諺云烏肚雨白肚風赤老鴉含水呌早主雨多人辛苦呌晏晴多人安閒農作次第夜間聽九逍遙鳥呌卜風雨諺云一聲風二聲雨三聲四聲斷風雨鸛鳥仰鳴則晴俯鳴則雨鵲噪早報晴名曰乾鵲冬寒天雀羣飛翅聲重必有雨雪鬼車鳥北人呼為九頭蟲夜聽其聲出入以卜晴雨自北而南謂之出窠主雨自南而北謂之歸窠主晴故詩云月黑夜深聞鬼車喫鷦呌主晴俗謂之賣蓑衣􅀈呌諺云朝􅀈晴暮􅀈雨夏秋間雨陳將至忽有白鷺飛過雨竟不至名曰截雨家雞上宿遲主陰雨燕巢做不乾净主田內草多母雞背負雞雛謂之雞跎兒主雨喫井水禽也在夏至前呌主旱諺云夏前喫井呌有車個恰喫無車個嘯鵜鶘一名淘河鵝鸛之屬其狀異常每來必主大水元至正庚寅五月十八日方梅水漲忽見此怪數十自西而東衆謂沒田先兆一老農云不妨夏至前來曰犂湖至後曰犂途以其嘴之形狀相似湖言水深途言水淺今至後八日此後雨腳斷水退矣雖然疑信不决後果天晴髙下皆得成熟若此至前至後便分禍福兩端可謂竒驗占候者慎之獺窟近水主旱登岸主水有驗圍塍上野鼠爬泥主有水必到所爬處方止鼠咬麥苗主不見收咬稻苗亦然狗􅐡地主陰雨每眠灰堆髙處亦主雨狗咬青草吃主晴狗向河邊吃水主水退鐵鼠其臭可惡白日銜尾成行而出主雨猫兒吃青草主雨絲毛狗褪毛不盡主梅水未止已上論禽獸又龍下便雨主晴凡見黑龍下主無雨縱有亦不多白龍下雨必多水鄉諺云黑龍護世界白龍讓世界龍下頻主旱諺云多龍多旱龍陳雨始自何一路只多行此路無處絶無諺云龍行熟路已上論龍又魚躍離水面謂之稱水主水漲髙多少增水多少凡鯉鯽魚在四五月間得暴漲必散子散不盡水未止盛散水勢必定夏至前後得黃鱨魚甚散子時雨必止雖散不甚水終未定最緊車溝內魚來攻水逆上得鮎魚主晴鯉主水諺云鮎乾鯉濕又云鯽魚主水鱨魚主晴黑鯉魚脊翼長接其尾主旱夏初食鯽魚脊骨有曲主水漁者網得死鱖謂之水惡故魚著網即死也口開主水立至易過口閉來遲水旱不定已上論魚又水蛇蟠在蘆青髙處主水髙若干漲若干回頭望下水即至望上稍慢水蛇及白鰻入蝦籠中皆主大風水作春暮暴暖屋木中出飛蟻主風雨平地蟻陳作亦然鱉探頭占晴雨諺云南望晴北望雨田角小螺兒名曰鬼螄浮于水面主有風雨石蛤蝦蟆之屬呌得響亮成通主晴諺云杜蛤呌三通不用問家公言報晚晴有準也田雞噴水呌主雨蚱蜢蜻蜓黃虻等蟲在小滿以前生者主水俗呼是魚口中食謂其才經風雨俱死于水故也黃梅三時內蝦蟆尿曲有雨大曲大雨小曲小雨二蠶初出變化得多主水蚯蚓俗名曲蟺朝出晴暮出雨夏至日蟹上岸夏至後水到岸已上論蟲欽定授時通考卷二
