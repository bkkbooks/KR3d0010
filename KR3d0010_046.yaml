body:
  text: 勸課祈報詩小雅以我齊明與我犧羊以社以方我田既臧農夫之慶琴瑟撃鼓以御田祖以祈甘雨傳社后土也方迎四方氣於郊也田祖先嗇也箋秋祭社與四方為五榖成熟報其功也御迎也䟽孟春月以琴瑟及撃其土鼓以迎田祖先嗇之神而祭之所以求甘㴻之雨也又大雅以興嗣嵗箋嗣嵗今新嵗也以先嵗之物齊敬祀軷而祀天者將求新嵗之豐年也又周頌以似以續續古之人傳以似以續嗣前嵗續徃事也箋殺牲報祭社稷嗣前嵗者復求有豐年也續徃事者復以飬人也續古之人求有良司穡也詩小序噫嘻春夏祈榖于上帝也箋祈猶禱也求也月令孟春祈榖于上帝是也䟽郊以報天而必兼言祈榖者以人非神之福不生為郊祀以報其已徃又祈其將來故祈報兩言之也又豐年秋冬報也集註此報賽田事之樂歌又載芟春耤田而祈社稷也䟽王者於春時親耕耤田以勸農業又祈求社稷使獲其年豐嵗稔焉又良耜秋報社稷也䟽太平之時年榖豐稔以為由社稷之所祐故於秋物既成王者乃祭社稷之神以報生成之功焉朱註此亦報賽田事之樂歌周禮地官州長以嵗時祭祀州社䟽嵗時嵗之二時春秋耳春祭社以祈膏雨望五榖豐熟秋祭社者以百榖豐稔所以報功故云祭祀州社也又黨正春秋祭禜國索鬼神而祭祀註禜謂雩禜水旱之神荆川稗編雩以祈雨禜以祈晴王昭禹曰索鬼神而祭祀乃萬物之神蓋萬物所以生所以成凡人之欲皆有以飬之凡人之求皆有以給之孰為此者其神乎先王於是有報禮焉凡索鬼神之祭所以報本而反始也鄭鍔曰蜡言其名索言其實又鼓人以靈鼓鼓社祭註靈鼓六靣鼓也社祭地祗也又春官小宗伯大烖及執事禱祠于上下神示註執事大祝及男巫女巫也求福曰禱得求曰祠䟽大烖者謂國遭水火及年榖不熟則禱祠于上下天地神祗禱祠兩言之者欲見初禱後得福則祠之也又肆師社之日涖卜來嵗之稼註社祭土為取材焉卜者問後嵗稼所宜䟽祭社有二時謂春祈秋報之者報其成熟之功今卜者來嵗亦如今年宜稼也又籥章凡國祈年于田祖龡豳雅撃土鼓以樂田畯國祭蜡則龡豳頌撃土鼓以息老物註祈年祈豐年也田祖始耕田者謂神農也王昭禹云豐年雖本於天時順而祈之亦成乎人事爾先嗇神農也以其始教天下耕稼故祈之陳及之云田畯田大夫古有功於農事者成周之時春祈年於上帝田祖田畯皆祭之詩曰以御田祖以祈甘雨以介我黍稷先王蓋以田祖田畯其生也有功於農事今農事將興舉而祭之不惟示重農之意亦所以勸農之力田者况大如上帝則祈之次如社稷則祈之則祈田祖田畯尚何疑乎李景齊云祈年之禮王政之所急先故宜歌雅小雅甫田之詩所謂祈年而吹豳雅者毋乃在是乎祭蜡而吹豳頌蓋頌者以其成功告神明而蜡祭之設所以答鬼神之功故宜歌頌又大祝掌六祝之辭一日順祝註順祝順豐年也又小祝掌小祭祀以祈福祥順豐年逆時雨寧風旱註釋順豐年而順為之祝辭者按管子云倉廪實而知禮節衣食足而知榮辱意皆欲知此是豐年順民意也故設祈禮以求豐年而順民故云為之祝辭也又夏官大司馬火弊獻禽以祭社月令廣義註春田主祭社以土方施生有祈焉又羅弊致禽以祀祊註祊當為方秋田主祭四方報成萬物也註釋以秋物成四方神之功故報祭之云禮記月令擇元日命民社註社后土也使民祀焉神其農業也月令廣義注為春事興故祭之所以祈農也又仲夏之月命有司為民祈祀山川百源大雩帝用盛樂乃命百縣雩祀百辟卿士有益於民者以祈榖實廣義註為民祈雨以祀也雩者吁嗟其聲以求雨之祭若周禮女巫凡邦之大烖歌哭而請亦其義也又季秋之月大饗帝方慤曰雩所以祈也饗所以報也祈必以仲夏者以隂生於午而物成之始也以祈物之成而已報必於季秋者以陽窮於戍而嵗功之終也所以報嵗之功而已又命主祠祭禽于四方註以所獲禽祀四方之神也司馬職曰羅弊致禽以祀祊䟽秋時萬物以成獵則以報祭社及四方為主也又孟冬之月天子乃祈來年於天宗大割祠于公社註此周禮所謂蜡祭也䟽天宗故云祈社是報功故云割又乃畢山川之祀及帝之大臣天之神祗註四時之功成於冬孟月祭其宗此可以祭其佐也帝之大臣勾芒之屬天之神祗司中司命風師雨師又禮運祀社于國所以列地利也䟽天子至尊而猶自祭社欲使報恩之禮逹於下也地出財故云列地利也又郊特牲唯為社事單出里唯為社田國人畢作唯社丘乘共粢盛所以報本反始也䟽報美結也皇氏云國人畢作是報本而丘乘共粢盛是反始言粢盛是社所生故云返始也又天子大蜡八伊耆氏始為蜡蜡也者索也嵗十二月合聚萬物而索饗之也䟽伊耆氏神農也以其初為田事故為蜡祭以報天也集註蜡祭八神先嗇一司嗇二農三郵表畷四貓虎五坊六水庸七昆蟲八合猶閉也閉藏之月萬物各已歸根復命聖人欲報其神之有功者故求索而祭享之也又蜡之祭也主先嗇而祭司嗇也祭百種以報嗇也註先嗇神農也報嗇謂報其教民樹藝之功祭百種者報其助嗇之功使盡饗焉又饗農及郵表畷禽獸仁之至義之盡也䟽不忘恩而報之是仁有功必報之是義也又祭有祈焉有報焉註祈猶求也報謂若穫禾報社也公羊大雩者何旱祭也註雩旱請雨祭名不解大者祭言大雩大旱可知也又言雩則旱見言旱則雩不見註必言雩者善其能戒懼天災應變求雨憂民之急也榖梁雩月正也雩得雨曰雩不得雨曰旱註雩者夏祈榖實之禮也旱亦用焉又秋大雩雩之為非正何也毛澤未盡人力未竭未可以雩也䟽非必百榖至而雩祀之設本為求雨求雨之意指為祈榖故周頌噫嘻之篇歌春夏而同名至於修雩祀不異故此傳言毛澤未窮人力未竭言人力之功施於種植種植之義在於禾黍也聖人重禱請請必為民民之本務在於春夏春夏祈榖先嚴其犧牲具其器物謹修其禮冀精神有感故一時盡心專力求請求請不得失時左傳夫郊祀后稷以祈農事也䟽神以人為主人以榖為命人以精意事天天以宜稼佑人以此謂之祈農又龍見而雩註建巳之月萬物始盛待雨而大故祭天逺為百榖求膏雨又秋大雩旱也註雩夏祭所以祈甘雨若旱則又修其禮故雖秋雩非書過也又山川之神則水旱癘疫之災於是乎禜之日月星辰之神則雪霜風雨之不時於是乎禜之註有水旱之災則禜祭山川之神若臺駘者周禮四曰禜祭為營儹用幣以祈福祥星辰之神若實沈者䟽禜是祈禱之小祭耳山川之神其祭非有常處故臨時營其地立攢表用幣告之以祈福祥也國語土發而社助時也收攟而烝内要也註土發春分也周語曰土乃脉發社者助時求福為農始也攟拾也冬祭曰烝因祭社以納五榖之要休農夫也又社而賦事烝而獻功註社春分祭冬祭曰烝爾雅釋訓舞號雩也註雩之祭舞者吁嗟而求雨䟽雩之祭有舞有號雩之言逺也逺為百榖祈膏雨也史記社所以親地也地載萬物天垂象取材于地取法于天所以尊天而親地也社共粢盛所以報本返始也又神農氏始教耕於是始作蜡祭路史炎帝神農氏每嵗陽月盍百種率萬民蜡戱於國中以報其嵗之成漢書郊祀志夫江海百川之大者也其令祠官以禮為嵗事以四時祠江海雒水祈為天下豐年焉晉禮志天子親耕故自立社為耤田而報者也國以人為本人以榖為命又為百姓立社而祈報焉王景侯論王社亦謂春祈耤田秋而報之也又太社為羣姓祈報祈報有時主不可廢故凡被社釁鼓主奉以從是也齊禮志晉永和中雩祈上帝百辟歌雲漢詩皆以孟夏得雨報太牢又何佟之議古者孟春郊祀祈嘉榖孟夏雩祭祈甘兩二祭雖殊而所為者一禮唯有冬至報天初無得雨賽帝今雖闕冬至之祭而南郊兼祈報之禮不容别有賽答之事也宋禮志臘者接也新故相接畋獵禽獸以享百神報終成之功也隋禮儀志古先王法施於人則祀之故以句龍主祀周棄主稷而配焉嵗凡再祭葢春求而秋報也又南郊之祭即是圜丘日南至於其上以祭天春又一祭祈農謂之二祭無别天也又何佟之議今之郊祭是報昔嵗之功而祈今年之福故取嵗首上辛不拘立春之先後周冬至於圜丘大報天也夏正月郊以祈農事故有啟蟄之嵗自晉太始二年並圜丘方澤同於二郊是知今之郊禋禮兼祈報不得限以二途也帝曰圜丘自是祭天先農即是祈榖但就陽之位故在郊也冬至之後陽氣起於甲子既祭昊天宜在冬至祈榖時可依古必湏啟蟄在一郊壇分為二祭自是冬至謂之祀天啟蟄名為祈榖唐禮樂志王仲丘議夫祈榖本以祭天也然五帝者五行之精所以生九榖也宜於祈榖祭昊天而兼祭五帝冊府元龜唐開元二十五年勅時和年豐神所福也精意備物祭之義也朕毎為蒼生嘗祈稔嵗㣲誠有感丕應乃彰今宗社降靈神祗効祉三時不害百榖用成遂使京坻遍於天下和平之氣既無逺而不通禋祀之典亦有祈而必報又唐天寳元年詔社為九土之尊稷乃五榖之長春祈秋報祀典是尊而天下郡邑所置社稷等如聞祭事或不備禮茍崇敬有虧豈靈祗所降欲望和氣豐年焉可致也朕永惟典故務在潔誠俾官吏盡心庶蒼生䝉福自今已後應祭官等庶事宜倍加精潔以副朕意其社壇側近仍禁樵牧至如百姓私社宜與官社同日致祭又天寳三年遣使分祀嶽瀆詔務農勸穡雖用天道人和嵗稔實頼休徴頃者春夏之交稍愆時雨收穫之際復屬秋霖慮害農功毎祈孚佑遂得百神降福羣望效靈既不為災仍多善熟幽賛之徳普洽於生人昭報之儀式遵於祀典又八年詔九州之鎮實著禮經三代之典必崇望秩事既屬於報功義有符於錫命其九州鎮山除入諸嶽外宜並封公仍各置祠守者量更增修儲慶發祥當申昭報宜令所在長官各陳祭禮名山大川亦量事致祭又十四年制書云咸秩羣望詩曰懐柔百神永惟明徴豈忘昭報今秋稼穡頗勝常年實頼靈祗福臻稔嵗其五嶽四瀆所在山川及得道昇仙靈跡之處宜委郡縣長官至秋後各令醮祭務崇嚴潔式展誠享淮南子郊天望山川禱祀而求福雩兌而請雨白虎通王者報地徳禮西郊又王者所以有社稷何為天下求福報功人非土不立非榖不食土地廣博不可徧敬也五榖衆多不可一一而祭也故封土立社示有常尊稷五榖之長故封稷而祭之也又稷者得隂陽中和之氣而用尤多故為長也嵗再祭何春求榖之義也又諸侯社稷皆少牢社稷為報功諸侯一國所報者少也又太社為天下報功王社為京師報功又大夫有民其有社稷者亦為報功也孝經緯社土地之主也土地濶不可盡敬故封土為社以報功也稷五榖之長也榖衆不可徧祭故立稷神以祭之援神契仲夏穫禾報社祭稷以三牲何重功故也月令廣義注按中夏無禾可穫報稷當在秋春秋繁露大旱雩帝而請雨大水鳴鼓而攻社解大旱陽滅隂也雖太甚拜請之而已大水者隂滅陽也故鳴鼓而攻之又旱求雨令縣邑以水日令民禱社論衡社稷報生萬物之功社報萬物稷報百榖又東方主春春主生物故祭嵗星求春之福也四方皆有力於物獨求春者重本尊始也又春秋魯大雩旱求雨之祭也旱乆不雨禱祭求福又春二月雩秋八月亦雩春祈榖雨秋祈榖實又大水鼓用牲于社亦古禮也為水旱者隂陽之氣也滿六合難得盡祀故修壇設位敬恭祈求效事社之義也說文夏祭樂于赤帝以祈甘雨又祈榖食新曰離膢又雩祭請祈人君精誠也又雩之禮為民祈榖雨祈榖實也春求實一嵗再祀葢重榖也風俗通祀典既已立稷又有先農無為靈星復祀后稷也左中郎將賈逵說以為龍第三有天田星靈者神也故祀以報功又臘接也新故交接狎臘大祭以報功也玉燭寳典蜡者報百神文心雕龍天地定位祀徧羣神六宗既禋三望咸秩丼雨和風是生黍稷兆民所仰美報興焉劉宗元蜡說桞子為御史主祀事將蜡進有司以問蜡之說則曰合百神於南郊以為嵗報者陳氏禮書古者言社必及方則社為民祈方為民報祈在春報在秋又社所以祭五土之示稷所以祭五榖之神五榖之神而命之稷以其首種先成而長百榖故也稷非土無以生土非稷無以見生生之効故祭社必及稷以其同功均利而飬人故也祭法王社侯社無預農事故不置稷大社國社則農之祈報在焉故皆有稷潛確類書開元十一年親祠后土為蒼生祈榖自是神明昭佑累年豐登有祈必報禮之大者杜氏通典報田之祭其神曰先嗇即神農初為田事故以報之又蜡之義自伊耆氏之代而有其禮古之君子使之必報之是報田之祭也其神神農初為田事故以報也又周仲秋辰日祭靈星於國之東南王者所以復祭靈星者為人祈時以種五榖故别報其功文獻通攷蜡祭也所以報一嵗之成功求嗣嵗之福也又沙隨程氏曰八蜡之祭為民設教也厚矣古有始為稼穡以易佃漁俾吾卒嵗無饑不與禽獸爭一旦之命者繄先嗇是徳故祭先嗇焉曰司嗇者謂修明其政而潤色之者也曰農者謂傳是業以授之於我者也曰郵表綴者綴井田間道也郵表也者謂畫疆分理以是為凖者也昔之人為是而勞今我䝉之而逸蓋不得不報也曰猫虎者謂能除䑕豕之害吾稼者也曰坊者謂昔為隄防之人使吾禦水患者也曰水庸者謂昔為畎澮溝洫使吾為旱備者也曰昆蟲者先儒謂昆蟲害稼不當與祭乃易以百種是不然所謂昆蟲者非祭昆蟲也祭其除昆蟲而有功於我者也夫以表綴坊庸之賤𨽻猫虎昆蟲之細效吾不敢忘皆得以上配先嗇司嗇之享其民勸於功利推而廣之等而上之視君親如天地而不敢慢也文獻通攷註杵臼門外祈榖於天也又后稷始為農事故祭以求年豐事物紀原十月農功畢里社置酒食以報田神因相顧樂或謂坐禮始於周人之蜡云荆川稗編旱雩禁舉火故雩以祈雨用皂衣禜以祈晴用朱衣又歌雲漢於雩旱祈雨多在六月以林鐘商譜首章以林鐘羽譜後七章此詩誠古人雩祭所歌然今未必能信用唯以隂求隂則救旱請雨者所宜急曽氏農書記曰農事有祈焉有報焉所以治其事也天下通祀惟社與稷社祭土句龍配焉稷祭榖后稷配焉此二祀者實主農事載芟之詩春耤田而祈社稷也良耜之詩秋報社稷也此先王祈報之明典也匪直此也山川之神則水旱癘疫之不時於是乎禜之日月星辰之神則雪霜風雨之不時於是乎禜之與夫法施於民者以勞定國者能禦大菑者能捍大患者莫不秩祀先王載之典禮著之令式嵗時行之凡以為民祈報也周禮籥章凡國祈年於田祖則龡豳雅撃土鼓以樂田畯爾雅謂田畯乃先農也於先農有祈焉則神農后稷與世俗流傳所謂田父田母皆在所祈報可知矣大田之詩言去其螟螣及其蟊賊無害我田穉田祖有神秉畀炎火有渰淒淒興雨祁祁雨我公田遂及我私此祈之之辭也甫田之詩言以我齊明與我犧羊以社以方我田既臧農夫之慶此報之之辭也繼而琴瑟撃鼓以御田祖以祈丼雨以介我黍稷以榖我士女此又見因所報而寓所祈之義也若夫噫嘻之詩言春夏祈榖於上帝葢大雩帝之樂也豐年之詩言秋冬報者烝嘗之樂歌也然於上帝則有祈而無報於祖妣則有報而無祈豈闕文哉抑互言之耳此又祈報之大者也又育蠶者亦有祈禳報謝之禮皇后祭先蠶至庶人之婦亦皆有祭此后妃與庶人之祭雖貴賤之儀不同而祈報之心一也至於牛最農事之所資反闕祭禮蓋古者未有牛耕故祭有闕典至春秋之時始教牛耕後世田野開闢榖實滋盛皆出其力雖知有愛重之心而曾無愛重之實近年耕牛疫癘損傷甚多亦曷禳禱祓除祛禍祈福以報其功力豈為過㢤亦不忘乎榖之所自農之所本也東陽縣志夏至凡治田者不論多少必具酒肉祭土榖之神束草立標挿諸田間就而祭之為祭田婆蓋麥秋既祭稻禾方茂義兼祈報矣又六月六日農家於是日祀榖神謂之六六福蓋亦農人祈榖報賽之義月令廣義三月初三日祈農註南齊志祓祭也又三月三日清明之節將修事於水側禱祀以祈年豐又秋報社註月令無文意豐年然後報又十二月臘報神註漢舊儀臘者報諸鬼神古聖賢有功於民者也農政全書蜡祭與耤田相為終始當夫東作方興之始既舉耤田之禮以祀先農於春而以帥先農民以興其務本之心則夫百榖告成之後載舉大蜡之禮以報先嗇於冬而以勞來農民以報其勤動之苦是故舉先王莫大之禮是亦廣聖君莫大之恩也又大雩者祭於帝而祈雨也一說郊祀天祈農事雩祭山川而祈雨也又按禮志祈報周官太祝掌六祝之辭以事鬼神示祈福祥於是歴代皆有禬禜之事宋因之有祈有報祈用酒脯醢郊廟社稷或用少牢其報如常祀欽定授時通考卷四十六
