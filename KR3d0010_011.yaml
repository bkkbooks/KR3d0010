  - {type: page-break, offset: 0, content: '', id: KR3d0010_WYG_011-1a, image: WYG0732/WYG0732-0131c.png}
body:
  text: 土宜田制上詩小雅信彼南山維禹甸之箋禹治而丘甸之六十四井為甸甸方八里居一城之中城方十里出兵車一乘以為賦法正義曰禹甸之者決除其災使成平田定貢賦於天子是以治為義也我疆我理南東其畝大全長樂劉氏曰疆謂有夫有畛有塗有道有路以經界之也理謂有遂有溝有洫有澮有川以疏道之也又安成劉氏曰地之勢東南下水勢皆趨之故順其勢以縱為遂以横為溝而南其畝東其畝也詩大雅廼疆廼理廼宣廼畝注疆謂畫其大界理謂别其條理也宣布散而居也畝治其田疇也穀梁傳古者三百步為里名曰井田井田者九百畝公田居一私田稼不善則非吏公田稼不善則非民禮記王制制農田百畝注農夫皆受田於公疏王者制度授農以田是農夫授田於公也州二百一十國其餘以為附庸閒田天子之縣内凡九十三國其餘以禄士以為閒疏畿外州建二百一十國之外則閒田少畿内立九十三國之外閒田多者以畿外諸侯有大功德始有附庸故閒田少畿内每須朌賜故閒田多田里不粥注皆授於公民不得私也方一里者為田九百畝方十里者為方一里者百為田九萬畝方百里者為方十里者百為田九十億畝方千里者為方百里者百為田九萬億畝方百里者為田九十億畝山陵林麓川澤溝瀆城郭宫室塗巷三分去一其餘六十億畝諸侯之有功者取於閒田以禄之其有削地者歸之閒田周禮地官大司徒不易之地家百畮一易之地家二百畮再易之地家三百畮注不易之地嵗種之地美故家百畮一易之地休一嵗乃復種地薄故家二百畝再易之地休二嵗乃復種故家三百畝小司徒乃均土地以稽其人民而周知其數上地家七人中地家六人下地家五人注均平也周猶徧也一家男女七人以上則授之以上地所養者衆也男女五人以下則授之以下地所養者寡也又乃經土地而井牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都以任地事疏匠人營溝洫於田掌其經界故云乃經土地經謂為之里數在土地之中立其里數謂井方一里邑方二里之等是也而井牧其田野者井方一里兼言牧地是次田二牧當上地一井授民田之時上地不易家百畝中地一易家二百畝下地再易家三百畝通率三家受六夫之地一家受二夫與牧地同故云井牧其田野也刪翼丘氏曰野外之田不無美惡肥磽之差豈必盡如指掌之平棊盤之畫哉唯有井有牧比析而行乃是活法易氏曰井則上地中地下地之殊牧則不易一易再易之辨王氏曰此法與遂人百夫洫千夫澮萬夫川相表裏又載師以宅田士田賈田任近郊之地以官田牛田賞田牧田任逺郊之地以公邑之田任甸地以家邑之田任稍地以小都之田任縣地以大都之田任畺地注鄭司農云民宅曰宅宅田者以備益多也士田者士大夫之子得而耕之田也賈田者吏為縣官賣財與之田官田者公家之所耕田牛田者以養公家之牛賞田者賞賜之田牧田者牧六畜之田司馬法曰王國百里為郊二百里為州三百里為野四百里為縣五百里為都杜子春云五十里為近郊百里為逺郊鄭𤣥謂宅田致仕者所受田也士讀為仕仕者亦受田所謂圭田也賈田在市賈人其家所受之田也官田庶人在官者其家所受田也牛田牧田畜牧者之家所受田也公邑謂六遂餘地天子使大夫治之自此以外皆然二百里三百里其上大夫如州長四百里五百里其下大夫如縣正是以或謂二百里為州四百里為縣云家邑大夫之采地小都卿之采地大都公之采地畺五百里王幾界也然圖書篇載師掌任地之法有宅田士田賈田有官田牛田賞田牧田有公邑之田有小都大都之田且國有四民農之受田無疑矣惟工商之受田初無明文而二鄭之釋周禮則有異議司農謂士田士大夫之子得而耕之田也賈田吏為縣官賣材者與之田也後鄭則引漢食貨志之言謂農民户一人已受田其家衆男為餘夫亦以口受田如比士工商家受田五口乃當農夫一人據後鄭之意則直謂賈田為賈之家所受田也予以為不然夫四民不相業亦不相雜處其來乆矣四民自農之外惟士為然盖使之耕且養也果如後鄭之言以賈為商賈之賈則工商一也何載師獨載賈田而不言工田乎夫先王之所重者農民也所輕者末作也不耕者出屋粟宅不毛者出里布莫非使農之為優而商賈不足事也今使為工者得以械器易粟而復受田則誰不為工乎使為商者日中而市交易而退而復受田則誰不為商乎然則載師無商田工田之明文而後鄭必為之説予以為不知先王重本抑末之意又遂人辨野之土上地中地下地以頒田里上地夫一㕓田百畮菜五十畮餘夫亦如之中地夫一㕓田百畮萊百畮餘夫亦如之下地夫一㕓田百畮萊二百畮餘夫亦如之注萊謂休不耕者六遂之民奇受一㕓雖上地猶有萊皆所以饒逺也通考馬端臨曰按周家授田之制如大司徒遂人之説則是田肥者少授之田瘠者多授之如小司徒之説則口衆者授之肥田口少者授之瘠田如王制孟子之説則一夫定以百畝為率而良農食多惰農食少三者不同又凡治野夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路以達於畿注十夫二鄰之田百夫一酇之田千夫二鄙之田萬夫四縣之田遂溝洫澮皆所以通水於川也遂廣深各二尺溝倍之洫倍溝溝廣二㝷深二仞徑畛涂道路皆所以通車徒於國都也徑容牛馬畛容大車涂容乘車一軌道容二軌路容三軌都之野涂與環涂同可也萬夫者方三十三里少半里九而方一同以南畝圖之則遂從溝横洫從澮横九澮而川周其外焉去山陵林麓川澤溝瀆城郭宫室涂巷三分之制其餘如此以至於畿則中雖有都鄙遂人盡主其地集説葉氏曰司徒言井邑遂人言溝洫非鄉遂異制也井邑定田畝多寡以出稅故以四井四邑言溝洫定水道大小以興利故以十夫百夫言孟子夏后氏五十而貢殷人七十而助周人百畝而徹注陳祥道曰夏商周之授田其畝數不同禹貢九州之地或言土或言作或言乂盖禹平水土之後有土見而未作有作焉而未乂是時人工未足以盡地力故家五十畝而已沿歴商周則田浸闢而法備矣故商七十而助周百畝而徹詩曰信彼南山維禹甸之畇畇原隰曽孫田之我疆我理南東其畝則法略於夏備於周可知矣卿以下必有圭田圭田五十畝餘夫二十五畝注古者卿以下至於士皆受圭田五十畝所以供祭祀也圭潔也井田之民養公田者受百畝圭田半之故五十畝餘夫者一家一人受田其餘老少尚有餘力者受二十五畝半於圭田也方里而井井九百畝其中為公田八家皆私百畝同養公田注方里者九百畝之地也八家各私得百畝公田八十畝其餘二十畝以為廬井園圃家二畝半也爾雅釋地田一嵗曰菑二嵗曰新田三嵗曰畬注今江東呼初耕地反草為菑詩曰于彼新田易曰不菑畬疏菑災也畬和柔之意也孫炎云菑始災殺其草本也新田新成柔田也畬和也田舒緩也公羊傳注聖人制井田之法而口分之一夫一婦受田百畝以養父母妻子五口為一家公田十畝即所謂什一而稅也廬舍二畝半凡為田一頃十二畝半八家而九頃共為一井故曰井田井田之義一曰無泄地氣二曰無費一家三曰同風俗四曰合巧拙五曰通財貨司空謹别田之髙下善惡分為三品上田一嵗一墾中田二嵗一墾下田三嵗一墾故三年一換主選其耆老有髙德者名曰父老其有辨護伉健者為里正皆受倍田司馬法六尺為步步百為畝畮百為夫夫三為屋屋三為井井十為成成十為通通十為終終十為同通典文王在岐用平土之法以為治人之道地著為本故建司馬法民受田上田夫百畝中田夫二百畝下田夫三百畝三嵗更耕之自爰其處農民戸已受田其家衆男為餘夫亦以口受田士工商家受田五口乃當農夫一人山林藪澤原陵淳鹵各以肥磽多少為差民年二十受田六十歸田管子周岐山至於崢丘之西塞丘者山邑之田也周壽陵而東至少沙者中田也商子地方百里者山陵處什一藪澤處什一谿谷流水處什一都邑谿道處什一惡田處什一良田處十四吕氏春秋上農后稷曰上田棄畝下田棄甽是以六尺之耜所以成畝也其塼八寸所以成甽也汜勝之書湯有旱災伊尹作為區田教民糞種區田非必須良田也諸山陵近邑髙危傾阪及丘城上皆可為區田區田不耕旁地庶盡地力凡區種不先治地便荒地為之以畝為率令一畝之地長十八丈廣四丈八尺當横分十八丈作十五町町間分為十四道以通人行道廣一尺五寸町皆廣一尺五寸長四丈八尺尺直横鑿町作溝溝一尺深一尺積穰於溝間相去亦一尺嘗悉以一尺地積穰不相受今𢎞作二尺地以積穰上農夫區方深各六寸間相去九寸一畝三千七百區一日作千區區種粟二十粒畝用種二升秋收區别三升粟畝收百斛中男夫區方九寸深六寸相去二尺一畝千二十七區用種一升收粟五十一石一日作三百區下農夫區方九寸深六寸相去二尺一畝五百六十七區用種六升收二十八石一日作二百區漢書食貨志武帝末年以趙過為搜粟都尉過為代田一畮三甽嵗代處故曰代田古法也后稷始甽田以二耜為耦廣尺深尺曰甽長終畮一畮三甽一夫三百甽而播耕於三甽中率十二夫為田一井一屋故畮五頃用耦犂二牛三人一嵗之收常過縵田畮一斛以上善者倍之過使教田太常三輔率多人者田日三十畮少者十三畮以故田多墾闢過試以離宫卒田其宫壖地課得穀皆多其旁田畮一斛以上令命家田三輔公田又教邊郡及居延城是後邊城河東𢎞農三輔太常民皆便代田用力少而得穀多晉書食貨志武帝平呉之後有司奏詔書王公以國為家京城當使有芻􅢠之田今可限之近郊田大國十五頃次國十頃小國七頃男子一人占田七十畝女子三十畝其外丁男課田五十畝丁女二十畝次丁男半之女則不課魏書食貨志太和九年詔均給天下民田諸男夫十五以上受露田四十畝婦人二十畝奴婢依良丁牛一頭受田三十畝限四牛所受之田率倍之三易之田再倍之以供耕作及還受之盈縮諸民年及課則受田老免及身没則還田奴婢牛隨有無以還受諸桑田不在還受之限但通入倍田分於分雖盈没則還田不得以充露田之數不足者以露田充倍諸初受田者男夫一人給田二十畝課蒔餘種桑五十樹棗五株榆三根非桑之土夫給一畝依法課蒔榆棗奴各依良限三年種畢不畢奪其不畢之地于桑榆地分雜蒔餘果及多種桑榆者不禁諸應還之田不得種桑榆棗果種者以違令論地入還分諸桑田皆為世業身終不還恒從見口有盈者無受無還不足者受種如法盈者得賣其盈不足者得買所不足不得賣其分亦不得買過所足諸麻布之土男夫及課别給麻田十畝婦人五畝奴婢依良皆從還受之法諸有舉戸老小癃殘無受田者年十一以上及癃者各授以半夫田年逾七十者不還所受寡婦守志者雖免課亦授婦田諸還受民田恒以正月若始受田而身亡及賣買奴婢牛者皆至明年正月乃得還受諸土廣民稀之處隨力所及官借民種蒔役有土居者依法封授諸地狹之處有進丁受田而不樂遷者則以其家桑田為正田分又不足不給倍田又不足家内人别减分無桑之鄉凖此為法樂遷者聽逐空荒不限異州他郡惟不聽避勞就逸其地足之處不得無故而移諸民有新居者三口給地一畝以為居室奴婢五口給一畝男女十五以上因其地分口課種菜五分畝之一諸一人之分正從正倍從倍不得隔越他畔進丁受田者恒從所近若同時俱受先貧後富再倍之田放此為法諸逺流配讁無子孫及户絶者墟宅桑榆盡為公田以供授受授受之次給其所親未給之間亦借其所親諸宰民之官各隨地給公田刺史十五頃太守十頃治中别駕各八頃縣令郡丞六頃更代相付賣者坐如律隋書食貨志北齊武成帝河清三年定令男率以十八受田輸租調二十充兵六十免力役六十六退田免租調京城四面諸坊之外三十里内為公田受公田者三縣代遷戸内執事官一品以下逮於羽林虎賁各有差其外畿郡華人官第一品以下羽林虎賁已上各有差職事及百姓請墾田者名為永業田奴婢受田者親王止三百人嗣王止二百人第二品嗣王以下及庶姓王止一百十人正三品以上及皇宗止一百人七品以上限止八十人八品以下至庶人限止六十人奴婢限外不給田者皆不輸其方百里外及州人一夫受露田八十畝婦四十畝奴婢依良人限數與者在京百官同丁牛一頭受田六十畝限止四年又每丁給永業二十畝為桑田其中種桑五十根榆三根棗五十根不在還受之限非此田者悉入還受之分土不宜桑者給麻田如桑田法又開皇十二年發使四出均天下之田狹鄉每丁纔至二十畝老少又少焉唐書食貨志度田以步其濶一步其長二百四十步為畝百畝為頃授田之制丁及男年十八以上者人一頃其八十畝為口分二十畝為永業老及篤疾廢疾者人四十畝寡妻妾三十畝當户者増二十畝皆以二十畝為永業其餘為口分田多可以足其人者為寛鄉少者為狹鄉狹鄉授田减寛鄉之半其地有薄厚嵗一易者倍授之寛鄉三易者不倍授工商者寛鄉减半狹鄉不給凡庶人徙鄉及貧無葬者得賣世業田自狹鄉而徙寛鄉者得并賣口分田已賣者不復授死者收之以授無田者凡收授皆以嵗十月授田先貧及有課役者凡田鄉有餘以給比鄉縣有餘以給比縣州有餘以給近州又永徽中禁買賣口分世業田買者還地而罰之宋史食貨志農田之制五代條章多闕周世宗始遣使均括諸州民田太祖即位循用其法命官分詣諸道均田課民種樹定民籍為五等第一等種雜樹百每等减二十為差梨棗半之男女十嵗以上種韭一畦闊一步長十步乏井者鄰互為鑿之又神宗患田賦不均熈寧五年重修定方田法詔司農以均稅條約并式頒之天下以東西南北各千步當四十一頃六十六畝一百六十步為一方嵗以九月縣委令佐分地計量隨陂原平澤而定其地因赤淤黒壚而辨其色方量畢以地及色參定肥瘠而分五等以定税則至明年三月畢掲以示民一季無訟即書户帖連莊帳付之以為地符凡田方之角立土為峰植其地之所宜木以封表之有方帳有莊帳有甲帖有户帖其分烟析産典賣割移官給契縣置簿皆以今所方之田為正先自京東路行之諸路倣焉每方差大甲頭二人小甲頭三人同集方户令各認步畝方田官騐地色更勒甲頭方户同定元豊八年帝知官吏擾民詔罷之天下之田已方而見於籍者至是二百四十八萬四千三百四十有九頃文獻通考元豐間天下墾田之數四百六十一萬六千餘頃比治平時増二十餘萬頃然前代混一之時漢元始時定墾田八百二十七萬五千餘頃隋開皇時墾田一千九百四十萬餘頃唐天寳時應受田一千四百三十萬餘頃其數比之宋朝或一倍或三倍四倍有餘雖曰宋之土宇北不得幽薊西不得靈夏南不得交阯然三方之在版圖亦半為邊障屯戍之地墾田未必多也按治平㑹計録謂田數特計其賦租以知其頃畝而賦租所不加者十居其七祖宗重擾民未嘗窮按故莫得其實至治平熈寧間相繼開墾然凡百畝之内起税止四畝欲増至二十畝則言者以為民間苦賦重再至轉徙遂不増以是觀之則田之無賦税者又不止於十之七而已蓋田數之在官者雖劣於前代而遺利之在民者多矣金史食貨志量田以營造尺五尺為步濶一步長二百四十步為畝百畝為頃民田業各從其便賣質與人無禁但令隨地輸租而已凡桑棗民户以多植為勤少者必植其地十之三猛安謀克户少者必課其地十之一除枯補新使之不闕凡官地猛安謀克及貧民請射者寛鄉一丁百畝狹鄉十畝中男半之請射荒地者以最下第五等減半定租八年始徵之作已業者以第七等減半為稅七年始徵之自首冐比鄰地者輔官租三分之二佃黄河退灘者次年納租又承安元年四月初行區種法男年十五以上六十以下有土田者丁種一畝丁多者五畝止二年二月九路提刑馬百禄奏聖訓農民有地一頃者區種一畝五畝即止臣以為地肥瘠不同乞不限畝數制可元史食貨志田無水者鑿井井深不能得水者聽種區田仍以區田之法散諸農民明史食貨志洪武二十年命國子生武淳等分行州縣量度田畝方圓次以字號悉書主名及田之丈尺編類為冊狀如魚鱗號曰魚鱗圖冊以土田為主諸原坂墳衍下濕沃瘠沙鹵之别畢具凡質賣田土則官為籍記之毋令産去税存以為民害又凡田以近郭為上地迤逺為中地下地五尺為步步二百四十為畝畝百為頃又神宗初用大學士張居正議天下田畝通行丈量用開方法以徑圍乘除畸零截補國朝大清㑹典本朝幅員廣逺地利日興順治十八年總計田土合五百四十九萬三千五百七十六頃有奇康熈二十四年總計田土六百七萬八千四百三十頃有奇雍正二年總計田土六百八十三萬七千九百一十四頃有奇國初定低地種稻高粱稗子􅐨麻高阜種粟穀國家任土作貢以地畝之坍漲定賦額之増減或差員清理或飭州縣官隨時丈量查報瀕江近海之區定例十年一丈凡民地勘丈槩以二百四十步為一畝國朝墾荒助以牛種寛其徵輸或懸爵賞以勵招徠或給投誠以資贍養或遣部員以課耕穫區畫周詳務使野無曠土順治元年題准圏撥地畝按州縣大小定圏地多寡滿洲自聚一處阡陌室廬耕作牧放互相友助令旗民各安疆理查出無主地與有主者對換以期均便順治元年議准州縣衛所荒地無主者分給流民及官兵屯種有主者官給牛種三年起科順治四年又定嗣後民間田屋永停圏撥順治六年定地方官廣加招徠各處逃民不論原籍别籍編入保甲開墾無主荒田給以印信執照永准為業順治十年覆准直省州縣魚鱗老冊載有地畝坵段坐落田形四至其間有不清者印官親自丈量順治十一年覆准凡丈量州縣地用步弓各旗庄屯地用繩順治十二年定部鑄步尺分頒直省使丈量時悉依新制康熈四十三年天津附近荒棄地畝開墾一萬畝以為水田行令各省廵撫將閩粤江南等處水耕之人出示招徠計口授田給與牛種雍正元年議准瀕江近海之區定例十年清丈一次恐未至十年有坍漲者令該管官不時清查坍者即行豁免漲者即行陞科雍正二年議准將内務府交出餘地及户部所收官地制為井田挑選一百户前往耕種自十六嵗以上六十嵗以下各授田百畝雍正三年於灤薊天津文霸任北新雄等處各設營田專官管領有力之家率先遵奉者以圩田多寡分别奬賞其官田數萬頃分地遣官㑹同地方官首先舉行為民倡率其濬疏圩岸以及瀦水節水引水戽水之法悉照成規各因地畝形勢次第興修或有民間廬舍有碍水道者計畝均攤通融撥抵視本田畝數加十之二三其河淀淤地已經成熟陞科必須開挖者將附近官田照數撥補欽定授時通考卷十一
