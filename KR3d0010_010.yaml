body:
  text: 土宜物土尚書禹貢庶土交正傳衆土俱得其正謂墳壤壚葉氏夢得曰謂以九土相參而辨其等也集傳土者財之自生謂之庶土則非特榖土也庶土有等當以髙下名物交相正焉以任土事如周大司徒以土宜之法辨十有二土之名物以任土事之類又咸則三壤集傳則品節之也九州榖土又皆品節之以上中下三等如周大司徒辨十有二壤之名物以致稼穡之類陳氏祥道曰冀州白而壤雍州黃而壤豫州厥土惟壤則壤色非一而已壤與墳埴塗泥雖殊而墳埴塗泥亦壤中之小别耳此禹貢總言三壤而周官總言十二壤也夏氏允彜曰三壤之中又各有三品復有上下錯而總之為三壤禹之法亦密矣左傳書土田注書土地之所宜辨京陵注辨别也絶髙曰京大阜曰陵表淳鹵注淳鹵埆薄之地表之輕其賦稅疏賈逵云淳鹹也説文云鹵西方鹹地也東方謂之斥西方謂之鹵呂氏春秋稱魏文侯時吳起為鄴令引漳水以灌田民歌之曰決漳水兮灌鄴旁終古斥鹵生稻粱是鹹薄之地名為斥鹵禹貢之海濵廣斥是也數疆潦疏賈逵以疆為疆㯺墝埆之地鄭衆以為疆界內有水潦者鄭玄云疆㯺經堅者則疆地猶堪種植非水潦之類故從鄭衆之説數其疆界有水潦者計數減其租入也規偃豬注偃豬下濕之地規度其受水多少疏豬者停水之名偃豬謂偃水為豬故為下濕之地規度其地受水多少得使田中之水注之町原防注廣平曰原防隄也隄防間地不得方正如井田别為小町畦也疏史遊急就篇云頃町界畝是町亦頃類故連言之謂廣平為原者因爾雅之文其實此原謂隄防之間也釋地於陸陵阿之下云可食者曰原孫炎曰可食謂有井田也陸阿山田可種榖者亦曰原也謂彼陵阿之間可食之地非廣平也井衍沃注衍沃平美之地則如周禮制以為井田六尺為步步百為畝畝百為夫九夫為井疏衍是髙平而美者沃是底平而美者皆是良田故如周禮之法制之以為井田賈逵云下平曰衍有溉曰沃所指雖異而俱為良美之田也公羊傳原者何上平曰原下平曰隰注分别之者地勢各有所生原宜粟隰宜麥當教民所宜禮記王制凡居民材必因天地寒暖燥濕注使其材藝堪地氣也疏言五方之人其能各殊各須順其性氣材藝使堪其地氣也周禮天官大宰以九職任萬民一曰三農生九榖注三農原隰平地疏鄭司農以三農為平地山澤積石曰山水鍾曰澤不生九榖故後鄭不從之也爾雅髙平曰原下濕曰隰原及平地可種黍稷之等隰中可種稻及梁苽也又地官大司徒以土會之法辨五地之物生一曰山林其植物宜皂物二曰川澤其植物宜膏物三曰丘陵其植物宜核音核物四曰墳衍其植物宜莢物五曰原濕其植物宜叢物注會計也以土計貢稅之法因别此五者也積石曰山竹木曰林注瀆曰川水鍾曰澤土髙曰丘大阜曰陵水涯曰墳下平曰衍髙平曰原下濕曰隰植物凡根生者皆是也皂物柞栗之屬今謂柞實為皂斗膏當為櫜字之誤蓮芡之實有櫜韜核物李梅之屬莢物薺莢王棘之屬叢物萑葦之屬疏以土地計會所出貢稅之法貢稅出於五地五地所生不同故以土會之法辨之也五地以髙下言山林髙之極川澤下之極故以為對也五地之物皆方以類聚物以羣分因地氣所感不同故有異也刪翼魏氏校曰五地隨氣異形氣行地中人物之生復隨形異稟蓋天氣以為父地質以為母子肖母形聖人仰稽天運俯察地理以土會之法通計所生物何者為多因而知其土之所宜所以通知地利而盡人物之性也又以土均之法辨五物九等制天下之地征以作民職以令地貢以斂財賦以均齊天下之政注均平也五物五地之物也九等騂剛赤緹之屬征稅也民職民九職也地貢貢地所生謂九榖也財謂泉榖賦謂九賦及軍賦又乃分地職奠音定地守制地貢而頒職事焉以為地法而待政令注分地職分其九職所宜也定地守謂衡麓虞侯之屬制地貢謂九職所稅也頒職事者分命使各為其所職之事疏既授民以上中下地矣此分地職是分九職所宜也九職則大宰云三農生九榖是也所宜謂若孝經注髙田宜黍稷下田宜稻麥之類是也人遂人掌邦之野凡治野以土宜教氓稼穡疏以土宜教氓稼穡者髙田種黍稷下田種稻麥是教之稼穡也又草人掌土化之法以物地相其宜而為之種注土化之法化之使美若汜勝之術也以物地占其形色為之種黃白宜以種禾之屬疏化之使美者謂若騂剛用牛糞種化騂剛之地使美如下文所云也漢時農書數家汜勝為上故云汜勝之術也黃白宜以種禾之屬者鄭依孝經緯援神契而言也又夏官土方氏辨土宜土化之法而授任地者注土宜謂九榖植稚所宜也土化地之輕重糞種所宜用如地官草人所掌之法也任地者載師之屬疏授謂以書作法授之爾雅釋地下濕曰隰大野曰平廣平曰原髙平曰陸大陸曰阜大阜曰陵大陵曰阿可食者曰原陂者曰阪下者曰隰疏此釋地髙下不同之名也下濕謂地形卑下而水濕者李巡曰土地窊下常沮洳名為隰也大野曰平者大野之澤一名平魯有大野是也髙平曰陸大陸曰阜大阜曰陵大陵曰阿者李巡曰髙平謂土地豐正名為陸土地髙大名為阜最大名為陵陵之大者名阿詩大雅皇矣云無矢我陵我陵我阿是也原阪隰三者地形雖有髙下不同皆可種榖給食髙而可食者名原詩大雅篤公劉于胥斯原是也陂陀不平而可食者名阪詩小雅正月篇瞻彼阪田有菀其特是也下平而可食者名隰公羊傳下平曰隰是也大戴禮子曰平原大藪瞻其草之髙豐茂者草可財也如艾而夷之其地必宜五榖孝經援神契黃白土宜禾黑墳宜黍麥赤土宜菽汚泉宜稻古三墳山地險徑川地廣平雲地髙林氣地下濕管子桑麻不植於野五榖不宜其地國之貧也桑麻植於野五榖宜其地國之富也相髙下視肥墝觀地宜明詔期前後農夫以時均修焉使五榖桑麻皆安其處由田之事也朱長春曰田田畯之類又凡地十仞見水者不大潦五尺見水者不大旱又地道不宜則有飢饉又髙下肥磽物有所宜故曰地不一利又管仲之匡天下也其施七尺注施者大尺之名其長七尺又瀆田悉徙五種無不宜其木宜蚖菕音元論與杜松其草宜楚棘見是土也命之曰五施五七三十五尺而至於泉其水倉其民疆注瀆田謂穿溝瀆而溉田悉徙謂其地每年皆須更易也五施謂其地深五施每施七尺故五七三十五尺而至於泉也朱長春曰瀆田五施赤壚四施黃唐三施斥埴再施黑埴一施五土惟五施者最為土厚水深也集韻菕露香草又赤壚歷疆肥五種無不宜其麻白其布黃其草宜白茅與雚其木宜赤棠見是土也命之曰四施四七二十八尺而至於泉其水白而甘其民壽注歷疏也強堅也爾雅雚芄蘭又黃唐無宜也唯宜黍秫宜縣澤其草宜黍秫與茅其木宜櫄椿同擾桑見是土也命之曰三施三七二十一尺而至於泉其泉黃而糗流徙注唐虛脆也縣澤常宜縣注而澤擾桑柔桑也糗謂其水糗糒之氣泉居地中而流故曰流徙又斥植宜大菽與麥其草宜萯音婦雚其木宜把見是土也命之曰再施二七十四尺而至於泉其泉鹹水流徙又黑埴宜稻麥其草宜萍蓚其木宜白棠見是土也命之曰一施七尺而至於泉其水黑而苦又墳延者六施六七四十二尺而至于泉陜之芳七施七七四十九尺而至於泉祀陜八施七八五十六尺而至於泉杜陵九施七九六十三尺而至於泉延陵十施七十尺而至於泉環陵十一施七十七尺而至於泉蔓山十二施八十四尺而至於泉付山十三施九十一尺而至於泉付山白徒十四施九十八尺而至於泉中陵十五施百五尺而至於泉又青山十六施百一十二尺而至於泉青龍之所居庚泥不可得泉注庚續也其處既有青龍居又沙泥相續故不可得泉也朱長春曰庚金剛庚泥泥剛也又赤壤􅭍音敖山十七施百一十九尺而至於泉其下清商不可得泉注清商神怪之名又􅴵山白壤十八施百二十六尺而至於泉其下駢石不可得泉注言有石駢密故不可得泉又陵山十九施百三十三尺而至於泉其下有灰壤不可得泉又髙陵土山二十施百四十尺而至於泉又山之上命之曰縣泉其地不乾其草如茅與走其木乃樠鑿之二尺乃至於泉注茅走皆草名朱長春曰上文自墳延而至陡山十四加不得泉已四矣又一加至十四丈而髙陵土山反不言無泉何也地經曰山之吉者地泉鍾於下靈光發於頂故髙山之首多生雲煙降雨澤山上出泉謂之天池今名山至髙多有之其旁其側則其脈氣所落而結也故為天眼石井珠簾瀑布玉乳玉潭龍湫虎跑蛟飛杖錫或天生或人力或神通其泉多有名飲之益人冬夏常注大旱不竭上頂氣仰而升故得泉淺傍氣在中側氣在下則泉漸深矣又山之上命之曰復呂其草魚腸與蕕其木乃栁鑿之三尺而至於泉山之上命之曰泉英其草蘄白昌其木乃楊鑿之五尺而至於泉又山之材其草兢與䉢其木乃格鑿之二七十四尺而至於泉山之側其草葍與蔞其木乃品榆鑿之三七二十一尺而至於泉注材猶旁也爾雅䉢虞蓼注蓼之生澤者又凡草土之道各有榖造或髙或下各有草土葉下於􅡿􅡿下於莧莧下於蒲蒲下於葦葦下於雚雚下於蔞蔞下於荓荓下於蕭蕭下於薜薜下於萑萑下於茅凡彼草物十有二衰各有所歸注榖造謂此地生某草宜某榖造成也葉草名唯生葉無莖在􅡿之下􅡿即鬱也莊周所謂鬱西也􅍉一作蓷茺蔚草也衰謂草上下相重次也又九州之土為九十物每州有常而物有次羣土之長是唯五粟五粟之物或赤或青或白或黑或黃五粟五章五粟之狀淖而不韌剛而不觳不濘車輪不汚手足其種大重細重白莖白秀無不宜也五粟之土若在陵在山在墳在衍其隂其陽盡宜桐柞莫不秀長其榆其栁其檿其桑其柘其櫟其槐其陽羣木蕃滋數大條直以長其地其樊俱宜竹箭藻龜楢檀五臭生之薜荔白芷蘪蕪椒連其泉黃白其人夷姤五粟之土乾而不格湛而不澤無髙下葆澤以處是謂粟土注韌堅也觳薄也濘泥也校謂馨烈之氣夷平也姤好也言均善也格謂堅禦也葆澤以處言常潤也又粟土之次曰五沃五沃之物或赤或青或白或黃或黑五沃五物各有異則五沃之狀剽悉橐土蟲易全處悉剽不白下乃以澤其種大苗細苗赨莖黑秀箭長五沃之土若在丘在山在陵在岡若在陬陵之陽其左其右宜彼羣木桐柞枎櫄及彼白梓其梅其杏其桃其李其秀生莖起其棘其棠其槐其楊其榆其桑其把其枋羣木數大條直以長其隂則生之楂䔧其陽則安樹之五麻若髙若下不擇疇所其麻大者如箭如葦大長以美其細者如雚如蒸五臭疇生蓮與蘪蕪藁本白芷其泉白清其人堅徑寡有疥騷終無痟酲五沃之土乾而不斥湛而不澤無髙下葆澤以處是謂沃土注剽堅也悉密也橐土謂其土多竅穴若橐之多竅故蟲處之易全也悉剽不白下乃以澤者土既堅密故常潤濕而不乾白此乃葆澤之地也赨即赤也箭長謂若竹箭之長也疇隴也痟首疾也酲酒病也斥潟鹵也又沃土之次曰五位五位之物五色雜英多有異章五位之狀不塥不灰青悉以菭與苔通又音墀及其種大葦無細葦無赨莖白秀五位之土若在岡在陵在墳在衍在丘在山皆宜竹箭求黽楢檀其山之淺有蘢與斥羣木安逐條長數丈其桑其松其把其茸種木胥容榆桃栁棟羣藥安生薑與桔梗小辛大蒙其山之梟多桔符榆其山之末有箭與苑其山之旁有彼黃虻及彼白昌山䔧葦芒羣藥安聚以圍民殃其林其漉其槐其棟其柞其榖羣木安逐其泉青黑其人輕直省事少食無髙下葆澤以處是謂位土注塥謂堅不相著也菭地衣也青悉以菭及謂色青而細密和菭以相及也求龜竹類蘢斥並草名安和易逐競長數謂速長也大蒙藥名梟猶巔也少食言其性廉也又位土之次曰五蘟音隱五蘟之狀黑土黑菭青怵以肥芬然若灰其種櫑葛赨莖黃秀恚目其葉若苑以蓄植果木不若三土以十分之二是謂蘟土注芬然墳起貌恚目謂殼實怒開也苑蘊結也三土謂五粟五沃五位言於三土十分已不如其二分餘倣此又蘟土之次曰五壤五壤之狀芬然若澤若屯土其種大水腸細水腸赨莖黃秀以慈忍水旱無不宜也蓄植果水不若三土以十分之二是謂壤土注屯土言其土得澤則墳起為堆故曰屯土也忍耐也又壤土之次曰五浮五浮之狀捍然如米以葆澤不離不坼其種忍蘟忍葉如雚葉以長狐茸黃莖黑秀其粟大無不宜也蓄殖果木不如三土以十分之二凡上土三十物種十二物注捍堅貌言其土屑細如米也忍蘟草名狐茸言草之狀若狐也類篇蘟荵菜名似蕨又中土曰五悉五悉之狀廩焉如壏咸上聲周禮通作㯺潤濕以處其種大稷細稷赨莖黃秀慈忍水旱細粟如麻蓄殖果木不若三土以十分之三注壏猶強也朱長春云下有粳以肥此壏與濫同如麻言其繁美如麻也又悉土之次曰五纑音盧五纑之狀強力剛堅其種大邯鄲細邯鄲莖葉如枎音符櫄其粟大蓄殖果木不若三土以十分之三注邯鄲草名粟大言其粒大也又纑土之次曰五壏五壏之狀芬焉若粳以肥其種大荔小荔青莖黃秀蓄殖果木不若三土以十分之三注若粳以肥謂其地色黃而虛又壏土之次曰五剽五剽之狀華然如芬以脤其種大秬細秬黑莖青秀蓄殖果木不若三土以十分之四注脤謂其地色青紫若脤然秬黑黍也又剽土之次曰五沙五沙之狀粟焉如屑塵厲其種大萯細萯白莖青秀以蔓蓄殖果木不如三土以十分之四注粟焉如屑塵厲言其地粟碎若屑塵之厲厲踊起也又沙土之次曰五塥五塥之狀果然如僕纍不忍水旱其種大樛把細樛把黑莖黑秀蓄植果木不如三土以十分之四凡中土三十物種十二物注僕附也僕纍言其地附著而重纍也樛把木名又下土曰五猶五猶之狀如糞其種大華細華白莖黑秀蓄殖果木不如三土以十分之五注大華細華草名又猶土之次曰五􅧀五􅧀之狀如鼠肝其種青梁黑莖黑秀蓄殖果木不如三土以十分之五又􅧀土之次曰五殖五殖之狀甚澤以疏離坼以矅塉音寂木借瘠其種雁膳黑實朱跗黃實蓄殖果木不如三土以十分之六注雁膳草名跗花足也又五殖之次曰五觳五觳之狀婁婁然不忍水旱其種大菽細菽多白實蓄殖果木不如三土以十分之六注婁婁然疏也又觳土之次曰五鳬五鳬之狀堅而不骼其種陵稻黑鵝馬夫蓄殖果木不如三土以十分之七注堅而不骼言雖堅不同骨之骼也陵稻陸生稻也黑鵝馬夫皆草名又鳬土之次曰五桀五桀之狀甚鹹以苦其物為下其種白稻長狹蓄殖果木不如三土以十分之七凡下土三十物其種十二物凡土物九十其種三十六注長狹謂稻之形長而狹也荀子相髙下視肥磽序五種君子不如農人吕氏春秋厚土則􅀢不通薄土則蕃轓而不發壚埴冥色剛土柔種免耕殺草使農事得淮南子欲知地道物其樹注五土之宜各有所宜種説苑山川汚澤陵陸丘阜五土之宜聖王就其勢因其便不失其性髙者黍中者稷下者粳蒲葦菅蒯之用不乏麻麥黍粱亦不盡又農人擇田而田田者擇種而種之豐年必得粟風俗通阜者茂也言平地隆踊不屬於山陵也部者阜之類也齊魯之間田中少髙卬名之為部藪之言厚也草木魚鱉所以厚養人民與百姓也澤者言其潤澤萬物以阜民用也陂者繁也言因下鍾水以繁利萬物也釋名地者底也其體底下載萬物也易謂之坤坤順也上順乾也土吐也吐生萬物也已耕者曰田田填也五稼填滿其中也壤瀼也肥濡意也土青曰黎似藜草色也土黃而細密曰埴埴膩如脂也土赤曰鼠肝似鼠肝色也土白曰漂漂輕飛散也土黑曰壚壚然解散也博物志地以名山為輔佐石為之骨川為之脈草木為之毛土為之肉三尺以上為糞三尺以下為地又五土所宜黃白宜種禾黑墳宜麥黍蒼赤宜菽芋下泉宜種稻得其宜則利百倍齊民要術地勢有良薄山澤有異宜注山田種強苖以避風霜澤田種弱苖以求華實又土壤氣脈其類不一肥沃磽確美惡不同黑壤之地信美矣故肥沃之過不有生土以解之則苗茂而實不堅磽確之土信惡矣然糞壤滋培則苗蕃秀而實堅栗後山談叢田理有橫有立橫土立土不可稻為其不停水也袁黃寶坻勸農書禹别九州之土色辨為九等蓋風行地上各有方位土性所宜因隨氣化所以九州之土各有别也然禹亦辨其大槩耳一州之中土脈各異豈惟一州即一縣之土亦有不齊寶坻縣西北之地白而壤東南之地黑而塗泥就西北之中髙者白壤而或兼赤下者青壚就東南之中髙者埴壚下者純塗泥而近海者則鹹潟而斥鹵此皆地氣之不齊也周禮司稼掌巡邦野之稼而辨種稑之種周知其名與其所宜地以為法而教於邑閭故耕稼得宜而閭閻充實後世此官不設此政不修而農民狃於故見不察土脈茫昧而種北方尤甚今吾寶邑髙鄉宜麥宜麻宜黍宜榖宜棉花者悉仍其舊低鄉宜薥宜粳宜稗者亦且隨意植之但稗之入最薄惟初開荒地宜種之鹵氣既盡即當種榖矣種薥亦不若種粳但開井於隴首旱則每月澆三四次無不成熟者海濱一帶皆為鹹鹵之地棄而不耕荒蕪彌目此與􅀈黃金於路旁而自傷窮窘者何異哉又地利不同有強土有弱土有輕土有重土有緊土有緩土有肥土有瘠土有燥土有濕土有生土有熟土有寒土有暖土皆須相其宜而耕治布種之茍失其宜則徒勞氣力反失其利齊民要術云春地氣通可耕堅硬強地黑壚土輒磨平其塊以待時所謂強土而弱之也杏始花輒耕輕土弱土閲數日草生復耕之遇雨又復耕之土甚輕者以牛羊踐之如此則土強所謂弱土而強之也緊土宜深耕熟耙多耙則土鬆用灰壅之最佳緊甚用浮沙壅之此緊者緩之也緩者曵碌碡重滚壓之不滚壓則土浮而根虛雨後日炙易萎此土用河泥壅之最妙此緩者緊之也燥土宜遇雨而耕或作圍蓄水冬間遇雪於上邉風來處起土作障勿使雪從風飛去使雪融化入土則所種倍收按此是燥者潤之寒土宜焚草根壅之寒甚用石灰此寒者暖之也生土則去草宜淨耕耙宜多此生而熟之也熟土須識代田之法如上年此一行下種今年須空此一行而以舊時空地種之上年此地種黍今年則種稷此熟而生之也肥沃之土不有生土以解之則苖茂而實不堅磽確之土得糞壤滋培則苗蕃秀而實堅栗肥者瘠之瘠者肥之亦一定之理也孝經援神契曰黃白土宜禾黑土宜麥赤土宜菽汚泉宜稻北人類以汙下之地為劣而不知其宜稻惟不講水田之法故也又瀕海之地潮水往來淤泥常積有鹹草叢生此須挑溝築岸或樹立椿橛以抵潮汛其田形中間髙兩邉下不及十數丈即為小溝百數丈即為中溝千數丈即為大溝以注雨潦此甜水淡水也其地初種水稗斥鹵既盡漸可種稻所謂潟斥鹵兮生稻粱非虛語也又周禮草人土化之法鄭康成注謂所以糞土者以牛羊諸骨煮取汁也今固不能分析土性亦無麋鹿貆狐之骨可用然熟玩此章可以知古人用糞之意騂剛者色赤而性剛也赤緹者色赤而如緹謂薄也説卦坤為牛兌為羊牛性前順羊性前逆牛屬土其糞和緩可以化剛土羊屬金其糞燥密可以治薄土也墳謂土脈墳起而柔解也渴澤謂水去而澤乾也墳壤屬陽渴澤屬隂月令夏至鹿角解冬至麋角解鹿陽故遇隂生而角解蘪隂故遇陽生而角解今以麋矢化陽土以鹿矢化隂土也鹹潟鹵也勃壤粉解也鹹鹵之地常濕粉解之地常乾貆貉屬貆好睡狐好疑貆貪殘之物狐隂媚之物貪殘者其氣在外故以化濕土隂媚者其氣在內故以化乾土也埴壚黏黑也輕㸑輕脆也埤雅云犬喜雪豕喜雨犬屬火其性輕佻故以化黏土豕屬坎其性負塗故以化脆土也此可以想古人變化之義矣得其意而推之則隨土用糞各有攸當也春明夢餘録湖蕩之間可以水耕者則引水鑿渠髙衍之地可以陸種者則分經定界欽定授時通考卷十
