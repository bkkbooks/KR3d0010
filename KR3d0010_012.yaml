body:
  text: 土宜田制下董仲舒乞限田章秦用商鞅之法改帝王之制除井田民得買賣富者田連阡陌貧者無立錐之地古井田法雖難卒行宜少近古限民名田以贍不足塞并兼之路李安世請均田疏臣聞量地畫野經國大式邑地相參致治之本井稅之興其來日久田萊之數制之以限蓋欲使土不曠功民罔遊力雄擅之家不獨髙腴之美單陋之夫亦有頃畝之分所以恤彼貧微抑兹貪欲同富約之不均一齊民於編户竊見州郡之民或因年儉流移棄賣田宅漂居異鄉事涉數世三長既立始返舊墟廬井荒毁桑榆改植事已歷遠易生假冒強宗豪族肆其侵凌遠認魏晉之家近引親舊之驗又年載稍久鄉老所惑羣證雖多莫可取據各附親知互有長短兩證徒具聽者猶疑爭訟遷延連紀不判良疇委而不開柔桑枯而不採僥幸之徒興繁多之獄作欲令家豐儲積人給資用其可得乎愚謂今雖桑井難復宜更均量審其經術令公藝有凖力業相稱細民獲資生之利豪右靡餘地之盈則無私之澤乃播均於兆庶如阜如山可有積於比户矣又所爭之田宜限年斷事久難明悉屬今主然後虛妄之民絶望於覬覦守分之士永免於凌奪矣白居易議井田阡陌先王度土田之廣狹畫為夫井量人户之衆寡為邑居使地利足以食人人力足以闢土邑居足以處衆人力足以安家野無餘田以啓專利邑無餘室以容遊人逃刑避役者往無所之敗業遷居者來無所處於是生業相因食力相濟三代之後井田廢則遊惰之路啓阡陌作則兼并之門開因循未遷積習成弊臣請斟酌時宜參詳古制大抵人稀土廣者且修其阡陌户繁鄉狹者則復以井田使都鄙漸有名家夫漸有數夫然則井邑兵田之地衆寡相維門閭族黨之居有亡相保相維則兼并者何所取相保則遊惰者何所容如此則財産豐足賦役平均市利歸於農生業著於地矣蘇洵論田制井田之制九夫為井百井而方十里萬井而方百里百里之間為澮者一為洫者百為溝者萬既為井田又必兼為溝洫縱能盡得平原廣野而規畫於中亦當驅天下之人竭天下之糧數百年專力於此不治他事而後可以天下之地盡為井田盡為溝洫亦已迂矣夫井田不可為而其實便於今誠有能為近井田者而用之亦可以蘇民矣孔光何武曰吏民名田無過三十頃期盡三年而犯者沒入官夫三十頃周民三十夫之田也縱不能盡如周制一人而兼三十夫之田亦已過矣期之三年是又迫蹙平民使壞其業非人情難用吾欲少為之限而不禁其田已過吾限者但使後之人不敢多占田以過吾限耳要之數世富者之子孫或不能保其地而彼嘗已過吾限者散而入於他人矣或者子孫出而分之無幾矣如此則富民所占者少而餘地多餘地多則貧民易取以為業不為人所役屬各食其地之全利夫不用井田之制而獲井田之利雖周之井田何以逺過於此畢仲遊議占田數有人則有田有田則有分田有瘠薄人有衆寡以人耕田相其瘠薄衆寡而分之謂之分分定而以名自占之謂之名田無甚難行者而至今不行則其制未均而恤之太甚故也蓋周井田之法一夫一婦受田百畝餘二十五畝以至工商士人受田亦各有等而又分不易一易再易之差以一夫一婦而受百畝無主客之别比今二百畝矣以不易一易再易之相掩而又有餘夫則比今三百畝矣什一而征無他賦斂而又嵗用其力不過三日則比今四百畝矣而何武之制自諸侯王及於吏民皆無過三十頃以一諸侯王而財七八農夫此所謂制未均者也名田之議起於董仲舒申於何武師丹至晉泰始限王公之田以品為差而均田之制起於後魏至唐開元亦嘗立法而卒皆不行夫名田之不行非下之不行乃上之不行也非賤者不行乃貴者不行也在上而貴者戴髙位食厚祿官其子孫賞賜狎至雖田制未均猶當行也而何師之議則革於丁傅董賢晉魏則名存而實去此所謂恤之太甚者也今將議占田之數則周官之書漢魏隋唐之制有可行者有不可行者董仲舒以秦變井田民得賣買富者連阡陌貧者無置錐之地宜少近古限民名田以贍不足塞兼并之路其説雖正而不聞其制度何武之制太狹今日之制太無限宜約周官受田之數與唐世業口分之法參其多少而用之士大夫則因其品秩之髙下與其族類之衆寡無使貴者有餘而貧者不足要之仰足以事父母俯足以畜妻子旁可以及兄弟朋友而不為兼并則善矣林勳本政書五尺為步而二百為畝畝二百為頃頃九為井井方一里井十為通通十為成成方十里成十為終終十為同同方百里一同之地提封萬井實為九萬頃三分去二為城郭市井官府道路山林川澤與夫磽角不毛之地定其可耕與為民居者三千四百井實為三萬六百頃一頃之田二夫耕之夫田五十畝餘夫亦如之總二夫之田則為百畝百畝之收平嵗為米五十石上熟之嵗為米百石二夫以之養數口之家蓋裕如矣一頃之地百畝十有六夫分之夫宅五畝總有十六夫之宅為地八十畝餘十畝以為社學場圃一井之人共之使之朝夕羣居以教其子弟然貧富不等未易均齊奪有餘以補不足則貧駭矣今宜立法使一夫占田五十畝以上者為良農不足五十畝者為次農其無田而為間民與非工商在官而為遊惰末作者皆驅之使𨽻農良農一夫以五十畝為正田以其餘為羡田正田無敢廢業必躬耕之其有羡田之家則無得買田惟得賣田至於次農則無得賣田而與𨽻農皆得買羡田以足一夫之數而升為良農凡次農𨽻農之未能買田者皆使分耕良農之羡田各如其夫之數而嵗入其租於良農如其俗之故非自能買田及業主自收其田皆無得遷業若良農之不願賣羡田者宜悉俟其子孫之長而分之官無苛奪以賈其怨稍須暇日自合中制矣朱子條奏經界狀竊見經界一事最為民間莫大之利其紹興年中已推行處至今圖籍尚存田稅可考貧富得實訴訟不繁獨泉漳汀州不曽推行小民業去産存苦不勝言而州縣坐失常賦勢將何所底止然而此法之行其利在於官府細民而豪家大姓猾吏姦民皆所不便故向議輒為浮言所阻甚至以汀州盜賊藉口恐脅朝廷不知往嵗汀州屢次盜賊正以不曽經界貧民失業更被追擾無所告訴是以輕於從亂今者臣請且欲先行泉漳二州而次及於臨汀既免一州盜賊過計之憂又慰兩郡貧民延頸之望誠不可易之良䇿也一推行經界最急之務在於推擇官吏乞朝廷先令監司一員專主其事使擇一郡守臣汰其昏繆疲軟力不任事者而使察其屬縣令或不能則擇於其佐又不能則擇於他官一州不足則取於一路見任不足則取於得替待缺之中皆委守臣踏逐申差或權領縣事或只以措置經界為名果得其人則事克濟而民無擾矣一經界之法打量一事最費功力而紐折算計之法又人所難曉本州已差人於鄰近州縣已行經界去處取會到紹興中施行事目及募舊來曾經奉行諳曉算法之人選擇官吏將來可委者日逐講究聽候指揮但紹興中户部行下打量攢算格式印本乞特詔户部根檢謄録點對行下一圖帳之法始於一保大則山川道路小則人户田宅必要東西相連南北相照以至頃畝之濶狹水土之高低亦須當衆共定各得其實其十保合為一都則其圖帳但取山水之遞接與逐保之大界總數而已不必更開人户田宅也其諸都合為一縣則其圖帳亦如保之於都而已不必更為諸保之别也如此則圖帳之費亦當少減若朝廷矜三郡之民不使更有煩費莫若令役戶只作草圖草帳而官為買紙雇工以造正圖正帳實用若干錢物許就本州所管兩司上供錢內截撥應副如此則大利可成而民亦不至於甚病矣又據龍巖縣尉劉璧申經界之行惟里之正長其役最為煩重疆理畝畝分别土色均攤賦稅其在當時動經再嵗出入阡陌荒廢家務固已不勝其勞一有廣狹失度肥磽失宜輕重失當則詞訟並興而督責又隨至矣彼皆鄉民安知經界書算必召募書人以代此役而書人必胥吏之桀黠者莫不乘時要求髙價執役之人急於期限隨索則酬而又簿書圖帳所用紙張亦復不資竊謂經界之在今日不可不行行之亦不患無成若里正里長書人紙札之費有以處之則可舉行若坐視其殫力耗財如曩日恐非仁政之意也竊詳此意與臣所奏略同乞許施行一紹興經界打量既畢隨畝均産其産錢不許過鄉此蓋以算數太廣難以均敷防其或有走弄失陷之弊也若使諸鄉産錢租額素來均平則此法善矣若逐鄉已有輕重人戶徒然攢算不免有害多利少之歎乞特許産錢過鄉通縣均紐庶幾百里之內輕重齊同實為利便一本州民間田有産田有官田有職田有學田有常平租課田名色不一而其所納稅租輕重亦各不同年來産田之稅既已不均而諸色之田散漫參錯尤難檢計姦民猾吏並緣為姦今莫若將見在田土打量步畝一槩均産每田一畝隨九等髙下定計産錢幾文而總合一州諸色租稅錢米之數以産錢為母别定等則一例均敷每産一文納米若干銀若干去州縣逺處遞減令輕却以到官之數照元分數分𨽻逐錢撥入諸色倉庫除逐年二稅造簿之外每遇辰戌丑未之年逐縣更令諸鄉各造一簿令子午卯酉年應辦大禮寅申己亥年解發舉人惟此四年州縣無事開具本鄉所管田數四至步畝等第各注某人管業有典賣則云元係某人管業某年典賣某人現今管業却於後項通結逐一開具某人田若干畝産錢若干使其首尾照應又造合縣都簿一扇類聚諸簿通結逐戶田若干畝産錢若干文其有田産散在諸鄉者併就煙㸑地分開排總結並隨秋科稅簿送州印押下縣知佐通行收掌人戶遇有交易即將契書及兩家砧基照鄉縣簿對行批鑿則版圖一定而民業有經矣一本州荒廢寺院田産頗多目今並無僧行住持田土為人侵占將來打量之時無人驗對亦恐别生姦弊乞特降指揮許令本州出榜召人實封請買不惟一時田業有歸民益有富實亦免向後官司稅賦因循失陷而又合於韓愈所謂人其人廬其居之遺意誠厚下足民攘斥異教不可失之機會也朱子開阡陌辨漢志言秦廢井田開阡陌説者皆以開為開置之開言秦廢井田而始置阡陌也按阡陌者舊説以為田間之道蓋因田之疆畔制其廣狹辨其橫縱以通人物之往來即周禮所謂遂上之徑溝上之畛洫上之塗澮上之道也風俗通云南北曰阡東西曰陌又曰河南以東西為阡南北為陌二説不同今以遂人田畝夫家之數考之當以後説為正蓋陌之為言百也遂洫縱而徑塗亦縱則遂間百畝洫間百夫而徑塗為陌矣阡之為言千也溝澮橫而畛道亦橫則溝間千畝澮間千夫而畛道為阡矣阡陌之名由此而得至於萬夫有川而川上之路周於其外與夫匠人井田之制遂溝洫澮亦皆四周則阡陌之名疑亦因其橫縱而命之也然遂廣二尺溝四尺洫八尺澮二尋則丈有六尺矣徑容牛馬畛容大車塗容乘車一軌道二軌路三軌則幾二丈矣此其水陸占地不得為田者頗多先王非不惜之所以正經界止侵爭時蓄泄備水旱為永久之計有不得不然者矣商君以其急刻之心行茍且之政但見田為阡陌所束而耕者限於百畝則病其人力之不盡但見阡陌之占地太廣而不得為田者多則病其地利之有遺又當世衰法壞之時則歸授之際必不免有欺隱煩擾之姦而阡陌之地切近民田又必有隂據自私而稅不入於公上者是以奮然不顧盡開阡陌悉除禁限而聽民兼并買賣以盡人力墾闢棄地悉為田疇而不使其有尺寸之遺以盡地利使民有田即為永業而不復歸授以絶煩擾隱欺之姦使地皆為田而田皆出稅以核隂據自私之幸一時之害雖除而千古聖賢之意於此盡矣故秦紀鞅傳皆云為田開阡陌封疆而賦稅平蔡澤亦曰決裂阡陌以靜生民之業詳味其言則所謂開者乃破懷剗削之意而非創置建立之名所謂阡陌乃三代之舊而非秦所置矣所謂賦稅平者以無欺隱竊據之姦也所謂靜生民之業者以無歸授取豫之煩也以是數者合證之其理可見而蔡澤之言尤為明白且先王疆理天下均以豫民故其田間之道有經有緯不得無法若秦既除井授之制則隨地為田隨田為路尖斜屈曲無所不可又何必其取東西南北之正以為阡陌而後可以通往來哉或以漢世猶有阡陌之名而疑其出於秦之所置不知秦之所開亦曠僻而非通路者耳若其適當衝要便於往來亦豈得而盡廢之哉但必稍侵削之不使復如先王之舊耳葉適論田制先王之政設田官以授天下之田貧富強弱無以相過使各有其田得以自耕故天下無甚貧甚富之民至成周時其法極備雖周禮地官所載其間不能無牽合抵牾處要其大略亦見周公授田之制先治天下之田以為井井為疆界嵗嵗用人力修治之溝洫畎澮皆有定數經界既定人無緣得占田後來井田不修隄防浸失至商鞅用秦已不復有井田之舊於是阡陌既開天下之田却簡直易見看耕得多少惟恐人無力以耕之故秦漢之際有豪強兼并之患官不得治而貧者不得不去而為遊手轉而為末業終漢之世以文景之恭儉愛民武帝之修立法度宣帝之勵精為治却不知其本但能下勸農之詔輕減田租以來天下之民如董仲舒師丹雖建議欲限天下之田其制度又與三代不合當時但問墾田幾畝全不知是誰田又不知天下之民皆可以得田而耕之光武中興亦只是問天下度田多少當時以度田不實長吏坐死者無數至於漢亡三國並立未及富盛而天下大亂當時天下之田既不在官然亦終不在民以為在官則官無人收管以為在民則又無簿籍券但隨其力所能至而耕之元魏稍立田制北齊後周皆相承授民田其初亦未嘗無法度但推行不到其法度亦是空立唐興只因元魏北齊制度而損益之其度田之法濶一步長二百四十步為畝百畝為頃一夫受田一頃周制乃是百步為畝唐却二倍有餘此制度與成周不合八十畝為口分二十畝為世業是一家之田口分須據下來人數占田多少周制八家皆私百畝唐制若子弟多則占田愈多此又與成周不合所謂田多可以足其人者為寬鄉少者為狹鄉狹鄉之田減寬鄉之半其地有厚薄嵗一易者倍授之寬鄉三易者不倍授工商者寬鄉減半狹鄉不給亦與周制不同先王建國只是有分土無分民但付人以百里之地任其自治唐既止用守令為治則分田之時不當先論寬鄉狹鄉以土論不當以人論今却寬鄉自得多狹鄉自得少自狹鄉徙寬鄉者又得并賣永業口分而去成周之制雖是授田與民其間水旱凶荒又賑貸救恤可以不至匱乏若唐但知受田而已而既已自賣其田便已無恤民之實矣周制最不容民遷徙惟有罪則徙之唐却容他遷徙并得自賣所分之田方授田之初其制已不可久又許之自賣民始有契約文書而得以私自賣易故唐比前世其法雖為粗立然先王之法亦自此大壞矣後世但知貞觀之治執之以為據故公田始變為私田而田終不可改蓋緣他立賣田之法所以至此田制既壞至於今官私遂自各立境界民有沒入官者則封固之時或召賣不容民自籍所謂私田官執其契券以各證其直要知田制所以壞乃自唐世使民得自賣其田始前世雖不立法其田不在官亦不在民唐世雖有公田之名而有私田之實其後兵革既起征斂煩重遂雜取於民逺近異法內外異制民得自有其田而公賣之天下紛紛相兼并故不得不變而為兩稅要知其弊實出於此衛涇禁圍田奏二浙地勢髙下相類湖髙於田田又髙於江海水少則泄湖水以溉田水多則泄田水由江而入海惟瀦泄兩得其便故無水旱之憂而皆膏腴之地自紹興末年因軍中侵奪瀕湖蕩工力易辦創置堤埂號為壩田民田已被其害隆興乾道之後豪宗大姓相繼迭出廣包強占無嵗無之陂湖之利日脧月削三十年間昔之曰江曰湖曰草蕩者今皆田也夫圍田者無非形勢之家其語言氣力足以凌駕官府而在位者重舉事而樂因循上下相蒙恬不知怪而圍田之害深矣議者又曰圍田既廣則增租亦多於邦計不為無補殊不思緣江並湖民間良田何啻數千百頃皆異時之無水旱者圍田一興修築塍岸水所由出入之路頓至隔絶稍覺旱乾則占據上遊獨擅溉灌之利民田無從取水水溢則順流疏缺復以民田為壑圍田僥幸一稔增租有幾而當稅倍收之田小有水旱反為荒土常賦所損可勝計哉乞賜行下户部申嚴約束斷自今以後凡陂湖草蕩並不許官民户及寺觀請佃圍裹馬端臨論井田井田未易言也古之帝王分土而治外而公侯伯子男內而孤卿大夫所至不過百里之地皆世其土子其人於是取其田疇而伍之經界正井地均穀祿平貪夫豪民不能肆力以違法制汚吏黠胥不能舞文以亂簿書至春秋之世列國不過數十土地寖廣然又為世卿強大夫所裂如魯則季氏之費孟氏之成晉則欒氏之曲沃趙氏之晉陽皆世有其地又如邾莒滕薛之類小國寡民法制易立竊意當時有國者授其民以百畝之田壯而畀老而歸不過如後世大富之家以其祖父所世有之田授之佃客程其勤惰以為豫奪校其豐凶以為收貸其東阡西陌之利病皆少壯所習聞無俟考核而姦弊自無所容矣降及戰國大邦凡七地廣人衆考核難施故法制隳弛而姦弊滋多也秦人盡廢井田漢既承秦而卒不能復三代井田之制何也蓋守令之遷除其嵗月有限而田土之遷授其姦弊無窮雖慈祥如龔黃召杜精明如趙張三王既不久於其政豈能悉知其土地民俗之所宜如周人授田之法乎又論後魏行均田法夾漈鄭氏言井田廢七百年至後魏孝文始納李安世之言行均田之法然晉武帝時男子一人止占田七十畝女子三十畝丁男課田五十畝丁女二十畝次丁男半之女則不課則亦非始於後魏也但史不書其還授之法無由考其詳耳或謂井田之廢已久驟行均田奪有餘以豫不足必致煩擾以興怨讟不知後魏何以能行然觀其立法所受者露田諸桑田不在還授之限意桑田必是人戶世業是以栽植桑榆其上而露田不栽樹則似所授者皆荒間無主之田必諸逺流配謫無子孫及戶絶者墟宅桑榆盡為公田以相授受則固非盡奪富者之田以豫貧人也又令有盈者不還不足者受種如法盈者得賣其盈不足者得買所不足不得賣其分亦不得買過所不足自令其從便買賣以合均給之數則又非強奪之以為公田而授無田之人與王莽所行異矣明胡翰論井牧井田者仁政之首也井田不復仁政不行天下之民始敝之矣其後二百三十有二年而漢始有名田之議又其後六百有三年而元魏始有均田之法名田者占田也占田有限是富者不得過制也其後師丹孔光之徒因之命民名田無過三十頃議者因三十頃之田周三十夫之地也一夫占之過矣故名田雖有古之遺意不若均田之善均其土田審其經術差露田别世業魏人賴之力業相稱北齊後周因而不變隋又因之唐有天下遂定為口分永業之制宋劉厰又以魏齊周隋享國日淺兵革不息土曠人稀其田足以給其衆唐承平日久丁口滋多官無間田給受徒為具文不知隋唐之盛丁口相若耳開皇十二年發使均天下之田狹鄉一夫僅二十畝隋之給受何加於唐唐雖承平日久貞觀開元之盛其户口猶不及隋何至具文無實也厰言過矣但狹鄉民多而田不盈永業田鬻而民不固如陸贄所謂時敝者也以余論之古者步百為畝漢人益以二百四十為畝北齊又益之以三百六十為畝今所用者漢畝步也今之五十畝古之百畝也漢提封田萬萬頃惟邑居道路山林川澤不可墾餘三千二百二十九萬頃皆可墾元始初遣司農勸課定墾田八百二十七萬五百三十頃是時天下之民一千二百二十三萬三千戶以田均之計户得田六十七畝古之百四十畝也家穫百四十畝耕之未為不給也唐盛時永徽民戶不過三百八十萬至開元七百八十六萬亦不漢過也以天下之田給天下之民徵之漢唐則後世寧有不足之患乎崔銑均田議田之不均生自二豪貴宦多賂富室多財近者有司立法均田畫丘計畝三品徵稅惜其付之吏胥髙下任心尤為二豪扇搖而罷之今宜倣古限田先禁兼并召集每丘田主共辨肥瘠髙田宜潦下田宜旱互乘除之然後定等分租又出山澤使貧者得業如此十年家可使給大學衍義補按秦廢井田開阡陌已千餘年矣決無可復之理説者謂國初人寡之時可以為之然承平日久生齒日繁亦終歸於隳廢不若隨時制宜使合於人情宜於土俗而不失先王之意政不必拘拘於古之遺制也然則張載之言非歟曰載固言處之有術其言隱而未發不敢臆説也又按井田既廢之後田不在官而在民是以貧富不均一時識治體者咸慨古法之善而無可復之理於是有限田之議均田之制口分世業之法然皆議之而不果行行之而不能久何也其為法雖各有可取然皆不免拂人情而不宜於土俗可暫而不可常也必不得已創為之制必也因其已然之俗而立為未然之限不追咎其既往而限制其將來可乎臣請斷以一年為限如是今年正月以前其民家所有之田雖多至百頃官府亦不問惟自今年正月以後一丁惟許占田一頃餘數不許過五十畝於是以丁配田因而定為差役之法丁多田少者許買足其數丁田相當者不許再買買者沒入之其丁少田多者在未限之前不復追咎自立限以後惟許鬻賣有增買者并削其所有民家生子將成丁者即許豫買以俟其成以田一頃配人一丁當一夫差役其田多丁少之家以田配丁足數之外以田二頃視人一丁當一夫差役量出雇役之錢富者出財田少丁多之家以丁配田足數之外以人二丁視田一頃當一夫差役量應力役之征貧者出力若田多人少之處每丁或餘三五十畝或至一二頃人多田少之處每丁或至四五十畝七八十畝隨其多寡盡其數以分配之此外又因而為仕宦優免之法因官品崇卑量為優免惟不配丁納糧如故其人已死優及子孫以寓世祿之意如京官三品以上免四頃五品以上三頃七品以上二頃九品以上一頃外官則遞減之無田者準田免丁惟不配丁納糧如故名配丁田法既不奪民所有則有田惟恐子孫不多而無匿名不報者矣不惟民有常産無甚貧甚富之不均而官之差役亦有驗丁驗糧之可據行之數十年官有限制富者不復買田興廢無常富室不無鬻産田直日賤而民産日均雖井田之制不可猝復而兼并之患漸銷矣唐順之答施武陵書方田一法不難於量田而最難於核田蓋田有肥瘠難以一槩論畝須於未丈量之前先核一縣之田定為三等必得其實然後丈量乃可用折算法田畝如周禮一易之田家百畝再易之田家二百畝三易家三百畝此為定畝起賦之準嘗觀國初折畝定賦之法腴鄉田必窄瘠鄉田必寬甚得古意今兹不先核田便行丈量則腴鄉之重則必減瘠鄉之輕則必加非均平之道也量田之難全在乎此至於丈量法其簡易者具之九章算法中須自明此意乃可使下人為之庶無弊也張棟因事陳言疏丈量一事良法也及其成也不必以此而律彼不必以一縣而律一省不必以一省而律天下或減尺丢弓或斜量折算此其弊在田畝其罪在業户或以上作中或以中作下此其弊在田則其罪在公正或改畝除弓或移三就五或損此易彼或那東補西此其弊在田册其罪在書算大約弊端不外乎此三者章潢井田限田均田總論井田法至周始備自李悝商鞅出而其法廢滅無存誠為萬世戎首然秦漢迄今英君誼辟與奇謀碩畫之臣莫之能變即有變者或至紕戾無稽豈秦法有加於三代聖人耶議者謂戰國干戈之後丘陵城郭墳壟廬舍鞠為茂草即有平原亦半荆棘漢去秦無幾已不能比次而經紀之顧處千載之下而欲襲其業以授民踵新莽之覆轍亦迂矣是井田之不能復也勢也無已又有限田均田之説董仲舒倡限田於元狩而武帝不果行師丹請限田於鴻嘉而成帝不能用乾興初詔限公卿以下與衙前將吏田而任事者以為不便夫井田既廢富民業已肥殖長子孫傳襲擬於封國而遽欲歲月間盡褫其所有此亦非人情矣是限田之不能行也亦勢也由周而來七百年魏孝文納李安世之疏均授民田然不再傳而廢又百二十年而唐太宗定口分世業之法然行未久而報罷又二百三十年而周世宗詔行元稹均田圖法然世族羣起而撓之夫周制既逺生齒錯出民之遷徒靡定田之給代無常而履畝握算官且不勝其盩矣是均田之不能久也亦勢也夫田不能井又不能限又不能均均亦不能久苐建步立畝括田均賦此為至䇿其必量山澤之入視莊屯之額塞飛詭之竇責無籍之戶命所輸者與所入相當取他羡補崩決償失額無稼稅匿逋者即驗問嘉與更始弛其罰無論世世偏纍疲癃之民歡然若更生如此則田不必井而井之之法存田不必均而均之之法寓矣薑揚武水田議職方氏云幽州穀宜三種鄭云黍稷稻賈疏云幽與冀相接冀皆黍稷幽兼宜稻故云三種黍稷稻也是幽之宜稻其來舊矣又讀宋史何承矩傳自順安瀕海東西三百餘里南北五七十里悉為稻田食貨志云凡雄鄭霸州平戎順安等軍興堰六百里置斗門引淀水始為塘濼終為稻田防塞實邊具有成績稻田有八利多為溝渠引填淤之水利一分為支河疏壅塞之害利二旱不虞枯稿利三水不虞泛漲利四通舟楫以便轉輸利五稻一斗易粟數斗利六逋賦易完利七戎馬不得馳突利八然始必壞民丘壠多起丁夫變置川原遷延嵗月必主之密勿付之重臣勿因小害而阻撓勿徼微利而鹵莽寬其文網需以嵗時則可舉矣國朝戶部條陳圈地疏圈取地土一事於順治四年奉有上諭今後民間田産再不撥取永為禁革又順治十年奉旨以後仍遵前旨再不許圈取民間房地欽遵在案邇年以來有因旗下退出荒地復行圈補者有自省下及那營處所來壯丁又行圈撥者有各旗退出荒地召民耕種或半年或一二年青苗成熟遇有撥補復行圈去者有因圈補之時將接壤未圈民地取齊圈去者以致百姓失業窮困逃散且不敢視田為恆産多致荒廢而旗下退出荒地復圈取民間熟地更虧國賦臣等酌議滿洲百姓均係朝廷之民且大圈地户久已圈定屢奉上諭禁止圈取自應永逺遵行查張家口殺虎口喜峰口古北口獨石口山海關等口外既有可居空間之地自御內以至王貝勒官員披甲有情願各將壯丁分內地畝退回圈取口外空間之地耕種者各該衙門都統印文咨送臣部按丁丈給將此退出之地收存撥給自省下那營處所來壯丁圈取民地永行停止庶百姓得所不致流離矣湯斌與宋郡守書睢陽衛地共有四項曰大軍曰新增曰餘屯曰徭役弓口惟徭役以二百四十步為一畝其起科獨少大軍新增餘屯三項總以三百步為一畝約計小地十畝折行糧地八畝猶之州地之二畝折一畝商丘等縣之或四畝折一畝或三畝折一畝之不同以前代二百餘年之所遵循亦我皇清定鼎以來所率由而未改者逮庚子辛丑間蠧書詭影過多錢糧難敷遂有以大軍三項強作小畝派糧者是名為擠地擠地既久詭影愈便明謀密議必不肯盡行清楚乞發鈞示令各項地畝槩從舊例不得那移紛更庶里役無以借口矣總之衛地自經丈量之後花户無地數皆可按籍而求除徭役一項外凡軍新餘屯查繵册內小地十畝者赤歷內注地八畝小地一頃者赤歷內注地八十畝則從前之擠地自去而當年之舊例自復在蠧書之言必曰依小畝則足額依舊例則不足額不知地猶昔日之地本朝賦役全書額地額糧悉依故明之舊昔大畝而足額今必擠地而後足額此非詭影之地多即繵外餘地之未報某等以為詭影之地繵外未報之地未有里書不知者總責里書勒限清報期於大畝足額而止事關民瘼伏惟鑒照董以寧民屯議屯以兵亦以民明無所謂民屯也徙無田之人耕曠土則謂之屯蓋兵戈旁午之地曠土必多丘濬又云沿海閩地築堤以攔鹹水之入疏渠以通淡水之來則田皆可成何患無地哉今降人雲集既議置屋處之又給以口糧非長計也固撥以地畝為宜但奪土著之田以給之則病民而理有所不可或官買熟田以給則官民皆病而勢且有所不能或以未墾之田計口授之止供其衣食恐將來成熟之後欲其輸將無缺等於民田則必不給而轉徙仍為無定若聽其不與輸將等於賜田則又姑息而主客更覺偏枯莫若因安插之時置屋即於有田之地倣明初衛所舊制多撥田若千畝教人以耕之法而又給以農具屯種使次年以值還官三年稅十之三四年稅十之六至五年而全徴其課額則更為酌量之全拋荒之地原為甌脫而兹有墾闢之勞當較里甲之輸稍減以嘯聚之餘得頒田里而又無城守之任當較旗丁之納稍增待及屯成亦可於向時運糧派餉之地稍減釐毫合籥以蘇其困矣沈荃遵旨條陳疏一地畝等則之宜分晰也中州土地原有上中下及金銀銅鐵錫等名目分别起科而因地未盡闢疆井混淆八府以內不分等則一槩派糧致貽民間賠害今查首漸有就緒小民自無遁情若不亟乘清查之時分晰髙下則熟田固難隱匿而起科或至混淆終非皇上軫念國計民生至意仍請敕部於彚報之後查照萬歷年間則例照地派糧永為遵守庶則壤有一定之規而荒嵗免包賠之苦矣佟鳳彩條陳民田疏一里甲田地多寡懸殊宜均平也竊照均平里甲久奉俞旨通行直省惟河南為多荒少熟因循如故雖有里甲之名其實多寡不一多者每里或五六百頃或三四百頃少者每里或止一二百頃甚至或數十頃以至寥寥數頃者遇有差徭有司止知照里編差不知里大則田多戶殷衆擎易舉里小則田少人稀難以承役更有官儒戶名或不入甲或入甲而不當差甚至避重就輕詭寄飛灑大里愈得便宜小里愈增苦纍名為一例當差實有不均之歎今計莫若行各州縣詳察除已均平者不動外凡有不均平者不許拘喚各户審編亦不許里書分派止令州縣印官按現在徵糧地畝册如一州縣有地一千頃原分為十里者每里均分一百頃一里之中各分十甲一甲均分十頃遇有差徭按里甲均當不許少有增減如是則豪強無計躲避貧懦不致偏枯矣李光地請開河間府水田疏查南方水田之法行之北方往往有效曩者涿州水占之田一畝鬻錢二百尚無售者後開為水田一畝典銀十兩即今淀中浮居村莊嵗收蒲稗菱藕之利無旱暵之憂其資生未嘗減於高地也臣愚謂靜海青縣上下一帶水居之民正宜以此利導之其可興水田者教之栽秧插稻之法至於獻縣交河等與正定接壤之處係鹽河上遊若能修治溝洫雜興水田則水勢漸分將下流之水勢亦日減是資水之利即以除水之害然舉行方始若非有熟識情形歷經試用之人使之實心任事恐空言無裨也劉殿衡條陳疏一挖壓田地應令丈明估價公議均補也楚北安荆一帶地方外而川江內而襄漢水勢湍急風浪洗刷凡堤率多沖潰必須挽築月堤以防不虞其築月堤也堤腳之寬二三丈不等必須覆築於民田之上是之謂壓壓則田在此堤之下矣堤身之髙長一二丈不等取土於民田之中是謂之挖挖則此田深窪無用矣此挖壓之田主垸內若有多餘之田則去此數畝堤腳田土其所保護者實多或亦甘心若止此區區數畝因坐附堤邉一旦盡被挖壓勢必謀生乏䇿臣採訪輿情酌定一法嗣後遇有修築堤塍於興工之時令地方官將堤身所壓之田及兩邊取土之地俱為丈明畝數確立界址著令堤長甲長秉公估定價值查明本垸內衆姓享利之田若干畝挖壓之田若干畝算明均攤補償交給被挖被壓本主另置田産耕種則無強行挖壓之弊而窮民得免偏纍向隅之苦矣欽定授時通考卷十二
