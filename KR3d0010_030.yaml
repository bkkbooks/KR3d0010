body:
  text: 穀種麻麻大麻沙蓬米亞麻萞麻稗穇子稂菵東廧薏苡仁詩經王風丘中有麻疏言丘中墝埆之處所以得有麻者乃留氏子嗟之所治也由子嗟教民農業使得有之集傳麻穀名子可食皮可績爲布者大全本草曰一名麻勃此麻上花勃勃者麻子味甘平無毒園囿所蒔今人作布及履用之齊風藝麻如之何衡從其畝注欲樹麻者必先縱橫經治其田畝豳風九月叔苴疏苴麻之有實者也叔苴謂拾取麻實以供食也大雅麻麥幪幪注茂密也禮記月令孟秋之月天子麻與犬又仲秋之月天子以犬嘗麻先薦寢廟注麻始熟也周禮天官朝事之籩其實麷蕡注蕡實也鄭司農云麻曰蕡儀禮有司徹主司取籩於房麷蕡坐設於豆西注蕡熬枲實也爾雅黂枲實注禮記曰苴麻之有黂疏枲麻也黂者即麻子名故云黂枲實也又枲麻注别二名疏麻一名枲故注云别二名禹貢青州云厥貢岱畎絲枲是也又莩麻母注苴麻盛子者疏一名莩一名麻母淮南子汾水濛濁而宜麻齊民要術漢書張騫外國得胡麻今俗人呼爲烏麻者非也廣雅曰狗蝨勝茄胡麻也本草經曰青蘘一名巨勝今世有白胡麻八角胡麻白者油多爾雅翼麻實既可以養人而其縷又可以爲布其利最廣然麻之屬總曰麻别而言之則有實者别名苴無實者别名枲子夏喪服傳曰苴絰者麻之有蕡者也牡麻者枲麻也蕡即實也牡即無實之名也然此類亦通名麻枲故或以蕡爲枲實蓋假借言之耳麻實又有文理故屬金爲西方之穀明堂月令秋則食麻與犬秋氣既涼又向寒無害故食當方之穀牲而至仲秋則又以犬嘗麻先薦寢廟也若豳風則九月菽苴蓋食農夫者不嫌於晚耳麻實既謂之蕡故古者朝事之籩熬麻麥以實之謂之麷蕡又麻於植物中最爲多子故詩稱桃之夭夭有蕡其實言桃花色既盛又結子之多如麻子然以况室家之相宜而其繼續繁衍者如此說文又云萉枲實或作黂則音雖異而意同後世說本草者或以黂爲牡麻之華則與詩雅所說大異又胡麻亦有實本生大宛一名油麻一名狗蝨一名方莖純黒者名巨勝亦曰一葉兩莢爲巨勝或曰莖圓爲胡麻莖方爲巨勝道家以爲飯陶隱居言八穀之中胡麻最爲良以詩黍稷稻粱禾麻菽麥爲八種而引董仲舒云禾是粟苗麻是胡麻按胡麻大宛之種張騫得之以歸詩人所稱豈應近捨中國之苴而逺述大宛之巨勝此説非是又以其胡物而細故别謂中國之麻爲漢麻亦曰大麻本草綱目李時珍曰按沈存中筆談云胡麻即今油麻更無他說古者中國只有大麻其實爲蕡漢使張騫始自大宛得油麻種來故名胡麻以别中國之大麻也寇宗奭衍義亦據此釋胡麻故今并入油麻焉巨勝即胡麻之角巨如方勝者非二物也方莖以莖名狗蝨以形名油麻脂麻謂其多油脂也按張揖廣雅胡麻一名藤𢎞𢎞亦巨也别錄一名鴻藏乃藤𢎞之誤也又杜寳拾遺記云隋大業四年改胡麻曰交麻又别錄曰胡麻一名巨勝生上黨川澤秋採之青蘘巨勝苗也生中原川谷陶𢎞景曰胡麻八穀之中惟此最良純黑者爲巨勝巨者大也本生大宛故名胡麻又以莖方者爲巨勝圓者爲胡麻蘇恭曰其角作八稜者爲巨勝四稜者爲胡麻都以烏者爲良白者爲劣孟詵曰沃地種者八稜山田種者四稜土地有異工力則同蘇頌曰胡麻處處種之稀復野生苗硬如麻而葉圓鋭光澤嫩時可作蔬道家多食之本經謂胡麻一名巨勝陶𢎞景以莖之方圓分别蘇恭以角稜多少分别仙方有服胡麻巨勝二法功用小别是皆以爲二物矣或云即今油麻本生胡中形體類麻故名胡麻八穀之中最爲大勝故云巨勝乃一物二名如此則是一物而有二種如天雄附子之類故葛洪云胡麻中有一葉兩尖者爲巨勝别錄序例云細麻即胡麻也形扁扁爾其莖方者爲巨勝也今人所用胡麻之葉如荏而狹尖莖髙四五尺黄花生子成房如胡麻角而小嫩時可食甚甘滑利大腸皮亦可作布類大麻色黄而脆俗亦謂之黄麻其實黒色如韭子而粒細味苦如膽杵末略無膏油其說各異此乃服食家要藥乃爾差誤豈復得效也寇宗奭曰胡麻諸說參差不一止是今人脂麻更無他義以其種來自大宛故名胡麻今胡地所出者皆肥大其紋鵲其色紫黑取油亦多嘉祐本草白油麻與此乃一物但以色言之比胡地之麻差淡不全白爾今人通呼脂麻李時珍曰胡麻即脂麻也有遲早二種黒白赤三色其莖皆方秋開白花亦有帶紫艶者節節結角長者寸許有四稜六稜者房小而子少七稜八稜者房大而子多皆隨土地肥瘠而然蘇恭以四稜爲胡麻八稜爲巨勝正謂其房勝巨大也其莖髙者三四尺有一莖獨上者角纒而子少有開枝四散者角繁而子多皆因苗之稀稠而然也其葉有本團而末鋭者有本團而末分三丫如鴨掌形者葛洪謂一葉兩尖爲巨勝者指此蓋不知烏麻白麻皆有二種葉也按本經胡麻一名巨勝吳普本草一名方莖抱朴子及五符經竝云巨勝一名胡麻其說甚明至陶𢎞景始分莖之方圓雷斆又以赤麻為巨勝謂烏麻非胡麻嘉祐本草復分白油麻以别胡麻并不知巨勝即胡麻中丫葉巨勝而子肥者故承誤啟疑如此惟孟詵謂四稜八稜爲土地肥瘠寇宗奭據沈存中之說斷然以脂麻爲胡麻足以證諸家之誤矣又賈思勰齊民要術種收胡麻法即今種收脂麻之法則其爲一物尤爲可據今市肆間因莖分方圓之說遂以茺蔚子僞爲巨勝以黄麻子及大藜子僞爲胡麻誤而又誤矣茺蔚子長一分許有三稜黄麻子黑如細韭子味苦大藜子狀如壁蝨及酸棗核仁味辛甘竝無脂油不可不辨梁簡文帝勸醫文有云世誤以灰滌菜子爲胡麻則胡麻之訛其來久矣又胡麻氣味甘平無毒又白油麻氣甘大寒無毒李時珍曰胡麻取油以白者爲勝服食以黑者爲良天工開物凡麻可粒可油惟火麻胡麻二種胡麻即脂麻相傳西漢始自大宛來古者以麻爲五穀之一若專以火麻當之豈有當哉竊意詩書五穀之麻或其種已滅或即菽粟中之别種而漸訛其名號皆未可知也今胡麻味美而功髙即以冠百穀不爲過火麻子粒壓油無多皮爲布疏惡其值幾何胡麻數龠充腸移時不餒粔餌飴餳得粘其粒味髙而品貴其爲油也髪得之而澤腹得之而膏腥羶得之而芳毒厲得之而觧農家能廣植厚實可勝言哉種胡麻法或治畦圃或壟田畝土碎草淨之極然後以地灰微溼拌匀麻子而撒種之早者三月種遲者不出大暑前早種者花實亦待中秋乃結耨草之功惟鋤是視其色有黑白赤三者其結角長寸許有四稜者房小而子少八稜者房大而子多皆因肥瘠所致非種性也收子榨油每石得四十觔餘其枯用以肥田若饑荒之年則留供人食羣芳譜大麻莖髙五六尺枝葉扶疎葉狹而長狀如益母草葉一枝七葉或九葉五六月開細黄花成穗隨即結子似蘇子而大剝去皮作麻績之可爲布本草綱目李時珍曰麻從兩木在广下象屋下派麻之形也木音派广音儼餘見下註云漢麻者以别胡麻也又本經曰麻蕡一名麻勃麻花上勃勃者七月七日采之良麻子九月採入土者損人生太山川谷陶𢎞景曰麻蕡即牡麻牡麻則無實今人作布及履蘇恭曰蕡即麻實非花也爾雅云蕡枲實儀禮云苴麻之有蕡者註云有子之麻爲苴皆謂子也陶以蕡爲麻勃謂勃勃然如花者復重出麻子誤矣既以蕡爲米穀上品花豈堪食乎陳藏器曰麻子早春種爲春麻子小而有毒晚春種爲秋麻子入藥佳壓油可以油物寇宗奭曰麻子海東毛羅島來者大如蓮實最勝其次出上郡北地者大如豆南地者子小蘇頌曰麻子處處種之績其皮可以爲布農家擇其子之有斑黑文者謂之雌麻種之則結子繁他子則不然也本經麻蕡麻子所主相同而麻花非所食之物蘇恭之論似當矣然本草朱字云麻蕡味辛麻子味甘又似二物疑本草與爾雅禮記稱謂有不同者又藥性論用麻花云味苦主諸風然則蕡也子也花也其三物乎李時珍曰大麻即今火麻亦曰黄麻處處種之剝麻收子有雌有雄雄者爲枲雌者爲苴大科如油麻葉狹而長狀如益母草葉一枝七葉或九葉五六月開細黄花成穗隨即結實大如胡荽子可取油剝其皮作麻其稭白而有稜輕虛可爲燭心齊民要術云麻子放勃時㧞去雄者若未放勃先㧞之則不成子也其子黒而重可搗治爲燭即此也本經有麻蕡麻子二條謂蕡即麻勃謂麻子入土者殺人蘇恭謂蕡是麻子非花也蘇頌謂蕡子花爲三物疑而不決謹按吳普本草云麻勃一名麻花味辛無毒麻藍一名麻蕡一名青葛味辛甘有毒麻葉有毒麻子中仁無毒據此說則麻勃是花麻蕡是實麻仁是實中仁也普三國時人去古未逺說甚分明神農本經以花爲蕡皆傳寫脫誤耳陶氏及唐宋諸家皆不考究而臆度疑似可謂疎矣今依吳氏改正又麻勃吳普曰一名麻花李時珍曰觀齊民要術有放勃時㧞去雄者之文則勃爲花明矣又麻勃氣味辛温無毒又麻蕡吳普曰一名麻藍一名青葛李時珍曰此當是麻子連殻者故周禮朝事之籩供蕡月令食麻與犬麻可食蕡可供稍有分别殻有毒而仁無毒也又麻蕡氣味辛平有毒聖祖御製幾暇格物編沙蓬米凡沙地皆有之鄂爾多斯所產尤多枝葉叢生如蓬米似胡麻而小性暖益脾胃易於消化好吐者食之多有益作爲粥滑膩可食或爲米可充餅餌茶湯之需向來食之者少自朕試用之知其宜人今取之者衆矣本草綱目蘇頌曰亞麻子出兖州威勝軍苗葉俱青花白色八月上旬採其實用李時珍曰今陜西人亦種之即壁蝨胡麻也其實亦可榨油㸃燈氣惡不堪食其莖穗頗似茺蔚子不同又亞麻子氣味甘微温無毒本草綱目蘇頌曰蓖麻葉似大麻子形宛如牛蜱故名李時珍曰蓖亦作螕牛蝨也其子有麻㸃故名又蘇恭曰此人間所種者葉似大麻葉而甚大結子如牛蜱今胡中來者莖赤髙丈餘子大如皂莢核用之亦良韓保昇曰今在處有之夏生苗葉似葎草而大厚莖赤有節如甘蔗髙丈餘秋生細花隨便結實殻上有刺狀類巴豆青黄斑褐夏采莖葉秋采實冬采根曬乾用李時珍曰其莖有赤有白中空其葉大如瓠葉每葉凡五尖夏秋間椏裏抽出花穗纍纍黄色每枝結實數十顆上有刺攢簇如蝟毛而輭凡三四子合成一顆枯時劈開狀如巴豆殻内有子大如豆殻有斑㸃狀如牛螕再去斑殻中有仁嬌白如續隨子仁有油可作印色及油紙子無刺者良有刺者毒又蓖麻氣味甘辛平有小毒爾雅蕛苵注蕛似稗布地生穢草疏蕛一名苵似稗之穢草也布生於地莊子曰道在蕛稗是亦有米細小又曰若蕛米之在太倉是也六書故稗葉純似稻節間無毛實似蕡害稼爾雅翼孟子曰五穀者種之美者也茍爲不熟不如蕛稗蕛與稗二物也皆有米而細小莊子曰道在蕛稗言比於穀則微細而不精道亦在焉又曰若蕛之在太倉亦言小也爾雅蕛苵釋曰蕛一名苵似稗之穢草布生於地而稗則生下澤中故古詩曰蒲稗相因依氾勝之書曰稗水旱無不熟之時又特滋盛易得蕪穢良田畝得二三十斛宜種之以備㐫年又稗中有米熟時可𢷬取之炊之不減粢米又可釀作酒武帝時令典農種之一頃收二千斛斛得米三升大儉可磨食之蓋稗遇水旱無不熟而五穀則有熟不熟之時以此不熟方之於稗則爲不如耳草之似穀可養人者甚多博物志稱蒒草實食之如大麥本草稱東廧可爲飯又菵米可爲飯四月熟久食不饑狼尾草子作黍食之令人不饑又蒯草子亦堪食如秔米又蓬草子作飯無異秔米儉年食之此皆五穀之外可以接糧者故附著之本草綱目李時珍曰稗乃禾之卑賤者也故字從卑又陶𢎞景曰稗子亦可食又有烏禾生野中如稗荒年可代糧而殺蟲煮以沃地螻蚓皆死陳藏器曰稗有二種一種黄白色一種紫黑色紫黑色者似芑有毛北人呼爲烏禾又稗米氣味辛甘苦微寒無毒農政全書稗子有二種水稗生水田邊旱稗生田野中今處處有之苗葉似槮子葉色深緑脚葉頗帶紫色結子如黍粒大茶褐色味微苦性微温又稗多收能水旱可救儉孟子言五穀不熟不如荑稗淮南所謂小利者皆以此且稗稈一畝可當稻稈二畝其價亦當米一石宜擇嘉種於下田蓺之歲歲無絶倘遇災年便得廣植勝於流移捃拾遠矣􅭜子附一名龍爪粟一名鴨爪稗農政全書􅭜子生水田中及下溼地内苗葉似稻但差短梢頭結穗彷彿稗子穗其子如黍粒大茶褐色味甘本草綱目李時珍曰􅭜乃不黏之稱也又不實之貌也龍爪鴨爪象其穗岐之形又李時珍曰􅭜子山東河南亦五月種之苗如茭黍八九月抽莖有三稜如水中藨草之莖開細花簇簇結穗如粟穗而分數岐如鷹爪之狀内有細子如黍粒而細赤色其稃甚薄其味麤澀又􅭜子氣味甘濇無毒稂附詩曹風冽彼下泉浸彼苞稂爾雅稂童粱注稂莠類也疏今人謂之宿田翁或謂之守田也說文稂禾秀之穗生而不成者謂之蕫蓈爾雅翼稂惡草與禾相雜本草綱目稂一名狼尾草陳藏器曰生澤地似茅作穗廣志云子可作黍食李時珍曰莖葉穗粒並如粟而穗色紫黄有毛荒年亦可採食菵草附爾雅皇守田注似燕麥子如雕胡米可食生廢田中一名守氣爾雅翼菵米可爲飯生水田中苗子似小麥而小四月熟久食不饑爾雅所謂皇守田者也東廧附一名粱禾廣志東廧粒如葵子似蓬草色青黑十一月熟出幽涼并烏丸地本草綱目陳藏器曰東廧生河西苗似蓬子似葵九月十月熟可爲飯食河西人語曰貸我東廧償爾田粱李時珍曰相如賦東廧雕胡即此魏書云烏丸地宜東廧似穄可作白酒又廣志云粱禾蔓生其子如葵子其米粉白可作饘粥六月種九月收牛食之尤肥此亦一穀似東廧者也又東廧子氣味甘平無毒續博物志薏苡一名簳珠收子蒸令氣餾暴乾挼取之作飯麪主不饑農政全書本草名薏苡仁一名解蠡一名屋菼一名芑實一名􅀢俗名草珠兒又呼爲西番蜀秫生真定平澤及田野交趾生者子最大彼土人呼爲􅀢珠今處處有之苗髙三四尺葉似黍葉而稍大開紅白花作穗子結實青白色形如珠而稍長故名薏珠子味甘微寒無毒今人亦呼菩提子羣芳譜薏苡處處有之交趾者子最大出真定者佳今多用梁漢者氣劣於真定春生苗莖髙三四尺葉如黍葉開紅白花作穗五六月結實青白色形如珠子而稍長故呼薏珠子取用以顆小色青味甘黏牙者良形尖而殻薄米白如糯米此真薏苡也可粥可麪可同米釀酒本草綱目李時珍曰薏苡名義未詳其葉似蠡實葉而解散又似芑黍之苗故有解蠡芑實之名􅀢米乃其堅硬者有􅀢强之意苗名屋菼救荒本草名回回米又呼西番蜀秫俗名草珠兒又雷斆曰凡使勿用􅀈米顆大無味時人呼爲粳􅀈是也薏苡仁顆小色青味甘咬著人齒也李時珍曰薏苡人多種之二三月宿根自生葉如初生芑茅五六月抽莖開花結實有二種一種黏牙者尖而殻薄即薏苡也其米白色如糯米可作粥飯及磨麪食亦可同米釀酒一種圓而殻厚堅硬者即菩提子也其米少即粳􅀈也但可穿作念經數珠故人亦呼爲念珠云其根竝白色大如匙柄糾結而味甘又薏苡氣味甘微寒無毒欽定授時通考卷三十
