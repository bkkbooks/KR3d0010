body:
  text: 榖種稻二直省志書宛平縣物産稻有糯粳二種香河縣物産粳稻糯稻水稻旱稻昌平州物産稻處處有之惟玉泉山枹榆泉更佳膳米於是需焉房山縣土産稻紅白二種石窩稻色白粒大米粒美盛煮經三晝夜不餲遵化州物産稻有東方稻雙芒稻虎皮稻之類皆食米糯稻有旱糯白糯黃糯皆可釀酒種者粳稻九糯稻一旱田九水田一滿城縣土産稻有黃鬚者有烏鬚者有粳稻有旱稻米微紅又有糯稻淶水縣土産稻種於水田者惟石亭新莊村有之所出不多邢臺縣物産稻有三種紅口芒稻糯稻歷城縣方産稻粳糯也粳宜飯糯宜酒歷雖山城而城北一帶盡屬水田粳稻之美甲於山左鄒平縣物産稻漯水之濱近始播種新城縣物産稻東方瀕湖産水稻間有之泰安州物産稻紅白二種萊蕪縣物産稻有粳糯二種萊蕪水田皆旱稻故米不佳濱州物産稻沿河地可藝滋陽縣物産稻有糯有粳曹縣物産稻有數種水陸不同又粘者謂之糯米色黑宜釀巨野縣物産稻子黑白二色沂州物産稻有糯有粳青州府物産海上斥鹵原隰之地皆宜稻播種苗出耘過四五遍即坐而待穫但雨揚以時每畝可收五六石次四五石秋收見户舂米貿遷得髙價可比魚鹽若江南水田雖純藝稻然功多作苦農夫經歲胼胝泥淖之中收入反薄畝多二三石次一二石不如此中海稻功半而利倍也安邱日照雖有旱稻而粗硬不佳益都種之不多穫二年後俱變為莠矣水中亦然日照縣物産有糯有硬照産皆在陸地稍旱則失收農家不敢多種萊陽縣物産稻種分水旱紅白早晚昌邑縣物産稻水旱二種永安稻佳文水縣物産稻軟硬二種臨汾縣物産稻粳糯二種聞喜縣土産稻紅色惟董澤數村出洧川縣物産稻有旱稻水稻二種其色紅鄢陵縣土産稻不秧種紅澀欠佳洛陽縣土産稻香粳稻栁條青糯稻遂平縣土産稻屬黏米晚望水白馬尾池紅毛晚糯稻白稻紅粟稻羅山縣物産稻有早糯占晚白芒黑之屬光州土産稻白黃黑糯晚麻秈黃瓜秈駝黎回直頭秈望水白商城縣土産秈稻晚稻黑稻糯稻紅稻渭南縣物産稻有二種硬者炊飯名粳黏者釀酒名糯産花園及大嶺川者佳湭河川次之韓城縣土産澽壖宜稻志以小江南稱之然貿之域外者無幾西鄉縣土産稻類紅榖大小二種冷水榖百日榖麻黏榖銀珠榖香榖黃秧早金線早黃瓜早紅米早望水白安南黏青幹黏土黃黏鐵腳漢葉裏藏蓋早黃已上俱飯稻百莖稻黃殼糯栁條糯虎皮糯寸榖矮腳黃三百顆釣魚竿香兒糯麻榖糯已上俱酒稻六合縣物産稻之屬粳穿珠稻紅蓮稻榖色青有紅粒炊熟味甘香陸龜蒙詩近炊香稻識紅蓮六十日稻閃西風下馬看穗長救公飢軟稈青箭子稻了田青百日赤三朝齊靠籬望洗耙早五十日熟紫芒稻蟬鳴稻花裏黃鵪鶉秈觀音秈銀條秈落芒秈深水紅瓜熟稻晚白稻早白稻香粳稻大粒長胖農人畏種之云種多則傷田間榖糯趕陳糯虎皮糯火珠糯軟稈糯燕口糯槐花糯白殼糯堆粒糯光頭糯矮腳糯金叉糯待西風烏絲糯豬鬃糯佛手糯鐵梗糯魚麟糯隨秈糯香糯繩兒糯粒長不圓味最美懷寧縣物産秈稻種遲早不一其名甚多田有宜早稻者秋前收仍種晚禾有宜遲稻七月登揚者有八月九月登場者大約百日內熟糯稻有大糯有秈糯其名不一大糯較佳晚稻名晚白者佳赤與烏者次之宿松縣物産稻有粳秫二種為早榖為龍鬚早為團白為小白為無名種為休寧矮為金包銀為賽子白為三度禾為鴨掌為拗馬為牽岡為水波為寒先皆粳屬為魚子為虎皮為蜜蜂為白秈皆秫屬歙縣物産秈有桃花紅有髙郵紅自髙郵移種者米色如胭脂有白禾稻之稍遲者長稃白米質柔味甘香瑩可愛然實輕易取盈於量而歉於衡田主貴之佃户不貴也粳土人呼為大米然地不甚宜種名不一糯其種有青稈羊脂白矮釀之多酒有早歸生六月成有交秋糯七月成寧國縣土産稻各種皆有其米不黏者名粳稻有掃帚白百日黃六月烏三朝齊銀條白葉裏藏矮萁早長萁早茄柯早下馬早湖洲秈白沙秈蝦鬚秈蓮子秈竹了秈毛黃秈寒秈鼠牙秈金稈秈鐵稈秈冷水秈金裹銀三尺黃瘦八尺雁腳紅金絲黃湖洲白生鬚黃老來白光頭黃烏間白穿珠白思憶稻矮赤稻撩霜晚霜下晚釣竿晚蘇州晚觀音晚隔山拖沿丘熟福建秈三擔禾愛八擔紅粳稻其米黏者名糯稻有烏嘴糯抄秋糯早紅糯遲秈糯白殼糯紅殼糯鴨腳糯烏節糯硃砂糯楊枝糯栁條糯楊花糯青秸糯柿紅糯麻子糯雪花糯魚子糯馬鬚糯望水白齊頭黃蓋下萁見缸消八斗糙溼縣物産稻有早稻晚稻秈稻秫稻山稻南陵縣物産粳稻晚稻白芒稻黑稻糯稻貴池縣土宜粳其名有六十日白六十日紅八十日白掃帚白百日黃六月烏江西早矮萁早蠐包早茄柯早下馬早下馬看救公飢湖廣秈廣東秈白沙秈蝦鬚秈蓮子秈竹子秈毛黃秈寒秈鼠牙秈金稈秈冷水秈金裹銀三月黃雁腳紅撩霜晚霜下晚釣竿晚將軍晚蘇州晚觀音晚糯其名有烏角糯抄秋糯早紅糯白殼糯紅殼糯栁條糯楊花糯青秸糯隨秈糯柿紅糯麻子糯魚子糯雪花糯馬鬃糯望水白齊頭黃蓋下箕見紅消七斗糙青桿糯江西瀘溪有糯稱池州占蓋諸種之一也太平府物産多秈稻多晚稻多糯稻有黑稻秈十三種秈占城稻有六十日稻俗稱拖犂歸有赤紅秈有百日秈黃秈稻細秈稻蘆粳秈麻秈稻大粒秈蝦鬚秈穿珠秈一名觀音白晚稻六種早晚稻一名望水白又名大子白晚稻白稃白芒白米雁來糧弔梗青一名寒青稻糯稻十三種早糯稻一名雀不覺又名秈糯隨秈糯燕口紅虎皮糯硃砂糯一名胭脂糯羊鬚糯黃糯稻即秫稻細頸糯青殼糯抄社糯珠子糯橘皮糯紅陸糯廬江縣土産紅秈稻白秈稻早糯稻晚糯稻黑晚稻白晚稻香稻舒城縣物産白早稻黃瓜秈直頭秈江南秈福德禾梳子秈白晚稻黑晚稻銀條秈雀不知紅嘴糯女兒紅芝麻糯堆榖糯羊鬚糯銅嘴糯馬鬃糯觀音糯青科糯齊秈早黃州糯無為州物産竹牙秈麻菰秈落芒秈早白稻早紅稻青柯糯虎皮糯鵲不知烏尖糯紅嘴糯白晚稻紅晚稻黑晚稻巢縣土産紅稻有百日秈直頭秈麻菰秈竹牙秈四紅秈胡秈稻王瓜秈拖黎黃白稻有觀音秈銀條秈六十日秈青秸秈冷水秈大粒秈亂芒秈麻榖秈千家愛糯稻有羊鬚糯硃砂糯虎皮糯栁條糯齊秈糯牛筋糯青科糯紅芒糯馬鬃糯纍糯深水糯燕尾糯晚稻有黑晚稻紅晚稻臨淮縣物産粳稻有麻子秈稻早先白稻黃瓜秈稻鵪鶉秈稻烏山秈稻脹破榖稻矮白稻紅芒稻黑稻糯稻有羊鬚糯馬鬃糯虎皮糯烏鬚糯槐花糯辮子糯大糯小糯六月黃糯定逺縣物産麻子秈黃瓜秈烏山秈早先白鵪鶉秈脹破殼矮白稻紅芒稻黑稻女兒紅羊鬚糯馬鬃糯烏鬚糯大糯小糯辮子糯虎皮糯槐花糯六月糯五河縣物産稻有秈稻芒稻香稻早白稻深水紅稻黃鷺公稻老來變稻下馬看稻黑糯胭脂糯馬鬃糯飛上倉糯泗州物産香稻亦芒稻也類晚粳色微黃紅稃白實鹽城縣物産稻有粳糯二種有早晚二熟有紅黃紫赤黑斑青白數色清河縣物産有稻曰粳曰糯曰秈秈粳之早熟者曰旱稻旱田種者曰小芒稻後種先熟者曰香稻味之芬芳者亦粳屬也治北七十里舊有香稻莊揚州府物産有黃稑烏節大小香斑秈及小赤秈小白秈龍爪秈六月秈齊梅秈蘆稈秈葉裏秈麻斤秈大鵝秈白殼白芒早白晚白晚黃赤鬚黑支焦黃烏口大紅芒小紅芒下馬看六月白鷺鷀白了田青救公飢綆子籠下歡潮水白拖犂歸深水紅梅裏黃弔殺雞張子赤磊塊赤山骨崙鶴腳烏馬尾赤泰州紅又名海陵紅紫紅芒雀不知觀音白皆粳類趕陳羊脂燕口羊鬚秋紅橘皮烏飪麻斤虎皮豬鬃粉皮秋風雀不覺皆秫屬儀真縣物産多糯曰燕口曰紅芒曰麻筋曰穗前黃多晚曰江南白曰駝兒白曰深水紅曰長芒白多秈曰瓜熟曰龍瓜曰鯽魚曰斑秈曰葉裏藏有黑稻曰鶴腳烏曰豬林髙郵州物産早稻五十日六十日秈稻斑秈六月秈齊梅秈蘆稈秈龍爪秈鯽魚秈葉裏秈苞裏齊拖犂歸小赤秈小白秈麻斤秈大鵝秈大香秈小香秈白稻早白稻晚白軟頸頸白羊鬚白駝兒白青秸白青芒兒白頂霜白晚稻黃花稻小黃稻深水紅鶴腳烏下馬看弔殺雞母豬麟糯稻秋風糯麻斤糯烏絲糯趕上陳雀不覺半鬚糯寶應縣土産白秈一水秈玉斑秈齊頭白六月白香稻紅秈早紅蓮觀音栁苗強水不易沒農多種之古上樓有芒宜水田五十日七月上旬即熟視他種所穫較少蘆管秈宜水田小黃稻宜旱田晚稻俗呼上白米是也刈穫最遲畏水不敢多種大晚稻紅米宜水田糯稻胭脂糯殼紅米白烏金糯米黑色虎皮糯殼色斑駁魚鱗糯拖犂歸七月熟趕上陳七月熟雀不知七月熟泰州物産海陵紅俗名泰州紅馬尾赤鶴腳烏雀不知隨犂歸救公飢六十日白觀音秈駝兒白小香早香黑早白早早秈斑秈焦芒青芒赤芒黃芒紫紅芒烏殼深水紅了田青下馬看鯽魚秈香粢鱔魚黃皆粳稻趕陳糯羊脂糯燕口糯羊鬚糯虎皮糯秋紅糯紅糯皆秫稻通州物産稻種甚多有早黃晚黃早白晚白早紅晚青青芒白芒青鬚黑皮黃稑白殼烏節焦黃鷺鷀白串珠白潮水白深水紅了青田其粒長性硬曰紅白秈曰稚子斑早熟者曰救公飢曰拖犂歸茂密而庭碩者曰下馬看見收曰粃六升曰籠下歡曰薄十分瘦長雪色曰箭子稻中秋熟曰閃西風初秋可蒔曰六十日不畏旱者曰撇殺天和他米炊之甚香曰香滋糯曰川米早白最先熟而晚白則皮薄易釀芒赤米白曰虎皮性軟色芳曰粉皮一曰羊脂稈硬曰豬鬃皮厚曰薑黃早種宜釀曰趕陳雖熟不枯曰青枝稈柔可以為索曰麻筋亦有香如香滋者曰香粳吳縣物産稻粳之屬箭子稻紅蓮稻䆉稏稻雪裏揀師姑粳早白稻金成稻烏口稻早稻中秋稻紫芒稻枇杷紅下馬看大頭花瓜熟稻晚白稻黃梗秈一粒珠麻皮粳作飯粒長薄十分作粥易膩梗殺蟛蜞香子米八月白牛尾白丈水紅老來紅五石稻救公飢包十石纍泥烏土塘青天落黃糯之屬金叉糯閃西風羊脂糯青稈糯秋風糯趕陳糯矮糯鵝脂糯川粳糯虎皮糯羊鬚糯胭脂糯野人糯棐子糯恍雄雞烏鬚糯觀音糯梗秈糯佛手糯小娘糯蟹殼糯喜蛛糯鴨嘴糯香梗糯珠子糯長洲縣物産六十日稻四月種六月熟米小色白遲至八九十日熟一名早紅蓮又名救公飢紫芒稻紫榖白粒金叉糯粒長鵝兒糯崑山縣土産稻之屬三十有六晚白稻紅緑稻早粳稻金城稻六十日稻中秋稻雪裏揀紫芒稻救公飢下馬看紅蓮稻麥爭場香粳稻薄十分黃梗秈麻子烏烏口稻百日赤稻烏兒稻趕陳糯胭脂糯鐵梗糯虎皮糯羊鬚糯再熟稻棐子糯水晶糯小娘糯香子糯閃西風稻竈王糯矮兒糯瞞官糯羊脂糯金叉糯蘆黃糯常熟縣物産紅蓮稻芒長粒大箭子稻粒長色白味香晚熟早白稻晚白稻又名蘆花白䆉稏稻色斑粳長性硬或名勝紅蓮紫芒稻紫殼白米雪裏揀稈軟有芒粒大色白師姑粳即矮稻無芒粒白救公飢六十日可望熟又名早紅蓮香子稻一名香􅢸色斑粒長以一勺入他米炊之飯皆香閃西風一名早中秋八月半熟麥爭場最早熟百日赤芒赤米白早熟占城稻即早稻金城稻粒尖性硬又名赤榖烏口稻皮芒黑秋初亦可種下馬看即江隂黃粳俗呼三朝齊枇杷紅皮薄色如枇杷時裏白早熟一名節澳稻烏兒稻芒黑米白即晚烏軟黃粳米白粒大性軟味香美金叉糯粒長性軟棗子糯殼黑青稈糯皮黃粒白已熟而稈猶青羊鬚糯色白性軟趕陳糯米白熟早鵝脂糯川粳糯粒大無芒一名圓頭糯虎皮糯色斑晚熟胭脂糯殼紅粒白矮兒糯晚熟瞞官糯即冷粒糯鐵梗糯稈徑無芒畏風易落細葉糯米白性軟吳江縣物