body:
  text: 蓄聚社倉隋書食貨志開皇五年五月工部尚書長孫平奏令諸州百姓及軍人勸課當社共立義倉收穫之日隨其所得勸課出粟及麥於當社造倉窖助之即委社司執帳檢校每年收積勿使損敗若時或不熟當社有飢饉者即以此穀賑給十六年正月又詔秦疊成康武文芳宕旭洮岷渭紀河廓豳隴涇寧原敷丹延綏銀扶等州社倉並於當縣安置二月又詔社倉準上中下三等稅上户不過一石中户不過七斗下户不過四斗唐書食貨志其凶荒則有社倉賑給名臣奏議宋張方平上倉廪論略比者敕書諭州縣使立義倉徒有空文而無畫一之制於兹三年天下皆無立者誠監前代之善䇿為齊民之大計明立條式權其斂出令天下之縣各於逐鄉築為囷廪於中户已上為之等級課入穀麥其輸入之數視嵗薄厚為之三品縣掌其籍鄉吏守之遇嵗之飢發以賑給小飢則約小熟之所斂中飢則約中熟之所斂大飢則約大熟之所斂專自縣鄉檢校之無使州郡計司侵取雜用焉此則收自優户穰嵗之有餘散於貧人凶年之不足不使兼并賈人挾輕資藴重積管其利以豪奪於吾民此其協於大易裒多益寡稱物平施之義符於周官黨使相救州使相賙之法契詩人京坻之頌應時令振乏之理使民足而知順讓益歸於本業誠為國之大利也又劉行簡轉對奏狀略義倉之法論始於隋增廣於唐國朝因焉隋開皇間長孫平請令諸州百姓勸課同社共立義倉收穫之日各出粟麥藏焉社司執帳檢校多少嵗或不登則發以賑之然立法有未備也至唐貞觀間戴胄請自王公以下爰及衆庶計所墾田稼穡畝頃每至秋熟以理勸課盡令出粟各於所在為立義倉國朝乾德間天子哀嵗之不登而倉吏不以時出與民於是著發粟之制使不待詔令其後病吏之煩擾而民罹轉輸之困又罷之至神宗始復舊制民到于今賴焉然而推行之意有未盡合於古者豈得不論且所謂義倉者取粟於民還以賑之固不可以不均今也置倉入粟止在州郡嵗飢散給而山澤僻逺之民往往不霑其利其力能赴州就食者蓋亦鮮少况所得不足償勞流離顛沛有不可勝言者此豈社倉之本意哉臣愚謂義倉之粟當於本縣鄉村多置倉窖自始入粟以及散給悉在其間大縣七八處小縣三四處逺近分布俾適厥中若未有倉窖則寄寺觀或大姓之家縣令總其凡以時檢校遇飢饉時丞簿尉等分行村鄉計口給厯次苐支散旬一周之庶幾僻逺之民均受其賜不復棄家流轉道路此利害之較然者也宋朱子延和奏劄臣所居建寧府崇安縣開耀鄉有社倉一所係昨乾道四年鄉民艱食本府給到常平米六百石委臣與本鄉土居朝奉郎劉如愚同其賑貸至冬收到元米次年夏間本府復令依舊貸於人户冬間納還臣等申府措置每石量收息米二斗自後逐年依舊斂散或遇小歉即蠲其息之半大飢即盡蠲之至今十有四年量支息米造成倉厫三間收貯已將元米六百石納還本府其見管三千一百石並是纍年人户納到息米已申本府照會將來依前斂散更不收息每石只收耗米三升係臣與本鄉土居官及士人數人同共掌管遇斂散時即申府差縣官一員監視出納以此之故一鄉四五十里之間雖遇凶年人不缺食竊謂其法可以推廣行之他處乞特依義役體例行下諸路州軍曉諭人户有願依此置立社倉者州縣量支常平米斛責與本鄉出等人户主執斂散每石收息二斗仍差本鄉土居官員士人有行義者與本縣官同其出納收到息米十倍本米之數即送元米還官却將息米斂散每石只收耗米三升其有富家情願出米作本者亦從其便息米及數亦與撥還如有鄉土風俗不同者更許隨冝立約申官遵守實為久逺之利其不願置立去處官司不得抑勒則亦不至騷擾朱子社倉法一逐年五月下旬新陳未接之際預于四月上旬申府乞依例給貸仍乞選差本縣清強官一員人吏一名斗子一名前來與鄉官同其支貸一申府差官訖一靣出榜排定日分分都支散先遠後近一日一都曉示人户産錢六百文以上及自有營運衣食不闕不得請貸各依日限具狀狀內開説大人小兒口數結保每十人結為一保遞相保委如保內逃亡之人同保均備取保十人以下不成保不支正身赴倉請米仍仰社首保正副隊長大保長並各赴倉識認靣目照對保簿如無偽冒重疊即與簽押保明其社首保正等人不保而掌主保明者聽其日監官同鄉官入倉據狀依次支散其保明不實别有情弊者許人告首隨事施行其餘即不得妄有邀阻如人户不願請貸亦不得妄有抑勒一收支米用淳熙七年十二月本府給到新添黑官桶及官斗仰斗子依公平量其監官鄉官人從逐廳只許兩人入中門其餘並在門外不得近前挨拶攙奪人户所請米斛如違許被擾人當廳告覆重作施行一豐年如遇人户請貸官米即開兩倉存留一倉若遇飢歉則開第三倉專賑貸深山窮谷耕田之民庶幾豐荒賑貸有節一人户所貸官米至冬納還不得過十一月下旬先于十月上旬定日申府乞依例差官將帶吏斗前來公共受納兩平交量舊例每石收耗米二斗今更不收上件耗米又慮倉厫折閲無所從出每石量收三升準備折閲及支吏斗等人飯米其米正行附厯收支一申府差官訖即一面出榜排定日分分都交納先近後逺一日一都仰社首隊長告報保頭告報人户遞相糾率造一色乾硬糙米具狀同保共為一狀未足不得交納如保內有人逃亡即同保均備納足赴倉交納監官鄉官吏斗等人至日赴倉受納不得妄有阻節及過數多取其餘並依給米約束施行其收米人吏斗子要知首尾次年夏支貸日不可差換一收支米訖逐日轉上本縣所給印厯事畢日具總數申府縣照會一每遇支散交納日本縣差到人吏一名斗子一名社倉算交司一名倉子二名每名日支飯米一斗約半月發遣裹足米二石共計米一十七石五斗又貼書一名貼斗一名各日支飯米一斗約半月發遣裹足米六斗共計四石二斗縣官鄉官人從十七名各日支飯米五升十日共計米八石五斗已上共計米三十石二斗一年收支兩次共用米六十石四斗逐年蓋墻并買藳薦收補倉厫約米九石通計米六十九石四斗一排保式某里第某都社首某人今同本都大保長隊長編排到都內人口數下項一請米狀式某都第某保隊長某人大保長某人下某處地方保頭某人等幾人今遞相保委就社倉借米每大人若干小兒減半候冬收日備乾硬糙米每石量收耗米三升前來送納保內一名走失事故保內人情願均備取足不敢有違謹狀一簿書鎖鑰鄉官公共分掌其大項收執須同監官簽押其餘零碎出納委鄉官公共掌管須要均平不得徇私容情别生姦弊一如遇豐年人户不願請貸至七八月而産户願請者聽一倉內屋宇什務仰守倉人常切照管不得毁損及借出他用如有損失鄉官點檢勒守倉人備償如些小損壞逐時修整大段改造臨時具因依申府乞撥米斛朱子大全集建安五夫社倉記常平義倉有古法之遺意然皆藏於州縣所惠不過市井遊惰輩至於深山長谷力穡逺輸之民則雖飢餓致死而不能及又其為法太密使吏之避事畏法者視民之殍而不肻發往往全其封鎖遞相傳授或至纍數十年不一省一旦甚不獲已然後發之則已化為浮埃聚壤不可食矣夫以國家愛民之深其慮豈不及此然而未有所改者豈不以里社不能皆可任之人欲一聽其所為則恐其計私以害公欲謹其出入同於官府則鉤校靡密上下相遁其害更有甚於前所云者是以難之而有弗暇耳是倉也處於諸邑之里社主于鄉曲之士君子斂散有經維持有要即此倉之粟活此鄉之民脫遇阻飢朝取暮獲讀周禮旅師遺人之官觀其頒斂之疏數委積之逺邇為之制數甚詳且密聖人既竭心思繼之以不忍人之政其不可及如此宋史食貨志淳熙八年浙東提舉朱熹請以社倉法行於倉司時陸九淵在敕令局見之曰社倉幾年矣有司不復舉行是以遠方無知者遂編入賑恤宋史儒林傳真德秀知潭州易穀九萬五千石分十二縣置社倉以遍及鄉落又黃震通判廣德軍初孝宗頒朱熹社倉法於天下而廣德則官置此倉民困於納息至以息為本而息皆橫取民窮至自經人以為熹之法不敢議震曰法出於堯舜三代聖人猶有變通安有先儒為法不思救其弊耶况熹法社倉歸之於民而官不得與官雖不與而終有納息之患震為别買田六百畝以其租代社倉息約非凶年不貸而貸者不取息續文獻通考元世祖時趙天麟上䇿言至元六年有旨每社立一義倉社長主之官司不得拘檢借貸勒支遇歉嵗就給社民食用社長明置收支文厯無致損耗今社倉多有空乏處伏望詔諭農民一社立社長社司各一人社下諸家共穿築倉窖子粒成熟之時計田畝之多寡而聚之凡納例常年每畝粟率一升稻率二升大有年聽自相勸督而增數納之水旱蝗聽自相免同社豐歉不均宜免其歉者飢饉則計口數之多寡而散之凡出例每口日一升儲多每口日二升勒為定體社長社司不得私用官司不得拘檢借貸如是則非惟共相賑救義風亦行矣明史食貨志嘉靖八年令各撫按設社倉令民二三十家為一社擇家殷實而有行義者一人為社首處事公平者一人為社正能書算者一人為社副每朔望會集别户上中下出米四斗至一斗有差斗加耗五合上户主其事年飢上户不足者量貸稔嵗還倉中下户酌量振給不還倉有司造册送撫按嵗一察核倉虛罰社首出一嵗之米其法頗善然其後無力行者明實録嘉靖中侍郎王廷相言備荒之政莫善於古之義倉若立倉於州縣則窮鄉就倉旬日待斃宜貯之里社定為規式一村之間約二三百家為一會每月一舉第上中下户捐穀多寡各貯於倉而推有德者為社長善處事能會計者副之若遭凶嵗則計户而散先中下者後及上户上户責之償中下者免之凡給貸悉聽於民第令登記册籍以備有司稽考則既無官府編審之煩亦無奔走道路之苦從之廣治平略天啓四年兩浙大水杭州推官蔡懋德建議請有司稍捐羡贖富户隨力捐資修建社倉倣朱子法而變通之令社倉分𨽻各里不似昔之總𨽻於官令官府多方措置不似昔之止勸好義輸納令倉榖司之約長隨時斂散生息不入查盤不似昔之一經封貯即入查盤惟有年年減耗令散穀只在本里賑貸先定極貧次貧按册可稽不似昔之遇荒議賑貧民擁擠難稽署錢塘者匝月修復社倉三十所積粟九百餘石撫按頒其法於通省民賴以濟又崇禎十三四年間連嵗旱荒中書舍人陳龍正舉社倉法於本鄉每區將附近各村居人挨次畫圖列名置簿插青之際力不足者户貸米五斗多者一石至冬加息二分納還借貸之時須貼鄰五家共立一票稍寓保結之意倘有不守本業浪遊花費到冬無出難於清楚者不得姑作人情至於收放總用本色不于例息二分之外稍有參差諸縣倣行之御史李悅心上其法於朝大清會典康熙四十二年諭直𨽻各省州縣雖設有常平倉收貯米石遇飢荒之年不敷賑濟亦未可定應於各村莊內俱設立社倉收貯米石直𨽻有滿洲莊頭可合數村共立一社倉其管理社倉事宜令莊頭內有情願經管者交與收貯百姓村莊公設社倉百姓內有情願經管者交與收貯以備飢荒傳諭直𨽻巡撫如設立社倉果有益於民生著各省亦照例於各村莊設立社倉收貯穀石大學士會同九卿詳議遵旨議定設立社倉於本鄉捐出即貯本鄉誠實之人經管上嵗加謹收貯中嵗糶借易新下嵗量口發賑又康熙四十五年覆準直屬社倉四十一二三等年勸捐米穀共七萬四千九百七十石零出借窮民得息米一千五十一石零又四十四年永保二府陸續捐穀四百三十五石零俱貯各屬社倉係本鄉捐出者即貯本鄉令本鄉誠實之人經管又雍正二年諭社倉之設原以備荒歉不時之需用意良厚然往往行之不善致滋煩擾官民俱受其纍朕以為奉行之道宜緩不宜急宜勸諭百姓聽民便自為之而不當以官法繩之也近時各省漸行社倉之法貯蓄於豐年取之於儉嵗俾民食有賴而荒歉無憂朕心深為嘉悅但因地制冝須從民便是在有司善為倡導於前留心照應於後使地方有社倉之益而無社倉之擾督撫當加意體察又雍正二年覆準社倉之法原以勸善興仁該地方官務須開誠勸諭不得苛𣲖以滋煩擾至收貯米石先於公所寺院收存俟息米已多成造倉厫收貯設立簿册逐一登明其所捐之數不拘升斗積少成多若有奉公樂善捐至十石以上給以花紅三十石以上奬以匾額五十石以上遞加奬勵其有好善不倦年久數多捐至三四百石者該督撫奏聞給以八品頂𢃄其每社設正副社長擇端方立品家道殷實者二人果能出納有法鄉里推服令按年給奬如果十年無過該督撫題請給以八品頂帶徇縱者即行革懲侵蝕者按律治罪其收息之多寡每石收息二斗小歉減息一半大歉全免其息祇收本穀至十年後息已二倍於本祇以加一行息其出入之斗斛照部頒斗斛公平較量社長預于四月上旬申報地方官依例給貸定日支散十月上旬申報依例受納兩平較量不得抑勒多收臨放時願借者先報社長州縣計口給發交納時社長先行示期依限完納其册籍之登記一社設立用印官簿一樣二本一本社長收執一本繳州縣存查登記數目毋得互異其存縣一本夏則五月申繳至秋領出冬則十月申繳至來春領出不許遲延以滋弊竇每次事畢後社長本縣各將總數申報上司如有地方官抑勒那借強行糶賣侵蝕等事許社長呈告上司據實題恭又雍正三年覆準河南社倉預造排門細册將姓名年貌住址以及官紳士庶商賈逐一注明送官用印存案日後借貸悉以此為凖其遊手好間者不許借貸於正副社長外再公舉一身家殷實者總司其事令其不時查察如有欺隱令其賠償果能使倉儲充牣題請準給恩典以示激勸此項積貯無論官員不得撥用即同邑之社亦不得以此應彼如有官員抑勒那借許社長呈告上司據實題恭其所需一切紙張筆墨以及人工飯食或行勸諭或撥罰項以充其用不得濫行科斂致滋擾纍至積米既多於夏秋之交平糶秋成照時價採買還倉義倉隋書長孫平傳開皇三年徴拜度支尚書奏令民間每秋家出粟麥一石已下貧富差等儲之閭巷以備凶年名曰義倉又食貨志是時義倉貯在人間多有費損開皇十五年二月詔曰本置義倉止防水旱百姓之徒不思久計輕爾費損於後乏絶又北境諸州異於餘處雲夏長靈鹽蘭豐鄯涼甘瓜等州所有義倉雜種並納本州若有旱儉少糧先給雜種及逺年粟通典唐貞觀初天下始置義倉每有飢饉則開倉賑給高宗永徽二年九月頒新格義倉據地取稅實是勞煩宜令户出粟上上户五石餘各有差唐書食貨志尚書左丞戴胄建議自王公以下計墾田秋熟所在為義倉嵗凶以給民太宗善之乃詔畝稅二升粟麥粳稻隨土地所冝寬鄉斂以所種狹鄉據青苗簿而督之田耗十四者免其半耗十七者皆免之商賈無田者以其户為九等出粟自五石至於五斗為差下下户及夷獠不取焉嵗不登則以賑民或貸為種子則至秋而償宋史食貨志太祖乾德初詔諸州於各縣置義倉嵗輸二稅石别收一斗民飢欲貸充種食者州長吏貸訖然後奏聞後以輸送煩勞罷之又明道二年詔議復義倉不果景祐中集賢校理王琪請復置令五等以上户隨夏秋二稅二斗别輸一升水旱減稅則免輸州縣擇便地置倉貯之領於轉運使計以一中郡正稅嵗八十萬石則義倉可得五千石推而廣之則利博矣且兼并之家占田常廣則義倉所入常多中下之家占田常狹則義倉所入常少及水旱振濟則兼并之家未必待此而寄中下之民實先受其賜矣事下有司會議議者異同而止慶厯初琪復上其議仁宗納之命天下立義倉詔上三等户輸粟已而復罷其後賈黯又請倣隋制立民社義倉詔天下州軍遇年穀豐登立法勸課蓄積以備凶災然當時牽於衆論終不果行文獻通考宋高宗紹興二十八年趙令詪言州縣義倉米積久陳腐乞出糶及水旱災荒不拘檢放及七分便許賑濟沈該奏在法義倉止許賑濟若出糶恐失初意乃令量糶三之一樁收價錢次年收糴撥還續文獻通考遼聖宗統和十三年令郡縣置義倉嵗秋熟社民隨所穫户出粟儲社倉司籍其目嵗歉發以賑民時沿邊諸州各有和糴倉出舊易新許民自願假貸收息二分所在二三十萬石元史食貨志元初立義倉於鄉社世祖至元二十三年又以鐵課糴糧充貯義倉續文獻通考延祐二年四月敕郡縣各社復置義倉至治元年五月御史劉恆請興義倉泰定二年九月以郡縣飢敕有司治義倉大清會典雍正四年兩淮衆商公捐銀兩奉旨以三十萬兩為江南買貯米穀蓋造倉厫之用賜名鹽義倉遵旨議定於揚州府治建倉積貯每年於青黃不接之時照存七糶三之例出陳易新或於米貴之時開倉平糶總至秋成糴補欽定授時通考卷五十六
