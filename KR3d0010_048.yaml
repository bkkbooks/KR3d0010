body:
  text: 欽定四庫全書欽定授時通考卷四十八勸課本朝重農敕諭二世宗憲皇帝雍正元年諭户部朕臨御以來宵旰憂勤凡有益於民生者無不廣為籌度因念國家承平日久生齒殷繁地土所出僅可贍給偶遇荒歉民食維艱將來戶口日滋何以為業惟開墾一事於百姓最有裨益但向來開墾之弊自州縣以至督撫俱需索陋規致墾荒之費浮於買價百姓畏縮不前往往膏腴荒棄豈不可惜嗣後各省凡有可墾之處聽民相度地宜自墾自報地方官不得勒索胥吏亦不得阻撓至升科之例水田仍以六年起科旱田以十年起科著著為定例其府州縣官能勸諭百姓開墾地畝多者準令議敘督撫大吏能督率各屬開墾地畝多者亦準議敘務使野無曠土家給人足以副朕富民阜俗之意諭禮部國家祀典必貴誠潔先農壇每嵗展祀且為親耕藉田之所最宜清肅舊制圍墻內有地一千七百畝以二百畝給壇戶種植五榖蔬菜以供祭祀餘一千五百畝每年交租銀三百兩以備修理聞康熙四十年間內務府撥給園頭耕種粢盛蔬菜無所從出惟向市井採買殊非潔淨精誠之意今著園頭清還地畝仍給太常寺壇戶耕種以備祭祀之需餘地一千五百畝著將內外墻查明丈尺每種地十畝估計令其修墻若干務期加謹葺護母致傾壞每年將太常寺少卿派出一員不時稽察雍正二年諭直𨽻督撫等官朕惟撫養元元之道足用為先朕自臨御以來無刻不厪念民依重農務本業已三令五申矣但我國家休養生息數十年來戶口日繁而土地止有此數非率天下農民竭力耕耘兼收倍穫欲家室盈寧必不可得周官所載巡稼之官不一而足又有保介田畯日在田間皆為課農設也今課農雖無專官然自督撫以下孰不兼此任也其各督率有司悉心相勸並不時咨訪疾苦有絲毫妨於農業者必為除去仍於每鄉中擇一二老農之勤勞作苦者優其奬賞以示鼓勵如此則農民知勸而惰者可化為勤矣再舍傍田畔以及荒山不可耕種之處量度土宜種植樹木桑柘可以飼蠶棗栗可以佐食桕桐可以資用即榛楛雜木亦可以供炊㸑其令有司督率指畫課令種植仍嚴禁非時之斧斤牛羊之踐踏姦徒之盜竊亦為民利不小至孳養牲畜如北方之羊南方之彘牧養如法乳字以時於生計不無裨益總之小民至愚經營衣食非不迫切而於目前自然之利反多忽略所賴親民之官委曲周詳多方勸導庶使踴躍爭先人力無遺而地利殆盡不惟民生可厚風俗亦可還淳爾督撫等官各體惓惓愛民之意實心奉行倘視為具文茍且塗飾或反以擾民則尤其不可也諭直省督撫朕惟四民以士為首農次之商賈其下也漢有力田孝弟之科而市井子孫不得仕宦重農抑末之意庶為近古今士子讀書砥行學成用世國家榮之以爵祿而農民勤勞作苦手胼足胝以供租賦養父母育妻子其敦龎淳朴之行豈惟工賈不逮亦非不肖士人之所能及雖寵榮非其所慕而奬賞要當有加其令州縣有司擇老農之勤勞儉朴身無過舉者嵗舉一人給以八品頂帶榮身以示鼓勵諭直省總督巡撫社倉之設原以備荒歉不時之需用意良厚然往往行之不善致滋煩擾官民俱受其纍朕意以為奉行之道宜緩不宜急宜勸諭百姓聽其自為之而不當以官法繩之也近聞各省漸行社倉之法貯蓄於豐年取資於儉嵗俾民食有賴而荒歉無憂朕心深為嘉悅但因地制宜須從民便是在有司善為倡導於前留心稽核於後使地方有社倉之益而無社倉之害此則爾督撫所當加意體察者也雍正三年諭大學士等古者視嵗之上中為儲蓄之節蓋官民經畫久逺不為一時茍且之計積之於豐年用之於歉嵗所謂有備無患法良而意美也朕自臨御以來宵旰勤求無刻不以民依為念乃重農積粟之詔屢下而閭閻卒少蓋藏官倉亦多虧缺即如直𨽻保定等府去嵗頗稱有秋今春二麥亦熟乃以夏秋雨水過多田禾被潦而民間遂有飢色幾至流離若非多方賑恤窮民必至失所此皆草野無知食不以時用不以禮但快目前之有餘罔計異日之不足一遭旱潦追悔無從至於常平通倉原為備荒而設乃有司奉行不力多至缺額罪何可逭兹據江南浙江江西湖廣福建河南山西陜西廣東廣西雲南貴州等省督撫報稱今嵗秋成八九十分不等朕覽奏不勝慰悅又重為吾民計及長久宜乘此時講求儲蓄之道以備將來該督撫等可轉飭有司遍行曉諭務撙節愛惜各留餘地預為他時緩急之需社倉之法亦宜趁此豐年努力行之勿但視為虛文故事朕為吾民籌畫養贍之道惓惓於懷無時或釋而吾民自謀其身家若但茍且因循不復長顧逺慮則重負朕軫念元元之意矣至於州縣倉儲向有虧缺者若不趁此豐收之時速行買補將來發覺斷不姑貸慎之雍正四年諭內閣國以民為本民以食為天朕即位以來念切民依舉行耕藉之禮殫竭精誠為民祈榖於上帝乃雍正二年三年藉田特産嘉禾有至一莖九穗者朕心亦以為偶然之事今據府尹劉於義進呈今嵗藉田所産自一莖雙穗三穗以至八穗九穗皆碩大堅好異於常榖朕見之心甚慰悅今特宣示廷臣朕並非以此為祥瑞誇耀於衆也蓋實有見於天人感召之理捷於影響無纖毫之或爽朕以至誠肫懇之心每嵗躬耕藉田以重農事即蒙上帝降鑒疊産嘉榖以昭休應似此八穗九穗之榖豈人力之所能強為亦豈人君所能強之使有乎天人感應之理朕見之最真最切但恐此心不誠耳誠則未有不動者即如從前青海蠢動朕為邉陲憂慮虔禱於宫中不數旬而捷音即至疆圉寧謐又如前嵗夏間近畿雨澤稍愆朕在宫中默禱減膳修省虔誠叩懇不數日而井霖大沛禾稼有秋此皆近年以來朕親行親驗之事至於去年夏秋之間時常隂雨朕在宫中但覺雨水稍多不知其大為民患而李維鈞並不將畿輔被潦實情具奏是以朕竟不聞知未曾早為虔禱殫竭誠心以挽天意而紓民困及蔡珽署直𨽻總督事務詳悉奏聞朕宵旰憂勤幾廢寢食於是截漕發倉多方賑濟京城設厰各邑興工俾窮民皆得糊口是以地方雖被水災而小民不致流離失所朕撫綏憫恤之念實為迫切今嵗二麥豐收禾黍暢茂此皆上天俯鑒朕衷故加惠黎元而錫以盈寧之慶也蓋天生民而立之君鑒觀在上人君一念敬謹政事無闕天必嘉之佑之一念放逸政事有乖天必警之戒之此一定之理也况人君撫馭臣庶位處極尊所以賞罰之者獨有上天耳是以朕每於水旱等事皆實心內省必係朕有過失上天警戒示譴也至於各省旱潦之事朕皆視同一體原無彼此之别惟是地方相隔路逺彼地偶有水旱有司未必即行具報及至奏達朕前而緊急之時已過是以朕無從盡其誠心為之祈禱此其責則全在本省督撫矣督撫受朕委任之重為朕養育萬民必視百姓之疾苦如痛癢之在已身一遇水旱飢饉必思所以致此之由或因本省之政事吏治有闕即思速為改易之或因本省之人心風俗不端即思速為化導之兢兢業業修省祈禱竭盡誠心一如朕之朝乾夕惕斷無不可以挽回天意者假若聞朕之政治稍有缺失亦宜直言陳奏不必隱諱如此則官與民聯為一體臣與君又聯為一體太和翔洽實意交孚天聽雖髙誠呼吸可通矣朕每嵗躬耕藉田並非崇尚虛文以為觀美實是敬天勤民之至意禮曰天子為藉千畝諸侯百畝據此則耕藉之禮亦可通於臣下矣朕意欲令地方守土之官俱行耕藉之禮使知稼穡之艱難悉農夫之作苦量天時之晴雨察地理之肥磽如此則凡為官者皆時存重農課稼之心而凡為農者亦斷無茍安怠惰之習似與養民務本之道大有裨益九卿詳議具奏雍正五年諭內閣地方水利關係民生最為緊要如江南戶口繁庶更宜加修濬時其蓄泄以防旱潦向來屢有條奏之人但未經本省督撫奏請朕意亦欲興修以資農務因海塘工程正在營治且水利事關重大必得實心辦事之人方有裨益即如目今畿輔水利賴有忠誠任事之怡親王始可興此大工否亦未敢輕易舉行也我皇考念切民依周知稼穡因康熙四十六年巡省江浙所至必細驗水土髙下燥濕之宜詳考五榖種植之性躬親講求將附近太湖及通江潮之處條分縷析特頒諭旨令江浙督撫於蘇松常鎮杭嘉湖地方疏濬河港以資灌溉修建閘座以便啓閉皆動用公帑錢糧不使絲毫出於民力恩至渥也乃當時督撫諸臣不能實心仰體惟以虛文奉行糜費帑金二十餘萬大都飽於官吏之侵漁而無實效深可痛憾朕即位以來事事仰繼皇考之貽謨永圖生民之逺計本欲俟直𨽻水利興修之後令怡親王前往浙江地方相度情形商酌興修之舉今巡撫陳時夏特行奏請且稱費用不過十餘萬兩即可成功據陳時夏陳奏應是地方不可遲緩之事副都統李淑德昔任江南松江府同知諳悉水利事宜曾經條奏頗為明晰原任山東巡撫陳世倌年力精壯現在間居著李淑德陳世倌會同陳時夏總河齊蘇勒總督孔育珣悉心踏勘詳加酌議倘齊蘇勒河工緊要不能親身前往即行文知會商酌定議具奏凡建立閘座疏濬河流務期盡除淤塞以杜泛溢之虞廣蓄水泉以收膏澤之益其一應公費俱動用庫帑支給一切工程交與李淑德陳世倌監督辦理並諭吏部將現任部屬及候選部屬府州縣人員內有具呈願往效力者挑選十餘人帶往江南不必令出資財惟令辦理事務交李淑德陳世倌二人酌量委用特諭諭內閣修舉水利種植樹木等事原為利濟民生必須詳諭勸導令其鼓舞從事方有裨益不得繩之以法若地方官員因關係考成督課嚴急則小民轉受其擾矣著直𨽻學臣轉飭教職各官切加曉諭不時勸課使小民踴躍興作若地方官員怠忽不加勸導或有逼勒過嚴者著學臣稽察奏報三路巡察御史亦著善為勸導悉心稽察如地方官有奉行不善之處即據實奏聞諭內閣據范時繹奏稱太倉州鎮洋縣士民僉稱境內劉河巨工已蒙發帑開浚而七浦一河原係民田沾獲其利今願照依舊例業主給食佃戶出力不敢再費帑金等語朕思君民原屬一體民間之生計即國計也倘遇國用不敷之時勢不得不資藉於民今國家財用充足朕為地方畫萬世之利不惜多費帑金興修巨工養育百姓若仍用民力以辦公事非朕本心也况小民效力工程或致荒其本業而又不免官吏之督催煩擾朕心深為不忍著將范時繹所奏士民捐助之處停止仍動用公帑辦理並將朕旨遍行曉諭州縣士民等當體朕愛養元元之心於工程告成之後加意照看嵗嵗疏濬俾地方永受其益則勝於目前之趨事赴工多矣諭內閣朕聞陜西鄭渠白渠龍洞向來引涇河之水溉田甚廣因歷年既久疏濬失宜龍洞與鄭白渠漸至淤塞堤堰大半坍圯醴泉涇陽等縣水田僅存其名深為可惜特令該督嶽鍾琪詳酌興修今據該督親勘奏稱龍洞急宜挑挖鄭白渠務當疏濬更須修築堤堰建設閘口以俾堅久已於西安布政司庫貯公用羡餘銀內先動一千兩委員將龍洞鄭白渠及時挑濬其建閘工料約估銀七千兩請亦於司庫存貯羡餘內動用等語朕惟興修堤堰乃於民生大有裨益之事著動用正項錢糧俟一切工程告竣造報工部查核務期渠道深通堤堰堅固俾農田得以永賴以副朕保惠元元之至意諭內閣閩廣兩省督撫常稱本省産米甚少不足以敷民食總督髙其倬亦曾具奏巡撫楊文乾則云廣東所産之米即年嵗豐收亦僅足供半年之食朕思本省之米不足供本省之食在歉嵗則有之若云每嵗如此即豐收亦然恐無此理或田疇荒廢未盡地力或耕耘怠惰未用人功或姦民希圖重價私賣海洋三者均未可定昨曾靣諭九卿今廣西巡撫韓良輔奏稱廣東地廣人稠專仰給於廣西之米在廣東本處之人惟知貪財重利將地土多種龍眼井蔗煙葉青靛之屬以致民富而米少廣西地瘠人稀豈能以所産供鄰省多人之販運等語此奏與朕前旨相符可知閩廣民食之不敷有由來矣著二省總督巡撫等悉心勸導俾人人知食乃民天各務本業盡力南畝不得貪利而廢農功之大不得逐末而忘稼穡之艱至於園圃果木之類當俟有餘地餘力而後為之豈可圖目前一時之利益而不籌畫於養命之源以至緩急無所倚賴而待濟於鄰省假使鄰省亦或歉收則又將何如哉該督撫等務須諄切曉諭善為化導俾愚民豁然醒悟踴躍趨事則地方不致虛耗而米榖不致匱乏矣每見各省督撫大吏皆各私其所轄之地方而於鄰省之休戚膜外視之如髙其倬則請運江南之米於福建陳時夏又欲留貯於江南楊文乾則欲運廣西之米於廣東韓良輔又欲留貯於廣西伊等各從疆界起見甚屬褊小朕君臨萬方普天率土皆吾赤子一省米榖不敷自然接濟於鄰省有無相通古今之義若封疆大吏各據本地實情奏聞則朕易於辦理倘各存偏向本省之見不肯通融接濟則朕辦理甚難若開捐納以積榖則地方米價必致髙昻若截漕米以濟民則天庾所關更為緊要輾轉思維實無善䇿是在凡為督撫者體朕一視同仁之意酌地方之緩急為有無相通之道勿以隔屬有心區别如此方不愧大臣公忠之誼而於國家懷保小民之治大有裨益也諭內閣自古帝王致治諴民莫不以重農為先務書陳無逸先知稼穡之艱難詩載豳風備述田家之力作論語云百姓足君孰與不足孟子曰民事不可緩也蓋國以民為本民以食為天農事者帝王所以承大養民久安長治之本也我國家撫綏寰宇聖祖仁皇帝臨御六十餘年深仁厚澤休養生息戶口日增生齒益繁而直省之內地不加廣近年以來各處皆有收成其被水歉收者不過州縣之數處耳而米價遂覺漸貴閩廣之間頗有不敷之慮望濟於鄰省良由地土之所産如舊而民間之食指愈多所入不足以供所出是以米少而價昻此亦理勢之必然者也夫米榖為養命之寶人既賴之以生則當加意愛惜不可縱口腹之欲每人能省一勺在我不覺其少而積少成多便可多養數人若人人如此則所積豈不更多所養豈不更衆乎養生家以食少為要訣固所以頤神養和亦所以節用惜福也况脾主於信習慣便成自然每見食少之人其精神氣體未嘗不壯此顯而可見者至於各省地土其不可以種植五榖之處則不妨種他物以取利其可以種植五榖之處則當視之如寶勤加墾治樹藝菽粟安可舍本而逐末棄膏腴之沃壤而變為果木之場廢饔飱之恆産以幸圖贏餘之利乎至於煙葉一種於生人日用毫無裨益而種植必擇肥饒善地尤為妨農之甚者也小民較量錙銖但顧目前而不為久遠之計故當圖利之時若令其舍多取寡棄重就輕必非其情之所願而地方官遽然繩之以法則勢有所難行轉滋紛擾惟在良有司勤勤懇懇諄切勸諭俾小民豁然醒悟知稼穡為身命之所關非此不能生活而其他皆不足恃則羣情踴躍不待督課而皆盡力於南畝矣朕聞江南江西湖廣粵東數省有一嵗再熟之稻風土如此而仍至於乏食者是地土之力有餘而播種之功不足豈非小民習於怠惰而有司之化導者有未至耶或者曰米榖太多則價賤而難於糶賣昔人有榖賤傷農之説諺語所謂熟荒者此則不必過慮假若小民勤於耕作收穫豐盈致於價賤而難於出糶朕必多發官價以糴買之使重農務本之良民獲利而有餘資也朕生平愛惜米榖每食之時雖顆粒不肯拋棄以朕玉食萬方豈慮天庾之不給而所以撙節愛惜者實出於天性自然之敬慎並不由於勉強且以米榖乃上天所賜以生養萬民者朕為天下生民主惟有敬慎寶重仰冀天心默佑雨暘時若嵗獲有秋俾小民家有蓋藏人歌樂土朕既為億萬生民計不敢輕忽天貺爾等紳襟百姓獨不自為一身一家之計乎朝夕生養之需既受上天之賜若果加意愛惜隨時撙節則天必頻加錫賚長享盈寧之福若恣情縱欲暴殄天物則必上干天怒不蒙眷賚而水旱災祲之事皆所不免其理豈或爽哉又聞江西廣西地方竟有以米榖飼養豚豕者試思榖食之與肉食孰重孰輕孰緩孰急而乃以上天之所賜小民終嵗勤苦之所獲者為豢養物類之用豈不干天和而輕民命乎朕所以惓惓訓諭者惟期天下之人專務本業以杜浮靡愛惜物力以圖永遠共體朕敬迓天庥勤恤民隱之意則爾等家室必至於豐饒爾等子孫必永綿其福澤思之思之毋忽朕言著將此曉諭內外官民人等並通行遠鄉僻壤咸使聞知諭直省總督巡撫稼穡為天地之寶民命攸關我聖祖仁皇帝臨御六十餘年無刻不以重農力穡為先務仰觀天文俯察地理辨土性而課人功咨雨晹而防旱潦綢繆區畫旰食宵衣偶遇雨澤愆期聖心憂勞之切侍側臣子皆惶悚不寧所以為萬世謀粒食者至矣盡矣朕朝夕瞻仰者四十餘年今纘承大統竭誠效法念切民依每年虔祀先農躬耕帝藉仰蒙上天眷佑疊錫嘉禾信而可徴纖毫不爽是以特頒諭旨令各省守土官共舉耕藉之禮為萬方百姓祈禱秋成今見各省督撫奏報前來處處風雨均調春麥秋禾並登豐稔雖邉遠荒僻之地亦慶有秋惟直𨽻湖廣安徽數州縣近水最低之處常年被潦者略有浸注亦不為災是今嵗可稱大有年矣朕感上帝之垂慈慶下民之受福而推求其故良由今年各省初耕藉田各該有司自然小心謹慎齋祓虔誠是以感格上蒼而獲此盈寧之錫倘從此益加敬謹不懈初心則嵗嵗屢豐可以預必爾督撫等可通行曉諭所屬官民當凛帝鑒之匪遙勿視耕藉為故事永矢嚴恪以迓天和天下臣民受福斯朕之福也思之慎之毋忽朕言雍正六年諭內閣朕惟善政養民利賴必資地力而率作興事倡先端藉縉紳惟兹寧夏所屬之插漢拖灰地廣土饒水利充裕朕特遣大臣會同該督撫等悉心經理濬治渠道設縣築城募民墾種次第修舉行見人民樂業饒裕殷阜漸成西北蕃庶之區此朕經國裕民之至計欲使地無遺力而亦寧夏一方人數千百年未興之樂利也聞彼中得水可墾之地計二萬餘頃每戶以百畝授田可安置二萬户朕已諭令廣行召募逺近人民給以牛具耔種銀兩俾得盡力開墾給為世業惟是原議寧夏本籍現在出仕文武官員俱令開墾授業俾為世享之利今聞報墾者尚覺寥寥禮記曰貨惡其棄於地也力惡其不出於身也況乎上以急公而裕國下以力本而厚生縉紳小民之望也果能身先倡率則民間之趨事赴功者必衆凡屬本籍之人不論文武官員或現任或家居均當踴躍從事急先墾種不可觀望因循耽延善舉凡兹所墾地畝俱照原議給為世業三年起科果能使沃壤腴田有廣收之益無間曠之區則不但於體國經野之謨重有攸賴而經營世産伊等子孫亦蒙永遠之澤矣雍正七年諭內閣農事為國家首務督責貴有專司前有人條奏於各省設立農官以司勸課或設巡農御史令其巡行郡邑勸朂農人及時力作亦足敦本業而防遊惰等語朕思各省耕作之情形不同未可一例通行現今畿輔之地營種水田以來收穫甚多行之已有成效設立巡農御史之事當先行於直𨽻省每年特差御史一員於二月田功初起之時巡歷州縣查察農民之勤惰地畝之修廢以定州縣之考成其有因循推諉以致荒廢農田者即行參處該御史亦勤加勸課督令耕耘九十月間稼穡納場之後回京覆旨至明年二月照例另派一員前往其該御史出巡一切供給車馬俱照現今巡察御史之例按日給發務使農桑興修田功畢舉遊手之人咸歸南畝以副朕重農務本之至意諭直省督撫國家承平日久戶口日繁凡屬間曠未耕之地皆宜及時開墾以裕養育萬民之計是以屢頒諭旨勸民墾種而川省安插之民又令給以牛種口糧使之有所資藉以盡其力今思各省皆有未墾之土即各省皆有願墾之人或以日用無資力量不及遂不能趨事赴功徘徊中止亦事勢之所有者著各省督撫各就本地情形細加籌畫轉飭有司作何勸導之法其情願開墾而貧寒無力者酌動存公銀榖確查借給以為牛種口糧俾得努力於南畝俟成熟之後分限三年照數還項五六年後按則起科總在該督撫等董率州縣因地制宜實心經理務使田疇日闢耕鑿維勤以副朕愛養元元之至意雍正八年諭內閣據署理陜西總督查郎阿奏稱安西沙州等處地方招民屯墾仰蒙天恩賞給沿途口糧盤費借給牛具籽粒房價又因民到沙之日尚未耕種借與七箇月糧石以資口食養育之恩無微不至至於輸賦年限原議以三年升科自雍正六年民戶到齊之日計算至雍正辛亥年正屆升科之期凡此無業窮民得以安居樂業又蒙上天賜祐兩嵗豐收暖衣飽食即三年起科亦屬小民之常分第以新經移住之家一切費用皆取給於田畝又值軍興之際物價未免稍昻民力尚未饒裕或照前議於辛亥年升科或少寬其年限出自聖恩等語安西沙州等處招民屯墾原為惠養邉民之計是以纍年以來備極籌畫經營期其得所今從民戶到齊之日計算至辛亥之嵗乃例當輸賦之期但念小民甫經安插公私兼顧為難著寬期二年於癸丑年升科俾民力寬裕俯仰有資以副朕格外加恩至意諭內閣寧夏地方萬民衣食之源在於大清漢唐三渠之水利是以定例每年疏濬修理使水流暢足民田得以均灌溉聞得歷年專司之員踈忽怠玩只圖打草折夫以致閘道堤岸逐漸損壞時有衝決渠身淤泥填塞日見淺窄而三渠之中惟唐渠為尤甚近來其口過低其梢過髙水勢不能逆流而上多誤小民耕種之期雖每春定有嵗修之例然不能以一月之工程整數十年之荒廢也前因署事通判靳樹鍭玩忽渠務已被參革治罪其從前積年損壞之處亦復不少若再不加補築恐日復一日將來難於經理現今兵部侍郎通智開濬惠農昌潤二渠於寧夏水利自然明晰著會同史在甲即行查議今嵗預備物件明春動工修補務令三渠堅固俾邉郡黎元灌溉有資永享盈寧之慶其作何估計動用錢糧之處著兵部侍郎通智太常寺卿史在甲詳悉妥議具奏諭直省督撫古稱蝗蝻生於水澤之中乃魚子變化而成者是以江南淮揚之州縣地接湖灘往往易受其害蓋蝗之所生多因低窪之區秋雨停集生長小魚交春小魚生子水存則仍復為魚若值水涸日曬入夏之後即化為蝗不待數日便能生翅羣飛即被害之家亦莫知其所自蓋以其地寥廓荒涼人迹罕至平時忽而不察及至鼓翼飛揚則有難於撲滅之勢此事勢之必然所當防之於早者也凡直省地方向時有蝗蝻之害者該督撫大吏應轉飭有司通行曉諭附近居民於大熱久晴之後周歷湖濵窪地及深山窮谷無人之處實心實力審視體察一有萌動之機無分多寡即行剪除消滅倘民力或有不敷即稟報該地方官督率人工協同助力更令文武官辨派出誠實兵役會同里長耆民等留心察視不可踈忽怠玩如此則人力易施蟲災可杜於禾稼大有裨益但小民愚昧無知又復茍且庸惰其曉諭開導防患於未然者有司不得辭其責實心任事之良吏必不肯於此等事膜外視之也諭內閣據直𨽻地方文武官員報雨奏摺稱今年三月及四月初旬兩次得雨今於四月二十四日又得時雨四野霑足二麥茂盛秋榖皆可播種等語據此則四月以前竟有未種之田可知矣夫農事貴乎及時二月土膏初動三月即為播種之期况已得雨二次何以遲延觀望直待四月下旬方始播種倘小民怠惰偷安為民父母者則當開導勸課使之踴躍趨事於南畝又或耔種牛力稍有不敷則當留心體察設法相助不使有後時之歎即以今嵗論之若從前三月得雨之時即爭先種播則目今又得井霖豈不更為優渥况雨澤之遲早有無非人力所能預料今蒙上天再賜井霖得以乘時播種實屬萬民之厚幸假若霖雨愆期倣徨觀望則從前之怠惰遲延豈非小民自誤生計自荒恆産耶西北寒冷之鄉布榖或不宜太早若畿輔可以早種之地又當井雨既霖之時而乃袖手逍遙以待時雨之再沛不亦愚昧之甚乎况北直地方春夏之交嘗稽雨澤豈可視井澍為等間不及時努力致虛上天之賜乎此皆愚民習於懶惰而地方有司又不以民事為重漠然不加董率之故著該督橅傳朕諭旨通行申飭倘再有牧民之官輕視農事不實心化導任百姓之悠悠忽忽有誤播種之期者必從重議處諭户部陜西四川地方民風醇朴歷年逋負甚少查每年徴收錢糧之期四月完半十月全完此定例也朕思四月十月既屆納課之期小民必須預先經營是榖麥未收之時即為輸將之計或因稱貸而受剝於富豪或因預糶而大虧其價值且如井肅地方有徴收本色者若在糧榖未穫之前更為竭蹶歷來川陜錢糧既無拖欠之陋習著將四月完半者寬至六月十月全完者寬至十一月俟夏麥秋禾築場納稼之後從容完課俾民力舒徐以副朕愛養黎元之至意雍正九年諭內閣山東地方上年遭值水患窮民乏食朕心軫念屢頒諭旨並遣大臣賜粟賜金加恩賑濟不忍使一夫不獲其所又念該省上年禾稼歉收今春青黃不接之時米價必至騰貴特命截留鄰省漕糧三十五萬石並撥運奉天米榖二十萬石減價平糶以惠濟閭閻朕之為東省民食計者亦備極籌畫矣今朕細思上年濟兖東三府之被水較平時為甚目今發粟平糶在糴米之家固不慮價值之髙昂而赤貧之民仍苦於糴買之無力且聞被水之後覔食窮民有轉徙四方者今各省漸次資送回籍此等民人回籍之後無以為存養之資必至於失業深屬可憫今朕再沛恩膏著侍郎劉於義牧可登巡撫嶽濬確查實在窮民無力糴買榖石者加給兩箇月口糧以恤其困苦資其耕作查濟兖東三府尚有存倉榖四十萬石即將此為散賑之需儻不敷用再將截留之漕米以二十萬石平糶以十五萬石增添散賑劉於義牧可登嶽濬可仰體朕心遴選賢員作速分途辦理使黎民均沾實惠並傳宣朕旨切加曉諭百姓等受朕格外之恩當乘此春和努力耕種勿因失業而作邪僻之事勿因困厄而懷怨尤之心果能祗遵朕訓則良善之風豫順之氣自能感召天和賜以安全之福思之勉之諭內閣今年五六月間直𨽻山東河南等處雨澤愆期朕即慮及上年被水低窪之地魚子存留今夏烈日蒸曬恐變為蝗蝻為禾苗之患特令大學士等寄信與直𨽻山東督撫嚴飭屬員留心訪察預為防遏兹據沈廷正奏報山東濟寧州之南鄉新店等處有蝻子萌動已飭令文武員辨上緊撲滅又據張元懷奏稱光州所屬竹園內生有青蟲其形似蝗吞食竹葉未傷田禾今已捕除等語從來蝗蝻始生之時以人力治之尚易而小民耽逸偷安憚於用力又恐踐踏禾稼瞻顧逡巡及至飛揚之後遠近蔓延而勢已不可遏矣是在實心任事之官員督率鄉民力為捕治不得姑順輿情釀成大患著直𨽻山東河南江南等處督撫通行所屬實力奉行儻視為具文茍且塞責將來飛揚之時朕必察其發生之處將該地方官從重治罪不少寬貸直𨽻山東河南三省欽差大臣科道等一同留心訪察毋忽諭內閣朕以直𨽻山東河南夏間雨澤愆期特命截漕查賑預謀民食既而三省陸續奏報得雨朕心稍慰兹聞直𨽻山東及河北彰衛二府有窮民因秋成無望預為渡河而南以圖就食者蓋因本地歉雨之時尚未聞截漕查賑諭旨輒思就食他省若即令資遣還鄉恐時屆仲秋耕種之期已過轉致失所著該撫飭令沿河州縣於各渡口詳詢其所欲往地方有力不能自達者量給路費仍知照該州縣善為安插除有親朋可依及已傭工得食者聽其自便外其乏食之民著用截漕米石照例計口賑給此等流民有聞家鄉近日得雨欲回本籍者即資送遣回其未願即歸者俟來春耕種之後仍皆給以資糧使之回籍凡資給之費俱照例動用存公銀兩造册送部有浮冒尅扣等弊該撫指名題參如各省樂善之家有能將覔食窮民存恤周濟及資助回籍者該地方官詳報上司酌量輕重奬給花紅旗匾最優者給之頂帶以示鼓勵直𨽻山東地方既經得雨又現今截漕查賑人心安帖必無輕去其鄉者設或愚民無知聞鄰省安插流民經理得宜仍復接踵而至離鄉棄業舍本籍自有之恩澤以望澤於他鄉其勢必至兩誤該地方官務悉心安集剴切曉諭令其勿離故土又聞渡河流民有欲往湖廣者楚地雖産米之鄉而去直𨽻山東較豫省更遠恐將來回籍愈難除已至湖廣者著該地方官安插得所外其尚在鄰省者詢明湖廣果有親朋可依則資給令往否則即於所到地方安插夫率土蒼生皆吾赤子各該督撫及地方有司務須痌瘝乃身體察周詳規畫盡善期無一夫不獲其所以副朕勤恤民隱子惠元元之至意雍正十年諭大學士九卿京師自上冬以及新春未得雨雪畿輔地方及近京各省雖有奏報得雪者看來亦未普遍霑足因思上年十一月十五日月食據欽天監觀候曾引占書燕趙早禾麥有傷之語陳奏朕前朕心甚為憂懼擬於正月祈榖之期虔禱上帝以迓天和乃朕躬偶感風寒醫家奏請避風靜攝是以未曾躬親祀典此心愈加乾惕維兹數月以來雨雪未降顯係上天垂象以示警甚可畏也朕虔誠修省體察政治之闕失以期仰格天心爾大學士九卿等各宜恪慎齋戒至誠虔禱尤當洗心滌慮殫職奉公以為敬天祈福之本京師為四方輻輳之地民食浩繁更宜預為籌畫至於該督撫等各自敬謹修省外所屬地方雨澤之有無播種之遲早務期悉心訪察先事圖維儻二麥歉收必有思患預防之策不使黎民有乏食之虞方不負朕之委任儻有玩忽隱飾等弊經朕訪聞必加嚴譴內外大臣等領此諭旨務在實心奉行不必以空言覆奏諭內閣寧夏為井省要地渠工乃水利攸關萬姓資生之策莫先於此是以朕特遣大臣督率官員等開濬惠農昌潤二渠又命修理大清漢唐三渠以溥萬民之利年來昌惠二渠及唐渠工程漸次告竣於民田大有禆益其大清渠漢渠雖未竣工然聞連年加謹堵疊極力挑濬已足以資灌溉不過洴岸閘座有應行修補之處可以從容經理非比唐渠之必應速成也目今甘省軍興之際挽運兵糧正需車輛若因修理渠工有欽差官員催趲工程又復雇車運送物料恐小民承應一切力難兼顧有誤春耕所當酌量變通以體恤民隱者查寧夏有專司水利之同知著將未竣之渠工交與該員照通智史在甲等所估料之處於每嵗春工內分年陸續修理再令寧夏道鄂昌勤加督率不時稽查務期工程堅固利濟有資使民田永霑膏澤通智史在甲將各件與鄂昌交代清楚即行回京其在工效力之文武官辨交與該署督查郎阿計其在工之久暫訪其奉職之勤惰量其辦事之能否應留陜題補委用者留陜題補委用應咨部請旨者咨部請旨應發回本地者發回本地其現任武辨及兵丁等派撥渠工效力者俱令各歸營汛在工夫役等交與鄂昌將附近者令歸南畝遠來者酌量遣回諭內閣上年冬間北方雨雪稀少朕恐今夏蝗蝻萌動已密諭該督撫等留心防範頃聞江南淮安府屬之山陽阜寧及海州所屬之沐陽揚州府屬之保應等縣各有一二鄉村生發蝻子雖目前萌動之處不過數里然恐捕治不力漸至蔓延為田禾之害著該督撫嚴飭有司督率人役鄉民速行撲滅俾無遺種儻有怠忽從事者即行糾參從重議處諭內閣據山東巡撫嶽濬奏稱東省自閏五月內甘雨溥降從前被旱之處次第均霑榖豆雜糧皆得及時布種此後六七兩月雨澤均調秋禾暢茂現今收穫登場為歷年未有之豐熟等語今嵗春月東省郡邑雨澤愆期而兖東二府為尤甚朕心憂慮遣官發粟糶賑兼施從前嗷嗷待哺之民有所依恃心志安帖豫順之氣感召天和遂得連霈甘霖轉荒歉而為豐稔即目前之事觀之益知朕平日切切以天人相感之理訓示天下臣民者確乎其不爽也民為邦本食為民天凡為官者思欲感召天和必以暢悅民情為本平時與百姓同其好惡不使閭閻有抑鬱之情偶值雨晹之不均旱潦之將兆即據實奏聞裨朕早為百姓經營以為補救挽回之策在民則當安分循理共敦善良偶遇災祲即思招致之有由恐懼警惕不敢因困苦而生愁怨之心如此上下交修官民胥勉將見和氣致祥災沴不作比户享盈寧之福矣勉之勉之諭內閣據博爾奔察等奏稱胡倫布爾等處今嵗所種地畝因旱歉收俟明年多為種植等語朕思種地一事若交與伊等則訓練兵丁必致貽誤著行文將軍卓爾海於齊齊哈爾愛渾墨爾根三處臺丁及水手屯丁內酌派五百名動用彼處存貯正項錢糧撥給盤費並置辦犂具耔種等項前往胡倫布爾地方於明年春間及時耕種至秋後將如何收穫之處著卓爾海據實奏聞其動用銀兩仍著報部照數解還雍正十一年諭內閣上年江南沿海被水地方如常熟等二十二州縣並續報之華亭等六縣該督撫等已遵旨撫綏軫恤定議大賑三次每次以一月為期料寒冬初春以來窮民存養有資不致失所矣朕念二三月間正青黃不接之時尚須籌畫接濟資其力作庶可無誤春耕著再加賑四十日以昭格外之恩其有從前遺漏貧民並先可糊口而目下力不能支者亦著查明添入補賑之內再被水之鹽場竈戶亦照貧民例加賑一月該督撫鹽政等務須督率有司實力奉行使被水之家均沾恩澤以副朕恤災拯困之至意諭內閣前據署直𨽻總督顧琮等奏請準順天天津等七府五州酌量領運北倉米石以備平糶並將所存倉榖存七糶三以濟民食朕已允行今思目下正當青黃不接之時糧價漸昻各處皆有常平倉榖其存貯米榖一萬石以外者準其存七糶三一萬石以內者準於糶三之外酌量加增存貯甚少者或添運北倉漕米或撥領鄰近倉儲務令各處米價得平小民易於糴買再者直𨽻冬春雨雪稀少目今農事方殷民皆盡力於南畝恐新舊錢糧一時難於並徴著將雍正九年以前帶徴銀兩緩至秋收完納該督等遵諭即辦理諭戶部近聞山東通省雨澤俱已霑足但從前有得雨稍遲之州縣今年二麥歉收民力未免拮據况得雨之後無力耕種錢糧輸納承辦維艱朕心軫念著該督將得雨稍遲之州縣衛所應徴新舊錢糧緩至秋成之後再行開徴以示朕體恤閭閻之至意雍正十二年諭戶部據總理西安巡撫事史貽直等奏報陜省秋禾受旱水田仍可有收而旱田收成分數大減現今秋社前後乃秦民種麥之期必得甘雨應時始能播種是以農夫望雨甚切等語覽所奏情形若將來得雨霑足則明嵗夏收自有可望但今嵗秋收既歉則明年青黃不接之時米糧或至騰貴兵民人等有應行接濟之處亦未可定亦不可不預為籌備查陜省與河南接壤雍正十一年春間撥運豫米十萬石自水次裝載直抵西安已有成效上年曾令河東總督王士俊於沿河州縣水次貯榖三十萬石並將上年豫省漕米截留易榖以備陜省之用是豫省備用陜省之米甚為充裕儻明年陜省有需用之處著史貽直等一面具奏一面即將需用米數行文王士俊料理照上年之例由水道運赴西安應用將此併諭王士俊知之諭大學士九卿朕從來不言祥瑞屢頒諭旨曉諭天下臣民是以數年來凡以嘉祥入告者朕皆屏拒弗納而各省之瑞榖嘉禾誕降者甚多悉令停其進獻蓋欲天下臣民共敦實行不尚儀文以為敬天勤民之本也今據總兵官楊凱奏報鎮筸紅苖甫經向化今年苗民所種之山田水地黍稷稻粱盈疇遍野及至秋成則皆雙穗三穗四五六穗不等萬畝皆然苖民額手歡呼以為從來未有之竒瑞又據侍郎蔣泂奏報高臺縣屬雙樹墩地方在鎮夷堡口外自開墾以來人煙日盛今嵗秋成粟榖挺秀有一本之內枝抽十餘穗者有一穗之上叢生五六穗者屯農共訝為竒觀稱為盛事等語朕思苖疆播種乃夷民務本之先資遠徼屯田關邊塞軍儲之重計今值經營伊始欣逢瑞榖呈祥且地廣穗多超越於見聞紀載之外仰見天心眷佑錫福方來苗民之樂利可期軍旅之糗糧有賴此非空言祥瑞而無濟於實用者可比朕心不勝感慶在廷臣工莫不有撫綏苖衆籌邊足食之心聞之定為色喜是以將楊凱蔣泂奏摺及榖本圖樣發出共觀之皇帝敕諭雍正十三年諭總理事務王大臣從來帝王撫育區夏之道惟在教養兩端蓋天生民而立之君原以代天左右斯民廣其懷保人君一身實億兆羣生所托命也書稱正德利用厚生惟和又云惟土物愛厥心臧蓋恆産恆心相為維繫倉廩實而知禮義理所固然則夫教民之道必先之以養民惟順天因地養欲給求俾黎民飽食暖衣太平有象民氣和樂民心自順民生優裕民質自馴返朴還淳之風可致庠序孝弟之教可興禮義廉恥之行可敦也我朝列聖敬天勤民垂統萬世皇祖聖祖仁皇帝六十餘年久道化成重熙纍洽所以惠養元元禮陶樂淑者至周至備惟是國家承平日久生齒日繁在京八旗及各省人民滋生蕃衍而地不加廣此民用所以難充民産所以難制也我皇考宵旰孜孜勤求治理惟恐一夫不獲其所重農貴粟之教屢頒撫循蠲賑之惠頻下南北之營田水利無不興修內外之開墾種植無不綜理凡此實政實心一以誠敬貫徹始終十三年有如一日皆朕所親承目睹拳拳服膺者也朕生長深宫瞻依皇考慈顔惟知承歡膝下懋學書齋即如日用衣食之需悉由恩賜豐贍饒裕不煩問所從來此固皇考昊天罔極之恩難於明言而為君之道亦惟身履其地者然後知聖人之言為至當也今朕纘成大統身為人主衣租食稅則自今伊始一絲一粟皆四海小民所經營供御者矣朕思飲饌被服皆出於海內脂膏宫室器用皆取自閭閻拮據尚安忍少有糜費侈用之心以蕩民力而耗民財乎又安忍已垂裳而聽天下之民有寒不得衣已玉食而聽天下之民有飢不得食者乎禹思天下有溺者由已溺之稷思天下有飢者由已飢之自古聖君賢臣自任之重者皆動於至誠迫於至理有萬不容己者也朕日夜兢兢時厪本固邦寧之至慮以皇考之實心為心以皇考之實政為政凡供膳品味之類無所加增衣食器用之屬無所濫費宫室苑囿之區無所改營爰賴中外大臣共體朕心以成朕志於民生日用所由阜成民生樂利所由豐豫之處在在求其實濟事事謀其久遠勿以虛名而澤不下逮勿以小利而計不圖全勿作無益以害有益勿朘民生以厚已生果能恆産有資將見恆心自啓我皇考聖訓所謂三代之治必可復堯舜之道必可行者庶能繼述萬一此朕中心乾惕之誠並非即位之初為此邀譽近名之語以博天下臣民之感頌朕心務收實效豈肯徒托空言但天下至大兆民至衆非朕一人所能獨理內而閣部八旗大臣外而督撫藩臬有司均受國家深恩有惠養斯民之責者當共思黽勉崇儉戒奢視國事如家事以民身為己身痌瘝一體休戚相關各殫誠心期登斯民於衽席則賞功酬庸之典朕必從優舉行若茍且因循視同膜外律以溺職更復何辭勉之勉之乾隆元年諭總理事務王大三代以前不言水利溝澮之制時蓄泄備旱潦尚書周禮所載為田功計者其利甚溥開渠引水溉田育榖始於戰國蓋因阡陌既開溝澮尋丈已失其舊也歷代言水利者得失參半總以相土宜順水勢近不擾民遠可利人為主今江南所屬蘇松常鎮四府太倉一州現在興修支河倣河工海塘之例督撫分委降革廢員及本籍候選考職人等效力承修朕思渠港墟壩附近溉田原宜開濬以備旱潦但開濬之法須河身深廣蓄泄得宜其挑取塗泥遠移他處或培窪下之地或築堤岸之上方為久計若雇夫挑土堆貯河旁雨淋水潦旋即入河不久淤塞務名無實徒滋煩擾至古堤舊渠儻遇旱潦不為田害便宜仍舊紛更改築甚無謂也今蘇松等處內地支河原不比河工海塘之險古堤舊渠如元和至和等塘民利往來田資灌溉至今受益吳本澤國三江震澤支流四溢如邱與權單諤郟亶趙霖夏原吉周忱等所論水利考據精核得失瞭然今效力承修人員相度形勢諳練自遜前人儻有夾塘蓄水石梁泄河止宜加修不必改築若有必應開濬建築之處督撫留心細勘並飭州縣協辦工程一應調遣指臂易使至長洲等州縣按畝派錢以供大修朕已降旨停止倘有官吏藉端中飽即絲毫派纍經朕訪聞必加嚴處嗣後督撫以至州縣建言為民興利或利小而害大或利在目前而害伏於後或有利無害而其事易創難成皆宜詳審熟籌慎之於始以體朕惠養元元至意乾隆二年諭總理事務王大臣方今農事將興正百姓力田耕作時也兹二月二十二日恭送孝敬憲皇后梓宫往泰陵所過州縣應納錢糧雖已蠲免但恐應役多人致妨南畝其令地方有司毋得先期派民灑道清塵種種滋擾扈從人員有蹂躪麥苖途中滋事者許直隸總督即令劾奏以副朕惠養農民至意諭總理事務王大臣上年直隸等省有收成歉薄之州縣冬春以來雨雪又覺缺少惟山東奏報得雨似可足用其餘則尚未沾足朕心甚為憂慮當此青黃不接之時東作方興之候正宜急為籌畫以恤民艱已諭令各該督撫因地制宜或減價平糶或借貸倉糧凡有利益民生者即速定議舉行毋容忽視今思仲春之月即定例開徵錢糧之時若有司遵例催科在有力之家尚可勉強輸將而困乏之家實為艱窘深可憫惻著直隸等省督撫將去嵗歉收之州縣一一確查所有現在應完錢糧暫停徵收俟麥秋酌看收成情形再行奏聞歸併秋季錢糧項下帶徵完納如此則地方無追呼之擾民力可以寬舒農功不致有曠該部遵諭速行諭總理事務王大臣農事方興需雨甚殷雖十五日得雨尚未霑足朕心深為顒望著傳諭禮部虔行祈禱諭總理事務王大臣京師雨澤愆期朕心深為憂慮聞河南山東兩省與直隸接壤之地雨亦稀少該撫等作何預為籌畫又近日曾否得雨俱未詳悉奏聞實為輕視民瘼可著侍衛永興前往河南松福前往山東再各派户部司官一員馳驛同往面詢該撫將實在情形并如何料理之處一一陳奏永興等亦著沿途留心從前得雨分數此時乾旱情形地畝曾否播種米價如何騰貴以及百姓情形若何之處著回時據實覆奏諭總理事務王大臣昔者虞廷咨牧食哉惟時而百揆奮庸之後即命棄以播時百榖禮樂兵刑皆在所後良以食為民天一夫不耕或受之飢一女不織或受之寒而耕九餘三雖遇荒年民無菜色今天下土地不為不廣民人不為不衆以今之民耕今之地使得盡力焉則儲蓄有備水旱無虞乃民之逐末者多而地之棄置者亦或有之縱云從事耕耘而黍高稻下之宜水耨火耕之異南人向多不諳北人率置不講此非牧民者之責抑誰之責歟今之督撫於地方命盜等案或官方吏治兵制夷情能盡其心者有之其以身為之倡課百姓以農桑本務者誰耶得毋與虞廷命官之意相左乎朕欲驅天下之民使皆盡力南畝而其責則在督撫牧令必身先化導毋欲速以不達毋繁擾而滋事將使逐末者漸少奢靡者知戒蓄積者知勸督撫以此定牧令之短長朕即以此課督撫之優劣至北五省之民於耕耘之術更為疏略是以一榖不登即資賑濟斯豈久安長治之道其應如何勸戒百姓或延訪南人之習農者以教導之牧令有能勸民墾種一嵗得榖若何三嵗所儲若何視其多寡為激勸非竒貪異酷極昏極庸者毋輕率劾去使久於其任則與民相親而勸課有成將見俗返醇朴家有蓋藏然後禮樂政刑之教可漸以講習著該部會同九卿詳悉定議以聞欽定授時通考卷四十八
