body:
  text: 桑餘麻書經禹貢青州岱畎絲枲𫝊枲麻也又豫州厥貢漆臬絺紵周禮典枲掌布緦縷紵之麻草之物以待時頒功而授齎疏王昭禹曰麻未緝者為枲典枲所掌其物非一獨以枲名官蓋麻為女功之正也又夏官職方氏河南曰豫州其利林漆絲枲疏王昭禹曰禹貢豫州厥貢漆枲絺紵則林漆絲枲固豫之所產也又考工記治絲麻以成之謂之婦功詩經王風丘中有麻疏麻榖名子可食皮可績為布者又齊風藝麻如之何衡従其畝箋樹麻者必先耕治其田然後樹之又陳風東門之池可以漚麻傳漚柔也箋於池中柔麻使可緝績作衣服也又東門之池可以漚紵傳紵麻屬又不績其麻箋績麻者婦人之事也又豳風八月載績傳載績絲事畢而麻事起矣禮記禮運治其麻絲以為布帛集説湅染之類也爾雅黂枲實注苴麻麻之有蘊者苧麻是也陶𢎞景曰苧麻今績苧麻是也又枲麻注枲即大麻也可為布又茡麻母注苴麻也可為布喪服所用俗謂之黄麻吕氏春秋得時之麻必芒以長疎節而色揚小本而莖堅厚管子五沃之土樹之五麻若髙若下不擇疇所説文苧麻草也可績為繩齊民要術凡種大麻用白麻子白麻子為雄麻顔色雖白齧破枯焦不膏潤者秕子也亦不中種市糴者口含少時顔色如舊者佳變黑者浥麻欲得良田不用故墟故墟亦良有點葉夭折之患不任作布地薄者糞之糞宜熟無熟糞者用小豆底亦得耕不厭熟縦横七遍以上則麻無葉田欲嵗易抛子種則節髙良田一畝用子三升薄田二升穊則細而不長稀則粗而成惡夏至前十日為上時至日為中時至後十日為下時麥黄種麻麻黄種麥亦良候也澤多者先漬麻子令芽生取雨水浸之生芽疾用井水則生遲浸法著水中如炊兩石米頃出著席上布令厚三四寸數攪之令均得地氣一宿則芽出水若滂沛十日亦不生待地白背耬耩漫種子空曳勞截雨脚即種者地濕麻生瘦待白背者麻生肥澤少者暫浸即出不得待芽生耬頭中下之不勞曵撻麻生數日常驅雀葉青即止布葉而鋤勃如灰便刈刈拔各隨鄉俗束欲小小束也縛欲薄為其易乾一宿輙翻之得霜露則皮壊穫欲淨有葉者易爛漚欲清水生熟合宜濁水則黑水少則脆生則難剥大爛則不任又汜勝之書曰種枲太早則剛堅厚皮多節晚則不堅寧失於早不失於晚穫麻之法穗勃勃如灰拔之又凡種麻地須耕五六遍倍蓋之以夏至前十日下子亦鋤兩遍仍須用心細意抽拔凡細弱不堪留者即去却但依此法除蟲災外小旱亦不至全損又種苧麻法止取實者種斑黑麻子斑黑者饒實耕須再遍一畝用子二升種法與大麻同三月種者為上時四月為中時五月初為下時大率二尺留一科穊則不成鋤常令淨荒則少實既放勃拔去雄若未放勃去雄者則不子實又種麻預調和田二月下旬三月上旬傍雨種之麻生布葉鋤之率九尺一樹樹髙一尺以蠶矢糞之樹三升無蠶矢以溷中熟糞糞之樹一升天旱以流水澆之無流水用井水須少曝以殺其寒氣雨澤適時勿澆澆不欲數霜下實成速所之其樹大者以鋸鋸之農桑輯要種苧麻法三四月種子者初用沙薄地為上兩和地為次園圃内種之如無園瀕河近井處亦得斸土一兩遍然後作畦濶半步長四步再斸一遍用脚浮躡或杴背浮按稍實再耙平隔宿用水飲畦明旦細齒耙浮耬起土再耙平隨用潤土半升麻子一合和匀一合子可撒六七畦撒畢不用覆土覆土則不出用極細稍杖三四根撥剌令平可畦搭棚二三尺髙加細箔遮蓋五六月炎熱時箔上加苫重蓋不則曬死未生芽或苗初出不可澆水用炊箒細灑水於棚上常令其下濕潤每夜及天陰去箔以受露氣苗出有草即拔苗髙三指不須用棚如地稍乾用水輕澆約長三寸擇稍壯地别作畦移栽隔宿先將有苗地澆過明旦亦將空畦澆過帶土撅出移栽相離四寸頻鋤三五日一澆二十日後十日半月一澆至十月後用牛驢馬生糞蓋厚一尺農政全書苧初種用子種後宿根自生數年後根多糾結即須分栽今安慶建寧諸處亦多掘根分栽無種子者亦如壓條栽桑趣易速效然無根處逺致為難即宜用種子之法凡苗長數寸即用糞和半水澆之割後旋澆澆必以夜或陰天在日下澆有繡瘢最忌猪糞又曰苧月月可栽但須地濕又十耕蘿蔔九耕麻地宜肥熟須冬月開墾凍過則土酥來春鋤成竹壠正月半前後種其子取斑黑者為上撒後以灰蓋之密則細疎則粗布葉後以水糞澆灌不可立行壠上恐踏實不長七月間収子麻布包之懸掛則易出又檾麻與黄麻同時熟刈作小束池内漚之爛去青皮取其麻片潔白如雪耐水爛可織為毯被及作汲綆牛索或作牛衣雨衣草覆等具農家嵗嵗不可無者又種檾麻法地宜肥濕早者四月種遲者六月亦可繁密處芟去則長又蘇恭曰檾麻宜九十月採陰乾為佳羣芳譜移栽苧麻法苧已盛時宜於周圍掘得新科如法移栽則本科長茂新栽又多或如代園種竹法於四五年後將根科最盛者開一畦移栽一畦截根分栽或壓條滋生此畦既盛又掘彼畦如此更代繁植無窮預選秋耕熟肥地更用細糞糞過来春移栽地氣動為上時萌芽為中時苗長為下時周圍離一尺五寸作區移栽擁土畢以水湮之若夏秋須趂雨後地濕連土於近地栽亦可又移時用刀將根截㫁約長三四指作區相去一尺五寸每區卧栽三二根擁土畢方澆水三五日復澆苗髙勤鋤旱則澆之若地逺者須根帶原土蒲包封裹外仍用席掩合勿透風日雖移栽數百里外亦活初年長約一尺便割一䥥二年方可再割麻即堪績用每年十月將割過根楂用牛馬糞蓋厚二月初耙去糞令苗出三年根科稠密不移不旺即再依前法分栽士農必用刈苧麻法每嵗可割三䥥割時須根旁小芽髙五六分大麻即可割大麻既割其小芽榮長即二次麻也若小芽過髙大麻不割芽既不旺又損大麻約五月初割一䥥六月半或七月初割二䥥八月半或九月初割三䥥諺曰頭苧見秧二苧見糠三苧見霜惟二䥥長疾麻亦最好割後即以糞細擁之旋用水澆澆忌在日下又剥苧麻法刈倒時隨用竹刀或鐵刀従梢分開剥下皮即以刀刮白瓤其浮上皴皮自脱得其裏如筋者煮之若於冬月剥麻用溫水潤濕易為分劈首苧粗勁堪為粗布二苧稍柔細惟三苧甚佳堪為細布又漚苧麻法縳作小束搭房上夜露晝曬五七日自然潔白若值陰雨屋底風道處搭晾經雨即黑一云績既成纒作纓子於水盆内浸一宿紡車紡訖用桑柴灰淋水浸一宿撈出每纑五兩用淨水一盞細石灰拌匀停一宿至来日擇去石灰却用黍稭灰淋水煮過自然白輭曬乾再用清水煮一度别用水擺淨曬乾逗成纒鋪經織造與常法同一云紡成纑用乾石灰拌和夏三冬五春秋酌中抖去别用石灰煮熟待冷於清水中濯淨然後用蘆簾平鋪水面攤纑於上半浸半曬遇夜収起瀝乾次日如前候纑極白方可織布此池漚之法又曰漚麻者但如法漚訖方績作纑經緯成布非先績後漚也亦有用本色績纑者夜露晝曬數日便績成纑待成布後方練白色如治葛者刈後即蒸熟剥之不復練矣用此作布更柔而且韌又收苧麻種法收苧作種須頭苧者佳九月霜降後收子曬乾以濕沙土拌匀盛筐内用草蓋覆若凍損則不生二苧三苧子皆不成不堪作種種時以水試之取沈者用又農桑通訣揀一色白苧麻水潤分成縷麤細任意旋緝旋搓本俗於腿上搓作纑逗成鋪不必車紡亦勿熟漚只經生纑論帖穿苧如常法以發生稀糊調細豆麪刷過更用油水刷之於天氣濕潤時不透風處或地窨子中灑地令潤經織為佳若風日髙燥則纑縷乾脆難織每織必先以油水潤苧及潤纑經織成生布於好灰水中浸蘸灑乾再蘸再曬如此二日不得揉搓再蘸濕了於乾灰内周徧滲浥兩時久納於熱水灰内浸濕於甑中蒸之文武火養二三日頻頻翻覷要識灰性及火候𦂳慢次用淨水澣濯天晴再三帶水搭曬如前不計次數惟以潔白為度灰須上等白者落梨桑柴豆稭等灰入少許炭灰妙鐵勒布法將揀下雜色苧麻水潤分縷隨緝隨搓經織皆如前法水煮過便是先將生苧麻折作二尺五寸長不斷曬乾蒸過帶濕剥下去麤皮如常法水潤緝搓如前麻鐵黎布法將雜色老火麻帶濕曲折作二尺五寸長曬乾收之欲用時旋於木甑中蒸過趂濕剥下曬乾以木椑子兩箇夾麻順歴數次至麻性頗輭堪緝為度水潤緝績紡作纑生織成布水煮便是又此布妙處惟在不搓揉了麻之骨力好灰水蘸曬布子潔白而已雖曰蘸曬頗煩而省纒縈熟纑等工亦多比之南布或有價髙數倍者真良法也麻麻績麻也有二種一種紫麻一種白苧出荆揚閩蜀江浙今中州亦有之皮可績布苗髙七八尺葉如楮葉而無叉面或青或紫背白有短毛花青如白楊而長夏秋間著細穂一朶數千穂白色子熟茶褐色根黄白而輕虚一科數十莖宿根在土中到春自生不須栽種荆揚間每嵗三刈每畝得麻三十斤少亦不下二十斤每斤三百文過常麻數倍又有一種山苧頗相似刈刀圖説刈刀穫麻刀也或作兩刃但用䥥柌旋插其刃俯身控刈取其平穏便易北方種麻頗多或至連頃另有刀工各具其器割刈根莖劖削梢葉甚有速效南東惟用拔取頗費工力故録此篇首漚池圖説漚浸漬也池猶泓也凡藝麻之鄉如無水處則當掘地成池或甃以磚石蓄水於内用作漚所大凡北方治麻刈倒即束之卧置池内水要寒煖得宜麻亦生熟有節須人體測得法則麻皮潔白柔韌可績細布南方但連根拔麻遇用則旋浸旋剥其麻片黄皮麤厚不任細績雖南北習尚不同然北方隨刈即漚於池可為上法小紡車圖説此車之制凡麻苧之鄉在在有之大紡車圖説其制長餘二丈濶約五尺先造地柎木框四角六柱各髙五尺中穿横桄上架枋木其枋木兩頭山口卧受捲纑長軖鐵軸次於前地柎上立長木座座上列臼以承􅩺底鐵簨夫欓用木車成筩子長一尺二寸圍一尺二寸計三十二枚内受績纒􅩺上俱用杖頭鐡環以拘􅩺軸又於額枋前排置小鐵叉分勒績條轉上長軖仍就左右别架車輪兩座通絡皮弦下經列􅩺上拶轉軖旋鼔或人或畜轉動左邊大輪弦隨輪轉衆機皆動使績條成𦂳纒於軖上晝夜紡績百斤蟠車圖説蟠車纒纑具也又謂之撥車南人謂撥柎又云車柎布機圖説布機釋名曰布列諸縷淮南子曰伯餘之初作布也伯餘黄帝臣也緂麻索縷手經指挂後世為之機杼幅匹廣長疎密之制存焉農家春秋績織最為要具䋔車圖説䋔車續麻臬䋔𦂳具也造作簨虡髙二尺上穿横軸長可二尺餘貫以軖轂左手引麻牽軖既轉右手續接麻皮成𦂳縦纒上軖䋔縷既盈乃脱軖付之繩車或作别用葛書經禹貢揚州島夷卉服傳卉葛越之屬詩經周南葛之覃兮施于中谷維葉萋萋傳覃延也葛所以為絺綌女功之繁縟者施移也中谷谷中也萋萋茂盛貌又維葉莫莫是刈是濩為絺為綌傳莫莫成就之貌濩煮之也精曰絺粗曰綌又邶風旄丘之葛兮何誕之節兮箋土氣緩則葛生濶節呂祖謙曰葛初生其節蹙而密既長其節濶而疎又鄘風蒙彼縐絺傳縐絺絺之蹙蹙者當暑之服也或曰蒙謂加絺綌於褻衣之上所謂表而出之也又王風綿綿葛藟在河之滸傳綿綿長不絶之貎水厓曰滸周禮地官掌葛掌以時徴絺綌之材于山農凡葛征徴草貢之材于澤農注草貢出澤䔛紵之屬可緝績者疏所以徴絺綌於山農者以其葛出於山也農政全書葛一名黄斤一名鹿藿鹿食九草此其一種故名一名雞齊處處有之江浙尤多有野生有家種春生苗引藤蔓一二丈紫色取治可作絺綌其根外紫内白大如臂長者七八尺葉有三尖如楓葉而長面青背淡七月著花紅紫色纍纍成穂曬乾可煠食其荚如小黄豆宜七八月採之羣芳譜採葛夏月葛成嫩而短者留之一丈上下者連根取謂之頭葛如太長看近根有白㸃者不堪用無白㸃者可截七八尺謂之二葛又練葛採後即挽成網𦂳火煮爛熟指甲剥看麻白不粘青即剥下長流水邊捶洗淨風乾露一二宿尤白安陰處忌日色紡之以織葛花同小豆花乾為末酒服飲酒不醉金瘡出血挼葉敷之燒蔓研水服治卒然喉痺又洗葛衣清水揉梅葉洗經夏不脆或用梅葉搗碎泡湯入磁盆内洗之忌用木器則黑芭蕉南方草木狀牛乳蕉其根解散如絲以灰練之可紡績為絺綌謂之蕉葛異物志水蕉白花不結實人取其莖以灰練之可紡績女工以為絺綌即今交阯葛也桐廣志驃國有白桐木其葉有白毳取其毳淹漬緝織以為布華陽國志益州有梧桐木其華采如絲人績以為布名白華布欽定授時通考卷七十八
